window.AH_GRAPHICS["native-plants-by-microclimate-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Native Plants by Santa Cruz Microclimate</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Top performers matched to your growing zone</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; font-weight: 700; font-size: 0.95rem;\">Coastal Fog Belt</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 0 0 8px 0;\">Aptos, Live Oak, Capitola, Westside SC</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Shrubs:</strong> Ceanothus, Coffeeberry, Coast Buckwheat</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Perennials:</strong> Seaside Daisy, Beach Strawberry, Yarrow</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><em>Salt-tolerant, wind-resistant species thrive here</em></p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; font-weight: 700; font-size: 0.95rem;\">San Lorenzo Valley / Sunny</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 0 0 8px 0;\">Boulder Creek, Ben Lomond sunny exposures</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Shrubs:</strong> Manzanita, Toyon, Sticky Monkey Flower</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Perennials:</strong> California Poppy, Lupine, Sage</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><em>Fire-wise choices important here; drought-adapted species</em></p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; font-weight: 700; font-size: 0.95rem;\">Under the Redwoods</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 0 0 8px 0;\">Felton, Ben Lomond canyons, Scotts Valley shade</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Shrubs:</strong> Huckleberry, Hazelnut, Elk Clover</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Groundcover:</strong> Redwood Sorrel, Wild Ginger, Sword Fern</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><em>Shade-loving, moisture-tolerant species; acidic soil adapted</em></p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; font-weight: 700; font-size: 0.95rem;\">Inland / Watsonville</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 0 0 8px 0;\">Scotts Valley, Soquel hills, Pajaro Valley</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Shrubs:</strong> California Lilac, Matilija Poppy, Toyon</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Perennials:</strong> California Fuchsia, Penstemon, Buckwheat</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><em>Widest selection; most natives thrive with some summer water</em></p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        All native plants are drought-tolerant once established (usually by year 2-3). Buy from local native nurseries like Sierra Azul for best results.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["pollinator-plant-selection-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Native Plants by Pollinator</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Match your plant choices to the pollinators you want to support</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; font-size: 0.95rem; text-align: center;\">Native Bees</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px 0;\"><strong>They need:</strong> Open, flat flowers for landing</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">California Poppy</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Buckwheat (all species)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Manzanita</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Ceanothus</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\">Yarrow</p>\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 10px 0 0 0;\"><em>70% of our native bees are ground nesters. Leave bare soil patches.</em></p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; font-size: 0.95rem; text-align: center;\">Butterflies</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px 0;\"><strong>They need:</strong> Flat clusters for landing + host plants for larvae</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Buckwheat (nectar)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Milkweed (Monarch host)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Coyote Brush (Painted Lady)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">California Aster</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\">Lupine (various spp.)</p>\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 10px 0 0 0;\"><em>Plant in full sun, sheltered from wind. Include both nectar and host plants.</em></p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; font-size: 0.95rem; text-align: center;\">Hummingbirds</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px 0;\"><strong>They need:</strong> Tubular, red/orange flowers</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">California Fuchsia (fall)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Sticky Monkey Flower (spring-summer)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Penstemon (spring)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Salvia (multiple species)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\">Manzanita (winter-spring)</p>\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 10px 0 0 0;\"><em>Anna's Hummingbirds live here year-round. Plan for all-season bloom.</em></p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["native-groundcover-selection-flowchart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Choose Your Native Groundcover</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Match the right plant to your conditions</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; border-radius: 8px; text-align: center; font-weight: 600; margin-bottom: 15px;\">How much sun does your area get?</div>\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 25px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #dde2d8; border-radius: 8px; padding: 15px; text-align: center;\">\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px;\">Full Sun (6+ hrs)</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0 0 10px 0;\">Direct sunlight most of the day</p>\n                <div style=\"background-color: #dde2d8 !important; padding: 8px 12px; border-radius: 4px; font-size: 0.8rem; color: #1c3c2c !important; font-weight: 500;\">Creeping Sage, Coyote Brush, Woolly Yarrow</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #dde2d8; border-radius: 8px; padding: 15px; text-align: center;\">\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px;\">Part Shade (3-6 hrs)</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0 0 10px 0;\">Morning sun or dappled light</p>\n                <div style=\"background-color: #dde2d8 !important; padding: 8px 12px; border-radius: 4px; font-size: 0.8rem; color: #1c3c2c !important; font-weight: 500;\">Beach Strawberry, Yerba Buena, Douglas Iris</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #dde2d8; border-radius: 8px; padding: 15px; text-align: center;\">\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px;\">Full Shade (&lt;3 hrs)</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0 0 10px 0;\">Under trees, north-facing</p>\n                <div style=\"background-color: #dde2d8 !important; padding: 8px 12px; border-radius: 4px; font-size: 0.8rem; color: #1c3c2c !important; font-weight: 500;\">Redwood Sorrel, Wild Ginger, Inside-Out Flower</div>\n            </div>\n        </div>\n        <div style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 10px 15px; border-radius: 8px; text-align: center; font-size: 0.85rem; margin-bottom: 15px;\">Then consider: do you need foot traffic tolerance?</div>\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #dde2d8; border-radius: 8px; padding: 15px; text-align: center;\">\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px;\">Yes, Regular Traffic</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0 0 10px 0;\">Walking paths, play areas</p>\n                <div style=\"background-color: #dde2d8 !important; padding: 8px 12px; border-radius: 4px; font-size: 0.8rem; color: #1c3c2c !important; font-weight: 500;\">Woolly Yarrow, Lippia, Beach Strawberry (light)</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #dde2d8; border-radius: 8px; padding: 15px; text-align: center;\">\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px;\">Occasional Only</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0 0 10px 0;\">Sometimes walked on</p>\n                <div style=\"background-color: #dde2d8 !important; padding: 8px 12px; border-radius: 4px; font-size: 0.8rem; color: #1c3c2c !important; font-weight: 500;\">Coyote Brush, Creeping Sage</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #dde2d8; border-radius: 8px; padding: 15px; text-align: center;\">\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px;\">No Traffic</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0 0 10px 0;\">Visual only, no walking</p>\n                <div style=\"background-color: #dde2d8 !important; padding: 8px 12px; border-radius: 4px; font-size: 0.8rem; color: #1c3c2c !important; font-weight: 500;\">California Fuchsia, Wild Ginger, most others</div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["groundcover-establishment-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Native Groundcover Establishment Timeline</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What to expect from planting day to full coverage</p>\n    </div>\n    <div style=\"padding: 30px 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"position: relative; padding-left: 30px;\">\n            <div style=\"position: absolute; left: 8px; top: 0; bottom: 0; width: 4px; background: linear-gradient(to bottom, #1a3b2a 0%, #1a3b2a 25%, #8c9c8c 25%, #8c9c8c 55%, #4a7c59 55%, #4a7c59 80%, #dde2d8 80%); border-radius: 2px;\"></div>\n            <div style=\"position: relative; margin-bottom: 25px;\">\n                <div style=\"position: absolute; left: -30px; top: 5px; width: 20px; height: 20px; background-color: #1a3b2a !important; border-radius: 50%; border: 3px solid #f8f9f0; box-shadow: 0 0 0 2px #1a3b2a;\"></div>\n                <div style=\"background-color: #fff !important; padding: 15px 18px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;\">\n                        <span style=\"font-weight: 700; color: #1a3b2a !important;\">Planting Day</span>\n                        <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600;\">Fall (Oct-Nov)</span>\n                    </div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Install plants at recommended spacing, mulch between plants, water deeply. Fall planting lets winter rain do the establishment work.</p>\n                </div>\n            </div>\n            <div style=\"position: relative; margin-bottom: 25px;\">\n                <div style=\"position: absolute; left: -30px; top: 5px; width: 20px; height: 20px; background-color: #8c9c8c !important; border-radius: 50%; border: 3px solid #f8f9f0; box-shadow: 0 0 0 2px #8c9c8c;\"></div>\n                <div style=\"background-color: #fff !important; padding: 15px 18px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;\">\n                        <span style=\"font-weight: 700; color: #1a3b2a !important;\">First Summer (Critical)</span>\n                        <span style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600;\">Year 1</span>\n                    </div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Water deeply weekly during dry season. Hand-pull weeds promptly. Plants focus energy on root development. This is the make-or-break period.</p>\n                </div>\n            </div>\n            <div style=\"position: relative; margin-bottom: 25px;\">\n                <div style=\"position: absolute; left: -30px; top: 5px; width: 20px; height: 20px; background-color: #4a7c59 !important; border-radius: 50%; border: 3px solid #f8f9f0; box-shadow: 0 0 0 2px #4a7c59;\"></div>\n                <div style=\"background-color: #fff !important; padding: 15px 18px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;\">\n                        <span style=\"font-weight: 700; color: #1a3b2a !important;\">Second Summer (Weaning)</span>\n                        <span style=\"background-color: #4a7c59 !important; color: #f8f9f0 !important; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600;\">Year 2</span>\n                    </div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Reduce watering to every 2-3 weeks. Plants begin spreading and filling gaps. Weeding becomes easier as coverage increases.</p>\n                </div>\n            </div>\n            <div style=\"position: relative;\">\n                <div style=\"position: absolute; left: -30px; top: 5px; width: 20px; height: 20px; background-color: #dde2d8 !important; border-radius: 50%; border: 3px solid #f8f9f0; box-shadow: 0 0 0 2px #dde2d8;\"></div>\n                <div style=\"background-color: #fff !important; padding: 15px 18px; border-radius: 8px; border: 2px solid #1a3b2a;\">\n                    <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;\">\n                        <span style=\"font-weight: 700; color: #1a3b2a !important;\">Established!</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600;\">Year 3+</span>\n                    </div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Most groundcovers need no summer water. Full coverage suppresses weeds naturally. Occasional trimming if needed. Enjoy your low-maintenance garden!</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0 25px 25px 25px; border-radius: 6px;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Patience pays off.</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Native groundcovers are slow to start but once established, they're virtually maintenance-free. The first two summers are an investment in decades of low-maintenance beauty.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";


window.AH_GRAPHICS["benefits-native-garden-design-santa-cruz-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Native Plants by Santa Cruz Microclimate</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Top performers matched to your growing zone</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; font-weight: 700; font-size: 0.95rem;\">Coastal Fog Belt</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 0 0 8px 0;\">Aptos, Live Oak, Capitola, Westside SC</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Shrubs:</strong> Ceanothus, Coffeeberry, Coast Buckwheat</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Perennials:</strong> Seaside Daisy, Beach Strawberry, Yarrow</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><em>Salt-tolerant, wind-resistant species thrive here</em></p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; font-weight: 700; font-size: 0.95rem;\">San Lorenzo Valley / Sunny</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 0 0 8px 0;\">Boulder Creek, Ben Lomond sunny exposures</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Shrubs:</strong> Manzanita, Toyon, Sticky Monkey Flower</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Perennials:</strong> California Poppy, Lupine, Sage</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><em>Fire-wise choices important here; drought-adapted species</em></p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; font-weight: 700; font-size: 0.95rem;\">Under the Redwoods</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 0 0 8px 0;\">Felton, Ben Lomond canyons, Scotts Valley shade</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Shrubs:</strong> Huckleberry, Hazelnut, Elk Clover</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Groundcover:</strong> Redwood Sorrel, Wild Ginger, Sword Fern</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><em>Shade-loving, moisture-tolerant species; acidic soil adapted</em></p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; font-weight: 700; font-size: 0.95rem;\">Inland / Watsonville</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 0 0 8px 0;\">Scotts Valley, Soquel hills, Pajaro Valley</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Shrubs:</strong> California Lilac, Matilija Poppy, Toyon</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Perennials:</strong> California Fuchsia, Penstemon, Buckwheat</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><em>Widest selection; most natives thrive with some summer water</em></p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        All native plants are drought-tolerant once established (usually by year 2-3). Buy from local native nurseries like Sierra Azul for best results.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["native-plants-for-pollinators-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Native Plants by Pollinator</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Match your plant choices to the pollinators you want to support</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; font-size: 0.95rem; text-align: center;\">Native Bees</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px 0;\"><strong>They need:</strong> Open, flat flowers for landing</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">California Poppy</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Buckwheat (all species)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Manzanita</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Ceanothus</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\">Yarrow</p>\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 10px 0 0 0;\"><em>70% of our native bees are ground nesters. Leave bare soil patches.</em></p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; font-size: 0.95rem; text-align: center;\">Butterflies</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px 0;\"><strong>They need:</strong> Flat clusters for landing + host plants for larvae</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Buckwheat (nectar)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Milkweed (Monarch host)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Coyote Brush (Painted Lady)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">California Aster</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\">Lupine (various spp.)</p>\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 10px 0 0 0;\"><em>Plant in full sun, sheltered from wind. Include both nectar and host plants.</em></p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; font-size: 0.95rem; text-align: center;\">Hummingbirds</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px 0;\"><strong>They need:</strong> Tubular, red/orange flowers</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">California Fuchsia (fall)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Sticky Monkey Flower (spring-summer)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Penstemon (spring)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Salvia (multiple species)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\">Manzanita (winter-spring)</p>\n                    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 10px 0 0 0;\"><em>Anna's Hummingbirds live here year-round. Plan for all-season bloom.</em></p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["california-natives-vs-mediterranean-plants-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">California Natives vs. Mediterranean Plants: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">California Natives</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Mediterranean Plants</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Water Savings</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">60-80% less than lawn (once established)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">50-70% less than lawn (once established)</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Wildlife Support</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">High; evolved with local pollinators</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Moderate; attracts some pollinators</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Nursery Availability</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Improving, but still limited</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Widely available everywhere</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Maintenance</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Very low once established</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Low; occasional pruning</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Summer Watering</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">None to 1x/month for most species</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">1-2x/month for most species</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Santa Cruz Fit</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Perfect; already adapted to local conditions</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Excellent; similar climate of origin</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["why-native-garden-design-is-essential-for-eco-friendly-landscaping-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Benefits of Native Garden Design at a Glance\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Benefit</th>\n        <th scope=\"col\">What it looks like in your garden</th>\n        <th scope=\"col\">Why it matters</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Lower water use</th>\n        <td>Deep-rooted shrubs, fewer thirsty lawns</td>\n        <td>\n          Reduces irrigation needs; native gardens can use up to\n          80\u201385% less water than turf landscapes\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Less maintenance</th>\n        <td>Little or no mowing; minimal fertilizing and spraying</td>\n        <td>\n          Saves time and money and reduces ongoing inputs\n          over the long term\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Wildlife support</th>\n        <td>More birds, butterflies, bees, and beneficial insects</td>\n        <td>\n          Supports healthier, more resilient local ecosystems\n          and improves pollination\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Climate resilience</th>\n        <td>Plants adapted to drought, heat, and local conditions</td>\n        <td>\n          Creates landscapes that better withstand dry spells\n          and extreme weather\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["why-native-garden-design-is-essential-for-eco-friendly-landscaping-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Native Plants: Light, Soil, and Key Benefits\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Plant</th>\n        <th scope=\"col\">Light and soil</th>\n        <th scope=\"col\">Key benefits</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">California poppy (Eschscholzia californica)</th>\n        <td>Full sun; well-drained, lean soil</td>\n        <td>\n          Showy spring color; reseeds easily;\n          very low water once established\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Matilija poppy (Romneya coulteri)</th>\n        <td>Full sun; well-drained soil; room to spread</td>\n        <td>\n          Large \u201cfried egg\u201d flowers; extremely drought-tolerant;\n          well suited to slopes\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Ceanothus (California lilac)</th>\n        <td>Sun to light shade; well-drained soil</td>\n        <td>\n          Spring blue flowers; strong pollinator attraction;\n          excellent low-water shrub\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Manzanita (Arctostaphylos spp.)</th>\n        <td>Full sun; fast-draining soil</td>\n        <td>\n          Red bark and winter bloom;\n          supports birds and pollinators;\n          very low water needs\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Monkeyflower (Mimulus spp.)</th>\n        <td>Sun to part shade; well-drained soil</td>\n        <td>\n          Long bloom season;\n          attracts hummingbirds and pollinators\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

n          \n\n          \n          \n          \n        }</style><div class=\"ah-poppy-container\">\n<div class=\"ah-poppy-header\">\n<h2>Matilija Poppy</h2>\n<div class=\"scientific\">Romneya coulteri</div>\n<p>California's largest native flower \u2022 \"Fried Egg Plant\"</p>\n</div>\n<div class=\"ah-poppy-content\">\n<div class=\"quick-facts\">\n<div class=\"fact-box\">\n<div class=\"fact-icon\">\ud83c\udf38</div>\n<div class=\"fact-value\">5-6\"</div>\n<div class=\"fact-label\">Flower Size</div>\n</div>\n<div class=\"fact-box\">\n<div class=\"fact-icon\">\ud83d\udccf</div>\n<div class=\"fact-value\">6-8 ft</div>\n<div class=\"fact-label\">Plant Height</div>\n</div>\n<div class=\"fact-box\">\n<div class=\"fact-icon\">\u2600\ufe0f</div>\n<div class=\"fact-value\">Full Sun</div>\n<div class=\"fact-label\">Light Needs</div>\n</div>\n<div class=\"fact-box\">\n<div class=\"fact-icon\">\ud83d\udca7</div>\n<div class=\"fact-value\">Very Low</div>\n<div class=\"fact-label\">Water (Established)</div>\n</div>\n</div>\n<div class=\"pros-cons-grid\">\n<div class=\"pros-section\">\n<h3><span>\u2713</span> Why Grow It</h3>\n<ul>\n<li>Largest flowers of any CA native</li>\n<li>Extremely drought-tolerant</li>\n<li>Fire-resistant (when maintained)</li>\n<li>Excellent pollinator plant</li>\n<li>Deer resistant</li>\n<li>Thrives in poor soil</li>\n<li>Erosion control on slopes</li>\n</ul>\n</div>\n<div class=\"cons-section\">\n<h3><span>!</span> Considerations</h3>\n<ul>\n<li>Spreads aggressively via rhizomes</li>\n<li>Can travel 10+ feet underground</li>\n<li>Difficult to remove once established</li>\n<li>Not for small gardens</li>\n<li>May crowd out other plants</li>\n<li>Can lift pavers/thin hardscape</li>\n<li>Needs annual cutback</li>\n</ul>\n</div>\n</div>\n<div class=\"warning-box\">\n<h4>\u26a0\ufe0f Before You Plant</h4>\n<p>Matilija poppy needs SPACE. Plant at least 15 feet from structures, property lines, and plants you want to protect. Use root barriers or hardscape boundaries to contain spread. Best suited for large properties, dry slopes, or areas where naturalization is the goal.</p>\n</div>\n<div class=\"care-grid\">\n<div class=\"care-item\">\n<h4>Best Planting Time</h4>\n<p><span class=\"highlight\">Fall</span> (Oct-Dec) for root establishment during rainy season</p>\n</div>\n<div class=\"care-item\">\n<h4>Bloom Season</h4>\n<p><span class=\"highlight\">May-July</span> in Santa Cruz County; sporadic through summer</p>\n</div>\n<div class=\"care-item\">\n<h4>Annual Pruning</h4>\n<p>Cut to <span class=\"highlight\">6-12 inches</span> in late fall/winter after bloom</p>\n</div>\n</div>\n</div>\n<div class=\"ah-poppy-footer\">\n            ambitiousharvest.com | Santa Cruz and Bay Area Gardening\n        </div>\n</div>";
window.AH_GRAPHICS["grow-matilija-poppy-santa-cruz-g2"] = "<div class=\"ah-placement-container\">\n<div class=\"ah-placement-header\">\n<h2>Where to Plant Matilija Poppy</h2>\n<p>Location guide for Santa Cruz County microclimates</p>\n</div>\n<div class=\"ah-placement-content\">\n<div class=\"location-card\">\n<div class=\"location-header excellent\">\n<span class=\"location-title\">Dry Slopes &amp; Large Properties</span>\n<span class=\"location-badge\">Excellent</span>\n</div>\n<div class=\"location-body\">\n<p class=\"location-description\">The ideal setting. Sunny hillsides where irrigation is impractical and erosion control is needed. Large properties (\u00bd acre+) where the plant can naturalize freely. Fire zones where maintained colonies provide fire-resistant coverage.</p>\n<p class=\"location-areas\">Best areas: Boulder Creek ridges, Ben Lomond hillsides, Bonny Doon sandstone areas</p>\n<div class=\"spreading-note\">\n<strong>Spreading behavior:</strong> Will naturalize into colonies. In poor, dry soil with no irrigation, spread is more moderate. Perfect for letting it do its thing.\n                    </div>\n</div>\n</div>\n<div class=\"location-card\">\n<div class=\"location-header good\">\n<span class=\"location-title\">Sunny Inland Gardens with Space</span>\n<span class=\"location-badge\">Good</span>\n</div>\n<div class=\"location-body\">\n<p class=\"location-description\">Works well if you have room and use containment strategies. Plant against concrete foundations, driveways, or other hardscape that naturally limits spread on at least two sides.</p>\n<p class=\"location-areas\">Works in: Scotts Valley, Soquel hills, inland areas with good drainage</p>\n<div class=\"spreading-note\">\n<strong>Spreading behavior:</strong> Will spread vigorously in rich, watered soil. Use hardscape boundaries or root barriers. Plan for 8-10 foot spread minimum.\n                    </div>\n</div>\n</div>\n<div class=\"location-card\">\n<div class=\"location-header challenging\">\n<span class=\"location-title\">Coastal Fog Belt</span>\n<span class=\"location-badge\">Challenging</span>\n</div>\n<div class=\"location-body\">\n<p class=\"location-description\">Will grow but may not bloom as prolifically. Needs maximum sun exposure in a protected, warm microclimate. The plant tolerates coastal conditions but requires heat to flower its best.</p>\n<p class=\"location-areas\">Marginal in: Aptos, Capitola, Westside Santa Cruz, Live Oak</p>\n<div class=\"spreading-note\">\n<strong>Spreading behavior:</strong> Cooler conditions may moderate spread somewhat, but don't count on it. Still needs space and containment planning.\n                    </div>\n</div>\n</div>\n<div class=\"location-card\">\n<div class=\"location-header avoid\">\n<span class=\"location-title\">Small Gardens / Under Redwoods</span>\n<span class=\"location-badge\">Avoid</span>\n</div>\n<div class=\"location-body\">\n<p class=\"location-description\">Not appropriate. Small urban lots lack space to accommodate spreading. Shaded areas under redwoods don't provide enough sun. Near vegetable gardens or irrigated areas, aggressive spread becomes a serious problem.</p>\n<p class=\"location-areas\">Don't plant: Small lots, shade gardens, near irrigation, close to property lines</p>\n<div class=\"spreading-note\">\n<strong>Better alternatives:</strong> Consider California fuchsia, buckwheat, or native sages for smaller spaces. See our California Natives guides.\n                    </div>\n</div>\n</div>\n<div class=\"containment-section\">\n<h3>Containment Strategies</h3>\n<div class=\"containment-grid\">\n<div class=\"containment-item\">\n<h4>Hardscape Boundaries</h4>\n<p>Concrete driveways, foundations, and thick patios create natural barriers rhizomes can't penetrate. Plant where 2+ sides are bounded.</p>\n</div>\n<div class=\"containment-item\">\n<h4>Root Barriers</h4>\n<p>Install 24-30\" deep at planting time. Extend 2-3\" above soil. Check annually and cut escaping rhizomes.</p>\n</div>\n<div class=\"containment-item\">\n<h4>Spacing Requirements</h4>\n<p>Minimum 15 feet from structures, property lines, and plants you want to protect. More is better.</p>\n</div>\n<div class=\"containment-item\">\n<h4>Vigilant Removal</h4>\n<p>Dig unwanted shoots immediately, getting as much rhizome as possible. Repeated mowing weakens colonies.</p>\n</div>\n</div>\n</div>\n</div>\n<div class=\"ah-placement-footer\">\n            ambitiousharvest.com | Santa Cruz and Bay Area Gardening\n        </div>\n</div>";

window.AH_GRAPHICS["growing-manzanita-santa-cruz-g6"] = "<div class=\"ah-manz-timeline\">\n<div class=\"ah-manz-timeline-title\">Manzanita Planting and Care Timeline</div>\n<div class=\"ah-manz-phase\">\n<div class=\"ah-manz-phase-header\">\n<span class=\"ah-manz-phase-time\">October - December</span>\n<span class=\"ah-manz-phase-label\">IDEAL PLANTING</span>\n</div>\n<div class=\"ah-manz-phase-content\">\n<strong>Best time to plant manzanita</strong>\n<ul>\n<li>Roots establish during cool, rainy season</li>\n<li>Minimal top growth means less stress</li>\n<li>Plant will be ready for first summer drought</li>\n<li>Choose small container plants (1 gallon or less)</li>\n</ul>\n</div>\n</div>\n<div class=\"ah-manz-phase\">\n<div class=\"ah-manz-phase-header\">\n<span class=\"ah-manz-phase-time\">First Month After Planting</span>\n<span class=\"ah-manz-phase-label\">ESTABLISHMENT</span>\n</div>\n<div class=\"ah-manz-phase-content\">\n<strong>Initial watering period</strong>\n<ul>\n<li>Deep water approximately twice weekly</li>\n<li>Allow soil to dry between waterings</li>\n<li>No fertilizer needed (ever)</li>\n<li>Use gravel mulch, not organic mulch</li>\n</ul>\n</div>\n</div>\n<div class=\"ah-manz-phase\">\n<div class=\"ah-manz-phase-header\">\n<span class=\"ah-manz-phase-time\">First Winter/Spring</span>\n<span class=\"ah-manz-phase-label\">RAINFALL ONLY</span>\n</div>\n<div class=\"ah-manz-phase-content\">\n<strong>Let rain do the work</strong>\n<ul>\n<li>Rely on natural rainfall</li>\n<li>Stop all irrigation when rains begin</li>\n<li>Watch for first flowers (December - March)</li>\n<li>Remove any dead branches</li>\n</ul>\n</div>\n</div>\n<div class=\"ah-manz-phase\">\n<div class=\"ah-manz-phase-header\">\n<span class=\"ah-manz-phase-time\">First Summer</span>\n<span class=\"ah-manz-phase-label\">CRITICAL PERIOD</span>\n</div>\n<div class=\"ah-manz-phase-content\">\n<strong>Careful supplemental watering</strong>\n<ul>\n<li>Deep water every 7-14 days</li>\n<li>Water deeply but infrequently</li>\n<li>Avoid overhead irrigation on foliage</li>\n<li>Watch for stress (wilting, yellowing)</li>\n</ul>\n</div>\n</div>\n<div class=\"ah-manz-phase\">\n<div class=\"ah-manz-phase-header\">\n<span class=\"ah-manz-phase-time\">Second Summer</span>\n<span class=\"ah-manz-phase-label\">REDUCING WATER</span>\n</div>\n<div class=\"ah-manz-phase-content\">\n<strong>Tapering off irrigation</strong>\n<ul>\n<li>Water once or twice monthly</li>\n<li>Plant should be noticeably more established</li>\n<li>Good root development visible in growth</li>\n</ul>\n</div>\n</div>\n<div class=\"ah-manz-phase\">\n<div class=\"ah-manz-phase-header\">\n<span class=\"ah-manz-phase-time\">Year 3 and Beyond</span>\n<span class=\"ah-manz-phase-label\">ESTABLISHED</span>\n</div>\n<div class=\"ah-manz-phase-content\">\n<strong>Minimal to no supplemental water</strong>\n<ul>\n<li>Often no irrigation needed in appropriate sites</li>\n<li>Rainfall alone sustains the plant</li>\n<li>Light pruning if desired (late fall/winter)</li>\n<li>Enjoy 20-50+ years of beauty!</li>\n</ul>\n</div>\n</div>\n<div class=\"ah-manz-warning\">\n<strong>Never plant manzanita in summer.</strong> The combination of transplant stress, heat, and drought is often fatal.\n  </div>\n<p class=\"ah-manz-timeline-footer\">Source: UC Master Gardener Programs of Sonoma and Napa Counties | ambitiousharvest.com</p>\n</div>";
window.AH_GRAPHICS["growing-manzanita-santa-cruz-g7"] = "<div class=\"ah-micro-manz-container\">\n<div class=\"ah-micro-manz-title\">Which Manzanita for Your Microclimate?</div>\n<div class=\"ah-micro-manz-card\">\n<div class=\"ah-micro-manz-header\">\n<span>Coastal Areas</span>\n<span class=\"ah-micro-manz-locations\">Aptos, Capitola, Live Oak, Santa Cruz beaches</span>\n</div>\n<div class=\"ah-micro-manz-body\">\n<div class=\"ah-micro-manz-row\">\n<div class=\"ah-micro-manz-label\">Top Picks:</div>\n<div class=\"ah-micro-manz-value\">\n<span class=\"ah-micro-manz-species ah-micro-manz-species-top\">Point Reyes</span>\n<span class=\"ah-micro-manz-species ah-micro-manz-species-top\">Emerald Carpet</span>\n<span class=\"ah-micro-manz-species\">Monterey Carpet</span>\n<span class=\"ah-micro-manz-species\">Howard McMinn</span>\n</div>\n</div>\n<div class=\"ah-micro-manz-row\">\n<div class=\"ah-micro-manz-label\">Conditions:</div>\n<div class=\"ah-micro-manz-value\">Foggy, mild winters, some salt air exposure</div>\n</div>\n<div class=\"ah-micro-manz-tip\">Tip:Fog reduces summer heat stress. Low-growing species handle coastal winds best.</div>\n</div>\n</div>\n<div class=\"ah-micro-manz-card\">\n<div class=\"ah-micro-manz-header\">\n<span>San Lorenzo Valley Chaparral</span>\n<span class=\"ah-micro-manz-locations\">Boulder Creek, Ben Lomond sunny exposures</span>\n</div>\n<div class=\"ah-micro-manz-body\">\n<div class=\"ah-micro-manz-row\">\n<div class=\"ah-micro-manz-label\">Top Picks:</div>\n<div class=\"ah-micro-manz-value\">\n<span class=\"ah-micro-manz-species ah-micro-manz-species-top\">Pajaro Manzanita</span>\n<span class=\"ah-micro-manz-species ah-micro-manz-species-top\">Howard McMinn</span>\n<span class=\"ah-micro-manz-species\">Dr. Hurd</span>\n<span class=\"ah-micro-manz-species\">Austin Griffiths</span>\n</div>\n</div>\n<div class=\"ah-micro-manz-row\">\n<div class=\"ah-micro-manz-label\">Conditions:</div>\n<div class=\"ah-micro-manz-value\">Hot, sunny slopes mimicking natural chaparral habitat</div>\n</div>\n<div class=\"ah-micro-manz-tip\">Tip:Prime manzanita territory! Ensure excellent drainage, especially on slopes.</div>\n</div>\n</div>\n<div class=\"ah-micro-manz-card\">\n<div class=\"ah-micro-manz-header\">\n<span>Under the Redwoods</span>\n<span class=\"ah-micro-manz-locations\">Felton, shaded canyons, Ben Lomond shade</span>\n</div>\n<div class=\"ah-micro-manz-body\">\n<div class=\"ah-micro-manz-row\">\n<div class=\"ah-micro-manz-label\">Top Picks:</div>\n<div class=\"ah-micro-manz-value\">\n<span class=\"ah-micro-manz-species ah-micro-manz-species-top\">Emerald Carpet</span>\n<span class=\"ah-micro-manz-species\">Point Reyes</span>\n</div>\n</div>\n<div class=\"ah-micro-manz-row\">\n<div class=\"ah-micro-manz-label\">Conditions:</div>\n<div class=\"ah-micro-manz-value\">Shaded, cool, moist; challenging for most manzanitas</div>\n</div>\n<div class=\"ah-micro-manz-tip\">Caution: Most manzanitas need full sun. Choose partial shade tolerant species. Avoid saturated soils.</div>\n</div>\n</div>\n<div class=\"ah-micro-manz-card\">\n<div class=\"ah-micro-manz-header\">\n<span>Inland Valleys</span>\n<span class=\"ah-micro-manz-locations\">Scotts Valley, Soquel hills</span>\n</div>\n<div class=\"ah-micro-manz-body\">\n<div class=\"ah-micro-manz-row\">\n<div class=\"ah-micro-manz-label\">Top Picks:</div>\n<div class=\"ah-micro-manz-value\">\n<span class=\"ah-micro-manz-species ah-micro-manz-species-top\">Howard McMinn</span>\n<span class=\"ah-micro-manz-species ah-micro-manz-species-top\">John Dourley</span>\n<span class=\"ah-micro-manz-species\">Sentinel</span>\n<span class=\"ah-micro-manz-species\">Austin Griffiths</span>\n<span class=\"ah-micro-manz-species\">Dr. Hurd</span>\n</div>\n</div>\n<div class=\"ah-micro-manz-row\">\n<div class=\"ah-micro-manz-label\">Conditions:</div>\n<div class=\"ah-micro-manz-value\">Moderate temperatures, good for most species</div>\n</div>\n<div class=\"ah-micro-manz-tip\">Tip:Most manzanita species do well here. Warmer temps may encourage faster growth.</div>\n</div>\n</div>\n<div class=\"ah-micro-manz-card\">\n<div class=\"ah-micro-manz-header\">\n<span>Pajaro Valley</span>\n<span class=\"ah-micro-manz-locations\">Watsonville area</span>\n</div>\n<div class=\"ah-micro-manz-body\">\n<div class=\"ah-micro-manz-row\">\n<div class=\"ah-micro-manz-label\">Top Picks:</div>\n<div class=\"ah-micro-manz-value\">\n<span class=\"ah-micro-manz-species ah-micro-manz-species-top\">Pajaro Manzanita</span>\n<span class=\"ah-micro-manz-species\">Howard McMinn</span>\n<span class=\"ah-micro-manz-species\">Dr. Hurd</span>\n<span class=\"ah-micro-manz-species\">Austin Griffiths</span>\n</div>\n</div>\n<div class=\"ah-micro-manz-row\">\n<div class=\"ah-micro-manz-label\">Conditions:</div>\n<div class=\"ah-micro-manz-value\">Warmer, agricultural zone; Pajaro manzanita is native here</div>\n</div>\n<div class=\"ah-micro-manz-tip\">Tip:Pajaro manzanita is locally native and performs exceptionally well. Good drainage essential.</div>\n</div>\n</div>\n<p class=\"ah-micro-manz-footer\">All manzanitas require excellent drainage regardless of microclimate | ambitiousharvest.com</p>\n</div>";
window.AH_GRAPHICS["growing-manzanita-santa-cruz-g8"] = "<div class=\"ah-manz-checklist\">\n<div class=\"ah-manz-checklist-title\">Manzanita Planting Success Checklist</div>\n<div class=\"ah-manz-checklist-section\">\n<div class=\"ah-manz-checklist-section-title\">Before You Buy</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Test drainage: dig 12\" hole, fill with water, check if it drains within 1 hour</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Identify your microclimate (coastal, chaparral, redwood, inland, Pajaro)</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Measure available space for mature plant size</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Choose appropriate species for your conditions</div>\n</div>\n</div>\n<div class=\"ah-manz-checklist-section\">\n<div class=\"ah-manz-checklist-section-title\">Buying Your Plant</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Select small container plants (1 gallon or smaller establish best)</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Check for circling roots (avoid badly rootbound plants)</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Buy from reputable native plant nurseries</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Plan to plant in fall (October - December) for best results</div>\n</div>\n</div>\n<div class=\"ah-manz-checklist-section\">\n<div class=\"ah-manz-checklist-section-title\">Planting Day</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Dig hole 2x wider than root ball, but no deeper</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Plant slightly HIGH (1-2\" above grade for drainage)</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Backfill with native soil ONLY (no amendments, no fertilizer)</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Create temporary watering basin</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Apply gravel or rock mulch (NOT organic mulch)</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Keep mulch several inches away from stem</div>\n</div>\n</div>\n<div class=\"ah-manz-checklist-section\">\n<div class=\"ah-manz-checklist-section-title\">Ongoing Care Reminders</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Water deeply but infrequently during establishment</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Allow soil to dry completely between waterings</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">Stop irrigation when fall rains begin</div>\n</div>\n<div class=\"ah-manz-checklist-item\">\n<div class=\"ah-manz-checklist-text\">NEVER fertilize (manzanitas prefer lean soil)</div>\n</div>\n</div>\n<div class=\"ah-manz-checklist-warning\">\n<span class=\"ah-manz-checklist-warning-icon\">!</span>\n<span><strong>The #1 cause of manzanita death is overwatering or poor drainage.</strong> When in doubt, water less. If drainage is questionable, choose a different site or plant.</span>\n</div>\n<div class=\"ah-manz-checklist-success\">\n<span>\u2713 Follow this checklist and your manzanita should thrive for 20-50+ years with minimal care once established!</span>\n</div>\n<p class=\"ah-manz-checklist-footer\">Print and use when planting! | Sources: UC Master Gardener Programs | ambitiousharvest.com</p>\n</div>";
