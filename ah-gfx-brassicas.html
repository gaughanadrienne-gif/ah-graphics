window.AH_GRAPHICS["santa-cruz-county-broccoli-growing-zones"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Broccoli Growing Zones in Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Planting windows by microclimate</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Coastal Zone</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important;\">Santa Cruz, Capitola, Aptos, Watsonville</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Nearly ideal conditions. Fog keeps temps in the 60s-70s. Near year-round production possible with succession planting.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Spring Transplant</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Mid-Feb to Mid-Mar</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Fall Transplant</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Mid-Aug to Mid-Sep</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">San Lorenzo Valley</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important;\">Felton, Ben Lomond, Boulder Creek</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">More temperature extremes. Summer highs can push 80s and cause bolting. Redwood canopy shade helps. Fall and spring best.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Spring Transplant</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Late Feb to Late Mar</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Fall Transplant</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Early Aug to Early Sep</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Summit / Mountain</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important;\">Summit Road, Loma Prieta, Upper SLV</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Cooler summers are great for broccoli. Hard winter freezes are the risk. Harvest before mid-November or use heavy row cover.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Spring Transplant</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Mid-Mar to Early Apr</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Fall Transplant</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Late Jul to Late Aug</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC ANR planting guides for coastal California. Broccoli thrives at 60-70F. Our fog belt hits this range naturally for much of the year.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["broccoli-planting-calendar"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Broccoli Planting Calendar</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Seed starting, transplant, and harvest windows for Santa Cruz County</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Season</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Start Seeds Indoors</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Transplant Out</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Harvest</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Notes</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Spring</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Dec to Mid-Jan</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Mid-Feb to Mid-Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Apr to Jun</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Transplants handle light frost to 28F.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fall (Best)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Jun to Mid-Jul</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Mid-Aug to Mid-Sep</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Oct to Jan+</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Larger, denser heads. Best flavor.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Extended (Fog Belt)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Mar to Apr</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">May to Jun</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Jul to Aug</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Only if garden stays below 75F consistently.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Side shoots continue 6-8 weeks after main head harvest. Fall side shoots taste sweeter after light frost. Source: UC ANR, UC Davis Vegetable Research.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["broccoli-pest-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Common Broccoli Pests in Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Identify and manage with organic methods</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Cabbage White Butterfly</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Look for:</strong> Small white butterflies with black wing tips hovering near plants</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Damage:</strong> Green caterpillars chew large holes in leaves, bore into heads</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Peak:</strong> Apr-Jun and Sep-Oct</p>\n                    <div style=\"margin-top: 12px; padding-top: 12px; border-top: 1px solid #e8ebe8;\">\n                        <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Organic Controls</div>\n                        <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Row covers (best)</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Bt spray</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Hand-picking</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Cabbage Aphids</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Look for:</strong> Gray-green clusters on undersides of leaves and inside heads</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Damage:</strong> Curled, yellowed leaves. Sticky honeydew. Contaminated heads.</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Peak:</strong> Aug-Nov (warm, dry conditions)</p>\n                    <div style=\"margin-top: 12px; padding-top: 12px; border-top: 1px solid #e8ebe8;\">\n                        <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Organic Controls</div>\n                        <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Strong water spray</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Ladybugs/lacewings</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Insecticidal soap</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Downy Mildew</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Look for:</strong> Yellow patches on leaf tops, gray-purple fuzz underneath</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Damage:</strong> Leaf tissue death, weakened plants, reduced yield</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Peak:</strong> Year-round in fog belt (50-60F, high humidity)</p>\n                    <div style=\"margin-top: 12px; padding-top: 12px; border-top: 1px solid #e8ebe8;\">\n                        <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Prevention</div>\n                        <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Drip irrigation</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Good spacing</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Resistant varieties</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC IPM Pest Management Guidelines for Cole Crops. Row covers installed at transplanting prevent the majority of caterpillar and flea beetle damage.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["cauliflower-variety-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Cauliflower Varieties for Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Choose the right type for your experience level and season</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Color</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Blanching?</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best Season</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best For</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Snow Crown</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">White</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">50-60</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Yes</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Spring or Fall</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Beginners, reliable performer</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Amazing</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">White</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">65-75</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Minimal (self-blanching)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Fall</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Large heads, foggy gardens</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Cheddar</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Orange</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">58-68</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">No</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Spring or Fall</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">No-blanch simplicity, 25x more beta-carotene</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Purple of Sicily</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Purple</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">70-85</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">No</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Fall</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Anthocyanins, striking color, Italian heirloom</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Romanesco</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Green</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">75-100</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">No</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Fall (long season)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Dramatic fractal shape, nutty flavor, advanced</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Colored varieties (orange, purple, green) skip the blanching step entirely, making them easier for first-time cauliflower growers. Source: UC Master Gardener Program.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["how-to-blanch-cauliflower"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">How to Blanch Cauliflower</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Protect white curds from sun yellowing (white varieties only)</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px; text-align: center;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; margin-bottom: 12px;\">1</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px 0;\">Watch for the Curd</h3>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0; line-height: 1.6;\">Begin blanching when the curd is about 2-3 inches across (tennis ball size). Check plants every few days once heads start forming.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px; text-align: center;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; margin-bottom: 12px;\">2</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px 0;\">Fold the Leaves</h3>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0; line-height: 1.6;\">Gently fold 2-3 large outer wrapper leaves up and over the curd. Create a tent that shades the curd but still allows air to circulate.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px; text-align: center;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; margin-bottom: 12px;\">3</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px 0;\">Secure in Place</h3>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0; line-height: 1.6;\">Hold leaves with a rubber band, clothespin, or soft twine. Do not wrap too tightly. The curd needs airflow to prevent moisture rot.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px; text-align: center;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; margin-bottom: 12px;\">4</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px 0;\">Harvest in 7-12 Days</h3>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0; line-height: 1.6;\">Check under leaves every few days. Harvest when the curd is 6-8 inches across, smooth, and tightly packed. Cut with a sharp knife.</p>\n            </div>\n        </div>\n        <div style=\"margin-top: 20px; padding: 15px; background-color: #dde2d8 !important; text-align: center;\">\n            <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Skip blanching entirely with colored varieties: Cheddar (orange), Purple of Sicily, and Romanesco maintain color and flavor without cover.</p>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["cabbage-types-at-a-glance"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Cabbage Types at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Four types, four personalities, all thrive in Santa Cruz County</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Green Cabbage</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Round, dense heads. Most forgiving type. Best for coleslaw, sauerkraut, and stuffed rolls.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Head Weight</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">2-8 lbs</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Days to Harvest</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">60-110</div>\n                        </div>\n                    </div>\n                    <div style=\"margin-top: 16px; padding-top: 16px; border-top: 1px solid #e8ebe8;\">\n                        <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Top Varieties</div>\n                        <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Early Jersey Wakefield</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Golden Acre</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Late Flat Dutch</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Red (Purple) Cabbage</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Deep purple-red with anthocyanins. Slightly smaller, denser, mildly peppery. Adds color to salads and slaws.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Head Weight</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">3-4 lbs</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Days to Harvest</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">75-90</div>\n                        </div>\n                    </div>\n                    <div style=\"margin-top: 16px; padding-top: 16px; border-top: 1px solid #e8ebe8;\">\n                        <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Top Varieties</div>\n                        <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Red Acre</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Kalibos</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Savoy Cabbage</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Crinkled leaves, loose head, tender and sweet. Most cold-hardy type. Best for fresh eating and wraps.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Head Weight</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">3-4 lbs</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Days to Harvest</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">72-90</div>\n                        </div>\n                    </div>\n                    <div style=\"margin-top: 16px; padding-top: 16px; border-top: 1px solid #e8ebe8;\">\n                        <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Top Varieties</div>\n                        <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Savoy Perfection</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Alcosa</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Napa (Chinese) Cabbage</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Tall, oblong head. Different species (B. rapa). Bolts in warm/long days. Essential for kimchi. Fall crop only.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Head Weight</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">4-6 lbs</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Days to Harvest</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">55-60</div>\n                        </div>\n                    </div>\n                    <div style=\"margin-top: 16px; padding-top: 16px; border-top: 1px solid #e8ebe8;\">\n                        <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Top Varieties</div>\n                        <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Bilko</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Blues</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Green, red, and savoy are all Brassica oleracea and will cross-pollinate (matters only for seed saving). Napa is Brassica rapa, a different species. Source: UC ANR.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["cabbage-head-splitting-prevention"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Preventing Cabbage Head Splitting</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Three strategies to keep your heads intact</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; border-radius: 0; padding: 20px; text-align: center;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; margin-bottom: 12px;\">1</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px 0;\">Water Consistently</h3>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0; line-height: 1.6;\">Drip irrigation on a timer is your best insurance. Uneven watering (dry spell followed by heavy rain) is the number one cause of splitting.</p>\n                <div style=\"background-color: #f8f9f0 !important; padding: 8px; font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600;\">1-1.5 inches per week, evenly</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; border-radius: 0; padding: 20px; text-align: center;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; margin-bottom: 12px;\">2</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px 0;\">Harvest on Time</h3>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0; line-height: 1.6;\">Squeeze the head. When it feels firm and solid with little give, cut it. Overripe heads sit under increasing internal pressure and will split.</p>\n                <div style=\"background-color: #f8f9f0 !important; padding: 8px; font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600;\">The squeeze test: firm = ready</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; border-radius: 0; padding: 20px; text-align: center;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; margin-bottom: 12px;\">3</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px 0;\">Root Pruning (Emergency)</h3>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0; line-height: 1.6;\">Not ready to harvest? Push the plant gently to one side or twist it a quarter turn to break some roots. This slows water uptake and buys a few extra days.</p>\n                <div style=\"background-color: #f8f9f0 !important; padding: 8px; font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600;\">Buys 3-5 extra days</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 20px; padding: 15px; background-color: #dde2d8 !important; text-align: center;\">\n            <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0;\"><strong>Common Santa Cruz trigger:</strong> Fall rains arriving after a dry September or October cause the interior to swell rapidly. Maintain drip irrigation through the transition to avoid sudden moisture swings.</p>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["year-round-cabbage-calendar"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Year-Round Cabbage in Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Plant, harvest, and store for 9-10 months of fresh cabbage</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Months</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Activity</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Best Types</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Notes</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Jan-Feb</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Start spring seeds indoors</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Early Jersey Wakefield, Golden Acre</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Also harvesting overwintered fall cabbage</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Feb-Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Transplant spring crops</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Green, Red (early varieties)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Transplants handle light frost</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">May-Jun</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Harvest spring cabbage</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Green, Red</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Leave stem for 2-4 bonus mini heads</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Jun-Jul</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Start fall seeds indoors</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">All types (napa starts late Jul)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Premier season ahead</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Jul-Aug</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Gap: use stored spring cabbage</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Stored green/red in fridge</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Whole heads keep 1-3 months refrigerated</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Aug-Sep</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Transplant fall crops</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">All four types</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Warm soil = fast establishment</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Oct-Jan</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Harvest fall cabbage</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Flat Dutch, Savoy Perfection, Napa</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fall heads are denser, sweeter. Sauerkraut and kimchi season.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Succession planting every 3 weeks within each season extends the harvest further. Napa cabbage stores only 2-4 weeks; make kimchi promptly. Source: UC ANR, UC Cooperative Extension.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["brussels-sprout-variety-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Brussels Sprout Varieties for Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Four proven performers for our coastal climate</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Type</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Sprout Size</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Flavor</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best For</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Long Island Improved</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Open-pollinated</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">90-100</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">1-1.5 in.</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Classic, nutty</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Beginners, seed saving, reliable</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Jade Cross</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Hybrid</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">85-95</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Medium</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Mild</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Early harvest, some heat tolerance</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Diablo</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Hybrid</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">100-110</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Large, round</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Excellent (esp. after frost)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Commercial quality, uniform sprouts</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Gustus</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Hybrid</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">95-105</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Medium</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Very sweet, low bitterness</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Converting skeptics, best flavor</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Each plant yields 50-100 sprouts (1-3 lbs). For a family of four, grow 6-10 plants. Light frost (28-32F) converts starches to sugars and improves flavor. Source: UC Master Gardener Program.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["brussels-sprout-topping-technique"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">The Topping Technique for Brussels Sprouts</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Redirect energy from height into larger, more uniform sprouts</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; text-align: center;\">When to Top</div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Timing:</strong> 3-4 weeks before desired harvest</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>In Santa Cruz:</strong> Late September through October</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Plant should have:</strong> A well-developed stalk with small sprouts visible from bottom to top</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Plant height:</strong> 2-3 feet tall at topping time</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; text-align: center;\">How to Top</div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Cut:</strong> Remove the top 2-3 inches of the main stem with a sharp knife or pruners</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Optional:</strong> Also remove small, immature leaves just below the cut</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Signal to plant:</strong> Stop growing taller, put all energy into sprouts</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Result:</strong> Most sprouts mature at roughly the same time, larger and more uniform</p>\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 20px; padding: 15px; background-color: #dde2d8 !important;\">\n            <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px 0; font-weight: 600;\">When NOT to top:</p>\n            <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\">If you prefer harvesting sprouts over a long period (picking lower ones first, letting upper ones keep developing), skip topping. Topping produces a big, simultaneous harvest. Not topping gives you a slow, steady supply over months. Both approaches work well in Santa Cruz County.</p>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        The UC Master Gardener Handbook recommends topping for \"larger, more uniform sprouts.\" It is standard practice in commercial production on the Central Coast.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["broccoli-rabe-growing-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Broccoli Rabe: Quick-Reference Growing Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">A fast, cool-season crop for Santa Cruz County (40-60 days seed to table)</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Planting Windows</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Spring:</strong> Direct-sow Feb-Mar</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Fall (best):</strong> Direct-sow Sep-Oct</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Winter (coastal):</strong> Direct-sow Nov-Dec</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">How to Plant</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Depth:</strong> 1/4 inch, direct sow only</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Spacing:</strong> 4-6 in. apart, rows 12-18 in.</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Succession:</strong> New row every 2-3 weeks</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Harvesting</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>When:</strong> Buds visible but before yellow flowers open</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>How:</strong> Cut entire plant or individual shoots</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Second cut:</strong> Leave base to regrow one more harvest</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Kitchen Tips</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Flavor:</strong> Bitter, peppery, nutty</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Tame bitterness:</strong> Blanch 60-90 sec, then saute</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Classic dish:</strong> Orecchiette with garlic, olive oil, red pepper flakes</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Not actually broccoli. Broccoli rabe (rapini) is Brassica rapa, related to turnips. Broccolini is a separate vegetable entirely. Source: UC ANR.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["brassica-greens-identification-chart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Brassica Greens at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Leaf shape, flavor, and growing habits for Santa Cruz County</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 700px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Green</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Leaf Shape</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Flavor Profile</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best Season</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best Use</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"borde
