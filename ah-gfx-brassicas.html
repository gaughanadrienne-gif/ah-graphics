xt-align: center;\">30-40</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Fall, spring</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Saute, braise, soups</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Red Giant Mustard</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Large, burgundy-red</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Moderate spice, bold</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">40-50</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Fall, winter, spring</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Salads, stir-fries</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Tatsoi</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Small, spoon-shaped rosette</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Mild, creamy</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">30-45</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Fall, winter, spring</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Salads, light saute</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Mizuna</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Feathery, deeply cut</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Mild, slightly peppery</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">30-40</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Fall, winter, spring</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Baby greens, salad mix</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Kohlrabi</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Swollen stem with leaves on top</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Mild, sweet, crisp (bulb)</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">45-60</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Spring, fall</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Raw slices, roasted, slaws</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Collards and kale are the best year-round producers in Santa Cruz County, tolerating both mild summers and cool winters. Source: UC ANR, UC Davis Dept. of Nutrition.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["brassica-greens-nutritional-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Brassica Greens: Nutritional Powerhouses</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Key nutrients per one cup cooked (% Daily Value)</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Green</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Vitamin K</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Vitamin A</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Vitamin C</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Calcium</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Collard Greens</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600;\">770%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">58%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">35%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">27%</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Turnip Greens</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600;\">662%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">61%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">66%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">20%</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Mustard Greens</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600;\">524%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">118%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">59%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">16%</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Broccoli Rabe</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600;\">256%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">43%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">16%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">11%</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Kale</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600;\">684%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">98%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">71%</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">18%</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        All brassica greens contain glucosinolates, sulfur-containing compounds studied for potential health benefits. Garden-fresh greens retain more vitamins than store-bought. Source: UC Davis Dept. of Nutrition, UC Davis Postharvest Research.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["santa-cruz-county-microclimate-zones-for-brassicas"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Santa Cruz County Brassica Growing Zones</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Three distinct microclimates with different planting adjustments</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Coastal Zone</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important;\">Santa Cruz, Capitola, Aptos, Watsonville</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">USDA Zone</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">10a-10b</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Summer Highs</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">65-75F</div>\n                        </div>\n                    </div>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Advantage:</strong> Longest planting windows. Near year-round for some crops.</p>\n                    <p style=\"font-size: 0.85rem; color: #8c9c8c !important; margin: 0;\"><strong>Challenge:</strong> Downy mildew from persistent fog moisture.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">San Lorenzo Valley</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important;\">Felton, Ben Lomond, Boulder Creek, Scotts Valley</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">USDA Zone</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">9b-10a</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Summer Highs</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">75-90F</div>\n                        </div>\n                    </div>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Advantage:</strong> Cooler nights produce excellent fall/winter flavor.</p>\n                    <p style=\"font-size: 0.85rem; color: #8c9c8c !important; margin: 0;\"><strong>Timing shift:</strong> Plant spring 1-2 weeks later, fall 1-2 weeks earlier than coastal dates.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Summit / Mountain</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important;\">Summit Road, Loma Prieta, Upper SLV</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">USDA Zone</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">9a-9b</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Summer Highs</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">70-85F</div>\n                        </div>\n                    </div>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Advantage:</strong> Cool summers are great for brassicas during warmer months.</p>\n                    <p style=\"font-size: 0.85rem; color: #8c9c8c !important; margin: 0;\"><strong>Timing shift:</strong> Plant spring 2-3 weeks later, harvest fall crops before hard freezes (mid-Nov).</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Most mature brassicas tolerate temps down to 26-28F. Brussels sprouts and kale are hardiest (low 20s). Cauliflower is least cold-tolerant (curd damage below 25F). Source: UC ANR, UC Cooperative Extension.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["two-season-brassica-planting-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Two-Season Brassica Timeline (Coastal Zone)</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Indoor start, transplant, and harvest windows for each crop</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 700px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\" rowspan=\"2\">Crop</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: center; font-weight: 600; font-size: 0.8rem; border-bottom: 1px solid #dde2d8;\" colspan=\"3\">Spring Season</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: center; font-weight: 600; font-size: 0.8rem; border-bottom: 1px solid #dde2d8;\" colspan=\"3\">Fall Season</th>\n                </tr>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 8px; text-align: center; font-size: 0.7rem;\">Seeds</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 8px; text-align: center; font-size: 0.7rem;\">Transplant</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 8px; text-align: center; font-size: 0.7rem;\">Harvest</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 8px; text-align: center; font-size: 0.7rem;\">Seeds</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 8px; text-align: center; font-size: 0.7rem;\">Transplant</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 8px; text-align: center; font-size: 0.7rem;\">Harvest</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Broccoli</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Late Dec-Jan</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Mid-Feb-Mar</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Apr-Jun</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Late Jun-Jul</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Mid-Aug-Sep</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Oct-Jan+</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Cauliflower</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Late Dec-Jan</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Late Feb-Mar</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">May-Jun</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Late Jun-Jul</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Mid-Aug-Sep</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Nov-Jan</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Cabbage</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Late Dec-Jan</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Mid-Feb-Mar</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">May-Jun</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Late Jun-Jul</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Aug-Sep</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Oct-Feb</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Napa Cabbage</td>\n                    <td style=\"padding: 8px 8px; color: #8c9c8c !important; text-align: center; font-size: 0.8rem; font-style: italic;\">Not recommended</td>\n                    <td style=\"padding: 8px 8px; color: #8c9c8c !important; text-align: center; font-size: 0.8rem;\">--</td>\n                    <td style=\"padding: 8px 8px; color: #8c9c8c !important; text-align: center; font-size: 0.8rem;\">--</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Late Jul-Aug</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Late Aug-Sep</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Oct-Nov</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Brussels Sprouts</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Mar-Apr</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Late Apr-May</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Sep-Feb</td>\n                    <td style=\"padding: 8px 8px; color: #8c9c8c !important; text-align: center; font-size: 0.8rem; font-style: italic;\" colspan=\"3\">Spring start only (90-120 day season)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Kale / Collards</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Jan-Feb</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Mar-Apr</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Ongoing</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Jul-Aug</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Aug-Sep</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Ongoing</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Kohlrabi</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Feb-Mar</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Mar-Apr</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">May-Jun</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Aug</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Sep</td>\n                    <td style=\"padding: 8px 8px; color: #1c3c2c !important; text-align: center; font-size: 0.8rem;\">Nov-Dec</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Fall is the premier brassica season in Santa Cruz County. Plants establish in warm soil, then head up as temps cool. SLV/Summit: shift spring dates 1-3 weeks later, fall dates 1-3 weeks earlier. Source: UC ANR California Master Gardener Handbook.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["seed-starting-vs-direct-sowing-decision-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Start Indoors or Direct Sow?</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">The right approach depends on the crop</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; text-align: center;\">Start Seeds Indoors</div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 12px 0; font-weight: 600;\">Best for heading brassicas:</p>\n                    <div style=\"display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;\">\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.8rem; border-radius: 3px;\">Broccoli</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.8rem; border-radius: 3px;\">Cauliflower</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.8rem; border-radius: 3px;\">Cabbage</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.8rem; border-radius: 3px;\">Brussels Sprouts</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.8rem; border-radius: 3px;\">Collards</span>\n                    </div>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Gains 4-6 weeks of growing time</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Less vulnerable to flea beetles and slugs</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Better spacing control</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\">Transplant at 4-6 true leaves</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #8c9c8c; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; text-align: center;\">Direct Sow Outdoors</div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 12px 0; font-weight: 600;\">Best for leafy and fast-growing brassicas:</p>\n                    <div style=\"display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;\">\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.8rem; border-radius: 3px;\">Broccoli Rabe</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.8rem; border-radius: 3px;\">Turnip Greens</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.8rem; border-radius: 3px;\">Mustard Greens</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.8rem; border-radius: 3px;\">Mizuna / Tatsoi</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.8rem; border-radius: 3px;\">Kohlrabi</span>\n                    </div>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">No transplant shock</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Simpler and less labor-intensive</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\">Some crops (broccoli rabe, turnips) transplant poorly</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\">Sow 1/4 to 1/2 inch deep</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        UC Master Gardener training materials note that \"most brassica crops benefit from indoor seed starting and transplanting\" because the controlled start produces stockier, more uniform plants.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["caterpillar-pest-identification-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Brassica Caterpillar Pest Identification</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Three species cause most leaf-chewing damage in Santa Cruz County</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Imported Cabbageworm</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important; font-style: italic;\">Pieris rapae</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Adult:</strong> Small white butterfly, black wing tips</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Caterpillar:</strong> Velvety green, 1 in., faint yellow stripe</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Eggs:</strong> Tiny, pale yellow, bullet-shaped, single</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Damage:</strong> Large irregular holes, dark green frass</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Peak:</strong> Apr-Jun, Sep-Oct (most common species)</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Cabbage Looper</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important; font-style: italic;\">Trichoplusia ni</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Adult:</strong> Mottled brown moth, silvery figure-8 mark (nocturnal)</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Caterpillar:</strong> Green, white stripes, 1.5 in., loops when moving</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Eggs:</strong> Round, pale green, single on leaf undersides</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Damage:</strong> Large ragged holes, more voracious than cabbageworm</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Peak:</strong> Late summer, early fall</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Diamondback Moth</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important; font-style: italic;\">Plutella xylostella</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Adult:</strong> Small gray-brown moth, diamond pattern on back</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Caterpillar:</strong> Pale green, 1/3 in., wriggles when touched</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Eggs:</strong> Tiny, on leaf undersides</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Damage:</strong> Small round \"windowpane\" holes (eats one leaf surface)</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Peak:</strong> May-Oct (less common in foggy areas)</p>\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 20px; padding: 15px; background-color: #dde2d8 !important;\">\n            <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px 0; font-weight: 600;\">All three respond to the same organic controls:</p>\n            <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n                <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 6px 12px; font-size: 0.8rem; border-radius: 3px;\">Row covers at transplanting (best prevention)</span>\n                <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 6px 12px; font-size: 0.8rem; border-radius: 3px;\">Bt spray (targets caterpillars only)</span>\n                <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 6px 12px; font-size: 0.8rem; border-radius: 3px;\">Hand-picking eggs and caterpillars</span>\n                <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 6px 12px; font-size: 0.8rem; border-radius: 3px;\">Parasitic wasp habitat (sweet alyssum, yarrow)</span>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC IPM Pest Management Guidelines for Cole Crops. Bt is classified as one of the lowest-risk pesticides and is approved for organic production.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["flea-beetle-damage-identification"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Flea Beetle Identification and Control</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Tiny beetles, distinctive damage pattern, manageable with prevention</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Identification</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Size:</strong> 1/16 to 1/8 inch (tiny)</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Color:</strong> Dark, shiny</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Behavior:</strong> Jump like fleas when disturbed</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Species:</strong> Crucifer flea beetle, striped flea beetle</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Damage Pattern</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Signature:</strong> Small, round holes creating a \"shotgun\" or \"sieve\" pattern</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Targets:</strong> Primarily seedlings and young transplants</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Severity:</strong> Can stunt or kill small plants; mature plants tolerate moderate damage</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Peak:</strong> Mar-May, declines in foggy summer</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Organic Controls</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Row covers:</strong> Most effective. Cover at transplanting.</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Delay transplanting:</strong> Larger plants outgrow damage.</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Trap crops:</strong> Sacrificial radishes or mustard greens nearby.</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Kaolin clay:</strong> Physical barrier spray. Reapply after rain.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC IPM. Diatomaceous earth loses effectiveness in our moist, foggy climate. Row covers are the most reliable prevention for coastal Santa Cruz County gardens.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["brassica-disease-identification-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Brassica Disease Identification Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Know what you are looking at to choose the right response</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Clubroot</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important; font-style: italic;\">Plasmodiophora brassicae</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Symptoms:</strong> Swollen, club-shaped root galls. Above ground: wilting in warm weather despite moist soil, stunted growth.</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 12px 0;\"><strong>Conditions:</strong> Acidic soil (pH below 7.0), moist conditions. Spores persist 10-20 years.</p>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 10px;\">\n                        <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Prevention checklist:</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 4px 0 0 0;\">Raise pH to 7.2+ with lime</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 2px 0 0 0;\">4-year brassica rotation minimum</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 2px 0 0 0;\">Improve drainage (raised beds help)</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 2px 0 0 0;\">Destroy infected plants (do NOT compost)</p>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Black Rot</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important; font-style: italic;\">Xanthomonas campestris</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Symptoms:</strong> V-shaped yellow lesions starting at leaf edges. Veins within the V turn black. Tissue dries and becomes papery.</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 12px 0;\"><strong>Conditions:</strong> Spread by splashing water, contaminated tools, and infected seed.</p>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 10px;\">\n                        <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Prevention checklist:</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 4px 0 0 0;\">Use disease-free or hot-water treated seed</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 2px 0 0 0;\">Drip irrigation only (no overhead)</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 2px 0 0 0;\">Sanitize tools with 10% bleach</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 2px 0 0 0;\">Remove infected plants immediately</p>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Downy Mildew</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important; font-style: italic;\">Hyaloperonospora parasitica</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Symptoms:</strong> Yellow/pale green patches on leaf tops. Gray-purple fuzzy growth on leaf undersides.</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 12px 0;\"><strong>Conditions:</strong> 50-60F, high humidity. Most common brassica disease in our fog belt.</p>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 10px;\">\n                        <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Prevention checklist:</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 4px 0 0 0;\">Proper spacing for air circulation</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 2px 0 0 0;\">Drip irrigation (keep foliage dry)</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 2px 0 0 0;\">Choose resistant varieties (Belstar broccoli)</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 2px 0 0 0;\">Remove infected leaves promptly</p>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Alternaria Leaf Spot</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0 0; color: #dde2d8 !important; font-style: italic;\">Alternaria brassicicola</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Symptoms:</strong> Round, dark brown-black spots with concentric rings (\"target\" pattern). Spots may merge.</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 12px 0;\"><strong>Conditions:</strong> Warm, humid weather. Most common late summer and early fall when fog meets warmth.</p>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 10px;\">\n                        <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Prevention checklist:</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 4px 0 0 0;\">Remove and destroy infected leaves</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 2px 0 0 0;\">Avoid overhead watering</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 2px 0 0 0;\">2-3 year crop rotation</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 2px 0 0 0;\">Use hot-water treated seed</p>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC IPM Program, UC ANR Plant Pathology. Prevention through rotation, drip irrigation, and soil pH management addresses the majority of brassica disease problems in our area.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

</script>
