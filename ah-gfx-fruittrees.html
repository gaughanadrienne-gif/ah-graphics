window.AH_GRAPHICS["chill-hours-by-santa-cruz-county-microclimate"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Chill Hours by Santa Cruz County Microclimate</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Annual winter chill accumulation (hours between 32-45F)</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <p style=\"text-align: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 2px dashed #dde2d8; font-size: 0.9rem; line-height: 1.6; color: #1c3c2c !important;\">Chill hours determine which fruit tree varieties will produce reliably in your location.</p>\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"display: grid; grid-template-columns: 1fr 120px 1fr; align-items: center; gap: 15px; padding: 16px 20px; background-color: #fff !important; border-radius: 8px; border-left: 5px solid #5b8a72;\">\n                <div>\n                    <div style=\"font-weight: 600; font-size: 1rem; color: #1a3b2a !important;\">Coastal</div>\n                    <div style=\"font-size: 0.8rem; color: #8c9c8c !important; margin-top: 4px;\">Aptos, Capitola, Live Oak, Westside SC</div>\n                </div>\n                <div style=\"text-align: center;\">\n                    <div style=\"font-size: 1.3rem; font-weight: 700; color: #1a3b2a !important;\">200-400</div>\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">chill hours</div>\n                </div>\n                <div style=\"text-align: right;\">\n                    <span style=\"display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background-color: #dde2d8 !important; color: #1a3b2a !important; margin: 2px;\">Low-chill only</span>\n                </div>\n            </div>\n            <div style=\"display: grid; grid-template-columns: 1fr 120px 1fr; align-items: center; gap: 15px; padding: 16px 20px; background-color: #fff !important; border-radius: 8px; border-left: 5px solid #8c9c8c;\">\n                <div>\n                    <div style=\"font-weight: 600; font-size: 1rem; color: #1a3b2a !important;\">Inland Valleys</div>\n                    <div style=\"font-size: 0.8rem; color: #8c9c8c !important; margin-top: 4px;\">Scotts Valley, Soquel, inland SC</div>\n                </div>\n                <div style=\"text-align: center;\">\n                    <div style=\"font-size: 1.3rem; font-weight: 700; color: #1a3b2a !important;\">400-600</div>\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">chill hours</div>\n                </div>\n                <div style=\"text-align: right;\">\n                    <span style=\"display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background-color: #dde2d8 !important; color: #1a3b2a !important; margin: 2px;\">Low-chill</span>\n                    <span style=\"display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background-color: #8c9c8c !important; color: #fff !important; margin: 2px;\">Moderate-chill</span>\n                </div>\n            </div>\n            <div style=\"display: grid; grid-template-columns: 1fr 120px 1fr; align-items: center; gap: 15px; padding: 16px 20px; background-color: #fff !important; border-radius: 8px; border-left: 5px solid #8c9c8c;\">\n                <div>\n                    <div style=\"font-weight: 600; font-size: 1rem; color: #1a3b2a !important;\">Pajaro Valley</div>\n                    <div style=\"font-size: 0.8rem; color: #8c9c8c !important; margin-top: 4px;\">Watsonville, Freedom, Corralitos</div>\n                </div>\n                <div style=\"text-align: center;\">\n                    <div style=\"font-size: 1.3rem; font-weight: 700; color: #1a3b2a !important;\">300-500</div>\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">chill hours</div>\n                </div>\n                <div style=\"text-align: right;\">\n                    <span style=\"display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background-color: #dde2d8 !important; color: #1a3b2a !important; margin: 2px;\">Low-chill</span>\n                    <span style=\"display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background-color: #8c9c8c !important; color: #fff !important; margin: 2px;\">Some moderate</span>\n                </div>\n            </div>\n            <div style=\"display: grid; grid-template-columns: 1fr 120px 1fr; align-items: center; gap: 15px; padding: 16px 20px; background-color: #fff !important; border-radius: 8px; border-left: 5px solid #1a3b2a;\">\n                <div>\n                    <div style=\"font-weight: 600; font-size: 1rem; color: #1a3b2a !important;\">San Lorenzo Valley (Sunny)</div>\n                    <div style=\"font-size: 0.8rem; color: #8c9c8c !important; margin-top: 4px;\">Boulder Creek, Ben Lomond ridges</div>\n                </div>\n                <div style=\"text-align: center;\">\n                    <div style=\"font-size: 1.3rem; font-weight: 700; color: #1a3b2a !important;\">600-800+</div>\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">chill hours</div>\n                </div>\n                <div style=\"text-align: right;\">\n                    <span style=\"display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background-color: #8c9c8c !important; color: #fff !important; margin: 2px;\">Moderate-chill</span>\n                    <span style=\"display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background-color: #1a3b2a !important; color: #f8f9f0 !important; margin: 2px;\">Some high-chill</span>\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 25px; padding-top: 20px; border-top: 2px dashed #dde2d8;\">\n            <div style=\"font-weight: 600; font-size: 0.9rem; margin-bottom: 12px; color: #1a3b2a !important;\">Variety Categories</div>\n            <div style=\"display: flex; flex-wrap: wrap; gap: 20px;\">\n                <div style=\"display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #1c3c2c !important;\">\n                    <span style=\"width: 12px; height: 12px; border-radius: 50%; background-color: #dde2d8 !important; border: 1px solid #8c9c8c; display: inline-block;\"></span>\n                    Low-chill: Under 400 hours\n                </div>\n                <div style=\"display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #1c3c2c !important;\">\n                    <span style=\"width: 12px; height: 12px; border-radius: 50%; background-color: #8c9c8c !important; display: inline-block;\"></span>\n                    Moderate-chill: 400-700 hours\n                </div>\n                <div style=\"display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #1c3c2c !important;\">\n                    <span style=\"width: 12px; height: 12px; border-radius: 50%; background-color: #1a3b2a !important; display: inline-block;\"></span>\n                    High-chill: 700+ hours\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"text-align: center; padding: 15px; font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["apple-pollination-compatibility-chart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Apple Pollination Compatibility</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Recommended variety pairings for Santa Cruz County</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <p style=\"text-align: center; margin-bottom: 20px; font-size: 0.9rem; color: #1c3c2c !important;\">Most apple varieties need pollen from a different variety to produce fruit. Plant at least two compatible varieties within 50 feet of each other.</p>\n        <div style=\"overflow-x: auto;\">\n            <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n                <thead>\n                    <tr>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Variety</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Chill Hours</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Good Pollinators</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Notes</th>\n                    </tr>\n                </thead>\n                <tbody>\n                    <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Anna</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">200-300</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Dorsett Golden, Ein Shemer</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Best low-chill option for coastal gardens</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Dorsett Golden</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">100-200</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Anna, Ein Shemer</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Lowest chill requirement of any apple</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fuji</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">400-500</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Gala, Granny Smith</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Inland valleys only. Sweet, long storage.</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Gala</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">400-500</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fuji, Granny Smith</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Good producer in moderate-chill areas</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Gravenstein</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">700+</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fuji, Gala (triploid: needs 2 others)</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">SLV mountains only. Local heirloom favorite.</td>\n                    </tr>\n                    <tr>\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Pink Lady</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">400-500</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fuji, Gala, Granny Smith</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late season, excellent flavor, stores well</td>\n                    </tr>\n                </tbody>\n            </table>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Multi-graft trees (2-3 varieties on one rootstock) solve pollination and space issues. Ask local nurseries.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["stone-fruit-disease-prevention-calendar"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Stone Fruit Disease Prevention Calendar</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Key spray and care timings for Santa Cruz County</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">When</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Action</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Targets</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Details</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Late Nov - Dec</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Dormant spray #1</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Peach leaf curl, scale, mites</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Copper fungicide + horticultural oil after leaf drop</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Jan - Feb</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Dormant spray #2</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Peach leaf curl (critical)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Before bud swell. This is the most important spray.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Feb - Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Blossom spray</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Brown rot</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">If wet weather during bloom. Organic: Serenade.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Apr - May</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Thin fruit</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Overcrowding, brown rot prevention</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Space fruit 4-6 inches apart. Improves size and reduces disease.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Summer</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Monitor and harvest</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Brown rot, birds, wasps</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Pick fruit promptly. Remove any rotting fruit immediately.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fall</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Clean up</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Overwintering pests/disease</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Rake and remove all fallen fruit and leaves. Compost or dispose.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Santa Cruz coastal fog increases disease pressure. Dormant sprays are essential, not optional, for peaches and nectarines.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["stone-fruit-thinning-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">When and How to Thin Stone Fruit</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Better fruit through less fruit</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"overflow-x: auto;\">\n            <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n                <thead>\n                    <tr>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Fruit</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">When to Thin</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Spacing</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Why It Matters</th>\n                    </tr>\n                </thead>\n                <tbody>\n                    <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Peaches</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">When marble-sized (4-6 weeks after bloom)</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">6-8 inches apart</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Prevents branch breakage, larger fruit, less brown rot</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Nectarines</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">When marble-sized</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">6-8 inches apart</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Same as peaches. Nectarines are even more disease-prone when crowded.</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Plums</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">When marble-sized</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">4-6 inches apart</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Japanese plums set heavily. Without thinning, fruit is small and bland.</td>\n                    </tr>\n                    <tr>\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Apricots</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">When marble-sized</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">3-4 inches apart</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Less aggressive thinning needed. Remove doubles and damaged fruit.</td>\n                    </tr>\n                </tbody>\n            </table>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0 25px 25px 25px; border-radius: 6px;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">It feels wrong, but do it anyway.</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Removing 60-80% of tiny fruit is normal. The remaining fruit will be dramatically larger, sweeter, and less disease-prone.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["fig-varieties-by-microclimate"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Fig Varieties for Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Matched to your microclimate</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Fruit</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Coastal</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Inland</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">SLV</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Notes</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n ight: 600;\">OK</td>\n                    <td style=\"padding: 10px 12px; color: #2e7d32 !important; text-align: center; font-weight: 600;\">Yes</td>\n                    <td style=\"padding: 10px 12px; color: #f57c00 !important; text-align: center; font-weight: 600;\">Sun</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Needs more heat. Great for preserving.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">White Genoa</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Green, very sweet</td>\n                    <td style=\"padding: 10px 12px; color: #2e7d32 !important; text-align: center; font-weight: 600;\">Yes</td>\n                    <td style=\"padding: 10px 12px; color: #2e7d32 !important; text-align: center; font-weight: 600;\">Yes</td>\n                    <td style=\"padding: 10px 12px; color: #2e7d32 !important; text-align: center; font-weight: 600;\">Yes</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Excellent coastal variety. Breba crop reliable.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Desert King</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Green, rich</td>\n                    <td style=\"padding: 10px 12px; color: #2e7d32 !important; text-align: center; font-weight: 600;\">Yes</td>\n                    <td style=\"padding: 10px 12px; color: #2e7d32 !important; text-align: center; font-weight: 600;\">Yes</td>\n                    <td style=\"padding: 10px 12px; color: #2e7d32 !important; text-align: center; font-weight: 600;\">Yes</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Breba-only. One big early crop, no main crop.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Figs need NO chill hours. They succeed everywhere in Santa Cruz County with full sun.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["fruit-tree-troubleshooting-flowchart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Why Won't My Fruit Tree Produce?</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Start with your symptom to find the cause</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 15px;\">\n            <div style=\"background-color: #fff !important; border-left: 5px solid #1a3b2a; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px; font-size: 1rem;\">No flowers at all?</div>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Too young:</strong> Most fruit trees need 3-5 years before first fruit. Patience!</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Too much nitrogen:</strong> Excess fertilizer (especially lawn fertilizer nearby) pushes leaf growth over flowers.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Not enough chill hours:</strong> Tree never got the cold signal to trigger blooming. Wrong variety for your microclimate.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8c9c8c; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px; font-size: 1rem;\">Flowers but no fruit?</div>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>No pollinator:</strong> Many fruit trees need a second variety for cross-pollination. Check compatibility.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Frost damage:</strong> Late frost killed blossoms. Common in SLV frost pockets.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Rain during bloom:</strong> Heavy rain washes away pollen and prevents bee activity.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #dde2d8; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px; font-size: 1rem;\">Fruit drops before ripening?</div>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Natural June drop:</strong> Normal! Trees shed excess fruit they can't support. Not a problem.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Water stress:</strong> Inconsistent watering during fruit development. Especially common in dry summers.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Pest damage:</strong> Codling moth (apples) or other pests. Check dropped fruit for tunnels or damage.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #c0392b; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px; font-size: 1rem;\">Fruit but poor quality?</div>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Too much fruit:</strong> Didn't thin. Small, bland fruit with weak flavor. Thin next year!</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Not enough sun:</strong> Fruit trees need 6-8 hours direct sun minimum for good flavor.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Disease:</strong> Brown rot, scab, or mildew affecting fruit. Review spray schedule.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

</script>
