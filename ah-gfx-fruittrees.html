window.AH_GRAPHICS["growing-stone-fruit-santa-cruz-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Stone Fruit Disease Prevention Calendar</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Key spray and care timings for Santa Cruz County</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">When</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Action</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Targets</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Details</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Late Nov - Dec</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Dormant spray #1</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Peach leaf curl, scale, mites</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Copper fungicide + horticultural oil after leaf drop</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Jan - Feb</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Dormant spray #2</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Peach leaf curl (critical)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Before bud swell. This is the most important spray.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Feb - Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Blossom spray</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Brown rot</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">If wet weather during bloom. Organic: Serenade.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Apr - May</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Thin fruit</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Overcrowding, brown rot prevention</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Space fruit 4-6 inches apart. Improves size and reduces disease.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Summer</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Monitor and harvest</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Brown rot, birds, wasps</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Pick fruit promptly. Remove any rotting fruit immediately.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fall</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Clean up</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Overwintering pests/disease</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Rake and remove all fallen fruit and leaves. Compost or dispose.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Santa Cruz coastal fog increases disease pressure. Dormant sprays are essential, not optional, for peaches and nectarines.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["growing-stone-fruit-santa-cruz-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">When and How to Thin Stone Fruit</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Better fruit through less fruit</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"overflow-x: auto;\">\n            <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n                <thead>\n                    <tr>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Fruit</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">When to Thin</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Spacing</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Why It Matters</th>\n                    </tr>\n                </thead>\n                <tbody>\n                    <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Peaches</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">When marble-sized (4-6 weeks after bloom)</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">6-8 inches apart</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Prevents branch breakage, larger fruit, less brown rot</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Nectarines</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">When marble-sized</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">6-8 inches apart</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Same as peaches. Nectarines are even more disease-prone when crowded.</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Plums</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">When marble-sized</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">4-6 inches apart</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Japanese plums set heavily. Without thinning, fruit is small and bland.</td>\n                    </tr>\n                    <tr>\n                        <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Apricots</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">When marble-sized</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">3-4 inches apart</td>\n                        <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Less aggressive thinning needed. Remove doubles and damaged fruit.</td>\n                    </tr>\n                </tbody>\n            </table>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0 25px 25px 25px; border-radius: 6px;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">It feels wrong, but do it anyway.</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Removing 60-80% of tiny fruit is normal. The remaining fruit will be dramatically larger, sweeter, and less disease-prone.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["bare-root-fruit-tree-guide-bay-area-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Bare Root vs. Potted Trees\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Feature</th>\n        <th scope=\"col\">Bare Root Tree</th>\n        <th scope=\"col\">Potted Tree</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Cost</th>\n        <td>Typically lower purchase price</td>\n        <td>Higher</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Root establishment</th>\n        <td>Grows directly into native soil; strong, wide root system</td>\n        <td>Higher risk of circling roots or pot-bound issues if not corrected</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Planting window</th>\n        <td>Dormant season (December through March)</td>\n        <td>Almost any time with consistent irrigation</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["bare-root-fruit-tree-guide-bay-area-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Bare-Root Tree Season Timing</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Bare-root fruit tree season timing\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Timing</th>\n        <th scope=\"col\">What\u2019s Happening</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Late December</th>\n        <td>\n          First bare-root stock arrives at nurseries; typically the best selection\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">January</th>\n        <td>\n          Prime shopping and planting month with the widest variety available\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">February</th>\n        <td>\n          Still a good selection; planting conditions remain ideal in most areas\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Early March</th>\n        <td>\n          Season winding down; remaining stock may be limited or picked over\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Mid-March onward</th>\n        <td>\n          Trees begin breaking dormancy; generally too late for bare-root planting\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["bare-root-fruit-tree-guide-bay-area-g3"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Chill Hours by Fruit Type\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Fruit Type</th>\n        <th scope=\"col\">Typical Chill Band</th>\n        <th scope=\"col\">Notes for Santa Cruz and Bay Area</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Figs, pomegranates, persimmons</th>\n        <td>Often under 300 hours</td>\n        <td>Very reliable in coastal and Banana Belt zones</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Peaches and nectarines</th>\n        <td>Many between 300\u2013700 hours</td>\n        <td>Choose low- to mid-chill varieties for coast; mid-chill for SLV ridges and Pajaro</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Apricots</th>\n        <td>Often 300\u2013800 hours</td>\n        <td>Best in well-drained, slightly warmer inland and foothill sites</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Apples and pears</th>\n        <td>300\u2013900+ hours, depending on cultivar</td>\n        <td>Choose low- to mid-chill types for coast; more options inland</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Citrus</th>\n        <td>No chill requirement</td>\n        <td>Focus on frost protection and microclimate, not chill hours</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["bare-root-fruit-tree-guide-bay-area-g4"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Chill Hours by Santa Cruz Microclimate\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Microclimate</th>\n        <th scope=\"col\">Chill Hour Tendencies</th>\n        <th scope=\"col\">Best Fruit Choices</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Foggy coast (Aptos, Capitola)</th>\n        <td>Lower chill accumulation</td>\n        <td>Favor low- and mid-chill varieties: figs, pomegranates, persimmons, low-chill peaches</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Banana Belt and Santa Cruz city</th>\n        <td>Moderate chill</td>\n        <td>Wide variety of 300\u2013700 hour trees</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">SLV ridges and inland valleys</th>\n        <td>Often enough chill for most varieties</td>\n        <td>Most 500\u2013800 hour varieties work well</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["bare-root-fruit-tree-guide-bay-area-g5"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">First 90 Days Checklist</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"First 90 days after planting checklist\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Timeframe</th>\n        <th scope=\"col\">Priority Tasks</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Week 1</th>\n        <td>\n          Check soil moisture every few days; water if soil is dry about 2 inches\n          below the surface\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Weeks 2 to 4</th>\n        <td>\n          Water deeply once or twice weekly during dry weather; monitor and\n          maintain mulch coverage\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Month 2</th>\n        <td>\n          Watch for new bud growth; continue consistent, deep watering\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Month 3</th>\n        <td>\n          Visible growth should be present; reduce watering slightly if weather\n          cools or rains increase\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["bare-root-vs-container-fruit-trees-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Bare-Root vs. Container Fruit Trees: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Bare-Root</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Container</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Cost</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$25-45 typically</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$45-80+ typically</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Planting Window</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Dec-Feb only (dormant season)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Year-round</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Variety Selection</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Excellent; dozens of varieties</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Limited to what nurseries stock</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Root Establishment</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Roots grow outward naturally</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Risk of circling roots</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Transplant Shock</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Minimal (planted while dormant)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Possible, especially in hot weather</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Beginner Friendly</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Moderate; must plant promptly</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Very; plant whenever ready</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["california-fruit-trees-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Approximate Chill Hours by Santa Cruz County Location</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Approximate winter chill hours by Santa Cruz County location\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Location</th>\n        <th scope=\"col\">Approximate Chill Hours</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Coastal (Aptos, Capitola, Santa Cruz beaches)</th>\n        <td>200 to 400 hours</td>\n        <td>\n          Mildest winters; focus on very low-chill fruit and nut varieties\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">San Lorenzo Valley (Boulder Creek, Ben Lomond, Felton)</th>\n        <td>400 to 700+ hours</td>\n        <td>\n          Cooler winter nights in valleys; supports a wider range of varieties\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Inland (Scotts Valley, Soquel hills)</th>\n        <td>300 to 500 hours</td>\n        <td>\n          Moderate chill; generally a good balance for many low- to mid-chill trees\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Pajaro Valley (Watsonville)</th>\n        <td>300 to 500 hours</td>\n        <td>\n          Warmer daytime temperatures but adequate winter chill in most years\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["california-fruit-trees-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Citrus by Santa Cruz Microclimate</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Citrus varieties suited to Santa Cruz County microclimates\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Location</th>\n        <th scope=\"col\">Best Citrus Choices</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Coastal (foggy, cool)</th>\n        <td>Meyer lemon, Satsuma mandarin, kumquats</td>\n        <td>\n          Choose cold-tolerant varieties; provide wind protection and full sun\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">San Lorenzo Valley</th>\n        <td>Meyer lemon, Satsuma mandarin, navel oranges in sunny spots</td>\n        <td>\n          Frost protection may be needed on the coldest winter nights\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Inland (Scotts Valley, Soquel)</th>\n        <td>Wide range including oranges and grapefruits</td>\n        <td>\n          Often the best citrus-growing areas in the county\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Pajaro Valley</th>\n        <td>Most citrus varieties</td>\n        <td>\n          Warm valley conditions suit even heat-loving citrus types\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["california-fruit-trees-g3"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Low-Chill Stone Fruit Varieties</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Low-chill stone fruit varieties for Santa Cruz County\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Variety</th>\n        <th scope=\"col\">Type</th>\n        <th scope=\"col\">Chill Hours</th>\n        <th scope=\"col\">Best For</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Flordaprince</th>\n        <td>Peach</td>\n        <td>~150 hours</td>\n        <td>All Santa Cruz microclimates; very early ripening</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Eva\u2019s Pride</th>\n        <td>Peach</td>\n        <td>100 to 200 hours</td>\n        <td>All areas; excellent flavor, mid-season</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Tropic Snow</th>\n        <td>Peach</td>\n        <td>200 hours</td>\n        <td>White-fleshed, sweet; suitable from coastal to inland areas</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Babcock</th>\n        <td>Peach</td>\n        <td>250 to 300 hours</td>\n        <td>White peach with excellent flavor; best for inland areas</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Panamint</th>\n        <td>Nectarine</td>\n        <td>200 to 250 hours</td>\n        <td>Very low-chill; freestone with excellent flavor</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Arctic Star</th>\n        <td>Nectarine</td>\n        <td>300 hours</td>\n        <td>White-fleshed nectarine; best for inland locations</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Santa Rosa</th>\n        <td>Plum</td>\n        <td>300 hours</td>\n        <td>Classic California plum; well-suited to inland gardens</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Beauty</th>\n        <td>Plum</td>\n        <td>250 hours</td>\n        <td>Very early ripening; performs well across most areas</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Burgundy</th>\n        <td>Plum</td>\n        <td>250 to 300 hours</td>\n        <td>Self-fertile; good tolerance of coastal conditions</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Gold Kist</th>\n        <td>Apricot</td>\n        <td>300 hours</td>\n        <td>One of the lowest-chill apricots available</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Katy</th>\n        <td>Apricot</td>\n        <td>200 to 300 hours</td>\n        <td>Freestone; very low-chill and reliable in mild winters</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["california-fruit-trees-g4"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Low-Chill Apple Varieties</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Low-chill apple varieties for Santa Cruz County\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Variety</th>\n        <th scope=\"col\">Chill Hours</th>\n        <th scope=\"col\">Flavor Profile</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Dorsett Golden</th>\n        <td>~100 hours</td>\n        <td>Sweet, golden; similar to Golden Delicious</td>\n        <td>\n          One of the lowest-chill apples available; reliable across Santa Cruz County\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Anna</th>\n        <td>~200 hours</td>\n        <td>Sweet-tart, crisp</td>\n        <td>\n          Pollinates well with Dorsett Golden; dependable low-chill choice\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Ein Shemer</th>\n        <td>~100 hours</td>\n        <td>Sweet; Golden Delicious-type flavor</td>\n        <td>\n          Israeli variety bred for very low chill requirements\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Pink Lady (Cripps Pink)</th>\n        <td>300 to 400 hours</td>\n        <td>Sweet-tart; excellent keeping quality</td>\n        <td>\n          Requires more winter chill; best suited to inland areas with cooler winters\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Fuji</th>\n        <td>300 to 400 hours</td>\n        <td>Very sweet, crisp</td>\n        <td>\n          May perform well in cooler inland microclimates with sufficient chill\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["california-fruit-trees-g5"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Fruit Tree Size Categories at a Glance</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Fruit tree size categories and spacing\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Size Category</th>\n        <th scope=\"col\">Typical Height</th>\n        <th scope=\"col\">Spacing Needed</th>\n        <th scope=\"col\">Best For</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Dwarf</th>\n        <td>6 to 10 feet</td>\n        <td>6 to 8 feet apart</td>\n        <td>Small yards, containers, espalier</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Semi-dwarf</th>\n        <td>10 to 16 feet</td>\n        <td>10 to 14 feet apart</td>\n        <td>Most home gardens</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Standard</th>\n        <td>18 to 30 feet</td>\n        <td>15 to 25 feet apart</td>\n        <td>Large properties, shade trees</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["california-fruit-trees-g6"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Planting Checklist</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Fruit tree planting checklist\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Step</th>\n        <th scope=\"col\">Key Actions</th>\n        <th scope=\"col\">Why It Matters</th>\n        <th scope=\"col\">Timing</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Planting time</th>\n        <td>\n          Plant bare-root deciduous trees during winter dormancy (December through February);\n          plant citrus and container-grown trees in mild spring or fall\n        </td>\n        <td>\n          Reduces transplant stress and aligns planting with natural growth cycles\n        </td>\n        <td>\n          Winter for bare-root trees; spring or fall for citrus and container trees\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Hole preparation</th>\n        <td>\n          Dig a hole twice as wide as the root system but no deeper than the root flare;\n          keep the graft union above soil level\n        </td>\n        <td>\n          Prevents soil settling, poor drainage, and crown or graft rot\n        </td>\n        <td>\n          At planting\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Backfilling</th>\n        <td>\n          Use mostly native soil; a light compost amendment is acceptable\n        </td>\n        <td>\n          Over-amending can create drainage and root establishment problems\n        </td>\n        <td>\n          Immediately after setting the tree\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Water and mulch</th>\n        <td>\n          Water deeply to settle soil; build a shallow basin for irrigation; apply\n          3 to 6 inches of mulch, keeping it several inches away from the trunk\n        </td>\n        <td>\n          Encourages deep root growth, conserves moisture, and protects soil structure\n        </td>\n        <td>\n          Immediately after planting; maintain mulch year-round\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["grafted-vs-own-root-fruit-trees-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Grafted vs. Own-Root Fruit Trees: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Grafted</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Own-Root</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Time to Fruit</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">2-4 years after planting</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">4-8 years (seedlings even longer)</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Size Control</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Dwarf to semi-dwarf options available</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Full-size tree; harder to manage</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Disease Resistance</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Rootstock adds soil disease protection</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Depends entirely on the variety</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Lifespan</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">20-50+ years depending on rootstock</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">50-100+ years for many species</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Cost</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$30-60 at nurseries</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Free (from cuttings) to $30+</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Santa Cruz Fit</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Best for apples, citrus, stone fruit</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Great for figs, pomegranates, olives</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["grafting-fruit-trees-in-santa-cruz-county-add-varieties-save-trees-and-grow-your-own-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Rootstock Compatibility at a Glance\n  </div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Fruit tree rootstock and scion compatibility\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Rootstock Genus / Type</th>\n        <th scope=\"col\">Generally Compatible Scions</th>\n        <th scope=\"col\">Important Notes</th>\n        <th scope=\"col\">Supporting Resources</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Apple (Malus)</th>\n        <td>Any apple variety</td>\n        <td>\n          Most named apples are mutually compatible. Apples cannot be grafted onto pear\n          or other genera.\n        </td>\n        <td>\n          UNH Extension  - \n          <a href=\"https://extension.unh.edu/resource/grafting-fruit-trees-home-orchard-fact-sheet\" target=\"_blank\" rel=\"noopener\">\n            Grafting Fruit Trees in the Home Orchard\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Pear (Pyrus)</th>\n        <td>European and Asian pears</td>\n        <td>\n          Apple\u2013pear grafts fail. Some pears can be grafted onto quince, but others require\n          an interstem.\n        </td>\n        <td>\n          UNH Extension grafting fact sheet; Orchard People on pear\u2013quince compatibility\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Quince (Cydonia)</th>\n        <td>Some pears, quince, loquat</td>\n        <td>\n          Compatibility is variety-specific. Interstems are needed for incompatible pears\n          such as Bartlett and Bosc.\n        </td>\n        <td>\n          Orchard People  - \n          <a href=\"https://orchardpeople.com/pear-on-quince-rootstock/\" target=\"_blank\" rel=\"noopener\">\n            Pear on Quince Compatibility\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Stone fruits (Prunus)</th>\n        <td>Peach, nectarine, plum, apricot; some cherry combinations</td>\n        <td>\n          Many Prunus species are intergraftable. Cherries are more particular; always\n          check recommended rootstocks for each species.\n        </td>\n        <td>\n          NPR  - \n          <a href=\"https://www.npr.org/sections/thesalt/2015/08/03/428867337/a-tree-that-grows-40-different-fruits\" target=\"_blank\" rel=\"noopener\">\n            Tree of 40 Fruit\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Citrus (Citrus)</th>\n        <td>Most citrus varieties</td>\n        <td>\n          Many citrus cultivars are mutually compatible. Be aware of patent restrictions\n          on newer varieties.\n        </td>\n        <td>\n          Citrus grafting practice consistent with UNH\u2019s \u201cgrafting within genus\u201d guidance\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["grafting-fruit-trees-in-santa-cruz-county-add-varieties-save-trees-and-grow-your-own-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Common Fruit Tree Grafting Techniques and Timing (Santa Cruz County)\n  </div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Fruit tree grafting techniques, timing, and notes\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Technique</th>\n        <th scope=\"col\">Best Timing (Local)</th>\n        <th scope=\"col\">Tree State</th>\n        <th scope=\"col\">Notes</th>\n        <th scope=\"col\">Supporting Resources</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Whip and tongue</th>\n        <td>Late January through early April</td>\n        <td>Scion dormant; rootstock dormant or just breaking</td>\n        <td>\n          Classic dormant graft on pencil-thick wood; excellent for bench grafting and\n          small branches with closely matched diameters.\n        </td>\n        <td>\n          UNH Extension  - \n          <a href=\"https://extension.unh.edu/resource/grafting-fruit-trees-home-orchard-fact-sheet\" target=\"_blank\" rel=\"noopener\">\n            Grafting Fruit Trees in the Home Orchard\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Cleft graft</th>\n        <td>February through April</td>\n        <td>Rootstock just beginning to grow</td>\n        <td>\n          Ideal for top-working 1\u20134 inch branches; one or two scions are inserted into a\n          split stock.\n        </td>\n        <td>\n          Mississippi State Extension  - \n          <a href=\"https://extension.msstate.edu/publications/basic-grafting-techniques\" target=\"_blank\" rel=\"noopener\">\n            Basic Grafting Techniques\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Bark (inlay) graft</th>\n        <td>March through April</td>\n        <td>Bark \u201cslipping\u201d on actively growing stock</td>\n        <td>\n          Used on larger stumps or limbs when bark lifts cleanly from wood; not suitable\n          once bark tightens.\n        </td>\n        <td>\n          UNH Extension and general bark-grafting references\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">T-budding</th>\n        <td>July through August</td>\n        <td>Active growth; bark slipping</td>\n        <td>\n          Summer technique; bud heals over the season and pushes growth the following\n          spring.\n        </td>\n        <td>\n          Cummins Nursery  - \n          <a href=\"https://www.cumminsnursery.com/learn/how-to-summer-bud-a-tree/\" target=\"_blank\" rel=\"noopener\">\n            How to Summer Bud a Tree\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Chip budding</th>\n        <td>July through September</td>\n        <td>Stock may have \u201ctight\u201d bark</td>\n        <td>\n          Works when bark is not slipping; extends the budding window into late summer\n          and early fall.\n        </td>\n        <td>\n          University of Wisconsin Fruit Program  - \n          <a href=\"https://fruit.wisc.edu/2018/07/26/preparing-for-late-summer-budding/\" target=\"_blank\" rel=\"noopener\">\n            Preparing for Late Summer Budding\n          </a>\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["grafting-fruit-trees-in-santa-cruz-county-add-varieties-save-trees-and-grow-your-own-g3"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Essential Grafting Tools\n  </div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Essential tools for fruit tree grafting\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Tool</th>\n        <th scope=\"col\">Use</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Grafting knife</th>\n        <td>Making precise grafting cuts</td>\n        <td>\n          Specialty grafting knives have a single-bevel blade; keep razor-sharp for clean cambium contact.\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Budding knife</th>\n        <td>T-budding and chip budding</td>\n        <td>\n          Includes a bark-lifting tip; a dedicated budding blade improves success rates.\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Pruning shears</th>\n        <td>Collecting scionwood and cutting rootstock</td>\n        <td>\n          Use high-quality bypass pruners; sanitize between trees and varieties.\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Grafting tape</th>\n        <td>Wrapping and securing graft unions</td>\n        <td>\n          Parafilm is self-sealing, stretches as the graft grows, and degrades naturally over time.\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Grafting wax or compound</th>\n        <td>Sealing exposed cuts</td>\n        <td>\n          Prevents drying and disease entry, especially important in windy or dry spring conditions.\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Labels</th>\n        <td>Identifying grafted varieties</td>\n        <td>\n          Use metal or durable plastic labels for permanence; write with UV-resistant marker or engraving.\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["pruning-and-training-fruit-trees-in-santa-cruz-county-shape-your-trees-for-better-harvests-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Where Different Fruit Trees Bear, and What That Means for Pruning\n  </div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Fruit tree bearing habit and pruning implications\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Tree Type</th>\n        <th scope=\"col\">Where Fruit Is Borne</th>\n        <th scope=\"col\">Pruning Approach in Home Gardens</th>\n        <th scope=\"col\">Supporting Resources</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Apples, pears</th>\n        <td>\n          On short-lived but persistent spurs\n        </td>\n        <td>\n          Preserve spurs; use moderate thinning and light heading to renew spur systems and keep the canopy open.\n        </td>\n        <td>\n          Illinois Extension:\n          <a href=\"https://extension.illinois.edu/fruit-trees/training-fruit-trees\" target=\"_blank\" rel=\"noopener\">\n            Training and Pruning Fruit Trees\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Peaches, nectarines</th>\n        <td>\n          On one-year-old shoots (last season\u2019s growth)\n        </td>\n        <td>\n          Remove roughly 40 to 50% of last year\u2019s growth annually; maintain an open-center form with abundant new shoots.\n        </td>\n        <td>\n          University of Georgia Extension:\n          <a href=\"https://extension.uga.edu/publications/detail.html?number=C1087\" target=\"_blank\" rel=\"noopener\">\n            Home Garden Peaches\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Japanese plums</th>\n        <td>\n          On one-year-old shoots and short spurs\n        </td>\n        <td>\n          Moderate pruning: renew some shoots each year while retaining productive spur wood.\n        </td>\n        <td>\n          OSU Extension:\n          <a href=\"https://extension.oregonstate.edu/catalog/pnw-400-training-pruning-your-home-orchard\" target=\"_blank\" rel=\"noopener\">\n            Training and Pruning Your Home Orchard\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">European plums, apricots</th>\n        <td>\n          Mostly on spurs\n        </td>\n        <td>\n          Similar to apples and pears: preserve spur systems and thin the canopy to improve light penetration.\n        </td>\n        <td>\n          Illinois Extension:\n          <a href=\"https://extension.illinois.edu/fruit-trees/training-fruit-trees\" target=\"_blank\" rel=\"noopener\">\n            Fruit Tree Training Guide\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Sweet cherries</th>\n        <td>\n          On spurs and some one-year-old wood\n        </td>\n        <td>\n          Light pruning only; thin for light and remove crossing or problem branches.\n        </td>\n        <td>\n          Virginia Tech Extension:\n          <a href=\"https://www.pubs.ext.vt.edu/422/422-021/422-021.html\" target=\"_blank\" rel=\"noopener\">\n            Apple and Cherry Pruning Systems\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Sour cherries</th>\n        <td>\n          Mainly on one-year-old wood\n        </td>\n        <td>\n          Moderate renewal pruning to encourage fresh, productive shoots.\n        </td>\n        <td>\n          Home-orchard cherry guidance consistent with OSU PNW 400\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Figs</th>\n        <td>\n          On current season\u2019s growth and previous year\u2019s wood\n        </td>\n        <td>\n          Light structural pruning and size control; avoid removing too much older fruiting wood.\n        </td>\n        <td>\n          UC ANR:\n          <a href=\"https://ucanr.edu/sites/default/files/2011-05/91524.pdf\" target=\"_blank\" rel=\"noopener\">\n            The Backyard Orchard\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Citrus</th>\n        <td>\n          On current season\u2019s growth\n        </td>\n        <td>\n          Minimal pruning: remove dead, diseased, or crossing branches and lightly shape as needed.\n        </td>\n        <td>\n          Californiatrees.org:\n          <a href=\"https://californiatrees.org/blogs/pruning-california-fruit-trees/when-to-prune-citrus-trees-in-northern-california\" target=\"_blank\" rel=\"noopener\">\n            When to Prune Citrus Trees in Northern California\n          </a>\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["pruning-and-training-fruit-trees-in-santa-cruz-county-shape-your-trees-for-better-harvests-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Pruning Calendar for Santa Cruz County (By Fruit Type)</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Pruning calendar for Santa Cruz County fruit trees\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Season / Month</th>\n        <th scope=\"col\">Fruit Types</th>\n        <th scope=\"col\">Key Tasks</th>\n        <th scope=\"col\">Supporting Resources</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Late winter (Jan to Feb)</th>\n        <td>\n          Apples, pears, plums, cherries, figs (structural), established peaches and nectarines\n        </td>\n        <td>\n          Major structural pruning; remove dead or diseased wood; thin and head to shape trees.\n        </td>\n        <td>\n          UC ANR <em>The Backyard Orchard</em>:\n          <a href=\"https://ucanr.edu/sites/default/files/2011-05/91524.pdf\" target=\"_blank\" rel=\"noopener\">\n            PDF guide\n          </a><br>\n          OSU Extension PNW 400:\n          <a href=\"https://extension.oregonstate.edu/catalog/pnw-400-training-pruning-your-home-orchard\" target=\"_blank\" rel=\"noopener\">\n            Training and Pruning Your Home Orchard\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Late winter to early spring (Feb to Mar)</th>\n        <td>\n          Citrus and evergreen fruit trees\n        </td>\n        <td>\n          Light structural work and clean-up after frost danger has passed.\n        </td>\n        <td>\n          California citrus pruning timing:\n          <a href=\"https://californiatrees.org/blogs/pruning-california-fruit-trees/when-to-prune-citrus-trees-in-northern-california\" target=\"_blank\" rel=\"noopener\">\n            Californiatrees.org\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Late spring to early summer (May to Jun)</th>\n        <td>\n          All deciduous fruit trees\n        </td>\n        <td>\n          Summer pruning for size control; remove water sprouts; ideal timing for Backyard Orchard Culture cuts.\n        </td>\n        <td>\n          Dave Wilson Nursery:\n          <a href=\"https://www.davewilson.com/home-garden/backyard-orchard-culture/\" target=\"_blank\" rel=\"noopener\">\n            Backyard Orchard Culture\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">After harvest (late summer to early fall)</th>\n        <td>\n          Stone fruits (especially apricots, peaches, nectarines) and figs\n        </td>\n        <td>\n          Light shaping and removal of fruited wood where appropriate; avoid heavy cuts heading into winter.\n        </td>\n        <td>\n          University of Georgia Extension:\n          <a href=\"https://extension.uga.edu/publications/detail.html?number=C1087\" target=\"_blank\" rel=\"noopener\">\n            Peach and Nectarine Pruning\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Avoid heavy pruning in fall</th>\n        <td>\n          All fruit tree types\n        </td>\n        <td>\n          Avoid stimulating tender growth before cold weather and avoid pruning during active wet disease periods.\n        </td>\n        <td>\n          General guidance from UC ANR and OSU Extension:\n          <a href=\"https://ucanr.edu/sites/default/files/2011-05/91524.pdf\" target=\"_blank\" rel=\"noopener\">\n            UC ANR\n          </a>,\n          <a href=\"https://extension.oregonstate.edu/catalog/pnw-400-training-pruning-your-home-orchard\" target=\"_blank\" rel=\"noopener\">\n            OSU Extension\n          </a>\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>\n\n  \n</div>";
window.AH_GRAPHICS["pruning-and-training-fruit-trees-in-santa-cruz-county-shape-your-trees-for-better-harvests-g3"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Training Systems Overview\n  </div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Fruit tree training systems overview\">\n    <thead>\n      <tr>\n        <th scope=\"col\">System</th>\n        <th scope=\"col\">Best For</th>\n        <th scope=\"col\">Space Needed</th>\n        <th scope=\"col\">Difficulty</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Open center (vase)</th>\n        <td>Peaches, nectarines, plums, apricots</td>\n        <td>12 to 15 ft diameter</td>\n        <td>Easy to moderate</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Central leader</th>\n        <td>Apples, pears, sweet cherries</td>\n        <td>10 to 15 ft diameter</td>\n        <td>Moderate</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Modified central leader</th>\n        <td>Apples, pears, stone fruits</td>\n        <td>8 to 12 ft diameter</td>\n        <td>Easy to moderate</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Espalier</th>\n        <td>Apples, pears, figs; stone fruits as fans</td>\n        <td>2 ft deep \u00d7 8 to 15 ft wide</td>\n        <td>Moderate to difficult</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Fan</th>\n        <td>Stone fruits, figs</td>\n        <td>2 ft deep \u00d7 8 to 12 ft wide</td>\n        <td>Moderate</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Cordon</th>\n        <td>Apples, pears</td>\n        <td>2 ft wide \u00d7 6 to 8 ft tall</td>\n        <td>Moderate</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Backyard Orchard Culture</th>\n        <td>All fruit types</td>\n        <td>Variable; as small as 6 to 8 ft</td>\n        <td>Easy</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["pruning-and-training-fruit-trees-in-santa-cruz-county-shape-your-trees-for-better-harvests-g4"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Espalier Patterns\n  </div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Common espalier patterns and best uses\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Pattern</th>\n        <th scope=\"col\">Description</th>\n        <th scope=\"col\">Best Fruits</th>\n        <th scope=\"col\">Difficulty</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Horizontal cordon (tiered)</th>\n        <td>\n          Central trunk with horizontal arms trained at regular intervals; the most classic espalier form.\n        </td>\n        <td>Apples, pears</td>\n        <td>Moderate</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Fan</th>\n        <td>\n          Branches radiate from a low central point like a peacock\u2019s tail.\n        </td>\n        <td>Stone fruits, figs</td>\n        <td>Moderate</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Belgian fence</th>\n        <td>\n          Multiple V-shaped trees woven together into a decorative lattice.\n        </td>\n        <td>Apples, pears</td>\n        <td>Difficult</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Cordon (single stem)</th>\n        <td>\n          Single stem trained at a 45\u00b0 angle with fruiting spurs along the length.\n        </td>\n        <td>Apples, pears</td>\n        <td>Easy</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Stepover</th>\n        <td>\n          Single horizontal tier just 12 to 18 inches high; often used as living edging.\n        </td>\n        <td>Apples, pears</td>\n        <td>Easy</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Candelabra</th>\n        <td>\n          Multiple vertical branches rising from a low horizontal arm.\n        </td>\n        <td>Apples, pears</td>\n        <td>Difficult</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Informal</th>\n        <td>\n          Trained flat against a support without a rigid geometric pattern.\n        </td>\n        <td>Any fruit type</td>\n        <td>Easy</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["pruning-and-training-fruit-trees-in-santa-cruz-county-shape-your-trees-for-better-harvests-g5"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Essential Pruning Tools\n  </div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Essential pruning tools and uses\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Tool</th>\n        <th scope=\"col\">Use</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Bypass hand pruners</th>\n        <td>Branches up to \u00be inch</td>\n        <td>Essential everyday tool; invest in a high-quality, sharp pair.</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Loppers</th>\n        <td>Branches \u00be to 2 inches</td>\n        <td>Long handles provide leverage for clean cuts without strain.</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Pruning saw</th>\n        <td>Branches over 2 inches</td>\n        <td>Folding saws are convenient and safer for tight spaces.</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Pole pruner</th>\n        <td>High or hard-to-reach branches</td>\n        <td>Useful for renovation work; less needed if trees are kept small.</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
