window.AH_GRAPHICS["winter-squash-variety-and-storage-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Winter Squash: Varieties and Storage</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Matched to Santa Cruz County growing conditions</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Storage</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best Use</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Local Notes</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Delicata</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">95-100</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">2-3 months</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Roasting (eat the skin!)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Reliable everywhere. Compact vines. Best beginner winter squash.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Butternut</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">100-110</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">3-6 months</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Soup, roasting, puree</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Stores longest. Plant early; needs full season.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Acorn</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">85-95</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">1-2 months</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Stuffing, baking halves</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Earliest winter squash. Good for shorter coastal seasons.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Kabocha</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">95-110</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">3-4 months</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Roasting, tempura, soup</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Sweetest winter squash. Inland/Watsonville best for full sweetness.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Spaghetti Squash</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">90-100</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">2-3 months</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Pasta substitute</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Reliable all microclimates. Sprawling vines need space.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 25px 0; border-radius: 0 6px 6px 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Curing is essential for storage.</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> After harvest, cure squash in a warm (80-85F), dry spot for 10-14 days. This hardens the skin and dramatically extends storage life.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["cucumber-variety-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Cucumber Varieties for Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Matched to local conditions</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Type</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Microclimate</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Key Feature</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Marketmore 76</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Slicer</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">58-68</td>\n                    <td style=\"padding: 10px 12px;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">All Areas</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Most reliable. Disease resistant, classic flavor.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Diva</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Slicer</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">58-65</td>\n                    <td style=\"padding: 10px 12px;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">Coastal Best</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">No pollination needed (parthenocarpic). Seedless.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Picolino</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Mini slicer</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">50-55</td>\n                    <td style=\"padding: 10px 12px;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">Coastal Best</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Parthenocarpic, early, snack-sized. Great for fog belt.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Homemade Pickles</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Pickling</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">55-60</td>\n                    <td style=\"padding: 10px 12px;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">All Areas</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Disease-resistant. Good production in cool climates.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Lemon</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Heirloom</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">60-70</td>\n                    <td style=\"padding: 10px 12px;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">All Areas</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Round, yellow. Mild and sweet. Surprisingly cool-tolerant.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Coastal tip: parthenocarpic varieties (Diva, Picolino) produce fruit without bee pollination. Essential when fog reduces pollinator activity.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["melon-microclimate-suitability"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Can You Grow Melons in Your Microclimate?</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">An honest assessment by location</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8f4e33; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Coastal Fog Belt (Aptos, Live Oak, Capitola)</span>\n                    <span style=\"background-color: #8f4e33 !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;\">Not Recommended</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Not enough heat for sweet melons. Your garden space is better used for crops that thrive in fog. Try cucumbers instead.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8f4e33; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Under Redwoods (Felton, Ben Lomond canyons)</span>\n                    <span style=\"background-color: #8f4e33 !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;\">Not Recommended</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Too shady and cool. Melons need full sun and sustained heat that shaded areas simply cannot provide.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #c4a35a; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Inland Valleys (Scotts Valley, Soquel)</span>\n                    <span style=\"background-color: #c4a35a !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;\">Maybe (Sunny Spots Only)</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Possible in the sunniest, most sheltered spots. Choose short-season varieties (65-75 days). Black plastic mulch and row covers help. Manage expectations.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8c9c8c; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">SLV Sunny Exposures (Boulder Creek ridges)</span>\n                    <span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;\">Worth Trying</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Warm days help, but watch for early fall frost cutting the season short. Short-season varieties only. Start indoors for head start.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #1a3b2a; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Watsonville / Pajaro Valley</span>\n                    <span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;\">Best Bet</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Warmest area in the county. Most melon varieties succeed here with proper timing and care. This is Santa Cruz County's melon zone.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["powdery-mildew-prevention-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Powdery Mildew Prevention Timeline</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Stay ahead of the #1 squash disease in Santa Cruz</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">When</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Action</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Why</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">At Planting</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Choose resistant varieties (Dunja, Tromboncino)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Genetics are your first and best defense.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">At Planting</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Space plants 3-4 ft apart minimum</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Airflow is critical. Crowding guarantees mildew.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Early Summer</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Begin preventive neem oil or potassium bicarbonate spray</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Start BEFORE you see mildew. Every 10-14 days.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Ongoing</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Water at base only, never overhead</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Wet leaves = mildew invitation. Use drip or soaker hose.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">At First Signs</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Remove affected leaves immediately</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Trash them (not compost). Slows spread to healthy tissue.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Late Season</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Accept some mildew; protect fruit</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late-season mildew is inevitable. As long as fruit is maturing, the plant has done its job.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 25px 0; border-radius: 0 6px 6px 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Santa Cruz reality check:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Our coastal fog creates ideal mildew conditions. You will likely get some mildew no matter what you do. The goal is delay and management, not elimination.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["hand-pollination-step-by-step"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Hand Pollinating Squash: Step by Step</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Guarantee fruit set when bees can't do the job</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 15px;\">\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">1</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Identify Male and Female Flowers</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Male flowers have straight, thin stems. Female flowers have a small bulge (baby fruit) behind the petals. Both must be open the same morning.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">2</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Harvest the Male Flower</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Pick a fully open male flower early morning (before 9 AM). Peel back the petals to expose the pollen-covered stamen in the center.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">3</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Transfer Pollen to Female Flower</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Gently rub the male stamen against the stigma (center) of the open female flower. Make several passes to ensure good coverage. One male can pollinate 2-3 females.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">4</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Watch for Success</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Within 24-48 hours, the baby fruit behind the female flower should start growing. If it shrivels and falls off, pollination failed. Try again with the next female flower.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0 25px 25px 25px; border-radius: 6px;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">When to hand pollinate:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Early morning (6-9 AM) when flowers are fully open and pollen is fresh. Especially important on foggy coastal mornings when bees are less active. Check your plants daily during peak flowering.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";


window.AH_GRAPHICS["best-zucchini-varieties-for-santa-cruz-county-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Best Zucchini Varieties for Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Proven performers for our microclimates</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Mildew Resist.</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best For</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Why It Works Here</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Costata Romanesco</td>\n important;\">Inland, Watsonville</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Classic dark green. Prolific. Needs warmth.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Tromboncino</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">60-70</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">Excellent</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">All (needs trellis)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Climbing variety. Nearly mildew-proof. Long curved fruit.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Pattypan / Sunburst</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">50-55</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">Good</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">All microclimates</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Scalloped shape. Great grilled. Compact plants.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Coastal gardeners: prioritize mildew resistance over everything else. It's the #1 zucchini killer here.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["growing-cucumbers-in-santa-cruz-county-crisp-harvests-despite-cool-summers-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Cucumber Varieties for Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Matched to local conditions</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Type</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Microclimate</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Key Feature</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Marketmore 76</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Slicer</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">58-68</td>\n                    <td style=\"padding: 10px 12px;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">All Areas</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Most reliable. Disease resistant, classic flavor.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Diva</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Slicer</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">58-65</td>\n                    <td style=\"padding: 10px 12px;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">Coastal Best</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">No pollination needed (parthenocarpic). Seedless.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Picolino</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Mini slicer</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">50-55</td>\n                    <td style=\"padding: 10px 12px;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">Coastal Best</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Parthenocarpic, early, snack-sized. Great for fog belt.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Homemade Pickles</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Pickling</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">55-60</td>\n                    <td style=\"padding: 10px 12px;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">All Areas</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Disease-resistant. Good production in cool climates.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Lemon</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Heirloom</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">60-70</td>\n                    <td style=\"padding: 10px 12px;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">All Areas</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Round, yellow. Mild and sweet. Surprisingly cool-tolerant.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Coastal tip: parthenocarpic varieties (Diva, Picolino) produce fruit without bee pollination. Essential when fog reduces pollinator activity.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["growing-melons-in-santa-cruz-county-which-microclimates-work-and-which-do-not-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Can You Grow Melons in Your Microclimate?</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">An honest assessment by location</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8f4e33; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Coastal Fog Belt (Aptos, Live Oak, Capitola)</span>\n                    <span style=\"background-color: #8f4e33 !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;\">Not Recommended</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Not enough heat for sweet melons. Your garden space is better used for crops that thrive in fog. Try cucumbers instead.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8f4e33; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Under Redwoods (Felton, Ben Lomond canyons)</span>\n                    <span style=\"background-color: #8f4e33 !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;\">Not Recommended</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Too shady and cool. Melons need full sun and sustained heat that shaded areas simply cannot provide.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #c4a35a; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Inland Valleys (Scotts Valley, Soquel)</span>\n                    <span style=\"background-color: #c4a35a !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;\">Maybe (Sunny Spots Only)</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Possible in the sunniest, most sheltered spots. Choose short-season varieties (65-75 days). Black plastic mulch and row covers help. Manage expectations.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8c9c8c; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">SLV Sunny Exposures (Boulder Creek ridges)</span>\n                    <span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;\">Worth Trying</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Warm days help, but watch for early fall frost cutting the season short. Short-season varieties only. Start indoors for head start.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #1a3b2a; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Watsonville / Pajaro Valley</span>\n                    <span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;\">Best Bet</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Warmest area in the county. Most melon varieties succeed here with proper timing and care. This is Santa Cruz County's melon zone.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["growing-winter-squash-in-santa-cruz-county-from-planting-to-storage-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Winter Squash: Varieties and Storage</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Matched to Santa Cruz County growing conditions</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Storage</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best Use</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Local Notes</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Delicata</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">95-100</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">2-3 months</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Roasting (eat the skin!)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Reliable everywhere. Compact vines. Best beginner winter squash.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Butternut</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">100-110</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">3-6 months</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Soup, roasting, puree</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Stores longest. Plant early; needs full season.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Acorn</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">85-95</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">1-2 months</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Stuffing, baking halves</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Earliest winter squash. Good for shorter coastal seasons.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Kabocha</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">95-110</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">3-4 months</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Roasting, tempura, soup</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Sweetest winter squash. Inland/Watsonville best for full sweetness.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Spaghetti Squash</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">90-100</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">2-3 months</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Pasta substitute</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Reliable all microclimates. Sprawling vines need space.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 25px 0; border-radius: 0 6px 6px 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Curing is essential for storage.</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> After harvest, cure squash in a warm (80-85F), dry spot for 10-14 days. This hardens the skin and dramatically extends storage life.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["hand-pollinating-squash-for-better-yields-in-santa-cruz-gardens-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Hand Pollinating Squash: Step by Step</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Guarantee fruit set when bees can't do the job</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 15px;\">\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">1</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Identify Male and Female Flowers</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Male flowers have straight, thin stems. Female flowers have a small bulge (baby fruit) behind the petals. Both must be open the same morning.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">2</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Harvest the Male Flower</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Pick a fully open male flower early morning (before 9 AM). Peel back the petals to expose the pollen-covered stamen in the center.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">3</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Transfer Pollen to Female Flower</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Gently rub the male stamen against the stigma (center) of the open female flower. Make several passes to ensure good coverage. One male can pollinate 2-3 females.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">4</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Watch for Success</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Within 24-48 hours, the baby fruit behind the female flower should start growing. If it shrivels and falls off, pollination failed. Try again with the next female flower.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0 25px 25px 25px; border-radius: 6px;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">When to hand pollinate:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Early morning (6-9 AM) when flowers are fully open and pollen is fresh. Especially important on foggy coastal mornings when bees are less active. Check your plants daily during peak flowering.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["powdery-mildew-on-squash-prevention-and-treatment-for-santa-cruz-gardens-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Powdery Mildew Prevention Timeline</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Stay ahead of the #1 squash disease in Santa Cruz</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">When</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Action</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Why</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">At Planting</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Choose resistant varieties (Dunja, Tromboncino)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Genetics are your first and best defense.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">At Planting</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Space plants 3-4 ft apart minimum</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Airflow is critical. Crowding guarantees mildew.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Early Summer</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Begin preventive neem oil or potassium bicarbonate spray</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Start BEFORE you see mildew. Every 10-14 days.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Ongoing</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Water at base only, never overhead</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Wet leaves = mildew invitation. Use drip or soaker hose.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">At First Signs</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Remove affected leaves immediately</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Trash them (not compost). Slows spread to healthy tissue.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Late Season</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Accept some mildew; protect fruit</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late-season mildew is inevitable. As long as fruit is maturing, the plant has done its job.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 25px 0; border-radius: 0 6px 6px 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Santa Cruz reality check:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Our coastal fog creates ideal mildew conditions. You will likely get some mildew no matter what you do. The goal is delay and management, not elimination.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

">2</div>Greenish-yellow frass (sawdust-like material) around holes</div> <div class=\"ah-info-item\"><div class=\"ah-info-icon\">3</div>Stem feels mushy or hollow when gently squeezed</div> <div class=\"ah-info-item\"><div class=\"ah-info-icon\">4</div>Cutting stem reveals white larva with brown head</div> </div> <div class=\"ah-warning\"> <div class=\"ah-warning-title\">Not All Wilting Is Vine Borer</div> Before assuming vine borers, check for other causes: inconsistent watering, bacterial wilt (spread by cucumber beetles), gopher damage to roots, or root rot from overwatering. Examine the stem base carefully for the characteristic frass before diagnosing vine borer. </div> <div class=\"ah-footer\">ambitiousharvest.com | Santa Cruz &amp; Bay Area Gardening</div> </div>";
window.AH_GRAPHICS["squash-vine-borer-prevention-in-santa-cruz-county-g2"] = "<div class=\"ah-checklist-container\"> <div class=\"ah-checklist-title\">Squash Vine Borer Prevention Checklist</div> <div class=\"ah-checklist-section\"> <div class=\"ah-checklist-section-title\">Before Planting</div> <div class=\"ah-checklist-item\">Rotate planting location (not where squash grew in past 2 years)</div> <div class=\"ah-checklist-item\">Choose resistant varieties (butternut, tromboncino) if borers are a problem</div> <div class=\"ah-checklist-item\">Plan succession plantings for insurance</div> </div> <div class=\"ah-checklist-section\"> <div class=\"ah-checklist-section-title\">At Planting</div> <div class=\"ah-checklist-item\">Install row covers immediately and seal edges</div> <div class=\"ah-checklist-item\">Apply stem protection (foil, nylon, or collar)</div> <div class=\"ah-checklist-item\">Consider trap crop planting if pressure is high</div> </div> <div class=\"ah-checklist-section\"> <div class=\"ah-checklist-section-title\">Growing Season (May through August)</div> <div class=\"ah-checklist-item\">Scout for adult moths (orange and black, wasp-like, flying during day)</div> <div class=\"ah-checklist-item\">Check stem bases weekly for eggs (small, flat, brown)</div> <div class=\"ah-checklist-item\">Watch for early wilting or frass at stem base</div> <div class=\"ah-checklist-item\">Maintain stem protection as plants grow</div> </div> <div class=\"ah-checklist-section\"> <div class=\"ah-checklist-section-title\">End of Season</div> <div class=\"ah-checklist-item\">Remove and destroy (do not compost) affected plants</div> <div class=\"ah-checklist-item\">Cultivate soil to expose overwintering pupae</div> <div class=\"ah-checklist-item\">Plan rotation for next year</div> </div> <div class=\"ah-footer\">ambitiousharvest.com | Santa Cruz &amp; Bay Area Gardening</div> </div>";
