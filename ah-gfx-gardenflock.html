     <td>Calm, docile</td>\n          <td>Low</td>\n          <td>Top all-around</td>\n        </tr>\n        <tr>\n          <td>Speckled Sussex</td>\n          <td>200-250</td>\n          <td>Single (moderate)</td>\n          <td><span class=\"ah-fogbelt-badge ah-badge-good\">Good</span></td>\n          <td>Curious, friendly</td>\n          <td>Low-medium</td>\n          <td>Garden foragers</td>\n        </tr>\n        <tr>\n          <td>Easter Egger</td>\n          <td>200-280</td>\n          <td>Pea (ideal)</td>\n          <td><span class=\"ah-fogbelt-badge ah-badge-good\">Excellent</span></td>\n          <td>Friendly, calm</td>\n          <td>Low</td>\n          <td>Urban lots, kids</td>\n        </tr>\n        <tr>\n          <td>Buff Orpington</td>\n          <td>200-250</td>\n          <td>Single (moderate)</td>\n          <td><span class=\"ah-fogbelt-badge ah-badge-good\">Good</span></td>\n          <td>Very gentle</td>\n          <td>Low</td>\n          <td>Families, brooders</td>\n        </tr>\n        <tr>\n          <td>Rhode Island Red</td>\n          <td>250-300</td>\n          <td>Single (can run tall)</td>\n          <td><span class=\"ah-fogbelt-badge ah-badge-ok\">Moderate</span></td>\n          <td>Assertive</td>\n          <td>Medium</td>\n          <td>Production focus</td>\n        </tr>\n        <tr>\n          <td>Wyandotte (Rose Comb)</td>\n          <td>200-240</td>\n          <td>Rose (ideal)</td>\n          <td><span class=\"ah-fogbelt-badge ah-badge-good\">Excellent</span></td>\n          <td>Calm, adaptable</td>\n          <td>Low-medium</td>\n          <td>Fog belt standout</td>\n        </tr>\n        <tr>\n          <td>Dominique</td>\n          <td>230-275</td>\n          <td>Rose (ideal)</td>\n          <td><span class=\"ah-fogbelt-badge ah-badge-good\">Excellent</span></td>\n          <td>Calm, independent</td>\n          <td>Low</td>\n          <td>Heritage keepers</td>\n        </tr>\n        <tr>\n          <td>Leghorn (White)</td>\n          <td>280-320</td>\n          <td>Single (very tall)</td>\n          <td><span class=\"ah-fogbelt-badge ah-badge-caution\">Poor</span></td>\n          <td>Flighty, nervous</td>\n          <td>High</td>\n          <td>Not recommended</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n  <div class=\"ah-fogbelt-source\">Source: The Livestock Conservancy Breed Profiles; Penn State Extension Poultry; UC ANR Small-Scale Poultry Flock publications. Egg counts are annual averages for well-fed adult hens in their first two laying years.</div>\n  <div class=\"ah-fogbelt-footer\">ambitiousharvest.com | Santa Cruz County Backyard Poultry</div>\n</div>";

  padding: 14px 14px;\n  }\n}\n</style>\n\n<div class=\"ah-picker-wrapper\">\n  <div class=\"ah-picker-header\">\n    <h2>Which Fog Belt Breed Matches Your Situation?</h2>\n    <p>A quick-reference guide by keeper type and priority</p>\n  </div>\n  <div class=\"ah-picker-grid\">\n    <div class=\"ah-picker-cell\">\n      <div class=\"ah-picker-situation\">Best All-Around</div>\n      <div class=\"ah-picker-recommend\">Black Australorp</div>\n      <div class=\"ah-picker-note\">Highest consistent production, calm temperament, quiet, moderate single comb. The right starting point for most new fog-belt keepers.</div>\n    </div>\n    <div class=\"ah-picker-cell\">\n      <div class=\"ah-picker-situation\">Urban Lots / Neighbors Nearby</div>\n      <div class=\"ah-picker-recommend\">Wyandotte or Easter Egger</div>\n      <div class=\"ah-picker-note\">Both are reliably quiet. Wyandotte's rose comb is the best structural choice. Easter Egger's pea comb is also excellent.</div>\n    </div>\n    <div class=\"ah-picker-cell\">\n      <div class=\"ah-picker-situation\">Families with Young Children</div>\n      <div class=\"ah-picker-recommend\">Buff Orpington</div>\n      <div class=\"ah-picker-note\">The most consistently gentle breed. Tolerates handling, rarely pecks. Lower production than Australorps but worth it for calm handling.</div>\n    </div>\n    <div class=\"ah-picker-cell\">\n      <div class=\"ah-picker-situation\">Best Comb for the Fog Belt</div>\n      <div class=\"ah-picker-recommend\">Wyandotte or Dominique</div>\n      <div class=\"ah-picker-note\">Rose combs on both breeds provide the best moisture resistance of any common backyard breed available from major hatcheries.</div>\n    </div>\n    <div class=\"ah-picker-cell\">\n      <div class=\"ah-picker-situation\">Garden Integration</div>\n      <div class=\"ah-picker-recommend\">Speckled Sussex</div>\n      <div class=\"ah-picker-note\">Active, curious foragers that work with the garden rather than against it. Good pest scratchers without being destructively aggressive.</div>\n    </div>\n    <div class=\"ah-picker-cell\">\n      <div class=\"ah-picker-situation\">Heritage and Conservation</div>\n      <div class=\"ah-picker-recommend\">Dominique</div>\n      <div class=\"ah-picker-note\">America's oldest recognized breed, on the Livestock Conservancy Watch List. Rose comb, calm nature, and genuine fog-belt suitability.</div>\n    </div>\n  </div>\n  <div class=\"ah-picker-footer\">ambitiousharvest.com | The Garden Coop</div>\n</div>";



window.AH_GRAPHICS["garden-flock-predators-day-vs-night"] = "<div class=\"ah-daynight-wrapper\" style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 32px 0; padding: 0; box-sizing: border-box;\">\n  <style>\n    .ah-daynight-wrapper * { box-sizing: border-box; }\n    .ah-daynight-header {\n      background-color: #1a3b2a;\n      padding: 20px 24px;\n      border-radius: 6px 6px 0 0;\n    }\n    .ah-daynight-header h2 {\n      color: #f8f9f0 !important;\n      font-size: 1.25rem !important;\n      font-weight: 700 !important;\n      margin: 0 0 4px 0 !important;\n      font-family: 'Montserrat', sans-serif !important;\n    }\n    .ah-daynight-header p {\n      color: #dde2d8 !important;\n      font-size: 0.82rem !important;\n      margin: 0 !important;\n      font-family: 'Montserrat', sans-serif !important;\n    }\n    .ah-daynight-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      border: 2px solid #1a3b2a;\n      border-top: none;\n      border-radius: 0 0 6px 6px;\n      overflow: hidden;\n    }\n    .ah-daynight-col {\n      padding: 20px;\n    }\n    .ah-daynight-col-day {\n      background-color: #fff9ee;\n      border-right: 1px solid #dde2d8;\n    }\n    .ah-daynight-col-night {\n      background-color: #f0f3ee;\n    }\n    .ah-daynight-col-head {\n      font-size: 0.85rem !important;\n      font-weight: 700 !important;\n      text-transform: uppercase;\n      letter-spacing: 0.06em;\n      margin: 0 0 12px 0 !important;\n      padding-bottom: 8px;\n      border-bottom: 2px solid #1a3b2a;\n      font-family: 'Montserrat', sans-serif !important;\n    }\n    .ah-daynight-col-day .ah-daynight-col-head { color: #c9a84c !important; border-color: #c9a84c; }\n    .ah-daynight-col-night .ah-daynight-col-head { color: #1a3b2a !important; }\n    .ah-daynight-item {\n      display: flex;\n      flex-direction: column;\n      margin-bottom: 14px;\n    }\n    .ah-daynight-item:last-child { margin-bottom: 0; }\n    .ah-daynight-item-name {\n      font-weight: 700 !important;\n      font-size: 0.84rem !important;\n      color: #1a3b2a !important;\n      font-family: 'Montserrat', sans-serif !important;\n      margin-bottom: 2px;\n    }\n    .ah-daynight-item-note {\n      font-size: 0.78rem !important;\n      color: #4a6054 !important;\n      font-family: 'Montserrat', sans-serif !important;\n      line-height: 1.4;\n    }\n    .ah-daynight-footer2 {\n      background-color: #dde2d8;\n      padding: 8px 16px;\n      text-align: center;\n      border-top: 1px solid #1a3b2a;\n    }\n    .ah-daynight-footer2 p {\n      color: #1a3b2a !important;\n      font-size: 0.72rem !important;\n      margin: 0 !important;\n      font-family: 'Montserrat', sans-serif !important;\n    }\n    @media (max-width: 600px) {\n      .ah-daynight-grid { grid-template-columns: 1fr; }\n      .ah-daynight-col-day { border-right: none; border-bottom: 1px solid #dde2d8; border-radius: 0; }\n      .ah-daynight-header h2 { font-size: 1.05rem !important; }\n    }\n  </style>\n  <div class=\"ah-daynight-header\">\n    <h2>Santa Cruz County Flock Threat: Day vs. Night Quick Reference</h2>\n    <p>Use this to prioritize your next defense improvement. Source: UC IPM; Cornell Lab eBird; CDFW.</p>\n  </div>\n  <div class=\"ah-daynight-grid\">\n    <div class=\"ah-daynight-col ah-daynight-col-day\">\n      <p class=\"ah-daynight-col-head\">Daytime Threats</p>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Red-tailed Hawk</span>\n        <span class=\"ah-daynight-item-note\">Year-round resident. Targets young birds and bantams in open runs and pasture. Defense: covered run, remove elevated perches.</span>\n      </div>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Cooper's Hawk</span>\n        <span class=\"ah-daynight-item-note\">Year-round resident. Can take birds up to 1.5 lbs. Ambushes through cover and run gaps. Defense: covered run overhead.</span>\n      </div>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Sharp-shinned Hawk</span>\n        <span class=\"ah-daynight-item-note\">Winter visitor only (Sept through April). Threatens chicks and bantams only. Defense: covered run during winter months.</span>\n      </div>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Domestic Dog</span>\n        <span class=\"ah-daynight-item-note\">Year-round. Multiple birds killed but none consumed. Ragged wounds across whole body. Defense: fully enclosed run; animal control report.</span>\n      </div>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Coyote (active hours)</span>\n        <span class=\"ah-daynight-item-note\">Primarily nocturnal but increasingly active at dawn and dusk in suburban areas. Pup season (March through August) raises daytime sighting risk.</span>\n      </div>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Bobcat</span>\n        <span class=\"ah-daynight-item-note\">Crepuscular (dawn and dusk) but will hunt at any hour. Present county-wide.</span>\n      </div>\n    </div>\n    <div class=\"ah-daynight-col ah-daynight-col-night\">\n      <p class=\"ah-daynight-col-head\">Nighttime Threats</p>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Raccoon</span>\n        <span class=\"ah-daynight-item-note\">Obligate nocturnal. Dominant urban threat. Reach-through attacks. Can open latches. Defense: hardware cloth, locking latches, buried apron.</span>\n      </div>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Great Horned Owl</span>\n        <span class=\"ah-daynight-item-note\">Year-round resident. Enters through unsecured vents. Decapitates birds. Defense: lock all birds in predator-proof coop every night.</span>\n      </div>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Gray Fox</span>\n        <span class=\"ah-daynight-item-note\">Most frequently recorded wild mammal in Santa Cruz Mountains monitoring. Digs under and climbs. Defense: buried apron plus fence overhang or roller.</span>\n      </div>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Long-tailed Weasel</span>\n        <span class=\"ah-daynight-item-note\">Confirmed at Bonny Doon Beach (2020). Enters through 1/4-inch gaps. Surplus kills entire flock. Defense: raised floor, 1/2-inch hardware cloth on every opening.</span>\n      </div>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Opossum</span>\n        <span class=\"ah-daynight-item-note\">Strictly nocturnal. Targets eggs and nesting hens. Reaches through wire. Defense: 1/4-inch hardware cloth; no openings at roost level.</span>\n      </div>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Rats</span>\n        <span class=\"ah-daynight-item-note\">Primarily nocturnal. Take eggs; bite toes of roosting birds; kill young chicks. Roof rat dominant species in coastal Santa Cruz. Defense: metal feed storage; seal all 1/4-inch or larger gaps.</span>\n      </div>\n      <div class=\"ah-daynight-item\">\n        <span class=\"ah-daynight-item-name\">Coyote / Mountain Lion</span>\n        <span class=\"ah-daynight-item-note\">Both primarily nocturnal. Mountain lion risk highest in San Lorenzo Valley. Defense: secure lockup at dusk; no birds outside after dark.</span>\n      </div>\n    </div>\n  </div>\n  <div class=\"ah-daynight-footer2\">\n    <p>ambitiousharvest.com | The Garden Coop | Source: UC IPM; Cornell Lab eBird; CDFW; Bay Nature Santa Cruz Mountains wildlife monitoring</p>\n  </div>\n</div>";



window.AH_GRAPHICS["garden-flock-predators-habitat-zones"] = "<div class=\"ah-zone-wrapper\" style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 32px 0; padding: 0; box-sizing: border-box;\">\n  <style>\n    .ah-zone-wrapper * { box-sizing: border-box; }\n    .ah-zone-header {\n      background-color: #1a3b2a;\n      padding: 20px 24px;\n      border-radius: 6px 6px 0 0;\n    }\n    .ah-zone-header h2 {\n      color: #f8f9f0 !important;\n      font-size: 1.25rem !important;\n      font-weight: 700 !important;\n      margin: 0 0 4px 0 !important;\n      font-family: 'Montserrat', sans-serif !important;\n    }\n    .ah-zone-header p {\n      color: #dde2d8 !important;\n      font-size: 0.82rem !important;\n      margin: 0 !important;\n      font-family: 'Montserrat', sans-serif !important;\n    }\n    .ah-zone-body {\n      border: 2px solid #1a3b2a;\n      border-top: none;\n      border-radius: 0 0 6px 6px;\n      overflow: hidden;\n    }\n    .ah-zone-row {\n      display: grid;\n      grid-template-columns: 200px 1fr;\n      border-bottom: 1px solid #dde2d8;\n    }\n    .ah-zone-row:last-child { border-bottom: none; }\n    .ah-zone-row:nth-child(even) { background-color: #f8f9f0; }\n    .ah-zone-row:nth-child(odd) { background-color: #ffffff; }\n    .ah-zone-label {\n      background-color: #1c3c2c;\n      padding: 14px 16px;\n      display: flex;\n      flex-direction: column;\n      justify-content: center;\n    }\n    .ah-zone-label-name {\n      color: #f8f9f0 !important;\n      font-weight: 700 !important;\n      font-size: 0.84rem !important;\n      font-family: 'Montserrat', sans-serif !important;\n      margin-bottom: 3px;\n    }\n    .ah-zone-label-loc {\n      color: #dde2d8 !important;\n      font-size: 0.74rem !important;\n      font-family: 'Montserrat', sans-serif !important;\n    }\n    .ah-zone-detail {\n      padding: 14px 16px;\n    }\n    .ah-zone-detail p {\n      color: #1a3b2a !important;\n      font-size: 0.80rem !important;\n      margin: 0 0 6px 0 !important;\n      font-family: 'Montserrat', sans-serif !important;\n      line-height: 1.5;\n    }\n    .ah-zone-detail p:last-child { margin-bottom: 0 !important; }\n    .ah-zone-detail strong {\n      color: #1c3c2c !important;\n      font-family: 'Montserrat', sans-serif !important;\n    }\n    .ah-zone-footer3 {\n      background-color: #dde2d8;\n      padding: 8px 16px;\n      text-align: center;\n      border-top: 1px solid #1a3b2a;\n    }\n    .ah-zone-footer3 p {\n      color: #1a3b2a !important;\n      font-size: 0.72rem !important;\n      margin: 0 !important;\n      font-family: 'Montserrat', sans-serif !important;\n    }\n    @media (max-width: 600px) {\n      .ah-zone-row { grid-template-columns: 1fr; }\n      .ah-zone-label { padding: 10px 14px; border-bottom: 1px solid #2d5a3e; }\n      .ah-zone-label-name { font-size: 0.82rem !important; }\n      .ah-zone-header h2 { font-size: 1.05rem !important; }\n    }\n  </style>\n  <div class=\"ah-zone-header\">\n    <h2>Priority Predator Risks by Santa Cruz County Habitat Zone</h2>\n    <p>Your top threat varies by location. Source: CDFW; UC IPM; Bay Nature Santa Cruz Mountains wildlife monitoring; KQED.</p>\n  </div>\n  <div class=\"ah-zone-body\">\n    <div class=\"ah-zone-row\">\n      <div class=\"ah-zone-label\">\n        <span class=\"ah-zone-label-name\">Coastal Urban</span>\n        <span class=\"ah-zone-label-loc\">Santa Cruz City, Capitola, Aptos, Soquel</span>\n      </div>\n      <div class=\"ah-zone-detail\">\n        <p><strong>Top threats:</strong> Raccoon (high density along creek corridors), roof rat (dominant rat species in coastal areas), opossum (ubiquitous), Cooper's hawk (year-round in riparian corridors and parks).</p>\n        <p>Gray fox present in brushy margins. Mountain lion rare but CDFW documents corridors through even urban edges. Priority: raccoon-proof latch hardware and buried apron; rodent exclusion and metal feed storage.</p>\n      </div>\n    </div>\n    <div class=\"ah-zone-row\">\n      <div class=\"ah-zone-label\">\n        <span class=\"ah-zone-label-name\">San Lorenzo Valley</span>\n        <span class=\"ah-zone-label-loc\">Boulder Creek, Ben Lomond, Felton, Scotts Valley</span>\n      </div>\n      <div class=\"ah-zone-detail\">\n        <p><strong>Top threats:</strong> Mountain lion (CDFW 2023 alert; UC Davis Puma Project GPS-confirmed corridors); bobcat (active in chaparral and forest edges); gray fox (abundant in mixed forest and chaparral).</p>\n        <p>Long-tailed weasel likely more common here than coastal sightings suggest. Priority: dusk lockup is non-negotiable; structural exclusion for weasels; no outdoor overnight situations of any kind.</p>\n      </div>\n    </div>\n    <div class=\"ah-zone-row\">\n      <div class=\"ah-zone-label\">\n        <span class=\"ah-zone-label-name\">Pajaro Valley / Agricultural</span>\n        <span class=\"ah-zone-label-loc\">Watsonville, Corralitos, Freedom, La Selva Beach</span>\n      </div>\n      <div class=\"ah-zone-detail\">\n        <p><strong>Top threats:</strong> Coyote (high density due to rodent prey base in agricultural fields); red-tailed hawk (highest density in county in open agricultural land); Norway rat (more common in agricultural settings than coastal urban).</p>\n        <p>Uncovered pasture situations carry the greatest hawk predation risk of any zone in the county. Priority: covered runs for any free-range situation; coyote-proof fence with buried apron and outward overhang.</p>\n      </div>\n    </div>\n    <div class=\"ah-zone-row\">\n      <div class=\"ah-zone-label\">\n        <span class=\"ah-zone-label-name\">Coastal North County</span>\n        <span class=\"ah-zone-label-loc\">Davenport, Bonny Doon, Swanton</span>\n      </div>\n      <div class=\"ah-zone-detail\">\n        <p><strong>Top threats:</strong> Gray fox (chaparral and coastal scrub habitat); coyote (coastal terrace and ridgeline); long-tailed weasel (directly observed at Bonny Doon Beach, July 2020).</p>\n        <p>More rural and less urban-adapted predator community than coastal Santa Cruz City. Priority: hardware cloth exclusion at 1/2-inch or finer on all openings; raised coop floor to prevent weasel entry via rat tunnels.</p>\n      </div>\n    </div>\n  </div>\n  <div class=\"ah-zone-footer3\">\n    <p>ambitiousharvest.com | The Garden Coop</p>\n  </div>\n</div>";

  <tr>\n          <th>Predator</th>\n          <th>When</th>\n          <th>What Is Missing or Taken</th>\n          <th>Evidence Left Behind</th>\n          <th>Entry Method</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>Raccoon</td>\n          <td><span class=\"ah-pid-tag ah-pid-night\">Night</span></td>\n          <td>Head; entrails; breast muscle</td>\n          <td>Body near water; egg shells with lengthwise fractures; legs/feet missing if reach-through</td>\n          <td>Reach through wire; climb; dig; opens simple latches</td>\n        </tr>\n        <tr>\n          <td>Gray Fox</td>\n          <td><span class=\"ah-pid-tag ah-pid-night\">Night</span></td>\n          <td>Whole bird (cached away)</td>\n          <td>Minimal feathers at site; scat on elevated surfaces</td>\n          <td>Digs under; climbs (the only canid that climbs)</td>\n        </tr>\n        <tr>\n          <td>Coyote</td>\n          <td><span class=\"ah-pid-tag ah-pid-night\">Night / Dusk</span></td>\n          <td>Whole bird carried away</td>\n          <td>Scattered feathers; clean neck bite; no consumption at scene</td>\n          <td>Digs under; jumps fences up to 6 ft; forces gaps</td>\n        </tr>\n        <tr>\n          <td>Bobcat</td>\n          <td><span class=\"ah-pid-tag ah-pid-any\">Dawn / Dusk / Any</span></td>\n          <td>1 to 2 birds; mostly consumed or cached</td>\n          <td>Scratch marks on back and shoulders; scat left uncovered in open areas</td>\n          <td>Jumps; forces open or weakly latched coop doors</td>\n        </tr>\n        <tr>\n          <td>Mountain Lion</td>\n          <td><span class=\"ah-pid-tag ah-pid-night\">Primarily Night</span></td>\n          <td>Large bird taken; rarely caches poultry (caching behavior primarily documented with large prey)</td>\n          <td>Bite to back of neck; large tracks (2.75 to 4 in wide; large males occasionally larger)</td>\n          <td>Forces any unsecured closure; follows deer to yards</td>\n        </tr>\n        <tr>\n          <td>Great Horned Owl</td>\n          <td><span class=\"ah-pid-tag ah-pid-night\">Night / Dawn</span></td>\n          <td>Head and neck eaten; small birds taken whole</td>\n          <td>Decapitated carcass; large talon puncture marks; body otherwise intact</td>\n          <td>Unsecured vent openings; open upper windows in coop</td>\n        </tr>\n        <tr>\n          <td>Cooper's Hawk</td>\n          <td><span class=\"ah-pid-tag ah-pid-day\">Day</span></td>\n          <td>Small to medium bird (up to 1.5 lbs)</td>\n          <td>Breast cleanly plucked; feathers at strike site or in nearby tree</td>\n          <td>Aerial ambush in open run or free-range area</td>\n        </tr>\n        <tr>\n          <td>Red-tailed Hawk</td>\n          <td><span class=\"ah-pid-tag ah-pid-day\">Day</span></td>\n          <td>Young or bantam birds</td>\n          <td>Clean talon wounds; breast plucked; feathers under nearby elevated perch</td>\n          <td>Aerial strike on birds in uncovered area</td>\n        </tr>\n        <tr>\n          <td>Long-tailed Weasel</td>\n          <td><span class=\"ah-pid-tag ah-pid-any\">Night / Any</span></td>\n          <td>Nothing (birds cached in corners)</td>\n          <td>Multiple nearly-decapitated carcasses throughout coop; tiny 1/2-inch tracks</td>\n          <td>Holes as small as 1 inch; rat tunnels under floor</td>\n        </tr>\n        <tr>\n          <td>Opossum</td>\n          <td><span class=\"ah-pid-tag ah-pid-night\">Night</span></td>\n          <td>Eggs; chicks; internal organs</td>\n          <td>Crushed egg shells; torn underbelly starting at cloaca; typically 1 bird</td>\n          <td>Climbs; reaches through wire; slow but persistent</td>\n        </tr>\n        <tr>\n          <td>Rats</td>\n          <td><span class=\"ah-pid-tag ah-pid-night\">Night</span></td>\n          <td>Eggs; young chicks; bites on toes of roosting adults</td>\n          <td>Egg shell fragments nearby; droppings near feeder; gnaw marks on wood</td>\n          <td>Gaps 1/4 inch or larger; burrow from below; climb at upper levels</td>\n        </tr>\n        <tr>\n          <td>Domestic Dog</td>\n          <td><span class=\"ah-pid-tag ah-pid-day\">Day</span></td>\n          <td>Multiple birds killed; none consumed</td>\n          <td>Ragged wounds across whole body; carcasses scattered; claw-mark paw prints</td>\n          <td>Forces through weak fencing; pursues free-range birds in yard</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n  <div class=\"ah-predator-id-footer\">\n    <p>ambitiousharvest.com | The Garden Coop</p>\n  </div>\n</div>";


window.AH_GRAPHICS["garden-flock-pest-quick-reference"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-pest-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\n.ah-pest-header {\n  background-color: #1a3b2a;\n  padding: 24px 28px;\n  border-radius: 6px 6px 0 0;\n}\n\n.ah-pest-header h2 {\n  font-size: 1.25rem !important;\n  font-weight: 700 !important;\n  color: #f8f9f0 !important;\n  margin: 0 0 6px 0 !important;\n}\n\n.ah-pest-header p {\n  font-size: 0.85rem !important;\n  color: #dde2d8 !important;\n  margin: 0 !important;\n}\n\n.ah-pest-table-wrap {\n  overflow-x: auto;\n  border: 1px solid #dde2d8;\n  border-top: none;\n}\n\n.ah-pest-table {\n  width: 100%;\n  border-collapse: collapse;\n  font-size: 0.88rem;\n}\n\n.ah-pest-table thead tr {\n  background-color: #dde2d8;\n}\n\n.ah-pest-table thead th {\n  padding: 12px 14px;\n  text-align: left;\n  font-weight: 700 !important;\n  color: #1a3b2a !important;\n  font-size: 0.8rem !important;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n}\n\n.ah-pest-table tbody tr:nth-child(even) {\n  background-color: #f8f9f0;\n}\n\n.ah-pest-table tbody tr:nth-child(odd) {\n  background-color: #fff;\n}\n\n.ah-pest-table tbody td {\n  padding: 12px 14px;\n  vertical-align: top;\n  color: #1a3b2a !important;\n  border-bottom: 1px solid #dde2d8;\n  line-height: 1.5;\n}\n\n.ah-pest-table .ah-bird-tag {\n  display: inline-block;\n  padding: 2px 10px;\n  border-radius: 12px;\n  font-size: 0.78rem !important;\n  font-weight: 600 !important;\n  margin: 2px 2px 2px 0;\n}\n\n.ah-tag-duck {\n  background-color: #1a3b2a;\n  color: #f8f9f0 !important;\n}\n\n.ah-tag-chicken {\n  background-color: #c9a84c;\n  color: #fff !important;\n}\n\n.ah-tag-both {\n  background-color: #8c9c8c;\n  color: #fff !important;\n}\n\n.ah-pest-footer {\n  background-color: #f8f9f0;\n  border: 1px solid #dde2d8;\n  border-top: none;\n  padding: 10px 14px;\n  font-size: 0.75rem !important;\n  color: #8c9c8c !important;\n  border-radius: 0 0 6px 6px;\n  display: flex;\n  justify-content: space-between;\n  flex-wrap: wrap;\n  gap: 4px;\n}\n\n.ah-pest-footer span {\n  color: #8c9c8c !important;\n}\n\n@media (max-width: 600px) {\n  .ah-pest-header {\n    padding: 18px 16px;\n  }\n  .ah-pest-header h2 {\n    font-size: 1.05rem !important;\n  }\n  .ah-pest-table thead th,\n  .ah-pest-table tbody td {\n    padding: 10px 10px;\n    font-size: 0.82rem !important;\n  }\n}\n</style>\n\n<div class=\"ah-pest-wrapper\">\n  <div class=\"ah-pest-header\">\n    <h2>Which Bird Controls Which Pest?</h2>\n    <p>Common coastal Santa Cruz garden pests and your best feathered ally for each</p>\n  </div>\n  <div class=\"ah-pest-table-wrap\">\n    <table class=\"ah-pest-table\">\n      <thead>\n        <tr>\n          <th>Pest</th>\n          <th>Best Bird</th>\n          <th>How to Deploy</th>\n          <th>Realistic Outcome</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td><strong>Slugs</strong></td>\n          <td><span class=\"ah-bird-tag ah-tag-duck\">Ducks</span></td>\n          <td>Supervised access to mulched paths and bed edges, especially mornings</td>\n          <td>Significant reduction; not elimination. Combine with iron phosphate bait in high-pressure periods.</td>\n        </tr>\n        <tr>\n          <td><strong>Snails</strong></td>\n          <td><span class=\"ah-bird-tag ah-tag-duck\">Ducks</span> <span class=\"ah-bird-tag ah-tag-chicken\">Chickens</span></td>\n          <td>Free-range in cleared beds after harvest; ducks preferred for active beds</td>\n          <td>Moderate reduction. Chickens crack and eat snails; ducks swallow small ones whole.</td>\n        </tr>\n        <tr>\n          <td><strong>Earwigs</strong></td>\n          <td><span class=\"ah-bird-tag ah-tag-chicken\">Chickens</span></td>\n          <td>Scratch through leaf litter, mulch edges, and debris piles</td>\n          <td>Good reduction in exposed areas. Earwigs hide under boards; remove those first.</td>\n        </tr>\n        <tr>\n          <td><strong>Grubs and larvae</strong></td>\n          <td><span class=\"ah-bird-tag ah-tag-chicken\">Chickens</span></td>\n          <td>Let scratch through garden beds between plantings</td>\n          <td>Effective. Chickens dig aggressively for subsurface larvae including cutworm and crane fly.</td>\n        </tr>\n        <tr>\n          <td><strong>Sowbugs / Pillbugs</strong></td>\n          <td><span class=\"ah-bird-tag ah-tag-duck\">Ducks</span></td>\n          <td>Access to mulch-heavy areas and compost edges</td>\n          <td>Good reduction. Ducks root through mulch readily; sowbugs concentrate near moisture.</td>\n        </tr>\n        <tr>\n          <td><strong>Weed seeds</strong></td>\n          <td><span class=\"ah-bird-tag ah-tag-chicken\">Chickens</span></td>\n          <td>Let scratch bare soil after tillage or between seasons</td>\n          <td>Effective at reducing weed seed bank over time. Does not eliminate all weeds.</td>\n        </tr>\n        <tr>\n          <td><strong>Aphids (on low plants)</strong></td>\n          <td><span class=\"ah-bird-tag ah-tag-both\">Both</span></td>\n          <td>Limited; poultry prefer larger prey. Best via indirect benefit (eating aphid-attracting weeds).</td>\n          <td>Indirect benefit only. Use other controls for aphid infestations.</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n  <div class=\"ah-pest-footer\">\n    <span>Source: UC IPM, Snail and Slug Management; UC IPM, Sowbugs and Pillbugs; UC ANR Poultry Advisor Notes</span>\n    <span>ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["garden-flock-pest-ducks-vs-chickens"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-compare-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\n.ah-compare-header {\n  background-color: #1c3c2c;\n  padding: 22px 28px;\n  border-radius: 6px 6px 0 0;\n}\n\n.ah-compare-header h2 {\n  font-size: 1.2rem !important;\n  font-weight: 700 !important;\n  color: #f8f9f0 !important;\n  margin: 0 0 5px 0 !important;\n}\n\n.ah-compare-header p {\n  font-size: 0.84rem !important;\n  color: #dde2d8 !important;\n  margin: 0 !important;\n}\n\n.ah-compare-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  border: 1px solid #dde2d8;\n  border-top: none;\n}\n\n.ah-compare-col {\n  padding: 20px 22px;\n}\n\n.ah-compare-col:first-child {\n  border-right: 1px solid #dde2d8;\n}\n\n.ah-compare-col-title {\n  font-size: 0.95rem !important;\n  font-weight: 700 !important;\n  color: #1a3b2a !important;\n  margin: 0 0 14px 0 !important;\n  padding-bottom: 8px;\n  border-bottom: 2px solid #c9a84c;\n}\n\n.ah-compare-col ul {\n  margin: 0 !important;\n  padding: 0 0 0 16px !important;\n  list-style: none;\n}\n\n.ah-compare-col ul li {\n  font-size: 0.87rem !important;\n  color: #1a3b2a !important;\n  margin-bottom: 10px !important;\n  padding-left: 2px;\n  line-height: 1.5;\n  position: relative;\n}\n\n.ah-compare-col ul li::before {\n  content: \">\";\n  color: #c9a84c !important;\n  font-weight: 700;\n  margin-right: 8px;\n}\n\n.ah-compare-subhead {\n  font-size: 0.75rem !important;\n  font-weight: 700 !important;\n  color: #8c9c8c !important;\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  margin: 16px 0 8px 0 !important;\n}\n\n.ah-compare-footer {\n  background-color: #f8f9f0;\n  border: 1px solid #dde2d8;\n  border-top: none;\n  padding: 10px 14px;\n  font-size: 0.75rem !important;\n  color: #8c9c8c !important;\n  border-radius: 0 0 6px 6px;\n  display: flex;\n  justify-content: space-between;\n  flex-wrap: wrap;\n  gap: 4px;\n}\n\n.ah-compare-footer span {\n  color: #8c9c8c !important;\n}\n\n@media (max-width: 600px) {\n  .ah-compare-grid {\n    grid-template-columns: 1fr;\n  }\n  .ah-compare-col:first-child {\n    border-right: none;\n    border-bottom: 1px solid #dde2d8;\n  }\n  .ah-compare-header {\n    padding: 18px 16px;\n  }\n  .ah-compare-col {\n    padding: 16px 16px;\n  }\n}\n</style>\n\n<div class=\"ah-compare-wrapper\">\n  <div class=\"ah-compare-header\">\n    <h2>Ducks vs. Chickens for Coastal Garden Pest Control</h2>\n    <p>Honest comparison for Santa Cruz County conditions</p>\n  </div>\n  <div class=\"ah-compare-grid\">\n    <div class=\"ah-compare-col\">\n      <p class=\"ah-compare-col-title\">Ducks</p>\n      <p class=\"ah-compare-subhead\">Strengths</p>\n      <ul>\n        <li>Primary choice for slugs, snails, and sowbugs</li>\n        <li>Root through mulch and leaf litter without scratching</li>\n        <li>Gentler in established beds; do not dig up roots</li>\n        <li>Active in fog and damp conditions when pests are moving</li>\n        <li>Work well year-round on the coast</li>\n      </ul>\n      <p class=\"ah-compare-subhead\">Limitations</p>\n      <ul>\n        <li>Messy with water; mud near waterers</li>\n        <li>Will trample low-growing plants</li>\n        <li>Miss subsurface grubs and larvae</li>\n        <li>Less interested in weed seeds</li>\n        <li>Do not reduce snail populations to zero</li>\n      </ul>\n    </div>\n    <div class=\"ah-compare-col\">\n      <p class=\"ah-compare-col-title\">Chickens</p>\n      <p class=\"ah-compare-subhead\">Strengths</p>\n      <ul>\n        <li>Excellent for earwigs, grubs, cutworm larvae, and crane fly larvae</li>\n        <li>Dig into soil surface to find subsurface pests</li>\n        <li>Eat weed seeds and reduce seed bank over time</li>\n        <li>Effective in cleared beds between plantings</li>\n        <li>Best used with a chicken tractor for targeted work</li>\n      </ul>\n      <p class=\"ah-compare-subhead\">Limitations</p>\n      <ul>\n        <li>Scratch aggressively; will destroy seedlings</li>\n        <li>Will eat your vegetables as readily as the pests</li>\n        <li>Require fencing or close supervision in active beds</li>\n        <li>Compact soil in concentrated areas</li>\n        <li>Less effective than ducks for slug and snail control</li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"ah-compare-footer\">\n    <span>Source: UC IPM; UC ANR Small-Scale Poultry</span>\n    <span>ambitiousharvest.com</span>\n  </div>\n</div>";

\n  border-radius: 0 0 6px 6px;\n  display: flex;\n  justify-content: space-between;\n  flex-wrap: wrap;\n  gap: 4px;\n}\n\n.ah-season-footer span {\n  color: #8c9c8c !important;\n}\n\n.ah-pressure-high {\n  color: #7a2020 !important;\n  font-weight: 600 !important;\n}\n\n.ah-pressure-mod {\n  color: #705c10 !important;\n  font-weight: 600 !important;\n}\n\n.ah-pressure-low {\n  color: #2a5c3c !important;\n  font-weight: 600 !important;\n}\n\n@media (max-width: 600px) {\n  .ah-season-row,\n  .ah-season-thead {\n    grid-template-columns: 1fr;\n  }\n  .ah-season-cell,\n  .ah-season-thead-cell {\n    border-right: none;\n    border-bottom: 1px solid #dde2d8;\n    padding: 10px 14px;\n  }\n  .ah-season-cell:last-child {\n    border-bottom: none;\n  }\n  .ah-season-thead-cell:last-child {\n    border-bottom: none;\n  }\n  .ah-season-header {\n    padding: 18px 16px;\n  }\n}\n</style>\n\n<div class=\"ah-season-wrapper\">\n  <div class=\"ah-season-header\">\n    <h2>Coastal Santa Cruz Pest Pressure and Flock Deployment by Season</h2>\n    <p>When to prioritize which bird for each pest challenge</p>\n  </div>\n  <div class=\"ah-season-body\">\n    <div class=\"ah-season-thead\">\n      <div class=\"ah-season-thead-cell\">Season</div>\n      <div class=\"ah-season-thead-cell\">Peak Pest Pressure</div>\n      <div class=\"ah-season-thead-cell\">Recommended Flock Action</div>\n    </div>\n    <div class=\"ah-season-row\">\n      <div class=\"ah-season-cell ah-season-label\">Fall (Oct-Nov)</div>\n      <div class=\"ah-season-cell\"><span class=\"ah-pressure-high\">High</span> slugs, snails, earwigs; molting season reduces bird activity slightly</div>\n      <div class=\"ah-season-cell\">Priority: duck patrol on foggy mornings. Chicken tractor over cleared beds after fall harvest. Remove debris piles first.</div>\n    </div>\n    <div class=\"ah-season-row\">\n      <div class=\"ah-season-cell ah-season-label\">Winter (Dec-Feb)</div>\n      <div class=\"ah-season-cell\"><span class=\"ah-pressure-high\">High</span> slugs and snails during rains; <span class=\"ah-pressure-low\">low</span> grubs (dormant)</div>\n      <div class=\"ah-season-cell\">Ducks most active and effective. Limit chicken garden time in wet conditions (soil compaction). Monitor iron phosphate bait under boards.</div>\n    </div>\n    <div class=\"ah-season-row\">\n      <div class=\"ah-season-cell ah-season-label\">Spring (Mar-May)</div>\n      <div class=\"ah-season-cell\"><span class=\"ah-pressure-high\">High</span> across all pests as soil warms; crane fly larvae peak in Mar-Apr</div>\n      <div class=\"ah-season-cell\">Chicken tractor for grub and crane fly larvae before spring planting. Ducks in paths while new seedlings establish inside fenced beds.</div>\n    </div>\n    <div class=\"ah-season-row\">\n      <div class=\"ah-season-cell ah-season-label\">Summer (Jun-Sep)</div>\n      <div class=\"ah-season-cell\"><span class=\"ah-pressure-mod\">Moderate</span> slugs in foggy zones; <span class=\"ah-pressure-mod\">moderate</span> earwigs near irrigation</div>\n      <div class=\"ah-season-cell\">Supervised chicken access to mature beds. Ducks in morning on path edges. Focus on weed seed cleanup before beds turn over.</div>\n    </div>\n  </div>\n  <div class=\"ah-season-footer\">\n    <span>Source: UC IPM Slug and Snail Management; UC IPM Earwig; UC ANR Backyard Poultry</span>\n    <span>ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["garden-flock-tractor-sizing-table"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-tractor-sizing {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\n.ah-tractor-sizing-header {\n  background-color: #1a3b2a;\n  padding: 24px 28px 20px;\n}\n\n.ah-tractor-sizing-header h2 {\n  font-size: 1.25rem !important;\n  font-weight: 700 !important;\n  color: #f8f9f0 !important;\n  margin: 0 0 6px 0 !important;\n}\n\n.ah-tractor-sizing-header p {\n  font-size: 0.85rem !important;\n  color: #dde2d8 !important;\n  margin: 0 !important;\n}\n\n.ah-tractor-table-wrap {\n  overflow-x: auto;\n  width: 100%;\n}\n\n.ah-tractor-table {\n  width: 100%;\n  border-collapse: collapse;\n  background: #f8f9f0;\n}\n\n.ah-tractor-table thead tr {\n  background-color: #1c3c2c;\n}\n\n.ah-tractor-table thead th {\n  padding: 12px 14px;\n  text-align: left;\n  font-size: 0.78rem !important;\n  font-weight: 700 !important;\n  color: #f8f9f0 !important;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  border: none;\n}\n\n.ah-tractor-table tbody tr:nth-child(even) {\n  background-color: #edf0eb;\n}\n\n.ah-tractor-table tbody tr:nth-child(odd) {\n  background-color: #f8f9f0;\n}\n\n.ah-tractor-table tbody td {\n  padding: 11px 14px;\n  font-size: 0.88rem !important;\n  color: #1a3b2a !important;\n  border-bottom: 1px solid #dde2d8;\n  vertical-align: top;\n}\n\n.ah-tractor-table tbody td:first-child {\n  font-weight: 700 !important;\n  color: #1c3c2c !important;\n}\n\n.ah-tractor-note {\n  background: #dde2d8;\n  padding: 12px 16px;\n}\n\n.ah-tractor-note p {\n  font-size: 0.78rem !important;\n  color: #1a3b2a !important;\n  margin: 0 !important;\n  line-height: 1.5;\n}\n\n.ah-tractor-footer {\n  background: #1a3b2a;\n  padding: 8px 16px;\n  text-align: right;\n}\n\n.ah-tractor-footer span {\n  font-size: 0.72rem !important;\n  color: #dde2d8 !important;\n}\n\n@media (max-width: 600px) {\n  .ah-tractor-sizing-header {\n    padding: 18px 16px 14px;\n  }\n  .ah-tractor-sizing-header h2 {\n    font-size: 1.05rem !important;\n  }\n  .ah-tractor-table thead th,\n  .ah-tractor-table tbody td {\n    padding: 9px 10px;\n    font-size: 0.80rem !important;\n  }\n}\n</style>\n\n<div class=\"ah-tractor-sizing\">\n  <div class=\"ah-tractor-sizing-header\">\n    <h2>Chicken Tractor Sizing and Stocking Guide</h2>\n    <p>For small Santa Cruz County lots. Move every 1 to 3 days to prevent overgrazing.</p>\n  </div>\n  <div class=\"ah-tractor-table-wrap\">\n    <table class=\"ah-tractor-table\">\n      <thead>\n        <tr>\n          <th>Tractor Footprint</th>\n          <th>Run Sq. Ft.</th>\n          <th>Standard Birds</th>\n          <th>Bantam Birds</th>\n          <th>Move Frequency</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>4 x 6 ft</td>\n          <td>24 sq ft</td>\n          <td>2 birds</td>\n          <td>3 to 4 birds</td>\n          <td>Daily</td>\n        </tr>\n        <tr>\n          <td>4 x 8 ft</td>\n          <td>32 sq ft</td>\n          <td>3 birds</td>\n          <td>4 to 5 birds</td>\n          <td>Every 1 to 2 days</td>\n        </tr>\n        <tr>\n          <td>4 x 12 ft</td>\n          <td>48 sq ft</td>\n          <td>4 to 5 birds</td>\n          <td>6 to 8 birds</td>\n          <td>Every 2 to 3 days</td>\n        </tr>\n        <tr>\n          <td>5 x 10 ft</td>\n          <td>50 sq ft</td>\n          <td>5 birds</td>\n          <td>7 to 8 birds</td>\n          <td>Every 2 to 3 days</td>\n        </tr>\n        <tr>\n          <td>6 x 12 ft</td>\n          <td>72 sq ft</td>\n          <td>6 to 7 birds</td>\n          <td>10 to 12 birds</td>\n          <td>Every 3 to 4 days</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n  <div class=\"ah-tractor-note\">\n    <p>Minimum 10 sq ft per standard bird, 5 to 6 sq ft per bantam for a tractor moved every 1 to 2 days. Allow 15 sq ft per standard bird if moving less frequently. Source: Virginia Cooperative Extension, Small-Scale Poultry Housing.</p>\n  </div>\n  <div class=\"ah-tractor-footer\">\n    <span>ambitiousharvest.com | Santa Cruz and Bay Area Gardening</span>\n  </div>\n</div>";

window.AH_GRAPHICS["garden-flock-tractor-rotation-card"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-rotation-card {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\n.ah-rotation-header {\n  background-color: #1a3b2a;\n  padding: 22px 28px 18px;\n}\n\n.ah-rotation-header h2 {\n  font-size: 1.2rem !important;\n  font-weight: 700 !important;\n  color: #f8f9f0 !important;\n  margin: 0 0 5px 0 !important;\n}\n\n.ah-rotation-header p {\n  font-size: 0.83rem !important;\n  color: #dde2d8 !important;\n  margin: 0 !important;\n}\n\n.ah-rotation-body {\n  background: #f8f9f0;\n  padding: 22px 28px;\n}\n\n.ah-rotation-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 16px;\n  margin-bottom: 20px;\n}\n\n.ah-rotation-phase {\n  background: #fff;\n  border-left: 4px solid #1a3b2a;\n  padding: 14px 16px;\n}\n\n.ah-rotation-phase.ah-accent {\n  border-left-color: #c9a84c;\n}\n\n.ah-rotation-phase h3 {\n  font-size: 0.82rem !important;\n  font-weight: 700 !important;\n  color: #1a3b2a !important;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n  margin: 0 0 6px 0 !important;\n}\n\n.ah-rotation-phase p {\n  font-size: 0.82rem !important;\n  color: #1a3b2a !important;\n  margin: 0 !important;\n  line-height: 1.55;\n}\n\n.ah-rotation-timeline {\n  background: #dde2d8;\n  border-radius: 4px;\n  padding: 14px 16px;\n}\n\n.ah-rotation-timeline h3 {\n  font-size: 0.82rem !important;\n  font-weight: 700 !important;\n  color: #1a3b2a !important;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n  margin: 0 0 10px 0 !important;\n}\n\n.ah-rotation-row {\n  display: flex;\n  align-items: flex-start;\n  gap: 10px;\n  margin-bottom: 7px;\n}\n\n.ah-rotation-row:last-child {\n  margin-bottom: 0;\n}\n\n.ah-rotation-dot {\n  width: 10px;\n  height: 10px;\n  background: #1a3b2a;\n  border-radius: 50%;\n  flex-shrink: 0;\n  margin-top: 4px;\n}\n\n.ah-rotation-row p {\n  font-size: 0.82rem !important;\n  color: #1a3b2a !important;\n  margin: 0 !important;\n  line-height: 1.5;\n}\n\n.ah-rotation-footer {\n  background: #1a3b2a;\n  padding: 8px 16px;\n  text-align: right;\n}\n\n.ah-rotation-footer span {\n  font-size: 0.72rem !important;\n  color: #dde2d8 !important;\n}\n\n@media (max-width: 600px) {\n  .ah-rotation-header {\n    padding: 16px 16px 12px;\n  }\n  .ah-rotation-header h2 {\n    font-size: 1.05rem !important;\n  }\n  .ah-rotation-grid {\n    grid-template-columns: 1fr;\n    gap: 12px;\n  }\n  .ah-rotation-body {\n    padding: 16px;\n  }\n  .ah-rotation-phase p,\n  .ah-rotation-timeline h3,\n  .ah-rotation-row p {\n    font-size: 0.80rem !important;\n  }\n}\n</style>\n\n<div class=\"ah-rotation-card\">\n  <div class=\"ah-rotation-header\">\n    <h2>Garden Tractor Rotation at a Glance</h2>\n    <p>A simple 3-zone system for small Santa Cruz gardens. Rotate the tractor one zone forward every 1 to 2 weeks.</p>\n  </div>\n  <div class=\"ah-rotation-body\">\n    <div class=\"ah-rotation-grid\">\n      <div class=\"ah-rotation-phase\">\n        <h3>Zone 1: Birds Working Now</h3>\n        <p>Tractor is here. Birds forage, scratch, and manure the bed. Move every 1 to 2 days. Keep off active plant roots.</p>\n      </div>\n      <div class=\"ah-rotation-phase ah-accent\">\n        <h3>Zone 2: Resting (2 Weeks)</h3>\n        <p>Birds just left. Manure breaking down. Wait 2 weeks before direct seeding; transplants can go in after 2 weeks.</p>\n      </div>\n      <div class=\"ah-rotation-phase\">\n        <h3>Zone 3: Active Growing</h3>\n        <p>Off-limits to birds. This is your current crop bed. Tractor will return here after harvest for fall cleanup.</p>\n      </div>\n      <div class=\"ah-rotation-phase ah-accent\">\n        <h3>Orchard Aisles</h3>\n        <p>Move the tractor along tree rows in fall and late winter. One pass per aisle per season is enough for pest cleanup.</p>\n      </div>\n    </div>\n    <div class=\"ah-rotation-timeline\">\n      <h3>Santa Cruz Season Timing</h3>\n      <div class=\"ah-rotation-row\">\n        <div class=\"ah-rotation-dot\"></div>\n        <p><strong>Feb to Mar:</strong> Run birds through summer beds before tomato and squash transplants go in.</p>\n      </div>\n      <div class=\"ah-rotation-row\">\n        <div class=\"ah-rotation-dot\"></div>\n        <p><strong>Oct to Nov:</strong> After warm-season harvest, run birds through cleared beds before cool-season planting.</p>\n      </div>\n      <div class=\"ah-rotation-row\">\n        <div class=\"ah-rotation-dot\"></div>\n        <p><strong>Year-round:</strong> Weekly or biweekly circuit through orchard aisles for ongoing pest suppression.</p>\n      </div>\n    </div>\n  </div>\n  <div class=\"ah-rotation-footer\">\n    <span>ambitiousharvest.com | Santa Cruz and Bay Area Gardening</span>\n  </div>\n</div>";

window.AH_GRAPHICS["garden-flock-slv-challenge-table"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n.ah-slv-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n.ah-slv-header {\n  background-color: #1a3b2a;\n  padding: 24px 28px;\n  border-radius: 6px 6px 0 0;\n}\n.ah-slv-header h2 {\n  font-size: 1.3rem;\n  font-weight: 700;\n  color: #f8f9f0 !important;\n  margin: 0 0 6px 0;\n}\n.ah-slv-header p {\n  font-size: 0.85rem;\n  color: #dde2d8 !important;\n  margin: 0;\n}\n.ah-slv-table-wrap {\n  overflow-x: auto;\n  border: 1px solid #dde2d8;\n  border-top: none;\n  border-radius: 0 0 6px 6px;\n}\n.ah-slv-table {\n  width: 100%;\n  border-collapse: collapse;\n  font-size: 0.88rem;\n  min-width: 520px;\n}\n.ah-slv-table thead tr {\n  background-color: #1c3c2c;\n}\n.ah-slv-table thead th {\n  color: #f8f9f0 !important;\n  font-weight: 700;\n  padding: 12px 14px;\n  text-align: left;\n  font-size: 0.82rem;\n  letter-spacing: 0.03em;\n  text-transform: uppercase;\n}\n.ah-slv-table tbody tr:nth-child(odd) {\n  background-color: #f8f9f0;\n}\n.ah-slv-table tbody tr:nth-child(even) {\n  background-color: #eef0eb;\n}\n.ah-slv-table tbody td {\n  color: #1a3b2a !important;\n  padding: 12px 14px;\n  vertical-align: top;\n  border-bottom: 1px solid #dde2d8;\n  line-height: 1.5;\n}\n.ah-slv-table tbody td:first-child {\n  font-weight: 700;\n  white-space: nowrap;\n}\n.ah-slv-source {\n  font-size: 0.75rem;\n  color: #8c9c8c !important;\n  padding: 8px 14px 4px;\n}\n.ah-slv-footer {\n  text-align: right;\n  font-size: 0.72rem;\n  color: #8c9c8c !important;\n  padding: 4px 14px 12px;\n  font-style: italic;\n}\n@media (max-width: 600px) {\n  .ah-slv-header { padding: 18px 16px; }\n  .ah-slv-header h2 { font-size: 1.1rem; }\n  .ah-slv-table thead th, .ah-slv-table tbody td { padding: 10px 10px; font-size: 0.82rem; }\n}\n</style>\n<div class=\"ah-slv-wrapper\">\n  <div class=\"ah-slv-header\">\n    <h2>San Lorenzo Valley: Challenge, Cause, and What to Do</h2>\n    <p>Common flock health and management issues specific to the redwood canyon environment</p>\n  </div>\n  <div class=\"ah-slv-table-wrap\">\n    <table class=\"ah-slv-table\">\n      <thead>\n        <tr>\n          <th>Challenge</th>\n          <th>Why It Happens Here</th>\n          <th>What to Do</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>Respiratory infection</td>\n          <td>Persistent damp air plus ammonia from wet bedding irritates airways</td>\n          <td>Maximize roofline ventilation year-round; change bedding before it smells; deep litter in dry weather only</td>\n        </tr>\n        <tr>\n          <td>Bumblefoot</td>\n          <td>Chronic mud softens foot pads and allows bacterial entry</td>\n          <td>Cover or elevate run areas; use gravel or sand aprons near feeders; check feet weekly in wet months</td>\n        </tr>\n        <tr>\n          <td>Aspergillosis (mold lung)</td>\n          <td>Redwood shade and dampness promote Aspergillus growth in bedding and wood</td>\n          <td>Never use damp or musty bedding; allow strong airflow; replace coop floor material after each major rain event</td>\n        </tr>\n        <tr>\n          <td>Reduced winter laying</td>\n          <td>Redwood canopy limits natural light to 4-6 hrs/day in January in some locations</td>\n          <td>Add a low-watt LED on a timer to reach 14-15 hrs total; position coop or run in any clearing available</td>\n        </tr>\n        <tr>\n          <td>Acidic soil</td>\n          <td>Redwood duff drives soil pH below 5.0 in many SLV yards</td>\n          <td>Test pH; apply agricultural lime to run areas to bring soil above 6.0; avoid letting birds forage in pure duff</td>\n        </tr>\n        <tr>\n          <td>Mud and run saturation</td>\n          <td>47+ inches of annual rain with clay-heavy hillside soils</td>\n          <td>Install covered runs; use deep wood chips or coarse sand over hardware cloth ground liner; create roof overhang over feeders</td>\n        </tr>\n        <tr>\n          <td>Power outage mid-winter</td>\n          <td>PG&amp;E lines through forested canyon are first to fail in storms</td>\n          <td>No heat lamp reliance; use cold-hardy breeds; keep a battery-powered light for safety; prep water supply before storms</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n  <div class=\"ah-slv-source\">Sources: UC Agriculture and Natural Resources poultry guidance; San Lorenzo Valley Water District rainfall data</div>\n  <div class=\"ah-slv-footer\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-slv-storm-prep"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n.ah-storm-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n.ah-storm-header {\n  background-color: #1c3c2c;\n  padding: 24px 28px;\n  border-radius: 6px 6px 0 0;\n}\n.ah-storm-header h2 {\n  font-size: 1.3rem;\n  font-weight: 700;\n  color: #f8f9f0 !important;\n  margin: 0 0 6px 0;\n}\n.ah-storm-header p {\n  font-size: 0.85rem;\n  color: #dde2d8 !important;\n  margin: 0;\n}\n.ah-storm-body {\n  border: 1px solid #dde2d8;\n  border-top: none;\n  border-radius: 0 0 6px 6px;\n  background-color: #f8f9f0;\n  padding: 0 0 8px;\n}\n.ah-storm-section-label {\n  background-color: #dde2d8;\n  padding: 8px 20px;\n  font-size: 0.75rem;\n  font-weight: 700;\n  color: #1a3b2a !important;\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n  margin: 16px 0 0;\n}\n.ah-storm-item {\n  display: flex;\n  align-items: flex-start;\n  gap: 12px;\n  padding: 10px 20px;\n  border-bottom: 1px solid #dde2d8;\n  font-size: 0.88rem;\n  color: #1a3b2a !important;\n  line-height: 1.5;\n}\n.ah-storm-item:last-child {\n  border-bottom: none;\n}\n.ah-storm-check {\n  flex-shrink: 0;\n  width: 18px;\n  height: 18px;\n  border: 2px solid #1a3b2a;\n  border-radius: 3px;\n  margin-top: 1px;\n}\n.ah-storm-source {\n  font-size: 0.75rem;\n  color: #8c9c8c !important;\n  padding: 8px 20px 2px;\n}\n.ah-storm-footer {\n  text-align: right;\n  font-size: 0.72rem;\n  color: #8c9c8c !important;\n  padding: 4px 20px 10px;\n  font-style: italic;\n}\n@media (max-width: 600px) {\n  .ah-storm-header { padding: 18px 16px; }\n  .ah-storm-header h2 { font-size: 1.1rem; }\n  .ah-storm-item { padding: 10px 14px; font-size: 0.84rem; }\n  .ah-storm-section-label { padding: 8px 14px; }\n}\n</style>\n<div class=\"ah-storm-wrapper\">\n  <div class=\"ah-storm-header\">\n    <h2>SLV Winter Storm Prep Checklist</h2>\n    <p>Complete before the first atmospheric river of the season (typically October through November)</p>\n  </div>\n  <div class=\"ah-storm-body\">\n    <div class=\"ah-storm-section-label\">Coop and Housing</div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Inspect and patch any roof gaps or rot where rain can enter</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Clear gutters and roof drains above or adjacent to the coop</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Restock dry bedding (pine shavings, straw) so you can swap quickly after a prolonged rain event</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Confirm roofline vents are open and unobstructed for ammonia to escape</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Remove any heat lamps or heat sources that depend on power (plan for outages)</span></div>\n    <div class=\"ah-storm-section-label\">Run and Drainage</div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Top off wood chip layer in covered run to at least 4 inches depth</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Check gravel apron at coop entrance; add material if compacted or muddy</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Confirm run roof is intact and draining away from the run interior</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Redirect any downspouts that currently drain toward run or coop</span></div>\n    <div class=\"ah-storm-section-label\">Feed and Water</div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Move feeders fully inside covered run or coop to keep feed dry</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Stock 2-week supply of feed in rodent-proof metal containers</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Fill a separate water container as backup in case of outage affecting pump or pressure</span></div>\n    <div class=\"ah-storm-section-label\">Power Outage</div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Confirm no flock survival depends on electricity (heat lamps, automatic door openers)</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Battery-powered lantern or headlamp accessible near the coop for evening checks during outage</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Note PG&amp;E outage reporting number and nearest neighbor who can help if you are away</span></div>\n    <div class=\"ah-storm-section-label\">Predators</div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Inspect all hardware cloth for tears, gaps, or rust; repair before storms make it difficult to work outside</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Test all door latches and locks while the weather is still good</span></div>\n    <div class=\"ah-storm-item\"><div class=\"ah-storm-check\"></div><span>Plan for an earlier evening lockup as days shorten (coop door before dusk, not after)</span></div>\n  </div>\n  <div class=\"ah-storm-source\">Adapted from: UC Agriculture and Natural Resources poultry guidance; PG&amp;E outage preparedness resources</div>\n  <div class=\"ah-storm-footer\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-slv-breed-comparison"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n.ah-breed-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n.ah-breed-header {\n  background-color: #1a3b2a;\n  padding: 24px 28px;\n  border-radius: 6px 6px 0 0;\n}\n.ah-breed-header h2 {\n  font-size: 1.3rem;\n  font-weight: 700;\n  color: #f8f9f0 !important;\n  margin: 0 0 6px 0;\n}\n.ah-breed-header p {\n  font-size: 0.85rem;\n  color: #dde2d8 !important;\n  margin: 0;\n}\n.ah-breed-grid {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 0;\n  border: 1px solid #dde2d8;\n  border-top: none;\n  border-radius: 0 0 6px 6px;\n  overflow: hidden;\n}\n.ah-breed-card {\n  padding: 18px 20px;\n  border-right: 1px solid #dde2d8;\n  border-bottom: 1px solid #dde2d8;\n  background-color: #f8f9f0;\n}\n.ah-breed-card:nth-child(even) {\n  border-right: none;\n  background-color: #eef0eb;\n}\n.ah-breed-card:nth-last-child(-n+2) {\n  border-bottom: none;\n}\n.ah-breed-name {\n  font-size: 0.92rem;\n  font-weight: 700;\n  color: #1a3b2a !important;\n  margin: 0 0 4px;\n}\n.ah-breed-tag {\n  display: inline-block;\n  font-size: 0.72rem;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  padding: 2px 7px;\n  border-radius: 3px;\n  margin-bottom: 8px;\n}\n.ah-tag-yes {\n  background-color: #1c3c2c;\n  color: #f8f9f0 !important;\n}\n.ah-tag-caution {\n  background-color: #c9a84c;\n  color: #1a3b2a !important;\n}\n.ah-tag-avoid {\n  background-color: #8c9c8c;\n  color: #f8f9f0 !important;\n}\n.ah-breed-notes {\n  font-size: 0.83rem;\n  color: #1a3b2a !important;\n  line-height: 1.5;\n  margin: 0;\n}\n.ah-breed-source {\n  font-size: 0.75rem;\n  color: #8c9c8c !important;\n  padding: 8px 20px 2px;\n  border-top: 1px solid #dde2d8;\n}\n.ah-breed-footer {\n  text-align: right;\n  font-size: 0.72rem;\n  color: #8c9c8c !important;\n  padding: 4px 20px 10px;\n  font-style: italic;\n}\n@media (max-width: 600px) {\n  .ah-breed-header { padding: 18px 16px; }\n  .ah-breed-header h2 { font-size: 1.1rem; }\n  .ah-breed-grid { grid-template-columns: 1fr; }\n  .ah-breed-card { border-right: none; border-bottom: 1px solid #dde2d8; background-color: #f8f9f0; }\n  .ah-breed-card:nth-child(even) { background-color: #eef0eb; }\n  .ah-breed-card:nth-last-child(-n+2) { border-bottom: 1px solid #dde2d8; }\n  .ah-breed-card:last-child { border-bottom: none; }\n  .ah-breed-card { padding: 14px 14px; }\n}\n</style>\n<div class=\"ah-breed-wrapper\">\n  <div class=\"ah-breed-header\">\n    <h2>Breed Suitability for the San Lorenzo Valley</h2>\n    <p>Ratings based on cold hardiness, foot health in mud, disease resistance, and confinement tolerance</p>\n  </div>\n  <div class=\"ah-breed-grid\">\n    <div class=\"ah-breed-card\">\n      <p class=\"ah-breed-name\">Barred Plymouth Rock</p>\n      <span class=\"ah-breed-tag ah-tag-yes\">Good Fit</span>\n      <p class=\"ah-breed-notes\">Hardy, tight feathering, calm in confined runs, consistent winter layers. One of the most reliable heritage breeds for damp coastal conditions.</p>\n    </div>\n    <div class=\"ah-breed-card\">\n      <p class=\"ah-breed-name\">Black Australorp</p>\n      <span class=\"ah-breed-tag ah-tag-yes\">Good Fit</span>\n      <p class=\"ah-breed-notes\">Excellent egg production, cold-tolerant, docile. Tolerates confinement without becoming stressed. Tight feathering handles wet weather well.</p>\n    </div>\n    <div class=\"ah-breed-card\">\n      <p class=\"ah-breed-name\">Speckled Sussex</p>\n      <span class=\"ah-breed-tag ah-tag-yes\">Good Fit</span>\n      <p class=\"ah-breed-notes\">Curious, active forager, cold-hardy. Good layer through winter with supplemental light. Developed in a damp English climate.</p>\n    </div>\n    <div class=\"ah-breed-card\">\n      <p class=\"ah-breed-name\">Wyandotte</p>\n      <span class=\"ah-breed-tag ah-tag-yes\">Good Fit</span>\n      <p class=\"ah-breed-notes\">Rose comb (less frostbite risk), excellent cold tolerance, calm and manageable. Good layer and handles mud better than many heavy breeds.</p>\n    </div>\n    <div class=\"ah-breed-card\">\n      <p class=\"ah-breed-name\">Khaki Campbell (duck)</p>\n      <span class=\"ah-breed-tag ah-tag-yes\">Good Fit</span>\n      <p class=\"ah-breed-notes\">Outstanding layer, cold-tolerant, active forager for slugs and insects. Thrives in wet conditions by nature. Quieter than Pekins.</p>\n    </div>\n    <div class=\"ah-breed-card\">\n      <p class=\"ah-breed-name\">Easter Egger</p>\n      <span class=\"ah-breed-tag ah-tag-yes\">Good Fit</span>\n      <p class=\"ah-breed-notes\">Hardier than many people expect, adaptable to varied conditions, pea comb. Production slows in low light but health holds up in damp conditions.</p>\n    </div>\n    <div class=\"ah-breed-card\">\n      <p class=\"ah-breed-name\">Cochin (heavy feathered foot)</p>\n      <span class=\"ah-breed-tag ah-tag-avoid\">Avoid</span>\n      <p class=\"ah-breed-notes\">Feathered feet cake with mud and wet debris in SLV winters, creating ideal conditions for bumblefoot and foot rot. Not recommended for this environment.</p>\n    </div>\n    <div class=\"ah-breed-card\">\n      <p class=\"ah-breed-name\">Brahma (heavy feathered foot)</p>\n      <span class=\"ah-breed-tag ah-tag-avoid\">Avoid</span>\n      <p class=\"ah-breed-notes\">Same issue as Cochins. Lovely birds in dry climates, but the foot feathering is a consistent problem in the SLV's prolonged mud season.</p>\n    </div>\n    <div class=\"ah-breed-card\">\n      <p class=\"ah-breed-name\">Leghorn</p>\n      <span class=\"ah-breed-tag ah-tag-caution\">Caution</span>\n      <p class=\"ah-breed-notes\">Excellent production in warm dry climates; high-strung and cold-sensitive. Large comb is frostbite-prone on rare cold nights. Fine in summer, less ideal in SLV winters.</p>\n    </div>\n    <div class=\"ah-breed-card\">\n      <p class=\"ah-breed-name\">Silkie</p>\n      <span class=\"ah-breed-tag ah-tag-caution\">Caution</span>\n      <p class=\"ah-breed-notes\">Non-waterproof feathering gets soaked and stays wet. Can chill quickly in SLV conditions. Requires a very dry coop and covered run. Not beginner-friendly here.</p>\n    </div>\n  </div>\n  <div class=\"ah-breed-source\">Sources: UC Agriculture and Natural Resources poultry guidance; The Livestock Conservancy breed profiles</div>\n  <div class=\"ah-breed-footer\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-feed-options"] = "<div class=\"ah-feed-wrapper\">\n<style>\n.ah-feed-table-scroll { overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; }\n.ah-feed-table { width: 100% !important; border-collapse: collapse !important; font-family: 'Montserrat', sans-serif !important; min-width: 560px !important; }\n.ah-feed-table caption { color: #1a3b2a !important; font-size: 22px !important; font-weight: 700 !important; margin-bottom: 16px !important; }\n.ah-feed-table th { background: #1a3b2a !important; color: #f8f9f0 !important; font-size: 13px !important; font-weight: 600 !important; text-align: left !important; padding: 11px 12px !important; }\n.ah-feed-table td { background: #ffffff !important; color: #1a3b2a !important; font-size: 13px !important; padding: 11px 12px !important; border-bottom: 1px solid #dde2d8 !important; vertical-align: top !important; line-height: 1.4 !important; }\n.ah-feed-table tr:nth-child(even) td { background: #f8f9f0 !important; }\n.ah-feed-table td:first-child { font-weight: 600 !important; color: #b8694a !important; }\n</style>\n<div class=\"ah-feed-table-scroll\">\n<table class=\"ah-feed-table\">\n<caption>Chick-Buying Options Compared</caption>\n<thead>\n<tr><th>Option</th><th>Best for</th><th>Selection</th><th>Trade-off</th></tr>\n</thead>\n<tbody>\n<tr><td>Feed-store chick days</td><td>First-timers wanting same-day, in-person buying</td><td>Common breeds, varies weekly</td><td>Sells out fast, limited rare breeds</td></tr>\n<tr><td>Local breeder</td><td>Hardy, climate-suited birds and expert guidance</td><td>Heritage and rare, small batches</td><td>By appointment, limited stock</td></tr>\n<tr><td>Started-pullet delivery</td><td>Skipping the brooder, eggs sooner</td><td>Common laying breeds</td><td>Higher cost, route scheduling</td></tr>\n<tr><td>Shipping hatchery</td><td>Widest breed choice</td><td>Nearly any breed</td><td>Shipping stress, minimum orders</td></tr>\n<tr><td>Shelter adoption</td><td>Giving a hen a home, possible instant eggs</td><td>Whatever is available</td><td>Unpredictable, quarantine a must</td></tr>\n</tbody>\n</table>\n</div>\n<div class=\"ah-feed-footer\">ambitiousharvest.com</div>\n</div>";
