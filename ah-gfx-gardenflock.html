solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Khaki Campbell</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Duck</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">250-340</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Active, skittish</td>\n                    <td style=\"padding: 10px 12px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Excellent</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Top egg production, slug control</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Welsh Harlequin</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Duck</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">240-330</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Calm, easy to handle</td>\n                    <td style=\"padding: 10px 12px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Excellent</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Beginners, heritage conservation</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Indian Runner</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Duck</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">200-300</td>\n                    <td round-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Egg counts are annual estimates for healthy birds in coastal California conditions. Duck eggs are larger and richer than chicken eggs. Geese are seasonal layers (spring only).\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Sources: UC Davis Poultry Extension, The Livestock Conservancy breed profiles\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-run-design-diagram"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Enclosed Run Layout (35 ft x 15 ft)</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Recommended design for a mixed flock with chickens, ducks, and geese</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <!-- Run diagram -->\n        <div style=\"position: relative; width: 100%; max-width: 700px; margin: 0 auto; aspect-ratio: 35/15; border: 3px solid #1a3b2a; background-color: #e8e2d4 !important; overflow: hidden;\">\n            <!-- Hardware cloth label -->\n            <div style=\"position: absolute; top: -1px; left: 50%; transform: translateX(-50%); background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 12px; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.5px;\">HARDWARE CLOTH WALLS + CEILING</div>\n            <!-- Coop -->\n            <div style=\"position: absolute; top: 8%; left: 3%; width: 25%; height: 55%; background-color: #2d5a3d !important; border: 2px solid #1a3b2a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px;\">\n                <span style=\"font-weight: 700; font-size: 0.8rem; color: #f8f9f0 !important; text-align: center;\">COOP</span>\n                <span style=\"font-size: 0.6rem; color: #f8f9f0 !important; text-align: center; margin-top: 4px;\">Roosting bars</span>\n                <span style=\"font-size: 0.6rem; color: #f8f9f0 !important; text-align: center;\">Nesting boxes</span>\n                <span style=\"font-size: 0.6rem; color: #f8f9f0 !important; text-align: center;\">Pop door</span>\n            </div>\n            <!-- Duck shelter -->\n            <div style=\"position: absolute; top: 8%; right: 3%; width: 20%; height: 35%; background-color: #4a7a5a !important; border: 2px solid #1a3b2a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px;\">\n                <span style=\"font-weight: 700; font-size: 0.7rem; color: #f8f9f0 !important; text-align: center;\">DUCK SHELTER</span>\n                <span style=\"font-size: 0.55rem; color: #f8f9f0 !important; text-align: center; margin-top: 3px;\">Floor-level entry</span>\n                <span style=\"font-size: 0.55rem; color: #f8f9f0 !important; text-align: center;\">Straw bedding</span>\n            </div>\n            <!-- Duck pond -->\n            <div style=\"position: absolute; bottom: 10%; right: 3%; width: 22%; height: 32%; background-color: #7fb5c9 !important; border: 2px solid #5a8fa3; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;\">\n                <span style=\"font-weight: 700; font-size: 0.7rem; color: #1a3b2a !important;\">DUCK POND</span>\n                <span style=\"font-size: 0.55rem; color: #1a3b2a !important;\">Kiddie pool or</span>\n                <span style=\"font-size: 0.55rem; color: #1a3b2a !important;\">sunken tub</span>\n            </div>\n            <!-- Dust bath -->\n            <div style=\"position: absolute; bottom: 10%; left: 3%; width: 18%; height: 25%; background-color: #c9b896 !important; border: 2px dashed #a89670; display: flex; flex-direction: column; align-items: center; justify-content: center;\">\n                <span style=\"font-weight: 700; font-size: 0.65rem; color: #1a3b2a !important;\">DUST BATH</span>\n                <span style=\"font-size: 0.5rem; color: #1a3b2a !important;\">Sand + DE mix</span>\n            </div>\n            <!-- Feed station -->\n            <div style=\"position: absolute; top: 50%; left: 35%; transform: translateY(-50%); width: 16%; height: 20%; background-color: #dde2d8 !important; border: 2px solid #8c9c8c; display: flex; flex-direction: column; align-items: center; justify-content: center;\">\n                <span style=\"font-weight: 700; font-size: 0.6rem; color: #1a3b2a !important;\">FEED</span>\n                <span style=\"font-size: 0.5rem; color: #1a3b2a !important;\">Covered station</span>\n            </div>\n            <!-- Open foraging area label -->\n            <div style=\"position: absolute; top: 42%; left: 55%; transform: translate(-10%, -50%);\">\n                <span style=\"font-size: 0.65rem; color: #8c9c8c !important; font-style: italic;\">Open foraging area</span>\n            </div>\n            <!-- Gate -->\n            <div style=\"position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 14px; font-size: 0.6rem; font-weight: 600;\">GATE</div>\n        </div>\n        <!-- Space requirements -->\n        <div style=\"margin-top: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 15px; text-align: center;\">\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #1a3b2a !important; margin-bottom: 8px;\">Chickens</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-bottom: 4px;\"><strong>Coop:</strong> 4 sq ft per bird</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\"><strong>Run:</strong> 10 sq ft per bird</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 15px; text-align: center;\">\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #1a3b2a !important; margin-bottom: 8px;\">Ducks</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-bottom: 4px;\"><strong>Shelter:</strong> 6 sq ft per bird</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\"><strong>Run:</strong> 15 sq ft per bird</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 15px; text-align: center;\">\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #1a3b2a !important; margin-bottom: 8px;\">Geese</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-bottom: 4px;\"><strong>Shelter:</strong> 10 sq ft per bird</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\"><strong>Run:</strong> 20 sq ft per bird</div>\n            </div>\n        </div>\n        <!-- Key features note -->\n        <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin-top: 20px; border-radius: 0;\">\n            <strong style=\"display: block; margin-bottom: 5px; color: #1a3b2a !important; font-size: 0.9rem;\">Key Design Features</strong>\n            <ul style=\"margin: 0; padding-left: 18px; font-size: 0.8rem; color: #1c3c2c !important; line-height: 1.8;\">\n                <li style=\"color: #1c3c2c !important;\">Hardware cloth (1/2 inch) on all walls and ceiling to exclude predators (raccoons, hawks, foxes)</li>\n                <li style=\"color: #1c3c2c !important;\">Buried apron: 12 inches of hardware cloth extending outward underground to stop digging predators</li>\n                <li style=\"color: #1c3c2c !important;\">Covered feed station prevents rain and wild bird contamination</li>\n                <li style=\"color: #1c3c2c !important;\">Duck pond placed away from coop to keep bedding dry</li>\n                <li style=\"color: #1c3c2c !important;\">Dust bath in a covered, dry corner (chickens need this for parasite prevention)</li>\n            </ul>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC ANR Poultry Housing Guidelines, Publication 8514\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-brooder-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Brooder Setup Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Everything you need for chicks and ducklings from day one</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <!-- Equipment Section -->\n        <div style=\"margin-bottom: 25px;\">\n            <div style=\"background-color: #2d5a3d !important; color: #f8f9f0 !important; padding: 10px 15px; font-weight: 700; font-size: 0.95rem; margin-bottom: 0;\">Equipment Needed</div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-top: none; padding: 18px;\">\n                <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 8px;\">\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Brooder container (large storage tub, stock tank, or brooder box)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Heat source (heat plate preferred over heat lamp for safety)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Thermometer (placed at chick height, not near heat source)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Bedding (pine shavings, not cedar; paper towels for week one)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Waterer (chick-sized; add marbles for ducklings to prevent drowning)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Feeder (shallow trough or chick feeder)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Wire mesh lid (once birds can hop, usually by week 2-3)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Electrolyte supplement (for first 3 days, especially after shipping)</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <!-- Temperature Schedule -->\n        <div style=\"margin-bottom: 25px;\">\n            <div style=\"background-color: #2d5a3d !important; color: #f8f9f0 !important; padding: 10px 15px; font-weight: 700; font-size: 0.95rem; margin-bottom: 0;\">Temperature Schedule</div>\n            <table style=\"width: 100%; border-collapse: collapse;\">\n                <thead>\n                    <tr>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Week</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Temperature</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">What to Watch For</th>\n                    </tr>\n                </thead>\n                <tbody>\n                    <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                        <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Week 1</td>\n                        <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600;\">95F</td>\n                        <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Huddling = too cold. Panting or spreading away = too hot.</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                        <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Week 2</td>\n                        <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600;\">90F</td>\n                        <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Wing feathers starting. Ducklings grow fast, may need more space.</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                        <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Week 3</td>\n                        <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600;\">85F</td>\n                        <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Body feathers filling in. Add small roost for chicks.</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                        <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Week 4</td>\n                        <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600;\">80F</td>\n                        <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Supervised outdoor time on warm days (above 65F).</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                        <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Week 5</td>\n                        <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600;\">75F</td>\n                        <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Nearly fully feathered. Transition to unheated area if above 65F.</td>\n                    </tr>\n                    <tr>\n                        <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Week 6+</td>\n                        <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600;\">70F</td>\n                        <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Fully feathered chicks ready for coop. Ducklings may be ready by week 4-5.</td>\n                    </tr>\n                </tbody>\n            </table>\n        </div>\n        <!-- Feed Requirements -->\n        <div style=\"margin-bottom: 25px;\">\n            <div style=\"background-color: #2d5a3d !important; color: #f8f9f0 !important; padding: 10px 15px; font-weight: 700; font-size: 0.95rem; margin-bottom: 0;\">Feed Requirements</div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-top: none; padding: 18px;\">\n                <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n                    <div style=\"border: 1px solid #dde2d8; padding: 15px;\">\n                        <div style=\"font-weight: 700; font-size: 0.9rem; color: #1a3b2a !important; margin-bottom: 10px;\">Chicks (Chickens)</div>\n                        <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 4px 0;\">\n                            <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                            <span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Chick starter feed (18-20% protein) for weeks 1-8</span>\n                        </div>\n                        <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 4px 0;\">\n                            <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                            <span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Medicated feed is fine for chicks (prevents coccidiosis)</span>\n                        </div>\n                        <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 4px 0;\">\n                            <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                            <span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Chick grit after week 2 if offering treats</span>\n                        </div>\n                    </div>\n                    <div style=\"border: 1px solid #dde2d8; padding: 15px;\">\n                        <div style=\"font-weight: 700; font-size: 0.9rem; color: #1a3b2a !important; margin-bottom: 10px;\">Ducklings</div>\n                        <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 4px 0;\">\n                            <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                            <span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">NON-MEDICATED starter (18% protein) for weeks 1-3</span>\n                        </div>\n                        <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 4px 0;\">\n                            <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                            <span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Add brewer's yeast (niacin supplement) to every feeding</span>\n                        </div>\n                        <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 4px 0;\">\n                            <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                            <span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Ducklings need deep water to submerge bills (not bodies)</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <!-- Safety Checks -->\n        <div>\n            <div style=\"background-color: #2d5a3d !important; color: #f8f9f0 !important; padding: 10px 15px; font-weight: 700; font-size: 0.95rem; margin-bottom: 0;\">Safety Checks</div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-top: none; padding: 18px;\">\n                <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 8px;\">\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Heat source secured (fire risk is #1 brooder danger)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">No drafts, but good ventilation at top of brooder</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Pets and children cannot access unsupervised</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Clean water daily (ducklings will soil water within hours)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Change bedding when damp or soiled (every 1-2 days)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Watch for pasty butt (chicks) and clean immediately if seen</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC Davis Veterinary Medicine Poultry Care Guidelines\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-feed-schedule"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Seasonal Feed Schedule</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Year-round feeding guide for a mixed flock in coastal California</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;\">\n            <!-- Spring -->\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #2d5a3d !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1.05rem; margin: 0; color: #f8f9f0 !important;\">Spring</h3>\n                    <span style=\"font-size: 0.75rem; color: #f8f9f0 !important; opacity: 0.9;\">Mar - May</span>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Primary Feed</div>\n                        <div style=\"font-size: 0.85rem; color: #1a3b2a !important;\">Layer feed (16% protein) for hens in production. Waterfowl feed or all-flock (15-16%) for mixed flocks.</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Supplements</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Oyster shell (free choice for calcium). Grit. Extra protein for molting birds.</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Foraging</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Peak foraging season. Bugs, fresh greens, and worms abundant. Reduce feed slightly as foraging increases.</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Water</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Fresh daily. Ducks need deep water for bill cleaning. Geese need water near grazing area.</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Treats</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Garden weeds, pea shoots, mealworms, chopped greens</div>\n                    </div>\n                </div>\n            </div>\n            <!-- Summer -->\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #2d5a3d !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1.05rem; margin: 0; color: #f8f9f0 !important;\">Summer</h3>\n                    <span style=\"font-size: 0.75rem; color: #f8f9f0 !important; opacity: 0.9;\">Jun - Aug</span>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Primary Feed</div>\n                        <div style=\"font-size: 0.85rem; color: #1a3b2a !important;\">Same base feed. Birds may eat less in heat (especially inland). Coastal flocks stay consistent with mild temps.</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Supplements</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Electrolytes in water during heat spells (above 85F). Continue oyster shell and grit.</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Foraging</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Good foraging continues. Geese graze heavily on lawn and pasture. Ducks excel at slug and snail patrol.</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Water</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Increase water stations. Refill more often. Add ice on hot days. Keep duck pond water clean.</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Treats</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Frozen watermelon, cucumber, berries. Cold treats help with heat.</div>\n                    </div>\n                </div>\n            </div>\n            <!-- Fall -->\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #2d5a3d !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1.05rem; margin: 0; color: #f8f9f0 !important;\">Fall</h3>\n                    <span style=\"font-size: 0.75rem; color: #f8f9f0 !important; opacity: 0.9;\">Sep - Nov</span>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Primary Feed</div>\n                        <div style=\"font-size: 0.85rem; color: #1a3b2a !important;\">Increase feed as foraging declines and daylight shortens. Chickens may begin molting (egg production drops).</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Supplements</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Extra protein during molt (feather regrowth is protein-intensive). Sunflower seeds, mealworms, scrambled eggs.</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Foraging</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Declining but still available. Fallen fruit, garden cleanup scraps. Let birds work spent garden beds.</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Water</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Fresh daily. Clean waterers more often as leaf debris increases. Monitor duck pond for algae.</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Treats</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Pumpkin (seeds are a natural dewormer), cooked squash, sunflower heads</div>\n                    </div>\n                </div>\n            </div>\n            <!-- Winter -->\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #2d5a3d !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1.05rem; margin: 0; color: #f8f9f0 !important;\">Winter</h3>\n                    <span style=\"font-size: 0.75rem; color: #f8f9f0 !important; opacity: 0.9;\">Dec - Feb</span>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Primary Feed</div>\n                        <div style=\"font-size: 0.85rem; color: #1a3b2a !important;\">Highest feed consumption. Birds rely mostly on provided feed. Geese still graze on winter grass.</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Supplements</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Continue oyster shell. Optional: scratch grains in the evening (digestion generates body heat overnight).</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Foraging</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Minimal but not zero in coastal CA. Mild winters allow some bug and worm foraging year-round.</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Water</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Freezing is rare on coast. Check water twice daily. Ducks still need bathing water (they tolerate cold well).</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Treats</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Warm oatmeal, cooked rice, leafy greens, sprouted grains</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <!-- Species-specific notes -->\n        <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin-top: 20px; border-radius: 0;\">\n            <strong style=\"display: block; margin-bottom: 5px; color: #1a3b2a !important; font-size: 0.9rem;\">Species Differences</strong>\n            <ul style=\"margin: 0; padding-left: 18px; font-size: 0.8rem; color: #1c3c2c !important; line-height: 1.8;\">\n                <li style=\"color: #1c3c2c !important;\"><strong>Chickens:</strong> Standard layer feed works well. Switch to higher protein (20%) during molt.</li>\n                <li style=\"color: #1c3c2c !important;\"><strong>Ducks:</strong> Need niacin-fortified feed or brewer's yeast supplement. Higher water consumption than chickens.</li>\n                <li style=\"color: #1c3c2c !important;\"><strong>Geese:</strong> Up to 80% of diet can come from grazing on grass and weeds. Supplement with grain and poultry feed.</li>\n            </ul>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC ANR Livestock Feeding Guidelines, UC Davis Poultry Extension\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-kitchen-scraps"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Kitchen Scraps Guide for Poultry</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What to share, what to limit, and what to never feed your flock</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <!-- SAFE column -->\n            <div style=\"background-color: #fff !important; border: 2px solid #2d5a3d; overflow: hidden;\">\n                <div style=\"background-color: #2d5a3d !important; padding: 14px 18px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 1rem; color: #f8f9f0 !important; margin-bottom: 2px;\">SAFE TO FEED</div>\n                    <div style=\"font-size: 0.7rem; color: #f8f9f0 !important; opacity: 0.9;\">Healthy treats for your flock</div>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Leafy greens (kale, lettuce, chard)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Berries (strawberries, blueberries)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Watermelon and cantaloupe</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Cooked rice and pasta</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Cooked squash and pumpkin</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Fresh herbs (parsley, oregano, basil)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Mealworms and black soldier fly larvae</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Peas and green beans</span>\n                    </div>\n                </div>\n            </div>\n            <!-- MODERATION column -->\n            <div style=\"background-color: #fff !important; border: 2px solid #c9a94e; overflow: hidden;\">\n                <div style=\"background-color: #c9a94e !important; padding: 14px 18px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 1rem; color: #1a3b2a !important; margin-bottom: 2px;\">FEED IN MODERATION</div>\n                    <div style=\"font-size: 0.7rem; color: #1a3b2a !important; opacity: 0.85;\">Small amounts only, not daily</div>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">~</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Bread (low nutrition, filling)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">~</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Corn (high energy, low protein)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">~</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Tomato fruit (ripe only, not leaves or stems)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">~</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Sunflower seeds (high fat)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">~</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Scrambled eggs (great protein during molt)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">~</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Citrus (small amounts; some birds avoid it)</span>\n                    </div>\n                </div>\n            </div>\n            <!-- NEVER FEED column -->\n            <div style=\"background-color: #fff !important; border: 2px solid #8b3a3a; overflow: hidden;\">\n                <div style=\"background-color: #8b3a3a !important; padding: 14px 18px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 1rem; color: #f8f9f0 !important; margin-bottom: 2px;\">NEVER FEED</div>\n                    <div style=\"font-size: 0.7rem; color: #f8f9f0 !important; opacity: 0.9;\">Toxic or dangerous to poultry</div>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Avocado (skin and pit contain persin)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Chocolate (theobromine is toxic)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Raw or dried beans (contain phytohemagglutinin)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Onions and garlic (can cause anemia)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Nightshade leaves and stems (tomato, potato, pepper plants)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Moldy or spoiled food (mycotoxins)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Processed or salty food (chips, pretzels)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 8px 0;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Green potato skins (solanine is toxic)</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center; margin-top: 20px;\">\n            Treats should make up no more than 10% of your flock's total diet. Always provide fresh water alongside treats.\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Sources: UC Davis Veterinary Medicine, ASPCA Animal Poison Control Center\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-health-quickref"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Common Poultry Health Issues</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Quick-reference guide for backyard flock keepers in coastal California</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 750px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Issue</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Symptoms</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Affects</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">First Action</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Call Vet When</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Respiratory Infection</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Sneezing, nasal discharge, wheezing, watery eyes, reduced appetite</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">All species</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Isolate bird. Improve ventilation. Keep warm and dry. Add electrolytes to water.</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Symptoms persist beyond 3 days, or multiple birds affected</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Bumblefoot</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Swollen foot pad, black scab on bottom of foot, limping</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Chickens, ducks</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Soak foot in warm Epsom salt water. Clean wound. Apply antibiotic ointment and wrap.</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Infection spreads, bird stops walking, swelling increases</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Egg Binding</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Straining, lethargy, sitting on ground, swollen abdomen, penguin-like stance</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Hens (all species)</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Warm bath (20 min). Provide calcium (crushed Tums). Keep in warm, quiet space.</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">No egg passed within 24 hours. This is an emergency.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Internal Parasites (Worms)</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Weight loss, pale comb/wattles, diarrhea, reduced egg production, visible worms in droppings</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">All species</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Fecal float test (vet or mail-in kit). Clean run and rotate grazing areas.</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Positive fecal test. Vet prescribes species-appropriate dewormer.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">External Parasites (Mites/Lice)</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Feather loss, pale comb, restlessness at night, scaly legs, visible bugs at base of feathers</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">All species</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Dust with poultry-safe powder. Deep clean coop. Treat all birds. Provide dust bath with DE.</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Severe infestation, anemia (pale comb), or treatment not working</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Crop Impaction</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Hard, swollen crop that does not empty overnight, reduced appetite, weight loss</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Chickens</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Withhold food overnight. Offer water with olive oil. Gently massage crop. Provide grit.</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Crop still hard after 24 hours. Sour smell from beak (sour crop).</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Fowl Pox</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Raised, wart-like lesions on comb, wattles, face. Wet form: white plaques in mouth/throat.</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Chickens, turkeys</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">No cure (viral). Isolate. Apply iodine to lesions. Support with vitamins. Control mosquitoes.</td>\n                    <td style=\"padding: 10px 10px; font-size: 0.8rem; color: #1c3c2c !important;\">Wet pox (mouth lesions causing breathing difficulty). Secondary infections.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 20px 0 0 0; border-radius: 0;\">\n        <strong style=\"display: block; margin-bottom: 5px; color: #1a3b2a !important; font-size: 0.9rem;\">Coastal California Note</strong>\n        <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\">Fog and coastal humidity increase the risk of respiratory infections and mite infestations. Ensure coops have excellent ventilation (not drafts) and keep bedding dry. Regular coop cleaning is more important in damp climates than in dry inland areas.</p>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Sources: UC Davis Veterinary Medicine, Merck Veterinary Manual (Poultry)\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-quarantine-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Quarantine Protocol for New and Rescue Birds</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Protect your existing flock with a structured 30-day quarantine</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <!-- Phase 1: Pre-Arrival Setup -->\n        <div style=\"margin-bottom: 25px;\">\n            <div style=\"background-color: #2d5a3d !important; padding: 12px 18px; margin-bottom: 0;\">\n                <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Phase 1: Pre-Arrival Setup</h3>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-top: none; padding: 18px;\">\n                <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                    <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Set up a separate enclosure at least 30 feet from your existing flock (ideally out of sight)</span>\n                </div>\n                <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                    <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Prepare separate feeders, waterers, and cleaning tools (do not share with main flock)</span>\n                </div>\n                <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee;\">\n                    <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Stock clean bedding, electrolytes, and poultry vitamins</span>\n                </div>\n                <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;\">\n                    <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Designate a pair of shoes or boot covers for quarantine area only</span>\n                </div>\n            </div>\n        </div>\n        <!-- Phase 2: Quarantine Period -->\n        <div style=\"margin-bottom: 25px;\">\n            <div style=\"background-color: #2d5a3d !important; padding: 12px 18px; margin-bottom: 0;\">\n                <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Phase 2: Quarantine Period (30 Days Minimum)</h3>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-top: none; padding: 18px;\">\n                <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;\">Daily Observation Checklist</div>\n                <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid #eee;\">\n                    <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Check eyes and nostrils for discharge or swelling</span>\n                </div>\n                <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid #eee;\">\n                    <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Listen for sneezing, wheezing, or labored breathing</span>\n                </div>\n                <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid #eee;\">\n                    <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Monitor droppings for abnormal color, consistency, or blood</span>\n                </div>\n                <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid #eee;\">\n                    <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Check legs and feet for scaly leg mites, bumblefoot, or injuries</span>\n                </div>\n                <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid #eee;\">\n                    <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Inspect feathers for lice, mites, or unusual feather loss</span>\n                </div>\n                <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                    <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Observe appetite, energy level, and general behavior</span>\n                </div>\n                <div style=\"margin-top: 15px; font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;\">Deworming Protocol</div>\n                <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid #eee;\">\n                    <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Submit a fecal sample for float test within the first week</span>\n                </div>\n                <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                    <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">If positive, deworm with vet-recommended product and retest in 10-14 days</span>\n                </div>\n            </div>\n        </div>\n        <!-- Phase 3: Gradual Introduction -->\n        <div style=\"margin-bottom: 0;\">\n            <div style=\"background-color: #2d5a3d !important; padding: 12px 18px; margin-bottom: 0;\">\n                <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Phase 3: Gradual Introduction Steps</h3>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-top: none; padding: 18px;\">\n                <div style=\"display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eee;\">\n                    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; flex-shrink: 0;\">1</div>\n                    <div>\n                        <div style=\"font-weight: 600; font-size: 0.85rem; color: #1a3b2a !important; margin-bottom: 3px;\">See-But-Not-Touch (Days 31-37)</div>\n                        <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Place new birds in a pen within sight of the existing flock but separated by wire. Allow them to see and hear each other without physical contact.</div>\n                    </div>\n                </div>\n                <div style=\"display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eee;\">\n                    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; flex-shrink: 0;\">2</div>\n                    <div>\n                        <div style=\"font-weight: 600; font-size: 0.85rem; color: #1a3b2a !important; margin-bottom: 3px;\">Supervised Contact (Days 38-44)</div>\n                        <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Allow short, supervised free-range sessions together. Provide multiple feed and water stations to reduce competition. Watch for aggressive pecking or cornering.</div>\n                    </div>\n                </div>\n                <div style=\"display: flex; gap: 12px; padding: 10px 0;\">\n                    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; flex-shrink: 0;\">3</div>\n                    <div>\n                        <div style=\"font-weight: 600; font-size: 0.85rem; color: #1a3b2a !important; margin-bottom: 3px;\">Full Integration (Day 45+)</div>\n                        <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Move new birds into the shared coop at night (birds are calmer in the dark). Monitor closely for the first week. Some pecking order scuffles are normal; intervene only if a bird is being injured or prevented from eating or drinking.</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #8b3a3a !important; padding: 15px 18px; margin-top: 20px;\">\n            <strong style=\"display: block; margin-bottom: 5px; color: #f8f9f0 !important; font-size: 0.9rem;\">Important Warning</strong>\n            <p style=\"font-size: 0.85rem; color: #f8f9f0 !important; margin: 0;\">Never skip quarantine, even for birds from trusted sources. Many poultry diseases are carried asymptomatically. A single sick bird introduced to your flock can infect every bird you have.</p>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Sources: UC Davis Veterinary Medicine poultry biosecurity guidelines, USDA National Poultry Improvement Plan (NPIP)\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-mixed-space-chart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Mixed Flock Space Requirements</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Minimum space per bird by species for healthy, low-stress housing</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 700px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Species</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Coop/Shelter (sq ft per bird)</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Run (sq ft per bird)</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Water Access</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Roosting/Nesting Notes</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 12px 12px; font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Chickens</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600; font-size: 1rem;\">4</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600; font-size: 1rem;\">10</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center; font-size: 0.85rem;\">Standard waterer</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Roosting bars (8-10 in. per bird), elevated nesting boxes (1 per 3-4 hens)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 12px; font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Ducks</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600; font-size: 1rem;\">6</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600; font-size: 1rem;\">15</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center; font-size: 0.85rem;\">Swimming water access</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Floor-level nesting areas (ducks do not roost). Deep straw bedding preferred.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 12px 12px; font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Geese</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600; font-size: 1rem;\">10</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600; font-size: 1rem;\">20</td>\n
