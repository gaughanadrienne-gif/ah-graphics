rem !important;\n  color: #8c9c8c !important;\n  text-align: center;\n  padding: 8px 0 0;\n  letter-spacing: 0.03em;\n}\n\n@media (max-width: 600px) {\n  .ah-flock-decision-body {\n    flex-direction: column;\n  }\n\n  .ah-flock-decision-col:first-child {\n    border-right: none;\n    border-bottom: 1px solid #dde2d8;\n  }\n\n  .ah-flock-decision-col {\n    padding: 16px 16px 12px;\n  }\n\n  .ah-flock-decision-header h2 {\n    font-size: 1rem !important;\n  }\n}\n</style>\n\n<div class=\"ah-flock-decision-wrapper\">\n  <div class=\"ah-flock-decision-header\">\n    <h2>Which Path Is Right for You?</h2>\n    <p>Quick decision guide for Santa Cruz County flock keepers</p>\n  </div>\n  <div class=\"ah-flock-decision-body\">\n    <div class=\"ah-flock-decision-col\">\n      <h3>Choose Hatchery Chicks If...</h3>\n      <ul>\n        <li>You want a specific breed (Barred Rock, Australorp, Easter Egger)</li>\n        <li>You have children who will raise birds hands-on</li>\n        <li>You want a full 2 to 4 years of productive laying ahead</li>\n        <li>You enjoy the brooding process and have the setup</li>\n        <li>You plan to start from scratch with no existing flock</li>\n        <li>Chick season is currently active at your local feed store</li>\n      </ul>\n    </div>\n    <div class=\"ah-flock-decision-col\">\n      <h3>Choose Rescue Hens If...</h3>\n      <ul>\n        <li>You want eggs within weeks, not months</li>\n        <li>You do not want to brood chicks for six weeks</li>\n        <li>You are adding birds to an existing adult flock</li>\n        <li>Giving retired hens a good home is personally meaningful</li>\n        <li>You live where roosters are prohibited and want no surprises</li>\n        <li>Good birds are currently available at the local shelter or rescue</li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"ah-flock-decision-footer-row\">ambitiousharvest.com | Garden Flock</div>\n</div>";

window.AH_GRAPHICS["garden-flock-standardvsbantam-comparison"] = "<style>\n  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n  .ah-bantam-wrapper {\n    font-family: 'Montserrat', sans-serif;\n    width: 100%;\n    margin: 32px 0;\n    padding: 0;\n    box-sizing: border-box;\n  }\n\n  .ah-bantam-header {\n    background-color: #1a3b2a;\n    padding: 20px 24px;\n    border-radius: 6px 6px 0 0;\n  }\n\n  .ah-bantam-header h2 {\n    font-size: 1.25rem;\n    font-weight: 700;\n    margin: 0 0 4px 0;\n    color: #f8f9f0 !important;\n  }\n\n  .ah-bantam-header p {\n    font-size: 0.8rem;\n    margin: 0;\n    color: #dde2d8 !important;\n  }\n\n  .ah-bantam-table-wrap {\n    overflow-x: auto;\n    -webkit-overflow-scrolling: touch;\n  }\n\n  .ah-bantam-table {\n    width: 100%;\n    border-collapse: collapse;\n    font-size: 0.88rem;\n  }\n\n  .ah-bantam-table thead tr {\n    background-color: #1c3c2c;\n  }\n\n  .ah-bantam-table thead th {\n    padding: 12px 14px;\n    text-align: left;\n    font-weight: 700;\n    color: #f8f9f0 !important;\n    font-size: 0.8rem;\n    letter-spacing: 0.04em;\n    text-transform: uppercase;\n  }\n\n  .ah-bantam-table thead th:first-child {\n    width: 26%;\n  }\n\n  .ah-bantam-table tbody tr:nth-child(even) {\n    background-color: #f0f3ed;\n  }\n\n  .ah-bantam-table tbody tr:nth-child(odd) {\n    background-color: #f8f9f0;\n  }\n\n  .ah-bantam-table tbody tr:hover {\n    background-color: #dde2d8;\n  }\n\n  .ah-bantam-table td {\n    padding: 11px 14px;\n    vertical-align: top;\n    color: #1a3b2a !important;\n    border-bottom: 1px solid #dde2d8;\n    line-height: 1.45;\n  }\n\n  .ah-bantam-table td:first-child {\n    font-weight: 700;\n    color: #1c3c2c !important;\n  }\n\n  .ah-bantam-check {\n    color: #1c3c2c !important;\n    font-weight: 700;\n  }\n\n  .ah-bantam-note {\n    background-color: #f0f3ed;\n    padding: 10px 14px;\n    font-size: 0.75rem;\n    color: #8c9c8c !important;\n    border-top: 1px solid #dde2d8;\n  }\n\n  .ah-bantam-footer {\n    background-color: #1a3b2a;\n    padding: 8px 14px;\n    text-align: center;\n    font-size: 0.7rem;\n    color: #dde2d8 !important;\n    border-radius: 0 0 6px 6px;\n  }\n\n  @media (max-width: 600px) {\n    .ah-bantam-header h2 {\n      font-size: 1.05rem !important;\n    }\n    .ah-bantam-table {\n      font-size: 0.8rem;\n    }\n    .ah-bantam-table thead th,\n    .ah-bantam-table td {\n      padding: 9px 10px;\n    }\n  }\n</style>\n\n<div class=\"ah-bantam-wrapper\">\n  <div class=\"ah-bantam-header\">\n    <h2>Standard vs. Bantam Chickens: Small-Lot Comparison</h2>\n    <p>Key factors for Santa Cruz County urban and suburban backyard flocks</p>\n  </div>\n  <div class=\"ah-bantam-table-wrap\">\n    <table class=\"ah-bantam-table\">\n      <thead>\n        <tr>\n          <th>Factor</th>\n          <th>Standard (Large Fowl)</th>\n          <th>Bantam</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>Hen weight</td>\n          <td>4 to 8 lbs depending on breed</td>\n          <td>1.5 to 2.5 lbs</td>\n        </tr>\n        <tr>\n          <td>Egg size</td>\n          <td>Large to extra-large (56 to 70g)</td>\n          <td>About half standard size (28 to 35g)</td>\n        </tr>\n        <tr>\n          <td>Annual egg output</td>\n          <td>200 to 280 eggs (productive breeds)</td>\n          <td>150 to 200 eggs</td>\n        </tr>\n        <tr>\n          <td>Coop space needed</td>\n          <td>4 sq ft per bird minimum</td>\n          <td>1.5 to 2 sq ft per bird</td>\n        </tr>\n        <tr>\n          <td>Run space needed</td>\n          <td>10 sq ft per bird minimum</td>\n          <td>4 to 5 sq ft per bird</td>\n        </tr>\n        <tr>\n          <td>Daily feed (per hen)</td>\n          <td>1/4 to 1/3 lb (about 1/2 cup)</td>\n          <td>1/8 lb (about 1/4 cup)</td>\n        </tr>\n        <tr>\n          <td>Flight ability</td>\n          <td>Low to moderate; most cannot clear 3 to 4 ft</td>\n          <td>High; many clear 5 to 6 ft easily</td>\n        </tr>\n        <tr>\n          <td>Fencing requirement</td>\n          <td>4 ft typically sufficient if clipped</td>\n          <td>6 ft or covered run recommended</td>\n        </tr>\n        <tr>\n          <td>Predator vulnerability</td>\n          <td>Moderate (hawks take juveniles; dogs/raccoons are the main threat)</td>\n          <td>Higher (small size attracts more hawk attention)</td>\n        </tr>\n        <tr>\n          <td>Cold and fog tolerance</td>\n          <td>Generally good; large body mass helps</td>\n          <td>Varies by breed; feather-footed types need dry conditions</td>\n        </tr>\n        <tr>\n          <td>Broodiness</td>\n          <td>Varies; production breeds rarely go broody</td>\n          <td>Many bantam breeds are reliably broody and excellent mothers</td>\n        </tr>\n        <tr>\n          <td>Temperament</td>\n          <td>Generally calm; varies by breed</td>\n          <td>Often bold and active; some breeds are very friendly</td>\n        </tr>\n        <tr>\n          <td>Garden impact</td>\n          <td>Heavier scratching; more soil disturbance</td>\n          <td>Lighter footprint; less digging damage</td>\n        </tr>\n        <tr>\n          <td>Noise</td>\n          <td>Standard laying cackle; roosters audible to neighbors</td>\n          <td>Slightly quieter; bantam roosters crow at higher pitch</td>\n        </tr>\n        <tr>\n          <td>Mixed-flock compatibility</td>\n          <td>Compatible with other standard birds and large ducks</td>\n          <td>Best housed separately or with care around large breeds</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n  <div class=\"ah-bantam-note\">Source: Penn State Extension Poultry; UC ANR Poultry Management; Merck Veterinary Manual</div>\n  <div class=\"ah-bantam-footer\">ambitiousharvest.com | Santa Cruz County Backyard Flock Guidance</div>\n</div>";

window.AH_GRAPHICS["garden-flock-standardvsbantam-verdict"] = "<style>\n  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n  .ah-verdict-wrapper {\n    font-family: 'Montserrat', sans-serif;\n    width: 100%;\n    margin: 32px 0;\n    padding: 0;\n    box-sizing: border-box;\n  }\n\n  .ah-verdict-header {\n    background-color: #1c3c2c;\n    padding: 18px 24px;\n    border-radius: 6px 6px 0 0;\n  }\n\n  .ah-verdict-header h2 {\n    font-size: 1.2rem;\n    font-weight: 700;\n    margin: 0 0 4px 0;\n    color: #f8f9f0 !important;\n  }\n\n  .ah-verdict-header p {\n    font-size: 0.78rem;\n    margin: 0;\n    color: #dde2d8 !important;\n  }\n\n  .ah-verdict-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 0;\n  }\n\n  .ah-verdict-col {\n    padding: 20px 22px;\n    background-color: #f8f9f0;\n    border-right: 1px solid #dde2d8;\n  }\n\n  .ah-verdict-col:last-child {\n    border-right: none;\n    background-color: #f0f3ed;\n  }\n\n  .ah-verdict-col h3 {\n    font-size: 0.95rem;\n    font-weight: 700;\n    color: #1a3b2a !important;\n    margin: 0 0 14px 0;\n    padding-bottom: 8px;\n    border-bottom: 2px solid #c9a84c;\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n  }\n\n  .ah-verdict-col ul {\n    list-style: none;\n    padding: 0;\n    margin: 0;\n  }\n\n  .ah-verdict-col ul li {\n    font-size: 0.82rem;\n    color: #1a3b2a !important;\n    padding: 5px 0 5px 18px;\n    position: relative;\n    line-height: 1.45;\n    border-bottom: 1px solid #dde2d8;\n  }\n\n  .ah-verdict-col ul li:last-child {\n    border-bottom: none;\n  }\n\n  .ah-verdict-col ul li::before {\n    content: '';\n    position: absolute;\n    left: 0;\n    top: 10px;\n    width: 8px;\n    height: 8px;\n    border-radius: 50%;\n    background-color: #1c3c2c;\n  }\n\n  .ah-verdict-blend {\n    background-color: #1a3b2a;\n    padding: 14px 22px;\n    color: #f8f9f0 !important;\n    font-size: 0.83rem;\n    line-height: 1.55;\n  }\n\n  .ah-verdict-blend strong {\n    color: #c9a84c !important;\n  }\n\n  .ah-verdict-footer {\n    background-color: #1c3c2c;\n    padding: 8px 14px;\n    text-align: center;\n    font-size: 0.7rem;\n    color: #dde2d8 !important;\n    border-radius: 0 0 6px 6px;\n  }\n\n  @media (max-width: 600px) {\n    .ah-verdict-grid {\n      grid-template-columns: 1fr;\n    }\n    .ah-verdict-col {\n      border-right: none;\n      border-bottom: 1px solid #dde2d8;\n    }\n    .ah-verdict-col:last-child {\n      border-bottom: none;\n    }\n    .ah-verdict-header h2 {\n      font-size: 1rem !important;\n    }\n  }\n</style>\n\n<div class=\"ah-verdict-wrapper\">\n  <div class=\"ah-verdict-header\">\n    <h2>Who Should Choose Which: Quick Verdict Guide</h2>\n    <p>Honest guidance for small Santa Cruz County lots</p>\n  </div>\n  <div class=\"ah-verdict-grid\">\n    <div class=\"ah-verdict-col\">\n      <h3>Choose Standard If You...</h3>\n      <ul>\n        <li>Want the most egg volume from a limited number of birds</li>\n        <li>Have a covered run or do not mind wing-clipping</li>\n        <li>Keep feather-footed breeds and manage a consistently damp run</li>\n        <li>Want birds that are less likely to clear a standard fence line</li>\n        <li>Are new to chickens and want predictable, manageable birds</li>\n        <li>Have a garden where serious soil-scratching is a concern but you can rotate access</li>\n        <li>Want compatibility with larger ducks or waterfowl in a mixed flock</li>\n      </ul>\n    </div>\n    <div class=\"ah-verdict-col\">\n      <h3>Choose Bantam If You...</h3>\n      <ul>\n        <li>Have a very small coop footprint or limited run space</li>\n        <li>Want to keep more individual birds in the same space</li>\n        <li>Prioritize personality, entertainment, and flock interaction</li>\n        <li>Want a natural broody hen to hatch and raise chicks occasionally</li>\n        <li>Have children who want hands-on, friendly, handleable birds</li>\n        <li>Want a lighter garden footprint with less digging pressure</li>\n        <li>Are willing to invest in a covered run to manage flight and hawk risk</li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"ah-verdict-blend\">\n    <strong>The blend approach:</strong> Many experienced Santa Cruz small-lot keepers keep two or three standard hens for reliable egg volume alongside two bantam hens for personality and brooding utility. This hybrid strategy is practical in a run of 50 to 60 square feet, giving you consistent production and the full range of flock character. Introduce all birds together as young pullets to reduce pecking-order friction.\n  </div>\n  <div class=\"ah-verdict-footer\">ambitiousharvest.com | Santa Cruz County Backyard Flock Guidance</div>\n</div>";

window.AH_GRAPHICS["garden-flock-summerheat-breed-tolerance"] = "<div style=\"width: 100%; margin: 35px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n  <style>\n    @media (max-width: 600px) {\n      .ah-breed-table { min-width: unset !important; }\n      .ah-breed-table th, .ah-breed-table td { font-size: 0.75rem !important; padding: 8px 10px !important; }\n    }\n  </style>\n  <div style=\"background-color: #1a3b2a; padding: 20px 25px; text-align: center;\">\n    <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Breed Heat Tolerance for Santa Cruz County Flocks</h2>\n    <p style=\"font-size: 0.85rem; margin: 0; color: #f8f9f0 !important; opacity: 0.9;\">Chicken breeds grouped by heat tolerance and suitability for coastal vs. inland summers</p>\n  </div>\n  <div style=\"background-color: #f8f9f0; padding: 0; overflow-x: auto;\">\n    <table class=\"ah-breed-table\" style=\"width: 100%; border-collapse: collapse; min-width: 520px;\">\n      <thead>\n        <tr>\n          <th style=\"background-color: #1c3c2c; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.82rem;\">Breed</th>\n          <th style=\"background-color: #1c3c2c; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.82rem;\">Heat Tolerance</th>\n          <th style=\"background-color: #1c3c2c; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.82rem;\">Best For</th>\n          <th style=\"background-color: #1c3c2c; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.82rem;\">Notes</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr style=\"background-color: #fff; border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 15px; font-weight: 600; color: #1a3b2a !important; font-size: 0.83rem;\">Leghorn (White)</td>\n          <td style=\"padding: 11px 15px; font-size: 0.83rem;\"><span style=\"color: #2a6632 !important; font-weight: 700;\">High</span></td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Coastal and inland</td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Mediterranean breed; light body, large single comb for heat release</td>\n        </tr>\n        <tr style=\"background-color: #f8f9f0; border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 15px; font-weight: 600; color: #1a3b2a !important; font-size: 0.83rem;\">Ancona</td>\n          <td style=\"padding: 11px 15px; font-size: 0.83rem;\"><span style=\"color: #2a6632 !important; font-weight: 700;\">High</span></td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Coastal and inland</td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Mediterranean origin; active forager, excellent layer</td>\n        </tr>\n        <tr style=\"background-color: #fff; border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 15px; font-weight: 600; color: #1a3b2a !important; font-size: 0.83rem;\">Minorca</td>\n          <td style=\"padding: 11px 15px; font-size: 0.83rem;\"><span style=\"color: #2a6632 !important; font-weight: 700;\">High</span></td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Coastal and inland</td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Large comb and wattles facilitate heat dissipation</td>\n        </tr>\n        <tr style=\"background-color: #f8f9f0; border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 15px; font-weight: 600; color: #1a3b2a !important; font-size: 0.83rem;\">Rhode Island Red</td>\n          <td style=\"padding: 11px 15px; font-size: 0.83rem;\"><span style=\"color: #5a7a2a !important; font-weight: 700;\">Medium</span></td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Coastal, manage inland</td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Hardy dual-purpose; heavier body requires extra shade and water in heat</td>\n        </tr>\n        <tr style=\"background-color: #fff; border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 15px; font-weight: 600; color: #1a3b2a !important; font-size: 0.83rem;\">Easter Egger / Ameraucana</td>\n          <td style=\"padding: 11px 15px; font-size: 0.83rem;\"><span style=\"color: #5a7a2a !important; font-weight: 700;\">Medium</span></td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Coastal, manage inland</td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Pea combs reduce heat release; provide extra shade in hot spells</td>\n        </tr>\n        <tr style=\"background-color: #f8f9f0; border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 15px; font-weight: 600; color: #1a3b2a !important; font-size: 0.83rem;\">Buff Orpington</td>\n          <td style=\"padding: 11px 15px; font-size: 0.83rem;\"><span style=\"color: #b8694a !important; font-weight: 700;\">Lower</span></td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Fog belt preferred</td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Dense feathering holds heat; requires robust shade, cool water, and airflow</td>\n        </tr>\n        <tr style=\"background-color: #fff; border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 15px; font-weight: 600; color: #1a3b2a !important; font-size: 0.83rem;\">Brahma</td>\n          <td style=\"padding: 11px 15px; font-size: 0.83rem;\"><span style=\"color: #b8694a !important; font-weight: 700;\">Lower</span></td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Fog belt preferred</td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Very large, feather-footed; vulnerable in temperatures above 85 degrees</td>\n        </tr>\n        <tr style=\"background-color: #f8f9f0;\">\n          <td style=\"padding: 11px 15px; font-weight: 600; color: #1a3b2a !important; font-size: 0.83rem;\">Silkie</td>\n          <td style=\"padding: 11px 15px; font-size: 0.83rem;\"><span style=\"color: #b8694a !important; font-weight: 700;\">Lower</span></td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Fog belt preferred</td>\n          <td style=\"padding: 11px 15px; color: #1c3c2c !important; font-size: 0.83rem;\">Fluffy feathers trap heat; walnut comb limits heat dissipation; monitor closely inland</td>\n        </tr>\n      </tbody>\n    </table>\n    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; padding: 10px 15px; margin: 0; border-top: 1px solid #dde2d8;\">Source: UC ANR Poultry Resources; American Poultry Association breed standards. Comb size is a primary factor in avian thermoregulation. Larger combs increase heat dissipation surface area.</p>\n  </div>\n  <div style=\"background-color: #1a3b2a; text-align: center; padding: 12px; font-size: 0.75rem; color: #f8f9f0 !important;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-summerheat-heatwave-plan"] = "<div style=\"width: 100%; margin: 35px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n  <style>\n    @media (max-width: 600px) {\n      .ah-hw-cols { flex-direction: column !important; }\n      .ah-hw-col { width: 100% !important; }\n    }\n  </style>\n  <div style=\"background-color: #1a3b2a; padding: 20px 25px; text-align: center;\">\n    <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Heat Wave Response Plan for Your Flock</h2>\n    <p style=\"font-size: 0.85rem; margin: 0; color: #f8f9f0 !important; opacity: 0.9;\">Step-by-step actions before, during, and after an inland Santa Cruz County heat event</p>\n  </div>\n  <div style=\"background-color: #f8f9f0; padding: 24px 20px;\">\n    <div class=\"ah-hw-cols\" style=\"display: flex; gap: 16px; flex-wrap: wrap;\">\n      <!-- Day Before -->\n      <div class=\"ah-hw-col\" style=\"flex: 1; min-width: 220px; background-color: #fff; border-left: 4px solid #1a3b2a; padding: 16px 18px;\">\n        <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 12px 0; border-bottom: 1px solid #dde2d8; padding-bottom: 8px;\">Day Before</h3>\n        <ul style=\"list-style: none; padding: 0; margin: 0;\">\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Freeze water bottles or ice blocks</li>\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Prepare extra waterers, clean all</li>\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Add shade cloth or tarps if needed</li>\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Fill kiddie pool for waterfowl</li>\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Buy electrolytes if not on hand</li>\n        </ul>\n      </div>\n      <!-- Morning of -->\n      <div class=\"ah-hw-col\" style=\"flex: 1; min-width: 220px; background-color: #fff; border-left: 4px solid #c9a84c; padding: 16px 18px;\">\n        <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 12px 0; border-bottom: 1px solid #dde2d8; padding-bottom: 8px;\">Morning (Before 10 a.m.)</h3>\n        <ul style=\"list-style: none; padding: 0; margin: 0;\">\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #c9a84c !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Put ice in all waterers</li>\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #c9a84c !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Open all coop vents fully</li>\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #c9a84c !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Offer frozen treats or wet greens</li>\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #c9a84c !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Set up fans if available</li>\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important;\"><span style=\"color: #c9a84c !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Do not feed high-energy scratch</li>\n        </ul>\n      </div>\n      <!-- Peak heat -->\n      <div class=\"ah-hw-col\" style=\"flex: 1; min-width: 220px; background-color: #fff; border-left: 4px solid #b8694a; padding: 16px 18px;\">\n        <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 12px 0; border-bottom: 1px solid #dde2d8; padding-bottom: 8px;\">Peak Heat (1 to 5 p.m.)</h3>\n        <ul style=\"list-style: none; padding: 0; margin: 0;\">\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #b8694a !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Check birds every 60 to 90 min</li>\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #b8694a !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Refresh water as it warms</li>\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #b8694a !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Mist birds lightly if distressed</li>\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #b8694a !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Limit handling to emergencies</li>\n          <li style=\"padding: 6px 0; font-size: 0.83rem; color: #1c3c2c !important;\"><span style=\"color: #b8694a !important; font-weight: 700; margin-right: 6px;\">&#10003;</span> Keep waterfowl pool filled fresh</li>\n        </ul>\n      </div>\n    </div>\n    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 14px 0 0 0;\">Source: UC ANR, Backyard Poultry Heat Management; University of Georgia Cooperative Extension, Poultry Heat Stress Management</p>\n  </div>\n  <div style=\"background-color: #1a3b2a; text-align: center; padding: 12px; font-size: 0.75rem; color: #f8f9f0 !important;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-summerheat-stress-signs"] = "<div style=\"width: 100%; margin: 35px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n  <style>\n    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n    @media (max-width: 600px) {\n      .ah-hs-grid { grid-template-columns: 1fr !important; }\n      .ah-hs-card { min-width: unset !important; }\n    }\n  </style>\n  <div style=\"background-color: #1a3b2a; padding: 20px 25px; text-align: center;\">\n    <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Recognizing Heat Stress in Your Flock</h2>\n    <p style=\"font-size: 0.85rem; margin: 0; color: #f8f9f0 !important; opacity: 0.9;\">A quick-reference guide to signs by severity level</p>\n  </div>\n  <div style=\"background-color: #f8f9f0; padding: 24px 20px;\">\n    <div class=\"ah-hs-grid\" style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;\">\n      <!-- Early -->\n      <div class=\"ah-hs-card\" style=\"background-color: #fff; border: 2px solid #c9a84c; overflow: hidden;\">\n        <div style=\"background-color: #c9a84c; padding: 12px 16px;\">\n          <h3 style=\"font-size: 0.95rem; font-weight: 700; margin: 0; color: #1a3b2a !important;\">Early Stage</h3>\n          <p style=\"font-size: 0.78rem; margin: 4px 0 0 0; color: #1a3b2a !important; font-weight: 600;\">Monitor and cool proactively</p>\n        </div>\n        <div style=\"padding: 14px 16px;\">\n          <ul style=\"list-style: none; padding: 0; margin: 0;\">\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important; border-bottom: 1px solid #dde2d8;\">Panting, beak open</li>\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important; border-bottom: 1px solid #dde2d8;\">Wings slightly out</li>\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important; border-bottom: 1px solid #dde2d8;\">Seeking shade</li>\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important; border-bottom: 1px solid #dde2d8;\">Eating less</li>\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important;\">Drinking more</li>\n          </ul>\n        </div>\n      </div>\n      <!-- Moderate -->\n      <div class=\"ah-hs-card\" style=\"background-color: #fff; border: 2px solid #b8694a; overflow: hidden;\">\n        <div style=\"background-color: #b8694a; padding: 12px 16px;\">\n          <h3 style=\"font-size: 0.95rem; font-weight: 700; margin: 0; color: #f8f9f0 !important;\">Moderate Stage</h3>\n          <p style=\"font-size: 0.78rem; margin: 4px 0 0 0; color: #f8f9f0 !important; font-weight: 600;\">Act immediately</p>\n        </div>\n        <div style=\"padding: 14px 16px;\">\n          <ul style=\"list-style: none; padding: 0; margin: 0;\">\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important; border-bottom: 1px solid #dde2d8;\">Labored breathing</li>\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important; border-bottom: 1px solid #dde2d8;\">Pale or faded comb</li>\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important; border-bottom: 1px solid #dde2d8;\">Lethargy, won't move</li>\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important; border-bottom: 1px solid #dde2d8;\">Unsteady gait</li>\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important;\">Wings hanging low</li>\n          </ul>\n        </div>\n      </div>\n      <!-- Emergency -->\n      <div class=\"ah-hs-card\" style=\"background-color: #fff; border: 2px solid #7a1a1a; overflow: hidden;\">\n        <div style=\"background-color: #7a1a1a; padding: 12px 16px;\">\n          <h3 style=\"font-size: 0.95rem; font-weight: 700; margin: 0; color: #f8f9f0 !important;\">Emergency</h3>\n          <p style=\"font-size: 0.78rem; margin: 4px 0 0 0; color: #f8f9f0 !important; font-weight: 600;\">Life-threatening, intervene now</p>\n        </div>\n        <div style=\"padding: 14px 16px;\">\n          <ul style=\"list-style: none; padding: 0; margin: 0;\">\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important; border-bottom: 1px solid #dde2d8;\">Unresponsive, won't stand</li>\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important; border-bottom: 1px solid #dde2d8;\">Seizure-like trembling</li>\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important; border-bottom: 1px solid #dde2d8;\">Gasping, not panting</li>\n            <li style=\"padding: 5px 0; font-size: 0.82rem; color: #1c3c2c !important;\">Blue or purple comb</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n    <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 14px 0 0 0;\">Source: UC ANR Publication 8457, Poultry Heat Stress; Merck Veterinary Manual, Poultry Health</p>\n  </div>\n  <div style=\"background-color: #1a3b2a; text-align: center; padding: 12px; font-size: 0.75rem; color: #f8f9f0 !important;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-treats-best-crops"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-flock-crops-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  border-radius: 4px;\n  overflow: hidden;\n}\n.ah-flock-crops-header {\n  background-color: #1a3b2a;\n  padding: 20px 24px;\n  text-align: center;\n}\n.ah-flock-crops-header h2 {\n  font-size: 1.25rem;\n  font-weight: 700;\n  margin: 0 0 6px 0;\n  color: #f8f9f0 !important;\n}\n.ah-flock-crops-header p {\n  font-size: 0.82rem;\n  margin: 0;\n  color: #dde2d8 !important;\n}\n.ah-flock-crops-body {\n  background-color: #f8f9f0;\n  overflow-x: auto;\n}\n.ah-flock-crops-body table {\n  width: 100%;\n  border-collapse: collapse;\n  min-width: 560px;\n}\n.ah-flock-crops-body thead th {\n  background-color: #1c3c2c;\n  color: #f8f9f0 !important;\n  padding: 11px 14px;\n  text-align: left;\n  font-weight: 600;\n  font-size: 0.8rem;\n  white-space: nowrap;\n}\n.ah-flock-crops-body tbody tr:nth-child(odd) {\n  background-color: #fff;\n}\n.ah-flock-crops-body tbody tr:nth-child(even) {\n  background-color: #f0f2ec;\n}\n.ah-flock-crops-body td {\n  padding: 10px 14px;\n  font-size: 0.82rem;\n  color: #1a3b2a !important;\n  border-bottom: 1px solid #dde2d8;\n  vertical-align: top;\n}\n.ah-flock-crops-body td strong {\n  color: #1a3b2a !important;\n}\n.ah-flock-crops-label {\n  font-weight: 700;\n  color: #1a3b2a !important;\n}\n.ah-flock-crops-source {\n  padding: 10px 14px;\n  font-size: 0.74rem;\n  color: #8c9c8c !important;\n  border-top: 1px solid #dde2d8;\n  background-color: #f8f9f0;\n}\n.ah-flock-crops-footer {\n  background-color: #1a3b2a;\n  color: #f8f9f0 !important;\n  text-align: center;\n  padding: 11px;\n  font-size: 0.74rem;\n}\n@media (max-width: 600px) {\n  .ah-flock-crops-header h2 { font-size: 1.05rem !important; }\n  .ah-flock-crops-body thead th,\n  .ah-flock-crops-body td { font-size: 0.76rem; padding: 9px 10px; }\n}\n</style>\n\n<div class=\"ah-flock-crops-wrapper\">\n  <div class=\"ah-flock-crops-header\">\n    <h2>Best Garden Crops to Grow as Flock Treats</h2>\n    <p>Nutrient value, how to grow it, and how to serve it in coastal Santa Cruz County</p>\n  </div>\n  <div class=\"ah-flock-crops-body\">\n    <table>\n      <thead>\n        <tr>\n          <th>Crop</th>\n          <th>Key Nutritional Benefit</th>\n          <th>How to Grow Here</th>\n          <th>How to Serve</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td class=\"ah-flock-crops-label\">Kale / Collards</td>\n          <td>Vitamins A and K, calcium, carotenoids for yolk color</td>\n          <td>Year-round in our climate; direct-sow or transplant Sept-Feb for main crop</td>\n          <td>Hang whole plant in run; tear leaves into run; strip stalks</td>\n        </tr>\n        <tr>\n          <td class=\"ah-flock-crops-label\">Pumpkin / Winter Squash</td>\n          <td>Beta-carotene (vitamin A), seeds have mild antiparasitic properties</td>\n          <td>Sow May-June; harvest Sept-Oct; stores for months</td>\n          <td>Halve and place cut-side down in run; birds excavate seeds and flesh</td>\n        </tr>\n        <tr>\n          <td class=\"ah-flock-crops-label\">Sunflowers (seed heads)</td>\n          <td>22% protein, healthy fats; excellent during fall molt</td>\n          <td>Direct-sow Apr-May in full sun; harvest Aug-Sept; dry heads</td>\n          <td>Offer whole dried heads; or hand-strip seeds as a high-protein supplement</td>\n        </tr>\n        <tr>\n          <td class=\"ah-flock-crops-label\">Leaf Amaranth</td>\n          <td>High protein for a leafy green; iron, calcium; seeds also nutritious</td>\n          <td>Sow May-June after soil warms; fast-growing; drought-tolerant</td>\n          <td>Harvest leaves throughout summer; toss whole plant when going to seed</td>\n        </tr>\n        <tr>\n          <td class=\"ah-flock-crops-label\">Swiss Chard</td>\n          <td>Vitamins A, C, K; offer in moderation (oxalic acid)</td>\n          <td>Year-round; most productive Sept-May in coastal areas</td>\n          <td>Handful of leaves 2-3x per week; not a daily staple</td>\n        </tr>\n        <tr>\n          <td class=\"ah-flock-crops-label\">Peas (snap or shell)</td>\n          <td>Protein, vitamins; vines and leaves also palatable</td>\n          <td>Sow Oct-Feb for spring harvest; pull whole plant after harvest</td>\n          <td>Fresh only; toss whole plants; never dried (digestive issues)</td>\n        </tr>\n        <tr>\n          <td class=\"ah-flock-crops-label\">Herbs (oregano, parsley, thyme)</td>\n          <td>Antimicrobial compounds; vitamins A and C; enrichment</td>\n          <td>Perennial in our climate; grow in any corner of the treat bed</td>\n          <td>Fresh sprigs tossed into run; or added to nest boxes</td>\n        </tr>\n        <tr>\n          <td class=\"ah-flock-crops-label\">Comfrey (Russian)</td>\n          <td>Up to 23% crude protein (dry weight); B12 precursors, calcium</td>\n          <td>Plant once; perennial; cut 5-6 times per season; full sun to part shade</td>\n          <td>Fresh leaves only; offer cut leaves directly; never dried</td>\n        </tr>\n        <tr>\n          <td class=\"ah-flock-crops-label\">Cucumbers / Melons</td>\n          <td>Hydration; cooling; low calorie; not a nutritional powerhouse</td>\n          <td>Cucumbers: May-Aug in coastal areas; melons need warmer microclimate</td>\n          <td>Halve and place in run on hot days; excellent hydration treat</td>\n        </tr>\n      </tbody>\n    </table>\n    <div class=\"ah-flock-crops-source\">Source: UC ANR Small Farms Program; UC ANR Poultry Nutrition; Cornell Cooperative Extension Poultry. Planting windows for USDA Zone 9b-10a, Santa Cruz County coast.</div>\n  </div>\n  <div class=\"ah-flock-crops-footer\">ambitiousharvest.com | Santa Cruz County Flock Keeping</div>\n</div>";

px;\n  font-size: 0.74rem;\n  color: #8c9c8c !important;\n  border-top: 1px solid #dde2d8;\n  background-color: #f8f9f0;\n}\n.ah-flock-cal-footer {\n  background-color: #1a3b2a;\n  color: #f8f9f0 !important;\n  text-align: center;\n  padding: 11px;\n  font-size: 0.74rem;\n}\n@media (max-width: 600px) {\n  .ah-flock-cal-header h2 { font-size: 1.05rem !important; }\n  .ah-flock-cal-row,\n  .ah-flock-cal-col-head {\n    grid-template-columns: 90px 1fr;\n  }\n  .ah-flock-cal-col:nth-child(3),\n  .ah-flock-cal-col-head span:nth-child(3) {\n    display: none;\n  }\n  .ah-flock-cal-col,\n  .ah-flock-cal-col-head span { font-size: 0.74rem; padding: 8px 9px; }\n}\n</style>\n\n<div class=\"ah-flock-cal-wrapper\">\n  <div class=\"ah-flock-cal-header\">\n    <h2>Flock Treat Garden: Season-by-Season Planting Calendar</h2>\n    <p>Santa Cruz County coastal climate (USDA Zone 9b-10a). Inland pockets run 2-4 weeks warmer.</p>\n  </div>\n  <div class=\"ah-flock-cal-body\">\n\n    <div class=\"ah-flock-cal-season\">\n      <div class=\"ah-flock-cal-season-label\">FALL (September - November)</div>\n      <div class=\"ah-flock-cal-col-head\">\n        <span>Month</span>\n        <span style=\"padding-left:14px;\">Sow / Plant Now</span>\n        <span>Harvest / Serve Now</span>\n      </div>\n      <div class=\"ah-flock-cal-row\">\n        <div class=\"ah-flock-cal-col ah-flock-cal-month\">September</div>\n        <div class=\"ah-flock-cal-col\">Start kale, collards, chard transplants; sow amaranth final succession</div>\n        <div class=\"ah-flock-cal-col\">Sunflower heads (dry and serve); summer squash and cucumbers still producing</div>\n      </div>\n      <div class=\"ah-flock-cal-row\">\n        <div class=\"ah-flock-cal-col ah-flock-cal-month\">October</div>\n        <div class=\"ah-flock-cal-col\">Sow sugar snap peas; transplant brassica starts to main bed</div>\n        <div class=\"ah-flock-cal-col\">Pumpkins and winter squash (store for winter); comfrey final cut of season</div>\n      </div>\n      <div class=\"ah-flock-cal-row\">\n        <div class=\"ah-flock-cal-col ah-flock-cal-month\">November</div>\n        <div class=\"ah-flock-cal-col\">Continue pea sowing; plant Russian comfrey roots (fall planting establishes well)</div>\n        <div class=\"ah-flock-cal-col\">Kale, chard, collards in production; stored pumpkins; dried sunflower seeds</div>\n      </div>\n    </div>\n\n    <div class=\"ah-flock-cal-season\">\n      <div class=\"ah-flock-cal-season-label\">WINTER (December - February)</div>\n      <div class=\"ah-flock-cal-col-head\">\n        <span>Month</span>\n        <span style=\"padding-left:14px;\">Sow / Plant Now</span>\n        <span>Harvest / Serve Now</span>\n      </div>\n      <div class=\"ah-flock-cal-row\">\n        <div class=\"ah-flock-cal-col ah-flock-cal-month\">December</div>\n        <div class=\"ah-flock-cal-col\">Sow overwintering peas; plant parsley and thyme starts</div>\n        <div class=\"ah-flock-cal-col\">Kale, chard, collards; stored winter squash; herb sprigs</div>\n      </div>\n      <div class=\"ah-flock-cal-row\">\n        <div class=\"ah-flock-cal-col ah-flock-cal-month\">January</div>\n        <div class=\"ah-flock-cal-col\">Sow peas for spring; plan summer crops (order sunflower seeds)</div>\n        <div class=\"ah-flock-cal-col\">Kale, chard; pea vines emerging (great for ducks and geese)</div>\n      </div>\n      <div class=\"ah-flock-cal-row\">\n        <div class=\"ah-flock-cal-col ah-flock-cal-month\">February</div>\n        <div class=\"ah-flock-cal-col\">Start pumpkin and sunflower seeds indoors late Feb for transplant in May</div>\n        <div class=\"ah-flock-cal-col\">Kale, chard; snap peas beginning to produce; comfrey returning</div>\n      </div>\n    </div>\n\n    <div class=\"ah-flock-cal-season\">\n      <div class=\"ah-flock-cal-season-label\">SPRING (March - May)</div>\n      <div class=\"ah-flock-cal-col-head\">\n        <span>Month</span>\n        <span style=\"padding-left:14px;\">Sow / Plant Now</span>\n        <span>Harvest / Serve Now</span>\n      </div>\n      <div class=\"ah-flock-cal-row\">\n        <div class=\"ah-flock-cal-col ah-flock-cal-month\">March</div>\n        <div class=\"ah-flock-cal-col\">Direct-sow sunflowers in full-sun spot; sow amaranth in warmest area</div>\n        <div class=\"ah-flock-cal-col\">Peak pea harvest; kale bolting (flowers are nutritious); comfrey first cuts</div>\n      </div>\n      <div class=\"ah-flock-cal-row\">\n        <div class=\"ah-flock-cal-col ah-flock-cal-month\">April</div>\n        <div class=\"ah-flock-cal-col\">Sow cucumbers under cover; transplant pumpkin starts outdoors after mid-month</div>\n        <div class=\"ah-flock-cal-col\">Peas, comfrey, new kale growth; pull spent pea plants and toss to flock</div>\n      </div>\n      <div class=\"ah-flock-cal-row\">\n        <div class=\"ah-flock-cal-col ah-flock-cal-month\">May</div>\n        <div class=\"ah-flock-cal-col\">Transplant pumpkins and sunflowers; direct-sow amaranth and summer squash</div>\n        <div class=\"ah-flock-cal-col\">Comfrey at peak production; amaranth seedling thinnings; herb cuttings</div>\n      </div>\n    </div>\n\n    <div class=\"ah-flock-cal-season\">\n      <div class=\"ah-flock-cal-season-label\">SUMMER (June - August)</div>\n      <div class=\"ah-flock-cal-col-head\">\n        <span>Month</span>\n        <span style=\"padding-left:14px;\">Sow / Plant Now</span>\n        <span>Harvest / Serve Now</span>\n      </div>\n      <div class=\"ah-flock-cal-row\">\n        <div class=\"ah-flock-cal-col ah-flock-cal-month\">June</div>\n        <div class=\"ah-flock-cal-col\">Succession-sow amaranth and cucumbers; sow pumpkins in hot inland spots</div>\n        <div class=\"ah-flock-cal-col\">Cucumbers, comfrey, amaranth leaves; early summer squash</div>\n      </div>\n      <div class=\"ah-flock-cal-row\">\n        <div class=\"ah-flock-cal-col ah-flock-cal-month\">July</div>\n        <div class=\"ah-flock-cal-col\">Sow kale and chard for fall (start now for Sept harvest); sow winter squash</div>\n        <div class=\"ah-flock-cal-col\">Cucumbers, amaranth, comfrey; summer squash; sunflower heads approaching maturity</div>\n      </div>\n      <div class=\"ah-flock-cal-row\">\n        <div class=\"ah-flock-cal-col ah-flock-cal-month\">August</div>\n        <div class=\"ah-flock-cal-col\">Transplant kale and chard starts; sow peas for early fall (in coastal areas)</div>\n        <div class=\"ah-flock-cal-col\">Sunflower heads maturing (begin drying); amaranth going to seed; cucumbers, squash</div>\n      </div>\n    </div>\n\n    <div class=\"ah-flock-cal-note\">Source: UC ANR Vegetable Planting Guide for Santa Cruz County; UC Cooperative Extension Monterey Bay Area. Planting windows for coastal Zone 9b-10a; inland areas of the county run 2-4 weeks warmer in summer and fall.</div>\n  </div>\n  <div class=\"ah-flock-cal-footer\">ambitiousharvest.com | Santa Cruz County Flock Keeping</div>\n</div>";

window.AH_GRAPHICS["garden-flock-treats-safe-avoid"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-flock-safe-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  border-radius: 4px;\n  overflow: hidden;\n}\n.ah-flock-safe-header {\n  background-color: #1a3b2a;\n  padding: 20px 24px;\n  text-align: center;\n}\n.ah-flock-safe-header h2 {\n  font-size: 1.25rem;\n  font-weight: 700;\n  margin: 0 0 6px 0;\n  color: #f8f9f0 !important;\n}\n.ah-flock-safe-header p {\n  font-size: 0.82rem;\n  margin: 0;\n  color: #dde2d8 !important;\n}\n.ah-flock-safe-body {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 0;\n  background-color: #f8f9f0;\n}\n.ah-flock-safe-col {\n  padding: 0;\n}\n.ah-flock-safe-col-head {\n  padding: 11px 16px;\n  font-size: 0.85rem;\n  font-weight: 700;\n  text-align: center;\n}\n.ah-flock-safe-col-head.safe {\n  background-color: #2a5c3a;\n  color: #f8f9f0 !important;\n  border-right: 2px solid #1a3b2a;\n}\n.ah-flock-safe-col-head.avoid {\n  background-color: #6b2a2a;\n  color: #f8f9f0 !important;\n}\n.ah-flock-safe-item {\n  display: flex;\n  align-items: flex-start;\n  gap: 10px;\n  padding: 10px 14px;\n  border-bottom: 1px solid #dde2d8;\n  font-size: 0.82rem;\n  color: #1a3b2a !important;\n}\n.ah-flock-safe-item.safe-row {\n  background-color: #f0f6f0;\n  border-right: 2px solid #dde2d8;\n}\n.ah-flock-safe-item.safe-row:nth-child(even) {\n  background-color: #e4eee4;\n}\n.ah-flock-safe-item.avoid-row {\n  background-color: #f8f0f0;\n}\n.ah-flock-safe-item.avoid-row:nth-child(even) {\n  background-color: #f0e4e4;\n}\n.ah-flock-safe-mark {\n  flex-shrink: 0;\n  width: 18px;\n  height: 18px;\n  border-radius: 50%;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 0.7rem;\n  font-weight: 700;\n  margin-top: 1px;\n}\n.ah-flock-safe-mark.yes {\n  background-color: #2a5c3a;\n  color: #f8f9f0 !important;\n}\n.ah-flock-safe-mark.no {\n  background-color: #8b2020;\n  color: #f8f9f0 !important;\n}\n.ah-flock-safe-text {\n  color: #1a3b2a !important;\n  line-height: 1.45;\n}\n.ah-flock-safe-text strong {\n  color: #1a3b2a !important;\n  display: block;\n  margin-bottom: 2px;\n}\n.ah-flock-safe-note {\n  padding: 10px 14px;\n  font-size: 0.74rem;\n  color: #8c9c8c !important;\n  border-top: 1px solid #dde2d8;\n  background-color: #f8f9f0;\n}\n.ah-flock-safe-footer {\n  background-color: #1a3b2a;\n  color: #f8f9f0 !important;\n  text-align: center;\n  padding: 11px;\n  font-size: 0.74rem;\n}\n@media (max-width: 600px) {\n  .ah-flock-safe-header h2 { font-size: 1.05rem !important; }\n  .ah-flock-safe-body {\n    grid-template-columns: 1fr;\n  }\n  .ah-flock-safe-col-head.safe {\n    border-right: none;\n    border-bottom: 2px solid #1a3b2a;\n  }\n  .ah-flock-safe-item.safe-row { border-right: none; }\n  .ah-flock-safe-item { font-size: 0.78rem; }\n}\n</style>\n\n<div class=\"ah-flock-safe-wrapper\">\n  <div class=\"ah-flock-safe-header\">\n    <h2>Flock Treats: Safe vs. Avoid Quick-Reference</h2>\n    <p>Keep treats to 10% of daily diet. Balanced feed is the foundation.</p>\n  </div>\n  <div class=\"ah-flock-safe-body\">\n    <div class=\"ah-flock-safe-col\">\n      <div class=\"ah-flock-safe-col-head safe\">Safe to Grow and Serve</div>\n      <div class=\"ah-flock-safe-item safe-row\">\n        <span class=\"ah-flock-safe-mark yes\">+</span>\n        <span class=\"ah-flock-safe-text\"><strong>Kale, collards, chard</strong> Offer freely; excellent nutrition</span>\n      </div>\n      <div class=\"ah-flock-safe-item safe-row\">\n        <span class=\"ah-flock-safe-mark yes\">+</span>\n        <span class=\"ah-flock-safe-text\"><strong>Pumpkin and squash</strong> Flesh and seeds both safe; serve fresh</span>\n      </div>\n      <div class=\"ah-flock-safe-item safe-row\">\n        <span class=\"ah-flock-safe-mark yes\">+</span>\n        <span class=\"ah-flock-safe-text\"><strong>Sunflower seeds</strong> High protein; ideal during molt</span>\n      </div>\n      <div class=\"ah-flock-safe-item safe-row\">\n        <span class=\"ah-flock-safe-mark yes\">+</span>\n        <span class=\"ah-flock-safe-text\"><strong>Comfrey leaves (fresh)</strong> Very high protein; cut-and-come-again</span>\n      </div>\n      <div class=\"ah-flock-safe-item safe-row\">\n        <span class=\"ah-flock-safe-mark yes\">+</span>\n        <span class=\"ah-flock-safe-text\"><strong>Leaf amaranth</strong> High protein for a leafy green; fast-growing</span>\n      </div>\n      <div class=\"ah-flock-safe-item safe-row\">\n        <span class=\"ah-flock-safe-mark yes\">+</span>\n        <span class=\"ah-flock-safe-text\"><strong>Fresh peas (snap or shell)</strong> Offer fresh only; never dried</span>\n      </div>\n      <div class=\"ah-flock-safe-item safe-row\">\n        <span class=\"ah-flock-safe-mark yes\">+</span>\n        <span class=\"ah-flock-safe-text\"><strong>Cucumbers and melons</strong> Hydration and cooling on hot days</span>\n      </div>\n      <div class=\"ah-flock-safe-item safe-row\">\n        <span class=\"ah-flock-safe-mark yes\">+</span>\n        <span class=\"ah-flock-safe-text\"><strong>Oregano, parsley, thyme</strong> Antimicrobial and nutrient benefits</span>\n      </div>\n      <div class=\"ah-flock-safe-item safe-row\">\n        <span class=\"ah-flock-safe-mark yes\">+</span>\n        <span class=\"ah-flock-safe-text\"><strong>Ripe tomatoes</strong> Safe; avoid all green parts of the plant</span>\n      </div>\n      <div class=\"ah-flock-safe-item safe-row\">\n        <span class=\"ah-flock-safe-mark yes\">+</span>\n        <span class=\"ah-flock-safe-text\"><strong>Watermelon rinds and flesh</strong> Excellent summer treat for all species</span>\n      </div>\n    </div>\n    <div class=\"ah-flock-safe-col\">\n      <div class=\"ah-flock-safe-col-head avoid\">Never Feed These</div>\n      <div class=\"ah-flock-safe-item avoid-row\">\n        <span class=\"ah-flock-safe-mark no\">X</span>\n        <span class=\"ah-flock-safe-text\"><strong>Avocado (any part)</strong> Persin is toxic; can be fatal to all poultry species</span>\n      </div>\n      <div class=\"ah-flock-safe-item avoid-row\">\n        <span class=\"ah-flock-safe-mark no\">X</span>\n        <span class=\"ah-flock-safe-text\"><strong>Raw or dried beans</strong> Phytohaemagglutinin toxin; potentially fatal</span>\n      </div>\n      <div class=\"ah-flock-safe-item avoid-row\">\n        <span class=\"ah-flock-safe-mark no\">X</span>\n        <span class=\"ah-flock-safe-text\"><strong>Rhubarb leaves</strong> Oxalic acid and glycosides; can cause kidney damage</span>\n      </div>\n      <div class=\"ah-flock-safe-item avoid-row\">\n        <span class=\"ah-flock-safe-mark no\">X</span>\n        <span class=\"ah-flock-safe-text\"><strong>Tomato and pepper plant foliage</strong> Solanine in all nightshade plant parts (not ripe fruit)</span>\n      </div>\n      <div class=\"ah-flock-safe-item avoid-row\">\n        <span class=\"ah-flock-safe-mark no\">X</span>\n        <span class=\"ah-flock-safe-text\"><strong>Green potato skins</strong> Solanine; cooked ripe potato flesh is safe</span>\n      </div>\n      <div class=\"ah-flock-safe-item avoid-row\">\n        <span class=\"ah-flock-safe-mark no\">X</span>\n        <span class=\"ah-flock-safe-text\"><strong>Moldy or rotten produce</strong> Mycotoxins are harmful to all poultry; when in doubt, compost it</span>\n      </div>\n      <div class=\"ah-flock-safe-item avoid-row\">\n        <span class=\"ah-flock-safe-mark no\">X</span>\n        <span class=\"ah-flock-safe-text\"><strong>Onions (large amounts)</strong> Hemolytic anemia risk; small amounts unlikely to harm</span>\n      </div>\n      <div class=\"ah-flock-safe-item avoid-row\">\n        <span class=\"ah-flock-safe-mark no\">X</span>\n        <span class=\"ah-flock-safe-text\"><strong>Chocolate</strong> Theobromine is toxic to birds; never offer any amount</span>\n      </div>\n      <div class=\"ah-flock-safe-item avoid-row\">\n        <span class=\"ah-flock-safe-mark no\">X</span>\n        <span class=\"ah-flock-safe-text\"><strong>Dried comfrey</strong> Alkaloid content concentrates; fresh leaves only</span>\n      </div>\n      <div class=\"ah-flock-safe-item avoid-row\">\n        <span class=\"ah-flock-safe-mark no\">X</span>\n        <span class=\"ah-flock-safe-text\"><strong>Salty or heavily processed food</strong> Salt toxicity in poultry; no nutritional value</span>\n      </div>\n    </div>\n  </div>\n  <div class=\"ah-flock-safe-note\">Sources: ASPCA Animal Poison Control; UC Davis Veterinary Medicine; UC IPM; Cornell Cooperative Extension Poultry.</div>\n  <div class=\"ah-flock-safe-footer\">ambitiousharvest.com | Santa Cruz County Flock Keeping</div>\n</div>";



window.AH_GRAPHICS["garden-flock-calendar-monthly-tasks"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-cal-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\n.ah-cal-header {\n  background-color: #1a3b2a;\n  padding: 20px 24px;\n  border-radius: 8px 8px 0 0;\n}\n\n.ah-cal-header h2 {\n  color: #f8f9f0 !important;\n  font-size: 1.25rem !important;\n  font-weight: 700 !important;\n  margin: 0 0 4px 0 !important;\n}\n\n.ah-cal-header p {\n  color: #dde2d8 !important;\n  font-size: 0.85rem !important;\n  margin: 0 !important;\n}\n\n.ah-cal-body {\n  border: 2px solid #1a3b2a;\n  border-top: none;\n  border-radius: 0 0 8px 8px;\n  overflow: hidden;\n}\n\n.ah-cal-season {\n  border-bottom: 1px solid #dde2d8;\n}\n\n.ah-cal-season:last-child {\n  border-bottom: none;\n}\n\n.ah-cal-season-label {\n  background-color: #1c3c2c;\n  padding: 10px 20px;\n}\n\n.ah-cal-season-label span {\n  color: #c9a84c !important;\n  font-size: 0.8rem !important;\n  font-weight: 700 !important;\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n}\n\n.ah-cal-months {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n}\n\n.ah-cal-month {\n  padding: 14px 16px;\n  border-right: 1px solid #dde2d8;\n  border-top: 1px solid #dde2d8;\n}\n\n.ah-cal-month:last-child {\n  border-right: none;\n}\n\n.ah-cal-month-name {\n  color: #1a3b2a !important;\n  font-size: 0.75rem !important;\n  font-weight: 700 !important;\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n  margin: 0 0 6px 0 !important;\n}\n\n.ah-cal-month ul {\n  margin: 0;\n  padding: 0 0 0 14px;\n  list-style-type: disc;\n}\n\n.ah-cal-month li {\n  color: #1a3b2a !important;\n  font-size: 0.78rem !important;\n  line-height: 1.5;\n  margin-bottom: 3px;\n}\n\n.ah-cal-footer {\n  background-color: #f8f9f0;\n  border-top: 1px solid #dde2d8;\n  padding: 8px 20px;\n  text-align: right;\n}\n\n.ah-cal-footer span {\n  color: #8c9c8c !important;\n  font-size: 0.72rem !important;\n}\n\n@media (max-width: 600px) {\n  .ah-cal-months {\n    grid-template-columns: 1fr;\n  }\n  .ah-cal-month {\n    border-right: none;\n  }\n  .ah-cal-header h2 {\n    font-size: 1.1rem !important;\n  }\n}\n</style>\n\n<div class=\"ah-cal-wrapper\">\n  <div class=\"ah-cal-header\">\n    <h2>Santa Cruz County Flock Care Calendar</h2>\n    <p>Key monthly tasks tuned to our coastal California climate</p>\n  </div>\n  <div class=\"ah-cal-body\">\n    <div class=\"ah-cal-season\">\n      <div class=\"ah-cal-season-label\"><span>Winter</span></div>\n      <div class=\"ah-cal-months\">\n        <div class=\"ah-cal-month\">\n          <p class=\"ah-cal-month-name\">January</p>\n          <ul>\n            <li>Mud management: add wood chips to run</li>\n            <li>Check ventilation; clear blockages</li>\n            <li>Inspect for mites and lice</li>\n            <li>Order spring chicks from hatchery</li>\n          </ul>\n        </div>\n        <div class=\"ah-cal-month\">\n          <p class=\"ah-cal-month-name\">February</p>\n          <ul>\n            <li>Deep-clean coop if not done in fall</li>\n            <li>Set up brooder equipment for chicks</li>\n            <li>Verify predator-proofing before breeding season</li>\n            <li>First chick arrivals (late Feb)</li>\n          </ul>\n        </div>\n        <div class=\"ah-cal-month\">\n          <p class=\"ah-cal-month-name\">March</p>\n          <ul>\n            <li>Chick season peak; brood indoors or in protected space</li>\n            <li>Egg production increases with longer days</li>\n            <li>Start supplementing calcium as laying ramps up</li>\n            <li>First spring parasite check</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n    <div class=\"ah-cal-season\">\n      <div class=\"ah-cal-season-label\"><span>Spring</span></div>\n      <div class=\"ah-cal-months\">\n        <div class=\"ah-cal-month\">\n          <p class=\"ah-cal-month-name\">April</p>\n          <ul>\n            <li>Move chicks to outdoor grow pen (weather permitting)</li>\n            <li>Manage garden-flock integration; fence vegetable beds</li>\n            <li>Inspect coop hardware cloth for winter damage</li>\n            <li>Coccidiosis risk rises with wet soil</li>\n          </ul>\n        </div>\n        <div class=\"ah-cal-month\">\n          <p class=\"ah-cal-month-name\">May</p>\n          <ul>\n            <li>Coast fog season begins; monitor humidity in coop</li>\n            <li>Peak laying for most adult hens</li>\n            <li>Transition pullets to layer or all-flock feed at 18 weeks</li>\n            <li>Check for mite infestations; treat if needed</li>\n          </ul>\n        </div>\n        <div class=\"ah-cal-month\">\n          <p class=\"ah-cal-month-name\">June</p>\n          <ul>\n            <li>Summer molt watch begins in older hens</li>\n            <li>Inland flocks: set up shade structures</li>\n            <li>Deep-clean waterers; heat accelerates algae</li>\n            <li>Monitor pullets for first eggs (if hatched in Feb-March)</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n    <div class=\"ah-cal-season\">\n      <div class=\"ah-cal-season-label\"><span>Summer</span></div>\n      <div class=\"ah-cal-months\">\n        <div class=\"ah-cal-month\">\n          <p class=\"ah-cal-month-name\">July</p>\n          <ul>\n            <li>Inland heat events: freeze water in treat dishes; add misters</li>\n            <li>Coast: fog keeps temps moderate; watch for respiratory issues from humidity</li>\n            <li>Keep feed fresh; summer heat turns feed rancid faster</li>\n            <li>Red mite pressure peaks; inspect roost bars</li>\n          </ul>\n        </div>\n        <div class=\"ah-cal-month\">\n          <p class=\"ah-cal-month-name\">August</p>\n          <ul>\n            <li>Watch for heat stress signs in inland flocks</li>\n            <li>Garden harvest season: safe scraps abundant</li>\n            <li>Predator pressure rises as coyotes and raccoons seek water</li>\n            <li>Lock-up times shift earlier; adjust evening routine</li>\n          </ul>\n        </div>\n        <div class=\"ah-cal-month\">\n          <p class=\"ah-cal-month-name\">September</p>\n          <ul>\n            <li>Fall molt begins in many hens (days shortening)</li>\n            <li>Increase protein: mealworms, sunflower seeds during molt</li>\n            <li>Egg production drops; this is normal</li>\n            <li>Begin annual coop deep-clean before rainy season</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n    <div class=\"ah-cal-season\">\n      <div class=\"ah-cal-season-label\"><span>Fall and Winter</span></div>\n      <div class=\"ah-cal-months\">\n        <div class=\"ah-cal-month\">\n          <p class=\"ah-cal-month-name\">October</p>\n          <ul>\n            <li>Deep-clean coop; refresh bedding before rains</li>\n            <li>Repair coop roof, hardware cloth, and vents</li>\n            <li>Full molt in progress; hens look rough (normal)</li>\n            <li>Add fresh bedding to roost areas for warmth</li>\n          </ul>\n        </div>\n        <div class=\"ah-cal-month\">\n          <p class=\"ah-cal-month-name\">November</p>\n          <ul>\n            <li>Rainy season arrives; mud management begins</li>\n            <li>Most hens resuming lay as molt concludes</li>\n            <li>Add supplemental light if desired (14 hours triggers laying)</li>\n            <li>Rodent pressure increases as rains push mice indoors</li>\n          </ul>\n        </div>\n        <div class=\"ah-cal-month\">\n          <p class=\"ah-cal-month-name\">December</p>\n          <ul>\n            <li>Shortest days; expect minimum egg production</li>\n            <li>Scratch grain before roost for overnight warmth</li>\n            <li>Monitor for respiratory illness in damp conditions</li>\n            <li>Plan spring flock additions; review breed notes</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n  </div>\n  <div class=\"ah-cal-footer\">\n    <span>ambitiousharvest.com | Source: UC ANR Small Flock Poultry guidelines; NOAA Santa Cruz sunrise data</span>\n  </div>\n</div>";



window.AH_GRAPHICS["garden-flock-calendar-rhythms"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-rhythm-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\n.ah-rhythm-header {\n  background-color: #1a3b2a;\n  padding: 18px 24px;\n  border-radius: 8px 8px 0 0;\n}\n\n.ah-rhythm-header h2 {\n  color: #f8f9f0 !important;\n  font-size: 1.2rem !important;\n  font-weight: 700 !important;\n  margin: 0 0 4px 0 !important;\n}\n\n.ah-rhythm-header p {\n  color: #dde2d8 !important;\n  font-size: 0.82rem !important;\n  margin: 0 !important;\n}\n\n.ah-rhythm-body {\n  border: 2px solid #1a3b2a;\n  border-top: none;\n  border-radius: 0 0 8px 8px;\n  overflow: hidden;\n  background-color: #f8f9f0;\n}\n\n.ah-rhythm-row {\n  display: grid;\n  grid-template-columns: 140px 1fr;\n  border-bottom: 1px solid #dde2d8;\n  align-items: stretch;\n}\n\n.ah-rhythm-row:last-child {\n  border-bottom: none;\n}\n\n.ah-rhythm-label {\n  background-color: #dde2d8;\n  padding: 14px 16px;\n  display: flex;\n  align-items: center;\n}\n\n.ah-rhythm-label span {\n  color: #1a3b2a !important;\n  font-size: 0.78rem !important;\n  font-weight: 700 !important;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n}\n\n.ah-rhythm-tasks {\n  padding: 12px 18px;\n}\n\n.ah-rhythm-tasks ul {\n  margin: 0;\n  padding: 0 0 0 16px;\n}\n\n.ah-rhythm-tasks li {\n  color: #1a3b2a !important;\n  font-size: 0.8rem !important;\n  line-height: 1.55;\n  margin-bottom: 3px;\n}\n\n.ah-rhythm-footer {\n  background-color: #f8f9f0;\n  border-top: 1px solid #dde2d8;\n  padding: 8px 20px;\n  text-align: right;\n}\n\n.ah-rhythm-footer span {\n  color: #8c9c8c !important;\n  font-size: 0.72rem !important;\n}\n\n@media (max-width: 600px) {\n  .ah-rhythm-row {\n    grid-template-columns: 1fr;\n  }\n  .ah-rhythm-label {\n    padding: 10px 16px;\n  }\n}\n</style>\n\n<div class=\"ah-rhythm-wrapper\">\n  <div class=\"ah-rhythm-header\">\n    <h2>Year-Round Flock Management Rhythms</h2>\n    <p>Regular cycles that underpin seasonal care</p>\n  </div>\n  <div class=\"ah-rhythm-body\">\n    <div class=\"ah-rhythm-row\">\n      <div class=\"ah-rhythm-label\"><span>Daily</span></div>\n      <div class=\"ah-rhythm-tasks\">\n        <ul>\n          <li>Collect eggs; check nest boxes</li>\n          <li>Verify all birds present and alert at morning release</li>\n          <li>Refill fresh water</li>\n          <li>Lock up at dusk (or verify automatic door closed)</li>\n        </ul>\n      </div>\n    </div>\n    <div class=\"ah-rhythm-row\">\n      <div class=\"ah-rhythm-label\"><span>Weekly</span></div>\n      <div class=\"ah-rhythm-tasks\">\n        <ul>\n          <li>Refresh roost bar bedding; spot-clean floor</li>\n          <li>Scrub and disinfect waterers</li>\n          <li>Check feed supply; inspect rodent-proof storage</li>\n          <li>Walk perimeter for predator probing</li>\n        </ul>\n      </div>\n    </div>\n    <div class=\"ah-rhythm-row\">\n      <div class=\"ah-rhythm-label\"><span>Monthly</span></div>\n      <div class=\"ah-rhythm-tasks\">\n        <ul>\n          <li>Inspect each bird: keel condition, eyes, vent, feathers</li>\n          <li>Check for external parasites (mites, lice)</li>\n          <li>Monitor feed consumption vs. baseline</li>\n          <li>Inspect hardware cloth and coop for damage</li>\n        </ul>\n      </div>\n    </div>\n    <div class=\"ah-rhythm-row\">\n      <div class=\"ah-rhythm-label\"><span>Twice Yearly</span></div>\n      <div class=\"ah-rhythm-tasks\">\n        <ul>\n          <li>Full coop deep-clean (Oct and late April/May)</li>\n          <li>Treat for red mites if detected</li>\n          <li>Audit predator-proofing completely</li>\n          <li>Review flock health records and plan any replacements</li>\n        </ul>\n      </div>\n    </div>\n    <div class=\"ah-rhythm-row\">\n      <div class=\"ah-rhythm-label\"><span>Annually</span></div>\n      <div class=\"ah-rhythm-tasks\">\n        <ul>\n          <li>Order spring chicks if adding to flock (January)</li>\n          <li>Deep-audit run drainage before rainy season</li>\n          <li>Review feed costs and storage setup</li>\n          <li>Assess flock composition and productivity</li>\n        </ul>\n      </div>\n    </div>\n  </div>\n  <div class=\"ah-rhythm-footer\">\n    <span>ambitiousharvest.com | UC ANR Small Flock Poultry Management</span>\n  </div>\n</div>";



window.AH_GRAPHICS["garden-flock-calendar-winter-card"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-winter-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\n.ah-winter-header {\n  background-color: #1c3c2c;\n  padding: 20px 24px;\n  border-radius: 8px 8px 0 0;\n}\n\n.ah-winter-header h2 {\n  color: #f8f9f0 !important;\n  font-size: 1.2rem !important;\n  font-weight: 700 !important;\n  margin: 0 0 4px 0 !important;\n}\n\n.ah-winter-header p {\n  color: #dde2d8 !important;\n  font-size: 0.82rem !important;\n  margin: 0 !important;\n}\n\n.ah-winter-body {\n  border: 2px solid #1c3c2c;\n  border-top: none;\n  border-radius: 0 0 8px 8px;\n  overflow: hidden;\n  background-color: #f8f9f0;\n}\n\n.ah-winter-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n}\n\n.ah-winter-card {\n  padding: 18px 20px;\n  border-right: 1px solid #dde2d8;\n  border-bottom: 1px solid #dde2d8;\n}\n\n.ah-winter-card:nth-child(even) {\n  border-right: none;\n}\n\n.ah-winter-card:nth-last-child(-n+2) {\n  border-bottom: none;\n}\n\n.ah-winter-card-title {\n  color: #1a3b2a !important;\n  font-size: 0.82rem !important;\n  font-weight: 700 !important;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n  margin: 0 0 8px 0 !important;\n}\n\n.ah-winter-risk {\n  display: inline-block;\n  background-color: #c9a84c;\n  color: #1a3b2a !important;\n  font-size: 0.68rem !important;\n  font-weight: 700 !important;\n  padding: 2px 7px;\n  border-radius: 3px;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n  margin-bottom: 8px;\n}\n\n.ah-winter-card p {\n  color: #1a3b2a !important;\n  font-size: 0.8rem !important;\n  line-height: 1.55;\n  margin: 0;\n}\n\n.ah-winter-card ul {\n  margin: 6px 0 0 0;\n  padding: 0 0 0 16px;\n}\n\n.ah-winter-card li {\n  color: #1a3b2a !important;\n  font-size: 0.78rem !important;\n  line-height: 1.5;\n  margin-bottom: 3px;\n}\n\n.ah-winter-footer {\n  background-color: #dde2d8;\n  padding: 8px 20px;\n  text-align: right;\n  border-top: 1px solid #dde2d8;\n}\n\n.ah-winter-footer span {\n  color: #1a3b2a !important;\n  font-size: 0.72rem !important;\n}\n\n@media (max-width: 600px) {\n  .ah-winter-grid {\n    grid-template-columns: 1fr;\n  }\n  .ah-winter-card {\n    border-right: none;\n  }\n  .ah-winter-card:nth-last-child(-n+2) {\n    border-bottom: 1px solid #dde2d8;\n  }\n  .ah-winter-card:last-child {\n    border-bottom: none;\n  }\n}\n</style>\n\n<div class=\"ah-winter-wrapper\">\n  <div class=\"ah-winter-header\">\n    <h2>Winter Flock Health: What to Watch and What to Do</h2>\n    <p>Santa Cruz County specific (December through March)</p>\n  </div>\n  <div class=\"ah-winter-body\">\n    <div class=\"ah-winter-grid\">\n      <div class=\"ah-winter-card\">\n        <p class=\"ah-winter-card-title\">Mud and Wet Litter</p>\n        <span class=\"ah-winter-risk\">High risk in SLV and inland</span>\n        <p>Wet soil concentrates coccidia, bacteria, and ammonia. Spread coarse wood chips or rice hulls over run floor. Elevate feeders. Check coop floor stays dry -- wet bedding under roost bars is the biggest winter health threat.</p>\n      </div>\n      <div class=\"ah-winter-card\">\n        <p class=\"ah-winter-card-title\">Respiratory Disease</p>\n        <span class=\"ah-winter-risk\">Watch entire county</span>\n        <p>Cold-season Mycoplasma and Pasteurella thrive in damp, poorly ventilated coops. Keep ventilation open above roost level. Early signs: bubbling eyes, gurgling breath, nasal discharge. Isolate and contact your vet promptly.</p>\n      </div>\n      <div class=\"ah-winter-card\">\n        <p class=\"ah-winter-card-title\">Parasites in Wet Soil</p>\n        <span class=\"ah-winter-risk\">Inspect monthly</span>\n        <p>Northern fowl mites remain active in winter. Wet soil extends survival of intestinal parasite eggs. Check for mites under wing and at vent. If worm burden is suspected, consult your vet about fecal testing before treating.</p>\n        <ul>\n          <li>Part feathers at vent area monthly</li>\n          <li>Inspect roost bars at night for red mites</li>\n        </ul>\n      </div>\n      <div class=\"ah-winter-card\">\n        <p class=\"ah-winter-card-title\">Rodent Pressure</p>\n        <span class=\"ah-winter-risk\">Rises Nov through Feb</span>\n        <p>Rain drives rats and mice toward coop warmth and feed. Store all feed in metal bins with lids. Use treadle feeders or remove feeders at night. UC IPM recommends sanitation over rodenticides near poultry to prevent secondary poisoning of birds.</p>\n      </div>\n      <div class=\"ah-winter-card\">\n        <p class=\"ah-winter-card-title\">Egg Production</p>\n        <span class=\"ah-winter-risk\">Expect reduction</span>\n        <p>Natural light drives laying. At under 10 hours of daylight (Dec-Jan), many hens slow or stop. This is normal and beneficial: rest improves longevity. If you want winter eggs, add artificial light to bring total hours to 14-16. A simple timer and LED bulb work well.</p>\n      </div>\n      <div class=\"ah-winter-card\">\n        <p class=\"ah-winter-card-title\">Predator Risk Shifts</p>\n        <span class=\"ah-winter-risk\">Verify hardware cloth</span>\n        <p>Coyote and raccoon activity increases in winter as natural food sources thin. Shorter days mean birds lock up earlier and earlier. Verify all hardware cloth is intact after wind and rain storms. Check aprons and under-coop gaps where digging predators probe.</p>\n      </div>\n    </div>\n  </div>\n  <div class=\"ah-winter-footer\">\n    <span>ambitiousharvest.com | Sources: UC ANR Small Flock Poultry; UC IPM Poultry Pest Management; Western Regional Climate Center</span>\n  </div>\n</div>";



window.AH_GRAPHICS["garden-flock-fogbreeds-avoid"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-avoid-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\n.ah-avoid-header {\n  background-color: #1a3b2a;\n  padding: 22px 28px 18px;\n  border-radius: 6px 6px 0 0;\n}\n\n.ah-avoid-header h2 {\n  font-size: 1.2rem !important;\n  font-weight: 700 !important;\n  color: #f8f9f0 !important;\n  margin: 0 0 5px 0 !important;\n}\n\n.ah-avoid-header p {\n  font-size: 0.83rem !important;\n  color: #dde2d8 !important;\n  margin: 0 !important;\n}\n\n.ah-avoid-body {\n  background-color: #f8f9f0;\n  border: 1px solid #dde2d8;\n  border-top: none;\n  padding: 0;\n}\n\n.ah-avoid-row {\n  display: flex;\n  align-items: flex-start;\n  padding: 16px 20px;\n  border-bottom: 1px solid #dde2d8;\n  gap: 16px;\n}\n\n.ah-avoid-row:last-child {\n  border-bottom: none;\n}\n\n.ah-avoid-label {\n  flex: 0 0 160px;\n  font-size: 0.85rem !important;\n  font-weight: 700 !important;\n  color: #1c3c2c !important;\n  padding-top: 2px;\n}\n\n.ah-avoid-reason {\n  flex: 1;\n  font-size: 0.83rem !important;\n  color: #1a3b2a !important;\n  line-height: 1.5 !important;\n}\n\n.ah-avoid-tag {\n  display: inline-block;\n  background-color: #c9a84c;\n  color: #1a3b2a !important;\n  font-size: 0.70rem !important;\n  font-weight: 700 !important;\n  padding: 2px 7px;\n  border-radius: 3px;\n  margin-left: 8px;\n  vertical-align: middle;\n}\n\n.ah-avoid-footer {\n  background-color: #dde2d8;\n  text-align: center;\n  padding: 8px 14px;\n  font-size: 0.72rem !important;\n  color: #1a3b2a !important;\n  font-family: 'Montserrat', sans-serif;\n  font-weight: 600 !important;\n  border-radius: 0 0 6px 6px;\n  letter-spacing: 0.03em;\n}\n\n.ah-avoid-source {\n  background-color: #f8f9f0;\n  padding: 10px 20px;\n  border: 1px solid #dde2d8;\n  border-top: none;\n  font-size: 0.72rem !important;\n  color: #8c9c8c !important;\n  font-family: 'Montserrat', sans-serif;\n}\n\n@media (max-width: 600px) {\n  .ah-avoid-row {\n    flex-direction: column;\n    gap: 6px;\n    padding: 14px 14px;\n  }\n  .ah-avoid-label {\n    flex: none;\n    font-size: 0.83rem !important;\n  }\n  .ah-avoid-reason {\n    font-size: 0.80rem !important;\n  }\n  .ah-avoid-header {\n    padding: 16px 14px 12px;\n  }\n  .ah-avoid-header h2 {\n    font-size: 1.0rem !important;\n  }\n}\n</style>\n\n<div class=\"ah-avoid-wrapper\">\n  <div class=\"ah-avoid-header\">\n    <h2>Breeds to Think Twice About in the Santa Cruz Fog Belt</h2>\n    <p>Not bad breeds overall -- just a poor match for our specific coastal conditions</p>\n  </div>\n  <div class=\"ah-avoid-body\">\n    <div class=\"ah-avoid-row\">\n      <div class=\"ah-avoid-label\">White Leghorn <span class=\"ah-avoid-tag\">Avoid</span></div>\n      <div class=\"ah-avoid-reason\">High egg production (280 to 320 per year) is genuinely impressive, but Leghorns have large, tall single combs that are among the most moisture-vulnerable of any common breed. They are also flighty and vocal, poorly suited to small lots with nearby neighbors. Their Mediterranean origins mean they were selected for heat dissipation, not damp tolerance.</div>\n    </div>\n    <div class=\"ah-avoid-row\">\n      <div class=\"ah-avoid-label\">Silkie <span class=\"ah-avoid-tag\">Caution</span></div>\n      <div class=\"ah-avoid-reason\">Silkies are beloved for their appearance and gentle nature, but their feathers lack the interlocking structure of normal plumage and absorb moisture rather than shedding it. A Silkie in the fog belt gets soaked to the skin in damp conditions and is genuinely at risk for hypothermia. They also have a walnut comb, which is structurally fine, but the feathering issue makes them a poor fog-belt fit.</div>\n    </div>\n    <div class=\"ah-avoid-row\">\n      <div class=\"ah-avoid-label\">Cochin (Standard) <span class=\"ah-avoid-tag\">Caution</span></div>\n      <div class=\"ah-avoid-reason\">Cochins have heavily feathered feet and legs that become mud-packed in wet ground conditions, which is a welfare and health issue. The feathered feet trap moisture and mud, increasing the risk of bumblefoot and frostbite on foot feathers. In a well-managed coop with dry bedding they can be kept here, but they require more active management than a fog-belt keeper wants.</div>\n    </div>\n    <div class=\"ah-avoid-row\">\n      <div class=\"ah-avoid-label\">Malay / Aseel <span class=\"ah-avoid-tag\">Avoid</span></div>\n      <div class=\"ah-avoid-reason\">Tall game-type breeds bred for warm climates have minimal feathering and are not suited to cool, damp conditions. They were developed in tropical Southeast Asia for conditions that do not exist in the Santa Cruz fog belt.</div>\n    </div>\n    <div class=\"ah-avoid-row\">\n      <div class=\"ah-avoid-label\">Sultan <span class=\"ah-avoid-tag\">Avoid</span></div>\n      <div class=\"ah-avoid-reason\">Sultans have feathered feet AND profuse head crest feathering that can obstruct vision and trap moisture around the face. Like Silkies, their unusual feather structure is not suited to damp conditions. They are ornamental birds that belong in a dry, protected environment, not the coastal fog.</div>\n    </div>\n  </div>\n  <div class=\"ah-avoid-source\">Sources: The Livestock Conservancy Breed Profiles; American Poultry Association Standard of Perfection; UC ANR Small-Scale Poultry Flock (2023)</div>\n  <div class=\"ah-avoid-footer\">ambitiousharvest.com | Santa Cruz County Backyard Poultry</div>\n</div>";
