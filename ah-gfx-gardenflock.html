h hardware cloth</li>\n<li>Predator-proof latches</li>\n<li>Nesting boxes and bedding</li>\n<li>Layer feed and oyster shell</li>\n<li>Buried apron or skirt</li>\n</ul>\n</div>\n</div>\n<div class=\"ah-feed-footer\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-vet-typeguide"] = "<div class=\"ah-vet-typeguide-wrapper\">\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n.ah-vet-typeguide-wrapper{font-family:'Montserrat',Arial,sans-serif !important;background:#f8f9f0 !important;border:2px solid #1a3b2a !important;border-radius:10px !important;padding:26px 24px !important;margin:30px 0 !important;max-width:100% !important;box-sizing:border-box !important;}\n.ah-vet-typeguide-wrapper *{box-sizing:border-box !important;}\n.ah-vet-typeguide-title{font-size:21px !important;font-weight:700 !important;color:#1a3b2a !important;margin:0 0 6px !important;text-align:center !important;}\n.ah-vet-typeguide-sub{font-size:13px !important;color:#b8694a !important;font-weight:600 !important;text-align:center !important;margin:0 0 20px !important;text-transform:uppercase !important;letter-spacing:1px !important;}\n.ah-vet-typeguide-grid{display:grid !important;grid-template-columns:1fr 1fr !important;gap:14px !important;}\n.ah-vet-typeguide-card{background:#fff !important;border:1px solid #dde2d8 !important;border-left:5px solid #c9a84c !important;border-radius:7px !important;padding:15px 16px !important;}\n.ah-vet-typeguide-card h4{font-size:15px !important;font-weight:700 !important;color:#1a3b2a !important;margin:0 0 7px !important;}\n.ah-vet-typeguide-card p{font-size:13px !important;line-height:1.5 !important;color:#333 !important;margin:0 !important;}\n.ah-vet-typeguide-tag{display:inline-block !important;font-size:11px !important;font-weight:700 !important;color:#fff !important;background:#1a3b2a !important;padding:2px 9px !important;border-radius:11px !important;margin-bottom:8px !important;text-transform:uppercase !important;letter-spacing:.5px !important;}\n.ah-vet-typeguide-tag.best{background:#b8694a !important;}\n.ah-vet-typeguide-footer{text-align:center !important;font-size:12px !important;font-weight:600 !important;color:#1a3b2a !important;margin-top:20px !important;padding-top:14px !important;border-top:1px solid #dde2d8 !important;letter-spacing:.5px !important;}\n@media (max-width:600px){.ah-vet-typeguide-grid{grid-template-columns:1fr !important;}.ah-vet-typeguide-wrapper{padding:20px 16px !important;}}\n</style>\n<div class=\"ah-vet-typeguide-title\">Which Kind of Vet Does Your Bird Need?</div>\n<div class=\"ah-vet-typeguide-sub\">Match the situation to the right practice</div>\n<div class=\"ah-vet-typeguide-grid\">\n<div class=\"ah-vet-typeguide-card\">\n<span class=\"ah-vet-typeguide-tag best\">Best for pet flocks</span>\n<h4>Avian / Exotic Vet</h4>\n<p>One sick hen, egg binding, injury, or a bird you want treated as an individual patient. Your first call for most backyard birds.</p>\n</div>\n<div class=\"ah-vet-typeguide-card\">\n<span class=\"ah-vet-typeguide-tag\">Rural or larger flocks</span>\n<h4>Livestock / Large-Animal Vet</h4>\n<p>Mixed practices near Morgan Hill, Gilroy, Hollister, and Salinas that may see poultry with a flock-health focus. Always call ahead.</p>\n</div>\n<div class=\"ah-vet-typeguide-card\">\n<span class=\"ah-vet-typeguide-tag\">Disease or death</span>\n<h4>Diagnostic Lab / Poultry Vet</h4>\n<p>Possible contagious or reportable disease, or a necropsy to learn why a bird died and protect the rest of the flock.</p>\n</div>\n<div class=\"ah-vet-typeguide-card\">\n<span class=\"ah-vet-typeguide-tag\">After hours</span>\n<h4>Emergency Hospital</h4>\n<p>Urgent cases when clinics are closed. Confirm in advance that they take birds, because many ER hospitals do not.</p>\n</div>\n</div>\n<div class=\"ah-vet-typeguide-footer\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-vet-triage"] = "<div class=\"ah-vet-triage-wrapper\">\n<style>\n.ah-vet-triage-wrapper{font-family:'Montserrat',Arial,sans-serif !important;background:#fff !important;border:2px solid #1a3b2a !important;border-radius:10px !important;padding:24px 22px !important;margin:30px 0 !important;max-width:100% !important;box-sizing:border-box !important;overflow-x:auto !important;}\n.ah-vet-triage-wrapper *{box-sizing:border-box !important;}\n.ah-vet-triage-title{font-size:21px !important;font-weight:700 !important;color:#1a3b2a !important;margin:0 0 4px !important;text-align:center !important;}\n.ah-vet-triage-sub{font-size:13px !important;color:#b8694a !important;font-weight:600 !important;text-align:center !important;margin:0 0 18px !important;text-transform:uppercase !important;letter-spacing:1px !important;}\n.ah-vet-triage-cols{display:grid !important;grid-template-columns:1fr 1fr !important;gap:16px !important;}\n.ah-vet-triage-col{border-radius:8px !important;padding:16px !important;}\n.ah-vet-triage-col.home{background:#dde2d8 !important;border:1px solid #1a3b2a !important;}\n.ah-vet-triage-col.call{background:#f8e7e0 !important;border:1px solid #b8694a !important;}\n.ah-vet-triage-col h4{font-size:15px !important;font-weight:700 !important;margin:0 0 12px !important;text-align:center !important;padding-bottom:8px !important;border-bottom:2px solid rgba(0,0,0,.12) !important;}\n.ah-vet-triage-col.home h4{color:#1a3b2a !important;}\n.ah-vet-triage-col.call h4{color:#b8694a !important;}\n.ah-vet-triage-col ul{margin:0 !important;padding-left:18px !important;}\n.ah-vet-triage-col li{font-size:13px !important;line-height:1.6 !important;color:#2a2a2a !important;margin-bottom:8px !important;}\n.ah-vet-triage-note{font-size:12px !important;color:#555 !important;text-align:center !important;font-style:italic !important;margin:16px 0 0 !important;}\n.ah-vet-triage-footer{text-align:center !important;font-size:12px !important;font-weight:600 !important;color:#1a3b2a !important;margin-top:16px !important;padding-top:14px !important;border-top:1px solid #dde2d8 !important;letter-spacing:.5px !important;}\n@media (max-width:600px){.ah-vet-triage-cols{grid-template-columns:1fr !important;}.ah-vet-triage-wrapper{padding:18px 14px !important;}}\n</style>\n<div class=\"ah-vet-triage-title\">Manage at Home or Call the Vet?</div>\n<div class=\"ah-vet-triage-sub\">A starting point, not a diagnosis</div>\n<div class=\"ah-vet-triage-cols\">\n<div class=\"ah-vet-triage-col home\">\n<h4>Often manageable at home</h4>\n<ul>\n<li>Small, clean surface wound</li>\n<li>A broken blood feather (control bleeding)</li>\n<li>Early, mild bumblefoot</li>\n<li>A torn toenail or minor scrape</li>\n<li>A bird briefly off after a fright or heat, then recovering</li>\n<li>Routine parasite checks</li>\n</ul>\n</div>\n<div class=\"ah-vet-triage-col call\">\n<h4>Call a veterinarian</h4>\n<ul>\n<li>Not eating or drinking</li>\n<li>Weak, collapsed, or unable to stand</li>\n<li>Labored or open-mouthed breathing</li>\n<li>Deep, severe, or infected wound</li>\n<li>Egg-bound and not improving</li>\n<li>Sudden neurological signs or rapid decline</li>\n<li>Several birds sick or dying at once</li>\n</ul>\n</div>\n</div>\n<div class=\"ah-vet-triage-note\">When in doubt, call. A phone conversation often settles the question.</div>\n<div class=\"ah-vet-triage-footer\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-flu-biosecurity"] = "<div class=\"ah-flu-wrapper\">\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n.ah-flu-wrapper { font-family: 'Montserrat', sans-serif !important; background: #f8f9f0 !important; border: 2px solid #1a3b2a !important; border-radius: 10px !important; padding: 28px !important; margin: 32px 0 !important; max-width: 100% !important; box-sizing: border-box !important; }\n.ah-flu-wrapper * { box-sizing: border-box !important; }\n.ah-flu-title { font-size: 22px !important; font-weight: 700 !important; color: #1a3b2a !important; margin: 0 0 6px 0 !important; }\n.ah-flu-sub { font-size: 14px !important; color: #b8694a !important; font-weight: 600 !important; margin: 0 0 20px 0 !important; }\n.ah-flu-list { list-style: none !important; margin: 0 !important; padding: 0 !important; }\n.ah-flu-item { background: #fff !important; border-left: 5px solid #c9a84c !important; border-radius: 6px !important; padding: 14px 16px !important; margin: 0 0 12px 0 !important; }\n.ah-flu-item strong { color: #1a3b2a !important; display: block !important; font-size: 15px !important; margin-bottom: 3px !important; }\n.ah-flu-item span { color: #3a4a40 !important; font-size: 14px !important; line-height: 1.5 !important; }\n.ah-flu-footer { text-align: center !important; color: #1a3b2a !important; font-weight: 600 !important; font-size: 13px !important; margin-top: 18px !important; padding-top: 14px !important; border-top: 1px solid #dde2d8 !important; letter-spacing: 0.5px !important; }\n@media (max-width: 600px) { .ah-flu-wrapper { padding: 18px !important; } .ah-flu-title { font-size: 19px !important; } }\n</style>\n<p class=\"ah-flu-title\">Backyard Biosecurity Checklist</p>\n<p class=\"ah-flu-sub\">Small steps that keep wild-bird contact away from your flock</p>\n<ul class=\"ah-flu-list\">\n<li class=\"ah-flu-item\"><strong>Cover feed and water</strong><span>Store feed in sealed, rodent-proof containers. Keep feeders and waterers under cover so wild birds cannot drop into them.</span></li>\n<li class=\"ah-flu-item\"><strong>Use clean water</strong><span>Give your flock municipal or well water, never untreated water from a pond, creek, or slough that wild waterfowl may visit.</span></li>\n<li class=\"ah-flu-item\"><strong>Discourage wild birds</strong><span>Remove standing water, clean up spilled feed, and consider covered runs or netting if wild ducks and geese gather nearby.</span></li>\n<li class=\"ah-flu-item\"><strong>Dedicate footwear</strong><span>Keep a pair of boots used only in the coop. Avoid wearing yard shoes from wetland walks straight into the run.</span></li>\n<li class=\"ah-flu-item\"><strong>Quarantine new birds</strong><span>Isolate any new or returning bird for at least 30 days before mixing it with your flock.</span></li>\n<li class=\"ah-flu-item\"><strong>Limit visitors and sharing</strong><span>Keep other people's birds, borrowed equipment, and shared egg cartons away from your coop, or clean them first.</span></li>\n<li class=\"ah-flu-item\"><strong>Wash hands</strong><span>Wash before and after handling birds, eggs, feeders, or coop bedding.</span></li>\n</ul>\n<div class=\"ah-flu-footer\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-flu-warning-signs"] = "<div class=\"ah-flu-table-wrapper\">\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n.ah-flu-table-wrapper { font-family: 'Montserrat', sans-serif !important; background: #1a3b2a !important; border-radius: 10px !important; padding: 26px !important; margin: 32px 0 !important; max-width: 100% !important; box-sizing: border-box !important; }\n.ah-flu-table-wrapper * { box-sizing: border-box !important; }\n.ah-flu-th-title { font-size: 22px !important; font-weight: 700 !important; color: #f8f9f0 !important; margin: 0 0 4px 0 !important; }\n.ah-flu-th-sub { font-size: 14px !important; color: #c9a84c !important; font-weight: 600 !important; margin: 0 0 18px 0 !important; }\n.ah-flu-scroll { overflow-x: auto !important; }\n.ah-flu-table { width: 100% !important; border-collapse: collapse !important; background: #f8f9f0 !important; border-radius: 8px !important; overflow: hidden !important; min-width: 480px !important; }\n.ah-flu-table th { background: #b8694a !important; color: #fff !important; text-align: left !important; padding: 12px 14px !important; font-size: 14px !important; font-weight: 700 !important; }\n.ah-flu-table td { padding: 12px 14px !important; font-size: 14px !important; color: #2c3a30 !important; border-bottom: 1px solid #dde2d8 !important; line-height: 1.5 !important; vertical-align: top !important; }\n.ah-flu-table tr:nth-child(even) td { background: #eef1e6 !important; }\n.ah-flu-table tr:last-child td { border-bottom: none !important; }\n.ah-flu-table-footer { text-align: center !important; color: #c9a84c !important; font-weight: 600 !important; font-size: 13px !important; margin-top: 16px !important; letter-spacing: 0.5px !important; }\n@media (max-width: 600px) { .ah-flu-table-wrapper { padding: 16px !important; } .ah-flu-th-title { font-size: 19px !important; } }\n</style>\n<p class=\"ah-flu-th-title\">Warning Signs and What To Do</p>\n<p class=\"ah-flu-th-sub\">When a pattern points to something serious</p>\n<div class=\"ah-flu-scroll\">\n<table class=\"ah-flu-table\">\n<thead><tr><th>What you see</th><th>What it may mean</th><th>What to do</th></tr></thead>\n<tbody>\n<tr><td>Several birds die suddenly, no prior symptoms</td><td>Possible HPAI; this is the classic pattern</td><td>Isolate the rest, do not move birds, call the CDFA Sick Bird Hotline</td></tr>\n<tr><td>Swollen, purple comb and wattles; swollen head</td><td>Possible HPAI or other serious illness</td><td>Isolate affected birds and report</td></tr>\n<tr><td>Twisting neck, tremors, stumbling, can't stand</td><td>Neurological signs consistent with HPAI</td><td>Isolate and report promptly</td></tr>\n<tr><td>Sharp, sudden drop in laying flock-wide</td><td>Could signal disease; watch for other signs</td><td>Monitor closely; report if paired with illness or deaths</td></tr>\n<tr><td>One bird sneezing or off, others fine</td><td>More likely a minor, common ailment</td><td>Isolate that bird, monitor, contact a vet if it worsens</td></tr>\n</tbody>\n</table>\n</div>\n<div class=\"ah-flu-table-footer\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-flu-who-to-call"] = "<div class=\"ah-flu-call-wrapper\">\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n.ah-flu-call-wrapper { font-family: 'Montserrat', sans-serif !important; background: #dde2d8 !important; border: 2px solid #1a3b2a !important; border-radius: 10px !important; padding: 28px !important; margin: 32px 0 !important; max-width: 100% !important; box-sizing: border-box !important; }\n.ah-flu-call-wrapper * { box-sizing: border-box !important; }\n.ah-flu-call-title { font-size: 22px !important; font-weight: 700 !important; color: #1a3b2a !important; margin: 0 0 4px 0 !important; }\n.ah-flu-call-sub { font-size: 14px !important; color: #b8694a !important; font-weight: 600 !important; margin: 0 0 20px 0 !important; }\n.ah-flu-card { background: #fff !important; border-radius: 8px !important; padding: 16px 18px !important; margin: 0 0 14px 0 !important; border-top: 5px solid #c9a84c !important; }\n.ah-flu-card-step { font-size: 12px !important; font-weight: 700 !important; color: #b8694a !important; letter-spacing: 1px !important; text-transform: uppercase !important; margin: 0 0 4px 0 !important; }\n.ah-flu-card-name { font-size: 17px !important; font-weight: 700 !important; color: #1a3b2a !important; margin: 0 0 4px 0 !important; }\n.ah-flu-card-num { font-size: 20px !important; font-weight: 700 !important; color: #1a3b2a !important; margin: 0 0 4px 0 !important; }\n.ah-flu-card-desc { font-size: 13px !important; color: #3a4a40 !important; line-height: 1.5 !important; margin: 0 !important; }\n.ah-flu-call-footer { text-align: center !important; color: #1a3b2a !important; font-weight: 600 !important; font-size: 13px !important; margin-top: 14px !important; letter-spacing: 0.5px !important; }\n@media (max-width: 600px) { .ah-flu-call-wrapper { padding: 18px !important; } .ah-flu-call-title { font-size: 19px !important; } .ah-flu-card-num { font-size: 18px !important; } }\n</style>\n<p class=\"ah-flu-call-title\">Who To Call</p>\n<p class=\"ah-flu-call-sub\">Reporting an unusual number of sick or dead birds</p>\n<div class=\"ah-flu-card\">\n<p class=\"ah-flu-card-step\">Start here</p>\n<p class=\"ah-flu-card-name\">CDFA Sick Bird Hotline</p>\n<p class=\"ah-flu-card-num\">1-866-922-2473 (1-866-922-BIRD)</p>\n<p class=\"ah-flu-card-desc\">California's line for backyard keepers reporting unusual sick or dead birds. They can arrange testing and guide you.</p>\n</div>\n<div class=\"ah-flu-card\">\n<p class=\"ah-flu-card-step\">Or report federally</p>\n<p class=\"ah-flu-card-name\">USDA APHIS</p>\n<p class=\"ah-flu-card-num\">1-866-536-7593</p>\n<p class=\"ah-flu-card-desc\">National toll-free line for reporting sick birds or unusual bird deaths.</p>\n</div>\n<div class=\"ah-flu-card\">\n<p class=\"ah-flu-card-step\">Local contact</p>\n<p class=\"ah-flu-card-name\">Santa Cruz County Ag Commissioner</p>\n<p class=\"ah-flu-card-num\">831-763-8080</p>\n<p class=\"ah-flu-card-desc\">Watsonville office, a local point of contact for agriculture questions. A poultry-savvy vet can also help assess individual birds.</p>\n</div>\n<div class=\"ah-flu-call-footer\">ambitiousharvest.com</div>\n</div>";
