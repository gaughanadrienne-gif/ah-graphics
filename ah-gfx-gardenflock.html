 style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Molting watch:</strong> Late summer molting may begin. Increase protein (mealworms, sunflower seeds) to support feather regrowth</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Dust bath maintenance:</strong> Refresh sand and diatomaceous earth. Keep dust bath area dry and covered from rain</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <!-- California-Specific Notes -->\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a;\">\n                <strong style=\"display: block; margin-bottom: 5px; color: #1a3b2a !important; font-size: 0.9rem;\">Coastal California Notes</strong>\n                <ul style=\"margin: 0; padding-left: 18px; font-size: 0.8rem; color: #1c3c2c !important; line-height: 1.8;\">\n                    <li style=\"color: #1c3c2c !important;\">Morning fog keeps temperatures mild, but wet conditions increase mite risk</li>\n                    <li style=\"color: #1c3c2c !important;\">Afternoon sun can still reach 80-90F in sheltered spots even near the coast</li>\n                    <li style=\"color: #1c3c2c !important;\">Predator pressure is highest at dawn when fog provides cover for coyotes and foxes</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a;\">\n                <strong style=\"display: block; margin-bottom: 5px; color: #1a3b2a !important; font-size: 0.9rem;\">Inland Valley Notes</strong>\n                <ul style=\"margin: 0; padding-left: 18px; font-size: 0.8rem; color: #1c3c2c !important; line-height: 1.8;\">\n                    <li style=\"color: #1c3c2c !important;\">Summer heat above 95F is dangerous. Watch for open-mouth panting and wings held away from body</li>\n                    <li style=\"color: #1c3c2c !important;\">Provide electrolytes in water during heat waves (above 100F)</li>\n                    <li style=\"color: #1c3c2c !important;\">Consider misting systems or fans for coops in the Central Valley and inland hills</li>\n                </ul>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC ANR Poultry Management Calendar, Publication 8514\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-seasonal-fall-winter"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Seasonal Flock Care Checklist: Fall and Winter</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Key tasks for September through February in coastal and inland California</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <!-- Fall Section -->\n        <div style=\"margin-bottom: 25px;\">\n            <div style=\"background-color: #2d5a3d !important; color: #f8f9f0 !important; padding: 10px 15px; font-weight: 700; font-size: 0.95rem; margin-bottom: 0;\">Fall (September - November)</div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-top: none; padding: 18px;\">\n                <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 8px;\">\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Coop winterization:</strong> Repair any holes or gaps, check roof for leaks, ensure pop door closes securely</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Molting support:</strong> Boost protein to 20-22% (game bird feed, mealworms, scrambled eggs). Avoid handling birds during heavy molt</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Predator pressure increase:</strong> Secure all latches. Raccoons and foxes become bolder as natural food sources decline</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Supplemental lighting debate:</strong> Adding 14 hours of light maintains egg production but skips the natural rest period. Consider letting hens rest through the molt instead</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Reduce free-range hours:</strong> Shorter days mean less daylight. Lock up flock earlier as sunset moves forward</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Deep litter method start:</strong> Stop removing bedding and begin layering fresh shavings on top. Composting action generates warmth through winter</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <!-- Winter Section -->\n        <div style=\"margin-bottom: 25px;\">\n            <div style=\"background-color: #2d5a3d !important; color: #f8f9f0 !important; padding: 10px 15px; font-weight: 700; font-size: 0.95rem; margin-bottom: 0;\">Winter (December - February)</div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-top: none; padding: 18px;\">\n                <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 8px;\">\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Rain and mud management:</strong> Add gravel or wood chips to high-traffic areas. Cover part of the run to keep a dry zone</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Coop ventilation:</strong> Keep vents open near the roofline. Moisture buildup causes frostbite and respiratory issues. Ventilate for moisture, not drafts at roost level</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Feed increase:</strong> Birds burn more calories staying warm. Offer a small amount of cracked corn or scratch grains before roosting to fuel overnight warmth</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Water defrosting:</strong> Check waterers morning and evening. In colder inland and mountain areas, use heated waterer bases or swap out frozen containers</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Holiday safety:</strong> Keep decorations, tinsel, and string lights away from the flock. Limit visitor access to avoid stressing birds</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Egg production tracking:</strong> Expect a natural drop (50-70% reduction is normal). Track daily counts to spot health issues early</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <!-- California-Specific Notes -->\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a;\">\n                <strong style=\"display: block; margin-bottom: 5px; color: #1a3b2a !important; font-size: 0.9rem;\">Mild Winter Advantage</strong>\n                <ul style=\"margin: 0; padding-left: 18px; font-size: 0.8rem; color: #1c3c2c !important; line-height: 1.8;\">\n                    <li style=\"color: #1c3c2c !important;\">Coastal California rarely drops below freezing. Heat lamps are almost never needed and are a fire hazard</li>\n                    <li style=\"color: #1c3c2c !important;\">Most cold-hardy breeds handle coastal winters without any supplemental heat</li>\n                    <li style=\"color: #1c3c2c !important;\">Rain is the primary winter challenge, not cold. Focus on keeping birds dry rather than warm</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a;\">\n                <strong style=\"display: block; margin-bottom: 5px; color: #1a3b2a !important; font-size: 0.9rem;\">Mountain and Inland Notes</strong>\n                <ul style=\"margin: 0; padding-left: 18px; font-size: 0.8rem; color: #1c3c2c !important; line-height: 1.8;\">\n                    <li style=\"color: #1c3c2c !important;\">Santa Cruz Mountains and inland valleys can see overnight lows in the 20s-30s F</li>\n                    <li style=\"color: #1c3c2c !important;\">Insulate coop walls if nighttime temps regularly drop below 25F. Wide roosts let birds cover their feet</li>\n                    <li style=\"color: #1c3c2c !important;\">Breeds with large combs (Leghorns) are more susceptible to frostbite. Apply petroleum jelly to combs in freezing conditions</li>\n                </ul>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Sources: UC ANR Poultry Management Calendar, Penn State Extension (Seasonal Poultry Care)\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";


window.AH_GRAPHICS["garden-flock-bedding-comparison"] = "<style>\n  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n  .ah-bedding-wrapper {\n    font-family: 'Montserrat', sans-serif;\n    width: 100%;\n    margin: 2rem 0;\n    padding: 0;\n    box-sizing: border-box;\n  }\n\n  .ah-bedding-header {\n    background-color: #1a3b2a;\n    padding: 24px 28px 20px;\n    border-radius: 8px 8px 0 0;\n  }\n\n  .ah-bedding-header h2 {\n    font-size: 1.25rem;\n    font-weight: 700;\n    color: #f8f9f0 !important;\n    margin: 0 0 6px 0;\n    letter-spacing: 0.01em;\n  }\n\n  .ah-bedding-header p {\n    font-size: 0.8rem;\n    color: #dde2d8 !important;\n    margin: 0;\n  }\n\n  .ah-bedding-table-wrap {\n    overflow-x: auto;\n    border: 1px solid #dde2d8;\n    border-top: none;\n    border-radius: 0 0 8px 8px;\n  }\n\n  .ah-bedding-table {\n    width: 100%;\n    border-collapse: collapse;\n    min-width: 560px;\n  }\n\n  .ah-bedding-table thead tr {\n    background-color: #1c3c2c;\n  }\n\n  .ah-bedding-table thead th {\n    padding: 12px 16px;\n    font-size: 0.78rem;\n    font-weight: 700;\n    text-transform: uppercase;\n    letter-spacing: 0.06em;\n    color: #f8f9f0 !important;\n    text-align: left;\n  }\n\n  .ah-bedding-table thead th:nth-child(2),\n  .ah-bedding-table thead th:nth-child(3) {\n    text-align: center;\n  }\n\n  .ah-bedding-table tbody tr:nth-child(odd) {\n    background-color: #f8f9f0;\n  }\n\n  .ah-bedding-table tbody tr:nth-child(even) {\n    background-color: #edf0e9;\n  }\n\n  .ah-bedding-table tbody td {\n    padding: 11px 16px;\n    font-size: 0.82rem;\n    color: #1a3b2a !important;\n    vertical-align: top;\n    border-bottom: 1px solid #dde2d8;\n    line-height: 1.5;\n  }\n\n  .ah-bedding-table tbody td:nth-child(2),\n  .ah-bedding-table tbody td:nth-child(3) {\n    text-align: center;\n  }\n\n  .ah-bedding-table .ah-factor-label {\n    font-weight: 700;\n    color: #1a3b2a !important;\n  }\n\n  .ah-bedding-table .ah-win {\n    font-weight: 700;\n    color: #1c3c2c !important;\n  }\n\n  .ah-bedding-table .ah-neutral {\n    color: #8c9c8c !important;\n  }\n\n  .ah-bedding-caption {\n    font-size: 0.75rem;\n    color: #8c9c8c !important;\n    padding: 10px 16px;\n    background-color: #f8f9f0;\n    border: 1px solid #dde2d8;\n    border-top: none;\n    border-radius: 0 0 8px 8px;\n    margin-top: -1px;\n  }\n\n  .ah-bedding-footer {\n    font-size: 0.72rem;\n    color: #8c9c8c !important;\n    text-align: right;\n    padding: 8px 0 0;\n    font-family: 'Montserrat', sans-serif;\n  }\n\n  @media (max-width: 600px) {\n    .ah-bedding-header {\n      padding: 18px 16px 14px;\n    }\n    .ah-bedding-header h2 {\n      font-size: 1.05rem;\n    }\n    .ah-bedding-table thead th,\n    .ah-bedding-table tbody td {\n      padding: 9px 10px;\n      font-size: 0.76rem;\n    }\n  }\n</style>\n\n<div class=\"ah-bedding-wrapper\">\n  <div class=\"ah-bedding-header\">\n    <h2>Deep Litter vs. Sand: Coastal California Coop Bedding Comparison</h2>\n    <p>Assessed for Santa Cruz County conditions: wet winters, marine fog, year-round humidity</p>\n  </div>\n  <div class=\"ah-bedding-table-wrap\">\n    <table class=\"ah-bedding-table\">\n      <thead>\n        <tr>\n          <th>Factor</th>\n          <th>Deep Litter</th>\n          <th>Sand</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td><span class=\"ah-factor-label\">Wet winter performance (coop interior)</span></td>\n          <td class=\"ah-win\">Good when coop is covered and ventilated well</td>\n          <td class=\"ah-neutral\">Moderate; stays cool and damp in enclosed spaces</td>\n        </tr>\n        <tr>\n          <td><span class=\"ah-factor-label\">Wet winter performance (outdoor run)</span></td>\n          <td class=\"ah-neutral\">Poor in open runs; becomes anaerobic in heavy rain</td>\n          <td class=\"ah-win\">Excellent; drains fast, dries within 1-2 days</td>\n        </tr>\n        <tr>\n          <td><span class=\"ah-factor-label\">Ammonia control</span></td>\n          <td class=\"ah-win\">Excellent when managed correctly; microbes break down nitrogen</td>\n          <td class=\"ah-neutral\">Good if scooped frequently; poor if allowed to accumulate</td>\n        </tr>\n        <tr>\n          <td><span class=\"ah-factor-label\">Cleaning frequency</span></td>\n          <td class=\"ah-win\">Low; full cleanout 1-2 times per year</td>\n          <td class=\"ah-neutral\">Higher; scoop droppings every 1-3 days</td>\n        </tr>\n        <tr>\n          <td><span class=\"ah-factor-label\">Compost/garden value</span></td>\n          <td class=\"ah-win\">High; aged litter is excellent garden amendment</td>\n          <td class=\"ah-neutral\">Low; scooped sand has minimal soil-building value</td>\n        </tr>\n        <tr>\n          <td><span class=\"ah-factor-label\">Startup cost</span></td>\n          <td class=\"ah-win\">Low; wood shavings are inexpensive</td>\n          <td class=\"ah-neutral\">Moderate; coarse sand is heavier and pricier to haul</td>\n        </tr>\n        <tr>\n          <td><span class=\"ah-factor-label\">Summer warmth/coolness</span></td>\n          <td class=\"ah-neutral\">Slightly warmer (composting generates mild heat)</td>\n          <td class=\"ah-win\">Cooler; good for hot inland spells</td>\n        </tr>\n        <tr>\n          <td><span class=\"ah-factor-label\">Dust levels</span></td>\n          <td class=\"ah-neutral\">Moderate; dry bedding produces fine particulate</td>\n          <td class=\"ah-win\">Lower dust in the coop; no dry organic particulate</td>\n        </tr>\n        <tr>\n          <td><span class=\"ah-factor-label\">Mite and pest harbor</span></td>\n          <td class=\"ah-neutral\">Higher potential; organic material can harbor northern fowl mites</td>\n          <td class=\"ah-win\">Lower; mites do not thrive in sand</td>\n        </tr>\n        <tr>\n          <td><span class=\"ah-factor-label\">Suitability for ducks</span></td>\n          <td class=\"ah-neutral\">Challenging; ducks wet bedding rapidly with water spillage</td>\n          <td class=\"ah-win\">Much better; sand tolerates waterfowl moisture well</td>\n        </tr>\n        <tr>\n          <td><span class=\"ah-factor-label\">Dust bathing (chickens)</span></td>\n          <td class=\"ah-win\">Yes; hens dust-bathe readily in dry litter</td>\n          <td class=\"ah-win\">Yes; sand is an excellent dust-bathing medium</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n  <div class=\"ah-bedding-caption\">Source: UC ANR Small-Scale Poultry Management, 2022; UC ANR Poultry Health, 2021; Penn State Extension Poultry Bedding Management, 2023</div>\n  <div class=\"ah-bedding-footer\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-chicksvsducks-comparison"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-flock-compare-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\n.ah-flock-compare-header {\n  background-color: #1a3b2a;\n  padding: 24px 28px 20px 28px;\n  border-radius: 6px 6px 0 0;\n}\n\n.ah-flock-compare-header h2 {\n  font-size: 1.3rem !important;\n  font-weight: 700 !important;\n  color: #f8f9f0 !important;\n  margin: 0 0 6px 0 !important;\n  letter-spacing: 0.01em;\n}\n\n.ah-flock-compare-header p {\n  font-size: 0.82rem !important;\n  color: #dde2d8 !important;\n  margin: 0 !important;\n}\n\n.ah-flock-compare-table-wrap {\n  overflow-x: auto;\n  background: #f8f9f0;\n  border: 1px solid #dde2d8;\n  border-top: none;\n  border-radius: 0 0 6px 6px;\n}\n\n.ah-flock-compare-table {\n  width: 100%;\n  border-collapse: collapse;\n  font-size: 0.88rem;\n}\n\n.ah-flock-compare-table thead th {\n  background-color: #1c3c2c;\n  color: #f8f9f0 !important;\n  font-weight: 700 !important;\n  padding: 12px 14px;\n  text-align: left;\n  font-size: 0.83rem !important;\n  letter-spacing: 0.02em;\n  white-space: nowrap;\n}\n\n.ah-flock-compare-table thead th:first-child {\n  width: 28%;\n  min-width: 130px;\n}\n\n.ah-flock-compare-table thead th:nth-child(2),\n.ah-flock-compare-table thead th:nth-child(3) {\n  width: 36%;\n}\n\n.ah-flock-compare-table tbody tr:nth-child(odd) {\n  background-color: #f8f9f0;\n}\n\n.ah-flock-compare-table tbody tr:nth-child(even) {\n  background-color: #eef1eb;\n}\n\n.ah-flock-compare-table tbody td {\n  padding: 11px 14px;\n  vertical-align: top;\n  color: #1a3b2a !important;\n  border-bottom: 1px solid #dde2d8;\n  line-height: 1.5;\n}\n\n.ah-flock-compare-table tbody td:first-child {\n  font-weight: 700 !important;\n  color: #1c3c2c !important;\n  font-size: 0.83rem !important;\n  white-space: nowrap;\n}\n\n.ah-flock-compare-table .ah-edge-chicken {\n  color: #1c3c2c !important;\n  font-weight: 600 !important;\n}\n\n.ah-flock-compare-table .ah-edge-duck {\n  color: #1c3c2c !important;\n  font-weight: 600 !important;\n}\n\n.ah-flock-compare-legend {\n  display: flex;\n  gap: 18px;\n  padding: 10px 14px 12px 14px;\n  background: #f8f9f0;\n  border: 1px solid #dde2d8;\n  border-top: none;\n  flex-wrap: wrap;\n}\n\n.ah-flock-compare-legend span {\n  font-size: 0.78rem !important;\n  color: #8c9c8c !important;\n  display: flex;\n  align-items: center;\n  gap: 5px;\n}\n\n.ah-flock-compare-legend .ah-dot-good {\n  display: inline-block;\n  width: 9px;\n  height: 9px;\n  border-radius: 50%;\n  background: #1a3b2a;\n}\n\n.ah-flock-compare-footer {\n  font-size: 0.73rem !important;\n  color: #8c9c8c !important;\n  padding: 8px 14px 10px 14px;\n  background: #f8f9f0;\n  border: 1px solid #dde2d8;\n  border-top: none;\n  border-radius: 0 0 6px 6px;\n  text-align: right;\n}\n\n@media (max-width: 600px) {\n  .ah-flock-compare-header {\n    padding: 18px 16px 14px 16px;\n  }\n  .ah-flock-compare-header h2 {\n    font-size: 1.1rem !important;\n  }\n  .ah-flock-compare-table {\n    font-size: 0.8rem;\n  }\n  .ah-flock-compare-table thead th,\n  .ah-flock-compare-table tbody td {\n    padding: 9px 10px;\n  }\n  .ah-flock-compare-table tbody td:first-child {\n    font-size: 0.77rem !important;\n    white-space: normal;\n  }\n}\n</style>\n\n<div class=\"ah-flock-compare-wrapper\">\n  <div class=\"ah-flock-compare-header\">\n    <h2>Chickens vs. Ducks: Side-by-Side for Santa Cruz County</h2>\n    <p>Key decision factors for a coastal California backyard flock</p>\n  </div>\n  <div class=\"ah-flock-compare-table-wrap\">\n    <table class=\"ah-flock-compare-table\">\n      <thead>\n        <tr>\n          <th>Factor</th>\n          <th>Chickens</th>\n          <th>Ducks</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>Eggs per year</td>\n          <td>180 to 300 (breed-dependent)</td>\n          <td class=\"ah-edge-duck\">300 to 340 (Khaki Campbell)</td>\n        </tr>\n        <tr>\n          <td>Winter laying</td>\n          <td>Drops significantly with short days</td>\n          <td class=\"ah-edge-duck\">More consistent year-round</td>\n        </tr>\n        <tr>\n          <td>Egg flavor</td>\n          <td class=\"ah-edge-chicken\">Mild, familiar</td>\n          <td>Rich, fuller flavor; excellent for baking</td>\n        </tr>\n        <tr>\n          <td>Space needed</td>\n          <td class=\"ah-edge-chicken\">4 sq ft coop + 10 sq ft run per bird (UC ANR)</td>\n          <td>Similar floor space; no roosts needed</td>\n        </tr>\n        <tr>\n          <td>Water management</td>\n          <td class=\"ah-edge-chicken\">Standard waterers; easy</td>\n          <td>Need deep water daily; creates mud</td>\n        </tr>\n        <tr>\n          <td>Mess level</td>\n          <td class=\"ah-edge-chicken\">Scratches and dusts; manageable</td>\n          <td>Mud and wet droppings; significant in our wet winters</td>\n        </tr>\n        <tr>\n          <td>Slug and snail control</td>\n          <td>Eats some; not systematic</td>\n          <td class=\"ah-edge-duck\">Outstanding; best natural slug control available</td>\n        </tr>\n        <tr>\n          <td>Garden bed safety</td>\n          <td>Scratches destructively</td>\n          <td class=\"ah-edge-duck\">Bills gently; less plant damage</td>\n        </tr>\n        <tr>\n          <td>Noise</td>\n          <td>Hens cluck; roosters crow loudly</td>\n          <td class=\"ah-edge-duck\">Hens quack; drakes nearly silent</td>\n        </tr>\n        <tr>\n          <td>Neighbor impact</td>\n          <td>Manageable without a rooster</td>\n          <td class=\"ah-edge-duck\">Generally lower; ducks less shrill</td>\n        </tr>\n        <tr>\n          <td>Predator vulnerability</td>\n          <td>Vulnerable; need secure housing</td>\n          <td>Also vulnerable; especially to raccoons at water sources</td>\n        </tr>\n        <tr>\n          <td>Coastal fog tolerance</td>\n          <td class=\"ah-edge-chicken\">Good; avoid prolonged damp housing</td>\n          <td class=\"ah-edge-duck\">Excellent; bred for wet conditions</td>\n        </tr>\n        <tr>\n          <td>Temperament</td>\n          <td>Variable by breed; some very friendly</td>\n          <td class=\"ah-edge-duck\">Often calmer; less flighty than chickens</td>\n        </tr>\n        <tr>\n          <td>Startup cost</td>\n          <td class=\"ah-edge-chicken\">Lower; coops and equipment widely available</td>\n          <td>Similar birds; add water management infrastructure</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n  <div class=\"ah-flock-compare-footer\">\n    Source: UC ANR Poultry Resources; American Livestock Breeds Conservancy | ambitiousharvest.com\n  </div>\n</div>";

window.AH_GRAPHICS["garden-flock-chicksvsducks-decision"] = "<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-decision-card-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 32px 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\n.ah-decision-card-header {\n  background-color: #1a3b2a;\n  padding: 22px 28px 18px 28px;\n  border-radius: 6px 6px 0 0;\n}\n\n.ah-decision-card-header h2 {\n  font-size: 1.25rem !important;\n  font-weight: 700 !important;\n  color: #f8f9f0 !important;\n  margin: 0 0 6px 0 !important;\n}\n\n.ah-decision-card-header p {\n  font-size: 0.81rem !important;\n  color: #dde2d8 !important;\n  margin: 0 !important;\n}\n\n.ah-decision-card-body {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  border: 1px solid #dde2d8;\n  border-top: none;\n  background: #f8f9f0;\n}\n\n.ah-decision-col {\n  padding: 20px 18px 22px 18px;\n  border-right: 1px solid #dde2d8;\n}\n\n.ah-decision-col:last-child {\n  border-right: none;\n}\n\n.ah-decision-col-title {\n  font-size: 0.85rem !important;\n  font-weight: 700 !important;\n  color: #1a3b2a !important;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n  margin: 0 0 14px 0 !important;\n  padding-bottom: 8px;\n  border-bottom: 2px solid #c9a84c;\n  display: block;\n}\n\n.ah-decision-col ul {\n  list-style: none;\n  padding: 0;\n  margin: 0;\n}\n\n.ah-decision-col ul li {\n  font-size: 0.83rem !important;\n  color: #1a3b2a !important;\n  padding: 5px 0 5px 16px;\n  position: relative;\n  line-height: 1.5;\n  border-bottom: 1px solid #dde2d8;\n}\n\n.ah-decision-col ul li:last-child {\n  border-bottom: none;\n}\n\n.ah-decision-col ul li::before {\n  content: '';\n  position: absolute;\n  left: 0;\n  top: 12px;\n  width: 7px;\n  height: 7px;\n  border-radius: 50%;\n  background: #1a3b2a;\n}\n\n.ah-decision-col-mixed .ah-decision-col-title {\n  border-bottom-color: #8c9c8c;\n}\n\n.ah-decision-card-footer {\n  font-size: 0.73rem !important;\n  color: #8c9c8c !important;\n  padding: 8px 14px 10px 14px;\n  background: #f8f9f0;\n  border: 1px solid #dde2d8;\n  border-top: none;\n  border-radius: 0 0 6px 6px;\n  text-align: right;\n}\n\n@media (max-width: 600px) {\n  .ah-decision-card-header {\n    padding: 18px 16px 14px 16px;\n  }\n  .ah-decision-card-header h2 {\n    font-size: 1.05rem !important;\n  }\n  .ah-decision-card-body {\n    grid-template-columns: 1fr;\n  }\n  .ah-decision-col {\n    border-right: none;\n    border-bottom: 1px solid #dde2d8;\n    padding: 16px 14px 18px 14px;\n  }\n  .ah-decision-col:last-child {\n    border-bottom: none;\n  }\n}\n</style>\n\n<div class=\"ah-decision-card-wrapper\">\n  <div class=\"ah-decision-card-header\">\n    <h2>Which Bird Is Right for Your Situation?</h2>\n    <p>A practical verdict framework for Santa Cruz County backyards</p>\n  </div>\n  <div class=\"ah-decision-card-body\">\n    <div class=\"ah-decision-col\">\n      <span class=\"ah-decision-col-title\">Start with Chickens if...</span>\n      <ul>\n        <li>Your yard is small or the run is tight</li>\n        <li>Mud management is not feasible for your space</li>\n        <li>You want familiar, mild-flavored eggs</li>\n        <li>Neighbors are very close</li>\n        <li>You prefer a simpler daily routine</li>\n        <li>You are new to poultry and want to learn first</li>\n        <li>Slug pressure in your garden is low</li>\n      </ul>\n    </div>\n    <div class=\"ah-decision-col\">\n      <span class=\"ah-decision-col-title\">Start with Ducks if...</span>\n      <ul>\n        <li>Slug and snail damage is a serious garden problem</li>\n        <li>You want consistent winter egg production</li>\n        <li>You have drainage to manage water mess</li>\n        <li>You bake regularly and want richer eggs</li>\n        <li>Your yard gets very wet in winter and stays wet</li>\n        <li>You want calmer, less flighty birds</li>\n        <li>Noise is a concern (female ducks vs. hens)</li>\n      </ul>\n    </div>\n    <div class=\"ah-decision-col ah-decision-col-mixed\">\n      <span class=\"ah-decision-col-title\">Consider Both if...</span>\n      <ul>\n        <li>You have room for two separate areas or species</li>\n        <li>You want slug control and familiar eggs together</li>\n        <li>You are ready for more complex daily management</li>\n        <li>Your garden has distinct bed zones to rotate birds through</li>\n        <li>You have experience with one species already</li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"ah-decision-card-footer\">\n    ambitiousharvest.com | Santa Cruz County Backyard Flocks\n  </div>\n</div>";

window.AH_GRAPHICS["garden-flock-firstaid-emergencies"] = "<div style=\"width: 100%; margin: 32px 0; font-family: 'Montserrat', system-ui, sans-serif; overflow-x: auto;\">\n  <div style=\"background-color: #1a3b2a; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 6px 0; color: #f8f9f0 !important;\">Common Flock Emergencies: First Response</h2>\n    <p style=\"font-size: 0.85rem; margin: 0; color: #dde2d8 !important;\">Initial steps while you assess whether a vet call is needed</p>\n  </div>\n  <div style=\"overflow-x: auto; background-color: #f8f9f0;\">\n    <table style=\"width: 100%; border-collapse: collapse; min-width: 560px;\">\n      <thead>\n        <tr>\n          <th style=\"background-color: #1c3c2c; color: #f8f9f0 !important; padding: 12px 14px; text-align: left; font-weight: 600; font-size: 0.82rem; width: 22%;\">Condition</th>\n          <th style=\"background-color: #1c3c2c; color: #f8f9f0 !important; padding: 12px 14px; text-align: left; font-weight: 600; font-size: 0.82rem; width: 26%;\">Signs</th>\n          <th style=\"background-color: #1c3c2c; color: #f8f9f0 !important; padding: 12px 14px; text-align: left; font-weight: 600; font-size: 0.82rem; width: 28%;\">First Response</th>\n          <th style=\"background-color: #1c3c2c; color: #f8f9f0 !important; padding: 12px 14px; text-align: left; font-weight: 600; font-size: 0.82rem; width: 24%;\">Call Vet If...</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr style=\"border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 14px; font-weight: 600; color: #1a3b2a !important; font-size: 0.85rem; background-color: #fff;\">Wound / Injury</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #fff;\">Bleeding, torn skin, feather loss with raw skin</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #fff;\">Isolate, flush with saline, apply Vetericyn, bandage</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #fff;\">Deep puncture, body-cavity injury, shock</td>\n        </tr>\n        <tr style=\"border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 14px; font-weight: 600; color: #1a3b2a !important; font-size: 0.85rem; background-color: #f8f9f0;\">Bumblefoot</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #f8f9f0;\">Hard dark scab on foot pad, possible swelling</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #f8f9f0;\">Daily warm Epsom salt soaks, antibiotic ointment, soft bedding</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #f8f9f0;\">Lameness, deep infection, no improvement in 5-7 days</td>\n        </tr>\n        <tr style=\"border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 14px; font-weight: 600; color: #1a3b2a !important; font-size: 0.85rem; background-color: #fff;\">Egg Binding</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #fff;\">Straining, penguin posture, lethargy, abdominal swelling</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #fff;\">Warm steam, 20-min warm soak, oil at vent, quiet isolation</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #fff;\">No egg passed in 2-4 hours of supportive care</td>\n        </tr>\n        <tr style=\"border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 14px; font-weight: 600; color: #1a3b2a !important; font-size: 0.85rem; background-color: #f8f9f0;\">Crop Problem</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #f8f9f0;\">Crop hard/full at morning, or squishy with sour smell</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #f8f9f0;\">Withhold solid food, offer water, gentle crop massage for impaction</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #f8f9f0;\">Not resolved in 24 hrs, sour crop (needs antifungal)</td>\n        </tr>\n        <tr style=\"border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 14px; font-weight: 600; color: #1a3b2a !important; font-size: 0.85rem; background-color: #fff;\">Mites / Lice</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #fff;\">Restless, feather damage, tiny bugs at vent or under wings</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #fff;\">Poultry dust on birds, treat coop for mites; repeat in 10 days</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #fff;\">Anemia, severe infestation, repeated re-infestation</td>\n        </tr>\n        <tr style=\"border-bottom: 1px solid #dde2d8;\">\n          <td style=\"padding: 11px 14px; font-weight: 600; color: #1a3b2a !important; font-size: 0.85rem; background-color: #f8f9f0;\">Prolapse</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #f8f9f0;\">Pink or red tissue visible at vent</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #f8f9f0;\">Isolate immediately, keep tissue moist with saline, darken pen</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #f8f9f0;\">Always -- prolapse is a medical emergency</td>\n        </tr>\n        <tr>\n          <td style=\"padding: 11px 14px; font-weight: 600; color: #1a3b2a !important; font-size: 0.85rem; background-color: #fff;\">Heat Stress</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #fff;\">Panting, wings out, pale comb, collapse</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #fff;\">Move to cool shade, cool water, wet feet and legs, electrolytes</td>\n          <td style=\"padding: 11px 14px; color: #1c3c2c !important; font-size: 0.85rem; background-color: #fff;\">Collapse, seizures, no improvement within 30 minutes</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n  <div style=\"background-color: #1a3b2a; padding: 8px 16px; text-align: center;\">\n    <p style=\"font-size: 0.72rem; color: #dde2d8 !important; margin: 0;\">ambitiousharvest.com | This table is a first-response guide, not a substitute for veterinary care</p>\n  </div>\n</div>";

window.AH_GRAPHICS["garden-flock-firstaid-kit-checklist"] = "<div style=\"width: 100%; margin: 32px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n  <style>\n    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n    @media (max-width: 600px) {\n      .ah-kit-grid { grid-template-columns: 1fr !important; }\n      .ah-kit-header h2 { font-size: 1.1rem !important; }\n    }\n  </style>\n  <div class=\"ah-kit-header\" style=\"background-color: #1a3b2a; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 6px 0; color: #f8f9f0 !important;\">Backyard Flock First-Aid Kit Checklist</h2>\n    <p style=\"font-size: 0.85rem; margin: 0; color: #dde2d8 !important;\">Stock these before you need them -- California backyard keepers</p>\n  </div>\n  <div class=\"ah-kit-grid\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0; background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none;\">\n    <!-- Column 1 -->\n    <div style=\"padding: 20px 22px; border-right: 1px solid #dde2d8;\">\n      <p style=\"font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #1a3b2a !important; margin: 0 0 14px 0;\">Wound Care</p>\n      <ul style=\"list-style: none; padding: 0; margin: 0 0 20px 0;\">\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Sterile saline wound wash</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Vetericyn or chlorhexidine spray</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Gauze pads (3x3 and 4x4 inch)</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Rolled gauze</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Vet wrap (self-adhesive)</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Styptic powder</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Antibiotic ointment (plain, no pramoxine)</li>\n      </ul>\n      <p style=\"font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #1a3b2a !important; margin: 0 0 14px 0;\">Tools</p>\n      <ul style=\"list-style: none; padding: 0; margin: 0;\">\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Blunt-tip scissors</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Tweezers or hemostats</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Digital thermometer (dedicated)</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Headlamp</li>\n      </ul>\n    </div>\n    <!-- Column 2 -->\n    <div style=\"padding: 20px 22px;\">\n      <p style=\"font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #1a3b2a !important; margin: 0 0 14px 0;\">Supportive Care</p>\n      <ul style=\"list-style: none; padding: 0; margin: 0 0 20px 0;\">\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Electrolyte/vitamin powder (Sav-A-Chick)</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Epsom salt</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Disposable nitrile gloves</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Old bath towels (2-3)</li>\n      </ul>\n      <p style=\"font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #1a3b2a !important; margin: 0 0 14px 0;\">Isolation Setup</p>\n      <ul style=\"list-style: none; padding: 0; margin: 0;\">\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Dog crate or large tote (hospital pen)</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Small waterer and feeder for hospital pen</li>\n        <li style=\"padding: 5px 0; color: #1c3c2c !important; font-size: 0.88rem;\"><span style=\"color: #1a3b2a !important; font-weight: 700; margin-right: 8px;\">&#10003;</span>Notebook for observation notes</li>\n      </ul>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a; padding: 8px 16px; text-align: center;\">\n    <p style=\"font-size: 0.72rem; color: #dde2d8 !important; margin: 0;\">ambitiousharvest.com | Santa Cruz County Backyard Flocks</p>\n  </div>\n</div>";

window.AH_GRAPHICS["garden-flock-firstaid-vet-decision"] = "<div style=\"width: 100%; margin: 32px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 6px 0; color: #f8f9f0 !important;\">Treat at Home or Call the Vet?</h2>\n    <p style=\"font-size: 0.85rem; margin: 0; color: #dde2d8 !important;\">A practical guide for California backyard flock keepers</p>\n  </div>\n  <div style=\"display: grid; grid-template-columns: 1fr 1fr; background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none;\">\n    <div style=\"padding: 20px 22px; border-right: 1px solid #dde2d8;\">\n      <p style=\"font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #1a3b2a !important; margin: 0 0 14px 0; background-color: #dde2d8; padding: 6px 10px; display: inline-block;\">Generally manageable at home</p>\n      <ul style=\"list-style: none; padding: 0; margin: 0;\">\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #2d6a4f; font-weight: 700; margin-right: 8px;\">&#10003;</span>Minor cuts and abrasions (no deep tissue)</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #2d6a4f; font-weight: 700; margin-right: 8px;\">&#10003;</span>Mild bumblefoot (no deep infection, bird walking)</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #2d6a4f; font-weight: 700; margin-right: 8px;\">&#10003;</span>Broken blood feather (remove or apply styptic)</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #2d6a4f; font-weight: 700; margin-right: 8px;\">&#10003;</span>Mild external parasites (mites or lice, early)</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #2d6a4f; font-weight: 700; margin-right: 8px;\">&#10003;</span>Mild heat stress (bird still alert, standing)</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #2d6a4f; font-weight: 700; margin-right: 8px;\">&#10003;</span>Normal molt (feather loss with new pin feathers)</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem;\"><span style=\"color: #2d6a4f; font-weight: 700; margin-right: 8px;\">&#10003;</span>Slight decrease in egg production (seasonal)</li>\n      </ul>\n    </div>\n    <div style=\"padding: 20px 22px;\">\n      <p style=\"font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #f8f9f0 !important; margin: 0 0 14px 0; background-color: #1a3b2a; padding: 6px 10px; display: inline-block;\">Call an avian or exotic vet</p>\n      <ul style=\"list-style: none; padding: 0; margin: 0;\">\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #8b0000; font-weight: 700; margin-right: 8px;\">&#10007;</span>Any respiratory symptoms (rattling, gasping, nasal discharge)</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #8b0000; font-weight: 700; margin-right: 8px;\">&#10007;</span>Egg binding not resolved in 2-4 hours</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #8b0000; font-weight: 700; margin-right: 8px;\">&#10007;</span>Any prolapse of vent tissue</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #8b0000; font-weight: 700; margin-right: 8px;\">&#10007;</span>Deep puncture wounds or predator attack injuries</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #8b0000; font-weight: 700; margin-right: 8px;\">&#10007;</span>Neurological signs (circling, head tilt, tremors)</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #8b0000; font-weight: 700; margin-right: 8px;\">&#10007;</span>Sour crop or impacted crop not improving in 24 hours</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #8b0000; font-weight: 700; margin-right: 8px;\">&#10007;</span>Multiple sick birds or suspected contagious illness</li>\n        <li style=\"padding: 7px 0; color: #1c3c2c !important; font-size: 0.88rem;\"><span style=\"color: #8b0000; font-weight: 700; margin-right: 8px;\">&#10007;</span>Collapse, inability to stand, unresponsive bird</li>\n      </ul>\n    </div>\n  </div>\n  <div style=\"background-color: #dde2d8; padding: 12px 20px; border: 1px solid #c8cdc2; border-top: none;\">\n    <p style=\"font-size: 0.82rem; color: #1a3b2a !important; margin: 0; line-height: 1.5;\"><strong>When in doubt, call.</strong> A 5-minute phone conversation with a poultry-savvy vet or avian clinic can save your bird's life and give you confidence in your next steps. Most practices will answer a basic triage question over the phone.</p>\n  </div>\n  <div style=\"background-color: #1a3b2a; padding: 8px 16px; text-align: center;\">\n    <p style=\"font-size: 0.72rem; color: #dde2d8 !important; margin: 0;\">ambitiousharvest.com | Not a substitute for professional veterinary advice</p>\n  </div>\n</div>";

window.AH_GRAPHICS["garden-flock-hatcheryvsrescue-comparison"] = "<!-- GRAPHIC: Hatchery Chicks vs. Rescue Hens Comparison Table -->\n\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');\n\n.ah-flock-compare-wrapper {\n  font-family: 'Montserrat', sans-serif;\n  width: 100%;\n  margin: 2rem 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\n.ah-flock-compare-header {\n  background-color: #1a3b2a;\n  padding: 20px 24px 16px;\n  border-radius: 8px 8px 0 0;\n}\n\n.ah-flock-compare-header h2 {\n  font-size: 1.25rem !important;\n  font-weight: 700 !important;\n  color: #f8f9f0 !important;\n  margin: 0 0 4px 0 !important;\n  letter-spacing: 0.02em;\n}\n\n.ah-flock-compare-header p {\n  font-size: 0.8rem !important;\n  color: #c9a84c !important;\n  margin: 0 !important;\n  font-weight: 600 !important;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n}\n\n.ah-flock-compare-table-wrap {\n  overflow-x: auto;\n  border-radius: 0 0 8px 8px;\n  border: 1px solid #dde2d8;\n  border-top: none;\n}\n\n.ah-flock-compare-table {\n  width: 100%;\n  border-collapse: collapse;\n  font-size: 0.88rem;\n  min-width: 520px;\n}\n\n.ah-flock-compare-table thead tr {\n  background-color: #1c3c2c;\n}\n\n.ah-flock-compare-table thead th {\n  padding: 12px 16px !important;\n  text-align: left !important;\n  font-weight: 700 !important;\n  font-size: 0.82rem !important;\n  color: #f8f9f0 !important;\n  letter-spacing: 0.03em;\n  text-transform: uppercase;\n}\n\n.ah-flock-compare-table thead th:first-child {\n  width: 28%;\n  color: #c9a84c !important;\n}\n\n.ah-flock-compare-table tbody tr {\n  border-bottom: 1px solid #dde2d8;\n}\n\n.ah-flock-compare-table tbody tr:nth-child(even) {\n  background-color: #f8f9f0;\n}\n\n.ah-flock-compare-table tbody tr:nth-child(odd) {\n  background-color: #ffffff;\n}\n\n.ah-flock-compare-table tbody tr:last-child {\n  border-bottom: none;\n}\n\n.ah-flock-compare-table td {\n  padding: 11px 16px !important;\n  vertical-align: top !important;\n  color: #1a3b2a !important;\n  line-height: 1.45;\n}\n\n.ah-flock-compare-table td:first-child {\n  font-weight: 700 !important;\n  color: #1c3c2c !important;\n  font-size: 0.82rem !important;\n  text-transform: uppercase;\n  letter-spacing: 0.02em;\n  white-space: nowrap;\n}\n\n.ah-flock-good {\n  color: #1c3c2c !important;\n  font-weight: 600 !important;\n}\n\n.ah-flock-caution {\n  color: #8c6d28 !important;\n  font-weight: 600 !important;\n}\n\n.ah-flock-compare-source {\n  font-size: 0.72rem !important;\n  color: #8c9c8c !important;\n  padding: 8px 16px 10px !important;\n  border-top: 1px solid #dde2d8;\n  background-color: #f8f9f0;\n}\n\n.ah-flock-compare-footer {\n  font-size: 0.72rem !important;\n  color: #8c9c8c !important;\n  text-align: center;\n  padding: 8px 0 0;\n  letter-spacing: 0.03em;\n}\n\n@media (max-width: 600px) {\n  .ah-flock-compare-header h2 {\n    font-size: 1.05rem !important;\n  }\n\n  .ah-flock-compare-table {\n    font-size: 0.82rem;\n  }\n\n  .ah-flock-compare-table thead th,\n  .ah-flock-compare-table td {\n    padding: 9px 11px !important;\n  }\n}\n</style>\n\n<div class=\"ah-flock-compare-wrapper\">\n  <div class=\"ah-flock-compare-header\">\n    <h2>Hatchery Chicks vs. Rescue Hens: Side-by-Side</h2>\n    <p>Key factors for Santa Cruz County backyard flock keepers</p>\n  </div>\n  <div class=\"ah-flock-compare-table-wrap\">\n    <table class=\"ah-flock-compare-table\">\n      <thead>\n        <tr>\n          <th>Factor</th>\n          <th>Hatchery / Feed-Store Chicks</th>\n          <th>Rescue / Adopted Adult Hens</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <td>Time to First Egg</td>\n          <td class=\"ah-flock-caution\">5 to 6 months (18 to 28 weeks depending on breed)</td>\n          <td class=\"ah-flock-good\">2 to 4 weeks if hen is healthy and not molting</td>\n        </tr>\n        <tr>\n          <td>Upfront Cost</td>\n          <td class=\"ah-flock-caution\">$4 to $25 per chick plus $50 to $100 brooder setup</td>\n          <td class=\"ah-flock-good\">Often $0 to $20 adoption fee; vet check recommended</td>\n        </tr>\n        <tr>\n          <td>Effort and Time</td>\n          <td class=\"ah-flock-caution\">6 weeks of brooding (heat, monitoring, daily care)</td>\n          <td class=\"ah-flock-good\">No brooding; quarantine period of 30 days required</td>\n        </tr>\n        <tr>\n          <td>Laying Lifespan</td>\n          <td class=\"ah-flock-good\">Full laying life (2 to 4 productive years for most breeds)</td>\n          <td class=\"ah-flock-caution\">Shorter if ex-commercial (1 to 2 more productive years)</td>\n        </tr>\n        <tr>\n          <td>Breed Choice</td>\n          <td class=\"ah-flock-good\">Wide selection; choose breed for climate, temperament, egg color</td>\n          <td class=\"ah-flock-caution\">Limited; mostly what is available locally at the time</td>\n        </tr>\n        <tr>\n          <td>Temperament</td>\n          <td class=\"ah-flock-good\">Raised by you; strong human bond if handled early</td>\n          <td class=\"ah-flock-caution\">Variable; some birds tame quickly, others remain wary</td>\n        </tr>\n        <tr>\n          <td>Health History</td>\n          <td class=\"ah-flock-good\">Known from day one; you control vaccinations and environment</td>\n          <td class=\"ah-flock-caution\">Often unknown; parasite screening and quarantine essential</td>\n        </tr>\n        <tr>\n          <td>Rooster Risk</td>\n          <td class=\"ah-flock-caution\">Straight-run chicks: 50% chance of roosters (illegal in many SC areas)</td>\n          <td class=\"ah-flock-good\">Adult hens: sex confirmed, no rooster surprise</td>\n        </tr>\n        <tr>\n          <td>Biosecurity</td>\n          <td class=\"ah-flock-good\">Lower risk if sourcing from reputable hatchery</td>\n          <td class=\"ah-flock-caution\">Higher risk; 30-day quarantine from existing flock required</td>\n        </tr>\n        <tr>\n          <td>Ethics and Feel-Good</td>\n          <td>Supporting breeders and local feed stores</td>\n          <td class=\"ah-flock-good\">Giving birds a second chance; significant welfare impact</td>\n        </tr>\n      </tbody>\n    </table>\n    <div class=\"ah-flock-compare-source\">Source: UC ANR Poultry Resources; University of Kentucky Cooperative Extension; ASPCA; ambitiousharvest.com</div>\n  </div>\n  <div class=\"ah-flock-compare-footer\">ambitiousharvest.com | Garden Flock</div>\n</div>";
