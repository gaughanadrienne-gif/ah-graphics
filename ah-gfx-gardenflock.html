         <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center; font-size: 0.85rem;\">Swimming water access</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Ground-level nesting (private corners). Do not roost. Need largest shelter footprint.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"background-color: #dde2d8 !important; padding: 18px 20px; border-left: 4px solid #1a3b2a;\">\n            <strong style=\"display: block; margin-bottom: 10px; color: #1a3b2a !important; font-size: 0.95rem;\">Mixed Flock Example: 4 Chickens + 2 Ducks + 1 Goose</strong>\n            <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 12px;\">\n                <div style=\"background-color: #fff !important; padding: 15px; text-align: center; border: 1px solid #d4c5a9;\">\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Total Coop/Shelter</div>\n                    <div style=\"font-size: 1.3rem; font-weight: 700; color: #1a3b2a !important;\">38 sq ft</div>\n                    <div style=\"font-size: 0.75rem; color: #1c3c2c !important; margin-top: 4px;\">(4x4) + (2x6) + (1x10)</div>\n                </div>\n                <div style=\"background-color: #fff !important; padding: 15px; text-align: center; border: 1px solid #d4c5a9;\">\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Total Run</div>\n                    <div style=\"font-size: 1.3rem; font-weight: 700; color: #1a3b2a !important;\">90 sq ft</div>\n                    <div style=\"font-size: 0.75rem; color: #1c3c2c !important; margin-top: 4px;\">(4x10) + (2x15) + (1x20)</div>\n                </div>\n                <div style=\"background-color: #fff !important; padding: 15px; text-align: center; border: 1px solid #d4c5a9;\">\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Water Stations</div>\n                    <div style=\"font-size: 1.3rem; font-weight: 700; color: #1a3b2a !important;\">2+</div>\n                    <div style=\"font-size: 0.75rem; color: #1c3c2c !important; margin-top: 4px;\">1 waterer + 1 swim tub</div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Sources: UC ANR Poultry Housing Guidelines, Penn State Extension Small Flock Management\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-garden-integration"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">How Your Flock Helps the Garden</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Six ways poultry integrate with your growing system</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <!-- Slug/Snail Patrol -->\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #2d5a3d !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Slug and Snail Patrol</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Best Species</div>\n                        <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">Ducks</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">When to Deploy</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Early morning or after rain when slugs are most active. Effective year-round in coastal California.</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Watch Out For</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Ducks will trample seedlings. Run them through beds only after plants are well established.</div>\n                    </div>\n                </div>\n            </div>\n            <!-- Soil Turning -->\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #2d5a3d !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Soil Turning</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Best Species</div>\n                        <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">Chickens</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">When to Deploy</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Between growing seasons. Let chickens scratch through finished beds to break up soil and eat overwintering pests.</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Watch Out For</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Chickens will destroy mulch layers and uproot shallow-rooted plants. Fence off active beds.</div>\n                    </div>\n                </div>\n            </div>\n            <!-- Weed Control -->\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #2d5a3d !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Weed and Grass Control</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Best Species</div>\n                        <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">Geese</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">When to Deploy</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Throughout the growing season in orchard aisles, pathways, and around established perennials. Historically used as \"weeder geese\" in commercial crops.</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Watch Out For</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Geese prefer grass but will eat young vegetable seedlings. Do not use in annual vegetable beds.</div>\n                    </div>\n                </div>\n            </div>\n            <!-- Compost Acceleration -->\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #2d5a3d !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Compost Acceleration</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Best Species</div>\n                        <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">Chickens</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">When to Deploy</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Allow chickens access to compost piles. Their scratching turns and aerates the pile while they eat bugs and food scraps.</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Watch Out For</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Keep chickens away from compost containing avocado, onion scraps, or moldy food.</div>\n                    </div>\n                </div>\n            </div>\n            <!-- Fertilizer Production -->\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #2d5a3d !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Fertilizer Production</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Best Species</div>\n                        <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">All species (chickens highest N)</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">When to Deploy</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Collect coop bedding (deep litter method) and compost for 3-6 months before applying to garden beds.</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Watch Out For</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Never apply fresh manure to growing beds. High nitrogen content will burn plants and may harbor pathogens.</div>\n                    </div>\n                </div>\n            </div>\n            <!-- Grass Management -->\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #2d5a3d !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Grass Management</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Best Species</div>\n                        <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">Geese</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">When to Deploy</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Year-round in orchard areas, lawn sections, or cover crop rotations. A pair of geese can manage up to half an acre of grass.</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Watch Out For</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Geese produce large volumes of droppings on grazed areas. Rotate pastures if using near foot-traffic zones.</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Sources: UC ANR Integrated Pest Management, UC Davis Poultry Extension\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-composting-npk"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Composting with Flock Waste</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">N-P-K ratios, composting times, and application rates by species</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 700px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Species</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">N-P-K (approx.)</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Moisture Content</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Composting Time</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Application Rate</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 12px 12px; font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Chicken</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600; font-size: 0.95rem;\">1.1 - 0.8 - 0.5</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center;\">~75%</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center;\">3-6 months (hot compost)</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Apply composted at 1-2 inches as top dressing</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 12px; font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Duck</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600; font-size: 0.95rem;\">0.6 - 1.4 - 0.5</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center;\">~80%</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center;\">4-6 months (hot compost)</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Higher P makes it good for root crops and flowers</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 12px 12px; font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Goose</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center; font-weight: 600; font-size: 0.95rem;\">0.5 - 0.3 - 0.8</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center;\">~80%</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; text-align: center;\">4-6 months (hot compost)</td>\n                    <td style=\"padding: 12px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Higher K suits fruiting crops. More grass-based, lower N.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <!-- Composting timeline -->\n        <div style=\"margin-bottom: 20px;\">\n            <div style=\"font-weight: 700; font-size: 0.95rem; color: #1a3b2a !important; margin-bottom: 15px; text-align: center;\">Hot Composting Timeline</div>\n            <div style=\"display: flex; align-items: stretch; gap: 0; max-width: 600px; margin: 0 auto;\">\n                <div style=\"flex: 1; background-color: #c9a94e !important; padding: 15px 10px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 0.85rem; color: #1a3b2a !important;\">Week 1-2</div>\n                    <div style=\"font-size: 0.75rem; color: #1a3b2a !important; margin-top: 4px;\">Heating phase</div>\n                    <div style=\"font-size: 0.7rem; color: #1a3b2a !important;\">130-150F</div>\n                </div>\n                <div style=\"flex: 1; background-color: #d4a34a !important; padding: 15px 10px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 0.85rem; color: #1a3b2a !important;\">Week 3-6</div>\n                    <div style=\"font-size: 0.75rem; color: #1a3b2a !important; margin-top: 4px;\">Active composting</div>\n                    <div style=\"font-size: 0.7rem; color: #1a3b2a !important;\">Turn weekly</div>\n                </div>\n                <div style=\"flex: 1; background-color: #8c9c8c !important; padding: 15px 10px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 0.85rem; color: #f8f9f0 !important;\">Week 7-12</div>\n                    <div style=\"font-size: 0.75rem; color: #f8f9f0 !important; margin-top: 4px;\">Cooling/curing</div>\n                    <div style=\"font-size: 0.7rem; color: #f8f9f0 !important;\">Turn monthly</div>\n                </div>\n                <div style=\"flex: 1; background-color: #2d5a3d !important; padding: 15px 10px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 0.85rem; color: #f8f9f0 !important;\">Week 13+</div>\n                    <div style=\"font-size: 0.75rem; color: #f8f9f0 !important; margin-top: 4px;\">Ready to use</div>\n                    <div style=\"font-size: 0.7rem; color: #f8f9f0 !important;\">Dark, crumbly</div>\n                </div>\n            </div>\n        </div>\n        <!-- Warning box -->\n        <div style=\"background-color: #8b3a3a !important; padding: 15px 18px;\">\n            <strong style=\"display: block; margin-bottom: 5px; color: #f8f9f0 !important; font-size: 0.9rem;\">Never Apply Fresh Manure to Growing Beds</strong>\n            <p style=\"font-size: 0.85rem; color: #f8f9f0 !important; margin: 0;\">Fresh poultry manure is too high in nitrogen and ammonia. It will burn plant roots, and may contain Salmonella or E. coli. Always compost for a minimum of 90 days (120 days for root crops) before applying to beds where food is grown.</p>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Sources: UC ANR Composting Guidelines, USDA National Organic Program composting standards\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-safe-plants"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Garden Plants and Free-Range Birds</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What to keep, what to protect, and what to remove from your range area</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <!-- SAFE column -->\n            <div style=\"background-color: #fff !important; border: 2px solid #2d5a3d; overflow: hidden;\">\n                <div style=\"background-color: #2d5a3d !important; padding: 14px 18px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 1rem; color: #f8f9f0 !important; margin-bottom: 2px;\">SAFE (Birds Ignore)</div>\n                    <div style=\"font-size: 0.7rem; color: #f8f9f0 !important; opacity: 0.9;\">No protection needed</div>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Rosemary</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Lavender</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Sage</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Oregano</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Established shrubs</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Ornamental grasses</span>\n                    </div>\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 14px; margin-bottom: 8px;\">CA-Native Safe Plants</div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">California fuchsia</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Manzanita</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0;\">\n                        <span style=\"color: #2d5a3d !important; font-weight: 700; font-size: 1.1rem;\">&#10003;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Ceanothus (California lilac)</span>\n                    </div>\n                </div>\n            </div>\n            <!-- DESTRUCTIBLE column -->\n            <div style=\"background-color: #fff !important; border: 2px solid #c9a94e; overflow: hidden;\">\n                <div style=\"background-color: #c9a94e !important; padding: 14px 18px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 1rem; color: #1a3b2a !important; margin-bottom: 2px;\">PROTECT THESE</div>\n                    <div style=\"font-size: 0.7rem; color: #1a3b2a !important; opacity: 0.85;\">Birds will eat or destroy</div>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">!</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Lettuce and salad greens</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">!</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Strawberries</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">!</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Young seedlings (any species)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">!</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Hostas</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">!</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Pansies and violas</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">!</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Peas and bean plants</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0;\">\n                        <span style=\"color: #c9a94e !important; font-weight: 700; font-size: 1.1rem;\">!</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Ripening tomatoes (low fruit)</span>\n                    </div>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 12px; margin-top: 14px; font-size: 0.8rem; color: #1c3c2c !important;\">\n                        <strong style=\"color: #1a3b2a !important;\">Tip:</strong> Use hardware cloth cloches, low fencing, or chicken wire cages to protect vulnerable plants while still allowing free-range time.\n                    </div>\n                </div>\n            </div>\n            <!-- TOXIC column -->\n            <div style=\"background-color: #fff !important; border: 2px solid #8b3a3a; overflow: hidden;\">\n                <div style=\"background-color: #8b3a3a !important; padding: 14px 18px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 1rem; color: #f8f9f0 !important; margin-bottom: 2px;\">TOXIC (Remove)</div>\n                    <div style=\"font-size: 0.7rem; color: #f8f9f0 !important; opacity: 0.9;\">Dangerous if ingested</div>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Foxglove (all parts)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Oleander (all parts)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Nightshade (leaves, berries)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Yew (needles, seeds)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Azalea (all parts)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Rhododendron (all parts)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: center; gap: 8px; padding: 7px 0;\">\n                        <span style=\"color: #8b3a3a !important; font-weight: 700; font-size: 1.1rem;\">&#10007;</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Lily of the valley (all parts)</span>\n                    </div>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 12px; margin-top: 14px; font-size: 0.8rem; color: #1c3c2c !important;\">\n                        <strong style=\"color: #8b3a3a !important;\">Note:</strong> Most birds avoid toxic plants instinctively, but hungry or bored birds may sample anything. Remove toxic plants from the range area entirely.\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Sources: UC Davis Veterinary Medicine toxic plant database, ASPCA Animal Poison Control Center\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-duck-water"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Duck Water Setups Compared</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Finding the right water solution for your flock size and budget</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 750px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Setup</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Cost</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Capacity</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Maintenance</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Winter Durability</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best For</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Rubber Livestock Tub</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$15-30</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">15-50 gal</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Low</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Excellent</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">1-3 ducks, beginners, limited space</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Kiddie Pool</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$10-25</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">40-80 gal</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #c9a94e !important;\">Medium</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #8b3a3a !important;\">Poor</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">2-4 ducks, seasonal use, budget option</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Pre-formed Pond Liner</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$50-150</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">50-150 gal</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #c9a94e !important;\">Medium</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Good</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">3-6 ducks, semi-permanent setup</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Stock Tank (galvanized)</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$80-200</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">100-300 gal</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #c9a94e !important;\">Medium</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Excellent</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">4-8 ducks, year-round, durable</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">In-Ground Pond</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$200-500+</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">200+ gal</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #8b3a3a !important;\">High</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Excellent</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">6+ ducks, permanent installation, large properties</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a;\">\n                <strong style=\"display: block; margin-bottom: 5px; color: #1a3b2a !important; font-size: 0.9rem;\">Water Change Frequency</strong>\n                <ul style=\"margin: 0; padding-left: 18px; font-size: 0.8rem; color: #1c3c2c !important; line-height: 1.8;\">\n                    <li style=\"color: #1c3c2c !important;\">Small tubs/pools: daily in warm weather, every 2-3 days in cool weather</li>\n                    <li style=\"color: #1c3c2c !important;\">Stock tanks: every 2-3 days (install a drain plug for easy emptying)</li>\n                    <li style=\"color: #1c3c2c !important;\">In-ground ponds: weekly partial water changes or use a biological filter</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a;\">\n                <strong style=\"display: block; margin-bottom: 5px; color: #1a3b2a !important; font-size: 0.9rem;\">Drainage Tips</strong>\n                <ul style=\"margin: 0; padding-left: 18px; font-size: 0.8rem; color: #1c3c2c !important; line-height: 1.8;\">\n                    <li style=\"color: #1c3c2c !important;\">Place water setups on gravel pads to prevent mud</li>\n                    <li style=\"color: #1c3c2c !important;\">Route drain water to garden beds or fruit trees (free fertilizer)</li>\n                    <li style=\"color: #1c3c2c !important;\">Position downhill from the coop to keep sleeping areas dry</li>\n                </ul>\n            </div>\n        </div>\n        <div style=\"background-color: #2d5a3d !important; padding: 15px 18px; margin-top: 20px;\">\n            <strong style=\"display: block; margin-bottom: 5px; color: #f8f9f0 !important; font-size: 0.9rem;\">Minimum Water Depth: 6 Inches</strong>\n            <p style=\"font-size: 0.85rem; color: #f8f9f0 !important; margin: 0;\">Ducks must be able to fully submerge their heads to clean their bills and eyes. Water sources shallower than 6 inches do not meet this need and can lead to eye infections and clogged nostrils. Even if you cannot provide a full swimming pool, always provide at least one deep water container.</p>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Sources: Cornell University Cooperative Extension duck care guidelines, The Livestock Conservancy\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-predator-chart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Santa Cruz Area Predator Identification Chart</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Know your threats: attack patterns, entry methods, and evidence for each local predator</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 850px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Predator</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Typical Attack Time</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Method of Entry</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Evidence Left Behind</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Kill Pattern</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Seasonal Activity</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Raccoon</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Night (dusk to dawn)</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Opens latches, reaches through wire, tears weak mesh</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Scattered feathers, bite marks on neck/crop, muddy paw prints</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Eats head and crop; pulls birds through wire piece by piece</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Year-round, peaks spring/summer</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Gray Fox</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Dusk, dawn, night</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Digs under fencing, squeezes through gaps, can climb trees and fences</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Digging evidence at fence line, scattered feathers away from coop</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Carries bird away whole; caches uneaten prey</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Year-round, increased spring (kits)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Coyote</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Dawn, dusk (bold ones: daytime)</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Digs under fencing, pulls apart weak enclosures, jumps low fences</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Large dig holes, feather trails leading away, scat nearby</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Takes entire bird; may kill multiple if panicked flock</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Year-round, bolder in spring (pup-rearing)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Bobcat</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Dawn, dusk, night</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Climbs over fencing, ambush from cover, powerful enough to break light latches</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Clean kill site, claw marks, minimal feather scatter</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Bite to neck/skull; takes bird to eat elsewhere, caches remains</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Year-round, more active fall/winter</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Weasel / Mink</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Night (any hour)</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Squeezes through gaps as small as 1 inch; passes through chicken wire easily</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Multiple dead birds, small bite wounds at base of skull, little eaten</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Mass killing (surplus killing); bites back of head, may drain blood</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Year-round, worst in late fall/winter</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Cooper's Hawk</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Daytime (ambush hunter)</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Dives from cover (trees, fences); targets free-range birds</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Plucking post (pile of feathers in one spot), breast eaten first</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Plucks and eats on site; takes smaller birds (bantams, young pullets)</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Year-round, peaks during migration (fall/spring)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Red-tailed Hawk</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Daytime (soaring hunter)</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Strikes from above in open areas; less likely in covered runs</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Talon puncture wounds, feather pile, bird may be carried off entirely</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Carries prey to perch; targets bantams, chicks, and small hens</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Year-round, more common in open/rural areas</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Great Horned Owl</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Night (silent hunter)</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Strikes from above; can reach into open-top runs and uncovered coops</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Decapitated bird, talon marks, head and neck eaten</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Removes head; eats head and upper body, may carry smaller birds away</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Year-round, nests in winter (hungrier then)</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <!-- Ringtail Cat highlight box -->\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"background-color: #2d5a3d !important; padding: 20px; border-left: 4px solid #c9a94e;\">\n            <strong style=\"display: block; margin-bottom: 8px; color: #f8f9f0 !important; font-size: 1rem;\">Ringtail Cat: The Predator You May Not Know About</strong>\n            <p style=\"font-size: 0.85rem; color: #f8f9f0 !important; margin: 0 0 10px 0; line-height: 1.7;\">The ringtail (Bassariscus astutus) is a lesser-known but real threat to backyard flocks in the Santa Cruz Mountains and surrounding foothills. About the size of a squirrel with a long banded tail, ringtails are nocturnal, excellent climbers, and can squeeze through surprisingly small openings.</p>\n            <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 12px;\">\n                <div style=\"background-color: rgba(255,255,255,0.1); padding: 12px; border-radius: 0;\">\n                    <strong style=\"font-size: 0.8rem; color: #f8f9f0 !important; display: block; margin-bottom: 4px;\">Attack Time</strong>\n                    <span style=\"font-size: 0.8rem; color: #f8f9f0 !important;\">Strictly nocturnal</span>\n                </div>\n                <div style=\"background-color: rgba(255,255,255,0.1); padding: 12px; border-radius: 0;\">\n                    <strong style=\"font-size: 0.8rem; color: #f8f9f0 !important; display: block; margin-bottom: 4px;\">Entry Method</strong>\n                    <span style=\"font-size: 0.8rem; color: #f8f9f0 !important;\">Climbs walls, squeezes through 3-4 inch gaps, enters through vents</span>\n                </div>\n                <div style=\"background-color: rgba(255,255,255,0.1); padding: 12px; border-radius: 0;\">\n                    <strong style=\"font-size: 0.8rem; color: #f8f9f0 !important; display: block; margin-bottom: 4px;\">Evidence</strong>\n                    <span style=\"font-size: 0.8rem; color: #f8f9f0 !important;\">Small bite marks, eggs eaten (shells left), scat with seeds and fur</span>\n                </div>\n                <div style=\"background-color: rgba(255,255,255,0.1); padding: 12px; border-radius: 0;\">\n                    <strong style=\"font-size: 0.8rem; color: #f8f9f0 !important; display: block; margin-bottom: 4px;\">Kill Pattern</strong>\n                    <span style=\"font-size: 0.8rem; color: #f8f9f0 !important;\">Targets eggs and chicks primarily; may kill bantams and young birds</span>\n                </div>\n            </div>\n            <p style=\"font-size: 0.8rem; color: #f8f9f0 !important; margin: 12px 0 0 0; opacity: 0.9;\">Prevention: Use 1/2-inch hardware cloth on all openings including vents. Seal gaps larger than 3 inches. Secure egg collection doors at night.</p>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Sources: CDFA Wildlife Services, UC ANR Publication 8496 (Wildlife Pest Management)\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-hardware-specs"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Hardware Cloth and Lock Specs Comparison</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Choosing the right mesh, wire, and locking hardware for predator-proof coops</p>\n    </div>\n    <!-- Mesh/Wire Comparison -->\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 850px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Material</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Mesh Size</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Wire Gauge</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Raccoon-Proof?</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Weasel-Proof?</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Rust Resistance</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Cost/ft</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best Use</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">1/2\" Hardware Cloth</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">1/2\" x 1/2\"</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">19 gauge</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Yes</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Yes</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #c9a94e !important;\">Moderate</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$1.50-3.00</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">All-purpose coop walls, windows, run enclosure</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">1/4\" Hardware Cloth</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">1/4\" x 1/4\"</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">23 gauge</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Yes</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Yes</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #c9a94e !important;\">Moderate</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$2.50-5.00</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Vents, brooder covers, snake/mouse exclusion</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Chicken Wire (Hex Netting)</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">1\" hex</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">20-22 gauge</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #8b3a3a !important;\">No</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #8b3a3a !important;\">No</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #8b3a3a !important;\">Low</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$0.50-1.00</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Daytime free-range boundary only (not predator-proof)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Welded Wire (2\"x4\")</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">2\" x 4\"</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">14-16 gauge</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #c9a94e !important;\">Partial</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #8b3a3a !important;\">No</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #c9a94e !important;\">Moderate</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$1.00-2.00</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Run framework (layer hardware cloth over it for full protection)</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">PVC-Coated Hardware Cloth</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">1/2\" x 1/2\"</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">19 gauge</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Yes</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Yes</td>\n                    <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">High</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$3.00-6.00</td>\n                    <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Coastal/humid areas, long-term installations, buried aprons</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Chicken wire keeps chickens in but does NOT keep predators out. Raccoons can tear through it in minutes. Always use hardware cloth for nighttime security.\n    </div>\n    <!-- Lock Comparison Section -->\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"background-color: #2d5a3d !important; color: #f8f9f0 !important; padding: 10px 15px; font-weight: 700; font-size: 0.95rem; margin-bottom: 0;\">Lock and Latch Comparison</div>\n        <div style=\"overflow-x: auto;\">\n            <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n                <thead>\n                    <tr>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Lock Type</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Raccoon-Proof?</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Cost</th>\n                        <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Notes</th>\n                    </tr>\n                </thead>\n                <tbody>\n                    <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                        <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Simple Hook-and-Eye</td>\n                        <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #8b3a3a !important;\">No</td>\n                        <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$1-3</td>\n                        <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Raccoons can lift these easily. Not recommended for any coop door.</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                        <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Carabiner Clip</td>\n                        <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Yes</td>\n                        <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$3-8</td>\n                        <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Spring-loaded gate requires two-step motion. Good budget option.</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                        <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Padlock (keyed or combo)</td>\n                        <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Yes</td>\n                        <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$5-15</td>\n                        <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Most secure. Use combination lock if you tend to misplace keys.</td>\n                    </tr>\n                    <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                        <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Two-Step Barrel Bolt</td>\n                        <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Yes</td>\n                        <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$4-10</td>\n                        <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Slide bolt plus spring pin. Raccoons cannot manage the two-step action.</td>\n                    </tr>\n                    <tr>\n                        <td style=\"padding: 10px 10px; font-weight: 600; color: #1a3b2a !important;\">Automatic Coop Door</td>\n                        <td style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #2d5a3d !important;\">Yes</td>\n                        <td style=\"padding: 10px 10px; color: #1c3c2c !important; text-align: center;\">$100-250</td>\n                        <td style=\"padding: 10px 10px; color: #1c3c2c !important;\">Timer or light-sensor operated. Closes at dusk automatically. Best for keepers with irregular schedules.</td>\n                    </tr>\n                </tbody>\n            </table>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin-top: 20px;\">\n            <strong style=\"display: block; margin-bottom: 5px; color: #1a3b2a !important; font-size: 0.9rem;\">The Two-Step Rule</strong>\n            <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0; line-height: 1.7;\">Every latch on your coop should require at least two distinct motions to open. Raccoons have dexterous paws and can operate simple latches, slide bolts, and hook-and-eye closures. A two-step mechanism (lift and slide, press and turn, or clip and release) defeats them.</p>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.7rem; color: #8c9c8c !important; text-align: center;\">\n        Sources: UC ANR Publication 8514 (Livestock Housing), manufacturer specifications\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["garden-flock-seasonal-spring-summer"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Seasonal Flock Care Checklist: Spring and Summer</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Key tasks for March through August in coastal and inland California</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <!-- Spring Section -->\n        <div style=\"margin-bottom: 25px;\">\n            <div style=\"background-color: #2d5a3d !important; color: #f8f9f0 !important; padding: 10px 15px; font-weight: 700; font-size: 0.95rem; margin-bottom: 0;\">Spring (March - May)</div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-top: none; padding: 18px;\">\n                <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 8px;\">\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Coop deep clean:</strong> Remove all bedding, scrub surfaces, let dry fully before adding fresh shavings</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Parasite prevention:</strong> Check for mites and lice (look under wings and around vent). Refresh dust bath with diatomaceous earth</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Chick season prep:</strong> Set up brooder area if adding new birds. Order chicks early (hatcheries sell out by April)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Garden integration start:</strong> Begin supervised free-range time in garden areas (after seedlings are established)</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Nesting box refresh:</strong> Replace old bedding, add herbs (lavender, mint) for pest deterrence</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Waterer upgrade:</strong> Switch to larger or multiple waterers as temperatures rise and egg production increases</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <!-- Summer Section -->\n        <div style=\"margin-bottom: 25px;\">\n            <div style=\"background-color: #2d5a3d !important; color: #f8f9f0 !important; padding: 10px 15px; font-weight: 700; font-size: 0.95rem; margin-bottom: 0;\">Summer (June - August)</div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-top: none; padding: 18px;\">\n                <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 8px;\">\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Heat management:</strong> Provide shade cloth over run, ensure cross-ventilation in coop, offer frozen fruit treats on hot days</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Water stations:</strong> Check and refill multiple times daily. Add ice in extreme heat. Clean waterers every 2-3 days to prevent algae</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Fly control:</strong> Clean droppings more frequently, use fly traps away from coop, keep feed covered</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Egg collection frequency:</strong> Collect eggs twice daily in warm weather to prevent spoilage and discourage broodiness</span>\n                    </div>\n                    <div style=\"display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;\">\n                        <span style=\"display: inline-block; width: 20px; height: 20px; min-width: 20px; border: 2px solid #1a3b2a; background-color: #f8f9f0 !important; margin-top: 1px;\"></span>\n                        <span
