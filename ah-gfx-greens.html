window.AH_GRAPHICS["lettuce-variety-comparison-table"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Best Lettuce Varieties for Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Proven performers matched to local microclimates</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Type</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best Microclimate</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Why It Works Here</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Jericho</td>\n                    <td style=\"padding: 10px 12px; color: #1c ng: 10px 12px; color: #1c3c2c !important;\">Mini romaine</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">50-60</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Shaded, Coastal</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Compact, shade-tolerant, great for small beds</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Black Seeded Simpson</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Loose-leaf</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">45-50</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">All areas</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Fastest, most beginner-friendly, dependable</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Winter Density</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Romaine/Butter cross</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">55-60</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Coastal, Shaded</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Excellent cold tolerance, overwinters well</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">New Red Fire</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Loose-leaf</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">55</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Inland, Watsonville</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Heat-tolerant red variety, slow bolt</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        All varieties available from Renee's Garden Seeds (Felton) and most local nurseries.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["greens-planting-calendar"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Santa Cruz Greens Planting Calendar</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">When to plant each type for best results</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Green</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Best Planting</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Also OK</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Avoid</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Lettuce</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sep-Nov, Feb-Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Dec-Jan (coastal)</td>\n                    <td style=\"padding: 10px 15px; color: #c0392b !important;\">Jun-Aug (bolts fast)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Spinach</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sep-Nov</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Feb (bolt-resistant only)</td>\n                    <td style=\"padding: 10px 15px; color: #c0392b !important;\">Apr-Aug (bolts immediately)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Kale</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sep-Nov, Feb-Apr</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Year-round (coastal)</td>\n                    <td style=\"padding: 10px 15px; color: #8c9c8c !important;\">No bad time (watch aphids summer)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Asian Greens</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sep-Nov, Feb-Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Aug (fall crop start)</td>\n                    <td style=\"padding: 10px 15px; color: #c0392b !important;\">May-Jul (bolts quickly)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Arugula</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sep-Nov, Feb-Apr</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Year-round (coastal shade)</td>\n                    <td style=\"padding: 10px 15px; color: #c0392b !important;\">Jun-Aug inland (too hot)</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Mustard Greens</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sep-Nov, Feb-Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Aug (fall crop)</td>\n                    <td style=\"padding: 10px 15px; color: #c0392b !important;\">May-Jul (bolts, too spicy)</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Santa Cruz advantage: Our mild winters mean greens grow nearly year-round. Fall planting is the sweet spot.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["spinach-bolting-prevention-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Spinach Bolting Prevention</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Keep spinach producing longer in Santa Cruz</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; border-left: 5px solid #1a3b2a; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Plant in Fall (September - November)</div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Days are shortening, not lengthening. This is the single most effective anti-bolting strategy. Harvest through winter and into early spring.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8c9c8c; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Choose Bolt-Resistant Varieties</div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Space, Tyee, and Corvair are notably slow to bolt. These buy you 2-3 extra weeks over standard varieties.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8c9c8c; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Provide Afternoon Shade</div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Shade cloth or positioning behind taller crops reduces heat stress. Morning sun + afternoon shade is ideal for spring spinach.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8c9c8c; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Keep Soil Consistently Moist</div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Water stress accelerates bolting. Never let spinach wilt. Mulch heavily to retain moisture.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #dde2d8; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Accept the Limits</div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Spring spinach will always have a shorter window than fall spinach. When it bolts, pull it and plant something warm-season. Switch to heat-tolerant greens like New Zealand spinach or Malabar spinach for summer.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["greens-cut-and-come-again-technique-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Cut-and-Come-Again Harvesting</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Get 3-5 harvests from a single planting</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 15px;\">\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">1</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Sow Thickly</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Scatter seeds 1/2 inch apart in a band or block. No need to thin. You're harvesting baby leaves, not full heads.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">2</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">First Harvest at 4-6 Inches</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">When leaves reach 4-6 inches tall (usually 3-4 weeks), cut the entire patch to 1 inch above soil level with sharp scissors.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">3</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Water and Feed</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">After each cutting, water well and apply diluted liquid fertilizer. New growth emerges from the crown within days.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">4</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Repeat 3-5 Times</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Each regrowth takes 2-3 weeks. After 3-5 cuttings, quality declines. Pull the patch, replant, and start fresh.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0 25px 25px 25px; border-radius: 6px;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Best greens for cut-and-come-again:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Lettuce mix, arugula, mizuna, tatsoi, spinach, mustard greens, kale (baby). Mesclun mixes are specifically designed for this technique.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["common-greens-problems-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Greens Problem Quick Diagnosis</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What's wrong with your greens?</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Symptom</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Likely Cause</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Fix</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Sending up flower stalk</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Bolting (day length + heat)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Harvest immediately. Replant with bolt-resistant variety. Plant earlier next time.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Bitter taste</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Heat stress, underwatering, or too mature</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Harvest younger. Water consistently. Provide afternoon shade. Soak in cold water 15 min before eating.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Holes in leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Slugs, snails, or earwigs</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Iron phosphate bait (Sluggo). Water in morning not evening. Clear nearby hiding spots.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Curled, sticky leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Aphids</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Strong water spray daily. Attract ladybugs. Worst in warm, still weather. Neem oil if severe.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Seedlings cut at base</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Cutworms</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Cardboard collars around seedlings. Bt spray for severe infestations. Dig around base to find caterpillars.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">White powder on leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Powdery mildew</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Improve airflow (thin plantings). Water at base. Common in coastal fog. Remove affected leaves.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Yellow lower leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Nitrogen deficiency or overwatering</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Feed with balanced fertilizer. Check drainage. Reduce watering frequency if soil stays soggy.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Most greens problems are timing or watering issues, not pest emergencies. Adjust your planting schedule first.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

</script>
