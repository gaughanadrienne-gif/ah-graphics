window.AH_GRAPHICS["growing-calendula-santa-cruz-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">When to Plant Calendula in Santa Cruz</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Two main windows, plus how to sow</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Planting Window</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Timing</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Blooms</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Fall (strongest plants)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">September through October</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Winter through spring, roots establish during the rainy season</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Early spring</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">February through March</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Late spring through summer</td></tr></table></div><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Sow:</span> Scatter seeds where you want them, about 1/4 inch deep.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Space:</span> 8 to 10 inches apart, thin seedlings once a few inches tall.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Germination:</span> Usually within one to two weeks. Water gently until then.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Coastal note:</span> Aptos and Capitola gardeners can push these windows since frost is rare. Scotts Valley and San Lorenzo Valley should stick closer to these dates.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["growing-calendula-santa-cruz-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Calendula Salve at a Glance</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">From dried petals to healing salve in three steps</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">You need:</span> 1 cup dried calendula petals, 1 cup carrier oil (olive oil works well), 1 ounce beeswax, small jars or tins, optional lavender essential oil.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">1.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Infuse the oil.</span> Sun infusion: seal petals and oil in a jar on a sunny windowsill 4 to 6 weeks. Heat infusion: warm the jar in a water bath on low 2 to 3 hours. Strain through cheesecloth.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">2.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Make the salve.</span> Heat infused oil with beeswax until melted, add essential oil if using, pour into clean jars.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">3.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Use and store.</span> Apply to minor cuts, scrapes, burns, bug bites, and dry skin. Keeps about a year in a cool, dry place.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

 color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Yellow sticky traps, spray leaf undersides</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Tomato hornworms</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Tomatoes, peppers, eggplant</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Hand-picking is the most effective control</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Squash bugs</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Squash, pumpkins, cucumbers, melons</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Scrape egg clusters, trap boards, pick adults early</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Spider mites</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Beans, tomatoes, cucumbers (hot, dry, dusty conditions)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Strong water spray on leaf undersides</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Flea beetles</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Brassicas, eggplant, seedlings in spring</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Row cover at transplanting, sticky traps</td></tr></table></div></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["common-garden-pests-in-santa-cruz-county-and-how-to-beat-them-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">The 7 IPM Principles</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Integrated pest management fundamentals for every pest</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">1.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Prevention first.</span> Healthy plants resist pests better. Good soil, adequate water, and proper spacing all matter.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">2.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Monitor regularly.</span> Check your garden at least weekly and catch problems early.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">3.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Identify correctly.</span> Know what you are dealing with before treating. Not every bug is a pest.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">4.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Tolerate some damage.</span> A few holes in leaves will not ruin your harvest.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">5.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Start with least-toxic options.</span> Physical removal, water spray, and barriers before sprays.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">6.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Encourage beneficials.</span> Create habitat for the predators and parasites that keep pests in check.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">7.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Rotate and diversify.</span> Mixed plantings and crop rotation break pest cycles.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["common-garden-pests-in-santa-cruz-county-and-how-to-beat-them-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Your Beneficial Insect Allies</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">The good bugs that do your pest control for free</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Beneficial</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">What It Eats</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Ladybugs</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Aphids</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Lacewings</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Aphids, mites, small caterpillars</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Syrphid flies</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Larvae eat aphids</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Parasitic wasps</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Parasitize caterpillars, aphids, whiteflies</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Ground beetles</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Slugs, snails, soil-dwelling pests</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Spiders</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Almost anything</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Encourage them: plant yarrow, fennel, dill, sweet alyssum, and cosmos, provide water sources, avoid broad-spectrum pesticides, and leave some areas a little wild.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["ollas-irrigation-santa-cruz-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Olla Size Guide</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Match the olla to your garden</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Size</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Watering Radius</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Refill Frequency</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Best For</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Small (1 to 2 quarts)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">About 12 inches</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Every 2 to 3 days in hot weather</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Containers, individual tomato plants, small herb groupings</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Medium (1 to 2 gallons)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">About 18 inches</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Every 3 to 5 days</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Most raised beds: one per 4x4 bed, two per 4x8 bed</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Large (3 to 5 gallons)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Up to 3 feet</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">A week or more</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">In-ground beds, squash hills, melon patches, fruit trees</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">What to look for: fully unglazed terra cotta, a lid or cover to stop evaporation and mosquitoes, and thick walls that release water slowly and last longer.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["ollas-irrigation-santa-cruz-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">DIY Ollas: Two-Pot Method</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Roughly $10 to $15 each versus $30 to $60 commercial</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">1.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Gather two unglazed terra cotta pots</span> of the same size.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">2.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Seal one drainage hole</span> with silicone caulk or waterproof epoxy (this pot becomes the bottom).</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">3.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Glue the pots together rim-to-rim</span> with the same sealant, creating a closed vessel.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">4.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Cure 24 to 48 hours.</span> </p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">5.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Bury sealed end down,</span> fill through the open drainage hole of the top pot, and cover the hole with a saucer or stone.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Cost:</span> Two 8-inch pots run $8 to $12 total, a tube of silicone $5 to $8 (enough for many ollas).</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Simpler option:</span> Seal a single pot's drainage hole, bury open end up, cover with a saucer. Easier, but holds less water and loses more to evaporation.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

>Sprinklers</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Poor</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Low to moderate</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Low</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Lawns (not vegetables)</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Studies suggest ollas use 50 to 70 percent less water than surface irrigation. Many gardeners combine ollas in intensive raised beds with drip for larger areas.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["garden-prep-from-lawn-to-garden-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Sheet Mulching Layer by Layer</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">The lasagna method for killing grass without digging</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">1.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Mow grass short</span> and water the area thoroughly the day before.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">2.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Lay cardboard or newspaper.</span> Plain cardboard with tape removed, edges overlapped by 6 inches, or newspaper 10 to 12 sheets thick. Saturate with water.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">3.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Add compost, 2 to 4 inches.</span> Provides nutrients, weighs down cardboard, and gives immediate planting depth.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">4.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Add mulch, 4 to 6 inches.</span> Straw, wood chips, or shredded leaves protect soil and suppress weeds.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">5.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Plant.</span> Transplants can go in the same day through the cardboard. Direct seeding works after 1 to 2 months. Full decomposition takes 3 to 6 months.</p><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Santa Cruz note: gophers can burrow under cardboard. If gophers are serious in your area, build raised beds with gopher wire instead.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["garden-prep-from-lawn-to-garden-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Which Lawn-to-Garden Method Fits You?</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Match the method to your situation</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Your Situation</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Best Method</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Why</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Most Santa Cruz gardeners</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Sheet mulching</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Best balance of effort, cost, and results. Works any season, builds soil, no heavy labor</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Want instant results, do not mind work</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Sod removal plus compost</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Best for one or two beds. Plant the same day</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Gopher-prone areas</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Raised beds with gopher wire</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Bypass grass removal entirely and protect crops from underground raiders</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Large sunny areas in summer</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Solarization</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Works well inland (Watsonville, Scotts Valley), less effective on the foggy coast</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Avoid</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Tilling</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Destroys soil structure, surfaces weed seeds, and grass re-sprouts from chopped roots</td></tr></table></div></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["garden-prep-from-lawn-to-garden-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Conversion Timelines Compared</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Setup time and when you can plant</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Method</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Setup</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">When You Can Plant</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Sheet mulching</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">1 day</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Transplants immediately, direct seed in 1 to 2 months</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2
