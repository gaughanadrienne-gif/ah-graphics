0px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Tilling</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">1 to 2 hours</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">After amending, with an ongoing weed battle</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Sheet mulching cost for a 4x8 bed: roughly $20 to $50 (cardboard is free, straw $12 to $15 per bale, bulk compost $40 to $60 per cubic yard delivered).</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["owls-as-garden-allies-installing-owl-boxes-for-natural-rodent-control-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">What One Owl Box Can Do</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Barn owl rodent control by the numbers</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Who Is Hunting</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Rodents Removed</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">A single barn owl, per night</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">2 to 4 rodents</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">A single barn owl, per year</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">About 1,000 to 1,500 rodents</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">A breeding pair, per year</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">2,000 to 3,000 rodents</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">A pair raising 4 to 6 owlets</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">3,000 to 4,000 or more rodents per year</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">On the menu: gophers (caught at tunnel openings), voles and meadow mice, roof rats and Norway rats, house mice, and smaller ground squirrels. No traps, no poison, no effort from you.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["owls-as-garden-allies-installing-owl-boxes-for-natural-rodent-control-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Barn Owl Box Spec Sheet</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">A proven design and placement checklist</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Floor:</span> Approximately 10 x 18 inches minimum (larger is better).</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Height:</span> 15 to 18 inches.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Entry hole:</span> 4.5 x 4 inches elliptical, or 6 inches round, with a landing perch outside.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Predator guard:</span> A 6 to 8 inch tunnel entrance keeps raccoons from reaching the nest.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Materials:</span> 3/4-inch exterior plywood, cedar, or redwood. Never pressure-treated wood.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Mounting height:</span> 12 to 20 feet. Higher placements often attract owls faster.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Orientation:</span> Face the entrance away from prevailing weather, north or east often works well. No direct sun on the entrance.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Timing:</span> Install in fall or winter. Barn owls begin prospecting as early as January. Expect 1 to 3 years for occupancy.</p><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Non-negotiable: never use rodent poison on a property with owl boxes. Studies show 70 to 90 percent of California barn owls test positive for rodenticide exposure.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["garden-highlight-eggplant-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Gboma Eggplant at a Glance</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">The eggplant grown for leaves, not fruit</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Species:</span> Solanum macrocarpon, distinct from common eggplant (Solanum melongena). Also called African eggplant or garden egg leaf.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Primary harvest:</span> Large, spinach-like leaves (6 to 10 inches), robust and slightly bitter, between spinach and a mild mustard green.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Plant size:</span> Bushy, 2 to 3 feet tall and wide. Grown as a warm-season annual in Santa Cruz County.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Ideal daytime temps:</span> 75 to 85 degrees F. Tolerates 65 to 90. Growth slows below 60. Frost kills it.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Start seeds:</span> Indoors 6 to 8 weeks before transplant, 75 to 85 degrees F on a heat mat, germination in 10 to 21 days.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Transplant:</span> Late May or early June, once nights stay above 50 degrees F. Space 2 to 3 feet apart in full sun.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">First harvest:</span> 6 to 8 weeks after transplanting, then a generous handful of leaves weekly per plant.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["garden-highlight-eggplant-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Gboma vs Familiar Greens</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Where this West African staple fits in your garden</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Crop</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">How Gboma Compares</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Collards and kale</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Similar cooking uses, but Gboma tolerates heat better and grows more compactly</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Swiss chard</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Similar ease of growing, with a different flavor profile and cultural significance</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Spinach</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Spinach bolts in heat. Gboma thrives in it</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Callaloo (amaranth)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Similar role in Caribbean and African cooking. They complement rather than replace each other</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Gboma advantages: produces through summer when lettuce and spinach have bolted, harvests continuously for months, higher protein than most greens, and fewer pest problems than many brassica greens.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["what-to-plant-together-raised-beds-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Best Raised Bed Combinations</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Six proven pairings for coastal California beds</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Combination</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Why It Works</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Tomatoes + basil + sweet alyssum</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Basil fills ground level under staked tomatoes, alyssum along the edges attracts syrphid flies and parasitic wasps</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Lettuce + radishes + carrots</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Radishes mature in 25 to 30 days and loosen soil, carrots root deep, lettuce shades the soil between rows</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Beans + corn + squash</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">The Three Sisters: corn is the trellis, beans fix nitrogen, squash covers the ground (needs at least a 4x8 bed)</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Brassicas + dill + onion family</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Dill attracts parasitic wasps that prey on cabbage worms, alliums may repel some brassica pests</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Peppers + carrots + oregano</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Different root depths avoid competition, oregano covers edges and attracts beneficials</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Cucumbers + sunflowers + nasturtiums</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Sunflowers serve as a trellis and draw pollinators, nasturtiums trap aphids at the edges</td></tr></table></div></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["what-to-plant-together-raised-beds-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Keep These Apart in Raised Beds</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Combinations that compete or actively harm each other</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Do Not Pair</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">The Problem</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Tomatoes + brassicas</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Both heavy feeders competing for nitrogen. Intense enough in a small bed to reduce both yields</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Beans or peas + onion family</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Alliums (onions, garlic, shallots, leeks) inhibit legume growth. Well-documented effect</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Fennel + most vegetables</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Allelopathic to tomatoes, beans, and brassicas. Grow fennel in its own container</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Potatoes + tomatoes</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Same nightshade family, share early blight, late blight, and verticillium wilt</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Dill + carrots</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Can cross-pollinate if both flower, and they compete for the same nutrients and root space</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Multiple cucurbits in one bed</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Squash, cucumbers, and melons compete hard and share powdery mildew and cucumber beetles</td></tr></table></div></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["microclimate-gardening-warm-cool-spots-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">The Four Microclimate Makers</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">What creates warm and cool spots in your yard</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Sun exposure:</span> A south-facing wall can run 10 to 15 degrees warmer than ambient air on a sunny day. North-facing areas stay coolest.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Wind:</span> A 6-foot fence on the northwest side can cut wind speed by 50 percent or more for 5 to 10 times the fence height downwind.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Thermal mass:</span> Concrete, stone, brick, and water absorb heat by day and release it at night, extending the season for nearby plants.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Cold air drainage:</span> Cold air flows downhill and pools in low spots. Frost pockets can be 5 to 10 degrees colder than nearby elevated spots on clear, calm nights.</p><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">In Santa Cruz County yards, the warmest and coolest spots can differ by 10 to 15 degrees on a summer afternoon. That is the difference between early August and late September tomato ripening.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["microclimate-gardening-warm-cool-spots-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Your Microclimate Planting Strategy</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Four zones, four planting plans</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Zone</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Conditions</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Plant Here</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Zone 1: The hot spot</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">South-facing, wind-protected, near thermal mass</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Tomatoes, peppers, eggplant, melons, basil. Plant first in spring, season extends latest in fall</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Zone 2: Average conditions</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Open areas with good sun, no special protection</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Beans, squash, cucumbers, corn, root vegetables, brassicas. The workhorse of your garden</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Zone 3: Cool and sheltered</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">North or east-facing, afternoon shade</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Lettuce, spinach, cilantro, peas. Keeps producing salad greens well into summer</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Zone 4: The frost pocket</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Your coldest, lowest spot</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Frost-tolerant crops: garlic, overwintering onions, kale, chard. No tender crops in early spring</td></tr></table></div></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["garden-highlight-kohlrabi-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Kohlrabi Planting Windows</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Multiple chances per year in Santa Cruz County (45 to 60 days to harvest)</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Window</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Timing</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Notes</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Fall (prime time)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">September through October</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Harvest November and December. Cool weather produces the sweetest, most tender bulbs</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Winter</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">November through February</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Growth slows but continues, harvest in late winter and early spring</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Spring</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">March through April</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Late spring harvest before summer heat. Best for coastal areas like Aptos and Capitola</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Summer</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Foggy coastal areas only</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Inland gardeners should wait until late August or September</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">For succession planting, sow seeds every 2 to 3 weeks during your main windows to extend the harvest.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["garden-highlight-kohlrabi-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Kohlrabi Varieties Compared</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">From quick 45-day types to 10-pound giants</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Variety</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Days</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Why Grow It</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Winner</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">45</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Fastest to mature, ideal for succession planting</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Early White Vienna</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">55</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">The classic, reliable and widely available</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Purple Vienna</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">60</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Purple skin, white flesh, slightly more peppery</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Kolibri</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">60</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Improved purple type with excellent crack resistance</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Superschmelz</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">60 to 70</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Austrian heirloom, up to 10 pounds yet still tender and sweet</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Kossak</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">80</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Giant that stays tender up to 10 inches across</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">New to kohlrabi? Start with Early White Vienna or Purple Vienna, then experiment with the giants. Harvest standard types at 2 to 3 inches for the best texture.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["what-to-plant-in-santa-cruz-amp-the-bay-area-in-august-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">August Temperatures by Microclimate</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Still hot, but days are getting shorter fast</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Microclimate</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Typical August Highs</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Sunny mountain areas (Boulder Creek ridges, Ben Lomond chaparral, Scotts Valley hills)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">85 to 100 degrees many days</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Under redwoods (Felton canyons, shaded areas)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">75 to 85 degrees</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Inland valleys (Scotts Valley, Soquel)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">80 to 90 degrees</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Coastal (Aptos, Capitola, Santa Cruz)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">70 to 80 degrees</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Watsonville and Pajaro Valley</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">80 to 90 degrees</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Heat plus shrinking day length makes August the last good chance to plant most fall and winter crops. Wait until September and many crops will not size up properly.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["what-to-plant-in-santa-cruz-amp-the-bay-area-in-august-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">The August Planting Deadline</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">What must go in now versus what can wait</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Must Plant in August</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Can Wait Until September</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Broccoli and cauliflower (for proper heading before short days)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Quick greens (lettuce, arugula, spinach)</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Full-size carrots and beets (for winter harvest)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Radishes</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Peas (for winter and spring harvest)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Kale and collards</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Brussels sprouts (need the longest season)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\"></td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Even crops that can wait will do better planted in August. When your plantings mature: quick greens and radishes in October, brassicas November through January, carrots and beets October through November, peas December through February.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

ine-height: 1.5; color: #1a3b2a !important;\">How much per round: lettuce, 2 to 3 heads per person every 2 weeks. Beans, one 10-foot row every 3 weeks gives about 5 pounds over 3 weeks. Set phone reminders, succession only works if you actually plant.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["what-to-plant-in-santa-cruz-amp-the-bay-area-in-october-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">October Weather by Microclimate</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">The transition begins, but it is not fall yet</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Microclimate</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Typical October Conditions</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Sunny mountain areas (Boulder Creek ridges, Ben Lomond chaparral)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Still hitting 80s to 90s many days</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Under redwoods (Felton canyons, shaded areas)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">70s to 80s, more stable</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Inland valleys (Scotts Valley, Soquel)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">High 70s to mid-80s</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Coastal (Aptos, Capitola, Santa Cruz)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">60s to 70s, very pleasant</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Watsonville and Pajaro Valley</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">70s to 80s, warm and agricultural</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">First rain might arrive in October, but many years stay dry until November. Do not count on rain to water fall plantings. You are still irrigating.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["what-to-plant-in-santa-cruz-amp-the-bay-area-in-october-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Garlic Planting Quick Card</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">October is garlic month in Santa Cruz County</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">When:</span> Early to mid-October is traditional. In warm microclimates, wait until late October or early November so cloves do not rot in summer-warm soil.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">What:</span> Softneck varieties (California Early, Inchelium Red, Nootka Rose) suit our mild climate, store longer, and braid easily. Buy seed garlic, not grocery store bulbs.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Depth and spacing:</span> Pointy end up, 2 inches deep, 4 to 6 inches apart, rows 12 inches apart.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Site:</span> Full sun for large bulbs. Mulch well with straw or leaves after planting.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Water:</span> To establish, then weekly if it does not rain.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Harvest:</span> Next June or July, when lower leaves turn brown but several green leaves remain on top.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["9-vegetables-that-thrive-in-redwood-shade-for-san-lorenzo-valley-gardeners-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Decode Your Shade</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Know your light before you plant</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Shade Level</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Direct Sun</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">What You Can Grow</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Full shade</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Less than 2 hours</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Very limited. Focus on lettuce, spinach, and arugula</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; fon mportant; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Slower in shade but perfectly usable. Tuck into corners and edges</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Herbs: cilantro, parsley, chives, mint</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">3 to 5 hours</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Shade-grown cilantro finally does not bolt in two weeks</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Beets and radishes</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">4 to 5 hours</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Borderline. Expect smaller roots. With only 3 hours of sun, grow leafy greens instead</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Skip these in shade: tomatoes, peppers, eggplant, squash, cucumbers, melons, corn, and beans. They need 6 or more hours of full sun.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["what-to-plant-in-santa-cruz-amp-the-bay-area-in-september-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">September Temperatures by Microclimate</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Often our hottest month, especially inland</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Microclimate</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Typical September Conditions</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Sunny mountain areas (Boulder Creek ridges, Ben Lomond chaparral, Scotts Valley hills)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Regular 90 to 100 degree days, low humidity</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Under redwoods (Felton canyons, shaded Ben Lomond areas)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">10 to 15 degrees cooler, more moisture retention</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Inland valleys (Scotts Valley, Soquel)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">High 80s to mid-90s</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Coastal (Aptos, Capitola, Santa Cruz)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">70s to 80s, more stable</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Watsonville and Pajaro Valley</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Mid-80s to low 90s</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">This is not yet fall weather, but it is an important planting month. Cool-season crops planted now grow slowly through the heat, then take off when temperatures cool in October and November.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["what-to-plant-in-santa-cruz-amp-the-bay-area-in-september-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Beat the Heat: September Planting Strategies</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Helping cool-season crops survive summer temperatures</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">1.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Shade new plantings from afternoon sun.</span> Shade cloth, lattice, or a propped-up board on the west side helps tender seedlings survive.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">2.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Water consistently.</span> Soil dries quickly. New plantings need daily attention until established.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">3.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Choose heat-tolerant varieties</span> for early September, like Jericho lettuce, which was bred for hot climates.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">4.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Wait until late September</span> for truly cold-hardy crops like mache and spinach.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">5.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Pre-sprout seeds indoors</span> in a cool location if germination is a problem, then transplant the sprouts.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"display: inline-block; min-width: 22px; font-weight: 700; color: #c9a84c !important;\">6.</span><span style=\"font-weight: 700; color: #1a3b2a !important;\">Mulch heavily.</span> Straw around seedlings keeps soil cooler and retains moisture.</p><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Why lettuce seeds will not germinate: September soil is still 70 to 80 degrees, above lettuce's ideal 60 to 65 degree range.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["what-to-plant-in-santa-cruz-amp-the-bay-area-in-november-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">November Conditions by Microclimate</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">Real fall finally arrives in Santa Cruz County</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Microclimate</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Typical November Conditions</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Sunny mountain areas (Boulder Creek ridges, Ben Lomond chaparral)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">60s to 70s by day, 40s at night, some frost possible in low spots</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Under redwoods (Felton canyons, shaded areas)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">50s to 60s, stays cooler, more moisture</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Inland valleys (Scotts Valley, Soquel)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">60s by day, 40s to 50s at night</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Coastal (Aptos, Capitola, Santa Cruz)</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">50s to 60s, very stable, rarely below 45 at night</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Watsonville and Pajaro Valley</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">60s, mild, latest frosts in the county</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Rains typically start in November. Once they do, you can mostly stop irrigating for winter. In warm microclimates, tomatoes might still be hanging on into Thanksgiving.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["what-to-plant-in-santa-cruz-amp-the-bay-area-in-november-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">Bare-Root Season Starts Now</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">November through February is prime planting for perennials</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Fruit trees:</span> Apples, pears, peaches, plums, apricots, cherries, figs, and persimmons. Choose low-chill varieties for our mild winters.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Berries:</span> Blueberries (they love our acidic soil), raspberries, blackberries, and bare-root strawberries.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Grapes:</span> Both table and wine varieties establish well from bare-root.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Roses:</span> November planting gives roses a full season to establish.</p><p style=\"margin: 0 0 9px; font-size: 13px; line-height: 1.5; color: #1a3b2a !important;\"><span style=\"font-weight: 700; color: #b8694a !important;\">Perennial vegetables:</span> Artichoke crowns (perfect for Santa Cruz County), rhubarb, and asparagus.</p><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Why now: plants are fully dormant with minimal transplant shock, cool wet weather helps roots establish, bare-root costs less than potted, and selection is best before popular varieties sell out.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";

window.AH_GRAPHICS["fire-wise-gardening-101-protecting-your-home-and-garden-in-santa-cruz-county-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif; border: 1px solid #dde2d8;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 22px;\"><h3 style=\"margin: 0; font-size: 18px; font-weight: 700; line-height: 1.3; color: #f8f9f0 !important;\">The Three Zones of Defensible Space</h3><p style=\"margin: 5px 0 0; font-size: 13px; color: #dde2d8 !important;\">CAL FIRE's framework for protecting your home</p></div><div style=\"background-color: #f8f9f0 !important; padding: 16px 22px 18px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; min-width: 650px; border-collapse: collapse;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Zone</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Distance</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Goal</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12px; letter-spacing: 0.5px;\">Key Actions</th></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Zone 0: Ember-resistant</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">0 to 5 feet</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Nothing an ember can ignite</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Gravel, stone, or concrete. No wood mulch, dead plants, firewood, or wooden trellises against the house</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Zone 1: Lean, clean, and green</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">5 to 30 feet</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Reduce fire intensity and flame length</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #eceee3 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Space shrubs at twice their height, limb trees up 6 to 10 feet, mow grass to 4 inches, choose fire-resistant plants</td></tr><tr><td style=\"font-weight: 600; padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Zone 2: Reduced fuel</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">30 to 100 feet</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Interrupt fire's path</td><td style=\"padding: 8px 10px; font-size: 13px; line-height: 1.45; color: #1a3b2a !important; background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8; vertical-align: top;\">Remove dead wood and ladder fuels, keep tree canopies from touching, create islands of vegetation</td></tr></table></div><p style=\"margin: 10px 0 0; padding: 8px 12px; background-color: #eceee3 !important; border-left: 3px solid #c9a84c; font-size: 12.5px; line-height: 1.5; color: #1a3b2a !important;\">Embers traveling ahead of the main fire are the primary cause of home ignition, not direct flame contact. Zone 0 is the most critical.</p></div><div style=\"background-color: #1a3b2a !important; padding: 7px 22px;\"><p style=\"margin: 0; font-size: 11px; letter-spacing: 1px; color: #dde2d8 !important;\">ambitiousharvest.com</p></div></div>";
