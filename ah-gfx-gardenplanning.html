v>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.9;\">\n                        <li>Indeterminate tomatoes</li>\n                        <li>Small melons (support fruit)</li>\n                        <li>Winter squash (sling heavy fruit)</li>\n                        <li>Nasturtiums (edible flowers)</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 16px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Wall/Pocket Planters</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.9;\">\n                        <li>Herbs (basil, cilantro, thyme)</li>\n                        <li>Strawberries (trailing)</li>\n                        <li>Lettuce and greens</li>\n                        <li>Succulents (ornamental)</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["keyhole-garden-anatomy"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Anatomy of a Keyhole Garden</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">How compost and garden work together in one bed</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 14px; border-bottom: 2px solid #dde2d8; padding-bottom: 10px;\">Dimensions</h3>\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                    <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 4px;\">Diameter</div>\n                        <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">6 ft</div>\n                    </div>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 4px;\">Height</div>\n                        <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">3 ft</div>\n                    </div>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 4px;\">Basket Width</div>\n                        <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">12 in</div>\n                    </div>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 4px;\">Notch Width</div>\n                        <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">2 ft</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 14px; border-bottom: 2px solid #dde2d8; padding-bottom: 10px;\">How It Works</h3>\n                <ol style=\"padding: 0 0 0 18px; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.9;\">\n                    <li>Add kitchen scraps to center basket</li>\n                    <li>Water flows through basket into bed</li>\n                    <li>Nutrients distribute outward as compost breaks down</li>\n                    <li>Plants closest to center get richest soil</li>\n                    <li>Notch walkway gives access to basket</li>\n                </ol>\n                <div style=\"margin-top: 14px; padding: 10px; background-color: #dde2d8 !important; font-size: 0.8rem; color: #1a3b2a !important;\">\n                    <strong>Plant heavy feeders</strong> (tomatoes, squash) near the basket, and light feeders (herbs, greens) toward the edges.\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["keyhole-garden-layer-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Building Your Keyhole Bed: Layers from Bottom Up</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Each layer serves a purpose for drainage, nutrition, and water retention</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"max-width: 500px; margin: 0 auto;\">\n            <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Layer 5: Planting Mix</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Compost + topsoil blend</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">4-6 in</div>\n            </div>\n            <div style=\"background-color: #2d5a3f !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Layer 4: Green Material</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Fresh grass, kitchen scraps, green leaves</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">4 in</div>\n            </div>\n            <div style=\"background-color: #4a7a5a !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Layer 3: Brown Material</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Dry leaves, straw, shredded cardboard</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">4 in</div>\n            </div>\n            <div style=\"background-color: #6a9a7a !important; color: #1a3b2a !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong>Layer 2: Rough Organic Matter</strong><br><span style=\"font-size: 0.8rem;\">Small branches, corn stalks, woody prunings</span></div>\n                <div style=\"font-size: 0.8rem; opacity: 0.8;\">6 in</div>\n            </div>\n            <div style=\"background-color: #8c9c8c !important; color: #1a3b2a !important; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong>Layer 1: Drainage Base</strong><br><span style=\"font-size: 0.8rem;\">Rocks, broken pots, gravel</span></div>\n                <div style=\"font-size: 0.8rem; opacity: 0.8;\">4 in</div>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">Alternate green and brown layers like lasagna gardening. Water each layer as you build.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["lasagna-garden-layers"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Lasagna Garden Layers</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Sheet composting: build a bed without tilling</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"max-width: 500px; margin: 0 auto;\">\n            <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Top: Compost/Soil Mix</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Ready to plant into immediately</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">3-4 in</div>\n            </div>\n            <div style=\"background-color: #2d5a3f !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Green Layer</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Grass clippings, food scraps, fresh leaves</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">2-3 in</div>\n            </div>\n            <div style=\"background-color: #6a5a3a !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Brown Layer</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Dry leaves, straw, shredded paper</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">4-6 in</div>\n            </div>\n            <div style=\"background-color: #2d5a3f !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Green Layer</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Repeat: more nitrogen-rich materials</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">2-3 in</div>\n            </div>\n            <div style=\"background-color: #6a5a3a !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Brown Layer</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Repeat: more carbon-rich materials</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">4-6 in</div>\n            </div>\n            <div style=\"background-color: #8c9c8c !important; color: #1a3b2a !important; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong>Base: Cardboard/Newspaper</strong><br><span style=\"font-size: 0.8rem;\">Overlapping sheets, wetted down (smothers grass/weeds)</span></div>\n                <div style=\"font-size: 0.8rem; opacity: 0.8;\">Flat</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 16px; padding: 12px 16px; background-color: #dde2d8 !important; text-align: center;\">\n            <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0;\"><strong>Total height:</strong> 18-24 inches (settles to 6-8 inches as materials decompose)</p>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["when-to-build-a-lasagna-garden"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Best Timing for Lasagna Gardens in Santa Cruz</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Build ahead of planting season for best decomposition</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px;\">\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 10px;\">Build in Fall (Oct-Nov)</h3>\n                <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px; line-height: 1.6;\">Best option. Winter rains break down layers. Ready for spring planting in March.</p>\n                <div style=\"background-color: #dde2d8 !important; padding: 8px 12px; font-size: 0.8rem; color: #1a3b2a !important;\">Decomposition time: 4-5 months</div>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #8c9c8c; padding: 18px;\">\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 10px;\">Build in Late Winter (Feb)</h3>\n                <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px; line-height: 1.6;\">Good option. Top with 4 inches of compost/soil and plant into top layer immediately.</p>\n                <div style=\"background-color: #dde2d8 !important; padding: 8px 12px; font-size: 0.8rem; color: #1a3b2a !important;\">Plant right away in top layer</div>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #e67e22; padding: 18px;\">\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 10px;\">Build in Summer</h3>\n                <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px; line-height: 1.6;\">Slowest decomposition (dry heat). Requires watering layers. Better to wait for fall.</p>\n                <div style=\"background-color: #dde2d8 !important; padding: 8px 12px; font-size: 0.8rem; color: #1a3b2a !important;\">Not recommended in Santa Cruz</div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["back-to-eden-what-works-in-santa-cruz-and-what-doesn-t"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Back to Eden in Santa Cruz: Honest Assessment</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Where this method excels and where it needs adaptation</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Works Well For</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10003; Fruit trees and perennial beds</li>\n                        <li>&#10003; Established transplants</li>\n                        <li>&#10003; Weed suppression (excellent)</li>\n                        <li>&#10003; Water retention in dry summers</li>\n                        <li>&#10003; Building long-term soil health</li>\n                        <li>&#10003; Inland valley gardens with warm soil</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #c0392b; overflow: hidden;\">\n                <div style=\"background-color: #c0392b !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #fff !important;\">Struggles With</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10005; Direct seeding (seeds can't push through chips)</li>\n                        <li>&#10005; Cool coastal soil (chips keep soil too cold)</li>\n                        <li>&#10005; First-year nitrogen tie-up</li>\n                        <li>&#10005; Gophers (love tunneling under mulch)</li>\n                        <li>&#10005; Slugs and snails (thrive in moist mulch)</li>\n                        <li>&#10005; Root crops like carrots and beets</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 16px; padding: 12px 16px; background-color: #dde2d8 !important;\">\n            <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0; line-height: 1.6;\"><strong>Santa Cruz adaptation:</strong> Use aged (not fresh) wood chips, pull mulch back from planting holes, and add nitrogen-rich compost underneath when transplanting. Skip this method for foggy coastal plots where soil warmth is already a challenge.</p>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["wood-chip-mulch-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Wood Chip Mulch Quick Reference</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Getting the right chips and using them correctly</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 450px;\">\n            <thead>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Detail</th>\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Recommendation</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Depth</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">4-6 inches (top up annually to maintain)</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Best chips</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Arborist chips (mixed species, leaves, bark, wood)</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Avoid</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Dyed chips, pure bark, walnut (allelopathic)</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Free source</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">ChipDrop.com or local tree services in Santa Cruz</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Age before use</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">3-6 months minimum (reduces nitrogen tie-up)</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important;\">Keep away from</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important;\">Plant stems (2-3 inch gap to prevent rot)</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com | Source: UC ANR Publication 8525</div>\n</div>";

window.AH_GRAPHICS["what-to-track-in-your-garden-journal"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Garden Journal: What to Track</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Start simple. Add detail as you go.</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 16px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Essential (Start Here)</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10003; What you planted and when</li>\n                        <li>&#10003; Variety names</li>\n                        <li>&#10003; First harvest date</li>\n                        <li>&#10003; What worked and what didn't</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #8c9c8c !important; padding: 12px 16px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Intermediate</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10003; Weather notes (fog, frost, heat)</li>\n                        <li>&#10003; Pest and disease observations</li>\n                        <li>&#10003; Soil amendments added</li>\n                        <li>&#10003; Watering schedule changes</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #dde2d8 !important; padding: 12px 16px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #1a3b2a !important;\">Advanced</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10003; Yield measurements</li>\n                        <li>&#10003; Seed source and germination rates</li>\n                        <li>&#10003; Bed rotation maps</li>\n                        <li>&#10003; Cost tracking per crop</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["monthly-garden-journal-prompts-for-santa-cruz"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Monthly Journal Prompts for Santa Cruz Gardeners</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Answer these each month and your journal writes itself</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 450px;\">\n            <thead>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Month</th>\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Key Journal Prompts</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Jan-Feb</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">What seeds did I start indoors? How many frost nights? What survived winter?</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Mar-Apr</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">When did I transplant? Last frost date this year? What's sprouting?</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">May-Jun</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">First harvests? Any pest problems? How foggy was this spring?</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Jul-Aug</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Peak harvest amounts? Watering frequency? Heat stress on any plants?</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Sep-Oct</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Fall planting dates? What varieties to grow again? Seed saving notes?</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important;\">Nov-Dec</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important;\">Year-end review: top 3 wins, top 3 lessons, changes for next year?</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";


window.AH_GRAPHICS["back-to-eden-gardening-a-no-till-wood-chip-mulch-method-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Back to Eden in Santa Cruz: Honest Assessment</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Where this method excels and where it needs adaptation</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Works Well For</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10003; Fruit trees and perennial beds</li>\n                        <li>&#10003; Established transplants</li>\n                        <li>&#10003; Weed suppression (excellent)</li>\n                        <li>&#10003; Water retention in dry summers</li>\n                        <li>&#10003; Building long-term soil health</li>\n                        <li>&#10003; Inland valley gardens with warm soil</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #c0392b; overflow: hidden;\">\n                <div style=\"background-color: #c0392b !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #fff !important;\">Struggles With</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10005; Direct seeding (seeds can't push through chips)</li>\n                        <li>&#10005; Cool coastal soil (chips keep soil too cold)</li>\n                        <li>&#10005; First-year nitrogen tie-up</li>\n                        <li>&#10005; Gophers (love tunneling under mulch)</li>\n                        <li>&#10005; Slugs and snails (thrive in moist mulch)</li>\n                        <li>&#10005; Root crops like carrots and beets</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 16px; padding: 12px 16px; background-color: #dde2d8 !important;\">\n            <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0; line-height: 1.6;\"><strong>Santa Cruz adaptation:</strong> Use aged (not fresh) wood chips, pull mulch back from planting holes, and add nitrogen-rich compost underneath when transplanting. Skip this method for foggy coastal plots where soil warmth is already a challenge.</p>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["back-to-eden-gardening-a-no-till-wood-chip-mulch-method-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Wood Chip Mulch Quick Reference</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Getting the right chips and using them correctly</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 450px;\">\n            <thead>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Detail</th>\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Recommendation</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Depth</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">4-6 inches (top up annually to maintain)</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Best chips</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Arborist chips (mixed species, leaves, bark, wood)</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Avoid</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Dyed chips, pure bark, walnut (allelopathic)</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Free source</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">ChipDrop.com or local tree services in Santa Cruz</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Age before use</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">3-6 months minimum (reduces nitrogen tie-up)</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important;\">Keep away from</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important;\">Plant stems (2-3 inch gap to prevent rot)</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com | Source: UC ANR Publication 8525</div>\n</div>";
window.AH_GRAPHICS["container-gardening-growing-vegetables-herbs-and-flowers-in-pots-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Garden Methods at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Find the right approach for your Santa Cruz garden</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 600px;\">\n            <thead>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Method</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Space Needed</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Startup Cost</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Water Use</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Maintenance</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Best For</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8 v style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 4px;\">Basket Width</div>\n                        <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">12 in</div>\n                    </div>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 4px;\">Notch Width</div>\n                        <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">2 ft</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 14px; border-bottom: 2px solid #dde2d8; padding-bottom: 10px;\">How It Works</h3>\n                <ol style=\"padding: 0 0 0 18px; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.9;\">\n                    <li>Add kitchen scraps to center basket</li>\n                    <li>Water flows through basket into bed</li>\n                    <li>Nutrients distribute outward as compost breaks down</li>\n                    <li>Plants closest to center get richest soil</li>\n                    <li>Notch walkway gives access to basket</li>\n                </ol>\n                <div style=\"margin-top: 14px; padding: 10px; background-color: #dde2d8 !important; font-size: 0.8rem; color: #1a3b2a !important;\">\n                    <strong>Plant heavy feeders</strong> (tomatoes, squash) near the basket, and light feeders (herbs, greens) toward the edges.\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["keyhole-gardening-combining-composting-and-gardening-in-one-bed-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Building Your Keyhole Bed: Layers from Bottom Up</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Each layer serves a purpose for drainage, nutrition, and water retention</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"max-width: 500px; margin: 0 auto;\">\n            <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Layer 5: Planting Mix</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Compost + topsoil blend</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">4-6 in</div>\n            </div>\n            <div style=\"background-color: #2d5a3f !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Layer 4: Green Material</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Fresh grass, kitchen scraps, green leaves</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">4 in</div>\n            </div>\n            <div style=\"background-color: #4a7a5a !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Layer 3: Brown Material</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Dry leaves, straw, shredded cardboard</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">4 in</div>\n            </div>\n            <div style=\"background-color: #6a9a7a !important; color: #1a3b2a !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong>Layer 2: Rough Organic Matter</strong><br><span style=\"font-size: 0.8rem;\">Small branches, corn stalks, woody prunings</span></div>\n                <div style=\"font-size: 0.8rem; opacity: 0.8;\">6 in</div>\n            </div>\n            <div style=\"background-color: #8c9c8c !important; color: #1a3b2a !important; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong>Layer 1: Drainage Base</strong><br><span style=\"font-size: 0.8rem;\">Rocks, broken pots, gravel</span></div>\n                <div style=\"font-size: 0.8rem; opacity: 0.8;\">4 in</div>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">Alternate green and brown layers like lasagna gardening. Water each layer as you build.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["lasagna-gardening-layering-your-way-to-a-fertile-garden-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Lasagna Garden Layers</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Sheet composting: build a bed without tilling</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"max-width: 500px; margin: 0 auto;\">\n            <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Top: Compost/Soil Mix</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Ready to plant into immediately</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">3-4 in</div>\n            </div>\n            <div style=\"background-color: #2d5a3f !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Green Layer</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Grass clippings, food scraps, fresh leaves</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">2-3 in</div>\n            </div>\n            <div style=\"background-color: #6a5a3a !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Brown Layer</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Dry leaves, straw, shredded paper</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">4-6 in</div>\n            </div>\n            <div style=\"background-color: #2d5a3f !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Green Layer</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Repeat: more nitrogen-rich materials</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">2-3 in</div>\n            </div>\n            <div style=\"background-color: #6a5a3a !important; color: #f8f9f0 !important; padding: 14px 18px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong style=\"color: #f8f9f0 !important;\">Brown Layer</strong><br><span style=\"font-size: 0.8rem; opacity: 0.9;\">Repeat: more carbon-rich materials</span></div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; opacity: 0.8;\">4-6 in</div>\n            </div>\n            <div style=\"background-color: #8c9c8c !important; color: #1a3b2a !important; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;\">\n                <div><strong>Base: Cardboard/Newspaper</strong><br><span style=\"font-size: 0.8rem;\">Overlapping sheets, wetted down (smothers grass/weeds)</span></div>\n                <div style=\"font-size: 0.8rem; opacity: 0.8;\">Flat</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 16px; padding: 12px 16px; background-color: #dde2d8 !important; text-align: center;\">\n            <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0;\"><strong>Total window.AH_GRAPHICS["lasagna-gardening-layering-your-way-to-a-fertile-garden-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Best Timing for Lasagna Gardens in Santa Cruz</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Build ahead of planting season for best decomposition</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px;\">\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 10px;\">Build in Fall (Oct-Nov)</h3>\n                <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px; line-height: 1.6;\">Best option. Winter rains break down layers. Ready for spring planting in March.</p>\n                <div style=\"background-color: #dde2d8 !important; padding: 8px 12px; font-size: 0.8rem; color: #1a3b2a !important;\">Decomposition time: 4-5 months</div>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #8c9c8c; padding: 18px;\">\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 10px;\">Build in Late Winter (Feb)</h3>\n                <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px; line-height: 1.6;\">Good option. Top with 4 inches of compost/soil and plant into top layer immediately.</p>\n                <div style=\"background-color: #dde2d8 !important; padding: 8px 12px; font-size: 0.8rem; color: #1a3b2a !important;\">Plant right away in top layer</div>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #e67e22; padding: 18px;\">\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 10px;\">Build in Summer</h3>\n                <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px; line-height: 1.6;\">Slowest decomposition (dry heat). Requires watering layers. Better to wait for fall.</p>\n                <div style=\"background-color: #dde2d8 !important; padding: 8px 12px; font-size: 0.8rem; color: #1a3b2a !important;\">Not recommended in Santa Cruz</div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["california-garden-soil-amendments-guide-g1"] = "<div class=\"ah-table-wrap\" role=\"region\" aria-label=\"Soil types and priority amendments\" tabindex=\"0\">\n    <table class=\"ah-table\">\n      <caption class=\"sr-only\">Common soil problems and priority amendments by soil type</caption>\n      <thead>\n        <tr>\n          <th scope=\"col\">Your Soil Type</th>\n          <th scope=\"col\">Common Problems</th>\n          <th scope=\"col\">Priority Amendments</th>\n        </tr>\n      </thead>\n      <tbody>\n        <tr>\n          <th scope=\"row\">Coastal sandy</th>\n          <td>Drains too fast, low fertility, poor water retention</td>\n          <td>Compost, aged manure, coco coir</td>\n        </tr>\n        <tr>\n          <th scope=\"row\">Redwood clay</th>\n          <td>Poor drainage, acidic pH, compacted</td>\n          <td>Compost, lime (if pH below 6.0), gypsum</td>\n        </tr>\n        <tr>\n          <th scope=\"row\">Inland mixed</th>\n          <td>Variable drainage, moderate fertility</td>\n          <td>Compost, targeted nutrients based on soil test</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>";

window.AH_GRAPHICS["deep-watering-vs-frequent-light-watering-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Deep Watering vs. Frequent Light Watering: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Deep Watering</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Frequent Light Watering</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Root Development</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Encourages deep, strong root systems</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Keeps roots shallow and surface-dependent</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Drought Tolerance</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">High; plants can access deeper moisture reserves</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Low; plants wilt quickly if you miss a day</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Water Use</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Less total water; 2-3 times per week</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">More total water lost to evaporation; daily</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Disease Risk</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Lower; soil surface dries between waterings</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Higher; constant surface moisture invites fungal issues</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Best For</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Tomatoes, fruit trees, perennials, established plants</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Seeds, new transplants, containers, shallow-rooted herbs</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["drip-irrigation-setup-101-a-beginners-guide-to-efficient-watering-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Emitter Spacing and Soil Type\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Soil type</th>\n        <th scope=\"col\">Recommended emitter spacing</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Sandy (drains quickly)</th>\n        <td>6\u20139 inches between emitters</td>\n        <td>\n          Water spreads less sideways; closer spacing provides\n          more even moisture coverage\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Loam</th>\n        <td>9\u201312 inches between emitters</td>\n        <td>\n          Good all-purpose spacing for most vegetable beds\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Clay (holds water)</th>\n        <td>12 inches or more</td>\n        <td>\n          Water spreads farther; wider spacing helps\n          avoid over-saturation\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["drip-irrigation-setup-101-a-beginners-guide-to-efficient-watering-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Seasonal Run-Time Starting Points\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Season</th>\n        <th scope=\"col\">Coastal beds (foggy)</th>\n        <th scope=\"col\">Sunny mountains</th>\n        <th scope=\"col\">Watsonville / sandy soils</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Spring</th>\n        <td>Every 2\u20133 days, 20\u201330 min</td>\n        <td>Every 2 days, 25\u201335 min</td>\n        <td>Every 1\u20132 days, 20\u201330 min</td>\n        <td>\n          Adjust based on soil checks;\n          new transplants need more frequent watering\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Summer</th>\n        <td>Every other day, 25\u201335 min</td>\n        <td>Daily, 35\u201345 min</td>\n        <td>Daily or twice daily, split 15\u201320 min cycles</td>\n        <td>\n          Hot, dry weather and wind increase demand;\n          coastal fog can significantly reduce it\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Fall</th>\n        <td>Every 2\u20133 days, then weekly</td>\n        <td>Every 2\u20133 days with shorter runs</td>\n        <td>Every 2\u20133 days</td>\n        <td>\n          Gradually reduce run times and frequency\n          as seasonal rains return\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["drip-irrigation-vs-soaker-hoses-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Drip Irrigation vs. Soaker Hoses: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Drip Irrigation</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Soaker Hoses</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Water Efficiency</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">90-95% efficiency; targets individual plants</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">70-80% efficiency; seeps along full length</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Upfront Cost</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important ortant;\">Flush lines seasonally; check emitters</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Replace every 1-3 seasons; uneven flow over time</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";
