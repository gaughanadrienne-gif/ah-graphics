d8; color: #1a3b2a !important;\">$15 to $30</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Pressure Tolerance</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Low pressure only (8 to 15 PSI)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Handles 15 to 50 PSI with pressure compensation</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Flexibility</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Flat, easy to lay in rows</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Round, holds shape around curves</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Clogging Risk</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Higher (thinner walls, smaller emitters)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Lower (built-in, self-flushing emitters)</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Best For</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Large annual vegetable rows, seasonal crops</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Raised beds, perennials, permanent plantings</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["from-soil-health-to-water-conservation-sustainable-land-management-tips-for-every-gardener-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Soil-Health Practices and Benefits\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Practice</th>\n        <th scope=\"col\">What you do</th>\n        <th scope=\"col\">Soil benefit</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Add compost</th>\n        <td>Incorporate 1\u20132 inches yearly into beds</td>\n        <td>\n          Improves soil structure, feeds microbes,\n          and boosts nutrient and water-holding capacity\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Keep soil covered</th>\n        <td>Mulch 2\u20134 inches or plant groundcovers</td>\n        <td>\n          Reduces erosion, evaporation, and compaction;\n          moderates soil temperature\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Minimize chemicals</th>\n        <td>Avoid harsh synthetic fertilizers and pesticides</td>\n        <td>\n          Protects soil life, beneficial insects,\n          and long-term ecosystem function\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["from-soil-health-to-water-conservation-sustainable-land-management-tips-for-every-gardener-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Water-Wise Strategies at a Glance\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Strategy</th>\n        <th scope=\"col\">Example</th>\n        <th scope=\"col\">Main benefit</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Mulch beds</th>\n        <td>2\u20134 inches of bark, leaves, or compost</td>\n        <td>Cuts evaporation and reduces watering frequency</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Drip irrigation</th>\n        <td>Drip lines or soaker hoses in vegetable and native beds</td>\n        <td>Delivers water directly to roots, reducing waste</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Plant selection</th>\n        <td>California natives like ceanothus, toyon, and yarrow</td>\n        <td>Thrive on less water while supporting pollinators</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Rain capture</th>\n        <td>Rain barrels connected to downspouts</td>\n        <td>Provides supplemental, chlorine-free irrigation water</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["gopher-baskets-vs-raised-beds-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Gopher Baskets vs. Raised Beds: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Gopher Baskets</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Raised Beds (with hardware cloth)</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Protection Area</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Individual plant root zones only</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Entire bed from below</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Best For</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Fruit trees, shrubs, perennials</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Vegetables, annual flowers, herbs</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Cost</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$5 to $15 per basket (DIY from hardware cloth)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$50 to $200+ per bed (lumber, hardware cloth, soil)</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Installation Effort</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Moderate (dig, place basket, plant)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">High initial build, then low maintenance</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Lifespan</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">5 to 10 years (galvanized); roots may outgrow</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">10+ years for hardware cloth; bed frame varies</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["growing-under-the-redwoods-gardening-in-shade-and-acidic-soil-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Sun Exposure Categories and Crop Fit\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Sun category</th>\n        <th scope=\"col\">Hours of direct sun</th>\n        <th scope=\"col\">Good crops</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Full sun</th>\n        <td>6 to 8+ hours</td>\n        <td>Tomatoes, peppers, squash (only in clearings).</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Part sun</th>\n        <td>4 to 6 hours</td>\n        <td>Brassicas, peas, bush beans, carrots, beets, strawberries.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Part shade</th>\n        <td>2 to 4 hours</td>\n        <td>Lettuce, arugula, spinach, chard, Asian greens, parsley, cilantro.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Full shade</th>\n        <td>0 to 2 hours</td>\n        <td>Very limited; maybe m\u00e2che, miner\u2019s lettuce, and a few shade-tolerant herbs.</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["growing-under-the-redwoods-gardening-in-shade-and-acidic-soil-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    pH and Crop Reference\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Soil pH</th>\n        <th scope=\"col\">Typical redwood-area value</th>\n        <th scope=\"col\">Best crops</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">4.5 to 5.5</th>\n        <td>Too acidic for most vegetables</td>\n        <td>Ideal for blueberries and huckleberries</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">5.5 to 6.5</th>\n        <td>Common under redwoods</td>\n        <td>Tolerant greens and herbs; many vegetables benefit from light liming</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">6.0 to 7.0</th>\n        <td>Target range for vegetables</td>\n        <td>Most vegetables, especially in raised beds or amended soil</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["growing-under-the-redwoods-gardening-in-shade-and-acidic-soil-g3"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Crop Suitability: Deep Redwoods vs. Small Clearings\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Crop group</th>\n        <th scope=\"col\">Under deep redwoods</th>\n        <th scope=\"col\">In a 4 to 6-hour clearing</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Lettuce and salad greens</th>\n        <td>Excellent; summer \u201csuperpower.\u201d</td>\n        <td>Excellent.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Shade-tolerant herbs</th>\n        <td>Excellent (parsley, cilantro, mint, lemon balm).</td>\n        <td>Excellent.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Brassicas, peas, root crops</th>\n        <td>Usually too little light.</td>\n        <td>Good with 4 to 6 hours of sun.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Tomatoes, peppers, melons, corn</th>\n        <td>Not worth trying.</td>\n        <td>Possible only with 6 to 8 hours and careful variety choice.</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["hot-composting-vs-cold-composting-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Hot Composting vs. Cold Composting: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Hot Composting</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Cold Composting</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Time to Finish</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">4-8 weeks</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">6-12 months</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Effort Level</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">High; turn every 2-3 days, monitor temp</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Very low; add material and wait</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Kills Weed Seeds</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Yes (if temp reaches 130-150F)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">No; weed seeds may survive</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Batch Size Needed</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Minimum 3x3x3 feet at once</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Any amount; add as you go</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Odor</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Minimal when done correctly</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Possible if too wet or unbalanced</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Best For</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Large gardens, serious composters</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Busy gardeners, small to mid-size yards</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["innovative-composting-techniques-for-urban-gardeners-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    How Compost Helps Typical Santa Cruz Soils\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Soil type</th>\n        <th scope=\"col\">Common problem</th>\n        <th scope=\"col\">How compost helps</th>\n        <th scope=\"col\">Example areas</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Coastal sandy</th>\n        <td>Drains too fast and doesn\u2019t hold nutrients</td>\n        <td>Increases water retention and adds organic matter</td>\n        <td>Aptos, Capitola, Live Oak</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Redwood clay / acidic</th>\n        <td>Poor drainage, low pH, compacted soil</td>\n        <td>Improves structure, buffers acidity, adds air pockets</td>\n        <td>Felton, Ben Lomond canyons, Bonny Doon</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Inland mixed</th>\n        <td>Variable drainage and moderate fertility</td>\n        <td>Balances moisture and boosts nutrient availability</td>\n        <td>Scotts Valley, Soquel, Watsonville</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["innovative-composting-techniques-for-urban-gardeners-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Composting Support by Jurisdiction</div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Area</th>\n        <th scope=\"col\">Program / benefit</th>\n        <th scope=\"col\">Key details</th>\n        <th scope=\"col\">More info</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Unincorporated County</th>\n        <td>Free or reduced-cost bins</td>\n        <td>Complete an approved workshop to qualify for a free bin</td>\n        <td>\n          <a href=\"https://cdi.santacruzcountyca.gov/PublicWorks/RecyclingSolidWaste/Composting/Resources/FreeandReducedCostBins.aspx\" target=\"_blank\" rel=\"noopener\">\n            County bin program\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">City of Santa Cruz</th>\n        <td>$40 rebate on bins</td>\n        <td>Purchase a city-approved compost or worm bin</td>\n        <td>\n          <a href=\"https://www.santacruzca.gov/government/city-departments/public-works/resource-recovery\" target=\"_blank\" rel=\"noopener\">\n            City rebate program\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">All areas</th>\n        <td>Curbside organics</td>\n        <td>Food scraps and yard waste in the green cart</td>\n        <td>\n          <a href=\"https://www.greenwaste.com/service-areas/santa-cruz-county/\" target=\"_blank\" rel=\"noopener\">\n            GreenWaste Recovery\n          </a>\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">All areas</th>\n        <td>Workshops</td>\n        <td>Free composting classes throughout the year</td>\n        <td>\n          <a href=\"https://cdi.santacruzcountyca.gov/PublicWorks/RecyclingSolidWaste/Composting/WorkshopsandClasses.aspx\" target=\"_blank\" rel=\"noopener\">\n            County workshops\n          </a>\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["innovative-composting-techniques-for-urban-gardeners-g3"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Common Compost Problems and Fixes</div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Problem</th>\n        <th scope=\"col\">Likely cause</th>\n        <th scope=\"col\">What to do</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Bad smell (rotten or ammonia)</th>\n        <td>Too many greens, not enough air, or waterlogged pile</td>\n        <td>\n          Add dry browns (shredded cardboard works fast), turn the pile to introduce air,\n          and improve drainage or cover during rain.\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Pile not breaking down</th>\n        <td>Too dry, too many browns, or materials are too large</td>\n        <td>\n          Add water until the pile feels like a wrung-out sponge, mix in fresh greens,\n          and chop or shred large pieces.\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Pests (rats, raccoons, flies)</th>\n        <td>Food scraps exposed or easily accessible</td>\n        <td>\n          Bury scraps under several inches of browns, avoid meat and dairy,\n          and use a rodent-resistant bin if needed.\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Fruit flies</th>\n        <td>Exposed fruit scraps near the surface</td>\n        <td>\n          Bury fruit scraps deeply, keep a dry brown layer on top,\n          and avoid leaving fresh scraps uncovered.\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Too wet (slimy or matted)</th>\n        <td>Excess rain or too many greens</td>\n        <td>\n          Add dry browns, turn to fluff and aerate,\n          and cover the pile during heavy rain.\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["innovative-composting-techniques-for-urban-gardeners-g4"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Approximate Composting Times in Santa Cruz County</div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Method</th>\n        <th scope=\"col\">Time to finished compost</th>\n        <th scope=\"col\">Best for</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Hot pile (turned frequently)</th>\n        <td>2\u20133 months</td>\n        <td>Gardeners with space and time to manage compost actively</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Passive pile (occasional turning)</th>\n        <td>6\u201312 months</td>\n        <td>Low-maintenance approach for patient gardeners</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Tumbler</th>\n        <td>4\u20138 weeks</td>\n        <td>Faster results, better pest control, limited space</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Worm bin (vermicomposting)</th>\n        <td>3\u20134 months</td>\n        <td>Apartment dwellers or households composting kitchen scraps only</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["metal-raised-beds-vs-wood-raised-beds-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Metal Raised Beds vs. Wood Raised Beds: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Metal Raised Beds</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Wood Raised Beds</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Lifespan</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">20-30+ years</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">10-20 years (depending on wood type)</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Upfront Cost (4x8)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$150-400</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$60-200 (cedar or redwood)</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Maintenance</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">None; no rotting, no repainting</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Occasional board replacement as wood decays</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Soil Temperature</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Warms soil faster in spring; can overheat in summer</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Insulates soil; more stable temperatures</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Assembly</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Quick; most snap or bolt together</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Moderate; requires cutting and screwing</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Appearance</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Modern, clean lines; weathers to matte gray</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Traditional, warm; weathers to silver gray</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["mulch-and-soil-health-the-hidden-irrigation-system-in-your-santa-cruz-county-garden-g1"] = "<div class=\"ah-table-wrap\">\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Bed condition</th>\n        <th scope=\"col\">Surface cover</th>\n        <th scope=\"col\">Approx. evaporation vs. bare soil</th>\n        <th scope=\"col\">Typical summer watering (100 sq ft veggie bed)</th>\n        <th scope=\"col\">Soil-moisture stability</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Bare, low-organic-matter soil</th>\n        <td>None or &lt;0.5\" mulch</td>\n        <td>100% (baseline)</td>\n        <td>2 to 3 times per week</td>\n        <td>Low  to  dries quickly after each watering</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Mulched, average soil</th>\n        <td>2 to 3\" organic mulch</td>\n        <td>~70 to 75% of baseline (\u224825 to 30% less evaporation)</td>\n        <td>1 to 2 times per week (same plants, same weather)</td>\n        <td>Medium  to  moisture drops more slowly, fewer swings</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Mulched + high-organic-matter \u201csponge\u201d soil</th>\n        <td>2 to 3\" mulch + improved soil structure and OM</td>\n        <td>Even lower effective loss (less evaporation + more water held in root zone)</td>\n        <td>\n          Often 1 to 2 times per week with slightly shorter or less frequent runs,\n          especially for deep-rooted crops\n        </td>\n        <td>High  to  moisture changes gradually; plants tolerate longer gaps</td>\n      </tr>\n    </tbody>\n    <caption>\n      *Watering frequency assumes similar crops, weather, and bed size; soil structure and organic matter strongly influence results.\n    </caption>\n  </table>\n</div>";

window.AH_GRAPHICS["mulch-vs-ground-cover-plants-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Mulch vs. Ground Cover Plants: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Mulch</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Ground Cover Plants</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Weed Suppression</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Good (60-80%); degrades over time</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Excellent (80-95%) once established</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Time to Effectiveness</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Immediate</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">3-12 months to fill in</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Maintenance</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Replenish 1-2 times per year</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Minimal once established; occasional edging</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Cost Over 5 Years</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Higher; ongoing purchases or deliveries</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Lower; one-time plant investment</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Best For</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Vegetable beds, annual plantings, paths</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Permanent landscapes, slopes, under trees</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["no-till-vs-traditional-tilling-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">No-Till vs. Traditional Tilling: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">No-Till</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Traditional Tilling</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Soil Structure</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Builds and preserves natural structure</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Destroys aggregates; causes compaction over time</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Weed Pressure</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Decreases over time with mulching</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Brings buried weed seeds to surface</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Effort Level</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Less physical work; more planning</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Heavy physical work each season</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Soil Biology</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Supports fungi, worms, microbes</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Disrupts fungal networks and worm habitat</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Time to Results</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Improves gradually over 1-3 years</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Immediate loose soil, but short-lived</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Santa Cruz Fit</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Excellent for clay soil improvement</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Only useful for initial bed creation</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["organic-fertilizer-vs-synthetic-fertilizer-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Organic Fertilizer vs. Synthetic Fertilizer: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Organic Fertilizer</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Synthetic Fertilizer</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Speed of Results</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Slow release over weeks to months</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Fast, visible results within days</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Soil Health</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Builds soil structure and biology</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">No benefit; can harm soil life over time</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Burn Risk</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Very low (gentle nutrient release)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">High if over-applied</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Cost per Application</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Higher upfront ($10 to $25 per bag)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Lower upfront ($5 to $15 per bag)</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Environmental Impact</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Low runoff risk, supports ecosystems</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Can leach into waterways, harms aquatic life</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Santa Cruz Fit</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Ideal for our clay soil and watershed</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Runoff risk near creeks and Monterey Bay</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["raised-beds-vs-in-ground-santa-cruz-clay-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Raised Beds vs. In-Ground: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Raised Beds</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">In-Ground</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Startup Cost</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$100-300+ per 4x8 bed (lumber + soil)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$20-50 (amendments + compost)</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Drainage</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Excellent; elevated above clay</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Poor in clay until amended over years</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Soil Warming</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">2-3 weeks earlier in spring</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Slower to warm, retains moisture longer</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Water Retention</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Dries out faster; needs more irrigation</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Clay holds moisture well</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Long-Term Productivity</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">High from day one; soil needs annual replenishing</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Improves over years; eventually very productive</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Ergonomics</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Easier on backs and knees</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">More bending and kneeling</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["red-worms-vs-nightcrawlers-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Red Worms vs. Nightcrawlers: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Red Worms (Eisenia fetida)</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Nightcrawlers (Lumbricus terrestris)</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Primary Role</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Composting kitchen scraps</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Aerating and tunneling in garden soil</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Habitat</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Surface-dwelling; top few inches</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Deep burrowing; up to 6 feet down</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Temperature Range</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">55-77F ideal; die above 90F</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">50-65F ideal; retreat deep in heat</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Food Processing</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Half their weight daily in scraps</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Pulls surface debris into burrows</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Best For</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Worm bins, vermicompost production</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Improving clay soil structure, drainage</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["soaker-hoses-vs-sprinklers-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Soaker Hoses vs. Sprinklers: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Soaker Hoses</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Sprinklers</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Water Efficiency</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">80% to 90% (water goes to soil)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">50% to 70% (lost to evaporation and wind)</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Disease Risk</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Low (foliage stays dry)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Higher (wet leaves invite mildew, blight)</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Cost</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$10 to $25 for a 50 ft hose</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$10 to $40 per sprinkler head</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Coverage Area</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Narrow strip along the hose (12 to 18 inches wide)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Wide circular area (10 to 30 ft radius)</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Uniformity</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Uneven over long runs (more water near faucet)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Fairly even within the spray pattern</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["square-foot-gardening-vs-row-gardening-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Square Foot Gardening vs. Row Gardening: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Square Foot Gardening</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Row Gardening</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Space Efficiency</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Very high; no wasted walkway space</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Lower; 30-50% of space goes to paths</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Scalability</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Best for small gardens (under 200 sq ft)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Better for larger plots (200+ sq ft)</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Weed Control</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Easy; dense planting shades out weeds</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">More weeding; bare soil between rows</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Crop Variety</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Excellent; many crops in a small area</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Good for large quantities of fewer crops</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Effort Level</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Low; less weeding, watering, and soil prep</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Higher; more ground to maintain</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["straw-mulch-vs-wood-chip-mulch-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Straw Mulch vs. Wood Chip Mulch: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Straw Mulch</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Wood Chip Mulch</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Decomposition Speed</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Fast; 1-2 seasons</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Slow; 2-4 years</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Soil Health Benefit</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Quick nutrient return; feeds soil biology fast</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Slow, sustained organic matter building</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Weed Suppression</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Good initially; thins as it decomposes</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Excellent; maintains coverage for years</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Cost</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$8-15 per bale; covers about 50 sq ft at 4 inches</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Free (arborist chips) to $30-50 per cubic yard</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Best For</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Vegetable beds, strawberries, annual gardens</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Paths, perennial beds, around trees and shrubs</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Nitrogen Tie-Up</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Minimal; low carbon-to-nitrogen ratio</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Possible at soil surface; less concern if not tilled in</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["succession-planting-vs-all-at-once-planting-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Succession Planting vs. All-at-Once Planting: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Succession Planting</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">All-at-Once Planting</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Total Yield</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Higher usable yield; less waste</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Large single harvest; more likely to overwhelm</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Harvest Window</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Spread over 2-4 months</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Concentrated in 2-3 weeks</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Planning Effort</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Higher; requires tracking sow dates</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Lower; one planting day and done</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Risk Management</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Lower; if one sowing fails, others survive</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Higher; one pest or frost event hits everything</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Best For</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Lettuce, beans, beets, cilantro, radishes</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Tomatoes, peppers, garlic, perennials</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div window.AH_GRAPHICS["timer-based-vs-moisture-sensor-irrigation-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Timer-Based vs. Moisture-Sensor Irrigation: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Timer-Based</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Moisture-Sensor</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Water Savings</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Good (consistent schedule)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Excellent (waters only when soil is dry)</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Setup Cost</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$2 window.AH_GRAPHICS["worm-castings-vs-finished-compost-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Worm Castings vs. Finished Compost: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Worm Castings</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Finished Compost</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Nutrient Density</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">High; concentrated NPK in plant-available form</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Moderate; nutrients release slowly over time</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Microbial Life</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Very high; 5-10x more beneficial microbes</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Good; diverse microbial community</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Cost</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$1-3 per pound; $30-60 per cubic foot</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$30-50 per cubic yard in bulk; free if homemade</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Application Rate</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Thin layer: 1/4 to 1/2 inch as top dress</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Generous: 2-4 inches mixed into beds</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Soil Structure</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Minimal bulk; improves biology, not texture</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Significant; loosens clay, adds organic matter</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.c window.AH_GRAPHICS["acidifying-soil-for-blueberries-in-california-a-step-by-step-guide-g2"] = "<div class=\"ah-sulfur-rate-container\">\n<div class=\"ah-sulfur-rate-title\">\u2697\ufe0f Elemental Sulfur Application Rates</div>\n<div class=\"ah-sulfur-rate-warning\">\n<strong>\u26a0\ufe0f Important:</strong> These are approximate guidelines. Always confirm with soil testing before and after application.\n  </div>\n<table class=\"ah-sulfur-rate-table\">\n<thead>\n<tr>\n<th>Starting pH</th>\n<th>Loam Soil</th>\n<th>Clay Soil (+50%)</th>\n<th>Sandy Soil (-25%)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>pH 7.5 \u2192 5.0</td>\n<td><span class=\"ah-sulfur-rate-loam\">4-5 lbs</span></td>\n<td><span class=\"ah-sulfur-rate-clay\">6-7.5 lbs</span></td>\n<td><span class=\"ah-sulfur-rate-sand\">3-4 lbs</span></td>\n</tr>\n<tr>\n<td>pH 7.0 \u2192 5.0</td>\n<td><span class=\"ah-sulfur-rate-loam\">3-4 lbs</span></td>\n<td><span class=\"ah-sulfur-rate-clay\">4.5-6 lbs</span></td>\n<td><span class=\"ah-sulfur-rate-sand\">2-3 lbs</span></td>\n</tr>\n<tr>\n<td>pH 6.5 \u2192 5.0</td>\n<td><span class=\"ah-sulfur-rate-loam\">2-3 lbs</span></td>\n<td><span class=\"ah-sulfur-rate-clay\">3-4.5 lbs</span></td>\n<td><span class=\"ah-sulfur-rate-sand\">1.5-2 lbs</span></td>\n</tr>\n<tr>\n<td>pH 6.0 \u2192 5.0</td>\n<td><span class=\"ah-sulfur-rate-loam\">1-2 lbs</span></td>\n<td><span class=\"ah-sulfur-rate-clay\">1.5-3 lbs</span></td>\n<td><span class=\"ah-sulfur-rate-sand\">0.75-1.5 lbs</span></td>\n</tr>\n</tbody>\n</table>\n<div class=\"ah-sulfur-rate-tips\">\n<div class=\"ah-sulfur-rate-tips-title\">\ud83d\udccb Application Tips:</div>\n<ul>\n<li>Rates are per 100 square feet</li>\n<li>Split large applications (over 3 lbs) into 2 doses, several weeks apart</li>\n<li>Work into top 6-8 inches before planting</li>\n<li>Apply 4-8 weeks before planting to allow bacterial conversion</li>\n<li>Retest before planting to confirm pH is in target range</li>\n</ul>\n</div>\n<p class=\"ah-sulfur-rate-footer\">Sources: MSU Extension, Illinois Extension, UF/IFAS | ambitiousharvest.com</p>\n</div>";
window.AH_GRAPHICS["acidifying-soil-for-blueberries-in-california-a-step-by-step-guide-g3"] = "<div class=\"ah-water-ph-container\">\n<div class=\"ah-water-ph-title\">\ud83d\udca7 Water Sources and pH for Blueberries</div>\n<div class=\"ah-water-ph-item\">\n<span class=\"ah-water-ph-icon\">\ud83c\udf27\ufe0f</span>\n<div class=\"ah-water-ph-content\">\n<div class=\"ah-water-ph-source\">Rainwater</div>\n<span class=\"ah-water-ph-value ah-water-ph-good\">pH ~5.6</span>\n<div class=\"ah-water-ph-note\">Naturally slightly acidic, mineral-free. Ideal for blueberries! Collect during rainy season.</div>\n</div>\n</div>\n<div class=\"ah-water-ph-item\">\n<span class=\"ah-water-ph-icon\">\ud83c\udf76</span>\n<div class=\"ah-water-ph-content\">\n<div class=\"ah-water-ph-source\">Acidified Tap Water</div>\n<span class=\"ah-water-ph-value ah-water-ph-ok\">pH 5.5-6.5</span>\n<div class=\"ah-water-ph-note\">Add 1 tbsp white vinegar per gallon. Test after mixing. Good maintenance strategy.</div>\n</div>\n</div>\n<div class=\"ah-water-ph-item\">\n<span class=\"ah-water-ph-icon\">\ud83d\udeb0</span>\n<div class=\"ah-water-ph-content\">\n<div class=\"ah-water-ph-source\">Municipal Tap Water (Santa Cruz)</div>\n<span class=\"ah-water-ph-value ah-water-ph-bad\">pH 7.5-8.5</span>\n<div class=\"ah-water-ph-note\">Alkaline and mineral-rich. Raises soil pH over time. Should be acidified before use.</div>\n</div>\n</div>\n<div class=\"ah-water-ph-item\">\n<span class=\"ah-water-ph-icon\">\ud83e\udea8</span>\n<div class=\"ah-water-ph-content\">\n<div class=\"ah-water-ph-source\">Well Water (varies widely)</div>\n<span class=\"ah-water-ph-value ah-water-ph-bad\">pH 6.5-8.5</span>\n<div class=\"ah-water-ph-note\">Test your specific source. May be high in minerals depending on geology.</div>\n</div>\n</div>\n<div class=\"ah-water-ph-target\">\n<div class=\"ah-water-ph-target-label\">Target Range for Blueberry Irrigation</div>\n<div class=\"ah-water-ph-target-value\">pH 5.5 - 6.5</div>\n</div>\n<div class=\"ah-water-ph-tip\">\n<strong>\ud83d\udca1 Pro Tip:</strong> Acidified water helps maintain pH but doesn't replace soil sulfur. Use both strategies together for long-term success!\n  </div>\n<p class=\"ah-water-ph-footer\">Test your water source before deciding on acidification strategy | ambitiousharvest.com</p>\n</div>";
