cing: 0.2px;\n  border-bottom: 1px solid rgba(255,255,255,0.2);\n}\n\n/* ---------- Grid rows ---------- */\n.compare-row {\n  display: grid;\n  grid-template-columns: 1.2fr 1fr 1fr;\n  width: 100%;\n  border-bottom: 1px solid #eee;\n}\n\n.compare-row:last-child {\n  border-bottom: none;\n}\n\n/* ---------- Column headers ---------- */\n.compare-head-row {\n  background: #1a3b2a;\n}\n\n.compare-head-row .cell {\n  color: #ffffff !important;\n  font-weight: 700;\n  font-size: 0.8rem;\n  text-transform: uppercase;\n  letter-spacing: 0.6px;\n}\n\n/* ---------- Cells ---------- */\n.cell {\n  padding: 12px 14px;\n  font-size: 0.82rem;\n  color: #2f2f2f !important;\n  display: flex;\n  align-items: center;\n  gap: 8px;\n}\n\n.cell.factor {\n  font-weight: 700;\n  color: #1a3b2a !important;\n  background: #f0f4f0;\n}\n\n.cell.raised {\n  color: #1a3b2a !important;\n}\n\n.cell.inground {\n  color: #555 !important;\n}\n\n/* ---------- Zebra rows ---------- */\n.compare-row:nth-child(even):not(.compare-head-row) {\n  background: #fafafa;\n}\n\n/* ---------- Rating dots ---------- */\n.rating {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n}\n\n.rating-dot {\n  width: 8px;\n  height: 8px;\n  border-radius: 50%;\n  flex-shrink: 0;\n}\n\n.rating-dot.excellent { background: #1a3b2a; }\n.rating-dot.good      { background: #6b8e6b; }\n.rating-dot.fair      { background: #c4a35a; }\n.rating-dot.poor      { background: #8b4049; }\n\n/* ---------- Verdict cards ---------- */\n.verdict-section {\n  margin-top: 20px;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 16px;\n}\n\n.verdict-card {\n  background: #ffffff;\n  border-radius: 8px;\n  padding: 16px;\n  border: 1px solid #dde2d8;\n}\n\n.verdict-card h4 {\n  margin: 0 0 10px 0;\n  font-size: 0.9rem;\n  font-weight: 700;\n}\n\n.verdict-card.raised h4 { color: #1a3b2a !important; }\n.verdict-card.inground h4 { color: #355b3f !important; }\n\n.verdict-card ul {\n  list-style: none;\n  padding: 0;\n  margin: 0;\n}\n\n.verdict-card li {\n  font-size: 0.82rem;\n  padding: 5px 0 5px 16px;\n  position: relative;\n}\n\n.verdict-card li::before {\n  content: \"\u2022\";\n  position: absolute;\n  left: 0;\n  color: #8c9c8c !important;\n}\n\n/* ---------- Bottom line ---------- */\n.bottom-line {\n  background: #1c3c2c;\n  color: #ffffff !important;\n  padding: 16px;\n  border-radius: 8px;\n  margin-top: 20px;\n  text-align: center;\n}\n\n.bottom-line strong {\n  color: #b7d7b7 !important;\n}\n\n/* ---------- Footer ---------- */\n.ah-compare-footer {\n  background: #dde2d8;\n  padding: 14px 24px;\n  text-align: center;\n  font-size: 0.8rem;\n  color: #1c3c2c !important;\n}\n\n/* ---------- Mobile ---------- */\n@media (max-width: 700px) {\n  .compare-row {\n    grid-template-columns: 1fr;\n  }\n\n  .compare-head-row {\n    display: none;\n  }\n\n  .cell.factor {\n    font-size: 0.9rem;\n    padding-top: 14px;\n  }\n\n  .cell.raised::before {\n    content: \"Raised: \";\n    font-weight: 700;\n  }\n\n  .cell.inground::before {\n    content: \"In-Ground: \";\n    font-weight: 700;\n  }\n\n  .verdict-section {\n    grid-template-columns: 1fr;\n  }\n}\n\n#block-810b0cea13f56346e6d7 {\n    \n    --stroke-style: none;--stroke-thickness: 6px;\n    \n      \n      \n      \n    \n\n--tweak-text-block-background-color: initial !important;\n\n  }\n\n  #block-810b0cea13f56346e6d7 .sqs-html-content {\n    \n    --tweak-text-block-padding: 6% 6% 6% 6%;\n  --tweak-text-block-padding: initial;\n}\n\n  #block-810b0cea13f56346e6d7 {\n      mix-blend-mode: var(--tweak-text-block-blend\n  );\n      border-radius: var(--tweak-text-block-radius);\n  }\n\n  \n  \n#block-810b0cea13f56346e6d7 {\n      --tweak-text-block-radius: 0px 0px 0px 0px;\n    }\n\n\n  \n  \n\n  #block-810b0cea13f56346e6d7 {\n    }\n\n\n\n    @media screen and (max-width: 767px) {\n          \n            \n\n#block-810b0cea13f56346e6d7 {\n            \n            }\n        }\n    \n  \n    @media screen and (max-width: 767px) {\n          #block-810b0cea13f56346e6d7 .sqs-html-content {\n            \n            }\n        }\n    \n  @media screen and (max-width: 767px) {\n          \n          \n\n          \n          \n          \n        }</style><div class=\"ah-drainage-container\">\n<div class=\"ah-drainage-header\">\n<h2>Do You Need Raised Beds?</h2>\n<p>A simple soil drainage test to help you decide</p>\n</div>\n<div class=\"ah-drainage-content\">\n<div class=\"test-steps\">\n<h3>The Percolation Test</h3>\n<div class=\"steps-grid\">\n<div class=\"step-item\">\n<div class=\"step-number\">1</div>\n<div class=\"step-text\">Dig a hole 6-10 inches deep</div>\n</div>\n<div class=\"step-item\">\n<div class=\"step-number\">2</div>\n<div class=\"step-text\">Fill with water, let drain completely</div>\n</div>\n<div class=\"step-item\">\n<div class=\"step-number\">3</div>\n<div class=\"step-text\">Fill again and start timing</div>\n</div>\n<div class=\"step-item\">\n<div class=\"step-number\">4</div>\n<div class=\"step-text\">Record how long to drain</div>\n</div>\n</div>\n</div>\n<div class=\"results-section\">\n<h3>What Your Results Mean</h3>\n<div class=\"result-card\">\n<div class=\"result-header good\">\n<span class=\"result-time\">Less than 4 hours</span>\n<span class=\"result-badge\">Good Drainage</span>\n</div>\n<div class=\"result-body\">\n<p class=\"result-recommendation\">You have one of Santa Cruz County's better garden sites. In-ground gardening can work well with proper soil building.</p>\n<p class=\"result-action\">\u2192 Focus on adding organic matter and mulch. Raised beds optional.</p>\n</div>\n</div>\n<div class=\"result-card\">\n<div class=\"result-header borderline\">\n<span class=\"result-time\">4-10 hours</span>\n<span class=\"result-badge\">Borderline</span>\n</div>\n<div class=\"result-body\">\n<p class=\"result-recommendation\">Your soil drains slowly enough to cause problems for vegetables, especially in winter. Root crops and tomatoes may struggle.</p>\n<p class=\"result-action\">\u2192 Raised or semi-raised beds recommended for annual vegetables.</p>\n</div>\n</div>\n<div class=\"result-card\">\n<div class=\"result-header poor\">\n<span class=\"result-time\">More than 10 hours</span>\n<span class=\"result-badge\">Poor Drainage</span>\n</div>\n<div class=\"result-body\">\n<p class=\"result-recommendation\">You're fighting an uphill battle without raised beds. Waterlogging will kill roots, especially over winter. Common in clay soils throughout Santa Cruz County.</p>\n<p class=\"result-action\">\u2192 Raised beds strongly recommended. At least 12 inches deep.</p>\n</div>\n</div>\n</div>\n<div class=\"local-note\">\n<h4>Santa Cruz County Reality</h4>\n<p>Most local soils fall into the borderline or poor drainage categories due to widespread clay content. If your test takes more than 4 hours, you'll likely get better results with raised beds than spending years trying to improve native soil.</p>\n</div>\n</div>\n<div class=\"ah-drainage-footer\">\n            ambitiousharvest.com | Santa Cruz and Bay Area Gardening\n        </div>\n</div>";
window.AH_GRAPHICS["raised-beds-vs-in-ground-gardening-santa-cruz-g2"] = "<div class=\"ah-compare-container\">\n<div class=\"compare-table\">\n<div class=\"compare-title-row\">\n      Raised Beds vs In-Ground\n    </div>\n<div class=\"compare-row compare-head-row\">\n<div class=\"cell\">Factor</div>\n<div class=\"cell\">Raised Beds</div>\n<div class=\"cell\">In-Ground</div>\n</div>\n<div class=\"compare-row\">\n<div class=\"cell factor\">Soil Quality</div>\n<div class=\"cell raised\"><span class=\"rating\"><span class=\"rating-dot excellent\"></span>Controlled from day one</span></div>\n<div class=\"cell inground\"><span class=\"rating\"><span class=\"rating-dot fair\"></span>Variable, depends on site</span></div>\n</div>\n<div class=\"compare-row\">\n<div class=\"cell factor\">Drainage</div>\n<div class=\"cell raised\"><span class=\"rating\"><span class=\"rating-dot excellent\"></span>Fast, consistent</span></div>\n<div class=\"cell inground\"><span class=\"rating\"><span class=\"rating-dot poor\"></span>Often slow on clay</span></div>\n</div>\n<div class=\"compare-row\">\n<div class=\"cell factor\">Root Health</div>\n<div class=\"cell raised\"><span class=\"rating\"><span class=\"rating-dot excellent\"></span>Strong, unrestricted</span></div>\n<div class=\"cell inground\"><span class=\"rating\"><span class=\"rating-dot fair\"></span>Limited by dense layers</span></div>\n</div>\n<div class=\"compare-row\">\n<div class=\"cell factor\">Water Efficiency</div>\n<div class=\"cell raised\"><span class=\"rating\"><span class=\"rating-dot excellent\"></span>Even distribution</span></div>\n<div class=\"cell inground\"><span class=\"rating\"><span class=\"rating-dot fair\"></span>Hydrophobic issues</span></div>\n</div>\n<div class=\"compare-row\">\n<div class=\"cell factor\">Weed Pressure</div>\n<div class=\"cell raised\"><span class=\"rating\"><span class=\"rating-dot excellent\"></span>Low (fresh soil)</span></div>\n<div class=\"cell inground\"><span class=\"rating\"><span class=\"rating-dot poor\"></span>High (seed bank)</span></div>\n</div>\n<div class=\"compare-row\">\n<div class=\"cell factor\">Gopher Protection</div>\n<div class=\"cell raised\"><span class=\"rating\"><span class=\"rating-dot excellent\"></span>Easy with hardware cloth</span></div>\n<div class=\"cell inground\"><span class=\"rating\"><span class=\"rating-dot poor\"></span>Very difficult</span></div>\n</div>\n<div class=\"compare-row\">\n<div class=\"cell factor\">Season Length</div>\n<div class=\"cell raised\"><span class=\"rating\"><span class=\"rating-dot good\"></span>Longer (warms faster)</span></div>\n<div class=\"cell inground\"><span class=\"rating\"><span class=\"rating-dot fair\"></span>Shorter (cold, wet)</span></div>\n</div>\n<div class=\"compare-row\">\n<div class=\"cell factor\">Initial Cost</div>\n<div class=\"cell raised\"><span class=\"rating\"><span class=\"rating-dot fair\"></span>Higher upfront</span></div>\n<div class=\"cell inground\"><span class=\"rating\"><span class=\"rating-dot excellent\"></span>Lower</span></div>\n</div>\n<div class=\"compare-row\">\n<div class=\"cell factor\">Time to Results</div>\n<div class=\"cell raised\"><span class=\"rating\"><span class=\"rating-dot excellent\"></span>Immediate</span></div>\n<div class=\"cell inground\"><span class=\"rating\"><span class=\"rating-dot poor\"></span>2\u20133 years</span></div>\n</div>\n</div>\n<div class=\"verdict-section\">\n<div class=\"verdict-card raised\">\n<h4>\u2713 Raised Beds Best For</h4>\n<ul>\n<li>Clay or poorly draining soil</li>\n<li>Areas with gopher pressure</li>\n<li>Slopes needing level surfaces</li>\n<li>Gardeners wanting results now</li>\n<li>Small spaces (maximize yield)</li>\n</ul>\n</div>\n<div class=\"verdict-card inground\">\n<h4>\u2713 In-Ground Can Work For</h4>\n<ul>\n<li>Soil draining under 4 hours</li>\n<li>Perennial crops with time to adapt</li>\n<li>Large areas (cost-prohibitive to raise)</li>\n<li>Patient gardeners building soil over years</li>\n</ul>\n</div>\n</div>\n<div class=\"bottom-line\">\n    For most Santa Cruz County vegetable gardeners,\n    <strong>raised beds produce more reliable results</strong>\n    due to widespread clay soils, drainage issues, and gopher pressure.\n  </div>\n<div class=\"ah-compare-footer\">\n    ambitiousharvest.com | Santa Cruz and Bay Area Gardening\n  </div>\n</div>";
