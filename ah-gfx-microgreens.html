window.AH_GRAPHICS["microgreen-equipment-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Microgreen Equipment Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Everything you need to start growing at home</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Growing Trays</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Standard 10x20-inch nursery trays. One with drainage holes (growing tray) and one without (bottom tray for watering from below).</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Cost</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">$5-$15</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Also Works</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Bakery containers</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Growing Medium</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Fine-textured seed-starting mix or coconut coir. Avoid heavy garden soil. Fill trays 1 to 1.5 inches deep.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Cost</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">$5-$10</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Best Choice</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Seed-starting mix</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Light Source</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">A south-facing window works seasonally. For year-round consistency, a basic LED shop light positioned 4 to 6 inches above trays.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Cost</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">$15-$30</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Position</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">4-6 in. above</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Seeds</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Untreated seeds sold for microgreens or sprouting. One ounce plants one standard 10x20 tray.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Cost</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">$3-$8/oz</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Per Tray</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">~1 oz</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Spray Bottle + Small Fan</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Spray bottle for initial misting before roots establish. Small fan for air circulation to prevent mold.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Cost</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">$5-$15</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Key Purpose</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Mold prevention</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center; margin-top: 20px;\">Total startup cost: $30 to $60. Ongoing costs are mainly seeds and growing medium.</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["microgreen-growth-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Microgreen Growth Timeline</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What to expect from Day 1 through harvest</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Phase 1</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Day 1: Seeding</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Soak large seeds 8-12 hrs. Fill tray with moist medium. Broadcast seeds densely. Mist and cover for blackout.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Phase 2</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Days 2-4: Blackout</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Keep covered. Mist daily if dry. White sprouts emerge within 1-3 days. Roots push into medium.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Phase 3</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Days 4-5: Light</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Remove cover. Move to light. Pale seedlings green up in 24-48 hrs. Switch to bottom watering.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Phase 4</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Days 5-10: Growth</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Cotyledons open and deepen in color. True leaves begin emerging. Water from below 1-2x daily.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Phase 5</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Days 7-14: Harvest</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Cut just above soil with sharp scissors. Rinse gently. Store in sealed container with paper towel, 5-7 days in fridge.</p>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center; margin-top: 20px;\">Fastest varieties (radish): 5-7 days. Slowest beginners (sunflower, pea): 8-14 days.</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["microgreen-rotation-calendar"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">4-Week Microgreen Rotation</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">A continuous harvest plan for a two-person household</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Week</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Plant</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Sow Day</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Harvest Day</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Action Notes</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Week 1</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Radish</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Day 1</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Day 6-7</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">No pre-soak. Fastest harvest for quick wins.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Week 2</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sunflower</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Day 8</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Day 18-20</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Soak seeds overnight. Use weight during blackout.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Week 3</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Pea Shoots</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Day 15</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Day 25-29</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Soak seeds overnight. May yield a second cut.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Week 4</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Broccoli</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Day 22</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Day 30-34</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">No pre-soak. Distribute small seeds evenly.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Repeat cycle. Label each tray with variety and planting date. Compost spent trays into your outdoor garden.</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["sprout-food-safety-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Home Sprouting Food Safety Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Follow these steps every batch to minimize risk</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Seed Selection</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <ul style=\"font-size: 0.85rem; color: #666 !important; line-height: 1.8; margin: 0; padding-left: 18px;\">\n                        <li>Buy seeds labeled for sprouting</li>\n                        <li>Choose untreated, food-grade seeds</li>\n                        <li>Look for pathogen-tested suppliers</li>\n                        <li>Store in cool, dry, airtight containers</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Sanitation</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <ul style=\"font-size: 0.85rem; color: #666 !important; line-height: 1.8; margin: 0; padding-left: 18px;\">\n                        <li>Wash all equipment with hot soapy water</li>\n                        <li>Wash hands before every handling</li>\n                        <li>Use clean or filtered water for rinsing</li>\n                        <li>Keep sprouting area away from raw meat</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Rinsing Schedule</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <ul style=\"font-size: 0.85rem; color: #666 !important; line-height: 1.8; margin: 0; padding-left: 18px;\">\n                        <li>Rinse at least 2x daily (every 8-12 hrs)</li>\n                        <li>3x daily is even better in warm weather</li>\n                        <li>Drain thoroughly after every rinse</li>\n                        <li>Never let sprouts sit in standing water</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Signs of Spoilage</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <ul style=\"font-size: 0.85rem; color: #666 !important; line-height: 1.8; margin: 0; padding-left: 18px;\">\n                        <li>Sour, musty, or ammonia-like smell</li>\n                        <li>Slimy texture instead of crisp</li>\n                        <li>Brown or dark discoloration</li>\n                        <li>When in doubt, discard the batch</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center; margin-top: 20px;\">Sources: FDA food safety guidelines, UC Davis Food Safety program, UC Division of Agriculture and Natural Resources</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["mason-jar-sprouting-step-by-step"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Mason Jar Sprouting: Step by Step</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">The simplest method for growing sprouts at home</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Step 1</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Measure and Rinse</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">1-2 tbsp small seeds or 1/4 cup large seeds. Rinse through mesh lid.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Step 2</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Soak Overnight</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Fill jar with cool water. Soak 8-12 hours to activate germination.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Step 3</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Drain and Prop</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Drain all water. Place jar upside down at 45 degrees for air flow.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Step 4</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Rinse 2x Daily</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Every 8-12 hrs: fill, swirl, drain thoroughly. Do not skip rinses.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Step 5</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Green Up (Optional)</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">On last day, place in indirect light for several hours to develop color.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Step 6</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Final Rinse and Store</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Rinse well. Air-dry 15-30 min. Refrigerate in clean container. Use within 3-5 days.</p>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center; margin-top: 20px;\">Equipment: wide-mouth quart mason jar, mesh sprouting lid, bowl or dish rack for propping at an angle.</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["sprout-safety-decision-flowchart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Should You Eat Sprouts Raw or Cooked?</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">A decision guide based on FDA and UC food safety recommendations</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Safe for Raw Consumption</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin-bottom: 12px; line-height: 1.6;\">Healthy adults with no immune concerns, when following proper sanitation:</p>\n                    <ul style=\"font-size: 0.85rem; color: #666 !important; line-height: 1.8; margin: 0; padding-left: 18px;\">\n                        <li>Seeds from tested, reputable supplier</li>\n                        <li>Proper rinsing schedule followed</li>\n                        <li>Sprouts smell fresh and crisp</li>\n                        <li>Consumed within 3-5 days of harvest</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Cook to 165F Before Eating</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin-bottom: 12px; line-height: 1.6;\">The FDA advises cooking for higher-risk groups:</p>\n                    <ul style=\"font-size: 0.85rem; color: #666 !important; line-height: 1.8; margin: 0; padding-left: 18px;\">\n                        <li>Children under 5</li>\n                        <li>Adults over 65</li>\n                        <li>Pregnant women</li>\n                        <li>Anyone with a compromised immune system</li>\n                    </ul>\n                    <div style=\"margin-top: 16px; padding-top: 16px; border-top: 1px solid #e8ebe8;\">\n                        <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Best Cooked Varieties</div>\n                        <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Mung Bean</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Lentil</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Alfalfa</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Consider Microgreens Instead</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin-bottom: 12px; line-height: 1.6;\">Microgreens carry lower food safety risk due to open-air growing conditions:</p>\n                    <ul style=\"font-size: 0.85rem; color: #666 !important; line-height: 1.8; margin: 0; padding-left: 18px;\">\n                        <li>Grown in soil, not enclosed jars</li>\n                        <li>Better air circulation</li>\n                        <li>Harvested by cutting (no root contact)</li>\n                        <li>UC Davis notes lower risk profile</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["windowsill-herb-success-chart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Windowsill Herb Success Chart</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What thrives indoors vs. what needs a grow light in Santa Cruz</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Herb</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Light Needs</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Indoor Rating</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Water</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Best Window</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Chives</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">4-6 hrs</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Excellent</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Moderate</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">S, W, or E</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Mint</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">4-6 hrs</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Very Good</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Moderate</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">S, W, or E</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Parsley</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">5-7 hrs</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Good</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Moderate</td>\n window.AH_GRAPHICS["grow-light-before-and-after"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Window Light vs. Grow Light: What to Expect</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">The difference supplemental lighting makes for fog belt homes</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #8c9c8c !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Window Light Only</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <ul style=\"font-size: 0.85rem; color: #666 !important; line-height: 1.8; margin: 0 0 16px 0; padding-left: 18px;\">\n                        <li>Leggy, stretched growth toward light</li>\n                        <li>Pale green leaves, less vibrant</li>\n                        <li>Smaller leaves, less dense growth</li>\n                        <li>Milder flavor (fewer aromatic oils)</li>\n                        <li>Slower production, less volume</li>\n                    </ul>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Best For</div>\n portant; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

lor: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["microgreens-vs-mature-vegetables-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Microgreens vs. Mature Vegetables: The Honest Picture</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Per-gram concentration vs. per-serving reality</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Per Gram (Concentration)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Microgreens win. The most nutrient-dense varieties contain 4 to 40 times higher concentrations of vitamins C, E, K, and beta-carotene per gram of leaf tissue.</p>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Advantage</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Microgreens</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Per Serving (Total Intake)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Mature vegetables often win. A typical microgreen serving is 5-15g; a salad serving is 50-100g. The larger portion often delivers more total nutrients despite lower concentration.</p>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Advantage</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Mature Greens</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Freshness Factor</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Home-grown microgreens win. Vitamin C drops 15-55% within a week of harvest. Eating microgreens minutes after cutting preserves maximum nutrition.</p>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Advantage</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Home-Grown Microgreens</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center; margin-top: 20px;\">Bottom line: eat both. Microgreens are a concentrated nutritional bonus, not a replacement for mature vegetables.</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["maximize-your-microgreen-nutrition"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">6 Ways to Maximize Microgreen Nutrition</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Research-backed strategies for getting the most from your harvest</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">1</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px; font-size: 0.95rem;\">Grow Nutrient-Dense Varieties</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Red cabbage, cilantro, radish, garnet amaranth, and green daikon rank highest across multiple nutrients.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">2</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px; font-size: 0.95rem;\">Eat Them Raw</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Heat degrades vitamin C and other heat-sensitive nutrients. Use as raw garnishes, salad additions, or smoothie ingredients.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">3</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px; font-size: 0.95rem;\">Eat Them Fresh</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Vitamin C drops 15-55% within a week of harvest. Cut and eat within minutes for maximum benefit.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">4</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px; font-size: 0.95rem;\">Pair with Healthy Fats</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Vitamins E, K, and carotenoids are fat-soluble. Eat with olive oil, avocado, or nuts for better absorption.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">5</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px; font-size: 0.95rem;\">Rotate Varieties</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Different varieties provide different nutrient profiles. Weekly rotation of 3-4 types gives the broadest benefit.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">6</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px; font-size: 0.95rem;\">Give Adequate Light</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Strong light after the blackout phase supports development of chlorophyll, carotenoids, and other light-dependent nutrients.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Sources: Xiao et al. 2012, Lee and Kader 2000, Samuoliene et al. 2013</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

</script>
