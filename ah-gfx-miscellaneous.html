                </tr>\n            </thead>\n            <tbody>\n                <tr>\n                    <td><strong>Sierra Azul</strong></td>\n                    <td>Watsonville</td>\n                    <td><span class=\"ah-nursery-badge\">Expert Advice</span> Succulents, Mediterranean plants, demonstration garden</td>\n                    <td>$$$</td>\n                </tr>\n                <tr>\n                    <td><strong>San Lorenzo Garden Center</strong></td>\n                    <td>Santa Cruz</td>\n                    <td><span class=\"ah-nursery-badge\">One-Stop Shop</span> Veggie starts, organic amendments, seeds</td>\n                    <td>$$</td>\n                </tr>\n                <tr>\n                    <td><strong>Dig Gardens</strong></td>\n                    <td>Santa Cruz / Aptos</td>\n                    <td><span class=\"ah-nursery-badge\">Design</span> Succulents, houseplants, containers, workshops</td>\n                    <td>$$$</td>\n                </tr>\n                <tr>\n                    <td><strong>Far West Nursery</strong></td>\n                    <td>Santa Cruz</td>\n                    <td><span class=\"ah-nursery-badge\">Trees</span> Fruit trees, ornamentals, unusual varieties</td>\n                    <td>$$</td>\n                </tr>\n                <tr>\n                    <td><strong>Scarborough Gardens</strong></td>\n                    <td>Scotts Valley</td>\n                    <td><span class=\"ah-nursery-badge\">SLV Area</span> Shade-tolerant plants, pond plants, gifts</td>\n                    <td>$$</td>\n                </tr>\n                <tr>\n                    <td><strong>Mountain Feed</strong></td>\n                    <td>Ben Lomond</td>\n                    <td><span class=\"ah-nursery-badge\">Seeds</span> Organic seeds, homesteading, bee/chicken supplies</td>\n                    <td>$-$$</td>\n                </tr>\n                <tr>\n                    <td><strong>Freedom Nursery</strong></td>\n                    <td>Freedom</td>\n                    <td><span class=\"ah-nursery-badge\">Budget</span> Affordable plants, succulents, bulk purchases</td>\n                    <td>$</td>\n                </tr>\n                <tr>\n                    <td><strong>UCSC Arboretum Sales</strong></td>\n                    <td>Santa Cruz (UCSC)</td>\n                    <td><span class=\"ah-nursery-badge\">Natives</span> CA natives, drought-tolerant, rare species</td>\n                    <td>$-$$</td>\n                </tr>\n                <tr>\n                    <td><strong>Love Apple Farms</strong></td>\n                    <td>Scotts Valley</td>\n                    <td><span class=\"ah-nursery-badge\">Tomatoes</span> Heirloom tomato/pepper starts, expert guidance</td>\n                    <td>$$</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 12px 20px; background-color: #f8f9f0 !important; border-top: 1px solid #dde2d8;\">\n        <p style=\"margin: 0; font-size: 0.75rem; color: #8c9c8c !important; line-height: 1.4;\">$ = Budget-friendly | $$ = Moderate | $$$ = Premium/specialty pricing. All nurseries stock plants suited to Santa Cruz County growing conditions.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["seasonal-nursery-shopping-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Seasonal Nursery Shopping Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What to buy and where to go, by season in Santa Cruz County</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <style>\n            .ah-season-card { border: 1px solid #dde2d8; border-radius: 8px; margin-bottom: 15px; overflow: hidden; }\n            .ah-season-card:last-child { margin-bottom: 0; }\n            .ah-season-header { background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px 16px; font-weight: 700; font-size: 0.95rem; }\n            .ah-season-body { padding: 14px 16px; }\n            .ah-season-row { display: flex; gap: 12px; margin-bottom: 8px; align-items: flex-start; }\n            .ah-season-row:last-child { margin-bottom: 0; }\n            .ah-season-label { font-weight: 600; font-size: 0.8rem; color: #1a3b2a !important; min-width: 80px; flex-shrink: 0; }\n            .ah-season-value { font-size: 0.8rem; color: #333 !important; line-height: 1.4; }\n            @media (max-width: 600px) {\n                .ah-season-row { flex-direction: column; gap: 2px; }\n                .ah-season-label { min-width: unset; }\n            }\n        </style>\n        <div class=\"ah-season-card\">\n            <div class=\"ah-season-header\">Winter (Dec - Feb)</div>\n            <div class=\"ah-season-body\">\n                <div class=\"ah-season-row\">\n                    <span class=\"ah-season-label\">Shop for:</span>\n                    <span class=\"ah-season-value\">Bare-root fruit trees, cool-season veggie starts, cover crop seeds</span>\n                </div>\n                <div class=\"ah-season-row\">\n                    <span class=\"ah-season-label\">Best stops:</span>\n                    <span class=\"ah-season-value\">Far West Nursery (fruit trees), Mountain Feed (cover crop seeds), San Lorenzo Garden Center (cool-season starts)</span>\n                </div>\n            </div>\n        </div>\n        <div class=\"ah-season-card\">\n            <div class=\"ah-season-header\">Spring (Mar - May)</div>\n            <div class=\"ah-season-body\">\n                <div class=\"ah-season-row\">\n                    <span class=\"ah-season-label\">Shop for:</span>\n                    <span class=\"ah-season-value\">Warm-season veggie starts, heirloom tomatoes, native plants, seeds</span>\n                </div>\n                <div class=\"ah-season-row\">\n                    <span class=\"ah-season-label\">Best stops:</span>\n                    <span class=\"ah-season-value\">Love Apple Farms (heirloom tomatoes), San Lorenzo Garden Center (veggie starts), UCSC Arboretum sales (natives)</span>\n                </div>\n            </div>\n        </div>\n        <div class=\"ah-season-card\">\n            <div class=\"ah-season-header\">Summer (Jun - Aug)</div>\n            <div class=\"ah-season-body\">\n                <div class=\"ah-season-row\">\n                    <span class=\"ah-season-label\">Shop for:</span>\n                    <span class=\"ah-season-value\">Succulents, drought-tolerant plants, houseplants, fall crop seeds</span>\n                </div>\n                <div class=\"ah-season-row\">\n                    <span class=\"ah-season-label\">Best stops:</span>\n                    <span class=\"ah-season-value\">Dig Gardens (succulents and houseplants), Sierra Azul (Mediterranean plants), Freedom Nursery (budget succulents)</span>\n                </div>\n            </div>\n        </div>\n        <div class=\"ah-season-card\">\n            <div class=\"ah-season-header\">Fall (Sep - Nov)</div>\n            <div class=\"ah-season-body\">\n                <div class=\"ah-season-row\">\n                    <span class=\"ah-season-label\">Shop for:</span>\n                    <span class=\"ah-season-value\">Perennials, shrubs, trees (ideal planting season), California natives, cover crops</span>\n                </div>\n                <div class=\"ah-season-row\">\n                    <span class=\"ah-season-label\">Best stops:</span>\n                    <span class=\"ah-season-value\">UCSC Arboretum sales (natives), Far West Nursery (trees and shrubs), Scarborough Gardens (SLV-suited perennials)</span>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 12px 20px; background-color: #dde2d8 !important; border-top: 1px solid #dde2d8;\">\n        <p style=\"margin: 0; font-size: 0.75rem; color: #1a3b2a !important; line-height: 1.4; text-align: center;\"><strong>Tip:</strong> Fall is the best time to plant perennials, shrubs, and trees in Santa Cruz County. Winter rains help establish roots before summer heat arrives.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["sustainability-practices-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Eco-Friendly Gardening Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Sustainable practices for Santa Cruz County gardens</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <style>\n            .ah-eco-category { margin-bottom: 20px; }\n            .ah-eco-category:last-child { margin-bottom: 0; }\n            .ah-eco-cat-title { font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 10px 0; padding-bottom: 6px; border-bottom: 2px solid #1a3b2a; }\n            .ah-eco-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; padding: 8px 12px; background-color: #fff !important; border-radius: 6px; border-left: 3px solid #1a3b2a; }\n            .ah-eco-check { width: 18px; height: 18px; border: 2px solid #1a3b2a; border-radius: 3px; flex-shrink: 0; margin-top: 1px; }\n            .ah-eco-text { font-size: 0.82rem; color: #333 !important; line-height: 1.4; }\n            @media (max-width: 600px) {\n                .ah-eco-item { padding: 6px 10px; }\n            }\n        </style>\n        <div class=\"ah-eco-category\">\n            <h3 class=\"ah-eco-cat-title\">Organic Practices</h3>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Switch from synthetic fertilizer to compost and organic amendments</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Use companion planting for natural pest management</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Encourage beneficial insects (ladybugs, lacewings, parasitic wasps)</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Reserve even organic pesticides for genuine emergencies only</span></div>\n        </div>\n        <div class=\"ah-eco-category\">\n            <h3 class=\"ah-eco-cat-title\">Water Conservation</h3>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Install drip irrigation (saves 30-50% vs. sprinklers)</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Mulch all beds with 3-4 inches of organic material</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Set up at least one rain barrel for dry-season watering</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Water deeply but infrequently, always in the morning</span></div>\n        </div>\n        <div class=\"ah-eco-category\">\n            <h3 class=\"ah-eco-cat-title\">Biodiversity</h3>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Add at least 3 California native plants to your garden</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Provide a shallow water source for pollinators</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Leave some \"messy\" areas for wildlife habitat</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Reduce outdoor lighting to protect nocturnal pollinators</span></div>\n        </div>\n        <div class=\"ah-eco-category\">\n            <h3 class=\"ah-eco-cat-title\">Soil Health</h3>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Add 2-4 inches of compost to vegetable beds each year</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Minimize tilling; top-dress instead and let worms do the mixing</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Plant cover crops in the off-season (bell beans, crimson clover, rye)</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Keep soil covered at all times with mulch or living plants</span></div>\n        </div>\n    </div>\n    <div style=\"padding: 12px 20px; background-color: #dde2d8 !important;\">\n        <p style=\"margin: 0; font-size: 0.75rem; color: #1a3b2a !important; line-height: 1.4; text-align: center;\"><strong>Start small:</strong> Pick one category to focus on this season. Small changes accumulate into a healthier garden and a healthier ecosystem.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["conventional-vs-eco-friendly-gardening-alternatives"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Conventional vs. Eco-Friendly Alternatives</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Simple swaps for a more sustainable Santa Cruz garden</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <style>\n            .ah-compare-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }\n            .ah-compare-table th { background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 14px; text-align: left; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }\n            .ah-compare-table td { padding: 12px 14px; border-bottom: 1px solid #dde2d8; vertical-align: top; line-height: 1.5; }\n            .ah-compare-table tr:nth-child(even) { background-color: #f0f2ec !important; }\n            .ah-compare-table tr:hover { background-color: #dde2d8 !important; }\n            .ah-conv-label { color: #8c9c8c !important; font-weight: 600; }\n            .ah-eco-label { color: #1a3b2a !important; font-weight: 700; }\n            .ah-why-text { font-size: 0.75rem; color: #8c9c8c !important; font-style: italic; margin-top: 3px; }\n            @media (max-width: 600px) {\n                .ah-compare-table { font-size: 0.75rem; }\n                .ah-compare-table th, .ah-compare-table td { padding: 8px 8px; }\n            }\n        </style>\n        <table class=\"ah-compare-table\">\n            <thead>\n                <tr>\n                    <th>Category</th>\n                    <th>Conventional</th>\n                    <th>Eco-Friendly Alternative</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr>\n                    <td><strong>Fertilizer</strong></td>\n                    <td class=\"ah-conv-label\">Synthetic fertilizers (Miracle-Gro, etc.)</td>\n                    <td><span class=\"ah-eco-label\">Compost, worm castings, fish emulsion</span><div class=\"ah-why-text\">Feeds soil life, not just plants; won't contaminate groundwater</div></td>\n                </tr>\n                <tr>\n                    <td><strong>Pest Control</strong></td>\n                    <td class=\"ah-conv-label\">Broad-spectrum chemical sprays</td>\n                    <td><span class=\"ah-eco-label\">Beneficial insects, hand-picking, row covers</span><div class=\"ah-why-text\">Preserves natural predators that prevent future outbreaks</div></td>\n                </tr>\n                <tr>\n                    <td><strong>Weed Control</strong></td>\n                    <td class=\"ah-conv-label\">Herbicides (Roundup / glyphosate)</td>\n                    <td><span class=\"ah-eco-label\">Mulch, hand-weeding, cover crops</span><div class=\"ah-why-text\">Glyphosate is a probable carcinogen detected in CA waterways</div></td>\n                </tr>\n                <tr>\n                    <td><strong>Watering</strong></td>\n                    <td class=\"ah-conv-label\">Overhead sprinklers, daily watering</td>\n                    <td><span class=\"ah-eco-label\">Drip irrigation, deep infrequent watering</span><div class=\"ah-why-text\">Saves 30-50% water; reduces disease from wet foliage</div></td>\n                </tr>\n                <tr>\n                    <td><strong>Soil Prep</strong></td>\n                    <td class=\"ah-conv-label\">Rototilling each season</td>\n                    <td><span class=\"ah-eco-label\">Top-dress with compost, broadfork if needed</span><div class=\"ah-why-text\">Preserves fungal networks and soil structure</div></td>\n                </tr>\n                <tr>\n                    <td><strong>Off-Season</strong></td>\n                    <td class=\"ah-conv-label\">Bare soil left exposed</td>\n                    <td><span class=\"ah-eco-label\">Cover crops (bell beans, clover, rye)</span><div class=\"ah-why-text\">Prevents erosion, fixes nitrogen, feeds soil biology</div></td>\n                </tr>\n                <tr>\n                    <td><strong>Plant Selection</strong></td>\n                    <td class=\"ah-conv-label\">Ornamentals requiring heavy irrigation</td>\n                    <td><span class=\"ah-eco-label\">CA natives, Mediterranean plants, drought-tolerant edibles</span><div class=\"ah-why-text\">Evolved for our climate; supports local pollinators and wildlife</div></td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 12px 20px; background-color: #f8f9f0 !important; border-top: 1px solid #dde2d8;\">\n        <p style=\"margin: 0; font-size: 0.75rem; color: #8c9c8c !important; line-height: 1.4;\">Sources: UC Integrated Pest Management Program (ipm.ucanr.edu); UC Master Gardener Program of Santa Cruz County; Santa Cruz County recycling and composting programs.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";


window.AH_GRAPHICS["5-gopher-control-methods-that-actually-work-in-santa-cruz-county-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Gopher Control at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">5 methods ranked by effectiveness for Santa Cruz County</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <style>\n            @media (max-width: 600px) {\n                .ah-gopher-table th, .ah-gopher-table td { padding: 6px 6px !important; font-size: 0.7rem !important; }\n            }\n        </style>\n        <table class=\"ah-gopher-table\" style=\"width: 100%; border-collapse: collapse; font-size: 0.82rem;\">\n            <thead>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <th style=\"padding: 10px 10px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Method</th>\n                    <th style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Effectiveness</th>\n                    <th style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Effort</th>\n                    <th style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Cost</th>\n                    <th style=\"padding: 10px 10px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Best For</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; border-bottom: 1px solid #dde2d8;\">Trapping</td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700;\">High</span></td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\">High</td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\">$15-$30</td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\">Active reduction</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; border-bottom: 1px solid #dde2d8;\">Gopher Baskets</td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700;\">Very High</span></td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\">Medium</td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\">$3-$8 per plant</td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\">High-value plants</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; border-bottom: 1px solid #dde2d8;\">Lined Raised Beds</td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #1a3b2a !important; font-weight: 700;\">Very High</span></td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\">High (once)</td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\">$32-$64 per bed</td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\">Veggie gardens</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600; border-bottom: 1px solid #dde2d8;\">Owl Boxes</td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\"><span style=\"color: #8c9c8c !important; font-weight: 600;\">Moderate</span></td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\">Low</td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\">$50-$150</td>\n                    <td style=\"padding: 10px 10px; text-align: center; border-bottom: 1px solid #dde2d8;\">Long-term control</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 10px 10px; font-weight: 600;\">Strategic Coexistence</td>\n                    <td style=\"padding: 10px 10px; text-align: center;\"><span style=\"color: #1a3b2a !important; font-weight: 700;\">High (sanity)</span></td>\n                    <td style=\"padding: 10px 10px; text-align: center;\">Low</td>\n                    <td style=\"padding: 10px 10px; text-align: center;\">Free</td>\n                    <td style=\"padding: 10px 10px; text-align: center;\">Ongoing peace</td>\n                </tr>\n            </tbody>\n        </table>\n        <div style=\"margin-top: 15px; padding: 12px 15px; background-color: #dde2d8 !important; border-radius: 6px; font-size: 0.8rem; color: #1a3b2a !important;\">\n            <strong>Skip these:</strong> Sonic stakes, castor oil granules, flooding tunnels, and Juicy Fruit gum are ineffective. Poison baits risk harming pets, children, and wildlife (including the owls you want hunting gophers).\n        </div>\n        <p style=\"font-size: 0.7rem; color: #8c9c8c !important; margin: 12px 0 0 0; text-align: right;\">Source: UC IPM Pest Note 7433, Pocket Gophers</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["5-gopher-control-methods-that-actually-work-in-santa-cruz-county-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Gopher vs. Mole vs. Vole: Quick ID Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Know what you are dealing with in your Santa Cruz garden</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <style>\n            @media (max-width: 600px) {\n                .ah-pest-id-row { flex-direction: column !important; }\n                .ah-pest-id-card { min-width: 100% !important; }\n            }\n        </style>\n        <div class=\"ah-pest-id-row\" style=\"display: flex; gap: 15px; flex-wrap: wrap;\">\n            <div class=\"ah-pest-id-card\" style=\"flex: 1; min-width: 180px; border: 2px solid #1a3b2a; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px; text-align: center; font-weight: 700; font-size: 0.95rem;\">POCKET GOPHER</div>\n                <div style=\"padding: 15px; font-size: 0.8rem; color: #1a3b2a !important;\">\n                    <div style=\"margin-bottom: 8px;\"><strong>Size:</strong> 6-10 in.</div>\n                    <div style=\"margin-bottom: 8px;\"><strong>Look for:</strong> Visible cheek pouches, small eyes, large front claws</div>\n                    <div style=\"margin-bottom: 8px;\"><strong>Mounds:</strong> Crescent/fan-shaped with plugged hole to one side</div>\n                    <div style=\"margin-bottom: 8px;\"><strong>Diet:</strong> Roots, bulbs, entire plants pulled underground</div>\n                    <div style=\"margin-bottom: 8px;\"><strong>Damage:</strong> Severe. Destroys root systems, kills plants</div>\n                    <div style=\"padding: 6px 10px; background-color: #dde2d8 !important; border-radius: 4px; font-size: 0.75rem; text-align: center;\"><strong>Common in Santa Cruz?</strong> Very common</div>\n                </div>\n            </div>\n            <div class=\"ah-pest-id-card\" style=\"flex: 1; min-width: 180px; border: 2px solid #8c9c8c; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 10px; text-align: center; font-weight: 700; font-size: 0.95rem;\">MOLE</div>\n                <div style=\"padding: 15px; font-size: 0.8rem; color: #1a3b2a !important;\">\n                    <div style=\"margin-bottom: 8px;\"><strong>Size:</strong> 5-7 in.</div>\n                    <div style=\"margin-bottom: 8px;\"><strong>Look for:</strong> Velvety fur, pointed snout, huge paddle-like front paws</div>\n                    <div style=\"margin-bottom: 8px;\"><strong>Mounds:</strong> Round, volcano-shaped (symmetrical)</div>\n                    <div style=\"margin-bottom: 8px;\"><strong>Diet:</strong> Insects, grubs, earthworms (not plants)</div>\n                    <div style=\"margin-bottom: 8px;\"><strong>Damage:</strong> Cosmetic. Raised surface tunnels, lawn disruption</div>\n                    <div style=\"padding: 6px 10px; background-color: #dde2d8 !important; border-radius: 4px; font-size: 0.75rem; text-align: center;\"><strong>Common in Santa Cruz?</strong> Less common</div>\n                </div>\n            </div>\n            <div class=\"ah-pest-id-card\" style=\"flex: 1; min-width: 180px; border: 2px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 10px; text-align: center; font-weight: 700; font-size: 0.95rem;\">VOLE</div>\n                <div style=\"padding: 15px; font-size: 0.8rem; color: #1a3b2a !important;\">\n                    <div style=\"margin-bottom: 8px;\"><strong>Size:</strong> 3-5 in.</div>\n                    <div style=\"margin-bottom: 8px;\"><strong>Look for:</strong> Small, mouse-like, short tail, rounded ears</div>\n                    <div style=\"margin-bottom: 8px;\"><strong>Mounds:</strong> No mounds. Surface runways through grass or mulch</div>\n                    <div style=\"margin-bottom: 8px;\"><strong>Diet:</strong> Bark, stems, grass, some roots</div>\n                    <div style=\"margin-bottom: 8px;\"><strong>Damage:</strong> Moderate. Gnaws bark at soil line, eats bulbs</div>\n                    <div style=\"padding: 6px 10px; background-color: #dde2d8 !important; border-radius: 4px; font-size: 0.75rem; text-align: center;\"><strong>Common in Santa Cruz?</strong> Occasional</div>\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 18px; padding: 12px 15px; background-color: #dde2d8 !important; border-radius: 6px; font-size: 0.8rem; color: #1a3b2a !important;\">\n            <strong>Key clue:</strong> Check the mound shape first. Crescent-shaped with a plug = gopher. Round and symmetrical = mole. No mounds but visible runways = vole. In Santa Cruz County, pocket gophers (Thomomys bottae) are by far the most common culprit.\n        </div>\n        <p style=\"font-size: 0.7rem; color: #8c9c8c !important; margin: 12px 0 0 0; text-align: right;\">Source: UC IPM Pest Notes 7433 (Gophers), 7439 (Moles), 7439 (Voles)</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["composting-101-from-kitchen-scraps-to-garden-gold-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Greens vs. Browns: What Goes in Your Compost</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Aim for roughly 3 parts brown to 1 part green by volume</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <style>\n            @media (max-width: 600px) {\n                .ah-compost-cols { flex-direction: column !important; }\n            }\n        </style>\n        <div class=\"ah-compost-cols\" style=\"display: flex; gap: 20px; flex-wrap: wrap;\">\n            <div style=\"flex: 1; min-width: 250px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px 15px; text-align: center; font-weight: 700; font-size: 0.95rem; border-radius: 6px 6px 0 0;\">GREENS (Nitrogen-Rich)</div>\n                <table style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem;\">\n                    <thead>\n                        <tr style=\"background-color: #dde2d8 !important;\">\n                            <th style=\"padding: 8px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #8c9c8c;\">Material</th>\n                            <th style=\"padding: 8px 12px; text-align: center; font-weight: 600; border-bottom: 2px solid #8c9c8c;\">Breaks Down</th>\n                        </tr>\n                    </thead>\n                    <tbody>\n                        <tr style=\"background-color: #fff !important;\">\n                            <td style=\"padding: 8px 12px; border-bottom: 1px solid #dde2d8;\">Fruit/vegetable scraps</td>\n                            <td style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">2-4 weeks</td>\n                        </tr>\n                        <tr style=\"background-color: #f8f9f0 !important;\">\n                            <td style=\"padding: 8px 12px; border-bottom: 1px solid #dde2d8;\">Coffee grounds</td>\n                            <td style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">2-4 weeks</td>\n                        </tr>\n                        <tr style=\"background-color: #fff !important;\">\n                            <td style=\"padding: 8px 12px; border-bottom: 1px solid #dde2d8;\">Grass clippings</td>\n                            <td style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">1-3 weeks</td>\n                        </tr>\n                        <tr style=\"background-color: #f8f9f0 !important;\">\n                            <td style=\"padding: 8px 12px; border-bottom: 1px solid #dde2d8;\">Fresh plant trimmings</td>\n                            <td style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">2-4 weeks</td>\n                        </tr>\n                        <tr style=\"background-color: #fff !important;\">\n                            <td style=\"padding: 8px 12px;\">Eggshells (crushed)</td>\n                            <td style=\"padding: 8px 12px; text-align: center;\">6-12 months</td>\n                        </tr>\n                    </tbody>\n                </table>\n            </div>\n            <div style=\"flex: 1; min-width: 250px;\">\n                <div style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 10px 15px; text-align: center; font-weight: 700; font-size: 0.95rem; border-radius: 6px 6px 0 0;\">BROWNS (Carbon-Rich)</div>\n                <table style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem;\">\n                    <thead>\n                        <tr style=\"background-color: #dde2d8 !important;\">\n                            <th style=\"padding: 8px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #8c9c8c;\">Material</th>\n                            <th style=\"padding: 8px 12px; text-align: center; font-weight: 600; border-bottom: 2px solid #8c9c8c;\">Breaks Down</th>\n                        </tr>\n                    </thead>\n                    <tbody>\n                        <tr style=\"background-color: #fff !important;\">\n                            <td style=\"padding: 8px 12px; border-bottom: 1px solid #dde2d8;\">Dried leaves</td>\n                            <td style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">3-6 months</td>\n                        </tr>\n                        <tr style=\"background-color: #f8f9f0 !important;\">\n                            <td style=\"padding: 8px 12px; border-bottom: 1px solid #dde2d8;\">Cardboard (shredded)</td>\n                            <td style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">2-4 months</td>\n                        </tr>\n                        <tr style=\"background-color: #fff !important;\">\n                            <td style=\"padding: 8px 12px; border-bottom: 1px solid #dde2d8;\">Straw/hay</td>\n                            <td style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">2-4 months</td>\n                        </tr>\n                        <tr style=\"background-color: #f8f9f0 !important;\">\n                            <td style=\"padding: 8px 12px; border-bottom: 1px solid #dde2d8;\">Small twigs/branches</td>\n                            <td style=\"padding: 8px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">6-12 months</td>\n                        </tr>\n                        <tr style=\"background-color: #fff !important;\">\n                            <td style=\"padding: 8px 12px;\">Newspaper (shredded)</td>\n                            <td style=\"padding: 8px 12px; text-align: center;\">2-4 months</td>\n                        </tr>\n                    </tbody>\n                </table>\n            </div>\n        </div>\n        <div style=\"margin-top: 18px; padding: 12px 15px; background-color: #dde2d8 !important; border-radius: 6px; font-size: 0.8rem; color: #1a3b2a !important;\">\n            <strong>Never compost:</strong> Meat, dairy, oily foods, diseased plants, pet waste, or treated wood. These attract pests, create odors, or introduce pathogens.\n        </div>\n        <p style=\"font-size: 0.7rem; color: #8c9c8c !important; margin: 12px 0 0 0; text-align: right;\">Source: UC Master Gardener Program, Composting at Home</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["composting-101-from-kitchen-scraps-to-garden-gold-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Composting Method Comparison</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Find the right method for your California garden</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <style>\n            @media (max-width: 600px) {\n                .ah-compost-method-table { font-size: 0.75rem !important; }\n                .ah-compost-method-table th, .ah-compost-method-table td { padding: 6px 8px !important; }\n            }\n        </style>\n        <table class=\"ah-compost-method-table\" style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem;\">\n            <thead>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <th style=\"padding: 10px 12px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Method</th>\n                    <th style=\"padding: 10px 12px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Space Needed</th>\n                    <th style=\"padding: 10px 12px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Time to Finish</th>\n                    <th style=\"padding: 10px 12px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Effort</th>\n                    <th style=\"padding: 10px 12px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Cost</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; border-bottom: 1px solid #dde2d8;\">Open Pile</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Large yard</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">3-12 months</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Medium</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Free</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; border-bottom: 1px solid #dde2d8;\">Compost Bin</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Small to mid yard</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">3-6 months</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Medium</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">$30-$100</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; border-bottom: 1px solid #dde2d8;\">Tumbler</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Patio or small yard</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">4-8 weeks</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Low</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">$80-$200</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600;\">Vermicompost</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\">Indoor or balcony</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\">2-3 months</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\">Low</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\">$40-$100</td>\n                </tr>\n            </tbody>\n        </table>\n        <div style=\"margin-top: 18px; padding: 12px 15px; background-color: #dde2d8 !important; border-radius: 6px; font-size: 0.8rem; color: #1a3b2a !important;\">\n            <strong>California advantage:</strong> Our mild coastal climate means compost breaks down faster year-round compared to colder regions. In Santa Cruz, you can compost actively through every season.\n        </div>\n        <p style=\"font-size: 0.7rem; color: #8c9c8c !important; margin: 12px 0 0 0; text-align: right;\">Source: UC ANR Publication 8367, Backyard Composting</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["diy-ollas-sustainable-watering-made-simple-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Olla Sizing and Watering Radius Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Match your pot size to your planting area</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <style>\n            @media (max-width: 600px) {\n                .ah-olla-cards { flex-direction: column !important; }\n            }\n        </style>\n        <div class=\"ah-olla-cards\" style=\"display: flex; gap: 15px; flex-wrap: wrap;\">\n            <div style=\"flex: 1; min-width: 150px; background-color: #dde2d8 !important; border-radius: 8px; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 1.6rem; font-weight: 700; color: #1a3b2a !important;\">Small</div>\n                <div style=\"font-size: 0.85rem; color: #1a3b2a !important; font-weight: 600; margin-top: 4px;\">6-8 in. pots</div>\n                <div style=\"width: 60px; height: 60px; border-radius: 50%; border: 3px dashed #8c9c8c; margin: 12px auto; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: #8c9c8c !important; font-weight: 600;\">~1 qt</div>\n                <div style=\"font-size: 0.8rem; color: #1a3b2a !important; margin-top: 8px;\"><strong>Radius:</strong> 12-15 in.</div>\n                <div style=\"font-size: 0.8rem; color: #1a3b2a !important; margin-top: 4px;\"><strong>Refill:</strong> Every 2-3 days</div>\n                <div style=\"font-size: 0.75rem; color: #8c9c8c !important; margin-top: 8px;\">Herbs, lettuce, small annuals</div>\n            </div>\n            <div style=\"flex: 1; min-width: 150px; background-color: #1a3b2a !important; border-radius: 8px; padding: 18px; text-align: center; color: #f8f9f0 !important;\">\n                <div style=\"font-size: 1.6rem; font-weight: 700; color: #f8f9f0 !important;\">Medium</div>\n                <div style=\"font-size: 0.85rem; color: #f8f9f0 !important; font-weight: 600; margin-top: 4px;\">8-10 in. pots</div>\n                <div style=\"width: 75px; height: 75px; border-radius: 50%; border: 3px dashed #8c9c8c; margin: 12px auto; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: #dde2d8 !important; font-weight: 600;\">~2 qt</div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; margin-top: 8px;\"><strong>Radius:</strong> 18-24 in.</div>\n                <div style=\"font-size: 0.8rem; color: #f8f9f0 !important; margin-top: 4px;\"><strong>Refill:</strong> Every 3-5 days</div>\n                <div style=\"font-size: 0.75rem; color: #dde2d8 !important; margin-top: 8px;\">Peppers, beans, squash</div>\n            </div>\n            <div style=\"flex: 1; min-width: 150px; background-color: #dde2d8 !important; border-radius: 8px; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 1.6rem; font-weight: 700; color: #1a3b2a !important;\">Large</div>\n                <div style=\"font-size: 0.85rem; color: #1a3b2a !important; font-weight: 600; margin-top: 4px;\">10-12 in. pots</div>\n                <div style=\"width: 90px; height: 90px; border-radius: 50%; border: 3px dashed #8c9c8c; margin: 12px auto; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: #8c9c8c !important; font-weight: 600;\">~1 gal</div>\n                <div style=\"font-size: 0.8rem; color: #1a3b2a !important; margin-top: 8px;\"><strong>Radius:</strong> 24-36 in.</div>\n                <div style=\"font-size: 0.8rem; color: #1a3b2a !important; margin-top: 4px;\"><strong>Refill:</strong> Every 5-7 days</div>\n                <div style=\"font-size: 0.75rem; color: #8c9c8c !important; margin-top: 8px;\">Tomatoes, melons, fruit trees</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 18px; padding: 12px 15px; background-color: #dde2d8 !important; border-radius: 6px; font-size: 0.8rem; color: #1a3b2a !important;\">\n            <strong>Santa Cruz tip:</strong> During our dry summers (June through October), check ollas every 2 to 3 days. In foggy coastal areas, refill frequency drops significantly. Sandy soils drain faster and may need larger ollas or more frequent refills.\n        </div>\n        <p style=\"font-size: 0.7rem; color: #8c9c8c !important; margin: 12px 0 0 0; text-align: right;\">Source: UC ANR, Irrigation Methods and Water Conservation</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["diy-ollas-sustainable-watering-made-simple-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Watering Method Efficiency Comparison</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">How ollas stack up against other irrigation methods</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <style>\n            @media (max-width: 600px) {\n                .ah-olla-compare th, .ah-olla-compare td { padding: 6px 8px !important; font-size: 0.75rem !important; }\n            }\n        </style>\n        <table class=\"ah-olla-compare\" style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem;\">\n            <thead>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <th style=\"padding: 10px 12px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Method</th>\n                    <th style=\"padding: 10px 12px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Efficiency</th>\n                    <th style=\"padding: 10px 12px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Evaporation</th>\n                    <th style=\"padding: 10px 12px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Setup Cost</th>\n                    <th style=\"padding: 10px 12px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Maintenance</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; border-bottom: 1px solid #dde2d8;\">Overhead Sprinkler</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">~40-50%</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Very High</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">$20-$60</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Low</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; border-bottom: 1px solid #dde2d8;\">Hand Watering</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">~50-60%</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">High</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">$10-$25</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Daily effort</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; border-bottom: 1px solid #dde2d8;\">Soaker Hose</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">~70-80%</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Moderate</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">$15-$40</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Seasonal replace</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; border-bottom: 1px solid #dde2d8;\">Drip Irrigation</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">~80-90%</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Low</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">$50-$200</td>\n                    <td style=\"padding: 10px 12px; text-align: center; border-bottom: 1px solid #dde2d8;\">Seasonal check</td>\n                </tr>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 700; color: #f8f9f0 !important;\">Ollas</td>\n                    <td style=\"padding: 10px 12px; text-align: center; font-weight: 700; color: #f8f9f0 !important;\">~90-95%</td>\n                    <td style=\"padding: 10px 12px; text-align: center; font-weight: 700; color: #f8f9f0 !important;\">Minimal</td>\n                    <td style=\"padding: 10px 12px; text-align: center; font-weight: 700; color: #f8f9f0 !important;\">$5-$15 DIY</td>\n                    <td style=\"padding: 10px 12px; text-align: center; font-weight: 700; color: #f8f9f0 !important;\">Refill only</td>\n                </tr>\n            </tbody>\n        </table>\n        <div style=\"margin-top: 18px; padding: 12px 15px; background-color: #dde2d8 !important; border-radius: 6px; font-size: 0.8rem; color: #1a3b2a !important;\">\n            <strong>Why ollas excel in California:</strong> Water seeps through the unglazed terracotta walls only when surrounding soil is dry, delivering moisture directly to the root zone with near-zero evaporation. During Santa Cruz's dry summers, this can reduce water use by up to 70% compared window.AH_GRAPHICS["eco-friendly-gardening-santa-cruz-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Eco-Friendly Gardening Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Sustainable practices for Santa Cruz County gardens</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <style>\n            .ah-eco-category { margin-bottom: 20px; }\n            .ah-eco-category:last-child { margin-bottom: 0; }\n            .ah-eco-cat-title { font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 10px 0; padding-bottom: 6px; border-bottom: 2px solid #1a3b2a; }\n            .ah-eco-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; padding: 8px 12px; background-color: #fff !important; border-radius: 6px; border-left: 3px solid #1a3b2a; }\n            .ah-eco-check { width: 18px; height: 18px; border: 2px solid #1a3b2a; border-radius: 3px; flex-shrink: 0; margin-top: 1px; }\n            .ah-eco-text { font-size: 0.82rem; color: #333 !important; line-height: 1.4; }\n            @media (max-width: 600px) {\n                .ah-eco-item { padding: 6px 10px; }\n            }\n        </style>\n        <div class=\"ah-eco-category\">\n            <h3 class=\"ah-eco-cat-title\">Organic Practices</h3>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Switch from synthetic fertilizer to compost and organic amendments</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Use companion planting for natural pest management</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Encourage beneficial insects (ladybugs, lacewings, parasitic wasps)</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Reserve even organic pesticides for genuine emergencies only</span></div>\n        </div>\n        <div class=\"ah-eco-category\">\n            <h3 class=\"ah-eco-cat-title\">Water Conservation</h3>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Install drip irrigation (saves 30-50% vs. sprinklers)</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Mulch all beds with 3-4 inches of organic material</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Set up at least one rain barrel for dry-season watering</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Water deeply but infrequently, always in the morning</span></div>\n        </div>\n        <div class=\"ah-eco-category\">\n            <h3 class=\"ah-eco-cat-title\">Biodiversity</h3>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Add at least 3 California native plants to your garden</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Provide a shallow water source for pollinators</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Leave some \"messy\" areas for wildlife habitat</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Reduce outdoor lighting to protect nocturnal pollinators</span></div>\n        </div>\n        <div class=\"ah-eco-category\">\n            <h3 class=\"ah-eco-cat-title\">Soil Health</h3>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Add 2-4 inches of compost to vegetable beds each year</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Minimize tilling; top-dress instead and let worms do the mixing</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Plant cover crops in the off-season (bell beans, crimson clover, rye)</span></div>\n            <div class=\"ah-eco-item\"><div class=\"ah-eco-check\"></div><span class=\"ah-eco-text\">Keep soil covered at all times with mulch or living plants</span></div>\n        </div>\n    </div>\n    <div style=\"padding: 12px 20px; background-color: #dde2d8 !important;\">\n        <p style=\"margin: 0; font-size: 0.75rem; color: #1a3b2a !important; line-height: 1.4; text-align: center;\"><strong>Start small:</strong> Pick one category to focus on this season. Small changes accumulate into a healthier garden and a healthier ecosystem.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["eco-friendly-gardening-santa-cruz-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Conventional vs. Eco-Friendly Alternatives</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Simple swaps for a more sustainable Santa Cruz garden</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <style>\n            .ah-compare-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }\n            .ah-compare-table th { background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 14px; text-align: left; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }\n            .ah-compare-table td { padding: 12px 14px; border-bottom: 1px solid #dde2d8; vertical-align: top; line-height: 1.5; }\n            .ah-compare-table tr:nth-child(even) { background-color: #f0f2ec !important; }\n            .ah-compare-table tr:hover { background-color: #dde2d8 !important; }\n            .ah-conv-label { color: #8c9c8c !important; font-weight: 600; }\n            .ah-eco-label { color: #1a3b2a !important; font-weight: 700; }\n            .ah-why-text { font-size: 0.75rem; color: #8c9c8c !important; font-style: italic; margin-top: 3px; }\n            @media (max-width: 600px) {\n                .ah-compare-table { font-size: 0.75rem; }\n                .ah-compare-table th, .ah-compare-table td { padding: 8px 8px; }\n            }\n        </style>\n        <table class=\"ah-compare-table\">\n            <thead>\n                <tr>\n                    <th>Category</th>\n                    <th>Conventional</th>\n                    <th>Eco-Friendly Alternative</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr>\n                    <td><strong>Fertilizer</strong></td>\n                    <td class=\"ah-conv-label\">Synthetic fertilizers (Miracle-Gro, etc.)</td>\n                    <td><span class=\"ah-eco-label\">Compost, worm castings, fish emulsion</span><div class=\"ah-why-text\">Feeds soil life, not just plants; won't contaminate groundwater</div></td>\n                </tr>\n                <tr>\n                    <td><strong>Pest Control</strong></td>\n                    <td class=\"ah-conv-label\">Broad-spectrum chemical sprays</td>\n                    <td><span class=\"ah-eco-label\">Beneficial insects, hand-picking, row covers</span><div class=\"ah-why-text\">Preserves natural predators that prevent future outbreaks</div></td>\n                </tr>\n                <tr>\n                    <td><strong>Weed Control</strong></td>\n                    <td class=\"ah-conv-label\">Herbicides (Roundup / glyphosate)</td>\n                    <td><span class=\"ah-eco-label\">Mulch, hand-weeding, cover crops</span><div class=\"ah-why-text\">Glyphosate is a probable carcinogen detected in CA waterways</div></td>\n                </tr>\n                <tr>\n                    <td><strong>Watering</strong></td>\n                    <td class=\"ah-conv-label\">Overhead sprinklers, daily watering</td>\n                    <td><span class=\"ah-eco-label\">Drip irrigation, deep infrequent watering</span><div class=\"ah-why-text\">Saves 30-50% water; reduces disease from wet foliage</div></td>\n                </tr>\n                <tr>\n                    <td><strong>Soil Prep</strong></td>\n                    <td class=\"ah-conv-label\">Rototilling each season</td>\n                    <td><span class=\"ah-eco-label\">Top-dress with compost, broadfork if needed</span><div class=\"ah-why-text\">Preserves fungal networks and soil structure</div></td>\n                </tr>\n                <tr>\n                    <td><strong>Off-Season</strong></td>\n                    <td class=\"ah-conv-label\">Bare soil left exposed</td>\n                    <td><span class=\"ah-eco-label\">Cover crops (bell beans, clover, rye)</span><div class=\"ah-why-text\">Prevents erosion, fixes nitrogen, feeds soil biology</div></td>\n                </tr>\n                <tr>\n                    <td><strong>Plant Selection</strong></td>\n                    <td class=\"ah-conv-label\">Ornamentals requiring heavy irrigation</td>\n                    <td><span class=\"ah-eco-label\">CA natives, Mediterranean plants, drought-tolerant edibles</span><div class=\"ah-why-text\">Evolved for our climate; supports local pollinators and wildlife</div></td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 12px 20px; background-color: #f8f9f0 !important; border-top: 1px solid #dde2d8;\">\n        <p style=\"margin: 0; font-size: 0.75rem; color: #8c9c8c !important; line-height: 1.4;\">Sources: UC Integrated Pest Management Program (ipm.ucanr.edu); UC Master Gardener Program of Santa Cruz County; Santa Cruz County recycling and composting programs.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

ight: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Transplant tomatoes, peppers, eggplant, and basil</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Direct-sow summer squash, cucumbers, and melons</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Plant corn in blocks of at least four rows</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Succession-sow bush beans every two weeks</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Last window to direct-sow carrots and beets</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 16px; color: #1a3b2a !important;\">\u25cf</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Harvest</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Pick peas daily to keep plants producing</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Harvest strawberries as they ripen</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Shell fava beans when pods are plump</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Cut artichoke central bud, then side buds</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Harvest spring lettuce before it bolts</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 15px; color: #1a3b2a !important;\">\u2699</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Maintain</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Set up tomato cages or stakes at planting time</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Install drip irrigation for summer beds</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Side-dress heavy feeders every 3 to 4 weeks</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Thin fruit on apple, pear, and stone fruit trees</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Mulch everything to 3 inches</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 15px; color: #1a3b2a !important;\">\u26a0</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Watch For</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Cabbage loopers laying eggs on brassicas (check leaf undersides)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Aphids on new growth (ladybugs and lacewings are best control)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Powdery mildew on squash in foggy coastal areas</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Late transplant shock (harden off seedlings before planting out)</span></div></div></div></div><div style=\"margin: 0 16px; padding: 14px 18px; background: #ffffff; border: 1px solid #dde2d8; border-radius: 5px;\"><div style=\"font-size: 11px; font-weight: 700; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;\">Quick Tips</div><div style=\"display: flex; flex-wrap: wrap; gap: 8px 24px;\"><div style=\"flex: 1 1 200px; font-size: 12px; color: #1a3b2a !important; line-height: 1.5; padding-left: 12px; border-left: 2px solid #dde2d8;\">Thin fruit to one piece every 6 to 8 inches on branches for better size and to prevent limb breakage.</div><div style=\"flex: 1 1 200px; font-size: 12px; color: #1a3b2a !important; line-height: 1.5; padding-left: 12px; border-left: 2px solid #dde2d8;\">Plant sweet alyssum near vegetable beds to attract beneficial insects.</div><div style=\"flex: 1 1 200px; font-size: 12px; color: #1a3b2a !important; line-height: 1.5; padding-left: 12px; border-left: 2px solid #dde2d8;\">Costata Romanesco zucchini and Lemon cucumber are standout varieties for our climate.</div></div></div><div style=\"background: #1a3b2a; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; margin-top: 12px;\"><span style=\"font-size: 12px; font-weight: 600; color: #ffffff !important; letter-spacing: 0.3px;\">ambitiousharvest.com</span><a class=\"print-link\" href=\"javascript:window.print()\" style=\"font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8) !important; text-decoration: none; cursor: pointer;\">Print this checklist</a></div></div>";
