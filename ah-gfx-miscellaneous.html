window.AH_GRAPHICS["santa-cruz-garden-checklist-april-g1"] = "<div class=\"checklist-wrapper\" style=\"font-family: 'Montserrat', system-ui, sans-serif; max-width: 760px; margin: 2em auto; background: #ffffff; box-shadow: 0 2px 16px rgba(0,0,0,0.08); border-radius: 6px; overflow: hidden; line-height: 1.45;\"><div style=\"background: #1a3b2a; padding: 28px 32px 22px 32px; text-align: center;\"><div style=\"font-size: 28px; font-weight: 700; color: #ffffff !important; letter-spacing: 0.5px; margin: 0 0 4px 0;\">April Garden Checklist</div><div style=\"font-size: 15px; font-weight: 400; color: rgba(255,255,255,0.7) !important; letter-spacing: 0.3px;\">Santa Cruz County</div></div><div style=\"margin: 16px 16px 0 16px; background: #f8f9f0; border-left: 4px solid #1a3b2a; padding: 14px 18px; border-radius: 0 5px 5px 0;\"><div style=\"font-size: 11px; font-weight: 700; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;\">This Month's Priority</div><div style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; line-height: 1.45;\">Get your tomatoes and peppers in the ground with cages, drip irrigation, and mulch all in place at planting time. A strong start now means weeks of extra harvest later.</div></div><div style=\"display: flex; flex-wrap: wrap; padding: 16px 16px 8px 16px; gap: 16px;\"><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 16px; color: #1a3b2a !important;\">\u2618</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Plant</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Transplant tomatoes, peppers, eggplant, and basil</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Direct-sow summer squash, cucumbers, and melons</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Plant corn in blocks of at least four rows</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Succession-sow bush beans every two weeks</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Last window to direct-sow carrots and beets</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 16px; color: #1a3b2a !important;\">\u25cf</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Harvest</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Pick peas daily to keep plants producing</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Harvest strawberries as they ripen</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Shell fava beans when pods are plump</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Cut artichoke central bud, then side buds</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Harvest spring lettuce before it bolts</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 15px; color: #1a3b2a !important;\">\u2699</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Maintain</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Set up tomato cages or stakes at planting time</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Install drip irrigation for summer beds</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Side-dress heavy feeders every 3 to 4 weeks</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Thin fruit on apple, pear, and stone fruit trees</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Mulch everything to 3 inches</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 15px; color: #1a3b2a !important;\">\u26a0</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Watch For</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Cabbage loopers laying eggs on brassicas (check leaf undersides)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Aphids on new growth (ladybugs and lacewings are best control)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Powdery mildew on squash in foggy coastal areas</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Late transplant shock (harden off seedlings before planting out)</span></div></div></div></div><div style=\"margin: 0 16px; padding: 14px 18px; background: #ffffff; border: 1px solid #dde2d8; border-radius: 5px;\"><div style=\"font-size: 11px; font-weight: 700; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;\">Quick Tips</div><div style=\"display: flex; flex-wrap: wrap; gap: 8px 24px;\"><div style=\"flex: 1 1 200px; font-size: 12px; color: #1a3b2a !important; line-height: 1.5; padding-left: 12px; border-left: 2px solid #dde2d8;\">Thin fruit to one piece every 6 to 8 inches on branches for better size and to prevent limb breakage.</div><div style=\"flex: 1 1 200px; font-size: 12px; color: #1a3b2a !important; line-height: 1.5; padding-left: 12px; border-left: 2px solid #dde2d8;\">Plant sweet alyssum near vegetable beds to attract beneficial insects.</div><div style=\"flex: 1 1 200px; font-size: 12px; color: #1a3b2a !important; line-height: 1.5; padding-left: 12px; border-left: 2px solid #dde2d8;\">Costata Romanesco zucchini and Lemon cucumber are standout varieties for our climate.</div></div></div><div style=\"background: #1a3b2a; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; margin-top: 12px;\"><span style=\"font-size: 12px; font-weight: 600; color: #ffffff !important; letter-spacing: 0.3px;\">ambitiousharvest.com</span><a class=\"print-link\" href=\"javascript:window.print()\" style=\"font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8) !important; text-decoration: none; cursor: pointer;\">Print this checklist</a></div></div>";

window.AH_GRAPHICS["artichokes-vs-cardoon-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Artichokes vs. Cardoon: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Artichokes</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Cardoon</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Edible Part</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Flower buds (hearts and leaves)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Leaf stalks (blanched and cooked)</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Plant Size</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">4-5 feet tall, 4-6 feet wide</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">6-8 feet tall, 4-6 feet wide</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Kitchen Prep</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Steam, roast, or grill buds</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Must blanch, peel, and cook stalks</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Maintenance</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Cut back after harvest; divide every 3-4 years</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Blanch stalks 3-4 weeks before harvest</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Ornamental Value</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">High; dramatic silvery foliage</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Very high; tall, architectural, stunning flowers</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["blossom-end-rot-vs-sunscald-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Blossom End Rot vs. Sunscald: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Blossom End Rot</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Sunscald</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Appearance</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Dark brown/black, sunken, leathery patch on bottom</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">White/yellow, papery, blistered area on sun-facing side</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Location on Fruit</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Bottom of fruit (opposite the stem)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Side or top facing direct sunlight</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Cause</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Calcium deficiency from inconsistent watering</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Direct sun exposure on unshaded fruit</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Affected Plants</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Tomatoes, peppers, squash, eggplant</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Tomatoes, peppers (especially after heavy pruning)</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Prevention</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Consistent watering, mulch, avoid root disturbance</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Maintain leaf canopy, shade cloth, avoid over-pruning</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["bt-vs-hand-picking-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">BT vs. Hand-Picking: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">BT (Bacillus thuringiensis)</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Hand-Picking</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Effectiveness</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">High; kills caterpillars that eat treated leaves</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">High for small gardens; limited by your time</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Speed</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Caterpillars stop feeding within hours, die in 2 to 3 days</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Immediate removal</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Coverage</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Treats entire plants, including hidden larvae</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Only removes caterpillars you can see and reach</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Impact on Beneficials</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Only affects caterpillars (Lepidoptera larvae)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Zero impact on any other organisms</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Cost</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$10 to $15 per bottle (lasts a season)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Free (costs time only)</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["california-poppy-meaning-benefits-and-uses-beyond-the-garden-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Traditional vs. Modern Uses and Research Support</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Traditional and modern uses of California poppy with research support\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Use</th>\n        <th scope=\"col\">Traditional Description</th>\n        <th scope=\"col\">Modern Herbal Use</th>\n        <th scope=\"col\">Research Support</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Sleep / sedation</th>\n        <td>\n          Whole-plant preparations used for rest; commonly described as a\n          children\u2019s sleep aid\n        </td>\n        <td>\n          Tinctures and teas for mild insomnia, often combined with other\n          sedative herbs\n        </td>\n        <td>\n          Animal studies support sedative effects; human trials are limited\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Anxiety / stress</th>\n        <td>\n          Calming preparations for nervousness and agitation\n        </td>\n        <td>\n          Daytime use for mild anxiety; commonly described as \u201cnervine\u201d support\n        </td>\n        <td>\n          Animal studies show anxiolytic effects; GABA receptor interactions\n          identified\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Pain relief</th>\n        <td>\n          Root chewed for toothache; preparations used for headaches\n        </td>\n        <td>\n          Mild analgesic included in some herbal formulas\n        </td>\n        <td>\n          Animal studies demonstrate antinociceptive (pain-relieving) effects\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Children\u2019s use</th>\n window.AH_GRAPHICS["fabric-grow-bags-vs-plastic-pots-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Fabric Grow Bags vs. Plastic Pots: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Fabric Grow Bags</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Plastic Pots</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Root Health</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Excellent; air pruning prevents root circling</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Fair; roots circle and can become rootbound</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Watering Frequency</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Higher; fabric dries out faster</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Lower; plastic retains moisture longer</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Temperature</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Cooler roots; breathability prevents overheating</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Can overheat in dark colors and full sun</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Durability</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">3-5 seasons; fabric degrades with UV exposure</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">5-10+ years; durable but brittle over time</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Cost (5-gallon)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$2-5 each</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">$3-10 each (nursery pots often free)</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["fall-planting-vs-spring-planting-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Fall Planting vs. Spring Planting: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Fall Planting</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Spring Planting</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Root Establishment</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Excellent; 5-6 months of cool-weather root growth</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Limited; heat stress arrives within weeks</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Water Needs</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !i
