a !important; font-weight: 600;\">DEPTH</p> <p style=\"margin: 0; font-size: 1.1rem; color: #1a3b2 !importanta !important; font-weight: 700;\">12-16 in</p> </div> <div style=\"background-color: #dde2d !important8 !important; padding: 10px; border-radius: 3px; text-align: center;\"> <p style=\"margin: 0 0 3px 0; font-size: 0.75rem; color: #1a3b2 !importanta !important; font-weight: 600;\">WEIGHT</p> <p style=\"margin: 0; font-size: 1.1rem; color: #1a3b2 !importanta !important; font-weight: 700;\">12-20 lbs</p> </div> </div> <p style=\"font-weight: 600; color: #1a3b2 !importanta !important; margin: 0 0 8px 0; font-size: 0.85rem;\">Best For:</p> <ul style=\"margin: 0; padding-left: 18px; color: #1c3c2c !important; font-size: 0.85rem; line-height: 1.6;\"> <li>Aerating beds without turning</li> <li>No-till and no-dig methods</li> <li>Preserving soil structure</li> <li>Deep compaction relief</li> </ul> </div> </div> <div style=\"background-color: #c5a55 !importanta !important; padding: 16px 20px; text-align: center;\"> <p style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2 !importanta !important; margin: 0; line-height: 1.5;\">For no-till gardens, a broadfork loosens soil without destroying structure. A garden fork is the better all-purpose tool.</p> </div> <div style=\"background-color: #1a3b2 !importanta !important; color: #f8f9f !important0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div> </div>";

window.AH_GRAPHICS["garden-highlight-california-poppy-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">When to Sow California Poppies in Santa Cruz County</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"When to Sow California Poppies in Santa Cruz County\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Sowing Window</th>\n        <th scope=\"col\">Soil Conditions</th>\n        <th scope=\"col\">Germination &amp; Establishment</th>\n        <th scope=\"col\">Bloom Timing</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Fall (October through December)</th>\n        <td>Cooling soil (50 to 65\u00b0F), first fall rains</td>\n        <td>\n          Seeds germinate with fall/early winter rains; plants form low rosettes and develop deep taproots\n        </td>\n        <td>\n          Earliest and longest bloom; flowers begin early to mid-spring and continue into early summer\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Early spring (February through March)</th>\n        <td>Soil cooling from winter but beginning to warm; still within 50 to 65\u00b0F</td>\n        <td>Germination in 10 to 21 days; root systems shallower than fall-sown plants</td>\n        <td>Bloom begins later (mid to late spring) and often ends earlier as heat arrives</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Summer (late spring through summer)</th>\n        <td>Warm to hot soil (above 65\u00b0F); typically dry</td>\n        <td>Seeds sit dormant and wait until conditions cool; spotty germination</td>\n        <td>Effectively becomes delayed fall sowing; no same-season bloom</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["garden-highlight-california-poppy-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">California Poppies in Santa Cruz Microclimates</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"California Poppies in Santa Cruz Microclimates\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Microclimate</th>\n        <th scope=\"col\">Typical Conditions</th>\n        <th scope=\"col\">Expected Bloom Behavior</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Coastal (Aptos, Capitola, Live Oak, Santa Cruz beaches)</th>\n        <td>\n          Cool, foggy mornings; mild days; sandy or well-drained soils; winter rain, dry summers\n        </td>\n        <td>\n          Bloom may start slightly later but often lasts longer into summer thanks to moderate temperatures\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">San Lorenzo Valley (Boulder Creek, Ben Lomond, Felton)</th>\n        <td>\n          Hotter summer highs and colder winter lows than coast; redwood shade in canyons; mixed/clay soils\n        </td>\n        <td>\n          Full-sun exposures bloom early and may finish by late spring/early summer; shaded canyon bottoms are\n          often too dark for strong flowering\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Inland hills &amp; valleys (Scotts Valley, Soquel hills)</th>\n        <td>\n          Moderate inland climate; less fog than coast but cooler than Pajaro Valley; mixed soil textures\n        </td>\n        <td>\n          Fall or early spring sowing typically gives mid-spring to early-summer bloom; a good compromise between\n          coastal and valley timing\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Pajaro Valley (Watsonville)</th>\n        <td>\n          Warmer valley conditions; strong agricultural soils; less fog, more heat accumulation\n        </td>\n        <td>\n          Poppies may germinate and bloom earlier than coastal plantings; bloom can end earlier as summer heat builds\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["garden-highlight-california-poppy-g3"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Soil/Light Conditions and Results</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Soil and light conditions and expected results for California poppies\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Conditions</th>\n        <th scope=\"col\">What to Expect</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Full sun + lean, well-drained soil</th>\n        <td>Compact plants, abundant blooms, long flowering season</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Partial shade + rich soil</th>\n        <td>Leggy growth, fewer flowers, increased disease risk</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Full sun + heavy clay (poor drainage)</th>\n        <td>Risk of root rot; improve drainage or plant on mounds</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Full sun + sandy coastal soil</th>\n        <td>Excellent results; natural poppy habitat</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["garden-highlight-california-poppy-g4"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Troubleshooting Common Problems</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Troubleshooting common California poppy growing problems\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Problem</th>\n        <th scope=\"col\">Likely Cause</th>\n        <th scope=\"col\">Solution</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Seeds don\u2019t germinate</th>\n        <td>\n          Sown in warm soil (above 65\u00b0F); seeds buried too deeply; poor\n          seed-to-soil contact; old seed\n        </td>\n        <td>\n          Sow in fall or early spring when soil is cool; press seeds into the\n          surface; avoid covering more than 1/8 inch; use fresh seed\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Leggy, sparse plants</th>\n        <td>\n          Insufficient sunlight (less than 6 hours of direct sun); too much\n          competition from weeds\n        </td>\n        <td>\n          Move future seedings to full-sun sites; clear weeds thoroughly before\n          sowing\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Plants rot or collapse</th>\n        <td>\n          Poor drainage or overwatering; heavy clay soils that stay wet\n        </td>\n        <td>\n          Plant on slopes or mounds; improve drainage; stop watering once\n          established\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Very short bloom season</th>\n        <td>\n          Hot temperatures arriving early; shallow roots from late sowing\n        </td>\n        <td>\n          Prefer fall sowing for deeper roots; coastal sites naturally have\n          longer seasons\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Mixed colors turning orange</th>\n        <td>\n          Open pollination and genetic dominance of orange\n        </td>\n        <td>\n          Enjoy the natural shift, or reseed periodically with purchased color\n          mixes\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Aphids on plants</th>\n        <td>\n          Common in cool, moist spring weather\n        </td>\n        <td>\n          Spray off with water; let beneficial insects handle them; avoid excess\n          nitrogen\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["garden-myth-organic-pesticides-always-safe-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"> <div style=\"background-color: #1a3b2 !importanta !important; color: #f8f9f !important0 !important; padding: 20px 25px; text-align: center;\"> <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f !important0 !important;\">Common Organic Pesticides: Safety at a Glance</h2> <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f !important0 !important;\">What every California gardener should know before spraying</p> </div> <div style=\"overflow-x: auto; background-color: #f8f9f !important0 !important;\"> <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\"> <thead> <tr> <th style=\"background-color: #1a3b2 !importanta !important; color: #f8f9f !important0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Pesticide</th> <th style=\"background-color: #1a3b2 !importanta !important; color: #f8f9f !important0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Source</th> <th style=\"background-color: #1a3b2 !importanta !important; color: #f8f9f !important0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Target Pests</th> <th style=\"background-color: #1a3b2 !importanta !important; color: #f8f9f !important0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Safety Notes</th> </tr> </thead> <tbody> <tr style=\"border-bottom: 1px solid #dde2d8;\"> <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2 !importanta !important;\">Neem Oil</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Neem tree seeds</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Aphids, whiteflies, mites, fungal diseases</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Can harm beneficial insects if sprayed directly. Apply in evening only. Toxic to aquatic organisms.</td> </tr> <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f !important0 !important;\"> <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2 !importanta !important;\">Diatomaceous Earth</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fossilized algae (silica)</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Slugs, ants, earwigs, crawling insects</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Inhaling dust irritates lungs. Use food-grade only. Kills any soft-bodied insect on contact, including beneficials.</td> </tr> <tr style=\"border-bottom: 1px solid #dde2d8;\"> <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2 !importanta !important;\">Pyrethrin</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Chrysanthemum flowers</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Broad-spectrum (most insects)</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Highly toxic to bees, fish, and aquatic life. Kills beneficial insects. Breaks down quickly in sunlight.</td> </tr> <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f !important0 !important;\"> <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2 !importanta !important;\">Bt (Bacillus thuringiensis)</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Soil bacterium</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Caterpillars (Btk), mosquito larvae (Bti)</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Very selective. Safe for bees, birds, and mammals. One of the lowest-risk organic options.</td> </tr> <tr style=\"border-bottom: 1px solid #dde2d8;\"> <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2 !importanta !important;\">Insecticidal Soap</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Potassium salts of fatty acids</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Aphids, mealybugs, soft-bodied insects</td> <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Low toxicity to humans and pets. Can burn leaves in hot sun. Must contact pest directly to work.</td> </tr> </tbody> </table> </div> <div style=\"background-color: #c5a55 !importanta !important; padding: 16px 20px; text-align: center;\"> <p style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2 !importanta !important; margin: 0; line-height: 1.5;\">Organic does not mean harmless. Always read the label and follow UC IPM guidelines.</p> </div> <div style=\"background-color: #1a3b2 !importanta !important; color: #f8f9f !important0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div> </div>";

window.AH_GRAPHICS["gardening-coastal-aptos-capitola-santa-cruz-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Coastal vs. Inland at a Glance\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Feature</th>\n        <th scope=\"col\">Coastal (Aptos, Capitola)</th>\n        <th scope=\"col\">Typical inland (San Lorenzo Valley, Watsonville)</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Summer highs</th>\n        <td>Mostly 60s to low 70s; rarely above 80\u00b0F</td>\n        <td>Often 80s to 90s; heat waves can reach the 100s in some areas</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Winter lows</th>\n        <td>Rarely below the upper 30s to low 40s</td>\n        <td>More frequent dips to the low 30s; occasional frost</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Daily temperature swing</th>\n        <td>About 10 to 15\u00b0F</td>\n        <td>Commonly around 30\u00b0F</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Fog</th>\n        <td>Frequent summer marine layer, especially in the mornings</td>\n        <td>Much less common inland</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Best crops</th>\n        <td>\n          Cool-season vegetables, artichokes,\n          berries, leafy greens\n        </td>\n        <td>\n          Tomatoes, melons, peppers,\n          and other heat-loving crops\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["gardening-coastal-aptos-capitola-santa-cruz-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Crop Suitability for Coastal Gardens\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Crop group</th>\n        <th scope=\"col\">Coastal verdict</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Lettuce and salad greens</th>\n        <td>Star crops; can be grown much of the year</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Brassicas (broccoli, kale, cabbage)</th>\n        <td>Excellent quality; fall and winter standouts</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Peas and root crops</th>\n        <td>Very good performance; sweet flavor in cool temperatures</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Artichokes and strawberries</th>\n        <td>Ideal coastal perennials; strong local growing history</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Tomatoes</th>\n        <td>Reliable only with early or fog-tolerant varieties</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Peppers, eggplant, melons, okra</th>\n        <td>Generally poor performance; require more heat and longer seasons</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["gardening-in-the-san-lorenzo-valley-sunny-ridges-vs-shaded-canyons-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Two San Lorenzo Valley Worlds at a Glance\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Feature</th>\n        <th scope=\"col\">Sunny ridges and chaparral</th>\n        <th scope=\"col\">Under redwoods and shaded canyons</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Typical summer highs</th>\n        <td>Often 80s\u201390s (hotter in heat waves)</td>\n        <td>About 10\u201315\u00b0F cooler than nearby sunny slopes</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Sun</th>\n        <td>8+ hours (full sun)</td>\n        <td>2\u20136 hours (dappled shade)</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Soil</th>\n        <td>Rocky / decomposed granite or clay; generally well-drained</td>\n        <td>Often acidic with high organic matter; tends to stay moist</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Best crops</th>\n        <td>\n          Tomatoes, peppers, melons, corn,\n          Mediterranean herbs, stone fruit\n        </td>\n        <td>\n          Lettuce and greens through summer, shade-tolerant herbs,\n          cool-season crops, blueberries\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Biggest challenges</th>\n        <td>Heat stress, fast bolting, higher irrigation demand</td>\n        <td>Low light, disease pressure, and soil pH that can be too acidic for some vegetables</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["gardening-in-the-san-lorenzo-valley-sunny-ridges-vs-shaded-canyons-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Crop Planning by Microclimate\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Crop type</th>\n        <th scope=\"col\">Sunny ridge verdict</th>\n        <th scope=\"col\">Under redwoods verdict</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Tomatoes</th>\n        <td>Star crop; most varieties perform well with an extended season</td>\n        <td>Only in 6\u20138+ hours of sun; choose early varieties</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Lettuce and salad greens</th>\n        <td>Great fall through spring; bolt fast in summer heat</td>\n        <td>Signature crop; can grow through much of summer</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Peppers and eggplant</th>\n        <td>Excellent; heat-loving and productive</td>\n        <td>Usually not worth it without a hot, sunny clearing</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Melons</th>\n        <td>Thrive in your heat</td>\n        <td>Need too much sun and sustained warmth</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Blueberries</th>\n        <td>Can do well with irrigation; prefers acidic soil</td>\n        <td>Ideal; naturally acidic soil and part shade are a good match</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Cool-season crops</th>\n        <td>Excellent fall through spring</td>\n        <td>Extended season; often a specialty in shaded gardens</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["gardening-in-watsonville-amp-the-pajaro-valley-making-the-most-of-our-warmest-microclimate-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Regional Climate Comparison at a Glance\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Feature</th>\n        <th scope=\"col\">Pajaro Valley</th>\n        <th scope=\"col\">Coast (Aptos / Capitola)</th>\n        <th scope=\"col\">Hot mountains (SLV ridges)</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Summer highs</th>\n        <td>Often upper 70s to mid-80s.</td>\n        <td>Mostly 60s to low-70s.</td>\n        <td>Frequently 80s\u201390s; hotter during heat waves.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Winter lows</th>\n        <td>Rarely below freezing.</td>\n        <td>Rarely below the upper 30s.</td>\n        <td>More frost pockets, especially in valleys.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Fog</th>\n        <td>Less fog than the immediate coast.</td>\n        <td>Frequent marine layer, especially mornings.</td>\n        <td>Minimal fog influence.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Growing season</th>\n        <td>Very long; warm conditions from roughly May through November.</td>\n        <td>Cool overall; shorter and gentler warm-season window.</td>\n        <td>Warm but with higher heat stress and irrigation demand.</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["gardening-in-watsonville-amp-the-pajaro-valley-making-the-most-of-our-warmest-microclimate-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Crop Suitability for Pajaro Valley Gardens\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Crop type</th>\n        <th scope=\"col\">Pajaro Valley verdict</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Tomatoes (early, mid, heirloom)</th>\n        <td>Excellent; full range possible with a long, warm season and extended fall harvest.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Peppers, eggplant, melons</th>\n        <td>Reliable performers with sufficient heat and season length.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Summer &amp; winter squash, corn, beans</th>\n        <td>Very good; multiple successions often possible.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Strawberries &amp; caneberries</th>\n        <td>Ideal conditions; region supports strong commercial production.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Brassicas, lettuce, root crops (cool-season)</th>\n        <td>Strong fall through spring performance; some summer success with shade or careful timing.</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["grow-radishes-santa-cruz-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Choosing Varieties for Santa Cruz Conditions</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Choosing radish varieties for Santa Cruz County conditions\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Season</th>\n        <th scope=\"col\">Best Varieties</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Spring (Feb\u2013Apr)</th>\n        <td>Cherry Belle, French Breakfast, Easter Egg</td>\n        <td>\n          Fast-maturing varieties that perform well before weather warms\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Summer (coastal only)</th>\n        <td>French Breakfast, White Icicle</td>\n        <td>\n          Choose bolt-resistant types; plant in partial shade to reduce heat stress\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Fall (Sept\u2013Nov)</th>\n        <td>Watermelon, Daikon, Black Spanish, spring types</td>\n        <td>\n          Best season for storage radishes; cooler soil improves flavor and texture\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Winter (Dec\u2013Jan)</th>\n        <td>Spring varieties in mild years</td>\n        <td>\n          May need protection from heavy rain or prolonged cold snaps\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["grow-radishes-santa-cruz-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Santa Cruz County Planting Calendar</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Santa Cruz County radish planting calendar\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Planting Window</th>\n        <th scope=\"col\">Best For</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">February through April</th>\n        <td>Spring radishes</td>\n        <td>\n          Prime radish season across the county; most reliable results\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">May through June</th>\n        <td>Coastal gardens only</td>\n        <td>\n          Choose bolt-resistant varieties; expect mixed results inland as heat builds\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">July through August</th>\n        <td>Not recommended</td>\n        <td>\n          Too hot for consistent results even along the coast; wait for fall\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">September through November</th>\n        <td>All types, including storage radishes</td>\n        <td>\n          Excellent fall planting window; best season for Watermelon and Daikon types\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">December through January</th>\n        <td>Spring varieties</td>\n        <td>\n          Possible in mild winters; may require protection from heavy rain\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["grow-radishes-santa-cruz-g3"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Problems and Solutions</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Common radish problems and solutions\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Problem</th>\n        <th scope=\"col\">Likely Cause</th>\n        <th scope=\"col\">Solution</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">All leaves, tiny roots</th>\n        <td>\n          Excess nitrogen; too much shade; seedlings left crowded\n        </td>\n        <td>\n          Plant in leaner soil, provide full sun, and thin seedlings properly\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Cracked or split roots</th>\n        <td>\n          Inconsistent watering\n        </td>\n        <td>\n          Water consistently; avoid letting soil dry out completely and then flooding\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Pithy or woody texture</th>\n        <td>\n          Roots left in the ground too long; heat stress\n        </td>\n        <td>\n          Harvest promptly and prioritize planting during cooler seasons\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Very hot, harsh flavor</th>\n        <td>\n          Drought stress; heat stress; overmaturity\n        </td>\n        <td>\n          Water consistently, plant in cooler weather, and harvest at a younger stage\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Forked or misshapen roots</th>\n        <td>\n          Rocky soil; recent heavy amendments\n        </td>\n        <td>\n          Prepare soil deeply, remove rocks, and avoid chunky or undecomposed compost\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Bolting (flower stalk)</th>\n        <td>\n          Heat, long days, or general plant stress\n        </td>\n        <td>\n          Plant in cool seasons, succession sow, and maintain even moisture\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Slow germination</th>\n        <td>\n          Cold soil; old seed\n        </td>\n        <td>\n          Wait for warmer soil temperatures and use fresh seed\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["growing-cosmos-flowers-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Cosmos Species at a Glance</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Cosmos species comparison at a glance\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Species</th>\n        <th scope=\"col\">Growth Habit</th>\n        <th scope=\"col\">Flower Colors</th>\n        <th scope=\"col\">Heat / Drought Tolerance</th>\n        <th scope=\"col\">Annual or Perennial Here</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\"><em>Cosmos bipinnatus</em></th>\n        <td>\n          Airy annual, typically 3 to 6 feet tall with fine, ferny foliage\n        </td>\n        <td>\n          White, pink, rose, and some red shades\n        </td>\n        <td>\n          Prefers warm weather but not extreme heat; moderately drought tolerant\n          once established\n        </td>\n        <td>\n          Annual; self-seeds readily\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\"><em>Cosmos sulphureus</em></th>\n        <td>\n          Bushy annual, usually 1 to 6 feet tall depending on variety\n        </td>\n        <td>\n          Yellow, orange, and red\n        </td>\n        <td>\n          Very tolerant of heat, drought, and poor soils\n        </td>\n        <td>\n          Annual; self-seeds readily\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\"><em>Cosmos atrosanguineus</em></th>\n        <td>\n          Tuberous perennial, typically 2 to 3 feet tall\n        </td>\n        <td>\n          Deep burgundy to brown, often described as chocolate-scented\n        </td>\n        <td>\n          Prefers full sun and moderate moisture; tolerates some drought once\n          established\n        </td>\n        <td>\n          Perennial from tubers in our mild climate\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["growing-cosmos-flowers-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Cosmos Choices by Santa Cruz Microclimate</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Cosmos choices by Santa Cruz County microclimate\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Location</th>\n        <th scope=\"col\">Best Cosmos Choices</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Coastal (Aptos, Capitola, Santa Cruz beaches)</th>\n        <td><em>Cosmos bipinnatus</em> varieties</td>\n        <td>\n          Cooler, foggier summers can delay bloom; choose the warmest, sunniest\n          sites available\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">San Lorenzo Valley (Boulder Creek, Ben Lomond)</th>\n        <td>\n          Both species; <em>Cosmos sulphureus</em> excels in sunny spots\n        </td>\n        <td>\n          Warm days and cool nights suit both types; deer may browse young plants\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Inland (Scotts Valley, Soquel hills)</th>\n        <td>\n          Both species; <em>Cosmos sulphureus</em> for hottest exposures\n        </td>\n        <td>\n          Excellent cosmos territory; lean soils encourage heavy bloom\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Pajaro Valley (Watsonville)</th>\n        <td>\n          <em>Cosmos sulphureus</em> especially; <em>Cosmos bipinnatus</em> also good\n        </td>\n        <td>\n          Warm valley conditions strongly favor sulphur cosmos\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Urban &amp; suburban gardens (countywide)</th>\n        <td>\n          Most annual cosmos; chocolate cosmos in protected spots\n        </td>\n        <td>\n          Long frost-free season allows 4 to 5+ months of bloom\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["growing-cosmos-flowers-g3"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Cosmos Planting Calendar for Santa Cruz County</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Cosmos planting calendar for Santa Cruz County\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Method</th>\n        <th scope=\"col\">Coastal Areas</th>\n        <th scope=\"col\">Inland Areas</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Direct sow outdoors</th>\n        <td>Mid-April through May</td>\n        <td>Early April through May</td>\n        <td>\n          Sow after last frost when soil temperatures reach at least 60\u00b0F\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Start indoors</th>\n        <td>Start mid-March; transplant mid-May</td>\n        <td>Start early March; transplant mid-April</td>\n        <td>\n          Use biodegradable pots to minimize disturbance to taproots\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Succession sowing</th>\n        <td>Through early July</td>\n        <td>Through early July</td>\n        <td>\n          Sow every 3 to 4 weeks to extend bloom into fall\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Expected first bloom</th>\n        <td>Mid-June to July</td>\n        <td>Early to mid-June</td>\n        <td>\n          First flowers typically appear 60 to 90 days from seed\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Seed germination</th>\n        <td>7 to 21 days</td>\n        <td>7 to 21 days</td>\n        <td>\n          Best germination occurs around 70 to 75\u00b0F\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["growing-cosmos-flowers-g4"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">How Cosmos Support Pollinators and Wildlife</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"How cosmos support pollinators and wildlife\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Visitor</th>\n        <th scope=\"col\">What They Get from Cosmos</th>\n        <th scope=\"col\">How It Helps Your Garden</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Honey bees &amp; native bees</th>\n        <td>\n          Nectar and pollen from simple, open flowers\n        </td>\n        <td>\n          Improves pollination of nearby vegetables and fruit crops throughout summer\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Butterflies</th>\n        <td>\n          Easily accessed nectar on flat flower disks\n        </td>\n        <td>\n          Supports butterflies such as painted ladies and swallowtails through the season\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Hoverflies</th>\n        <td>\n          Nectar for adults; habitat near aphid colonies\n        </td>\n        <td>\n          Adult hoverflies pollinate; larvae help control aphids and other soft-bodied pests\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Seed-eating birds</th>\n        <td>\n          Dry cosmos seed heads in late summer and fall\n        </td>\n        <td>\n          Provides a seasonal food source and encourages bird activity in the garden\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["growing-cosmos-flowers-g5"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Common Problems and Solutions</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Common cosmos growing problems and solutions\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Problem</th>\n        <th scope=\"col\">Likely Cause</th>\n        <th scope=\"col\">Solution</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Lots of foliage, few flowers</th>\n        <td>\n          Soil too rich; over-fertilized\n        </td>\n        <td>\n          Stop fertilizing; choose leaner soil next season\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Tall, floppy stems</th>\n        <td>\n          Too much shade; soil too rich\n        </td>\n        <td>\n          Provide more sun; use supports; pinch young plants to encourage branching\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Plants wilting despite watering</th>\n        <td>\n          Root rot from overwatering; soil staying too wet\n        </td>\n        <td>\n          Reduce watering; improve drainage; allow soil to dry slightly between waterings\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Few flowers on self-sown plants</th>\n        <td>\n          Natural variation in seedlings\n        </td>\n        <td>\n          Thin heavily; keep and encourage the strongest, best-performing plants\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Seeds not germinating</th>\n        <td>\n          Soil too cold; seeds planted too deep; old seeds\n        </td>\n        <td>\n          Wait for warmer soil; plant more shallowly; use fresh seeds\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["growing-zinnias-summer-garden-guide-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Zinnia Species Overview</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Zinnia species overview\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Species</th>\n        <th scope=\"col\">Height</th>\n        <th scope=\"col\">Flower Size</th>\n        <th scope=\"col\">Disease Resistance</th>\n        <th scope=\"col\">Best Uses</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\"><em>Zinnia elegans</em></th>\n        <td>1 to 4 ft, depending on variety</td>\n        <td>2 to 6 inches</td>\n        <td>Moderate; varies by cultivar</td>\n        <td>Cut flowers, borders, mass plantings</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\"><em>Zinnia angustifolia</em> (narrowleaf)</th>\n        <td>8 to 18 inches</td>\n        <td>1 to 2 inches</td>\n        <td>Excellent; high resistance to powdery mildew and leaf spots</td>\n        <td>Borders, containers, hot dry spots</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\"><em>Zinnia marylandica</em> (interspecific hybrids)</th>\n        <td>12 to 18 inches</td>\n        <td>2 to 3 inches</td>\n        <td>Excellent</td>\n        <td>Borders, containers, mass plantings</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["growing-zinnias-summer-garden-guide-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Zinnia Choices by Santa Cruz Microclimate</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Zinnia choices by Santa Cruz County microclimate\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Location</th>\n        <th scope=\"col\">Best Zinnia Types</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">\n          Coastal (Aptos, Capitola, Santa Cruz beaches)\n        </th>\n        <td>\n          Profusion series, Zahara series, <em>Zinnia angustifolia</em> (Crystal, Star);\n          mildew-resistant <em>Z. elegans</em> cultivars\n        </td>\n        <td>\n          Fog and humidity increase powdery mildew pressure; prioritize disease-resistant\n          series and provide generous spacing for airflow\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">\n          San Lorenzo Valley (Boulder Creek, Ben Lomond)\n        </th>\n        <td>\n          All types, including tall cutting series (Benary\u2019s, Oklahoma, Queen)\n        </td>\n        <td>\n          Warm days and good sun exposures are ideal; deer may browse young plants\n          in rural settings\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">\n          Inland (Scotts Valley, Soquel hills)\n        </th>\n        <td>\n          All types; excellent for tall cutting mixes and specialty series\n        </td>\n        <td>\n          Heat encourages heavy flowering; moderately fertile, well-drained soils\n          give the best bloom quality\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">\n          Pajaro Valley (Watsonville)\n        </th>\n        <td>\n          All types, including heat-loving tall and medium varieties\n        </td>\n        <td>\n          Warm conditions and long growing season are ideal; choose mildew-resistant\n          series if planting closer to fog-influenced coastal edges\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["growing-zinnias-summer-garden-guide-g3"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Zinnia Planting Calendar for Santa Cruz County</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Zinnia planting calendar for Santa Cruz County\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Method</th>\n        <th scope=\"col\">Timing</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Direct sow outdoors</th>\n        <td>Mid-May through July</td>\n        <td>\n          Wait until soil temperatures reach at least 70\u00b0F and all danger of\n          frost has passed\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Start indoors</th>\n        <td>Late April to mid-May</td>\n        <td>\n          Start seeds 3 to 4 weeks before transplanting; provide 70 to 75\u00b0F\n          for germination and strong light for sturdy seedlings\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Succession sowing</th>\n        <td>Every 2 to 3 weeks, mid-May through mid-July</td>\n        <td>\n          Extends bloom into fall and replaces plants that decline due to disease\n          or age\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Expected first bloom</th>\n        <td>About 60 to 70 days from seeding</td>\n        <td>\n          Compact varieties often bloom earlier; very tall or large-flowered\n          strains may take longer\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["growing-zinnias-summer-garden-guide-g4"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">Common Zinnia Problems and Solutions</div>\n\n  <table class=\"ah-table\" role=\"table\" aria-label=\"Common zinnia problems and solutions\">\n    <thead>\n      <tr>\n        <th scope=\"col\" class=\"ah-nowrap\">Problem</th>\n        <th scope=\"col\">Likely Cause</th>\n        <th scope=\"col\">Solution</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">White, powdery coating on leaves</th>\n        <td>\n          Powdery mildew favored by humidity, crowding, and wet foliage\n        </td>\n        <td>\n          Plant resistant series (Profusion, Zahara, <em>Z. angustifolia</em>);\n          space plants well; water at soil level; consider preventive fungicides\n          if pressure is high\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Brown or tan spots with concentric rings</th>\n        <td>\n          Alternaria leaf spot or other fungal leaf spot diseases\n        </td>\n        <td>\n          Improve air circulation; avoid overhead watering; remove infected leaves;\n          rotate planting locations yearly\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Distorted growth and sticky residue</th>\n        <td>\n          Aphids feeding on tender new shoots\n        </td>\n        <td>\n          Spray off with a strong jet of water; use insecticidal soap if needed;\n          encourage lady beetles and other beneficial insects\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Fine webbing and stippled, yellowing leaves</th>\n        <td>\n          Spider mites during hot, dry weather\n        </td>\n        <td>\n          Hose plants off regularly; improve watering consistency; use insecticidal\n          soap for heavy infestations\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Seedlings cut off at soil line</th>\n        <td>\n          Cutworms feeding at night\n        </td>\n        <td>\n          Use cardboard or foil collars around young plants; handpick cutworms\n          after dark if present\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Plants wilt despite moist soil</th>\n        <td>\n          Possible bacterial wilt or vascular disease, often spread by cucumber beetles\n        </td>\n        <td>\n          Pull and discard affected plants; control cucumber beetles; avoid immediately\n          replanting zinnias in the same location\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Lots of foliage, few flowers</th>\n        <td>\n          Excess nitrogen or insufficient sunlight\n        </td>\n        <td>\n          Reduce fertilization; plant in full sun; aim for moderately fertile,\n          well-drained soil\n        </td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\" class=\"ah-nowrap\">Deer browsing</th>\n        <td>\n          Zinnias are palatable to deer\n        </td>\n        <td>\n          Fence gardens or use deer repellents; zinnias are not considered\n          deer-resistant\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["how-much-do-i-really-need-to-water-my-garden-in-fall-in-santa-cruz-county-g1"] = "<div class=\"ah-table-wrap\">\n <table class=\"ah-table\">\n <thead>\n <tr>\n <th scope=\"col\">Region</th>\n <th scope=\"col\">Sept rain</th>\n <th scope=\"col\">Oct rain</th>\n <th scope=\"col\">Nov rain</th>\n <th scope=\"col\">Typical Sept high</th>\n <th scope=\"col\">Irrigation pattern by late fall</th>\n </tr>\n </thead>\n <tbody>\n <tr>\n <th scope=\"row\">Santa Cruz coastal</th>\n <td>~0.11 in</td>\n <td>~1.34 in</td>\n <td>~3.27 in</td>\n <td>~77\u00b0F</td>\n <td>\n Summer-style through Sept; begin cutting back after Oct storms; many in-ground beds mostly off after first big Nov storms\n </td>\n </tr>\n <tr>\n <th scope=\"row\">San Lorenzo Valley / Mountains</th>\n <td>Low (~0 in)</td>\n <td>Increasing (a few early storms)</td>\n <td>Rising quickly into winter totals</td>\n <td>Warm 70s to low 80s early fall</td>\n <td>\n Full irrigation into Sept; gradual reduction through Oct; many deep, shaded soils near \u201coff\u201d by late Nov after several inches of rain\n </td>\n </tr>\n <tr>\n <th scope=\"row\">Watsonville / Pajaro Valley</th>\n <td>~0.07 in</td>\n <td>~0.81 in</td>\n <td>Rising into early wet-season values</td>\n <td>Low to mid-70s\u00b0F</td>\n <td>\n Summer-like in Sept; reduced but regular irrigation in Oct; transition toward winter pattern only after multiple Nov storms\n </td>\n </tr>\n </tbody>\n </table>\n</div>";

window.AH_GRAPHICS["how-much-do-i-really-need-to-water-my-garden-in-spring-in-santa-cruz-county-g1"] = "<div class=\"ah-table-wrap\">\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Region</th>\n        <th scope=\"col\">March rain (in)</th>\n        <th scope=\"col\">April rain (in)</th>\n        <th scope=\"col\">May rain (in)</th>\n        <th scope=\"col\">When regular irrigation usually starts*</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Santa Cruz coastal</th>\n        <td>~4.3</td>\n        <td>~2.1</td>\n        <td>~0.9</td>\n        <td>Late April to May, once soils are dry a few days after warm spells</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">San Lorenzo Valley / mtns (Ben Lomond as proxy)</th>\n        <td>~7.2</td>\n        <td>~3.2</td>\n        <td>~1.2</td>\n        <td>Mid to late April on sunny slopes and shallow beds; later for deep, shaded soils</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Watsonville / Pajaro Valley</th>\n        <td>~4.7</td>\n        <td>~3.3</td>\n        <td>~0.9</td>\n        <td>Early to mid April on lighter soils and raised beds; by May for most gardens</td>\n      </tr>\n    </tbody>\n    <caption>\n      *\"Usually starts\" is an interpretive guideline based on rainfall tapering and rising evapotranspiration, not a fixed or legal rule.\n    </caption>\n  </table>\n</div>";

window.AH_GRAPHICS["how-much-do-i-really-need-to-water-my-garden-in-summer-in-santa-cruz-county-g1"] = "<div class=\"ah-table-wrap\">\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Region</th>\n        <th scope=\"col\">July rain</th>\n        <th scope=\"col\">Aug rain</th>\n        <th scope=\"col\">Typical July high</th>\n        <th scope=\"col\">Est. veggie bed use (100 sq ft)</th>\n        <th scope=\"col\">Practical schedule</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Santa Cruz coastal</th>\n        <td>~0.01 in</td>\n        <td>~0.04 in</td>\n        <td>~75\u00b0F</td>\n        <td>~250\u2013270 gal/month</td>\n        <td>2 deep waterings per week totaling ~1 in</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">San Lorenzo Valley / Mountains</th>\n        <td>~0 in</td>\n        <td>~0 in</td>\n        <td>Upper 70s to low 80s\u00b0F</td>\n        <td>~270\u2013300 gal/month</td>\n        <td>2\u20133 shorter waterings per week to avoid runoff</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Watsonville / Pajaro Valley</th>\n        <td>~0 in</td>\n        <td>~0 in</td>\n        <td>Low to mid-70s\u00b0F</td>\n        <td>~260\u2013280 gal/month</td>\n        <td>2\u20133 waterings per week on lighter soils</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["how-much-do-i-really-need-to-water-my-garden-in-winter-in-santa-cruz-county-g1"] = "<div class=\"ah-table-wrap\">\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Region</th>\n        <th scope=\"col\">Approx. annual rain</th>\n        <th scope=\"col\">Typical Jan rain</th>\n        <th scope=\"col\">Winter irrigation for in-ground plants</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">San Lorenzo Valley / mtns</th>\n        <td>50\u201355+ in/yr</td>\n        <td>6\u20138 in</td>\n        <td>Irrigation off all winter; water only under cover or on steep, fast-draining slopes</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Santa Cruz coastal</th>\n        <td>30\u201333 in/yr</td>\n        <td>5\u20136 in</td>\n        <td>Irrigation off Dec\u2013Feb; water pots and rain shadow zones only</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Watsonville / farmlands</th>\n        <td>22\u201325 in/yr</td>\n        <td>4\u20135 in</td>\n        <td>Mostly off; one deep soak in sandy or raised beds during long dry spells</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["how-to-eliminate-mosquitoes-in-your-santa-cruz-garden-g1"] = "<div class=\"ah-table-wrap\"> <div class=\"ah-table-title\"> Mosquito Control Decision Chart </div> <table class=\"ah-table\"> <thead> <tr> <th scope=\"col\">Water present?</th> <th scope=\"col\">Can you dump or drain it?</th> <th scope=\"col\">Recommended action</th> </tr> </thead> <tbody> <tr> <td>Yes</td> <td>Yes</td> <td>Eliminate the water source.</td> </tr> <tr> <td>Yes</td> <td>No (permanent feature)</td> <td>Add mosquito fish or other appropriate fish predators.</td> </tr> <tr> <td>Yes</td> <td>No (temporary or structural)</td> <td>Use Bti (mosquito dunks or bits) monthly during the warm season.</td> </tr> <tr> <td>No</td> <td>N/A</td> <td>No action needed.</td> </tr> </tbody> </table>\n</div>";
window.AH_GRAPHICS["how-to-eliminate-mosquitoes-in-your-santa-cruz-garden-g2"] = "<div class=\"ah-table-wrap\"> <div class=\"ah-table-title\"> Natural Predator Summary </div> <table class=\"ah-table\"> <thead> <tr> <th scope=\"col\">Predator</th> <th scope=\"col\">What they eat</th> <th scope=\"col\">How to support them</th> </tr> </thead> <tbody> <tr> <th scope=\"row\">Bats</th> <td>Adult mosquitoes at night</td> <td>Install bat houses; minimize pesticide use.</td> </tr> <tr> <th scope=\"row\">Dragonflies</th> <td>Mosquito larvae and adults</td> <td>Provide ponds with emergent plants; avoid broad spraying.</td> </tr> <tr> <th scope=\"row\">Mosquito fish</th> <td>Larvae (often hundreds per day)</td> <td>Stock permanent ponds and livestock troughs where permitted.</td> </tr> <tr> <th scope=\"row\">Frogs and toads</th> <td>Larvae and adult mosquitoes</td> <td>Create moist, sheltered habitat near water.</td> </tr> <tr> <th scope=\"row\">Birds</th> <td>Adult mosquitoes</td> <td>Provide nesting sites and water; avoid pesticide use.</td> </tr> </tbody> </table>\n</div>";

window.AH_GRAPHICS["living-with-wildlife-raccoons-squirrels-amp-other-garden-raiders-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Matching protection strategies to wildlife\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Animal group</th>\n        <th scope=\"col\">Most reliable long-term tools</th>\n        <th scope=\"col\">Tools with limited effect</th>\n        <th scope=\"col\">Notes</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">How Do You Handle Raccoons?</th>\n        <td>Low electric fence around corn or priority beds; secure coop latches; enclosed compost</td>\n        <td>Motion lights, radios, most sprays</td>\n        <td>Electric fencing is the standard recommendation for corn and other high-value beds.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Tree squirrels</th>\n        <td>Hardware-cloth cages; fully netted tomato or berry structures</td>\n        <td>Fake owls, ultrasonic devices, most \u201crepellent\u201d gadgets</td>\n        <td>Complete physical enclosure is the only consistently reliable approach.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Ground squirrels</th>\n        <td>Buried exclusion fencing; hardware cloth under beds; regulated trapping</td>\n        <td>Ultrasonic devices, predator decoys, most repellents</td>\n        <td>Structural exclusion paired with regulated control is emphasized for persistent populations.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">How Do You Handle Birds?</th>\n        <td>Bird netting over fruit and berries; row cover over seedlings</td>\n        <td>Static scare devices unless moved frequently</td>\n        <td>Netting remains the primary recommendation for protecting fruit crops.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Rats &amp; mice</th>\n        <td>Habitat and food reduction; secure storage; snap-trap campaigns; predator support</td>\n        <td>Most plug-in or ultrasonic gadgets; short-lived sprays</td>\n        <td>Sanitation and exclusion should always come before any toxic control methods.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">How Do You Handle Rabbits?</th>\n        <td>2-ft fence with buried edge or L-footer; trunk guards</td>\n        <td>Many commercial repellents after rain</td>\n        <td>Simple low fencing is usually sufficient for vegetable gardens.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">How Do You Handle Skunks?</th>\n        <td>Close denning sites; grub control in turf; low barriers around specific beds</td>\n        <td>Relocation attempts; most repellents</td>\n        <td>Turf management plus exclusion under decks and sheds are key.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">How Do You Handle Opossums?</th>\n        <td>Secure compost and pet food; close easy den sites</td>\n        <td>Repellents and scare devices</td>\n        <td>Generally beneficial animals; management usually focuses on food exclusion only.</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Wild turkeys</th>\n        <td>Fenced vegetable area, optionally with overhead netting; active harassment</td>\n        <td>Static decoys alone</td>\n        <td>Turkeys respond best to exclusion paired with consistent shooing.</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["living-with-wildlife-raccoons-squirrels-amp-other-garden-raiders-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Common Wildlife, Signs, and Favorite Crops in Santa Cruz County Gardens\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Animal group</th>\n        <th scope=\"col\">Typical signs in the garden</th>\n        <th scope=\"col\">Favorite crops / attractants (local)</th>\n        <th scope=\"col\">Key tools to confirm ID</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">How Do You Handle Raccoons?</th>\n        <td>Corn stalks torn down; soil or turf flipped or rolled back; nighttime damage</td>\n        <td>Sweet corn, melons, grapes, fallen fruit, fish ponds, chicken coops</td>\n        <td>Night trail camera; tracks and scat; UC IPM wildlife ID galleries</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Tree squirrels</th>\n        <td>Half-eaten tomatoes or fruit left on plants; nut shells; daytime activity</td>\n        <td>Tomatoes at blush, stone fruit, nuts, sunflower heads</td>\n        <td>Observe daytime behavior; chewed fruit at height; UC IPM tree squirrel guidance</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Ground squirrels</th>\n        <td>Open burrow holes; soil mounds; plants clipped at ground level</td>\n        <td>Seedlings, bulbs, greens, grains, young orchard trees</td>\n        <td>Burrow entrances; fresh soil; UC IPM ground squirrel resources</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Birds (jays, robins, etc.)</th>\n        <td>Peck marks on fruit; berries stripped; seedlings pulled but not eaten</td>\n        <td>Berries, cherries, tomatoes, newly seeded beds</td>\n        <td>Watch early morning or late afternoon activity; UC IPM bird damage guides</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">Rats &amp; mice</th>\n        <td>Neatly gnawed fruit or vegetables; small droppings; tunnels in compost or mulch</td>\n        <td>Tomatoes, squash, melons, chicken feed, compost, citrus</td>\n        <td>Night trail camera; droppings identification; UC IPM rats and mice guides</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">How Do You Handle Rabbits?</th>\n        <td>Seedlings and low foliage clipped cleanly at 1\u20134 inches; round droppings</td>\n        <td>Lettuce, peas, beans, young bark, clover</td>\n        <td>Damage height; tracks and pellets; UC IPM rabbit notes</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">How Do You Handle Skunks?</th>\n        <td>Numerous shallow 2\u20133 inch cone-shaped holes, usually in lawn or turf</td>\n        <td>Grubs, earthworms, ground insects</td>\n        <td>Nighttime observation; turf damage pattern; UC IPM turf guidance</td>\n      </tr>\n\n      <tr>\n        <th scope=\"row\">How Do You Handle Opossums?</th>\n        <td>Scattered droppings; occasional low fruit damage; compost disturbance</td>\n        <td>Fallen fruit, carrion, snails, slugs, insects</td>\n        <td>Trail camera; tracks; UC IPM opossum information</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["neem-oil-vs-insecticidal-soap-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Neem Oil vs. Insecticidal Soap: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Neem Oil</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Insecticidal Soap</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">How It Works</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Disrupts feeding, growth, and reproduction</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Dissolves soft-bodied insect cell membranes on contact</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Speed</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Slow; takes days to weeks for full effect</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Fast; kills on contact within hours</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Pest Range</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Broad; insects plus fungal diseases</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Soft-bodied insects only (aphids, mites, whiteflies)</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Pollinator Safety</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Can harm bees if sprayed on open flowers</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Low risk; breaks down within hours</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Plant Sensitivity</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Can burn foliage in heat above 85F</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Can stress plants in heat; test first</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</div>";
window.AH_GRAPHICS["neem-oil-vs-insecticidal-soap-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"> <div style=\"background-color: #1a3b2 !importanta !important; color: #f8f9f !important0 !important; padding: 20px 25px; text-align: center;\"> <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f !important0 !important;\">Neem Oil vs. Insecticidal Soap</h2> <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f !important0 !important;\">Two popular organic sprays compared side by side</p> </div> <div style=\"padding: 25px; background-color: #f8f9f !important0 !important;\"> <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;\"> <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\"> <div style=\"background-color: #1a3b2 !importanta !important; padding: 14px 18px;\"> <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f !important0 !important;\">Neem Oil</h3> </div> <div style=\"padding: 18px;\"> <div style=\"margin-bottom: 14px;\"> <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Source</div> <div style=\"font-size: 0.9rem; color: #1a3b2 !importanta !important; line-height: 1.5;\">Neem tree seeds</div> </div> <div style=\"margin-bottom: 14px;\"> <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Mode of Action</div> <div style=\"font-size: 0.9rem; color: #1a3b2 !importanta !important; line-height: 1.5;\">Disrupts feeding and growth cycles</div> </div> <div style=\"margin-bottom: 14px;\"> <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Best For</div> <div style=\"font-size: 0.9rem; color: #1a3b2 !importanta !i !important;\">Warm days (60 to 80 F), cool nights, dry leaves, shade</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Cool temperatures (50 to 65 F), prolonged leaf wetness, high humidity</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Affected Plants</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Squash, cucumbers, roses, grapes, apples, peas</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Lettuce, spinach, basil, grapes, cucurbits, onions</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Treatment</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Sulfur spray, neem oil, potassium bicarbonate, milk spray</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Copper fungicide, improve air circulation, remove affected leaves</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Prevention</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Good air flow, full sun, resistant varieties</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Avoid overhead watering, space plants widely, water in morning</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: window.AH_GRAPHICS["primocane-vs-floricane-raspberries-which-should-you-grow-in-california-g1"] = "<div class=\"ah-table-wrapper\">\n  <div class=\"ah-table-title\">Primocane vs Floricane Raspberries at a Glance</div>\n  <div class=\"ah-table-subtitle\">Quick comparison to help you choose the right type for your Santa Cruz County garden</div>\n  \n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th style=\"width: 25%;\">Feature</th>\n        <th style=\"width: 37.5%;\">Primocane (Fall-Bearing)</th>\n        <th style=\"width: 37.5%;\">Floricane (Summer-Bearing)</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <td class=\"ah-highlight-cell\">When They Fruit</td>\n        <td>Late summer through fall (August to October) on current-year canes</td>\n        <td>Early to mid-summer (May to July) on second-year canes</td>\n      </tr>\n      <tr>\n        <td class=\"ah-highlight-cell\">Pruning Method</td>\n        <td><strong>Simple:</strong> Cut all canes to ground in late winter for one fall crop</td>\n        <td><strong>Selective:</strong> Remove only canes that fruited; keep new canes for next year</td>\n      </tr>\n      <tr>\n        <td class=\"ah-highlight-cell\">First Harvest</td>\n        <td>Year 1 (small crop in first fall)</td>\n        <td>Year 2 (no fruit until second summer)</td>\n      </tr>\n      <tr>\n        <td class=\"ah-highlight-cell\">Chill Requirements</td>\n        <td>Typically lower (300-500 hours); works in coastal and inland areas</td>\n        <td>Often higher (600-1000+ hours); best for inland/mountain areas</td>\n      </tr>\n      <tr>\n        <td class=\"ah-highlight-cell\">Disease Pressure</td>\n        <td>Lower (annual removal of all canes breaks disease cycles)</td>\n        <td>Higher (overwintering canes can harbor disease)</td>\n      </tr>\n      <tr>\n        <td class=\"ah-highlight-cell\">SWD Pest Pressure</td>\n        <td>Often lower (fall fruit avoids peak SWD season)</td>\n        <td>Can be higher (summer fruit coincides with peak SWD)</td>\n      </tr>\n      <tr>\n        <td class=\"ah-highlight-cell\">Best For</td>\n        <td>\n          <span class=\"ah-tag ah-tag-recommended\">Recommended</span><br>\n          Most Santa Cruz County gardeners, beginners, coastal areas, small spaces\n        </td>\n        <td>\n          <span class=\"ah-tag ah-tag-good\">Good Option</span><br>\n          Inland/mountain areas, experienced growers, early summer harvest\n        </td>\n      </tr>\n      <tr>\n        <td class=\"ah-highlight-cell\">Popular Varieties</td>\n        <td>Heritage, Caroline, Joan J, Anne, Fall Gold</td>\n        <td>Willamette, Tulameen, Meeker</td>\n      </tr>\n    </tbody>\n  </table>\n  \n  <div class=\"ah-table-note\">For most home gardeners in Santa Cruz County, primocane varieties offer easier care and more reliable results. Consider floricane types if you want early summer fruit and are willing to manage more complex pruning.</div>\n  <div class=\"ah-table-source\">Sources: UC ANR Growing Raspberries, UC Master Gardeners of Santa Clara County</div>\n</div>\n  \n</div>\n</div>";

window.AH_GRAPHICS["pruning-in-winter-vs-summer-g1"] = "<div style=\"font-family: 'Montserrat', sans-serif; width: 100%; margin: 0; padding: 0;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\">\n    <h3 style=\"color: #f8f9f0 !important; font-size: 1.2rem; font-weight: 700; margin: 0; text-align: center;\">Pruning in Winter vs. Summer: Quick Comparison</h3>\n  </div>\n  <table style=\"width: 100%; border-collapse: collapse; font-family: 'Montserrat', sans-serif; font-size: 0.9rem;\">\n    <thead>\n      <tr style=\"background-color: #dde2d8 !important;\">\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 30%;\">Criteria</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Winter Pruning</th>\n        <th style=\"padding: 12px 16px; text-align: left; font-weight: 600; color: #1a3b2a !important; border-bottom: 2px solid #1a3b2a; width: 35%;\">Summer Pruning</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Growth Response</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Stimulates vigorous spring regrowth</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Slows growth; calming effect on tree</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Visibility</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Excellent; bare branches show full structure</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Limited; foliage hides branch architecture</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Disease Risk</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Low for most trees (except avoid in rain)</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Low; dry conditions reduce infection risk</td>\n      </tr>\n      <tr style=\"background-color: #ffffff !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Best For</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Structural shaping, heavy cuts, fruit trees</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">Size control, thinning, training young trees</td>\n      </tr>\n      <tr style=\"background-color: #f8f9f0 !important;\">\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; font-weight: 600; color: #1a3b2a !important;\">Timing in Santa Cruz</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">December through mid-February</td>\n        <td style=\"padding: 10px 16px; border-bottom: 1px solid #dde2d8; color: #1a3b2a !important;\">June through August, after spring growth flush</td>\n      </tr>\n    </tbody>\n  </table>\n  <div style=\"background-color: #dde2d8 !important; padding: 8px 16px; border-radius: 0 0 8px 8px; text-align: right;\">\n    <span style=\"font-size: 0.75rem; color: #8c9c8c !important;\">ambitiousharvest.com</span>\n  </div>\n</d
