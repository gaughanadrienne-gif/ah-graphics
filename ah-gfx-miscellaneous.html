rtant; text-transform: uppercase; letter-spacing: 0.8px;\">What to Harvest</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Pick peak-season tomatoes (can and preserve sauce varieties)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Harvest corn when silks brown and kernels are milky</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Pick figs when soft and drooping with nectar at base</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Harvest peppers, eggplant, and summer squash</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Let winter squash and pumpkins continue sizing up</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 15px; color: #1a3b2a !important;\">&#9881;</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Maintain</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Monitor plants daily for water stress (morning wilting is serious)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Pull spent crops promptly; compost healthy material</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Build compost piles with summer garden waste (1:3 green to brown)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Deadhead annual flowers for continued blooming</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Increase irrigation during heat waves</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 15px; color: #1a3b2a !important;\">&#9888;</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Watch For</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Tomato spotted wilt virus (bronzed leaves, distorted fruit; remove plants)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Corn earworms (mineral oil drop on silk channels)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Whitefly populations peaking (reflective mulch helps)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-b xt-transform: uppercase; letter-spacing: 0.8px;\">What to Harvest</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Harvest kale, chard, and collards (sweeter after frost)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Pick Brussels sprouts from bottom of stalk up</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Harvest Satsuma mandarins, Meyer lemons, and kumquats</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Continue picking persimmons</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Check and use stored winter squash before soft spots develop</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border n style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Turn off irrigation timers; let rain take over</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 15px; color: #1a3b2a !important;\">&#9888;</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Watch For</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Late blight on tomatoes and potatoes with first fall rains</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Crane fly larvae (leatherjackets) in wet soil</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Roof rats seeking shelter (clean fallen fruit, trim branches)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Waterlogged beds (plan raised beds or French drains)</span></div></div></div></div><div style=\"margin: 0 16px; padding: 14px 18px; background: #ffffff; border: 1px solid #dde2d8; border-radius: 5px;\"><div style=\"font-size: 11px; font-weight: 700; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;\">Quick Tips</div><div style=\"display: flex; flex-wrap: wrap; gap: 8px 24px;\"><div style=\"flex: 1 1 200px; font-size: 12px; color: #1a3b2a !important; line-height: 1.5; padding-left: 12px; border-left: 2px solid #dde2d8;\">California Early, California Late, and Inchelium Red are reliable garlic varieties for our county.</div><div style=\"flex: 1 1 200px; font-size: 12px; color: #1a3b2a !important; line-height: 1.5; padding-left: 12px; border-left: 2px solid #dde2d8;\">Shred fallen leaves before using as mulch. Whole leaves mat down and repel water.</div><div style=\"flex: 1 1 200px; font-size: 12px; color: #1a3b2a !important; line-height: 1.5; padding-left: 12px; border-left: 2px solid #dde2d8;\">The rain will work compost nutrients into resting beds over winter with zero effort from you.</div></div></div><div style=\"background: #1a3b2a; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; margin-top: 12px;\"><span style=\"font-size: 12px; font-weight: 600; color: #ffffff !important; letter-spacing: 0.3px;\">ambitiousharvest.com</span><a class=\"print-link\" href=\"javascript:window.print()\" style=\"font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8) !important; text-decoration: none; cursor: pointer;\">Print this checklist</a></div></div>";

border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Direct-sow lettuce, spinach, arugula, mustard greens, turnips</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Transplant broccoli, kale, and cabbage for winter</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Set out onion and leek transplants</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Plant overwintering peas and fava beans</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Order bare-root strawberries, fruit trees, and roses</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 14px; color: #1a3b2a !important;\">&#9679;</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Harvest</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Pick late-season tomatoes and all remaining peppers</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Harvest winter squash and pumpkins (cut, do not pull)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Cure squash in sun for a week before storing</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Pick apples when background color turns green to yellow</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Harvest grapes (taste-test before picking clusters)</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 15px; color: #1a3b2a !important;\">&#9881;</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Maintain</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Reduce irrigation on trees and perennials as days shorten</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Clean garden: remove spent cages, pull dead annuals</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Sow cover crops before first rain (crimson clover, bell beans)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Top-dress perennial beds with 2 to 3 inches of compost</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Compost healthy spent plants</span></div></div></div><div style=\"flex: 1 1 340px; min-width: 280px; border: 1px solid #dde2d8; border-radius: 5px; overflow: hidden;\"><div style=\"background: #dde2d8; padding: 10px 14px; display: flex; align-items: center; gap: 8px;\"><span style=\"font-size: 15px; color: #1a3b2a !important;\">&#9888;</span><span style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.8px;\">What to Watch For</span></div><div style=\"background: #f8f9f0; padding: 12px 14px;\"><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Early blight on tomatoes (brown spots with concentric rings)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Cabbage white butterflies on new brassicas (use row cover)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Yellow jackets (traps at garden perimeter)</span></div><div style=\"display: flex; align-items: flex-start; gap: 9px; margin-bottom: 2px;\"><span style=\"display: inline-block; width: 15px; height: 15px; min-width: 15px; border: 2px solid #1a3b2a; border-radius: 2px; margin-top: 1px;\"></span><span style=\"font-size: 13px; color: #1a3b2a !important;\">Autumn heat waves scorching young transplants (shade cloth)</span></div></div></div></div><div style=\"margin: 0 16px; padding: 14px 18px; background: #ffffff; border: 1px solid #dde2d8; border-radius: 5px;\"><div style=\"font-size: 11px; font-weight: 700; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;\">Quick Tips</div><div style=\"display: flex; flex-wrap: wrap; gap: 8px 24px;\"><div style=\"flex: 1 1 200px; font-size: 12px; color: #1a3b2a !important; line-height: 1.5; padding-left: 12px; border-left: 2px solid #dde2d8;\">Cut winter squash from the vine with a few inches of stem attached. Pulling can damage the fruit and shorten storage life.</div><div style=\"flex: 1 1 200px; font-size: 12px; color: #1a3b2a !important; line-height: 1.5; padding-left: 12px; border-left: 2px solid #dde2d8;\">Row cover installed at transplanting time is the simplest protection against cabbage white butterflies. Leave it on until plants establish.</div><div style=\"flex: 1 1 200px; font-size: 12px; color: #1a3b2a !important; line-height: 1.5; padding-left: 12px; border-left: 2px solid #dde2d8;\">Sow cover crops before the first rain for best establishment. Crimson clover and bell beans are a reliable mix.</div></div></div><div style=\"background: #1a3b2a; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; margin-top: 12px;\"><span style=\"font-size: 12px; font-weight: 600; color: #ffffff !important; letter-spacing: 0.3px;\">ambitiousharvest.com</span><a class=\"print-link\" href=\"javascript:window.print()\" style=\"font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8) !important; text-decoration: none; cursor: pointer;\">Print this checklist</a></div></div>";

window.AH_GRAPHICS["the-santa-cruz-banana-belt-gardening-in-the-countys-goldilocks-microclimate-g1"] = "<div class=\"ah-table-wrap\">\n <div class=\"ah-table-title\">\n Banana Belt vs. Neighboring Zones\n </div>\n\n <table class=\"ah-table\">\n <thead>\n <tr>\n <th scope=\"col\">Feature</th>\n <th scope=\"col\">Banana Belt hills</th>\n <th scope=\"col\">Beach strip (Capitola / Aptos)</th>\n <th scope=\"col\">SLV sunny ridges</th>\n <th scope=\"col\">Pajaro Valley</th>\n </tr>\n </thead>\n <tbody>\n <tr>\n <th scope=\"row\">Summer highs</th>\n <td>Often low to mid-70s; warm spells into the 80s.</td>\n <td>Mostly 60s to low 70s; heavier fog influence.</td>\n <td>80s to 90s; hotter during heat waves.</td>\n <td>Upper 70s to mid-80s; some 90-degree days.</td>\n </tr>\n <tr>\n <th scope=\"row\">Winter lows</th>\n <td>Rarely below the mid-30s; frost is uncommon.</td>\n <td>Rarely below the high 30s; near-zero frost right at the beaches.</td>\n <td>More frequent valley frosts (site dependent).</td>\n <td>Occasional light frost in colder pockets.</td>\n </tr>\n <tr>\n <th scope=\"row\">Fog</th>\n <td>Often above much of the marine layer.</td>\n <td>Frequent morning fog and marine layer.</td>\n <td>Minimal fog influence.</td>\n <td>Less fog than the beach; generally more sun.</td>\n </tr>\n <tr>\n <th scope=\"row\">Signature crops</th>\n <td>Citrus, mid-season tomatoes, peppers.</td>\n <td>Cool-season vegetables, artichokes, strawberries.</td>\n <td>Heirloom tomatoes, melons, heat-loving crops.</td>\n <td>Strawberries, caneberries, and a full heat-loving crop suite.</td>\n </tr>\n </tbody>\n </table>\n</div>";
window.AH_GRAPHICS["the-santa-cruz-banana-belt-gardening-in-the-countys-goldilocks-microclimate-g2"] = "<div class=\"ah-table-wrap\">\n <div class=\"ah-table-title\">\n Crop Suitability for the Banana Belt\n </div>\n\n <table class=\"ah-table\">\n <thead>\n <tr>\n <th scope=\"col\">Crop type</th>\n <th scope=\"col\">Banana Belt suitability</th>\n </tr>\n </thead>\n <tbody>\n <tr>\n <th scope=\"row\">Meyer lemons, mandarins, kumquats</th>\n <td>Excellent; mild winters and rare frost support reliable citrus production.</td>\n </tr>\n <tr>\n <th scope=\"row\">Mid-season tomatoes and peppers</th>\n <td>Very good; sufficient heat without the extreme stress seen in hotter inland areas.</td>\n </tr>\n <tr>\n <th scope=\"row\">Artichokes and strawberries</th>\n <td>Good performance; similar to other coastal-influenced microclimates.</td>\n </tr>\n <tr>\n <th scope=\"row\">Figs, persimmons, feijoa</th>\n <td>Very good; warm summers paired with generally mild winters.</td>\n </tr>\n <tr>\n <th scope=\"row\">Melons and okra</th>\n <td>Possible but less reliable; typically perform better in hotter inland valleys.</td>\n </tr>\n </tbody>\n </table>\n</div>";

window.AH_GRAPHICS["water-wise-wonders-10-drought-resistant-plants-for-a-thriving-california-garden-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Drought-Tolerant Plants at a Glance\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Plant</th>\n        <th scope=\"col\">Water once established</th>\n        <th scope=\"col\">Sun &amp; soil</th>\n        <th scope=\"col\">Extra benefits</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Succulents (Echeveria, Aeonium)</th>\n        <td>Very low; occasional deep soak only</td>\n        <td>Full sun to light shade; fast-draining soil</td>\n        <td>Strong texture; excellent in containers</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Lavender</th>\n        <td>Very low; deep soak every 2\u20134 weeks</td>\n        <td>Full sun; well-drained, slightly lean soil</td>\n        <td>Fragrance; pollinators; deer-resistant</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Salvias (sages)</th>\n        <td>Low; deep, infrequent watering</td>\n        <td>Full sun to light shade; well-drained soil</td>\n        <td>Hummingbirds and bees; long bloom season</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Yarrow</th>\n        <td>Very low after establishment</td>\n        <td>Full sun; tolerates poor, dry soil</td>\n        <td>Attracts beneficial insects; good filler plant</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Ornamental grasses</th>\n        <td>Low once mature</td>\n        <td>Full sun; well-drained soil</td>\n        <td>Movement, structure, meadow feel</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">California poppy</th>\n        <td>Very low; thrives on neglect</td>\n        <td>Full sun; well-drained soil, poor soil tolerated</td>\n        <td>Self-seeding carpets of color</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Rockrose</th>\n        <td>Very low; occasional deep soak only</td>\n        <td>Full sun; poor, rocky soil tolerated</td>\n        <td>Evergreen shrub; spring bloom</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Agave</th>\n        <td>Extremely low</td>\n        <td>Full sun; excellent drainage required</td>\n        <td>Strong architectural focal point</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Sagebrush (Artemisia)</th>\n        <td>Very low</td>\n        <td>Full sun; lean, well-drained soil</td>\n        <td>Silvery foliage; native chaparral look</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Blanket flower</th>\n        <td>Low; prefers drier soils</td>\n        <td>Full sun; well-drained, even poor soil</td>\n        <td>Long bloom season; pollinator support</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["zone-0-ember-resistant-landscaping-santa-cruz-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Zone 0: Materials to Remove vs. Keep\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Category</th>\n        <th scope=\"col\">Remove from Zone 0</th>\n        <th scope=\"col\">Prefer or keep in Zone 0</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Vegetation</th>\n        <td>\n          Any shrubs or trees touching structures; plants under windows;\n          dry or woody plants; climbing vines on walls, pergolas, or fences\n        </td>\n        <td>\n          Ideally none; if space is extremely limited, only a few low,\n          high-moisture plants in non-combustible containers set on hardscape\n          and at least 18 inches from walls\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Mulch and groundcover</th>\n        <td>\n          Bark mulch, wood chips, pine needles, straw, rubber mulch,\n          deep organic mulch against siding\n        </td>\n        <td>\n          Decomposed granite, gravel, stone chips, pavers, concrete,\n          bare mineral soil; keep free of leaf litter and debris\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Built items</th>\n        <td>\n          Stacked firewood, lumber, plastic storage, doormats,\n          combustible patio furniture against walls,\n          wood trellises attached to the house\n        </td>\n        <td>\n          Metal or stone furniture; non-combustible planters;\n          metal fencing sections where fences meet the house\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Hidden traps</th>\n        <td>\n          Debris under decks, behind steps, at fence attachments,\n          in corners and entry alcoves\n        </td>\n        <td>\n          Clean, open spaces; under-deck areas enclosed with fine metal mesh\n          and kept free of storage\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["zone-0-ember-resistant-landscaping-santa-cruz-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    How Zone 0 Differs from Zones 1 and 2\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Zone</th>\n        <th scope=\"col\">Distance</th>\n        <th scope=\"col\">Primary goal</th>\n        <th scope=\"col\">Vegetation and mulch approach</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Zone 0</th>\n        <td>0\u20135 ft from all structures and attached decks or stairs</td>\n        <td>Prevent embers from igniting anything near the home</td>\n        <td>\n          Aim for zero combustibles; no organic mulch;\n          very limited, low, high-moisture plants only in exceptional cases,\n          placed on non-combustible surfaces\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Zone 1</th>\n        <td>5\u201330 ft</td>\n        <td>Reduce flame length and radiant heat near the home</td>\n        <td>\n          Maintain \u201clean, clean, green\u201d planting;\n          use irrigated, low-growing plants;\n          organic mulch allowed but kept thin and well away from structures\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Zone 2</th>\n        <td>30\u2013100 ft</td>\n        <td>Reduce overall fuel and slow approaching fire</td>\n        <td>\n          Break up continuous fuels; thin trees and brush;\n          organic mulch acceptable; focus on spacing, pruning,\n          and regular debris removal\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
