window.AH_GRAPHICS["cover-crop-types-at-a-glance"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Three Types of Cover Crops</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Choose by your primary soil goal</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Nitrogen Fixers (Legumes)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Convert atmospheric nitrogen into plant-available form through symbiotic bacteria on roots.</p>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center; margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Nitrogen Added</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">50-200 lbs/acre</div>\n                    </div>\n                    <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Key Species</div>\n                    <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Crimson Clover</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Fava Beans</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Field Peas</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Bell Beans</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Hairy Vetch</span>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Biomass Builders (Grains)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Produce massive organic matter above and below ground. Scavenge and hold existing nutrients.</p>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center; margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Biomass Production</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">3,000-8,000 lbs/acre</div>\n                    </div>\n                    <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Key Species</div>\n                    <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Cereal Rye</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Annual Ryegrass</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Oats</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Barley</span>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Soil Breakers (Specialists)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Deep taproots break compacted soil. Some suppress soilborne pathogens through biofumigation.</p>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center; margin-bottom: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Root Depth</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">12+ inches</div>\n                    </div>\n                    <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Key Species</div>\n                    <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Daikon Radish</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Mustard</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Phacelia</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Source: UC SAREP, UC ANR, UC Davis cover crop research</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["santa-cruz-county-soil-zones-and-cover-crop-recommendations"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Cover Crops by Santa Cruz County Soil Zone</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Match your cover crop to your soil type for maximum benefit</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Coastal Clay Soils</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin-bottom: 10px;\">Aptos, Capitola, coastal areas</p>\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Heavy, compacts easily, poor drainage. Cover crops create root channels and improve aggregation.</p>\n                    <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Best Cover Crops</div>\n                    <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Annual Ryegrass</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Daikon Radish</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Cereal Rye</span>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Sandy Loam Soils</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin-bottom: 10px;\">West side Santa Cruz, San Lorenzo Valley</p>\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Low organic matter, drains quickly, nutrients leach easily. Cover crops add organic sponge.</p>\n                    <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Best Cover Crops</div>\n                    <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Fava Beans</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Bell Beans</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Crimson Clover</span>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Mountain/Redwood Soils</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin-bottom: 10px;\">Summit, Bonny Doon, upper SLV</p>\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 16px; line-height: 1.6;\">Acidic, often thin with rock. Cold hardy species needed. Organic matter builds slowly.</p>\n                    <div style=\"font-size: 0.75rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Best Cover Crops</div>\n                    <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Cereal Rye</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Field Peas</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Hairy Vetch</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Source: UC Cooperative Extension soil surveys for Santa Cruz County</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["six-key-benefits-of-cover-crops"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Six Benefits of Cover Crops</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Why every Santa Cruz garden should be growing them</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">1</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px; font-size: 0.95rem;\">Weed Suppression</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Dense stands reduce winter weed growth by 80% or more compared to bare soil. (Oregon State University Extension)</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">2</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px; font-size: 0.95rem;\">Erosion Prevention</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Reduce soil erosion by 50 to 90% during winter rains. Roots hold soil; canopy absorbs raindrop impact. (UC ANR)</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">3</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px; font-size: 0.95rem;\">Organic Matter</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">A typical winter cover crop produces 3,000 to 8,000 lbs of dry biomass per acre for soil biology. (UC SAREP)</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">4</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px; font-size: 0.95rem;\">Soil Structure</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Roots create biopores that improve drainage, aeration, and workability. Noticeable improvement within 2-3 seasons.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">5</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px; font-size: 0.95rem;\">Nutrient Cycling</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Grass cover crops catch nutrients that would leach during winter rains, holding them for the next growing season.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">6</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px; font-size: 0.95rem;\">Beneficial Insects</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Flowering cover crops attract pollinators, hoverflies, and parasitic wasps that help control garden pests.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["buckwheat-growth-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Buckwheat Growth Timeline</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Seed to termination in 30-40 days</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 14px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Days 3-5</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 6px;\">Germination</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.4;\">Seeds sprout rapidly. Water consistently during this phase.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 14px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Days 5-25</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 6px;\">Rapid Growth</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.4;\">Dense canopy closes in. Weeds smothered. Water 1-2x weekly.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 14px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Days 25-30</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 6px;\">First Flowers</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.4;\">White flowers appear. Pollinators arrive. Prepare for termination.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 14px; text-align: center; border: 2px solid #1a3b2a;\">\n                <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600;\">Days 30-40</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 6px;\">CUT NOW</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.4;\">Full bloom. Cut at base. Stems decompose in days.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 14px; text-align: center; border: 2px solid #8c9c8c;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Day 40+</div>\n                <div style=\"font-weight: 600; color: #8c9c8c !important; font-size: 0.95rem; margin-bottom: 6px;\">SEED SET</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.4;\">Too late. Seeds drop and self-sow aggressively. Avoid this.</p>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center; margin-top: 16px;\">Coastal Santa Cruz: add 5-10 days to each phase due to cooler temperatures and fog.</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["summer-cover-crops-compared"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Summer Cover Crops Compared</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Choose by your time window, soil goal, and microclimate</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 700px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Species</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Height</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">N Fixation</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Biomass</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Water</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Coastal?</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Buckwheat</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">30-40</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">2-3 ft</td>\n                    <td style=\"padding: 10px 12px; color: #8c9c8c !important; text-align: center;\">No</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Moderate</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Low</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Yes</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Cowpeas</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">60-80</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">1-3 ft</td>\n                    <td style=\"padding: 10px 12px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">50-100 lbs/ac</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Moderate</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Moderate</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Inland best</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Sorghum-Sudan</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">90-120</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">5-8 ft</td>\n                    <td style=\"padding: 10px 12px; color: #8c9c8c !important; text-align: center;\">No</td>\n                    <td style=\"padding: 10px 12px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">Very High</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">High</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Inland only</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Sunn Hemp</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">60-90</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">4-6 ft</td>\n                    <td style=\"padding: 10px 12px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">100-150 lbs/ac</td>\n                    <td style=\"padding: 10px 12px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">High</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Moderate</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Inland only</span></td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Short window (4-6 weeks)? Buckwheat. Need nitrogen? Cowpeas or sunn hemp. Maximum biomass? Sorghum-sudan. Source: UC ANR, UC SAREP</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["termination-timing-by-species"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">When to Terminate Each Cover Crop</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Optimal timing for Santa Cruz County (October-sown crops)</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Species</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Terminate When</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Typical Month</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Wait Before Planting</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Crimson Clover</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">50-75% flowers fully open</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Late Feb - Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">2-3 weeks</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fava Beans</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full flower, before large pods</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Mar - Early Apr</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">3-4 weeks</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Field Peas</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Early flowering (check often)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Feb - Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">2-3 weeks</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Cereal Rye</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Boot stage (seed head forming inside sheath)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Feb - Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">3-4 weeks</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Oats</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Before seed heads emerge</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Feb - Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">2-3 weeks</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Buckwheat</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full bloom (narrow window!)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">30-40 days after sow</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">1-2 weeks</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Sorghum-Sudan</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Cut at base, late summer</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Aug - Sep</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">4-6 weeks</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Rule of thumb: work backward from your planting date. Terminate 2-4 weeks before you need the bed. Source: UC ANR Publication 8225</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["four-termination-methods"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Cover Crop Termination Methods</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Choose the right method for your garden style and timeline</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Chop and Drop</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 12px; line-height: 1.6;\">Cut at ground level. Leave residue as surface mulch. Roots stay in place.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Soil Disturbance</div>\n                            <div style=\"font-size: 0.85rem; font-weight: 600; color: #1a3b2a !important;\">None</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Wait Time</div>\n                            <div style=\"font-size: 0.85rem; font-weight: 600; color: #1a3b2a !important;\">2-4 weeks</div>\n                        </div>\n                    </div>\n                    <p style=\"font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600; margin: 0;\">Best for: no-till gardens</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Tarp and Smother</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 12px; line-height: 1.6;\">Cover with opaque tarp for 2-4 weeks. Kills and decomposes simultaneously.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Soil Disturbance</div>\n                            <div style=\"font-size: 0.85rem; font-weight: 600; color: #1a3b2a !important;\">None</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Wait Time</div>\n                            <div style=\"font-size: 0.85rem; font-weight: 600; color: #1a3b2a !important;\">2-4 weeks</div>\n                        </div>\n                    </div>\n                    <p style=\"font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600; margin: 0;\">Best for: stubborn rye, ryegrass</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Mow and Leave</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 12px; line-height: 1.6;\">String trimmer at 3 inches. Small pieces decompose fast. Efficient for larger beds.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Soil Disturbance</div>\n                            <div style=\"font-size: 0.85rem; font-weight: 600; color: #1a3b2a !important;\">Minimal</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Wait Time</div>\n                            <div style=\"font-size: 0.85rem; font-weight: 600; color: #1a3b2a !important;\">2-3 weeks</div>\n                        </div>\n                    </div>\n                    <p style=\"font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600; margin: 0;\">Best for: clover, ryegrass, oats</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Fork Incorporate</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.9rem; color: #666 !important; margin-bottom: 12px; line-height: 1.6;\">Chop first, then mix into top 3-4 inches with a garden fork. Fastest decomposition.</p>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Soil Disturbance</div>\n                            <div style=\"font-size: 0.85rem; font-weight: 600; color: #1a3b2a !important;\">Moderate</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Wait Time</div>\n                            <div style=\"font-size: 0.85rem; font-weight: 600; color: #1a3b2a !important;\">1-2 weeks</div>\n                        </div>\n                    </div>\n                    <p style=\"font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600; margin: 0;\">Best for: when speed matters</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Never incorporate deeper than 4 inches. Shallow mixing is effective mixing. Source: Oregon State University Extension, UC ANR</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["six-common-termination-mistakes"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">6 Cover Crop Termination Mistakes to Avoid</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Every one of these is avoidable with planning</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px; font-size: 0.95rem;\">1. Waiting too long</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0 0 8px 0; line-height: 1.5;\">Stems go woody, seeds set, planting window missed.</p>\n                <p style=\"font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600; margin: 0;\">Fix: Set calendar date based on planting schedule, not appearance.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px; font-size: 0.95rem;\">2. Planting too soon after</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0 0 8px 0; line-height: 1.5;\">Seedlings yellow from nitrogen tie-up during decomposition.</p>\n                <p style=\"font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600; margin: 0;\">Fix: Wait 2-4 weeks between termination and planting.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px; font-size: 0.95rem;\">3. Letting it set seed</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0 0 8px 0; line-height: 1.5;\">Volunteers compete with vegetables all season.</p>\n                <p style=\"font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600; margin: 0;\">Fix: Terminate at flowering, before seeds form.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px; font-size: 0.95rem;\">4. Incorporating too deep</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0 0 8px 0; line-height: 1.5;\">Anaerobic decomposition, foul smell, slow breakdown.</p>\n                <p style=\"font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600; margin: 0;\">Fix: Never deeper than 4 inches. Surface is best.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px; font-size: 0.95rem;\">5. Treating all species the same</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0 0 8px 0; line-height: 1.5;\">Buckwheat decomposes in days; rye takes a month.</p>\n                <p style=\"font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600; margin: 0;\">Fix: Know your species. Adjust timeline accordingly.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n                <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px; font-size: 0.95rem;\">6. Not planning for the volume</div>\n                <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0 0 8px 0; line-height: 1.5;\">A bed of favas produces a mountain of material.</p>\n                <p style=\"font-size: 0.8rem; color: #1a3b2a !important; font-weight: 600; margin: 0;\">Fix: Have tools and method decided before cutting.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["single-vs-mixed-root-systems"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Why Mixes Outperform Single Species</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Different root types explore different soil layers</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #8c9c8c !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Single Species</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <ul style=\"font-size: 0.85rem; color: #666 !important; line-height: 1.8; margin: 0; padding-left: 18px;\">\n                        <li>One root type explores one soil zone</li>\n                        <li>Either nitrogen OR biomass, not both</li>\n                        <li>Gaps in canopy allow weeds</li>\n                        <li>One food source for soil biology</li>\n                        <li>If conditions are poor, entire crop may fail</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Mixed Species (Legume + Grain)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <ul style=\"font-size: 0.85rem; color: #666 !important; line-height: 1.8; margin: 0; padding-left: 18px;\">\n                        <li>Fibrous roots work top 12 in., taproot reaches 24+ in.</li>\n                        <li>Nitrogen fixation AND carbon-rich biomass</li>\n                        <li>Different heights fill more niches, fewer weeds</li>\n                        <li>Diverse root exudates feed more microbe species</li>\n                        <li>If one species struggles, the other fills in</li>\n                    </ul>\n                    <div style=\"background-color: #f8f9f0 !important; padding: 10px; text-align: center; margin-top: 12px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Research Finding</div>\n                        <div style=\"font-size: 0.85rem; font-weight: 600; color: #1a3b2a !important;\">10-30% more total biomass than either species alone</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Source: UC SAREP Cover Crop Database, UC Davis, Oregon State University Extension</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["classic-cover-crop-mixes"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Classic Cover Crop Mixes for California</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Proven combinations for Santa Cruz County gardens</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Mix</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Rate/100 sq ft</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Height</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Best For</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Field Peas + Oats</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">3 oz peas + 3 oz oats</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">2-3 ft</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Beginners, general soil improvement</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fava Beans + Cereal Rye</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">6-8 oz favas + 2-3 oz rye</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">4-5 ft</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Poor soil, new gardens, erosion</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Crimson Clover + Ryegrass</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">1 oz clover + 1 oz ryegrass</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">12-18 in</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Raised beds, small spaces, clay soil</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Bell Beans + Oats + Daikon</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">2 oz beans + 2 oz oats + 1 oz daikon</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">2-3 ft</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Compacted ground, first-year beds</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Vetch + Cereal Rye</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">1-2 oz vetch + 2-3 oz rye</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">4-5 ft</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Maximum benefit, experienced growers</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">New to cover crops? Start with Field Peas + Oats. All mixes sow October through November. Source: UC SAREP, Oregon State University Extension</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["build-your-own-cover-crop-mix"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Build Your Own Cover Crop Mix</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Three steps to a custom blend for your soil</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Step 1</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Pick a Legume</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\">Provides nitrogen fixation.</p>\n                    <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Crimson Clover</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Fava Beans</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Field Peas</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Bell Beans</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Hairy Vetch</span>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Step 2</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Pick a Grain</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\">Provides biomass and structure.</p>\n                    <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Cereal Rye</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Oats</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Annual Ryegrass</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Barley</span>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Step 3 (Optional)</div>\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Add a Specialist</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\">Address a specific soil need.</p>\n                    <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Daikon (compaction)</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Mustard (pathogens)</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Phacelia (pollinators)</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center; margin-top: 20px;\">Seeding rate: use 50-60% of each species' solo rate in a 2-way mix, or 30-40% in a 3-way mix. Match growth heights to avoid shading.</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["winter-cover-crop-sowing-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Winter Cover Crop Sowing Timeline</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Santa Cruz County timing for maximum benefit</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; border-radius: 0; padding: 14px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600;\">Ideal</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 6px;\">Mid-Oct to Early Nov</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.4;\">Timed with first rains. Warm soil (60-70F) for fast germination. Maximum growth period.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 14px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Acceptable</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 6px;\">Late November</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.4;\">Still good. Slightly less biomass. Nearly as effective as October sowing.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 14px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Late</div>\n                <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 6px;\">December</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.4;\">25-40% less biomass. Notably thinner stand. Still better than bare soil.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #8c9c8c; border-radius: 0; padding: 14px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Last Chance</div>\n                <div style=\"font-weight: 600; color: #8c9c8c !important; font-size: 0.95rem; margin-bottom: 6px;\">January</div>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.4;\">Only fast species (oats, cereal rye). Minimal growth before spring termination.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Each month of delay reduces total biomass by roughly 25-40%. Source: UC Davis cover crop establishment research</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["five-winter-cover-crops-compared"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Winter Cover Crops Compared</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Height, biomass, nitrogen, and termination difficulty</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Species</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Height</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Biomass</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">N Fixation</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Termination</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Crimson Clover</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">12-24 in</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Moderate</td>\n                    <td style=\"padding: 10px 15px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">70-110 lbs/ac</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Easy</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fava Beans</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">3-5 ft</td>\n                    <td style=\"padding: 10px 15px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">Very High</td>\n                    <td style=\"padding: 10px 15px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">100-200 lbs/ac</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Moderate</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Field Peas + Oats</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">2-3 ft</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">High</td>\n                    <td style=\"padding: 10px 15px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">50-120 lbs/ac</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Easy</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Cereal Rye</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">3-5 ft</td>\n                    <td style=\"padding: 10px 15px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">Very High</td>\n                    <td style=\"padding: 10px 15px; color: #8c9c8c !important; text-align: center;\">None</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Harder</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Bell Beans</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">2-3 ft</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Moderate</td>\n                    <td style=\"padding: 10px 15px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">80-150 lbs/ac</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Easy</span></td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Sow all species October through early November in Santa Cruz County. Source: UC SAREP, UC ANR</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["cover-crop-overseeding-technique"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Overseeding Cover Crops Into Fall Vegetables</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Eliminate the bare-soil gap between harvest and cover crop establishment</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Late October</div>\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Broadcast Seeds</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Scatter crimson clover seed around still-growing fall kale, broccoli, or leeks.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Nov - Dec</div>\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Clover Establishes</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Seeds germinate beneath vegetable canopy. Shade-tolerant clover fills in at ground level.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Dec - Jan</div>\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Harvest Vegetables</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Pull last kale plants. Clover already has a solid foothold and takes over the bed seamlessly.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 0; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; text-align: center;\">\n                    <div style=\"font-size: 0.7rem; color: #dde2d8 !important; text-transform: uppercase; letter-spacing: 0.5px;\">Jan - Mar</div>\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 4px 0 0 0; color: #f8f9f0 !important;\">Full Cover</h3>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <p style=\"font-size: 0.85rem; color: #666 !important; margin: 0; line-height: 1.5;\">Cover crop grows actively. No bare-soil gap. Terminate at bloom for spring planting.</p>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center; margin-top: 16px;\">Best species for overseeding: crimson clover or white clover (shade-tolerant). Avoid cereal rye and oats (need more light to establish).</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
