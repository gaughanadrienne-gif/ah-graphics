window.AH_GRAPHICS["fall-winter-cover-crop-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Fall and Winter Cover Crops at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Sow October through November for best results</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 700px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Species</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Sow</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Height</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Fixes N?</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Biomass</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Termination</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Rate/100 sq ft</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 8px 12px; font-weight: 600; color: #1a3b2a !important;\">Crimson Clover</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">Oct-Nov</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">1-2 ft</td>\n                    <td style=\"padding: 8px 12px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">Yes</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">Moderate</td>\n                    <td style=\"padding: 8px 12px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 3px 8px; font-size: 0.7rem; border-radius: 3px;\">Easy</span></td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">1-2 oz</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 8px 12px; font-weight: 600; color: #1a3b2a !important;\">Fava Beans</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">Oct-Dec</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">3-5 ft</td>\n                    <td style=\"padding: 8px 12px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">Yes</td>\n                    <td style=\"padding: 8px 12px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">Very High</td>\n                    <td style=\"padding: 8px 12px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 3px 8px; font-size: 0.7rem; border-radius: 3px;\">Moderate</span></td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">1 lb</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 8px 12px; font-weight: 600; color: #1a3b2a !important;\">Field Peas</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">Oct-Nov</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">2-4 ft</td>\n                    <td style=\"padding: 8px 12px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">Yes</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">Moderate</td>\n                    <td style=\"padding: 8px 12px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 3px 8px; font-size: 0.7rem; border-radius: 3px;\">Easy</span></td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">2-4 oz</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 8px 12px; font-weight: 600; color: #1a3b2a !important;\">Cereal Rye</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">Sep-Nov</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">3-5 ft</td>\n                    <td style=\"padding: 8px 12px; color: #8c9c8c !important; text-align: center;\">No</td>\n                    <td style=\"padding: 8px 12px; color: #1a3b2a !important; text-align: center; font-weight: 600;\">Very High</td>\n                    <td style=\"padding: 8px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 8px; font-size: 0.7rem; border-radius: 3px;\">Harder</span></td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">2-4 oz</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 8px 12px; font-weight: 600; color: #1a3b2a !important;\">Oats</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">Sep-Nov</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">2-4 ft</td>\n                    <td style=\"padding: 8px 12px; color: #8c9c8c !important; text-align: center;\">No</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">High</td>\n                    <td style=\"padding: 8px 12px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 3px 8px; font-size: 0.7rem; border-radius: 3px;\">Easy</span></td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">2-4 oz</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 8px 12px; font-weight: 600; color: #1a3b2a !important;\">Annual Ryegrass</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">Sep-Oct</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">1-2 ft</td>\n                    <td style=\"padding: 8px 12px; color: #8c9c8c !important; text-align: center;\">No</td>\n                    <td style=\"padding: 8px 12px; color: #1c3c2c !important; text-align: center;\">Moderate</td>\n window.AH_GRAPHICS["seasonal-cover-crop-calendar"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Year-Round Cover Crop Calendar</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">When to sow and terminate in Santa Cruz County</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Month</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Action</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Species</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Sep - Oct</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sow winter cover crops</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Clover, fava, peas, rye, oats, vetch</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Nov - Feb</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Winter growth (no action)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Rain provides all water needed</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Late Feb - Apr</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Terminate winter cover crops</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Cut at flowering. Wait 2-4 weeks.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Apr - May</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sow summer cover crops</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Buckwheat (any bed). Cowpeas (warm areas).</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Jun - Aug</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Summer growth + termination</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Cut buckwheat at bloom. Irrigate as needed.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Aug - Sep</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Terminate summer, prep for winter</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Clear beds. Allow 2-4 weeks. Sow winter crops.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">This cycle repeats each year. Cumulative effect of annual cover cropping is transformative within 2-3 seasons.</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
