window.AH_GRAPHICS["defensible-space-zones-for-vegetable-gardens"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Defensible Space Zones for Your Garden</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">CAL FIRE zone system adapted for vegetable gardeners in Santa Cruz County</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"border: 2px solid #c0392b; background-color: #fff !important; overflow: hidden;\">\n                <div style=\"background-color: #c0392b !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #fff !important;\">Zone 0: 0-5 ft</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0; color: #fff !important; opacity: 0.9;\">Ember-Resistant Zone</p>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li style=\"padding: 4px 0;\">&#10005; No plants touching the house</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No mulch (use gravel or stone)</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No firewood or compost bins</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No wooden trellises against walls</li>\n                        <li style=\"padding: 4px 0;\">&#10003; Clean gutters and vents</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"border: 2px solid #e67e22; background-color: #fff !important; overflow: hidden;\">\n                <div style=\"background-color: #e67e22 !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #fff !important;\">Zone 1: 5-30 ft</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0; color: #fff !important; opacity: 0.9;\">Lean, Clean, and Green</p>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li style=\"padding: 4px 0;\">&#10003; Irrigated veggie beds (ideal here)</li>\n                        <li style=\"padding: 4px 0;\">&#10003; Green, well-watered plants</li>\n                        <li style=\"padding: 4px 0;\">&#10003; Low-growing herbs and groundcovers</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No dead plant material</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No dry mulch deeper than 3 inches</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"border: 2px solid #1a3b2a; background-color: #fff !important; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Zone 2: 30-100 ft</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0; color: #f8f9f0 !important; opacity: 0.9;\">Reduced Fuel Zone</p>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li style=\"padding: 4px 0;\">&#10003; Compost bins OK here</li>\n                        <li style=\"padding: 4px 0;\">&#10003; Fruit trees (spaced, pruned)</li>\n                        <li style=\"padding: 4px 0;\">&#10003; Firewood storage (stacked, covered)</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No ladder fuels to tree canopy</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No continuous brush or dry grass</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">Source: CAL FIRE Defensible Space Guidelines | Adapted for vegetable gardens</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["fire-season-garden-prep-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Fire Season Garden Prep Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Complete by Memorial Day in Santa Cruz County</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 14px; border-bottom: 2px solid #dde2d8; padding-bottom: 10px;\">Fuel Reduction</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 2;\">\n                    <li>&#9744; Clear dead plant material from all beds</li>\n                    <li>&#9744; Remove dried cover crops and bolted lettuce</li>\n                    <li>&#9744; Clean debris from under trellises and supports</li>\n                    <li>&#9744; Move dry brown material out of Zone 1</li>\n                    <li>&#9744; Trim branches within 10 ft of structures</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 14px; border-bottom: 2px solid #dde2d8; padding-bottom: 10px;\">Irrigation</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 2;\">\n                    <li>&#9744; Test all drip lines and emitters</li>\n                    <li>&#9744; Replace cracked or clogged components</li>\n                    <li>&#9744; Check timer batteries and programming</li>\n                    <li>&#9744; Verify coverage reaches all beds</li>\n                    <li>&#9744; Plan backup watering for power shutoffs</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 14px; border-bottom: 2px solid #dde2d8; padding-bottom: 10px;\">Hardscape and Structures</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 2;\">\n                    <li>&#9744; Check fences for combustible connections</li>\n                    <li>&#9744; Clear vegetation from fence lines</li>\n                    <li>&#9744; Move compost bins to Zone 2 (30+ ft)</li>\n                    <li>&#9744; Replace Zone 0 mulch with gravel</li>\n                    <li>&#9744; Remove flammable items from decks/patios</li>\n                </ul>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">Source: CAL FIRE, UC ANR Fire in California Resources</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["fire-resistant-groundcover-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Fire-Resistant Groundcover Comparison</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Lawn alternatives ranked for Santa Cruz County gardens</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 600px;\">\n            <thead>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Groundcover</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Fire Resistance</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Water Needs</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Walkable</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Height</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Spread Rate</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Creeping Thyme</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">High</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Very Low</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">&#10003;</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">2-4 in</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Moderate</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Dymondia</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">High</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Low</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">&#10003;</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">1-3 in</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Slow</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Native Yarrow</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">High</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Very Low</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Light</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">4-8 in</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Fast</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Lippia (Kurapia)</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">High</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Low</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">&#10003;</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">1-2 in</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Very Fast</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Sedum (Stonecrop)</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Very High</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Very Low</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Light</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">2-6 in</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Moderate</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important;\">Clover (White Dutch)</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Moderate</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Moderate</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">&#10003;</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">3-6 in</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Fast</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 12px 25px; background-color: #dde2d8 !important;\">\n        <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0; line-height: 1.6;\"><strong>Best for Santa Cruz coastal areas:</strong> Dymondia, creeping thyme, and native yarrow handle fog and salt air well. Lippia (Kurapia) is the fastest to establish but goes dormant in winter.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">\n        ambitiousharvest.com | Source: UC ANR Fire-Resistant Landscaping\n    </div>\n</div>";

window.AH_GRAPHICS["lawn-vs-groundcover-water-and-fire-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Traditional Lawn vs. Fire-Resistant Groundcovers</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Why groundcovers win on water, fire safety, and maintenance</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #c0392b; overflow: hidden;\">\n                <div style=\"background-color: #c0392b !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1.1rem; margin: 0; color: #fff !important;\">Traditional Lawn</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Summer Water</div>\n                            <div style=\"font-size: 1.1rem; font-weight: 700; color: #c0392b !important;\">40-60 gal/sqft/yr</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Mowing</div>\n                            <div style=\"font-size: 1.1rem; font-weight: 700; color: #c0392b !important;\">Weekly</div>\n                        </div>\n                    </div>\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10005; Becomes fire fuel when dry</li>\n                        <li>&#10005; Thatch buildup ignites easily</li>\n                        <li>&#10005; Requires constant irrigation</li>\n                        <li>&#10005; Water restrictions leave it brown</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Fire-Resistant Groundcover</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Summer Water</div>\n                            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">10-20 gal/sqft/yr</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Mowing</div>\n                            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">Never</div>\n                        </div>\n                    </div>\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10003; High moisture, low fuel content</li>\n                        <li>&#10003; No thatch accumulation</li>\n                        <li>&#10003; Survives water restrictions</li>\n                        <li>&#10003; Many support pollinators</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">Source: UC ANR, California Water Boards residential water use data</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["fencing-material-fire-risk-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Fencing Materials: Fire Risk at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Choose materials that break the fire pathway to your home</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 500px;\">\n            <thead>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Material</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Fire Risk</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Ember Resistance</th>\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Best Use</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Steel/Iron</td>\n                    <td style=\"padding: 12px 14px; text-align: center; border-bottom: 1px solid #dde2d8;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 0.75rem; font-weight: 600;\">LOWEST</span></td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Excellent</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Zone 0 and Zone 1 (near house)</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Concrete/Masonry</td>\n                    <td style=\"padding: 12px 14px; text-align: center; border-bottom: 1px solid #dde2d8;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 0.75rem; font-weight: 600;\">LOWEST</span></td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Excellent</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Any zone, acts as fire break</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Composite</td>\n                    <td style=\"padding: 12px 14px; text-align: center; border-bottom: 1px solid #dde2d8;\"><span style=\"background-color: #e67e22 !important; color: #fff !important; padding: 3px 10px; font-size: 0.75rem; font-weight: 600;\">MODERATE</span></td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Varies by brand</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Zone 2+ (verify fire rating)</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Treated Wood</td>\n                    <td style=\"padding: 12px 14px; text-align: center; border-bottom: 1px solid #dde2d8;\"><span style=\"background-color: #c0392b !important; color: #fff !important; padding: 3px 10px; font-size: 0.75rem; font-weight: 600;\">HIGH</span></td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Poor</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Zone 2+ only (never attach to house)</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important;\">Untreated Wood</td>\n                    <td style=\"padding: 12px 14px; text-align: center;\"><span style=\"background-color: #c0392b !important; color: #fff !important; padding: 3px 10px; font-size: 0.75rem; font-weight: 600;\">VERY HIGH</span></td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Very Poor</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important;\">Replace in Zone 0 and Zone 1</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 12px 25px; background-color: #dde2d8 !important;\">\n        <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0; line-height: 1.6;\"><strong>Key rule:</strong> If any wooden fence attaches directly to your house, replace at least the first 5 feet (Zone 0 section) with metal, masonry, or a non-combustible gate.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com | Source: CAL FIRE, IBHS Wildfire Prepared Home</div>\n</div>";

window.AH_GRAPHICS["structure-fire-pathway-assessment"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Does Your Property Have Fire Pathways?</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Walk your property and check each structure</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-left: 4px solid #c0392b; padding: 18px;\">\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #c0392b !important; margin: 0 0 10px;\">Fences</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                    <li>&#9744; Wood fence attached to house?</li>\n                    <li>&#9744; Vegetation growing on fence?</li>\n                    <li>&#9744; Debris at fence base?</li>\n                    <li>&#9744; Gaps under gates?</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #e67e22; padding: 18px;\">\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #e67e22 !important; margin: 0 0 10px;\">Decks and Patios</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                    <li>&#9744; Combustible material stored under deck?</li>\n                    <li>&#9744; Gaps allowing ember entry?</li>\n                    <li>&#9744; Flammable furniture or cushions?</li>\n                    <li>&#9744; Plants in combustible containers?</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 18px;\">\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 10px;\">Outbuildings</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                    <li>&#9744; Shed within 30 ft of house?</li>\n                    <li>&#9744; Continuous fuel connecting to home?</li>\n                    <li>&#9744; Pergola or arbor attached to house?</li>\n                    <li>&#9744; Firewood stacked against structure?</li>\n                </ul>\n            </div>\n        </div>\n        <div style=\"margin-top: 16px; padding: 14px 18px; background-color: #dde2d8 !important;\">\n            <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0; line-height: 1.6;\"><strong>Any \"yes\" answer</strong> means you have a potential fire pathway. Prioritize structures closest to your home (Zone 0 first, then Zone 1).</p>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["post-fire-garden-recovery-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Garden Recovery After Wildfire</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">A realistic timeline for Santa Cruz County gardeners</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"position: relative;\">\n            <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;\">\n                <div style=\"background-color: #fff !important; border-top: 4px solid #c0392b; padding: 18px;\">\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Phase 1</div>\n                    <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px;\">Assessment</h3>\n                    <div style=\"font-size: 0.8rem; font-weight: 600; color: #c0392b !important; margin-bottom: 10px;\">Weeks 1-4</div>\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.8rem; color: #1a3b2a !important; line-height: 1.7;\">\n                        <li>Document damage</li>\n                        <li>Test soil for contaminants</li>\n                        <li>Evaluate tree survival</li>\n                        <li>Check irrigation systems</li>\n                    </ul>\n                </div>\n                <div style=\"background-color: #fff !important; border-top: 4px solid #e67e22; padding: 18px;\">\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Phase 2</div>\n                    <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px;\">Stabilization</h3>\n                    <div style=\"font-size: 0.8rem; font-weight: 600; color: #e67e22 !important; margin-bottom: 10px;\">Months 1-3</div>\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.8rem; color: #1a3b2a !important; line-height: 1.7;\">\n                        <li>Erosion control (critical)</li>\n                        <li>Remove hazard trees</li>\n                        <li>Rebuild raised beds</li>\n                        <li>Repair irrigation</li>\n                    </ul>\n                </div>\n                <div style=\"background-color: #fff !important; border-top: 4px solid #8c9c8c; padding: 18px;\">\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Phase 3</div>\n                    <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px;\">Soil Recovery</h3>\n                    <div style=\"font-size: 0.8rem; font-weight: 600; color: #8c9c8c !important; margin-bottom: 10px;\">Months 3-12</div>\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.8rem; color: #1a3b2a !important; line-height: 1.7;\">\n                        <li>Add compost and amendments</li>\n                        <li>Rebuild soil biology</li>\n                        <li>Plant cover crops</li>\n                        <li>Start easy vegetables</li>\n                    </ul>\n                </div>\n                <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px;\">\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Phase 4</div>\n                    <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px;\">Full Replanting</h3>\n                    <div style=\"font-size: 0.8rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 10px;\">Year 2+</div>\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.8rem; color: #1a3b2a !important; line-height: 1.7;\">\n                        <li>Replant fruit trees</li>\n                        <li>Establish perennials</li>\n                        <li>Full vegetable rotation</li>\n                        <li>Rebuild fire-wise design</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">Based on CZU Lightning Complex recovery experiences, Santa Cruz County 2020-2022</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["tree-survival-assessment-after-fire"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Will Your Tree Survive? Post-Fire Assessment</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Don't remove trees too quickly. Many will resprout.</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Likely to Survive</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10003; Light bark scorching only</li>\n                        <li>&#10003; Green canopy still intact</li>\n                        <li>&#10003; Understory burned, crown fine</li>\n                        <li>&#10003; Resprouting from base/trunk</li>\n                    </ul>\n                    <div style=\"margin-top: 12px; padding: 10px; background-color: #dde2d8 !important; font-size: 0.8rem; color: #1a3b2a !important;\">\n                        <strong>Action:</strong> Water deeply, monitor for 6+ months\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #e67e22; overflow: hidden;\">\n                <div style=\"background-color: #e67e22 !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0; color: #fff !important;\">Wait and See</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#9679; Partial crown damage</li>\n                        <li>&#9679; Scorched bark, cambium intact</li>\n                        <li>&#9679; Dropped leaves, buds intact</li>\n                        <li>&#9679; Some green showing</li>\n                    </ul>\n                    <div style=\"margin-top: 12px; padding: 10px; background-color: #dde2d8 !important; font-size: 0.8rem; color: #1a3b2a !important;\">\n                        <strong>Action:</strong> Wait one full growing season before deciding\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #c0392b; overflow: hidden;\">\n                <div style=\"background-color: #c0392b !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0; color: #fff !important;\">Likely Lost</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10005; Entire canopy burned</li>\n                        <li>&#10005; Bark charred all around trunk</li>\n                        <li>&#10005; No green or sprouts after months</li>\n                        <li>&#10005; Brittle wood, snaps easily</li>\n                    </ul>\n                    <div style=\"margin-top: 12px; padding: 10px; background-color: #dde2d8 !important; font-size: 0.8rem; color: #1a3b2a !important;\">\n                        <strong>Action:</strong> Have arborist assess before removing\n                    </div>\n                </div>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">Source: UC ANR Fire Recovery Resources, CAL FIRE Post-Fire Forestry</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["irrigation-depth-and-frequency-for-fire-safety"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Summer Irrigation for Fire Safety</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Keep plants hydrated and fire-resistant through Santa Cruz dry season</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 500px;\">\n            <thead>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Garden Type</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Water Depth</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Frequency</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Best Method</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Raised Beds (veggies)</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">6-12 inches</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Every 2-3 days</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Drip irrigation</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">In-Ground Beds</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">8-12 inches</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Every 3-5 days</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Drip or soaker hose</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Fruit Trees</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">18-24 inches</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Weekly (deep soak)</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Basin or drip ring</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Groundcovers (Zone 1)</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">4-6 inches</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Every 5-7 days</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Low-volume sprinkler</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important;\">Containers</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Until drains</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Daily in heat</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Hand water or drip</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 12px 25px; background-color: #dde2d8 !important;\">\n        <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0; line-height: 1.6;\"><strong>Fire safety tip:</strong> Water in early morning (before 10 AM). This keeps plants hydrated through peak fire danger hours and reduces evaporation loss by up to 30%.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com | Source: UC ANR, CAL FIRE Zone 1 Guidelines</div>\n</div>";

window.AH_GRAPHICS["power-shutoff-irrigation-backup-plan"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">When the Power Goes Out: Irrigation Backup Plan</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Keep your garden watered during PSPS and Red Flag events</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Before Shutoff</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 12px;\">Prepare</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                    <li>&#10003; Deep-water all beds the day before</li>\n                    <li>&#10003; Fill storage containers (5-gal buckets)</li>\n                    <li>&#10003; Add extra mulch to retain moisture</li>\n                    <li>&#10003; Water fruit trees deeply</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">During Shutoff</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 12px;\">Maintain</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                    <li>&#10003; Hand water priority crops (tomatoes, peppers)</li>\n                    <li>&#10003; Use stored water for containers first</li>\n                    <li>&#10003; Gravity-fed systems work without power</li>\n                    <li>&#10003; Battery backup timers keep drip running</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">After Power Returns</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 12px;\">Recover</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                    <li>&#10003; Run full irrigation cycle immediately</li>\n                    <li>&#10003; Check for wilted or stressed plants</li>\n                    <li>&#10003; Reset timers if they lost programming</li>\n                    <li>&#10003; Refill backup water storage</li>\n                </ul>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">PG&E PSPS events in Santa Cruz County typically last 24-48 hours during high fire danger</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";


window.AH_GRAPHICS["after-the-fire-restoring-your-garden-post-wildfire-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Garden Recovery After Wildfire</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">A realistic timeline for Santa Cruz County gardeners</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"position: relative;\">\n            <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;\">\n                <div style=\"background-color: #fff !important; border-top: 4px solid #c0392b; padding: 18px;\">\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Phase 1</div>\n                    <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px;\">Assessment</h3>\n                    <div style=\"font-size: 0.8rem; font-weight: 600; color: #c0392b !important; margin-bottom: 10px;\">Weeks 1-4</div>\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.8rem; color: #1a3b2a !important; line-height: 1.7;\">\n                        <li>Document damage</li>\n                        <li>Test soil for contaminants</li>\n                        <li>Evaluate tree survival</li>\n                        <li>Check irrigation systems</li>\n                    </ul>\n                </div>\n                <div style=\"background-color: #fff !important; border-top: 4px solid #e67e22; padding: 18px;\">\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Phase 2</div>\n                    <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px;\">Stabilization</h3>\n                    <div style=\"font-size: 0.8rem; font-weight: 600; color: #e67e22 !important; margin-bottom: 10px;\">Months 1-3</div>\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.8rem; color: #1a3b2a !important; line-height: 1.7;\">\n                        <li>Erosion control (critical)</li>\n                        <li>Remove hazard trees</li>\n                        <li>Rebuild raised beds</li>\n                        <li>Repair irrigation</li>\n                    </ul>\n                </div>\n                <div style=\"background-color: #fff !important; border-top: 4px solid #8c9c8c; padding: 18px;\">\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Phase 3</div>\n                    <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px;\">Soil Recovery</h3>\n                    <div style=\"font-size: 0.8rem; font-weight: 600; color: #8c9c8c !important; margin-bottom: 10px;\">Months 3-12</div>\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.8rem; color: #1a3b2a !important; line-height: 1.7;\">\n                        <li>Add compost and amendments</li>\n                        <li>Rebuild soil biology</li>\n                        <li>Plant cover crops</li>\n                        <li>Start easy vegetables</li>\n                    </ul>\n                </div>\n                <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px;\">\n                    <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Phase 4</div>\n                    <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 8px;\">Full Replanting</h3>\n                    <div style=\"font-size: 0.8rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 10px;\">Year 2+</div>\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.8rem; color: #1a3b2a !important; line-height: 1.7;\">\n                        <li>Replant fruit trees</li>\n                        <li>Establish perennials</li>\n                        <li>Full vegetable rotation</li>\n                        <li>Rebuild fire-wise design</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">Based on CZU Lightning Complex recovery experiences, Santa Cruz County 2020-2022</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["after-the-fire-restoring-your-garden-post-wildfire-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Will Your Tree Survive? Post-Fire Assessment</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Don't remove trees too quickly. Many will resprout.</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Likely to Survive</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10003; Light bark scorching only</li>\n                        <li>&#10003; Green canopy still intact</li>\n                        <li>&#10003; Understory burned, crown fine</li>\n                        <li>&#10003; Resprouting from base/trunk</li>\n                    </ul>\n                    <div style=\"margin-top: 12px; padding: 10px; background-color: #dde2d8 !important; font-size: 0.8rem; color: #1a3b2a !important;\">\n                        <strong>Action:</strong> Water deeply, monitor for 6+ months\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #e67e22; overflow: hidden;\">\n                <div style=\"background-color: #e67e22 !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0; color: #fff !important;\">Wait and See</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#9679; Partial crown damage</li>\n                        <li>&#9679; Scorched bark, cambium intact</li>\n                        <li>&#9679; Dropped leaves, buds intact</li>\n                        <li>&#9679; Some green showing</li>\n                    </ul>\n                    <div style=\"margin-top: 12px; padding: 10px; background-color: #dde2d8 !important; font-size: 0.8rem; color: #1a3b2a !important;\">\n                        <strong>Action:</strong> Wait one full growing season before deciding\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #c0392b; overflow: hidden;\">\n                <div style=\"background-color: #c0392b !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0; color: #fff !important;\">Likely Lost</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10005; Entire canopy burned</li>\n                        <li>&#10005; Bark charred all around trunk</li>\n                        <li>&#10005; No green or sprouts after months</li>\n                        <li>&#10005; Brittle wood, snaps easily</li>\n                    </ul>\n                    <div style=\"margin-top: 12px; padding: 10px; background-color: #dde2d8 !important; font-size: 0.8rem; color: #1a3b2a !important;\">\n                        <strong>Action:</strong> Have arborist assess before removing\n                    </div>\n                </div>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">Source: UC ANR Fire Recovery Resources, CAL FIRE Post-Fire Forestry</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["fire-wise-fencing-and-structures-preventing-fire-pathways-to-your-home-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Fencing Materials: Fire Risk at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Choose materials that break the fire pathway to your home</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 500px;\">\n            <thead>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Material</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Fire Risk</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Ember Resistance</th>\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Best Use</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Steel/Iron</td>\n                    <td style=\"padding: 12px 14px; text-align: center; border-bottom: 1px solid #dde2d8;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 0.75rem; font-weight: 600;\">LOWEST</span></td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Excellent</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Zone 0 and Zone 1 (near house)</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Concrete/Masonry</td>\n                    <td style=\"padding: 12px 14px; text-align: center; border-bottom: 1px solid #dde2d8;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 0.75rem; font-weight: 600;\">LOWEST</span></td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Excellent</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Any zone, acts as fire break</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Composite</td>\n                    <td style=\"padding: 12px 14px; text-align: center; border-bottom: 1px solid #dde2d8;\"><span style=\"background-color: #e67e22 !important; color: #fff !important; padding: 3px 10px; font-size: 0.75rem; font-weight: 600;\">MODERATE</span></td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Varies by brand</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Zone 2+ (verify fire rating)</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Treated Wood</td>\n                    <td style=\"padding: 12px 14px; text-align: center; border-bottom: 1px solid #dde2d8;\"><span style=\"background-color: #c0392b !important; color: #fff !important; padding: 3px 10px; font-size: 0.75rem; font-weight: 600;\">HIGH</span></td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Poor</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Zone 2+ only (never attach to house)</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important;\">Untreated Wood</td>\n                    <td style=\"padding: 12px 14px; text-align: center;\"><span style=\"background-color: #c0392b !important; color: #fff !important; padding: 3px 10px; font-size: 0.75rem; font-weight: 600;\">VERY HIGH</span></td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Very Poor</td>\n                    <td style=\"padding: 12px 14px; color: #1a3b2a !important;\">Replace in Zone 0 and Zone 1</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 12px 25px; background-color: #dde2d8 !important;\">\n        <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0; line-height: 1.6;\"><strong>Key rule:</strong> If any wooden fence attaches directly to your house, replace at least the first 5 feet (Zone 0 section) with metal, masonry, or a non-combustible gate.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com | Source: CAL FIRE, IBHS Wildfire Prepared Home</div>\n</div>";
window.AH_GRAPHICS["fire-wise-fencing-and-structures-preventing-fire-pathways-to-your-home-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Does Your Property Have Fire Pathways?</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Walk your property and check each structure</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-left: 4px solid #c0392b; padding: 18px;\">\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #c0392b !important; margin: 0 0 10px;\">Fences</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                    <li>&#9744; Wood fence attached to house?</li>\n                    <li>&#9744; Vegetation growing on fence?</li>\n                    <li>&#9744; Debris at fence base?</li>\n                    <li>&#9744; Gaps under gates?</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #e67e22; padding: 18px;\">\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #e67e22 !important; margin: 0 0 10px;\">Decks and Patios</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                    <li>&#9744; Combustible material stored under deck?</li>\n                    <li>&#9744; Gaps allowing ember entry?</li>\n                    <li>&#9744; Flammable furniture or cushions?</li>\n                    <li>&#9744; Plants in combustible containers?</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 18px;\">\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 10px;\">Outbuildings</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                    <li>&#9744; Shed within 30 ft of house?</li>\n                    <li>&#9744; Continuous fuel connecting to home?</li>\n                    <li>&#9744; Pergola or arbor attached to house?</li>\n                    <li>&#9744; Firewood stacked against structure?</li>\n                </ul>\n            </div>\n        </div>\n        <div style=\"margin-top: 16px; padding: 14px 18px; background-color: #dde2d8 !important;\">\n            <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0; line-height: 1.6;\"><strong>Any \"yes\" answer</strong> means you have a potential fire pathway. Prioritize structures closest to your home (Zone 0 first, then Zone 1).</p>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
