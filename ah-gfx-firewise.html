adding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Very High</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Very Low</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Light</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">2-6 in</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Moderate</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important;\">Clover (White Dutch)</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Moderate</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Moderate</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">&#10003;</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">3-6 in</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Fast</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 12px 25px; background-color: #dde2d8 !important;\">\n        <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0; line-height: 1.6;\"><strong>Best for Santa Cruz coastal areas:</strong> Dymondia, creeping thyme, and native yarrow handle fog and salt air well. Lippia (Kurapia) is the fastest to establish but goes dormant in winter.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">\n        ambitiousharvest.com | Source: UC ANR Fire-Resistant Landscaping\n    </div>\n</div>";
window.AH_GRAPHICS["groundcovers-that-replace-lawn-and-reduce-fire-risk-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Traditional Lawn vs. Fire-Resistant Groundcovers</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Why groundcovers win on water, fire safety, and maintenance</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #c0392b; overflow: hidden;\">\n                <div style=\"background-color: #c0392b !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1.1rem; margin: 0; color: #fff !important;\">Traditional Lawn</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Summer Water</div>\n                            <div style=\"font-size: 1.1rem; font-weight: 700; color: #c0392b !important;\">40-60 gal/sqft/yr</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Mowing</div>\n                            <div style=\"font-size: 1.1rem; font-weight: 700; color: #c0392b !important;\">Weekly</div>\n                        </div>\n                    </div>\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10005; Becomes fire fuel when dry</li>\n                        <li>&#10005; Thatch buildup ignites easily</li>\n                        <li>&#10005; Requires constant irrigation</li>\n                        <li>&#10005; Water restrictions leave it brown</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Fire-Resistant Groundcover</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Summer Water</div>\n                            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">10-20 gal/sqft/yr</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 12px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Mowing</div>\n                            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">Never</div>\n                        </div>\n                    </div>\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li>&#10003; High moisture, low fuel content</li>\n                        <li>&#10003; No thatch accumulation</li>\n                        <li>&#10003; Survives water restrictions</li>\n                        <li>&#10003; Many support pollinators</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">Source: UC ANR, California Water Boards residential water use data</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["preparing-your-vegetable-garden-for-fire-season-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Defensible Space Zones for Your Garden</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">CAL FIRE zone system adapted for vegetable gardeners in Santa Cruz County</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"border: 2px solid #c0392b; background-color: #fff !important; overflow: hidden;\">\n                <div style=\"background-color: #c0392b !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #fff !important;\">Zone 0: 0-5 ft</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0; color: #fff !important; opacity: 0.9;\">Ember-Resistant Zone</p>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li style=\"padding: 4px 0;\">&#10005; No plants touching the house</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No mulch (use gravel or stone)</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No firewood or compost bins</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No wooden trellises against walls</li>\n                        <li style=\"padding: 4px 0;\">&#10003; Clean gutters and vents</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"border: 2px solid #e67e22; background-color: #fff !important; overflow: hidden;\">\n                <div style=\"background-color: #e67e22 !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #fff !important;\">Zone 1: 5-30 ft</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0; color: #fff !important; opacity: 0.9;\">Lean, Clean, and Green</p>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li style=\"padding: 4px 0;\">&#10003; Irrigated veggie beds (ideal here)</li>\n                        <li style=\"padding: 4px 0;\">&#10003; Green, well-watered plants</li>\n                        <li style=\"padding: 4px 0;\">&#10003; Low-growing herbs and groundcovers</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No dead plant material</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No dry mulch deeper than 3 inches</li>\n                    </ul>\n                </div>\n            </div>\n            <div style=\"border: 2px solid #1a3b2a; background-color: #fff !important; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Zone 2: 30-100 ft</h3>\n                    <p style=\"font-size: 0.75rem; margin: 4px 0 0; color: #f8f9f0 !important; opacity: 0.9;\">Reduced Fuel Zone</p>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                        <li style=\"padding: 4px 0;\">&#10003; Compost bins OK here</li>\n                        <li style=\"padding: 4px 0;\">&#10003; Fruit trees (spaced, pruned)</li>\n                        <li style=\"padding: 4px 0;\">&#10003; Firewood storage (stacked, covered)</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No ladder fuels to tree canopy</li>\n                        <li style=\"padding: 4px 0;\">&#10005; No continuous brush or dry grass</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">Source: CAL FIRE Defensible Space Guidelines | Adapted for vegetable gardens</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["preparing-your-vegetable-garden-for-fire-season-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Fire Season Garden Prep Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Complete by Memorial Day in Santa Cruz County</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 14px; border-bottom: 2px solid #dde2d8; padding-bottom: 10px;\">Fuel Reduction</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 2;\">\n                    <li>&#9744; Clear dead plant material from all beds</li>\n                    <li>&#9744; Remove dried cover crops and bolted lettuce</li>\n                    <li>&#9744; Clean debris from under trellises and supports</li>\n                    <li>&#9744; Move dry brown material out of Zone 1</li>\n                    <li>&#9744; Trim branches within 10 ft of structures</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 14px; border-bottom: 2px solid #dde2d8; padding-bottom: 10px;\">Irrigation</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 2;\">\n                    <li>&#9744; Test all drip lines and emitters</li>\n                    <li>&#9744; Replace cracked or clogged components</li>\n                    <li>&#9744; Check timer batteries and programming</li>\n                    <li>&#9744; Verify coverage reaches all beds</li>\n                    <li>&#9744; Plan backup watering for power shutoffs</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 14px; border-bottom: 2px solid #dde2d8; padding-bottom: 10px;\">Hardscape and Structures</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 2;\">\n                    <li>&#9744; Check fences for combustible connections</li>\n                    <li>&#9744; Clear vegetation from fence lines</li>\n                    <li>&#9744; Move compost bins to Zone 2 (30+ ft)</li>\n                    <li>&#9744; Replace Zone 0 mulch with gravel</li>\n                    <li>&#9744; Remove flammable items from decks/patios</li>\n                </ul>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">Source: CAL FIRE, UC ANR Fire in California Resources</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
window.AH_GRAPHICS["summer-garden-irrigation-for-fire-safety-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Summer Irrigation for Fire Safety</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Keep plants hydrated and fire-resistant through Santa Cruz dry season</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 500px;\">\n            <thead>\n                <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n                    <th style=\"padding: 12px 14px; text-align: left; font-weight: 600; color: #f8f9f0 !important;\">Garden Type</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Water Depth</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Frequency</th>\n                    <th style=\"padding: 12px 14px; text-align: center; font-weight: 600; color: #f8f9f0 !important;\">Best Method</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Raised Beds (veggies)</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">6-12 inches</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Every 2-3 days</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Drip irrigation</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">In-Ground Beds</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">8-12 inches</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Every 3-5 days</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Drip or soaker hose</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Fruit Trees</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">18-24 inches</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Weekly (deep soak)</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Basin or drip ring</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Groundcovers (Zone 1)</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">4-6 inches</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Every 5-7 days</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important; border-bottom: 1px solid #dde2d8;\">Low-volume sprinkler</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 12px 14px; font-weight: 600; color: #1a3b2a !important;\">Containers</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Until drains</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Daily in heat</td>\n                    <td style=\"padding: 12px 14px; text-align: center; color: #1a3b2a !important;\">Hand water or drip</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 12px 25px; background-color: #dde2d8 !important;\">\n        <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0; line-height: 1.6;\"><strong>Fire safety tip:</strong> Water in early morning (before 10 AM). This keeps plants hydrated through peak fire danger hours and reduces evaporation loss by up to 30%.</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com | Source: UC ANR, CAL FIRE Zone 1 Guidelines</div>\n</div>";
window.AH_GRAPHICS["summer-garden-irrigation-for-fire-safety-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">When the Power Goes Out: Irrigation Backup Plan</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Keep your garden watered during PSPS and Red Flag events</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Before Shutoff</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 12px;\">Prepare</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                    <li>&#10003; Deep-water all beds the day before</li>\n                    <li>&#10003; Fill storage containers (5-gal buckets)</li>\n                    <li>&#10003; Add extra mulch to retain moisture</li>\n                    <li>&#10003; Water fruit trees deeply</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">During Shutoff</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 12px;\">Maintain</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                    <li>&#10003; Hand water priority crops (tomatoes, peppers)</li>\n                    <li>&#10003; Use stored water for containers first</li>\n                    <li>&#10003; Gravity-fed systems work without power</li>\n                    <li>&#10003; Battery backup timers keep drip running</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">After Power Returns</div>\n                <h3 style=\"font-size: 0.95rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 12px;\">Recover</h3>\n                <ul style=\"list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: #1a3b2a !important; line-height: 1.8;\">\n                    <li>&#10003; Run full irrigation cycle immediately</li>\n                    <li>&#10003; Check for wilted or stressed plants</li>\n                    <li>&#10003; Reset timers if they lost programming</li>\n                    <li>&#10003; Refill backup water storage</li>\n                </ul>\n            </div>\n        </div>\n        <p style=\"font-size: 0.75rem; color: #8c9c8c !important; margin: 16px 0 0; text-align: center;\">PG&E PSPS events in Santa Cruz County typically last 24-48 hours during high fire danger</p>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["fire-wise-gardening-with-california-natives-g1"] = "<div class=\"ah-toolkit-callout\" style=\"font-family:Montserrat,Arial,sans-serif;background-color:#f8f9f0 !important;border:1px solid #dde2d8;border-radius:6px;padding:0;margin:2em auto;width:100%;box-sizing:border-box;\"><div style=\"background-color:#1a3b2a !important;color:#ffffff !important;padding:14px 24px;border-radius:6px 6px 0 0;\"><p style=\"font-size:18px;font-weight:700;color:#ffffff !important;margin:0;line-height:1.3;\">Free California Gardening Resources</p></div><div style=\"padding:24px;\"><p style=\"font-size:15px;color:#333333 !important;margin:0 0 8px 0;line-height:1.6;\">Looking for more help with your California garden? We put together a collection of 12 free PDF guides covering planting schedules, variety selection, soil prep, and more. All of them are tailored to California growing conditions.</p><p style=\"font-size:15px;color:#333333 !important;margin:0 0 20px 0;line-height:1.6;\">They are free, they are practical, and you can download them right now.</p><div style=\"margin-bottom:8px;\"><a href=\"https://ambitiousharvest.com/your-garden-toolkit\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background-color:#1a3b2a !important;color:#ffffff !important;text-decoration:none;padding:12px 28px;border-radius:4px;font-size:14px;font-weight:600;letter-spacing:0.5px;\">Browse the Free Toolkit</a></div></div><div style=\"padding:8px 24px;border-top:1px solid #dde2d8;text-align:right;\"><span style=\"font-size:11px;color:#1a3b2a !important;font-weight:500;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["what-not-to-plant-near-your-home-fire-hazard-plants-to-avoid-g1"] = "<div class=\"ah-toolkit-callout\" style=\"font-family:Montserrat,Arial,sans-serif;background-color:#f8f9f0 !important;border:1px solid #dde2d8;border-radius:6px;padding:0;margin:2em auto;width:100%;box-sizing:border-box;\"><div style=\"background-color:#1a3b2a !important;color:#ffffff !important;padding:14px 24px;border-radius:6px 6px 0 0;\"><p style=\"font-size:18px;font-weight:700;color:#ffffff !important;margin:0;line-height:1.3;\">Free California Gardening Resources</p></div><div style=\"padding:24px;\"><p style=\"font-size:15px;color:#333333 !important;margin:0 0 8px 0;line-height:1.6;\">Looking for more help with your California garden? We put together a collection of 12 free PDF guides covering planting schedules, variety selection, soil prep, and more. All of them are tailored to California growing conditions.</p><p style=\"font-size:15px;color:#333333 !important;margin:0 0 20px 0;line-height:1.6;\">They are free, they are practical, and you can download them right now.</p><div style=\"margin-bottom:8px;\"><a href=\"https://ambitiousharvest.com/your-garden-toolkit\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background-color:#1a3b2a !important;color:#ffffff !important;text-decoration:none;padding:12px 28px;border-radius:4px;font-size:14px;font-weight:600;letter-spacing:0.5px;\">Browse the Free Toolkit</a></div></div><div style=\"padding:8px 24px;border-top:1px solid #dde2d8;text-align:right;\"><span style=\"font-size:11px;color:#1a3b2a !important;font-weight:500;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["10-fire-resistant-plants-for-santa-cruz-gardens-g1"] = "<div class=\"ah-table-wrap\">\n <div class=\"ah-table-title\">\n Plant Traits That Influence Fire Behavior\n </div>\n\n <table class=\"ah-table\">\n <thead>\n <tr>\n <th scope=\"col\">Trait</th>\n <th scope=\"col\">Better for fire resistance</th>\n <th scope=\"col\">Higher fire risk</th>\n <th scope=\"col\">Notes</th>\n </tr>\n </thead>\n <tbody>\n <tr>\n <th scope=\"row\">Leaf and stem moisture</th>\n <td>Succulents, fleshy leaves, or thick evergreen foliage that stays moist</td>\n <td>Thin, dry, or papery leaves</td>\n <td>High-moisture leaves (often 80 to 95% water) are slower to ignite</td>\n </tr>\n <tr>\n <th scope=\"row\">Oils and resins</th>\n <td>Low-oil foliage</td>\n <td>High-oil foliage (some aromatics and resinous shrubs)</td>\n <td>Aromatic and resinous plants can burn very intensely when dry</td>\n </tr>\n <tr>\n <th scope=\"row\">Dead material</th>\n <td>Plants that shed little dead wood and are easy to prune</td>\n <td>Plants that hold dead twigs and leaves or build thick thatch</td>\n <td>Even a \u201cgood\u201d plant becomes risky if dead material accumulates</td>\n </tr>\n <tr>\n <th scope=\"row\">Structure and height</th>\n <td>Low, open, widely spaced plants</td>\n <td>Tall, dense, continuous hedges or screens</td>\n <td>Dense, continuous fuel beds allow fire to move more easily</td>\n </tr>\n </tbody>\n </table>\n</div>";
window.AH_GRAPHICS["10-fire-resistant-plants-for-santa-cruz-gardens-g2"] = "<div class=\"ah-table-wrap\">\n <div class=\"ah-table-title\">\n Suggested Zone Placement for Featured Plants\n </div>\n\n <table class=\"ah-table\">\n <thead>\n <tr>\n <th scope=\"col\">Plant</th>\n <th scope=\"col\">Primary use zones</th>\n <th scope=\"col\">Key maintenance notes</th>\n </tr>\n </thead>\n <tbody>\n <tr>\n <th scope=\"row\">Toyon</th>\n <td>Zone 2 and beyond</td>\n <td>Prune lower branches; avoid dense hedges next to structures</td>\n </tr>\n <tr>\n <th scope=\"row\">Rockrose</th>\n <td>Zone 2</td>\n <td>Shear or thin periodically to remove dead wood and keep plants low</td>\n </tr>\n <tr>\n <th scope=\"row\">California fuchsia</th>\n <td>Zone 1 edges, Zone 2</td>\n <td>Cut back dormant stems; prevent thatch buildup</td>\n </tr>\n <tr>\n <th scope=\"row\">Yarrow</th>\n <td>Zones 1 to 2</td>\n <td>Deadhead and thin clumps to limit dry flower stalks</td>\n </tr>\n <tr>\n <th scope=\"row\">Lavender</th>\n <td>Zone 2</td>\n <td>Prune annually; replace overly woody plants; keep out of Zone 0</td>\n </tr>\n <tr>\n <th scope=\"row\">Stonecrop (sedum)</th>\n <td>Zones 0 to 1 in containers; Zones 1 to 2 in-ground</td>\n <td>Keep mats thinned; remove dead foliage as needed</td>\n </tr>\n <tr>\n <th scope=\"row\">Coyote brush</th>\n <td>Zone 2</td>\n <td>Use low cultivars; shear regularly; remove dead stems</td>\n </tr>\n <tr>\n <th scope=\"row\">Coast live oak</th>\n <td>Zone 2+</td>\n <td>Limb up 6 to 10 ft; clear leaf litter and ladder fuels underneath</td>\n </tr>\n <tr>\n <th scope=\"row\">Sages (Salvia species)</th>\n <td>Zone 2</td>\n <td>Prune after bloom; avoid planting dense aromatic masses near the house</td>\n </tr>\n <tr>\n <th scope=\"row\">Ice plant</th>\n <td>Zones 1 to 2; Zone 0 only in containers on hardscape</td>\n <td>Remove accumulated thatch; control spread in sensitive areas</td>\n </tr>\n </tbody>\n </table>\n</div>";
window.AH_GRAPHICS["10-fire-resistant-plants-for-santa-cruz-gardens-g3"] = "<div class=\"ah-table-wrap\">\n <div class=\"ah-table-title\">\n Plant Traits That Influence Fire Behavior\n </div>\n\n <table class=\"ah-table\">\n <thead>\n <tr>\n <th scope=\"col\">Trait</th>\n <th scope=\"col\">Better for fire resistance</th>\n <th scope=\"col\">Higher fire risk</th>\n <th scope=\"col\">Notes</th>\n </tr>\n </thead>\n <tbody>\n <tr>\n <th scope=\"row\">Leaf and stem moisture</th>\n <td>Succulents, fleshy leaves, or thick evergreen foliage that stays moist</td>\n <td>Thin, dry, or papery leaves</td>\n <td>High-moisture leaves (often 80 to 95% water) are slower to ignite</td>\n </tr>\n <tr>\n <th scope=\"row\">Oils and resins</th>\n <td>Low-oil foliage</td>\n <td>High-oil foliage (some aromatics and resinous shrubs)</td>\n <td>Aromatic and resinous plants can burn very intensely when dry</td>\n </tr>\n <tr>\n <th scope=\"row\">Dead material</th>\n <td>Plants that shed little dead wood and are easy to prune</td>\n <td>Plants that hold dead twigs and leaves or build thick thatch</td>\n <td>Even a \u201cgood\u201d plant becomes risky if dead material accumulates</td>\n </tr>\n <tr>\n <th scope=\"row\">Structure and height</th>\n <td>Low, open, widely spaced plants</td>\n <td>Tall, dense, continuous hedges or screens</td>\n <td>Dense, continuous fuel beds allow fire to move more easily</td>\n </tr>\n </tbody>\n </table>\n</div>";
window.AH_GRAPHICS["10-fire-resistant-plants-for-santa-cruz-gardens-g4"] = "<div class=\"ah-table-wrap\">\n <div class=\"ah-table-title\">\n Suggested Zone Placement for Featured Plants\n </div>\n\n <table class=\"ah-table\">\n <thead>\n <tr>\n <th scope=\"col\">Plant</th>\n <th scope=\"col\">Primary use zones</th>\n <th scope=\"col\">Key maintenance notes</th>\n </tr>\n </thead>\n <tbody>\n <tr>\n <th scope=\"row\">Toyon</th>\n <td>Zone 2 and beyond</td>\n <td>Prune lower branches; avoid dense hedges next to structures</td>\n </tr>\n <tr>\n <th scope=\"row\">Rockrose</th>\n <td>Zone 2</td>\n <td>Shear or thin periodically to remove dead wood and keep plants low</td>\n </tr>\n <tr>\n <th scope=\"row\">California fuchsia</th>\n <td>Zone 1 edges, Zone 2</td>\n <td>Cut back dormant stems; prevent thatch buildup</td>\n </tr>\n <tr>\n <th scope=\"row\">Yarrow</th>\n <td>Zones 1 to 2</td>\n <td>Deadhead and thin clumps to limit dry flower stalks</td>\n </tr>\n <tr>\n <th scope=\"row\">Lavender</th>\n <td>Zone 2</td>\n <td>Prune annually; replace overly woody plants; keep out of Zone 0</td>\n </tr>\n <tr>\n <th scope=\"row\">Stonecrop (sedum)</th>\n <td>Zones 0 to 1 in containers; Zones 1 to 2 in-ground</td>\n <td>Keep mats thinned; remove dead foliage as needed</td>\n </tr>\n <tr>\n <th scope=\"row\">Coyote brush</th>\n <td>Zone 2</td>\n <td>Use low cultivars; shear regularly; remove dead stems</td>\n </tr>\n <tr>\n <th scope=\"row\">Coast live oak</th>\n <td>Zone 2+</td>\n <td>Limb up 6 to 10 ft; clear leaf litter and ladder fuels underneath</td>\n </tr>\n <tr>\n <th scope=\"row\">Sages (Salvia species)</th>\n <td>Zone 2</td>\n <td>Prune after bloom; avoid planting dense aromatic masses near the house</td>\n </tr>\n <tr>\n <th scope=\"row\">Ice plant</th>\n <td>Zones 1 to 2; Zone 0 only in containers on hardscape</td>\n <td>Remove accumulated thatch; control spread in sensitive areas</td>\n </tr>\n </tbody>\n </table>\n</div>";

window.AH_GRAPHICS["fall-garden-cleanup-for-fire-safety-g1"] = "<div class=\"ah-table-wrap\">\n <div class=\"ah-table-title\">\n Fall Cleanup Timeline\n </div>\n\n <table class=\"ah-table\">\n <thead>\n <tr>\n <th scope=\"col\">Period</th>\n <th scope=\"col\">Timing</th>\n <th scope=\"col\">Key tasks</th>\n </tr>\n </thead>\n <tbody>\n <tr>\n <th scope=\"row\">Early fall</th>\n <td>September\u2013October</td>\n <td>\n Begin removing spent annuals and vines as they finish;\n start debris reduction in Zones 0\u20131\n </td>\n </tr>\n <tr>\n <th scope=\"row\">Mid fall</th>\n <td>October\u2013November</td>\n <td>\n Complete Zone 0 cleanup; clean gutters and roof;\n prune dead wood; refresh pathways and mulch\n </td>\n </tr>\n <tr>\n <th scope=\"row\">Late fall</th>\n <td>November\u2013December</td>\n <td>\n Finish moving compost and debris to Zone 2+;\n plant cover crops; plan structural changes and plant orders for next year\n </td>\n </tr>\n </tbody>\n </table>\n</div>";
window.AH_GRAPHICS["fall-garden-cleanup-for-fire-safety-g2"] = "<div class=\"ah-table-wrap\">\n <div class=\"ah-table-title\">\n Zone and Debris Guide\n </div>\n\n <table class=\"ah-table\">\n <thead>\n <tr>\n <th scope=\"col\">Zone</th>\n <th scope=\"col\">Distance</th>\n <th scope=\"col\">What to remove in fall</th>\n <th scope=\"col\">What can stay</th>\n </tr>\n </thead>\n <tbody>\n <tr>\n <th scope=\"row\">Zone 0</th>\n <td>0\u20135 ft</td>\n <td>\n All dead plants, leaves, summer crop residues,\n stored materials, and any organic mulch\n </td>\n <td>\n Non-combustible surfaces (gravel, pavers);\n minimal container plants placed on hardscape\n </td>\n </tr>\n <tr>\n <th scope=\"row\">Zone 1</th>\n <td>5\u201330 ft</td>\n <td>\n Dead annuals, dry vines, loose debris on top of mulch,\n and piles of prunings\n </td>\n <td>\n Maintained perennials and irrigated beds\n with limited, discontinuous organic mulch\n </td>\n </tr>\n <tr>\n <th scope=\"row\">Zone 2+</th>\n <td>30+ ft</td>\n <td>\n Large piles of dry prunings and neglected brush\n </td>\n <td>\n Compost piles kept moist and turned;\n wood chips around trees and along paths\n </td>\n </tr>\n </tbody>\n </table>\n</div>";

window.AH_GRAPHICS["fire-resistant-fruit-trees-for-santa-cruz-gardens-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Fruit Trees by Defensible-Space Zone\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Zone</th>\n        <th scope=\"col\">Distance</th>\n        <th scope=\"col\">Fruit tree role</th>\n        <th scope=\"col\">Key rules</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Zone 0</th>\n        <td>0\u20135 ft</td>\n        <td>No trees</td>\n        <td>\n          Non-combustible surfaces only;\n          relocate any containers out of this strip\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Zone 1</th>\n        <td>5\u201330 ft</td>\n        <td>\n          Compact citrus, dwarf figs, apples, pears,\n          espaliers\n        </td>\n        <td>\n          Keep canopies at least 10 ft from structures\n          and from each other; limb trees up at least 6 ft;\n          use rock or gravel mulch\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Zone 2+</th>\n        <td>30\u2013100+ ft</td>\n        <td>\n          Main home orchard (apples, pears, plums,\n          figs, pomegranates, persimmons)\n        </td>\n        <td>\n          Maintain 10\u201315+ ft canopy separation\n          (increase on slopes); remove ladder fuels;\n          shallow organic mulch allowed, kept away from trunks\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["fire-wise-design-for-slopes-and-hillsides-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Slope Category and Defensible-Space Emphasis\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Slope category</th>\n        <th scope=\"col\">Example slope</th>\n        <th scope=\"col\">What changes for fire</th>\n        <th scope=\"col\">Key design focus</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Gentle</th>\n        <td>0 to 15%</td>\n        <td>Fire spread is similar to flat ground; standard defensible-space zones are usually adequate</td>\n        <td>Standard Zone 0 to 2 layout; normal shrub and tree spacing</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Moderate</th>\n        <td>15 to 30%</td>\n        <td>Faster upslope spread and longer flame lengths; vegetation ignites more easily</td>\n        <td>Increase shrub and tree spacing by one class; consider extending Zone 2 somewhat downslope</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Steep</th>\n        <td>30 to 45%</td>\n        <td>Fire can reach homes quickly from below with long flame lengths and high radiant heat</td>\n        <td>\n          Extend reduced-fuel areas downslope toward 150 to 200 ft where possible;\n          add terraces, retaining walls, and fuel breaks\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Very steep or canyon edge</th>\n        <td>Over 45% or above a draw</td>\n        <td>\n          \u201cChimney effect\u201d can send fire rapidly upslope with extremely intense heat\n        </td>\n        <td>\n          Maximize hardscape and non-combustible breaks below structures;\n          minimize vegetation at slope edges; seek site-specific professional guidance\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["fire-wise-herb-gardens-low-growing-high-moisture-plants-g1"] = "<div class=\"ah-table-wrap\"> <div class=\"ah-table-title\"> Herb Fire-Wise Traits and Suggested Zones </div> <table class=\"ah-table\"> <thead> <tr> <th scope=\"col\">Herb or group</th> <th scope=\"col\">Volatile oils</th> <th scope=\"col\">Growth type</th> <th scope=\"col\">Fire-wise notes</th> <th scope=\"col\">Suggested zones</th> </tr> </thead> <tbody> <tr> <th scope=\"row\">Rosemary, lavender, sages (ornamental and culinary)</th> <td>High</td> <td>Woody shrubs</td> <td> Highly aromatic and resinous; accumulate dead wood; can ignite and burn intensely even when green </td> <td>Zone 2+ (30+ ft), or large containers placed well away from structures</td> </tr> <tr> <th scope=\"row\">Thyme, oregano (creeping and culinary forms)</th> <td>Moderate</td> <td>Low, spreading perennials</td> <td> Low stature, easily irrigated, minimal woody buildup when trimmed; often listed as fire-resistant groundcovers </td> <td>Zone 1 (5, 30 ft); keep out of Zone 0; use gravel paths between plantings</td> </tr> <tr> <th scope=\"row\">Mint</th> <td>Low to moderate</td> <td>Herbaceous, spreading</td> <td> Very high moisture when irrigated; vigorous growth; must be contained to prevent takeover </td> <td>Zone 1 in beds or contained areas; avoid Zone 0; control roots</td> </tr> <tr> <th scope=\"row\">Parsley, cilantro, basil</th> <td>Low</td> <td>Annual or biennial, non-woody</td> <td> High moisture, no woody stems, low oil content; replaced frequently so dead material does not accumulate </td> <td>Zone 1 vegetable and herb beds</td> </tr> <tr> <th scope=\"row\">Chives and other alliums</th> <td>Low</td> <td>Herbaceous clumps</td> <td> Moist, non-woody leaves; no flammable oils; may help repel some pests </td> <td>Zone 1 edges and beds</td> </tr> </tbody> <caption> Zones as defined by CAL FIRE: Zone 0 = 0, 5 ft, Zone 1 = 5, 30 ft, Zone 2 = 30, 100+ ft. </caption> </table>\n</div>";

window.AH_GRAPHICS["fire-wise-landscaping-on-a-budget-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Cost vs. Impact: Where to Focus Your Efforts\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Action</th>\n        <th scope=\"col\">Cost range</th>\n        <th scope=\"col\">Zone focus</th>\n        <th scope=\"col\">Relative impact</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Clear Zone 0 debris, move combustibles, clean gutters</th>\n        <td>Free</td>\n        <td>Zone 0</td>\n        <td>Very high</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Prune for clearance, remove dead material</th>\n        <td>Free to $100 (tools)</td>\n        <td>Zones 0 to 1</td>\n        <td>High</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Add gravel or rock to Zone 0</th>\n        <td>$50 to $300</td>\n        <td>Zone 0</td>\n        <td>Very high</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Install ember-resistant vent screens</th>\n        <td>$50 to $200</td>\n        <td>Structure</td>\n        <td>High</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Remove juniper and other high-risk shrubs near house</th>\n        <td>$0 to $800</td>\n        <td>Zones 0 to 1</td>\n        <td>High</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Add hardscape paths and fuel breaks</th>\n        <td>$100 to $600</td>\n        <td>Zones 1 to 2</td>\n        <td>Moderate to high</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["fire-wise-landscaping-on-a-budget-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Zone-by-Zone Surface Materials\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Zone</th>\n        <th scope=\"col\">Distance</th>\n        <th scope=\"col\">Recommended surface</th>\n        <th scope=\"col\">Avoid</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Zone 0</th>\n        <td>0 to 5 ft</td>\n        <td>\n          Gravel, rock, pavers, concrete; bare or mineral soil where needed\n        </td>\n        <td>\n          Any organic mulch, plants, wood materials, or stored combustibles\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Zone 1</th>\n        <td>5 to 30 ft</td>\n        <td>\n          Discontinuous, thin wood chips or bark mixed with rock and paths;\n          irrigated, low-growing plants\n        </td>\n        <td>\n          Deep, continuous bark or mulch layers;\n          dense shrubs placed close to structures\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Zone 2</th>\n        <td>30 to 100+ ft</td>\n        <td>\n          Regularly maintained vegetation; deeper mulch acceptable;\n          clear breaks between shrub groups\n        </td>\n        <td>\n          Dense, continuous fuels and unmanaged tall grasses\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["fire-wise-maintenance-a-seasonal-checklist-for-santa-cruz-gardeners-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Seasonal Defensible-Space Priorities\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Season</th>\n        <th scope=\"col\">Top focus</th>\n        <th scope=\"col\">Key actions</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Spring</th>\n        <td>Prepare before peak fire season</td>\n        <td>\n          Deep clean Zone 0; clear gutters and roofs; move firewood to 30+ ft;\n          mow grasses to 4 inches; prune trees and shrubs for spacing\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Summer</th>\n        <td>Maintain and monitor</td>\n        <td>\n          Keep Zone 0 immaculate; remove new dead material;\n          maintain irrigation so plants stay hydrated;\n          re-check gutters; clear decks and under-deck areas\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Fall</th>\n        <td>Leaf and debris control</td>\n        <td>\n          Continue summer tasks; remove fallen leaves and needles from Zones 0 and 1;\n          clear roof valleys; cut or remove ornamental grasses before they dry and seed\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Winter</th>\n        <td>Projects and improvements</td>\n        <td>\n          Keep Zone 0 clear; remove storm-damaged limbs;\n          plan or install hardscape; relocate high-risk plants;\n          plant fire-resistant species\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["fire-wise-pollinator-gardens-for-santa-cruz-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Pollinator Plants, Fire Traits, and Suggested Zones\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Plant / group</th>\n        <th scope=\"col\">Pollinator value</th>\n        <th scope=\"col\">Fire-risk traits</th>\n        <th scope=\"col\">Suggested zone*</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">California fuchsia (Epilobium canum)</th>\n        <td>Late-season nectar for hummingbirds and native bees</td>\n        <td>Low, herbaceous stems; stays relatively compact with irrigation</td>\n        <td>Zone 1 (5 to 30 ft)</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Yarrow (Achillea millefolium)</th>\n        <td>Attracts bees, butterflies, and many beneficial insects</td>\n        <td>Herbaceous foliage; responds well to irrigation and regular deadheading</td>\n        <td>Zone 1</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Buckwheats (Eriogonum spp.)</th>\n        <td>Excellent nectar and pollen for native bees and butterflies</td>\n        <td>Low, shrubby or mounding; can dry out, so remove old flower heads</td>\n        <td>Zone 1 to 2 (depending on size and woodiness)</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Phacelia (annual)</th>\n        <td>\u201cBee\u2019s friend,\u201d very high bee use</td>\n        <td>Annual; no persistent woody growth if removed after seeding</td>\n        <td>Zone 1</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">California poppy</th>\n        <td>Important for native bees in spring</td>\n        <td>Annual or short-lived; dies back before peak fire season if unmanaged</td>\n        <td>Zone 1</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Sedum / hens-and-chicks</th>\n        <td>Flowers attract bees and butterflies</td>\n        <td>Succulent, very high-moisture foliage; minimal dry fuel</td>\n        <td>Zone 1 (beds, rock pockets)</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Lavender</th>\n        <td>Strong bee magnet</td>\n        <td>High essential-oil content; woody stems and dry flower stalks</td>\n        <td>Zone 2+ (30+ ft)</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Sages (Salvia spp.)</th>\n        <td>Excellent for bees and hummingbirds</td>\n        <td>Aromatic oils, woody bases, can accumulate dry material</td>\n        <td>Zone 2+</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Rosemary</th>\n        <td>Very good bee plant when in bloom</td>\n        <td>Highly flammable, resinous foliage and woody stems</td>\n        <td>Zone 2+</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Manzanita</th>\n        <td>Critical early-season nectar source</td>\n        <td>Resinous evergreen foliage and bark; burns readily in wildland settings</td>\n        <td>Zone 2+ / wildland edge</td>\n      </tr>\n    </tbody>\n    <caption>\n      *Zones as defined in CAL FIRE / UC guidance: Zone 0 = 0 to 5 ft, Zone 1 = 5 to 30 ft, Zone 2 = 30 to 100+ ft.\n    </caption>\n  </table>\n</div>";

window.AH_GRAPHICS["vegetable-gardens-in-fire-zones-growing-food-safely-in-fire-country-g1"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Zone and Garden Placement Overview\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Zone</th>\n        <th scope=\"col\">Distance</th>\n        <th scope=\"col\">Recommended vegetable use</th>\n        <th scope=\"col\">Key constraints</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Zone 0</th>\n        <td>0\u20135 ft</td>\n        <td>\n          Avoid vegetable beds if possible; use only very limited, low-growing plants\n          in non-combustible containers placed away from siding and under-eave areas\n        </td>\n        <td>\n          No wood mulch or dry organic debris; no trellises or tall crops;\n          no plants touching structures; prioritize hardscape\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Zone 1</th>\n        <td>5\u201330 ft</td>\n        <td>\n          Ideal area for the main vegetable garden; raised beds with gravel or stone paths\n        </td>\n        <td>\n          Maintain spacing between beds; keep plants well-watered;\n          remove dead crops promptly; avoid tall trellised crops next to fences\n          or low tree branches\n        </td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Zone 2</th>\n        <td>30\u2013100 ft</td>\n        <td>\n          Secondary or larger garden areas, orchards, and perennial plantings\n        </td>\n        <td>\n          Avoid creating tall continuous fuel; keep beds separated by mown\n          or hardscaped breaks; manage woody herbs or berry plantings carefully\n        </td>\n      </tr>\n    </tbody>\n  </table>\n</div>";
window.AH_GRAPHICS["vegetable-gardens-in-fire-zones-growing-food-safely-in-fire-country-g2"] = "<div class=\"ah-table-wrap\">\n  <div class=\"ah-table-title\">\n    Crop Types and Fire-Wise Considerations\n  </div>\n\n  <table class=\"ah-table\">\n    <thead>\n      <tr>\n        <th scope=\"col\">Crop type</th>\n        <th scope=\"col\">Fire-wise benefits</th>\n        <th scope=\"col\">Fire-risk issues</th>\n        <th scope=\"col\">Best practices</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr>\n        <th scope=\"row\">Leafy greens (lettuce, chard, kale, spinach)</th>\n        <td>Very high water content; low, soft foliage; minimal woody material</td>\n        <td>Few, provided plants are kept irrigated</td>\n        <td>Place freely in Zone 1; keep beds irrigated, weed-free, and actively harvested</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Fruiting vegetables (tomatoes, peppers, eggplant)</th>\n        <td>High-moisture foliage and fruit; non-woody stems</td>\n        <td>Dead lower foliage and dry stakes can add fuel</td>\n        <td>Prune dead leaves; remove dry material; use metal stakes where possible; site tall trellises away from structures</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Squash and cucumbers</th>\n        <td>Large, moist leaves; low, sprawling habit</td>\n        <td>Dry vines at season end can become fuel</td>\n        <td>Remove finished vines promptly; do not leave dead plants standing into peak fire season</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Root crops (carrots, beets, potatoes, radishes)</th>\n        <td>Most biomass underground; low above-ground greenery</td>\n        <td>Tops can dry out if neglected</td>\n        <td>Harvest on time; remove dry tops rather than leaving them through fire season</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Dry beans, grains, seed crops</th>\n        <td>Useful for food storage and seed saving</td>\n        <td>Stalks and pods are very flammable when cured</td>\n        <td>Grow in limited blocks; harvest promptly; remove dry plants immediately after seed is collected</td>\n      </tr>\n      <tr>\n        <th scope=\"row\">Perennial herbs (rosemary, sage, oregano)</th>\n        <td>Drought-tolerant and useful; modest fuels when kept small</td>\n        <td>Many are high in oils and resins and can burn intensely if large or unmaintained</td>\n        <td>Keep in smaller, well-pruned masses; site in Zone 2 rather than near structures; remove dead wood regularly</td>\n      </tr>\n    </tbody>\n  </table>\n</div>";

window.AH_GRAPHICS["fire-wise-raised-bed-materials-and-placement-g2"] = "<div class=\"ah-zone-reference\">\n<div class=\"ah-zone-reference-header\">\n<h3>Defensible Space Zones for Raised Beds</h3>\n<p>Where to place raised beds based on CAL FIRE guidelines</p>\n</div>\n<div class=\"ah-zone-cards\">\n<div class=\"ah-zone-card ah-zone-0\">\n<div class=\"ah-zone-badge\">\n<div class=\"ah-zone-number\">0</div>\n<div class=\"ah-zone-distance\">0-5 feet</div>\n</div>\n<div class=\"ah-zone-content\">\n<h4>Ember-Resistant Zone</h4>\n<p class=\"ah-zone-subtitle\">Immediate area around structures</p>\n<ul class=\"ah-zone-rules\">\n<li>No raised beds (even non-combustible)</li>\n<li>No plants, mulch, or organic materials</li>\n<li>Use gravel, stone, or concrete only</li>\n<li>Metal containers on hardscape OK (remove during Red Flag)</li>\n</ul>\n<span class=\"ah-zone-recommendation\">Raised Beds: NOT ALLOWED</span>\n</div>\n</div>\n<div class=\"ah-zone-card ah-zone-1\">\n<div class=\"ah-zone-badge\">\n<div class=\"ah-zone-number\">1</div>\n<div class=\"ah-zone-distance\">5-30 feet</div>\n</div>\n<div class=\"ah-zone-content\">\n<h4>Lean, Clean, and Green Zone</h4>\n<p class=\"ah-zone-subtitle\">Prime raised bed territory</p>\n<ul class=\"ah-zone-rules\">\n<li>Non-combustible beds only (steel, concrete, stone)</li>\n<li>Use gravel paths between beds as firebreaks</li>\n<li>Install reliable drip irrigation</li>\n<li>Keep 5+ feet from fences, decks, outbuildings</li>\n<li>Use gravel mulch (no bark or wood chips)</li>\n</ul>\n<span class=\"ah-zone-recommendation\">Raised Beds: IDEAL LOCATION</span>\n</div>\n</div>\n<div class=\"ah-zone-card ah-zone-2\">\n<div class=\"ah-zone-badge\">\n<div class=\"ah-zone-number\">2</div>\n<div class=\"ah-zone-distance\">30-100 feet</div>\n</div>\n<div class=\"ah-zone-content\">\n<h4>Reduced Fuel Zone</h4>\n<p class=\"ah-zone-subtitle\">Expanded garden area with more flexibility</p>\n<ul class=\"ah-zone-rules\">\n<li>Wood beds acceptable (replace when aging)</li>\n<li>Organic mulch OK (keep maintained)</li>\n<li>Maintain clear paths between beds</li>\n<li>Avoid continuous rows that channel fire</li>\n<li>Clear dead plant material before fire season</li>\n</ul>\n<span class=\"ah-zone-recommendation\">Raised Beds: ALLOWED</span>\n</div>\n</div>\n</div>\n<div class=\"ah-zone-reference-footer\">\n<p>Based on <a href=\"https://www.fire.ca.gov/dspace\" rel=\"noopener\" target=\"_blank\">CAL FIRE Defensible Space</a> guidelines | ambitiousharvest.com</p>\n</div>\n</div>";
window.AH_GRAPHICS["fire-wise-raised-bed-materials-and-placement-g3"] = "<div class=\"ah-mulch-guide\">\n<div class=\"ah-mulch-guide-header\">\n<h3>Fire-Wise Mulch Guide by Zone</h3>\n<p>What to use around and inside your raised beds</p>\n</div>\n<div class=\"ah-mulch-grid\">\n<div class=\"ah-mulch-column ah-mulch-zone-0-1\">\n<div class=\"ah-mulch-zone-label\">\n<span class=\"ah-mulch-zone-badge\">0-1</span>\n<div>\n<div class=\"ah-mulch-zone-title\">Near Structures</div>\n<div class=\"ah-mulch-zone-distance\">0-30 feet from home</div>\n</div>\n</div>\n<div class=\"ah-mulch-section\">\n<div class=\"ah-mulch-section-title ah-use-title\">Use These</div>\n<ul class=\"ah-mulch-list ah-use-list\">\n<li>Gravel or pea gravel</li>\n<li>Decomposed granite</li>\n<li>Rock mulch</li>\n<li>Composted mulch (less flammable)</li>\n</ul>\n</div>\n<div class=\"ah-mulch-section\">\n<div class=\"ah-mulch-section-title ah-avoid-title\">Avoid</div>\n<ul class=\"ah-mulch-list ah-avoid-list\">\n<li>Bark mulch</li>\n<li>Pine needles</li>\n<li>Wood chips (dry)</li>\n<li>Rubber mulch</li>\n<li>Dry leaf accumulation</li>\n</ul>\n</div>\n<div class=\"ah-mulch-note\">\n                Inside beds: Straw (stays moist), compost, or bare soil are safer alternatives to wood-based mulches.\n            </div>\n</div>\n<div class=\"ah-mulch-column ah-mulch-zone-2\">\n<div class=\"ah-mulch-zone-label\">\n<span class=\"ah-mulch-zone-badge\">2</span>\n<div>\n<div class=\"ah-mulch-zone-title\">Extended Garden</div>\n<div class=\"ah-mulch-zone-distance\">30-100 feet from home</div>\n</div>\n</div>\n<div class=\"ah-mulch-section\">\n<div class=\"ah-mulch-section-title ah-ok-title\">OK to Use</div>\n<ul class=\"ah-mulch-list ah-ok-list\">\n<li>Wood chips (keep moist)</li>\n<li>Straw (in irrigated beds)</li>\n<li>Leaf mulch (maintained)</li>\n<li>Compost</li>\n<li>Living groundcovers</li>\n</ul>\n</div>\n<div class=\"ah-mulch-section\">\n<div class=\"ah-mulch-section-title ah-avoid-title\">Still Avoid</div>\n<ul class=\"ah-mulch-list ah-avoid-list\">\n<li>Rubber mulch</li>\n<li>Deep dry material buildup</li>\n<li>Unmaintained accumulation</li>\n</ul>\n</div>\n<div class=\"ah-mulch-note\">\n                Key rule: Refresh mulch annually before fire season. Don't let organic mulch dry out or accumulate deeper than 3-4 inches.\n            </div>\n</div>\n</div>\n<div class=\"ah-mulch-guide-footer\">\n<p>ambitiousharvest.com | Santa Cruz County Fire-Wise Gardening</p>\n</div>\n</div>";
