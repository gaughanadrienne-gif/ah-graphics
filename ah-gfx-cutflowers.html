"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">60-75</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Full</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Medium</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Inland, SLV sunny. OK coastal with full sun.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Sunflowers</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">55-75</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Full</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Low-Med</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">All microclimates. Wind protection helps at coast.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Dahlias</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">90-120</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Full-Part</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Medium</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Excellent everywhere. Coast = longest season.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Cosmos</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">60-90</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Full</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Low</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">All microclimates. Over-feeding reduces flowers.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Celosia</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">75-90</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Full</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Medium</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Inland/Watsonville best. Struggles in fog.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Strawflowers</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">70-90</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Full</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Low</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">All sunny spots. Very drought tolerant once established.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["water-needs-by-flower-type"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Cut Flower Water Needs Comparison</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Plan your irrigation zones by water requirement</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 20px;\">\n            <div style=\"background-color: #fff !important; border-left: 5px solid #1a3b2a; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important; font-size: 1rem;\">Low Water</span>\n                    <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600;\">Once established, minimal irrigation</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Strawflowers, statice, yarrow, gomphrena (globe amaranth), California poppies, cosmos, ammobium</p>\n                <p style=\"margin: 5px 0 0 0; font-size: 0.8rem; color: #8c9c8c !important;\">Perfect for water-wise gardens. Group together on driest irrigation zone.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8c9c8c; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important; font-size: 1rem;\">Medium Water</span>\n                    <span style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600;\">Regular watering, 1-2x per week</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Zinnias, sunflowers, snapdragons, celosia, marigolds, scabiosa, salvia</p>\n                <p style=\"margin: 5px 0 0 0; font-size: 0.8rem; color: #8c9c8c !important;\">Most common cutting flowers. Standard drip irrigation schedule works well.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #dde2d8; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important; font-size: 1rem;\">Higher Water</span>\n                    <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600;\">Consistent moisture, 2-3x per week</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Dahlias, sweet peas, lisianthus, ranunculus, stock, delphinium, hydrangea</p>\n                <p style=\"margin: 5px 0 0 0; font-size: 0.8rem; color: #8c9c8c !important;\">Best with mulch to retain moisture. Group together near water source.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Group flowers by water needs on the same irrigation zone to avoid over- or under-watering.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["shade-tolerant-cut-flowers-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Cut Flowers for Partial Shade</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What to grow when you don't have full sun</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Flower</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Shade Tolerance</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Bloom Season</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Notes</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Foxglove</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;\">3-4 hrs</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Spring</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Tall spikes, perfect under redwoods. Biennial.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Hydrangea</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;\">3-4 hrs</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Summer-Fall</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Shrub, not annual. Dry beautifully. Loves coastal fog.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Astilbe</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;\">2-4 hrs</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Summer</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Feathery plumes. Needs moist soil. Good under trees.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Hellebores</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;\">2-3 hrs</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Winter-Spring</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Blooms when nothing else does. Sear stems for vase life.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Sweet Peas</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;\">4-5 hrs</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Spring</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Tolerate light shade. Fewer flowers but longer season.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Snapdragons</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;\">4-5 hrs</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Spring-Summer</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Shorter stems in shade but still productive. Part shade OK.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Ferns (foliage)</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;\">1-3 hrs</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Year-round</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Essential greenery for arrangements. Abundant under redwoods.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Hours = minimum direct sun needed. Under redwoods or north-facing? Focus on the 2-3 hour group.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["flowers-by-pollinator-type"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Cut Flowers by Pollinator</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Dual-purpose blooms: bouquets for you, food for pollinators</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; font-size: 0.95rem; text-align: center;\">Native Bees</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px 0;\"><strong>What they love:</strong> Open, flat, or daisy-shaped flowers</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Best picks:</strong> Cosmos, sunflowers, zinnias, scabiosa, calendula, yarrow, echinacea</p>\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin: 0;\">Tip: Leave some flowers unharvested on the plant for foraging. Choose single-petal varieties over doubles.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; font-size: 0.95rem; text-align: center;\">Butterflies</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px 0;\"><strong>What they love:</strong> Flat landing pads, clusters, bright colors</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Best picks:</strong> Zinnias, cosmos, dahlias, marigolds, lantana, verbena, milkweed</p>\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin: 0;\">Tip: Plant in full sun, sheltered from wind. Butterflies need warmth to fly. Avoid pesticides entirely.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; font-size: 0.95rem; text-align: center;\">Hummingbirds</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0 0 8px 0;\"><strong>What they love:</strong> Tubular, red/orange flowers</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Best picks:</strong> Salvia, snapdragons, foxglove, fuchsia, crocosmia, penstemon, bee balm</p>\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin: 0;\">Tip: Anna's Hummingbirds are year-round residents in Santa Cruz. Plant for continuous bloom across seasons.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0 25px 25px 25px; border-radius: 6px;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Pollinator-Friendly Harvesting Tip:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Never harvest 100% of your blooms. Leave at least 30% on the plant at any given time so pollinators always have food available.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

</script>
