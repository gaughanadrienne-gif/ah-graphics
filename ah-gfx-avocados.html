enter;\">\n        Avocados mature on the tree but ripen only after picking. You can leave fruit on the tree for weeks, harvesting as needed. Source: UC ANR\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["avocado-pit-sprouting-methods"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Two Ways to Sprout an Avocado Pit</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Both work. Choose based on your goals.</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; text-align: center;\">Water Glass Method (Classic)</div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.82rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Setup:</strong> 3-4 toothpicks suspend pit over glass, bottom third submerged</p>\n                    <p style=\"font-size: 0.82rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Location:</strong> Warm spot with indirect light (kitchen windowsill)</p>\n                    <p style=\"font-size: 0.82rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Maintenance:</strong> Change water every 5-7 days</p>\n                    <p style=\"font-size: 0.82rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Germination:</strong> 2-8 weeks</p>\n                    <p style=\"font-size: 0.82rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Transplant when:</strong> Stem is 6-8 inches with leaves</p>\n                    <div style=\"margin-top: 12px; padding-top: 12px; border-top: 1px solid #dde2d8;\">\n                        <p style=\"font-size: 0.78rem; color: #2d6a3f !important; margin: 0; font-weight: 600;\">Best for: Kids, classrooms, watching the full process</p>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #8c9c8c; overflow: hidden;\">\n                <div style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; text-align: center;\">Direct Soil Method</div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.82rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Setup:</strong> Plant bottom half in 6-inch pot, top half exposed</p>\n                    <p style=\"font-size: 0.82rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Location:</strong> Warm spot with indirect light initially</p>\n                    <p style=\"font-size: 0.82rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Maintenance:</strong> Keep soil moist but not soggy</p>\n                    <p style=\"font-size: 0.82rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Germination:</strong> 2-8 weeks</p>\n                    <p style=\"font-size: 0.82rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Move to sun when:</strong> Shoot has first leaves</p>\n                    <div style=\"margin-top: 12px; padding-top: 12px; border-top: 1px solid #dde2d8;\">\n                        <p style=\"font-size: 0.78rem; color: #2d6a3f !important; margin: 0; font-weight: 600;\">Best for: Stronger root development, no transplant shock</p>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 20px; background-color: #fff !important; border: 2px solid #1a3b2a; padding: 15px;\">\n            <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0; text-align: center; font-weight: 600;\">Germination timeline: Pit cracks (week 2-4) > Root emerges from bottom > Shoot pushes up from top > First leaves unfold</p>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["grafted-vs-seed-grown-avocado-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Grafted vs. Seed-Grown Avocado Trees</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Choose the right approach for your goal</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Factor</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Grafted Nursery Tree</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Seed-Grown (from Pit)</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Years to First Fruit</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">3-5 years</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">7-15+ years (if ever)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fruit Quality</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Guaranteed (clone of parent variety)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Unpredictable (genetic lottery)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Cold Tolerance</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Known and documented for variety</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Unknown (depends on pollen parent)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Cost</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">$30-60 for 5-gallon tree</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Free (grocery store pit)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Rootstock Benefits</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Disease-resistant rootstock (Dusa, Duke 7)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">No rootstock advantage</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Best For</td>\n                    <td style=\"padding: 10px 15px; color: #2d6a3f !important; font-weight: 600;\">Fruit production (practical investment)</td>\n                    <td style=\"padding: 10px 15px; color: #2d6a3f !important; font-weight: 600;\">Education, fun, houseplant, grafting practice</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Do both! Grow a pit for fun, and plant a grafted tree for fruit. Source: UC Davis genetics research; UC ANR; UC Cooperative Extension\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["container-avocado-variety-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Best Avocado Varieties for Containers</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Compact growers suited to pot culture in coastal California</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Wurtz (Little Cado)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Container height:</strong> 4-8 ft with pruning</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Cold tolerance:</strong> ~25F</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Flower type:</strong> A</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Fruit:</strong> Medium, dark green, creamy</p>\n                    <div style=\"margin-top: 12px; padding-top: 12px; border-top: 1px solid #dde2d8;\">\n                        <p style=\"font-size: 0.78rem; color: #2d6a3f !important; margin: 0; font-weight: 600;\">Top pick for containers. Natural semi-dwarf.</p>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Mexicola Grande</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Container height:</strong> 6-8 ft with pruning</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Cold tolerance:</strong> ~18-20F</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Flower type:</strong> A</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Fruit:</strong> Small-medium, thin edible skin</p>\n                    <div style=\"margin-top: 12px; padding-top: 12px; border-top: 1px solid #dde2d8;\">\n                        <p style=\"font-size: 0.78rem; color: #2d6a3f !important; margin: 0; font-weight: 600;\">Most cold-hardy option. Outstanding flavor.</p>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Lamb Hass</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Container height:</strong> 6-8 ft with pruning</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Cold tolerance:</strong> ~28-30F</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Flower type:</strong> A</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Fruit:</strong> Medium, Hass-like quality</p>\n                    <div style=\"margin-top: 12px; padding-top: 12px; border-top: 1px solid #dde2d8;\">\n                        <p style=\"font-size: 0.78rem; color: #c9a84c !important; margin: 0; font-weight: 600;\">Warmest sites only. Needs winter shelter.</p>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 20px; background-color: #fff !important; border: 1px solid #dde2d8; padding: 15px;\">\n            <p style=\"font-size: 0.82rem; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Container size progression:</p>\n            <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\">Year 1: 5-gallon (nursery pot) > Year 1-2: 15-gallon > Year 3+: 25-45 gallon or half wine barrel</p>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC Cooperative Extension container fruit tree recommendations; UC ANR variety guides\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["container-avocado-care-calendar"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Container Avocado Monthly Care Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Watering, feeding, and key tasks for coastal California</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Season</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Watering Frequency</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Fertilize?</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Key Tasks</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Winter (Nov-Feb)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Every 5-7 days (check soil first)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Feb only (slow-release)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Move to shelter during freezes; do not overwater</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Spring (Mar-May)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Every 3-5 days</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">May feeding</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Prune for shape (Apr-May); repot if needed (every 3-4 yrs)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Summer (Jun-Sep)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Every 2-3 days (daily for fabric pots in heat)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Aug feeding (last of year)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Watch for salt burn (tip browning); flush soil monthly</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Fall (Oct-Nov)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Every 3-5 days (taper as rains start)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">No (let tree harden)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Test plant dolly; prep shelter location</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Container trees dry out faster than in-ground trees. Always check soil moisture before watering. Source: UC ANR; UC Master Gardener recommendations\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["container-avocado-repotting-process"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Repotting a Container Avocado Tree</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Every 3-4 years in late spring (April-May)</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 1.8rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">1</div>\n                <h3 style=\"font-weight: 700; font-size: 0.9rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Water Day Before</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0; line-height: 1.5;\">Thoroughly water the tree 24 hours before repotting to reduce transplant shock.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 1.8rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">2</div>\n                <h3 style=\"font-weight: 700; font-size: 0.9rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Score Root Ball</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0; line-height: 1.5;\">If roots are circling, score vertically in 3-4 places with a sharp knife, about 1 inch deep.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 1.8rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">3</div>\n                <h3 style=\"font-weight: 700; font-size: 0.9rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Trim Roots (Same Pot)</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0; line-height: 1.5;\">If staying in the same container, remove ~20% of root mass from outside and bottom. Fill with fresh mix.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 1.8rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">4</div>\n                <h3 style=\"font-weight: 700; font-size: 0.9rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Position and Fill</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0; line-height: 1.5;\">Do not bury deeper than before. Fill around root ball with fresh mix (40% potting soil, 30% perlite, 20% bark, 10% compost).</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 1.8rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">5</div>\n                <h3 style=\"font-weight: 700; font-size: 0.9rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Water and Shade</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0; line-height: 1.5;\">Water deeply. Place in partial shade for 1 week to recover before returning to full sun.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Root pruning during repotting is standard practice for long-term container fruit trees. Source: UC Master Gardener recommendations\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
