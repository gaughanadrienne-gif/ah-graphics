window.AH_GRAPHICS["santa-cruz-county-microclimate-zones-for-avocado-growing"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Santa Cruz County Avocado Microclimate Zones</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Where avocados can thrive, survive, or struggle</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border-left: 5px solid #2d6a3f; border-radius: 0; overflow: hidden;\">\n                <div style=\"padding: 18px;\">\n                    <div style=\"font-size: 0.7rem; color: #fff !important; background-color: #2d6a3f !important; display: inline-block; padding: 3px 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Best</div>\n                    <h3 style=\"font-weight: 700; font-size: 1.05rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Banana Belt</h3>\n                    <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0 0 8px 0; line-height: 1.5;\">Aptos, Capitola, Soquel, parts of Live Oak. 5-10 degrees warmer than fog zone. South-facing slopes are ideal.</p>\n                    <p style=\"font-size: 0.78rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Varieties: All, including Hass on best sites</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #5a9e6f; border-radius: 0; overflow: hidden;\">\n                <div style=\"padding: 18px;\">\n                    <div style=\"font-size: 0.7rem; color: #fff !important; background-color: #5a9e6f !important; display: inline-block; padding: 3px 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Good</div>\n                    <h3 style=\"font-weight: 700; font-size: 1.05rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Watsonville / Pajaro Valley</h3>\n                    <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0 0 8px 0; line-height: 1.5;\">More sun and warmth than coastline. Avoid low-lying areas near sloughs and creek bottoms where frost pools.</p>\n                    <p style=\"font-size: 0.78rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Varieties: Mexicola, Bacon, Fuerte</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #c9a84c; border-radius: 0; overflow: hidden;\">\n                <div style=\"padding: 18px;\">\n                    <div style=\"font-size: 0.7rem; color: #fff !important; background-color: #c9a84c !important; display: inline-block; padding: 3px 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Possible</div>\n                    <h3 style=\"font-weight: 700; font-size: 1.05rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Protected Urban Sites</h3>\n                    <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0 0 8px 0; line-height: 1.5;\">South-facing walls, courtyards, and sheltered spots within Santa Cruz. Concrete and stone radiate heat at night.</p>\n                    <p style=\"font-size: 0.78rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Varieties: Mexicola, Bacon, Stewart</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #c45b4a; border-radius: 0; overflow: hidden;\">\n                <div style=\"padding: 18px;\">\n                    <div style=\"font-size: 0.7rem; color: #fff !important; background-color: #c45b4a !important; display: inline-block; padding: 3px 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Difficult</div>\n                    <h3 style=\"font-weight: 700; font-size: 1.05rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">San Lorenzo Valley / Fog Belt</h3>\n                    <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0 0 8px 0; line-height: 1.5;\">Felton, Ben Lomond, Boulder Creek: too cold in winter. Coastal bluffs near Natural Bridges: too little summer heat.</p>\n                    <p style=\"font-size: 0.78rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Varieties: Mexicola only, or containers</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC Agriculture and Natural Resources avocado climate requirements; UC Davis pomology research\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["avocado-planting-diagram"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Avocado Planting Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Correct technique for in-ground and mound planting</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Standard Planting (Good Drainage)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"background-color: #f8f9f0 !important; padding: 12px; margin-bottom: 12px;\">\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Hole width:</strong> 2x root ball diameter</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Hole depth:</strong> Same as root ball (no deeper)</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Backfill:</strong> Native soil (not pure compost)</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><strong>Graft union:</strong> Must stay above soil line</p>\n                    </div>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 8px;\">\n                        <div style=\"background-color: #dde2d8 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Mulch Depth</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">4-6 inches</div>\n                        </div>\n                        <div style=\"background-color: #dde2d8 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Mulch Gap from Trunk</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">6 inches</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Mound Planting (Clay Soil)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"background-color: #f8f9f0 !important; padding: 12px; margin-bottom: 12px;\">\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Mound height:</strong> 18-24 inches above grade</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Mound width:</strong> 4-6 feet diameter</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Mound mix:</strong> Native soil + compost + coarse bark</p>\n                        <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><strong>Key rule:</strong> Never plant avocado flush in clay</p>\n                    </div>\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 8px;\">\n                        <div style=\"background-color: #dde2d8 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Wall Spacing</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">6-10 feet</div>\n                        </div>\n                        <div style=\"background-color: #dde2d8 !important; padding: 10px; text-align: center;\">\n                            <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Wait to Fertilize</div>\n                            <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">3-4 months</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC Agriculture and Natural Resources avocado planting guidelines\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["avocado-yield-expectations-by-variety"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Realistic Avocado Expectations for Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Timeline and yield by variety for home growers</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Years to First Fruit</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Estimated Annual Yield</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Harvest Season</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Notes</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Mexicola</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">3-4</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">60-100 fruit</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Aug-Oct</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Fastest producer; small fruit, outstanding flavor</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Bacon</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">4-5</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">50-80 fruit</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Nov-Mar</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Reliable in banana belt; mild flavor</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Fuerte</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">4-5</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">40-70 fruit</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Nov-Apr</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Heavy alternate bearing; excellent flavor</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Hass</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">5+</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">30-60 fruit</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Apr-Sep</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Warmest sites only; inconsistent in cool years</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Seed-Grown</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">7-15+</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">Unpredictable</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Varies</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Fun project; not practical for fruit production</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Yields are estimates for well-sited, mature trees in good years. Alternate bearing years may produce less. Source: UC ANR, UC Cooperative Extension\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["microclimate-factors-for-avocado-cold-protection"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">5 Microclimate Factors for Avocado Cold Protection</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Site selection is your most powerful frost defense</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 6px;\">1</div>\n                <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">South-Facing Exposure</h3>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.5;\">Maximum winter sun heats soil and walls during the day, releasing warmth at night. Plant 6-10 ft from a south-facing wall.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 6px;\">2</div>\n                <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Slope Position (Avoid Low Spots)</h3>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.5;\">Cold air drains downhill like water. Valley floors and low spots can be 10+ degrees colder than nearby elevated sites.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 6px;\">3</div>\n                <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Wind Barriers</h3>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.5;\">Fences, walls, hedges, and buildings block north/northwest winter winds. Wind chill strips heat from leaves and bark.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 6px;\">4</div>\n                <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Thermal Mass</h3>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.5;\">Brick, concrete, stone, and water containers absorb daytime heat and radiate it at night. A masonry wall adds 3-5 degrees.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 1.4rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 6px;\">5</div>\n                <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Moist Soil</h3>\n                <p style=\"font-size: 0.8rem; color: #666 !important; margin: 0; line-height: 1.5;\">Water deeply 24-48 hours before a freeze. Wet soil holds and releases far more heat than dry soil overnight.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC ANR frost protection research; UC Cooperative Extension\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["frost-cloth-installation-for-avocado-trees"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Frost Cloth Setup for Avocado Trees</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Step-by-step for maximum cold protection</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 1.8rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">1</div>\n                <h3 style=\"font-weight: 700; font-size: 0.9rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Build a Frame</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0; line-height: 1.5;\">Use PVC pipe, wooden stakes, or tomato cages to hold cloth off foliage. Semi-permanent frames (Nov-Mar) make this routine.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 1.8rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">2</div>\n                <h3 style=\"font-weight: 700; font-size: 0.9rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Drape Before Sunset</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0; line-height: 1.5;\">Cover entire canopy in late afternoon. Cloth must reach the ground on all sides to trap rising soil heat.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 1.8rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">3</div>\n                <h3 style=\"font-weight: 700; font-size: 0.9rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Seal the Edges</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0; line-height: 1.5;\">Weigh down all edges with rocks, bricks, or soil. Gaps at the bottom let warm air escape and defeat the purpose.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 1.8rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">4</div>\n                <h3 style=\"font-weight: 700; font-size: 0.9rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Add Heat Sources</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0; line-height: 1.5;\">String incandescent C7/C9 holiday lights (not LED) through the canopy. Adds 3-5 degrees under the cloth.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #1a3b2a; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 1.8rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">5</div>\n                <h3 style=\"font-weight: 700; font-size: 0.9rem; margin: 0 0 8px 0; color: #1a3b2a !important;\">Remove After Thaw</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0; line-height: 1.5;\">Wait until morning temps are above freezing. Remove cloth during the day so the tree gets sun and soil recharges heat.</p>\n            </div>\n        </div>\n        <div style=\"margin-top: 20px; background-color: #fff !important; border: 2px solid #1a3b2a; padding: 15px;\">\n            <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0; text-align: center; font-weight: 600;\">Protection levels: Single frost cloth = 2-4 degrees | Double layer = 4-6 degrees | Cloth + lights = 6-10 degrees</p>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC ANR frost protection guidelines; UC Master Gardener recommendations\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["cold-damage-assessment-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Avocado Cold Damage Assessment Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What to look for and how likely recovery is</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Damage Type</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">What You See</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Recovery Outlook</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">What to Do</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Leaf Damage Only</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Leaves turn brown and crispy within days. Branches still green under bark scratch test.</td>\n                    <td style=\"padding: 10px 12px; color: #2d6a3f !important; font-weight: 600;\">Good</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Do not prune. Tree will regrow foliage in spring. Wait and watch.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Twig Dieback</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Small branch tips are brown and dry under bark. Larger branches still show green.</td>\n                    <td style=\"padding: 10px 12px; color: #c9a84c !important; font-weight: 600;\">Moderate</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Wait until spring. Prune back only to where new growth appears. Whitewash newly exposed bark.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Branch Damage</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Major branches show brown cambium under bark scratch. Bark may split.</td>\n                    <td style=\"padding: 10px 12px; color: #c45b4a !important; font-weight: 600;\">Guarded</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Wait until mid-spring. Prune to live wood. If sprouting from trunk above graft, tree may recover but slowly.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Trunk / Graft Damage</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Trunk bark splits or shows cankers. No regrowth above graft by late spring. Sprouts only from below graft.</td>\n                    <td style=\"padding: 10px 12px; color: #c45b4a !important; font-weight: 600;\">Poor</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Grafted variety is likely lost. Below-graft sprouts are rootstock only. Consider replacing the tree.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Do not prune after a freeze until spring. Full damage assessment can take weeks to months. Source: UC ANR, UC Cooperative Extension\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["phytophthora-root-rot-progression"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Phytophthora Root Rot: Stages and Response</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">The #1 killer of avocado trees in California</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-top: 4px solid #5a9e6f; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #5a9e6f !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 700;\">Early Stage</div>\n                <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0 0 10px 0; color: #1a3b2a !important;\">Subtle Decline</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\">Slightly smaller leaves, pale green canopy, weak new growth. Easy to dismiss as a watering issue.</p>\n                <div style=\"background-color: #f8f9f0 !important; padding: 10px;\">\n                    <p style=\"font-size: 0.75rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Action: Improve drainage. Apply phosphonate fungicide. Stop overwatering.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #c9a84c; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #c9a84c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 700;\">Mid Stage</div>\n                <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0 0 10px 0; color: #1a3b2a !important;\">Yellowing and Wilting</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\">Older leaves yellow. Tree wilts on warm days despite moist soil. Leaf drop and twig dieback increase.</p>\n                <div style=\"background-color: #f8f9f0 !important; padding: 10px;\">\n                    <p style=\"font-size: 0.75rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Action: Phosphonate treatment. Mulch with hardwood chips. Fix drainage urgently.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #d4764a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #d4764a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 700;\">Late Stage</div>\n                <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0 0 10px 0; color: #1a3b2a !important;\">Severe Canopy Loss</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\">Sparse, small, yellow leaves. Tree looks drought-stressed. Feeder roots are brown and mushy.</p>\n                <div style=\"background-color: #f8f9f0 !important; padding: 10px;\">\n                    <p style=\"font-size: 0.75rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Action: Treatment may help if caught here, but recovery is uncertain.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #c45b4a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #c45b4a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 700;\">Fatal Stage</div>\n                <h3 style=\"font-weight: 700; font-size: 0.95rem; margin: 0 0 10px 0; color: #1a3b2a !important;\">Beyond Recovery</h3>\n                <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\">70-80% of roots destroyed. Trunk cankers or sunken areas near soil line. Tree cannot recover.</p>\n                <div style=\"background-color: #f8f9f0 !important; padding: 10px;\">\n                    <p style=\"font-size: 0.75rem; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Action: Remove tree. Fix drainage before replanting. Use Dusa rootstock for replacement.</p>\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 20px; background-color: #fff !important; border: 2px solid #1a3b2a; padding: 15px;\">\n            <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0; text-align: center; font-weight: 600;\">Prevention is far more effective than treatment. Excellent drainage + resistant rootstock (Dusa) + careful winter watering = best defense.</p>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC Davis plant pathology; UC IPM guidelines; UC ANR\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["avocado-leaf-problem-identification-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Avocado Leaf Problem Identification</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Match the symptom to the cause</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Symptom</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Where on Tree</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Likely Cause</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Fix</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Yellow between green veins (striped pattern)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">New leaves (top of tree)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Iron chlorosis (high soil pH)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Chelated iron (EDDHA) soil drench; acidify soil with sulfur</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Uniform pale yellow-green</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Older, lower leaves</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Nitrogen deficiency</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Balanced citrus/avocado fertilizer; blood meal or fish emulsion for quick fix</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Small, narrow, mottled leaves with bunchy growth</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">New growth (branch tips)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Zinc deficiency</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Foliar zinc sulfate spray (1-2 tbsp/gal) on new growth in spring</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Brown, crispy leaf edges and tips</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Entire tree, starting with older leaves</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Salt burn (water or fertilizer salts)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Deep, infrequent watering to leach salts; switch to slow-release organic fertilizer</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Brown/bleached patches on sun-facing leaves</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">South/west-facing canopy only</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Sunburn</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Avoid summer pruning; tree will acclimate. Whitewash exposed bark.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Wilting on warm days + yellow leaves + moist soil</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Entire tree</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Phytophthora root rot</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Check roots (brown = infected). Improve drainage. Phosphonate fungicide. Stop overwatering.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC ANR avocado nutrient management; UC IPM; UC Davis plant pathology\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["avocado-trunk-canker-identification"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Avocado Trunk Canker Identification</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Identify the cause, then treat accordingly</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Phytophthora Canker</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\"><strong style=\"color: #1a3b2a !important;\">Appearance:</strong> Dark, water-soaked areas that may ooze reddish-brown sap</p>\n                    <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\"><strong style=\"color: #1a3b2a !important;\">Bark test:</strong> Brown, dead cambium beneath outer bark</p>\n                    <p style=\"font-size: 0.78rem; color: #1a3b2a !important; margin: 0; line-height: 1.5; font-weight: 600;\">Treatment: Cut away dead tissue. Apply phosphonate fungicide. Improve drainage.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Sunburn Canker</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\"><strong style=\"color: #1a3b2a !important;\">Appearance:</strong> Dry, cracked bark on south or west-facing trunk/branches</p>\n                    <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\"><strong style=\"color: #1a3b2a !important;\">Cause:</strong> Bark exposed to direct sun after pruning or leaf loss</p>\n                    <p style=\"font-size: 0.78rem; color: #1a3b2a !important; margin: 0; line-height: 1.5; font-weight: 600;\">Treatment: Whitewash immediately (1:1 white latex paint + water). Do not seal wound.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Mechanical Damage</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\"><strong style=\"color: #1a3b2a !important;\">Appearance:</strong> Clean wound or scar from weed trimmer, animal, or stake rubbing</p>\n                    <p style=\"font-size: 0.78rem; color: #666 !important; margin: 0 0 10px 0; line-height: 1.5;\"><strong style=\"color: #1a3b2a !important;\">Risk:</strong> Entry point for disease if untreated</p>\n                    <p style=\"font-size: 0.78rem; color: #1a3b2a !important; margin: 0; line-height: 1.5; font-weight: 600;\">Treatment: Trim ragged bark cleanly. Let air-dry. Whitewash. Do not use wound sealer.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC ANR avocado disease management; UC IPM\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["santa-cruz-county-avocado-care-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Avocado Care Calendar at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Monthly priorities for Santa Cruz County</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 700px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Month</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Water</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Fertilize</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Frost Protection</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Other Key Tasks</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Jan</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Rain only</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">No</td>\n                    <td style=\"padding: 8px 10px; color: #c45b4a !important; font-size: 0.85rem; font-weight: 600;\">HIGH ALERT</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Check drainage; snail patrol</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Feb</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Rain only</td>\n                    <td style=\"padding: 8px 10px; color: #2d6a3f !important; font-size: 0.85rem; font-weight: 600;\">1st feeding</td>\n                    <td style=\"padding: 8px 10px; color: #c45b4a !important; font-size: 0.85rem; font-weight: 600;\">HIGH ALERT</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Watch for early bloom</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Mar</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Monitor; supplement if dry</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">Backup if Feb missed</td>\n                    <td style=\"padding: 8px 10px; color: #c9a84c !important; font-size: 0.85rem;\">Protect bloom from late frost</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Planting season opens; light pruning OK</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Apr</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Weekly (established) / 2x week (young)</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">No</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">Minimal risk</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Peak bloom; monitor for mites/lace bug</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">May</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Every 5-7 days</td>\n                    <td style=\"padding: 8px 10px; color: #2d6a3f !important; font-size: 0.85rem; font-weight: 600;\">2nd feeding</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">None</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Best time to prune; last month to plant</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Jun</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Every 5-7 days (deep soak)</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">No</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">None</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">June drop (normal); pest monitoring</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Jul</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Every 5-7 days</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">No</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">None</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Mexicola harvest begins; weed and mulch</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Aug</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Every 5-7 days</td>\n                    <td style=\"padding: 8px 10px; color: #2d6a3f !important; font-size: 0.85rem; font-weight: 600;\">3rd feeding (last)</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">None</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Inspect frost cloth; Mexicola peak harvest</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Sep</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Reduce to every 7-10 days</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">No (season over)</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">None</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Hass/Reed harvest (warmest sites)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Oct</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Reduce further; stop when rains start</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">No</td>\n                    <td style=\"padding: 8px 10px; color: #c9a84c !important; font-size: 0.85rem;\">Prep equipment; frost possible inland</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Install frames on young trees; Bacon starts</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Nov</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Rain only (turn off irrigation)</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">No</td>\n                    <td style=\"padding: 8px 10px; color: #c45b4a !important; font-size: 0.85rem; font-weight: 600;\">ACTIVE SEASON</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Bacon/Fuerte harvest; watch for waterlogging</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 8px 10px; font-weight: 600; color: #1a3b2a !important;\">Dec</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Rain only</td>\n                    <td style=\"padding: 8px 10px; color: #8c9c8c !important; font-size: 0.85rem;\">No</td>\n                    <td style=\"padding: 8px 10px; color: #c45b4a !important; font-size: 0.85rem; font-weight: 600;\">HIGH ALERT</td>\n                    <td style=\"padding: 8px 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Winter inspection; plan spring orders</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Timing is 2-4 weeks later than Southern California guides. Adjust to your specific microclimate. Source: UC ANR; UC Cooperative Extension\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["avocado-seasonal-care-intensity-chart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Avocado Care Intensity by Season</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Where to focus your effort throughout the year</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #4a7c9c !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Winter (Nov-Feb)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Watering:</strong> <span style=\"color: #2d6a3f !important;\">Low</span> (rain only)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Fertilizing:</strong> <span style=\"color: #2d6a3f !important;\">Low</span> (Feb only)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Frost protection:</strong> <span style=\"color: #c45b4a !important;\">HIGH</span></p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><strong>Pest monitoring:</strong> <span style=\"color: #2d6a3f !important;\">Low</span></p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #5a9e6f !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Spring (Mar-May)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Watering:</strong> <span style=\"color: #c9a84c !important;\">Moderate</span> (ramp up)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Fertilizing:</strong> <span style=\"color: #c9a84c !important;\">Moderate</span> (May feeding)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Frost protection:</strong> <span style=\"color: #c9a84c !important;\">Moderate</span> (bloom)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><strong>Pest monitoring:</strong> <span style=\"color: #c9a84c !important;\">Moderate</span> (start checks)</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #c9a84c !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Summer (Jun-Aug)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Watering:</strong> <span style=\"color: #c45b4a !important;\">HIGH</span> (critical period)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Fertilizing:</strong> <span style=\"color: #2d6a3f !important;\">Low</span> (Aug only)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Frost protection:</strong> <span style=\"color: #2d6a3f !important;\">None</span></p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><strong>Pest monitoring:</strong> <span style=\"color: #c45b4a !important;\">HIGH</span> (mites peak)</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #d4764a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Fall (Sep-Oct)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Watering:</strong> <span style=\"color: #c9a84c !important;\">Moderate</span> (tapering)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Fertilizing:</strong> <span style=\"color: #2d6a3f !important;\">None</span> (let tree harden)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Frost protection:</strong> <span style=\"color: #c9a84c !important;\">Prep equipment</span></p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0;\"><strong>Pest monitoring:</strong> <span style=\"color: #2d6a3f !important;\">Low</span></p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Source: UC ANR avocado management guidelines; UC Cooperative Extension\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["avocado-harvest-calendar-for-santa-cruz-county"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Avocado Harvest Windows for Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">When each variety reaches maturity in our climate</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 700px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 8px; text-align: left; font-weight: 600; font-size: 0.8rem; width: 110px;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 4px; text-align: center; font-weight: 600; font-size: 0.75rem;\">Jan</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 4px; text-align: center; font-weight: 600; font-size: 0.75rem;\">Feb</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 4px; text-align: center; font-weight: 600; font-size: 0.75rem;\">Mar</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 4px; text-align: center; font-weight: 600; font-size: 0.75rem;\">Apr</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 4px; text-align: center; font-weight: 600; font-size: 0.75rem;\">May</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !impor
