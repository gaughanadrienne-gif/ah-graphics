tyle=\"padding: 10px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Marginal</span></td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Needs most heat of any citrus. Not recommended locally.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 20px; font-size: 0.8rem; color: #1c3c2c !important;\">\n        <div style=\"display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;\">\n            <span style=\"display: flex; align-items: center; gap: 5px;\"><span style=\"width: 14px; height: 14px; background-color: #1a3b2a !important; border-radius: 2px; display: inline-block;\"></span> Excellent</span>\n            <span style=\"display: flex; align-items: center; gap: 5px;\"><span style=\"width: 14px; height: 14px; background-color: #8c9c8c !important; border-radius: 2px; display: inline-block;\"></span> Good</span>\n            <span style=\"display: flex; align-items: center; gap: 5px;\"><span style=\"width: 14px; height: 14px; background-color: #dde2d8 !important; border-radius: 2px; display: inline-block;\"></span> Marginal</span>\n            <span style=\"display: flex; align-items: center; gap: 5px;\"><span style=\"width: 14px; height: 14px; background-color: #f0e6e6 !important; border-radius: 2px; display: inline-block;\"></span> Poor</span>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["citrus-fertilizing-schedule"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Citrus Fertilizing Schedule</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">When and what to feed for Santa Cruz County</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">When</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">What to Apply</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Why</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">February</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Citrus fertilizer (e.g., 6-4-4) + chelated iron</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">First feeding before spring growth flush</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">May</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Citrus fertilizer + iron if leaves yellowing</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Supports fruit development and summer growth</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">August</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Light citrus fertilizer (last feeding)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Final feeding before fall. Do NOT fertilize after September.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">As needed</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Chelated iron foliar spray</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">If leaves yellow between veins (iron chlorosis). Very common locally.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 25px 0; border-radius: 0 6px 6px 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Iron chlorosis is the #1 citrus nutrient problem in Santa Cruz County.</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Our alkaline soils lock up iron. Supplement with chelated iron even if using citrus fertilizer.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["meyer-lemon-care-calendar"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Meyer Lemon Year-Round Care Calendar</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Seasonal tasks for Santa Cruz County</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Season</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Tasks</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Watch For</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Winter<br><span style=\"font-weight: 400; font-size: 0.8rem; color: #8c9c8c !important;\">Dec-Feb</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Harvest ripe fruit. Protect from frost if below 26F. Reduce watering (rain provides). First fertilizer in Feb.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Frost damage on new growth. Scale insects on stems.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Spring<br><span style=\"font-weight: 400; font-size: 0.8rem; color: #8c9c8c !important;\">Mar-May</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Peak bloom (fragrant!). Light pruning after bloom. Feed in May. Resume regular watering as rains stop.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Aphids on new growth. Citrus leafminer. Iron chlorosis (yellow leaves).</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Summer<br><span style=\"font-weight: 400; font-size: 0.8rem; color: #8c9c8c !important;\">Jun-Aug</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Deep water weekly (more inland). Last fertilizer in Aug. Thin fruit if heavily loaded. Monitor for pests.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sunburn on fruit (inland). Spider mites in hot weather.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fall<br><span style=\"font-weight: 400; font-size: 0.8rem; color: #8c9c8c !important;\">Sep-Nov</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fruit ripening (turns yellow). Reduce watering as rains start. NO fertilizer. Prep frost protection.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fruit drop (normal if light). Snail damage.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Meyer lemons fruit year-round in Santa Cruz. You may have ripe fruit and flowers on the tree at the same time!\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["container-citrus-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Container Citrus Essentials Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Everything you need for success</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem;\">1</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Container: 15-25 gallon minimum</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Must have drainage holes. Half wine barrels work great. Avoid dark colors (overheat roots).</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem;\">2</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Soil: Fast-draining citrus mix</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Standard potting soil + extra perlite. Never use garden soil. Needs to drain within seconds.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem;\">3</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Location: Sunniest spot, south-facing wall</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">6+ hours direct sun minimum. Reflected heat from walls helps enormously at the coast.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem;\">4</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Watering: Deep but infrequent</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Water when top 2 inches are dry. Containers dry faster than ground. Daily in hot inland summers.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem;\">5</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Feeding: More often than in-ground</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Container citrus need fertilizer every 4-6 weeks (Feb-Aug). Nutrients leach with each watering.</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0 25px 25px 25px; border-radius: 0 6px 6px 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">The container advantage:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> You can move containers to chase sun, shelter from frost, and position against warm walls. This makes marginal varieties possible even at the coast.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["frost-protection-action-plan"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Citrus Frost Protection Action Plan</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What to do when frost is forecast</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; border-left: 5px solid #1a3b2a; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Above 32F: No action needed</span>\n                    <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem;\">Safe Zone</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Most established citrus handles temperatures in the mid-30s with no damage.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #c4a35a; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">28-32F: Light protection</span>\n                    <span style=\"background-color: #c4a35a !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem;\">Caution</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Water deeply the day before. Cover with frost cloth (not plastic touching leaves). Move containers against warm walls. String Christmas lights for warmth.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #c0392b; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Below 28F: Maximum protection</span>\n                    <span style=\"background-color: #c0392b !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem;\">Danger</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">All of the above PLUS: Double-layer frost cloth. Move containers indoors or to garage. Add outdoor-rated heat source under cover. Harvest any ripe fruit beforehand.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8b4444; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Below 22F: Survival mode</span>\n                    <span style=\"background-color: #8b4444 !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem;\">Critical</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Even cold-hardy citrus may suffer damage. Move everything possible indoors. Established in-ground trees: wrap trunk, cover canopy, add heat source. Wait until spring to assess damage before pruning.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        SLV and mountain frost pockets get the coldest temperatures. Coastal areas rarely drop below 28F.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["citrus-problem-diagnostic"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Citrus Problem Quick Diagnosis</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What's wrong with your citrus tree?</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Symptom</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Likely Cause</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Fix</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Yellow leaves, green veins</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Iron chlorosis (#1 local problem)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Chelated iron foliar spray or soil drench. Our alkaline soils lock up iron.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">All-yellow leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Nitrogen deficiency or overwatering</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Feed with citrus fertilizer. Check drainage. Reduce watering if soil stays wet.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Leaf drop (sudden)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Cold damage, water stress, or transplant shock</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Stabilize watering. Don't fertilize stressed trees. Wait for recovery.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">No fruit / poor fruit</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Not enough heat, tree too young, or overfertilized</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Most citrus fruits in 3-5 years. Check variety is right for your microclimate. Reduce nitrogen.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Sticky leaves / sooty mold</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Aphids, scale, or whitefly</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Treat pest first (horticultural oil). Sooty mold washes off once pest is controlled.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Curled, distorted new leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Citrus leafminer</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Cosmetic damage mostly. Spinosad spray on new flushes. Doesn't harm fruit production.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Bland, pale fruit</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Insufficient heat for variety</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Wrong variety for your microclimate. Switch to low-heat citrus (lemons, kumquats, Satsumas).</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["mandarin-variety-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Mandarin Varieties for Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Which mandarins actually work here</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Cold Hardy</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Heat Need</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Harvest</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Santa Cruz Verdict</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Owari Satsuma</td>\n                    <td style=\"padding: 10px 12px; text-align: center; color: #1c3c2c !important;\">22F</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">Low</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Nov-Jan</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Top pick. Sweet even in cool areas. Seedless.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Kishu</td>\n                    <td style=\"padding: 10px 12px; text-align: center; color: #1c3c2c !important;\">24F</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">Low</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Dec-Feb</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Tiny, sweet, seedless. Kids love them. Good everywhere.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Clementine</td>\n                    <td style=\"padding: 10px 12px; text-align: center; color: #1c3c2c !important;\">25F</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">Medium</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Nov-Jan</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Needs more heat. Inland/Watsonville only for good flavor.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Tango</td>\n                    <td style=\"padding: 10px 12px; text-align: center; color: #1c3c2c !important;\">26F</td>\n                    <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #c4a35a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem;\">High</span></td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Jan-Mar</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Excellent flavor but needs real heat. Watsonville warmest spots only.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Satsumas are the clear winner for most Santa Cruz gardens. They develop sweetness with less heat than any other mandarin.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["lime-variety-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Lime Varieties: Your Options in Santa Cruz</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Why Bearss is the only realistic choice for most gardeners</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; text-align: center;\">Bearss (Persian) Lime</div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Cold hardy to:</strong> 28F</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Size:</strong> Larger, seedless, grocery-store type</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Flavor:</strong> Classic lime, less intense than Key</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Best location:</strong> Inland, warm wall, or container</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0;\"><strong>SC Verdict:</strong> Your best (and likely only) option. Still needs protection at coast.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 14px; font-weight: 700; text-align: center;\">Key (Mexican) Lime</div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Cold hardy to:</strong> 32F (very frost sensitive)</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Size:</strong> Small, seedy, intense flavor</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Flavor:</strong> More aromatic, complex, classic for cocktails</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Best location:</strong> Container only (must move indoors winter)</p>\n                    <p style=\"font-size: 0.85rem; color: #c0392b !important; margin: 0;\"><strong>SC Verdict:</strong> Very challenging. Container + indoor winter storage required. Not recommended for beginners.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0 25px 25px 25px; border-radius: 0 6px 6px 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Honest take:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Limes are the trickiest citrus for Santa Cruz. If you want reliable citrus, start with Meyer lemons or Satsumas. If you want limes, grow Bearss in a container against a warm south-facing wall.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["citrus-fertilizer-products-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Citrus Fertilizer Products Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What to buy and how to apply</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Product Type</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Examples</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">How to Apply</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Notes</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Granular Citrus Fertilizer</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">E.B. Stone Citrus, Dr. Earth Citrus</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Spread along drip line. Water in well.</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Best for in-ground trees. 3x per year (Feb, May, Aug).</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Liquid Citrus Fertilizer</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Grow More Citrus, MaxSea</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Dilute in water, apply to soil.</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Best for containers. Every 4-6 weeks (Feb-Aug).</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Chelated Iron</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Ironite, EDDHA iron chelate</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Foliar spray or soil drench.</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Essential in SC. Apply if leaves yellow between veins.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Zinc/Manganese Spray</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Liqui-Cop with zinc, foliar micronutrients</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Foliar spray during spring flush.</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Secondary deficiency. Small, pointed leaves = zinc needed.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 25px 0; border-radius: 0 6px 6px 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Important:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Most organic citrus fertilizers do NOT contain iron. If you go organic, you must supplement with chelated iron separately. Iron chlorosis is the most common citrus nutrient problem in Santa Cruz County.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
