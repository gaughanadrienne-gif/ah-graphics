window.AH_GRAPHICS["plant-guide-eureka-lemon-banana-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Eureka Lemon in the Banana Belt</h3><table><tr><td>Best planting time</td><td>Spring, for a full warm season to establish before winter</td></tr><tr><td>Cold hardiness</td><td>Tender below about 28 to 30 F, but the thermal belt rarely reaches that</td></tr><tr><td>Siting and soil</td><td>Full sun on the warm upper-mid slope, decent draining loam, plant slightly high; keep thorns away from paths</td></tr><tr><td>Years to fruit</td><td>2 to 3 years from a nursery tree, often on the faster end here</td></tr><tr><td>Frost-protection note</td><td>Seldom needed; cold air drains downhill. Plant young trees high and protect on a hard freeze in a low spot</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-eureka-lemon-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Eureka Lemon in the Coastal Fog Belt</h3><table><tr><td>Best planting time</td><td>Spring, after the last frost, for a full warm season to establish</td></tr><tr><td>Cold hardiness</td><td>Tender below about 28 to 30 F; slightly less cold-hardy than a Meyer, so site warm</td></tr><tr><td>Siting and soil</td><td>Hottest all-day sun against a south or west wall, sharp-draining soil, plant slightly high</td></tr><tr><td>Years to fruit</td><td>2 to 3 years from a nursery tree to a useful crop</td></tr><tr><td>Frost-protection note</td><td>Protect on hard freeze nights and keep out of cold hollows; a container makes sheltering easy</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-eureka-lemon-san-lorenzo-valley-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Eureka Lemon in the San Lorenzo Valley</h3><table><tr><td>Best planting time</td><td>Late spring, once frost is firmly past, for maximum warm-season establishment</td></tr><tr><td>Cold hardiness</td><td>Tender below about 28 to 30 F; the valley's cold canyon frosts make this its main limit</td></tr><tr><td>Siting and soil</td><td>Sunny ridge or hot south wall away from redwoods, or a movable container; sharp-draining soil, plant high</td></tr><tr><td>Years to fruit</td><td>3 or more years, often slower here due to cold and shade stress</td></tr><tr><td>Frost-protection note</td><td>Essential; plant against a heat-banking wall or in a pot you can shelter, and cover on every hard freeze night</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-everbearing-strawberry-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Everbearing Strawberries in the Coastal Fog Belt</h3><table><tr><td>Best planting time</td><td>Late fall through early spring, bare root in November to February</td></tr><tr><td>Bare-root vs plant</td><td>Bare-root crowns in the cool months let plants root in before picking season</td></tr><tr><td>Soil and spacing</td><td>Raised beds for drainage and airflow, crown at soil level, 12 to 18 inches apart</td></tr><tr><td>First harvest</td><td>Late spring, building through summer with day-neutral types</td></tr><tr><td>Renew or replace</td><td>Long, gentle season often into October; replace beds every 2 to 3 years</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-grapes-banana-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Grapes in the Banana Belt</h3><table><tr><td>Best planting time</td><td>Late winter to early spring, while vines are dormant and soil is warming</td></tr><tr><td>Chill or heat needs</td><td>Plenty of warmth here ripens fruit well; plant high on the slope, not in a cold dip</td></tr><tr><td>Variety pick for this zone</td><td>Sweet table grapes ripen easily; wine varieties do well on the best sunny, drained slopes</td></tr><tr><td>Years to fruit</td><td>Two to three years for a meaningful crop</td></tr><tr><td>Disease or pollination note</td><td>Self-fertile; powdery mildew is reduced by the warmth but still managed with open canopy and air flow</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-grapes-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Grapes in the Coastal Fog Belt</h3><table><tr><td>Best planting time</td><td>Late winter to early spring, while vines are dormant and soil is warming</td></tr><tr><td>Chill or heat needs</td><td>Short on ripening heat here; use the warmest, sunniest, most sheltered spot you have</td></tr><tr><td>Variety pick for this zone</td><td>Disease-resistant American and hybrid table grapes, not European wine varieties</td></tr><tr><td>Years to fruit</td><td>Two to three years, often with slower ripening than inland</td></tr><tr><td>Disease or pollination note</td><td>Self-fertile; powdery mildew pressure is high in the fog, so air flow and resistant varieties matter most</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-grapes-san-lorenzo-valley-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Grapes in the San Lorenzo Valley</h3><table><tr><td>Best planting time</td><td>Late winter to early spring, while vines are dormant and soil is warming</td></tr><tr><td>Chill or heat needs</td><td>Above the fog line for full sun and ripening heat; cold canyon floors do not work</td></tr><tr><td>Variety pick for this zone</td><td>Wine grapes on the best ridges; disease-resistant American and hybrid table grapes for lower fuss</td></tr><tr><td>Years to fruit</td><td>Two to three years for a meaningful crop</td></tr><tr><td>Disease or pollination note</td><td>Self-fertile; powdery mildew is the main challenge, managed with sun, open canopy, and air flow</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-heritage-apple-banana-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Heritage Apples in the Banana Belt</h3><table><tr><td>Best planting time</td><td>Winter, as a dormant bare-root tree</td></tr><tr><td>Chill or heat needs</td><td>Warm slopes bank fewer chill hours; match the variety to your chill or choose low-chill apples</td></tr><tr><td>Variety pick for this zone</td><td>Low-chill Anna and Dorsett Golden on the warmest slopes; Gala or Fuji for moderate chill; Gravenstein only where chill is decent</td></tr><tr><td>Years to fruit</td><td>Three to four years to a real crop on a standard tree</td></tr><tr><td>Disease or pollination note</td><td>Plant two compatible varieties with overlapping bloom and similar chill needs for good pollination</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-meyer-lemon-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Meyer Lemons in the Coastal Fog Belt</h3><table><tr><td>Best planting window</td><td>March through May, once nights warm up</td></tr><tr><td>Avoid planting</td><td>Late fall into winter (cold wet roots)</td></tr><tr><td>Frost protection needed below</td><td>Around 30F, uncommon but does happen inland of the immediate shore</td></tr><tr><td>Fruit ripening</td><td>Slow; expect winter into spring, sometimes later than inland trees</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-persimmon-san-lorenzo-valley-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting a Persimmon in the San Lorenzo Valley</h3><table><tr><td>Best planting time</td><td>Bare-root in winter, roughly December to February</td></tr><tr><td>Chill hours needed vs available</td><td>Needs only about 100 to 200; the cooler valley supplies it easily</td></tr><tr><td>Variety pick</td><td>Fuyu for crisp non-astringent fruit, or Hachiya for soft astringent fruit</td></tr><tr><td>Years to fruit</td><td>3 to 4 years from a bare-root tree</td></tr><tr><td>Frost or disease note</td><td>Hardy and pest-resistant; plant in real sun on a ridge and protect young trees from canyon frost</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-potato-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Potatoes in the Coastal Fog Belt</h3><table><tr><td>Sow or plant</td><td>Plant chitted seed pieces February through May, while air temperatures stay under 65F</td></tr><tr><td>Seed-piece depth</td><td>4 inches deep in an 8-inch trench, then hill as shoots grow</td></tr><tr><td>Soil and spacing</td><td>Loose, slightly acidic soil; pieces 10 to 12 inches apart</td></tr><tr><td>Days to harvest</td><td>90 to 120 days; new potatoes once flowering begins</td></tr><tr><td>Typical frost window</td><td>Hard frost rare; protect young shoots on the odd cold night</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-potato-pajaro-valley-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Potatoes in the Pajaro Valley</h3><table><tr><td>Sow or plant</td><td>Plant chitted seed pieces February through April into warm, workable valley soil</td></tr><tr><td>Seed-piece depth</td><td>4 inches deep in an 8-inch trench, then hill as shoots grow</td></tr><tr><td>Soil and spacing</td><td>Deep, rich, fertile valley ground; pieces 10 to 12 inches apart</td></tr><tr><td>Days to harvest</td><td>90 to 120 days; new potatoes once flowering begins</td></tr><tr><td>Typical frost window</td><td>Light frost on the flats early; risk fades by late February to March</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-potato-san-lorenzo-valley-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Potatoes in the San Lorenzo Valley</h3><table><tr><td>Sow or plant</td><td>Plant chitted seed pieces March to May, after the valley-floor frost risk has passed</td></tr><tr><td>Seed-piece depth</td><td>4 inches deep in an 8-inch trench, then hill as shoots grow</td></tr><tr><td>Soil and spacing</td><td>Loose, well-drained, slightly acidic soil; pieces 10 to 12 inches apart</td></tr><tr><td>Days to harvest</td><td>90 to 120 days; new potatoes once flowering begins</td></tr><tr><td>Typical frost window</td><td>Cold air pools on canyon floors; late frosts run into April in low spots</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-ranunculus-banana-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Ranunculus in the Banana Belt</h3><table><tr><td>Presoak and plant corms</td><td>Soak 3 to 4 hours, then plant October to November after soil cools</td></tr><tr><td>Planting depth and spacing</td><td>2 inches deep, claws down, 6 inches apart</td></tr><tr><td>Soil and sun</td><td>Rich, free-draining raised bed; full sun, 6 hours or more</td></tr><tr><td>Bloom window</td><td>March to April, tapering as warm season arrives early</td></tr><tr><td>Lift or leave</td><td>Leave in well-drained ground; mild winters rarely freeze corms</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-ranunculus-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Ranunculus in the Coastal Fog Belt</h3><table><tr><td>Presoak and plant corms</td><td>Soak 3 to 4 hours, then plant October to November</td></tr><tr><td>Planting depth and spacing</td><td>2 inches deep, claws down, 6 inches apart</td></tr><tr><td>Soil and sun</td><td>Rich, free-draining raised bed; full sun, 6 hours or more</td></tr><tr><td>Bloom window</td><td>March to April, sometimes into May in a cool spring</td></tr><tr><td>Lift or leave</td><td>Leave in well-drained ground; mild winters rarely freeze corms</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-ranunculus-pajaro-valley-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Ranunculus in the Pajaro Valley</h3><table><tr><td>Presoak and plant corms</td><td>Soak 3 to 4 hours, then plant October to November</td></tr><tr><td>Planting depth and spacing</td><td>2 inches deep, claws down, 6 inches apart</td></tr><tr><td>Soil and sun</td><td>Rich valley soil in a raised, draining bed; full sun, 6 hours or more</td></tr><tr><td>Bloom window</td><td>March to April, easing off as warm season returns</td></tr><tr><td>Lift or leave</td><td>Leave in well-drained ground; site off frost pockets</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-roma-tomato-banana-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Roma Tomatoes in the Banana Belt</h3><table><tr><td>Start seeds indoors</td><td>Late February to early March</td></tr><tr><td>Transplant outdoors</td><td>Late April to mid May, once nights hold above 50F</td></tr><tr><td>Soil temperature target</td><td>At least 60F at 4 inches deep</td></tr><tr><td>Days to maturity</td><td>75 to 80 days from transplant</td></tr><tr><td>Typical frost window</td><td>Light and short; risk is largely past by late April</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-roma-tomato-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Roma Tomatoes in the Coastal Fog Belt</h3><table><tr><td>Start seeds indoors</td><td>Early to mid March, with bottom heat</td></tr><tr><td>Transplant outdoors</td><td>Mid May to early June, once soil is reliably warm</td></tr><tr><td>Soil temperature target</td><td>At least 60F at 4 inches; the coast is slow to reach this</td></tr><tr><td>Days to maturity</td><td>Pick a paste type under 70 days, not the standard 75 to 80</td></tr><tr><td>Typical frost window</td><td>Hard freeze is rare on the immediate coast; warmth, not frost, is the real constraint</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-roma-tomato-san-lorenzo-valley-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Roma Tomatoes in the San Lorenzo Valley</h3><table><tr><td>Start seeds indoors</td><td>Early to mid March</td></tr><tr><td>Transplant: warm ridge</td><td>Late April to early May</td></tr><tr><td>Transplant: cold canyon or frost pocket</td><td>Mid to late May, after pooling cold passes</td></tr><tr><td>Days to maturity</td><td>Favor a shorter-season paste type, 65 to 75 days</td></tr><tr><td>Typical frost window</td><td>Varies by hundreds of feet of elevation; frost pockets can linger into April. Trust your own spot, not the county calendar</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-romaine-lettuce-banana-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Romaine Lettuce in the Banana Belt</h3><table><tr><td>Spring sowing</td><td>February through April</td></tr><tr><td>Fall sowing</td><td>Late August through October</td></tr><tr><td>Summer (June to mid-August)</td><td>Possible only with afternoon shade; expect bolting risk</td></tr><tr><td>Soil temperature for germination</td><td>Sprouts best between 45F and 70F</td></tr><tr><td>Days to maturity</td><td>55 to 70 days for full heads</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-romaine-lettuce-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Romaine Lettuce in the Coastal Fog Belt</h3><table><tr><td>Direct sow or transplant</td><td>Nearly year-round; main runs February through September</td></tr><tr><td>Best succession interval</td><td>A new short row every 2 to 3 weeks</td></tr><tr><td>Soil temperature for germination</td><td>Sprouts best between 45F and 70F</td></tr><tr><td>Days to maturity</td><td>55 to 70 days for full heads, sooner for baby leaves</td></tr><tr><td>Typical frost window</td><td>Hard frost rare; winter sowings keep growing slowly</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-romaine-lettuce-san-lorenzo-valley-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Romaine Lettuce in the San Lorenzo Valley</h3><table><tr><td>Main sowing window</td><td>March through September, in partly shaded beds</td></tr><tr><td>Watch frost pockets</td><td>Canyon floors frost later in spring and earlier in fall than ridges</td></tr><tr><td>Soil temperature for germination</td><td>Sprouts best between 45F and 70F</td></tr><tr><td>Days to maturity</td><td>55 to 70 days for full heads</td></tr><tr><td>Typical frost window</td><td>Light frost tolerated; cover low beds on cold clear nights</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["local-santa-cruz-community-gardens-1"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card th{background:#f3f1e7;color:#33402e !important;text-align:left;padding:11px 16px;font-size:0.82rem !important;border-bottom:2px solid #d3d8c2}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.88rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Community Gardens in Santa Cruz County</h3><table><thead><tr><th>Garden / Program</th><th>Area</th><th>Who to ask</th></tr></thead><tbody><tr><td>Beach Flats Community Garden</td><td>Beach Flats neighborhood, near the Boardwalk</td><td>Beach Flats Community Garden (community-run)</td></tr><tr><td>Trescony Community Gardens</td><td>Westside, City of Santa Cruz (Trescony Park)</td><td>City of Santa Cruz Parks &amp; Recreation</td></tr><tr><td>City of Santa Cruz garden plots</td><td>Within Santa Cruz city limits</td><td>City Parks &amp; Recreation, (831) 420-5270</td></tr><tr><td>Live Oak Grange Community Garden</td><td>Live Oak / Mid-County</td><td>Santa Cruz Live Oak Grange</td></tr><tr><td>Community Health Trust gardens</td><td>Watsonville (Muzzio, Franich, Flodberg parks)</td><td>Community Health Trust of Pajaro Valley</td></tr><tr><td>Mesa Verde Gardens</td><td>Pajaro Valley / Watsonville area</td><td>Mesa Verde Gardens (nonprofit)</td></tr><tr><td>UCSC Farm &amp; Alan Chadwick Garden</td><td>UC Santa Cruz campus</td><td>UCSC Center for Agroecology</td></tr></tbody></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County &middot; Confirm current details with each organization</div></div>";

window.AH_GRAPHICS["local-santa-cruz-community-gardens-2"] = "<style>.ah-pg-checklist{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-checklist h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-checklist ol{list-style:none;counter-reset:ah-step;margin:0;padding:8px 0;background:#f3f1e7}.ah-pg-checklist li{counter-increment:ah-step;position:relative;padding:11px 18px 11px 54px;color:#33402e !important;font-size:0.9rem;line-height:1.5;border-bottom:1px solid #e7ead9}.ah-pg-checklist li:last-child{border-bottom:none}.ah-pg-checklist li:before{content:counter(ah-step);position:absolute;left:16px;top:11px;width:26px;height:26px;line-height:26px;text-align:center;background:#33402e;color:#f3f1e7 !important;border-radius:50%;font-weight:700;font-size:0.8rem}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-checklist\"><h3>Your Community Garden Application Checklist</h3><ol><li>Contact the garden or program directly and ask whether plots are open or if there is a waitlist.</li><li>Confirm eligibility, since some gardens prioritize residents of a specific neighborhood or city.</li><li>Ask about the fee, the term (often a growing season or a year), and what the fee includes.</li><li>Read the garden rules on organic practices, water use, weeding, and shared chores before you commit.</li><li>Get on the waitlist in writing, then follow up periodically so they know you are still interested.</li></ol><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["local-composting-rules-santa-cruz-sb-1383-green-waste-1"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card th{background:#f3f1e7;color:#33402e !important;text-align:left;padding:11px 16px;font-size:0.82rem !important;border-bottom:2px solid #d3d8c2;width:33%}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.86rem;vertical-align:top}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>What Goes Where: A Santa Cruz Sorting Guide</h3><table><thead><tr><th>Organics / Green Cart</th><th>Backyard Compost Pile</th><th>Landfill / Trash</th></tr></thead><tbody><tr><td>Fruit and vegetable scraps, peels, pits</td><td>Fruit and vegetable scraps, peels</td><td>Plastic bags (even \"compostable\" ones)</td></tr><tr><td>Coffee grounds, eggshells, bread, grains</td><td>Coffee grounds, eggshells, crushed</td><td>Coffee pods, tea bags with plastic</td></tr><tr><td>Cooked food, dairy, meat, bones <em>(City food-scrap pail)</em></td><td>Avoid: meat, dairy, bones, oils</td><td>Grease, oils, liquids</td></tr><tr><td>Yard trimmings, leaves, prunings, grass</td><td>Dry leaves, small prunings, grass</td><td>Treated or painted wood</td></tr><tr><td>Food-soiled paper, paper towels</td><td>Shredded plain paper, cardboard</td><td>Glass, metal, foil, utensils</td></tr></tbody></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; City keeps food and yard waste separate; most GreenWaste county areas combine them. Confirm with your hauler</div></div>";

window.AH_GRAPHICS["local-composting-rules-santa-cruz-sb-1383-green-waste-2"] = "<style>.ah-pg-callout{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-callout h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-callout .ah-pg-body{background:#f3f1e7;padding:6px 18px 12px}.ah-pg-callout .ah-pg-item{padding:12px 0;border-bottom:1px solid #e7ead9}.ah-pg-callout .ah-pg-item:last-child{border-bottom:none}.ah-pg-callout .ah-pg-label{font-weight:700;color:#33402e !important;font-size:0.92rem;margin-bottom:3px}.ah-pg-callout .ah-pg-text{color:#33402e !important;font-size:0.88rem;line-height:1.5}.ah-pg-foot{padding:9px 18px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7;border-top:1px solid #e7ead9}</style><div class=\"ah-pg-callout\"><h3>Local Composting Resources at a Glance</h3><div class=\"ah-pg-body\"><div class=\"ah-pg-item\"><div class=\"ah-pg-label\">City of Santa Cruz: $40 Home Composting Rebate</div><div class=\"ah-pg-text\">A one-time $40 rebate when you buy a compost or worm bin from participating local retailers. You submit the form with your municipal utility account number and proof of purchase to City Public Works.</div></div><div class=\"ah-pg-item\"><div class=\"ah-pg-label\">Unincorporated County (GreenWaste): Free &amp; Discounted Bins</div><div class=\"ah-pg-text\">Residents may qualify for a free backyard composter or worm bin, or discounted Earth Machine and worm bin options. Completing an approved composting workshop can earn a free bin. Call GreenWaste at (831) 426-2711.</div></div><div class=\"ah-pg-item\"><div class=\"ah-pg-label\">Free Composting Workshops</div><div class=\"ah-pg-text\">The City and County offer free hands-on workshops, including hot composting and worm composting sessions, plus composting demonstration sites you can visit. Check current schedules with City Public Works or County Public Works.</div></div></div><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Confirm current offers with the City or GreenWaste</div></div>";

window.AH_GRAPHICS["local-do-i-need-a-permit-for-a-garden-shed-in-santa-cruz-1"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card th{background:#f3f1e7;color:#33402e !important;text-align:left;padding:11px 16px;font-size:0.82rem !important;border-bottom:2px solid #d3d8c2}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.88rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:30%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Garden Shed: Permit or No Permit?</h3><table><thead><tr><th>Question</th><th>City of Santa Cruz</th><th>Unincorporated County</th></tr></thead><tbody><tr><td>Size with no building permit</td><td>Up to 120 sq ft, one story</td><td>Up to 120 sq ft, one story</td></tr><tr><td>Height limit for exemption</td><td>10 ft to roof sheathing</td><td>10 ft to roof sheathing</td></tr><tr><td>Distance from property line</td><td>Your parcel's zoning setback</td><td>As close as 3 ft (side/rear)</td></tr><tr><td>Electrical / plumbing</td><td>Separate permit required</td><td>Separate permit required</td></tr><tr><td>Zoning check still needed?</td><td>Yes</td><td>Yes</td></tr></tbody></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County &middot; Verified June 2026; confirm current rules for your parcel</div></div>";

window.AH_GRAPHICS["plant-guide-satsuma-mandarin-banana-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Satsuma Mandarin in the Banana Belt</h3><table><tr><td>Best planting time</td><td>Spring, for a full warm season to establish before winter</td></tr><tr><td>Cold hardiness</td><td>Hardy into the high 20s F once established, well below typical Banana Belt lows</td></tr><tr><td>Siting and soil</td><td>Full sun on the upper-mid slope, decent draining loam, plant slightly high if soil holds water</td></tr><tr><td>Years to fruit</td><td>2 to 3 years from a nursery tree, often on the faster end here</td></tr><tr><td>Frost-protection note</td><td>Seldom needed; the thermal belt drains cold air downhill. Protect only a very young tree in a low spot on a hard freeze</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-satsuma-mandarin-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Satsuma Mandarin in the Coastal Fog Belt</h3><table><tr><td>Best planting time</td><td>Spring, after the last frost, for a full warm season to establish</td></tr><tr><td>Cold hardiness</td><td>Hardy into the high 20s F once established, the toughest common citrus</td></tr><tr><td>Siting and soil</td><td>Warmest all-day sun, south or west wall, sharp-draining soil, plant slightly high</td></tr><tr><td>Years to fruit</td><td>2 to 3 years from a nursery tree to a useful crop</td></tr><tr><td>Frost-protection note</td><td>Rarely needed here; heat, not cold, is the limit. Protect only very young trees on a hard freeze night</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-satsuma-mandarin-pajaro-valley-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Satsuma Mandarin in the Pajaro Valley</h3><table><tr><td>Best planting time</td><td>Spring, once frost risk has clearly passed, to root in before winter</td></tr><tr><td>Cold hardiness</td><td>Hardy into the high 20s F once established, the right citrus for the valley's frost pockets</td></tr><tr><td>Siting and soil</td><td>Full sun on the highest, best-drained ground; plant slightly high in rich heavy soil; avoid hollows</td></tr><tr><td>Years to fruit</td><td>2 to 3 years from a nursery tree to a useful crop</td></tr><tr><td>Frost-protection note</td><td>Real risk on the flat valley floor; plant above the frost pockets and keep frost cloth ready for young trees on clear still nights</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-sugar-snap-pea-banana-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Sugar Snap Peas in the Banana Belt</h3><table><tr><td>Fall sowing (best)</td><td>Late September through mid-October</td></tr><tr><td>Winter sowing</td><td>January through early February</td></tr><tr><td>Spring sowing (earliest only)</td><td>By early March, no later</td></tr><tr><td>Method</td><td>Direct sow, 1 inch deep, 2 inches apart</td></tr><tr><td>Days to maturity</td><td>60 to 70 days from sowing</td></tr><tr><td>Typical frost window</td><td>Light frost possible on clear hill nights; rarely harms established peas</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-sugar-snap-pea-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Sugar Snap Peas in the Coastal Fog Belt</h3><table><tr><td>Fall sowing (main)</td><td>Late September through October</td></tr><tr><td>Late-winter sowing</td><td>Late January through February</td></tr><tr><td>Method</td><td>Direct sow, 1 inch deep, 2 inches apart</td></tr><tr><td>Soil temperature target</td><td>45F or warmer for good germination</td></tr><tr><td>Days to maturity</td><td>60 to 70 days from sowing</td></tr><tr><td>Typical frost window</td><td>Hard frost rare on the coast; fall sowings grow on through a mild winter</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-sugar-snap-pea-pajaro-valley-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Sugar Snap Peas in the Pajaro Valley</h3><table><tr><td>Fall sowing (main crop)</td><td>October into early November</td></tr><tr><td>Late-winter sowing</td><td>January, for an early-spring harvest</td></tr><tr><td>Harvest window</td><td>Winter through early spring</td></tr><tr><td>Method</td><td>Direct sow, 1 inch deep, 2 inches apart</td></tr><tr><td>Days to maturity</td><td>60 to 70 days from sowing</td></tr><tr><td>Typical frost window</td><td>Cold-air pockets on clear valley nights; hard freezes uncommon and harmless to established peas</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-sungold-cherry-tomato-banana-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Sungold Cherry Tomatoes in the Banana Belt</h3><table><tr><td>Start seeds indoors</td><td>Late February to early March</td></tr><tr><td>Transplant outdoors</td><td>Late April to mid May, once nights hold above 50F</td></tr><tr><td>Soil temperature target</td><td>At least 60F at 4 inches deep</td></tr><tr><td>Days to maturity</td><td>57 to 65 days from transplant</td></tr><tr><td>Typical frost window</td><td>Light and short; risk is largely past by late April</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-sungold-cherry-tomato-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Sungold Cherry Tomatoes in the Coastal Fog Belt</h3><table><tr><td>Start seeds indoors</td><td>Early to mid March</td></tr><tr><td>Transplant outdoors</td><td>Mid to late May, once nights hold near 50F</td></tr><tr><td>Soil temperature target</td><td>At least 60F at 4 inches deep</td></tr><tr><td>Days to maturity</td><td>57 to 65 days from transplant</td></tr><tr><td>Typical frost window</td><td>Hard frost is rare on the coast; cool soil, not cold, is the real constraint</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";
