window.AH_GRAPHICS["plant-guide-roma-tomato-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Roma Tomatoes in the Coastal Fog Belt</h3><table><tr><td>Start seeds indoors</td><td>Early to mid March, with bottom heat</td></tr><tr><td>Transplant outdoors</td><td>Mid May to early June, once soil is reliably warm</td></tr><tr><td>Soil temperature target</td><td>At least 60F at 4 inches; the coast is slow to reach this</td></tr><tr><td>Days to maturity</td><td>Pick a paste type under 70 days, not the standard 75 to 80</td></tr><tr><td>Typical frost window</td><td>Hard freeze is rare on the immediate coast; warmth, not frost, is the real constraint</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-roma-tomato-san-lorenzo-valley-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Roma Tomatoes in the San Lorenzo Valley</h3><table><tr><td>Start seeds indoors</td><td>Early to mid March</td></tr><tr><td>Transplant: warm ridge</td><td>Late April to early May</td></tr><tr><td>Transplant: cold canyon or frost pocket</td><td>Mid to late May, after pooling cold passes</td></tr><tr><td>Days to maturity</td><td>Favor a shorter-season paste type, 65 to 75 days</td></tr><tr><td>Typical frost window</td><td>Varies by hundreds of feet of elevation; frost pockets can linger into April. Trust your own spot, not the county calendar</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["plant-guide-romaine-lettuce-coastal-fog-belt-planting"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.92rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;width:44%;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Planting Romaine Lettuce in the Coastal Fog Belt</h3><table><tr><td>Direct sow or transplant</td><td>Nearly year-round; main runs February through September</td></tr><tr><td>Best succession interval</td><td>A new short row every 2 to 3 weeks</td></tr><tr><td>Soil temperature for germination</td><td>Sprouts best between 45F and 70F</td></tr><tr><td>Days to maturity</td><td>55 to 70 days for full heads, sooner for baby leaves</td></tr><tr><td>Typical frost window</td><td>Hard frost rare; winter sowings keep growing slowly</td></tr></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["local-santa-cruz-community-gardens-1"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card th{background:#f3f1e7;color:#33402e !important;text-align:left;padding:11px 16px;font-size:0.82rem !important;border-bottom:2px solid #d3d8c2}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.88rem;vertical-align:top}.ah-pg-card td:first-child{font-weight:700;background:#f3f1e7}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>Community Gardens in Santa Cruz County</h3><table><thead><tr><th>Garden / Program</th><th>Area</th><th>Who to ask</th></tr></thead><tbody><tr><td>Beach Flats Community Garden</td><td>Beach Flats neighborhood, near the Boardwalk</td><td>Beach Flats Community Garden (community-run)</td></tr><tr><td>Trescony Community Gardens</td><td>Westside, City of Santa Cruz (Trescony Park)</td><td>City of Santa Cruz Parks &amp; Recreation</td></tr><tr><td>City of Santa Cruz garden plots</td><td>Within Santa Cruz city limits</td><td>City Parks &amp; Recreation, (831) 420-5270</td></tr><tr><td>Live Oak Grange Community Garden</td><td>Live Oak / Mid-County</td><td>Santa Cruz Live Oak Grange</td></tr><tr><td>Community Health Trust gardens</td><td>Watsonville (Muzzio, Franich, Flodberg parks)</td><td>Community Health Trust of Pajaro Valley</td></tr><tr><td>Mesa Verde Gardens</td><td>Pajaro Valley / Watsonville area</td><td>Mesa Verde Gardens (nonprofit)</td></tr><tr><td>UCSC Farm &amp; Alan Chadwick Garden</td><td>UC Santa Cruz campus</td><td>UCSC Center for Agroecology</td></tr></tbody></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County &middot; Confirm current details with each organization</div></div>";

window.AH_GRAPHICS["local-santa-cruz-community-gardens-2"] = "<style>.ah-pg-checklist{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-checklist h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-checklist ol{list-style:none;counter-reset:ah-step;margin:0;padding:8px 0;background:#f3f1e7}.ah-pg-checklist li{counter-increment:ah-step;position:relative;padding:11px 18px 11px 54px;color:#33402e !important;font-size:0.9rem;line-height:1.5;border-bottom:1px solid #e7ead9}.ah-pg-checklist li:last-child{border-bottom:none}.ah-pg-checklist li:before{content:counter(ah-step);position:absolute;left:16px;top:11px;width:26px;height:26px;line-height:26px;text-align:center;background:#33402e;color:#f3f1e7 !important;border-radius:50%;font-weight:700;font-size:0.8rem}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-checklist\"><h3>Your Community Garden Application Checklist</h3><ol><li>Contact the garden or program directly and ask whether plots are open or if there is a waitlist.</li><li>Confirm eligibility, since some gardens prioritize residents of a specific neighborhood or city.</li><li>Ask about the fee, the term (often a growing season or a year), and what the fee includes.</li><li>Read the garden rules on organic practices, water use, weeding, and shared chores before you commit.</li><li>Get on the waitlist in writing, then follow up periodically so they know you are still interested.</li></ol><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Santa Cruz County</div></div>";

window.AH_GRAPHICS["local-composting-rules-santa-cruz-sb-1383-green-waste-1"] = "<style>.ah-pg-card{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-card h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-card table{width:100%;border-collapse:collapse}.ah-pg-card th{background:#f3f1e7;color:#33402e !important;text-align:left;padding:11px 16px;font-size:0.82rem !important;border-bottom:2px solid #d3d8c2;width:33%}.ah-pg-card td{padding:11px 16px;border-bottom:1px solid #e7ead9;color:#33402e !important;font-size:0.86rem;vertical-align:top}.ah-pg-card tr:last-child td{border-bottom:none}.ah-pg-foot{padding:9px 16px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7}</style><div class=\"ah-pg-card\"><h3>What Goes Where: A Santa Cruz Sorting Guide</h3><table><thead><tr><th>Organics / Green Cart</th><th>Backyard Compost Pile</th><th>Landfill / Trash</th></tr></thead><tbody><tr><td>Fruit and vegetable scraps, peels, pits</td><td>Fruit and vegetable scraps, peels</td><td>Plastic bags (even \"compostable\" ones)</td></tr><tr><td>Coffee grounds, eggshells, bread, grains</td><td>Coffee grounds, eggshells, crushed</td><td>Coffee pods, tea bags with plastic</td></tr><tr><td>Cooked food, dairy, meat, bones <em>(City food-scrap pail)</em></td><td>Avoid: meat, dairy, bones, oils</td><td>Grease, oils, liquids</td></tr><tr><td>Yard trimmings, leaves, prunings, grass</td><td>Dry leaves, small prunings, grass</td><td>Treated or painted wood</td></tr><tr><td>Food-soiled paper, paper towels</td><td>Shredded plain paper, cardboard</td><td>Glass, metal, foil, utensils</td></tr></tbody></table><div class=\"ah-pg-foot\">Ambitious Harvest &middot; City keeps food and yard waste separate; most GreenWaste county areas combine them. Confirm with your hauler</div></div>";

window.AH_GRAPHICS["local-composting-rules-santa-cruz-sb-1383-green-waste-2"] = "<style>.ah-pg-callout{font-family:'Montserrat',sans-serif;width:100%;margin:28px 0;border:1px solid #d3d8c2;border-radius:8px;overflow:hidden}.ah-pg-callout h3{background:#33402e;color:#f3f1e7 !important;margin:0 !important;padding:14px 18px;font-size:1.05rem !important}.ah-pg-callout .ah-pg-body{background:#f3f1e7;padding:6px 18px 12px}.ah-pg-callout .ah-pg-item{padding:12px 0;border-bottom:1px solid #e7ead9}.ah-pg-callout .ah-pg-item:last-child{border-bottom:none}.ah-pg-callout .ah-pg-label{font-weight:700;color:#33402e !important;font-size:0.92rem;margin-bottom:3px}.ah-pg-callout .ah-pg-text{color:#33402e !important;font-size:0.88rem;line-height:1.5}.ah-pg-foot{padding:9px 18px;font-size:0.75rem;color:#7a8b5e !important;text-align:right;background:#f3f1e7;border-top:1px solid #e7ead9}</style><div class=\"ah-pg-callout\"><h3>Local Composting Resources at a Glance</h3><div class=\"ah-pg-body\"><div class=\"ah-pg-item\"><div class=\"ah-pg-label\">City of Santa Cruz: $40 Home Composting Rebate</div><div class=\"ah-pg-text\">A one-time $40 rebate when you buy a compost or worm bin from participating local retailers. You submit the form with your municipal utility account number and proof of purchase to City Public Works.</div></div><div class=\"ah-pg-item\"><div class=\"ah-pg-label\">Unincorporated County (GreenWaste): Free &amp; Discounted Bins</div><div class=\"ah-pg-text\">Residents may qualify for a free backyard composter or worm bin, or discounted Earth Machine and worm bin options. Completing an approved composting workshop can earn a free bin. Call GreenWaste at (831) 426-2711.</div></div><div class=\"ah-pg-item\"><div class=\"ah-pg-label\">Free Composting Workshops</div><div class=\"ah-pg-text\">The City and County offer free hands-on workshops, including hot composting and worm composting sessions, plus composting demonstration sites you can visit. Check current schedules with City Public Works or County Public Works.</div></div></div><div class=\"ah-pg-foot\">Ambitious Harvest &middot; Confirm current offers with the City or GreenWaste</div></div>";
