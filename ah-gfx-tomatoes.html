window.AH_GRAPHICS["tomato-ripeness-stages"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Tomato Ripeness Stages: When to Pick</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">From green to fully ripe, with harvest guidance</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Stage</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Appearance</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Pick Now?</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Best Use</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Mature Green</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full size, solid green, shiny</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Only if threatened</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Fried green tomatoes, chutney</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Breaker</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">First blush of color (10-30%)</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Good option</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Ripen on counter, good flavor</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Turning</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">30-60% colored</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Good option</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">1-3 days to full ripe on counter</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Pink / Light Red</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">60-90% colored, slight give</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Yes, excellent</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Best for sharing (holds up to transport)</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fully Ripe</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Deep color, slightly soft</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Yes, peak flavor</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Eat within 1-2 days. Do not refrigerate.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Coastal Santa Cruz tip: Harvest at breaker or turning stage to reduce cracking risk. Flavor will be nearly as good when counter-ripened.\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC ANR Publication 8159</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["flavor-maximization-tips"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">5 Ways to Maximize Tomato Flavor</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What the research says about growing the best-tasting fruit</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"max-width: 600px; margin: 0 auto;\">\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 15px 18px; margin-bottom: 15px;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.95rem;\">1. Choose flavorful varieties</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; margin-top: 4px;\">Variety accounts for more flavor difference than any growing technique. Heirlooms and cherry types tend to have the most complex flavor.</div>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 15px 18px; margin-bottom: 15px;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.95rem;\">2. Provide full sun (8+ hours)</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; margin-top: 4px;\">Sugar production requires sunlight. Shaded tomatoes produce blander fruit. In the fog belt, maximize every available hour.</div>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 15px 18px; margin-bottom: 15px;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.95rem;\">3. Reduce water slightly as fruit ripens</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; margin-top: 4px;\">Mild water stress concentrates sugars and flavor compounds. Do not drought-stress, but ease back on watering as fruit colors up.</div>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 15px 18px; margin-bottom: 15px;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.95rem;\">4. Never refrigerate</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; margin-top: 4px;\">Cold temperatures (below 55F) permanently destroy volatile flavor compounds. Store on the counter at room temperature.</div>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 15px 18px;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.95rem;\">5. Let fruit ripen fully before eating</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; margin-top: 4px;\">Flavor peaks at full color with slight give. A tomato that is firm and still developing color will taste less complex than one left another day.</div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC Davis Department of Plant Sciences; \"Tomato Flavor\" (HortScience)</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["seed-saving-fermentation-method-step-by-step"] = "<div style=\"width:100%;margin:2.5rem 0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;\">\n<div style=\"max-width:700px;margin:0 auto;background-color:#1a3b2a !important;border-radius:18px;overflow:hidden;\">\n<div style=\"padding:2rem 2rem 1rem 2rem;text-align:center;\">\n<span style=\"display:inline-block;background-color:#dde2d8 !important;color:#1a3b2a !important;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.3rem 1rem;border-radius:20px;margin-bottom:0.75rem;\">Step-by-Step Guide</span>\n<h3 style=\"color:#f8f9f0 !important;font-size:1.5rem;font-weight:700;margin:0 0 0.25rem 0;line-height:1.3;\">Tomato Seed Saving: The Fermentation Method</h3>\n<p style=\"color:#8c9c8c !important;font-size:0.85rem;margin:0 0 1.5rem 0;\">University-recommended method for longest seed viability</p>\n</div>\n<div style=\"padding:0 2rem 2rem 2rem;\">\n<!-- Step 1 -->\n<div style=\"display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.25rem;\">\n<div style=\"flex-shrink:0;width:44px;height:44px;background-color:#dde2d8 !important;border-radius:50%;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#1a3b2a !important;font-size:1.1rem;font-weight:800;\">1</span>\n</div>\n<div style=\"flex:1;background-color:rgba(255,255,255,0.06) !important;border-radius:12px;padding:1rem 1.25rem;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.95rem;font-weight:700;margin:0 0 0.3rem 0;\">Extract Seeds and Pulp</p>\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0;line-height:1.5;\">Cut tomato horizontally across the equator. Squeeze seeds, pulp, and juice into a clean glass or plastic container.</p>\n</div>\n</div>\n<!-- Step 2 -->\n<div style=\"display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.25rem;\">\n<div style=\"flex-shrink:0;width:44px;height:44px;background-color:#dde2d8 !important;border-radius:50%;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#1a3b2a !important;font-size:1.1rem;font-weight:800;\">2</span>\n</div>\n<div style=\"flex:1;background-color:rgba(255,255,255,0.06) !important;border-radius:12px;padding:1rem 1.25rem;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.95rem;font-weight:700;margin:0 0 0.3rem 0;\">Add Water</p>\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0;line-height:1.5;\">Add about half as much water as the volume of pulp and seeds. This dilutes the mixture and helps fermentation begin.</p>\n</div>\n</div>\n<!-- Step 3 -->\n<div style=\"display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.25rem;\">\n<div style=\"flex-shrink:0;width:44px;height:44px;background-color:#dde2d8 !important;border-radius:50%;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#1a3b2a !important;font-size:1.1rem;font-weight:800;\">3</span>\n</div>\n<div style=\"flex:1;background-color:rgba(255,255,255,0.06) !important;border-radius:12px;padding:1rem 1.25rem;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.95rem;font-weight:700;margin:0 0 0.3rem 0;\">Ferment 2 to 5 Days</p>\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0;line-height:1.5;\">Cover loosely and let sit at room temperature. Stir once or twice daily. Expect bubbling and possible surface mold (both normal). Coating breaks down by day 3 to 5.</p>\n</div>\n</div>\n<!-- Step 4 -->\n<div style=\"display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.25rem;\">\n<div style=\"flex-shrink:0;width:44px;height:44px;background-color:#dde2d8 !important;border-radius:50%;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#1a3b2a !important;font-size:1.1rem;font-weight:800;\">4</span>\n</div>\n<div style=\"flex:1;background-color:rgba(255,255,255,0.06) !important;border-radius:12px;padding:1rem 1.25rem;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.95rem;font-weight:700;margin:0 0 0.3rem 0;\">Separate Good Seeds</p>\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0;line-height:1.5;\">Add water, stir, and let settle. Viable seeds sink to the bottom. Pour off floating pulp, mold, and debris. Repeat until only clean seeds remain.</p>\n</div>\n</div>\n<!-- Step 5 -->\n<div style=\"display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.25rem;\">\n<div style=\"flex-shrink:0;width:44px;height:44px;background-color:#dde2d8 !important;border-radius:50%;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#1a3b2a !important;font-size:1.1rem;font-weight:800;\">5</span>\n</div>\n<div style=\"flex:1;background-color:rgba(255,255,255,0.06) !important;border-radius:12px;padding:1rem 1.25rem;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.95rem;font-weight:700;margin:0 0 0.3rem 0;\">Rinse Thoroughly</p>\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0;line-height:1.5;\">Pour seeds into a fine strainer and rinse under running water. Rub gently to remove any remaining coating.</p>\n</div>\n</div>\n<!-- Step 6 -->\n<div style=\"display:flex;align-items:flex-start;gap:1rem;margin-bottom:1rem;\">\n<div style=\"flex-shrink:0;width:44px;height:44px;background-color:#dde2d8 !important;border-radius:50%;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#1a3b2a !important;font-size:1.1rem;font-weight:800;\">6</span>\n</div>\n<div style=\"flex:1;background-color:rgba(255,255,255,0.06) !important;border-radius:12px;padding:1rem 1.25rem;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.95rem;font-weight:700;margin:0 0 0.3rem 0;\">Dry Completely (1 to 2 Weeks)</p>\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0;line-height:1.5;\">Spread in a single layer on a plate, coffee filter, or fine screen. Place in a warm, dry location with air circulation, out of direct sun. Stir daily.</p>\n</div>\n</div>\n<!-- Tip -->\n<div style=\"background-color:rgba(221,226,216,0.12) !important;border-left:3px solid #dde2d8;border-radius:0 10px 10px 0;padding:0.85rem 1.15rem;margin-top:1.25rem;\">\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0;line-height:1.5;\"><strong style=\"color:#f8f9f0 !important;\">Storage tip:</strong> Once completely dry, store in labeled envelopes in a cool, dry place. Properly saved seeds remain viable for 4 to 6 years.</p>\n</div>\n</div>\n<div style=\"padding:0 2rem 1.25rem 2rem;text-align:center;\">\n<p style=\"color:#8c9c8c !important;font-size:0.65rem;margin:0;\">Source: UMN Extension seed-saving guidelines | ambitiousharvest.com</p>\n</div>\n</div>\n</div>";

window.AH_GRAPHICS["open-pollinated-vs-hybrid-can-you-save-these-seeds"] = "<div style=\"width:100%;margin:2.5rem 0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;\">\n<div style=\"max-width:700px;margin:0 auto;background-color:#f8f9f0 !important;border-radius:18px;overflow:hidden;border:1px solid #dde2d8;\">\n<div style=\"padding:2rem 2rem 1rem 2rem;text-align:center;\">\n<span style=\"display:inline-block;background-color:#1a3b2a !important;color:#f8f9f0 !important;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.3rem 1rem;border-radius:20px;margin-bottom:0.75rem;\">Quick Reference</span>\n<h3 style=\"color:#1a3b2a !important;font-size:1.5rem;font-weight:700;margin:0 0 0.25rem 0;line-height:1.3;\">Can You Save Seeds from This Tomato?</h3>\n<p style=\"color:#8c9c8c !important;font-size:0.85rem;margin:0 0 1.5rem 0;\">Not all tomato seeds produce true-to-type offspring</p>\n</div>\n<div style=\"padding:0 2rem 1.5rem 2rem;display:flex;flex-wrap:wrap;gap:1rem;\">\n<!-- YES card -->\n<div style=\"flex:1;min-width:260px;background-color:#1a3b2a !important;border-radius:14px;padding:1.5rem;text-align:center;\">\n<div style=\"width:48px;height:48px;border-radius:50%;background-color:rgba(221,226,216,0.2) !important;display:flex;align-items:center;justify-content:center;margin:0 auto 0.75rem auto;\">\n<span style=\"color:#dde2d8 !important;font-size:1.4rem;font-weight:800;\">&#10003;</span>\n</div>\n<p style=\"color:#f8f9f0 !important;font-size:1.05rem;font-weight:700;margin:0 0 0.5rem 0;\">Open-Pollinated and Heirloom</p>\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0 0 1rem 0;line-height:1.5;\">Seeds grow true to the parent plant. These varieties have been selected over generations for consistent traits.</p>\n<div style=\"text-align:left;\">\n<p style=\"color:#dde2d8 !important;font-size:0.78rem;margin:0 0 0.4rem 0;line-height:1.4;\">&#8226; Brandywine, Cherokee Purple, San Marzano</p>\n<p style=\"color:#dde2d8 !important;font-size:0.78rem;margin:0 0 0.4rem 0;line-height:1.4;\">&#8226; Any variety labeled \"OP\" or \"heirloom\"</p>\n<p style=\"color:#dde2d8 !important;font-size:0.78rem;margin:0;line-height:1.4;\">&#8226; Can save and share seeds freely</p>\n</div>\n</div>\n<!-- NO card -->\n<div style=\"flex:1;min-width:260px;background-color:#f0e6e6 !important;border-radius:14px;padding:1.5rem;text-align:center;border:1px solid rgba(139,68,68,0.2);\">\n<div style=\"width:48px;height:48px;border-radius:50%;background-color:rgba(139,68,68,0.15) !important;display:flex;align-items:center;justify-content:center;margin:0 auto 0.75rem auto;\">\n<span style=\"color:#8b4444 !important;font-size:1.4rem;font-weight:800;\">&#10007;</span>\n</div>\n<p style=\"color:#1a3b2a !important;font-size:1.05rem;font-weight:700;margin:0 0 0.5rem 0;\">F1 Hybrids</p>\n<p style=\"color:#1c3c2c !important;font-size:0.82rem;margin:0 0 1rem 0;line-height:1.5;\">Seeds produce variable, unpredictable offspring. F1 hybrids are first-generation crosses between two specific parent lines.</p>\n<div style=\"text-align:left;\">\n<p style=\"color:#1c3c2c !important;font-size:0.78rem;margin:0 0 0.4rem 0;line-height:1.4;\">&#8226; Early Girl, Big Beef, Celebrity, Sungold</p>\n<p style=\"color:#1c3c2c !important;font-size:0.78rem;margin:0 0 0.4rem 0;line-height:1.4;\">&#8226; Look for \"F1\" or \"hybrid\" on the label</p>\n<p style=\"color:#1c3c2c !important;font-size:0.78rem;margin:0;line-height:1.4;\">&#8226; Buy fresh seed each year instead</p>\n</div>\n</div>\n</div>\n<!-- Tip bar -->\n<div style=\"padding:0 2rem 1.5rem 2rem;\">\n<div style=\"background-color:#dde2d8 !important;border-radius:10px;padding:0.85rem 1.15rem;\">\n<p style=\"color:#1a3b2a !important;font-size:0.82rem;margin:0;line-height:1.5;\"><strong>Not sure?</strong> Check the seed packet or catalog listing. If no designation is listed, the variety is most likely open-pollinated, especially if it has been around for decades.</p>\n</div>\n</div>\n<div style=\"padding:0 2rem 1.25rem 2rem;text-align:center;\">\n<p style=\"color:#8c9c8c !important;font-size:0.65rem;margin:0;\">ambitiousharvest.com</p>\n</div>\n</div>\n</div>";

window.AH_GRAPHICS["three-conditions-for-dry-farming-success"] = "<div style=\"width:100%;margin:2.5rem 0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;\">\n<div style=\"max-width:700px;margin:0 auto;background-color:#1a3b2a !important;border-radius:18px;overflow:hidden;\">\n<div style=\"padding:2rem 2rem 1rem 2rem;text-align:center;\">\n<span style=\"display:inline-block;background-color:#dde2d8 !important;color:#1a3b2a !important;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.3rem 1rem;border-radius:20px;margin-bottom:0.75rem;\">Essential Requirements</span>\n<h3 style=\"color:#f8f9f0 !important;font-size:1.5rem;font-weight:700;margin:0 0 0.25rem 0;line-height:1.3;\">Three Conditions for Dry Farming Tomatoes</h3>\n<p style=\"color:#8c9c8c !important;font-size:0.85rem;margin:0 0 1.5rem 0;\">All three must be present for dry farming to work</p>\n</div>\n<div style=\"padding:0 2rem 1.5rem 2rem;display:flex;flex-direction:column;gap:1rem;\">\n<!-- Condition 1 -->\n<div style=\"background-color:rgba(255,255,255,0.06) !important;border-radius:14px;padding:1.25rem 1.5rem;display:flex;align-items:flex-start;gap:1rem;\">\n<div style=\"flex-shrink:0;width:50px;height:50px;background-color:rgba(221,226,216,0.15) !important;border-radius:12px;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#dde2d8 !important;font-size:1.5rem;font-weight:800;\">1</span>\n</div>\n<div style=\"flex:1;\">\n<p style=\"color:#f8f9f0 !important;font-size:1rem;font-weight:700;margin:0 0 0.4rem 0;\">Deep, Water-Retentive Soil</p>\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0 0 0.5rem 0;line-height:1.5;\">Roots must reach 2 to 3+ feet into moist, clay-rich soil that stores winter rain through summer. Sandy, rocky, or compacted soils will not work.</p>\n<div style=\"display:flex;flex-wrap:wrap;gap:0.4rem;\">\n<span style=\"display:inline-block;background-color:rgba(221,226,216,0.1) !important;color:#8c9c8c !important;font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:8px;\">Clay-loam ideal</span>\n<span style=\"display:inline-block;background-color:rgba(221,226,216,0.1) !important;color:#8c9c8c !important;font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:8px;\">2-3 ft depth minimum</span>\n</div>\n</div>\n</div>\n<!-- Condition 2 -->\n<div style=\"background-color:rgba(255,255,255,0.06) !important;border-radius:14px;padding:1.25rem 1.5rem;display:flex;align-items:flex-start;gap:1rem;\">\n<div style=\"flex-shrink:0;width:50px;height:50px;background-color:rgba(221,226,216,0.15) !important;border-radius:12px;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#dde2d8 !important;font-size:1.5rem;font-weight:800;\">2</span>\n</div>\n<div style=\"flex:1;\">\n<p style=\"color:#f8f9f0 !important;font-size:1rem;font-weight:700;margin:0 0 0.4rem 0;\">Cool, Foggy Summers</p>\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0 0 0.5rem 0;line-height:1.5;\">Coastal fog reduces water loss from leaves. When temperatures regularly exceed 90 degrees F, plants lose water faster than deep soil can supply.</p>\n<div style=\"display:flex;flex-wrap:wrap;gap:0.4rem;\">\n<span style=\"display:inline-block;background-color:rgba(221,226,216,0.1) !important;color:#8c9c8c !important;font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:8px;\">Coastal terraces best</span>\n<span style=\"display:inline-block;background-color:rgba(221,226,216,0.1) !important;color:#8c9c8c !important;font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:8px;\">Fog influence critical</span>\n</div>\n</div>\n</div>\n<!-- Condition 3 -->\n<div style=\"background-color:rgba(255,255,255,0.06) !important;border-radius:14px;padding:1.25rem 1.5rem;display:flex;align-items:flex-start;gap:1rem;\">\n<div style=\"flex-shrink:0;width:50px;height:50px;background-color:rgba(221,226,216,0.15) !important;border-radius:12px;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#dde2d8 !important;font-size:1.5rem;font-weight:800;\">3</span>\n</div>\n<div style=\"flex:1;\">\n<p style=\"color:#f8f9f0 !important;font-size:1rem;font-weight:700;margin:0 0 0.4rem 0;\">Adequate Winter Rainfall</p>\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0 0 0.5rem 0;line-height:1.5;\">Soil moisture must be fully recharged during the wet season. Drought years may require supplemental irrigation or make dry farming unsuitable.</p>\n<div style=\"display:flex;flex-wrap:wrap;gap:0.4rem;\">\n<span style=\"display:inline-block;background-color:rgba(221,226,216,0.1) !important;color:#8c9c8c !important;font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:8px;\">Normal/wet winter needed</span>\n<span style=\"display:inline-block;background-color:rgba(221,226,216,0.1) !important;color:#8c9c8c !important;font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:8px;\">Track rainfall totals</span>\n</div>\n</div>\n</div>\n</div>\n<div style=\"padding:0 2rem 1.25rem 2rem;text-align:center;\">\n<p style=\"color:#8c9c8c !important;font-size:0.65rem;margin:0;\">Sources: UC Santa Cruz CASFS, Berkeley Food Institute | ambitiousharvest.com</p>\n</div>\n</div>\n</div>";

window.AH_GRAPHICS["dry-farming-suitability-by-santa-cruz-location"] = "<div style=\"width:100%;margin:2.5rem 0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;\">\n<div style=\"max-width:700px;margin:0 auto;background-color:#f8f9f0 !important;border-radius:18px;overflow:hidden;border:1px solid #dde2d8;\">\n<div style=\"padding:2rem 2rem 1rem 2rem;text-align:center;\">\n<span style=\"display:inline-block;background-color:#1a3b2a !important;color:#f8f9f0 !important;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.3rem 1rem;border-radius:20px;margin-bottom:0.75rem;\">Location Guide</span>\n<h3 style=\"color:#1a3b2a !important;font-size:1.4rem;font-weight:700;margin:0 0 0.25rem 0;line-height:1.3;\">Dry Farming Potential by Location</h3>\n<p style=\"color:#8c9c8c !important;font-size:0.85rem;margin:0 0 1.5rem 0;\">Santa Cruz County site assessment</p>\n</div>\n<div style=\"padding:0 2rem 1.5rem 2rem;display:flex;flex-direction:column;gap:0.75rem;\">\n<!-- Best -->\n<div style=\"background-color:#1a3b2a !important;border-radius:12px;padding:1.1rem 1.25rem;\">\n<div style=\"display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;\">\n<span style=\"display:inline-block;background-color:rgba(221,226,216,0.2) !important;color:#dde2d8 !important;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:0.2rem 0.6rem;border-radius:6px;\">Best</span>\n<p style=\"color:#f8f9f0 !important;font-size:0.95rem;font-weight:700;margin:0;\">Coastal Terraces and Fog Zones</p>\n</div>\n<p style=\"color:#dde2d8 !important;font-size:0.8rem;margin:0;line-height:1.5;\">Aptos, Capitola, Live Oak, parts of Santa Cruz. Deep clay-loam soils, consistent fog, moderate temperatures. Prime dry-farming territory.</p>\n</div>\n<!-- Possible -->\n<div style=\"background-color:#dde2d8 !important;border-radius:12px;padding:1.1rem 1.25rem;\">\n<div style=\"display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;\">\n<span style=\"display:inline-block;background-color:#1a3b2a !important;color:#f8f9f0 !important;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:0.2rem 0.6rem;border-radius:6px;\">Possible</span>\n<p style=\"color:#1a3b2a !important;font-size:0.95rem;font-weight:700;margin:0;\">Inland Valleys (with modifications)</p>\n</div>\n<p style=\"color:#1c3c2c !important;font-size:0.8rem;margin:0;line-height:1.5;\">May need some supplemental irrigation during heat spells. Test soil depth first. Mulching helps compensate for higher temperatures.</p>\n</div>\n<!-- Challenging -->\n<div style=\"background-color:rgba(139,68,68,0.08) !important;border-radius:12px;padding:1.1rem 1.25rem;border:1px solid rgba(139,68,68,0.15);\">\n<div style=\"display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;\">\n<span style=\"display:inline-block;background-color:#8b4444 !important;color:#f8f9f0 !important;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:0.2rem 0.6rem;border-radius:6px;\">Challenging</span>\n<p style=\"color:#1a3b2a !important;font-size:0.95rem;font-weight:700;margin:0;\">Hot Inland and Mountain Exposures</p>\n</div>\n<p style=\"color:#1c3c2c !important;font-size:0.8rem;margin:0;line-height:1.5;\">Regular temperatures above 90 degrees F overwhelm soil water reserves. Plants stress quickly without irrigation.</p>\n</div>\n<!-- Unlikely -->\n<div style=\"background-color:rgba(139,68,68,0.08) !important;border-radius:12px;padding:1.1rem 1.25rem;border:1px solid rgba(139,68,68,0.15);\">\n<div style=\"display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;\">\n<span style=\"display:inline-block;background-color:#8b4444 !important;color:#f8f9f0 !important;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:0.2rem 0.6rem;border-radius:6px;\">Unlikely</span>\n<p style=\"color:#1a3b2a !important;font-size:0.95rem;font-weight:700;margin:0;\">Shaded and Shallow-Soil Sites</p>\n</div>\n<p style=\"color:#1c3c2c !important;font-size:0.8rem;margin:0;line-height:1.5;\">Sandy soils, rocky ground, or shallow profiles cannot store enough moisture. Shade reduces fruit production regardless of water availability.</p>\n</div>\n</div>\n<div style=\"padding:0 2rem 1.25rem 2rem;text-align:center;\">\n<p style=\"color:#8c9c8c !important;font-size:0.65rem;margin:0;\">ambitiousharvest.com</p>\n</div>\n</div>\n</div>";

window.AH_GRAPHICS["best-varieties-for-dry-farming-in-santa-cruz"] = "<div style=\"width:100%;margin:2.5rem 0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;\">\n<div style=\"max-width:700px;margin:0 auto;background-color:#1a3b2a !important;border-radius:18px;overflow:hidden;\">\n<div style=\"padding:2rem 2rem 1rem 2rem;text-align:center;\">\n<span style=\"display:inline-block;background-color:#dde2d8 !important;color:#1a3b2a !important;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.3rem 1rem;border-radius:20px;margin-bottom:0.75rem;\">Variety Guide</span>\n<h3 style=\"color:#f8f9f0 !important;font-size:1.4rem;font-weight:700;margin:0 0 0.25rem 0;line-height:1.3;\">Best Varieties for Dry Farming</h3>\n<p style=\"color:#8c9c8c !important;font-size:0.85rem;margin:0 0 1.5rem 0;\">Central Coast grower-tested selections</p>\n</div>\n<div style=\"padding:0 2rem 1rem 2rem;\">\n<!-- Top Pick -->\n<div style=\"background-color:rgba(221,226,216,0.12) !important;border:1px solid rgba(221,226,216,0.25);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem;\">\n<div style=\"display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;\">\n<span style=\"display:inline-block;background-color:#dde2d8 !important;color:#1a3b2a !important;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:0.2rem 0.6rem;border-radius:6px;\">Top Choice</span>\n</div>\n<p style=\"color:#f8f9f0 !important;font-size:1.15rem;font-weight:700;margin:0 0 0.4rem 0;\">Early Girl</p>\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0;line-height:1.5;\">The variety most associated with Central Coast dry farming. Adapted to cool conditions, sets fruit in chilly nights, produces over a long season, and develops concentrated flavor under water stress.</p>\n</div>\n<!-- Also Recommended grid -->\n<p style=\"color:#8c9c8c !important;font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin:0 0 0.75rem 0;\">Also Recommended</p>\n<div style=\"display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.25rem;\">\n<div style=\"flex:1;min-width:130px;background-color:rgba(255,255,255,0.06) !important;border-radius:10px;padding:0.85rem 1rem;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.88rem;font-weight:700;margin:0 0 0.25rem 0;\">Stupice</p>\n<p style=\"color:#8c9c8c !important;font-size:0.75rem;margin:0;line-height:1.4;\">Czech heirloom. Exceptional cold tolerance. Great for fog zones.</p>\n</div>\n<div style=\"flex:1;min-width:130px;background-color:rgba(255,255,255,0.06) !important;border-radius:10px;padding:0.85rem 1rem;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.88rem;font-weight:700;margin:0 0 0.25rem 0;\">SF Fog</p>\n<p style=\"color:#8c9c8c !important;font-size:0.75rem;margin:0;line-height:1.4;\">Bred for coastal conditions. The name says it all.</p>\n</div>\n<div style=\"flex:1;min-width:130px;background-color:rgba(255,255,255,0.06) !important;border-radius:10px;padding:0.85rem 1rem;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.88rem;font-weight:700;margin:0 0 0.25rem 0;\">Glacier</p>\n<p style=\"color:#8c9c8c !important;font-size:0.75rem;margin:0;line-height:1.4;\">Ultra-early. Compact plants do well with less water.</p>\n</div>\n<div style=\"flex:1;min-width:130px;background-color:rgba(255,255,255,0.06) !important;border-radius:10px;padding:0.85rem 1rem;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.88rem;font-weight:700;margin:0 0 0.25rem 0;\">New Girl</p>\n<p style=\"color:#8c9c8c !important;font-size:0.75rem;margin:0;line-height:1.4;\">Similar to Early Girl with improved disease resistance.</p>\n</div>\n</div>\n<!-- Avoid -->\n<div style=\"background-color:rgba(139,68,68,0.08) !important;border:1px solid rgba(139,68,68,0.15);border-radius:10px;padding:0.85rem 1.15rem;\">\n<p style=\"color:#f0e6e6 !important;font-size:0.78rem;font-weight:700;margin:0 0 0.3rem 0;\">Avoid for Dry Farming</p>\n<p style=\"color:#dde2d8 !important;font-size:0.78rem;margin:0;line-height:1.5;\">Large beefsteaks (Brandywine, Mortgage Lifter, giant heirlooms) need too much water and a longer warm season. They may survive but are unlikely to produce satisfying harvests.</p>\n</div>\n</div>\n<div style=\"padding:0.75rem 2rem 1.25rem 2rem;text-align:center;\">\n<p style=\"color:#8c9c8c !important;font-size:0.65rem;margin:0;\">Sources: Ag Alert, Central Coast grower reports | ambitiousharvest.com</p>\n</div>\n</div>\n</div>";

window.AH_GRAPHICS["pineapple-tomato-quick-profile"] = "<div style=\"width:100%;margin:2.5rem 0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;\">\n<div style=\"max-width:700px;margin:0 auto;background-color:#f8f9f0 !important;border-radius:18px;overflow:hidden;border:1px solid #dde2d8;\">\n<div style=\"padding:2rem 2rem 1rem 2rem;text-align:center;\">\n<span style=\"display:inline-block;background-color:#1a3b2a !important;color:#f8f9f0 !important;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.3rem 1rem;border-radius:20px;margin-bottom:0.75rem;\">Variety Profile</span>\n<h3 style=\"color:#1a3b2a !important;font-size:1.5rem;font-weight:700;margin:0 0 0.25rem 0;line-height:1.3;\">Pineapple Tomato at a Glance</h3>\n<p style=\"color:#8c9c8c !important;font-size:0.85rem;margin:0 0 1.5rem 0;\">A beefsteak worth the extra effort in Santa Cruz</p>\n</div>\n<div style=\"padding:0 2rem 1.5rem 2rem;\">\n<!-- Stats grid -->\n<div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;margin-bottom:1.25rem;\">\n<div style=\"background-color:#1a3b2a !important;border-radius:12px;padding:1rem;text-align:center;\">\n<p style=\"color:#8c9c8c !important;font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin:0 0 0.25rem 0;\">Type</p>\n<p style=\"color:#f8f9f0 !important;font-size:1rem;font-weight:700;margin:0;\">Indeterminate</p>\n<p style=\"color:#dde2d8 !important;font-size:0.75rem;margin:0.2rem 0 0 0;\">Beefsteak, Heirloom</p>\n</div>\n<div style=\"background-color:#1a3b2a !important;border-radius:12px;padding:1rem;text-align:center;\">\n<p style=\"color:#8c9c8c !important;font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin:0 0 0.25rem 0;\">Days to Harvest</p>\n<p style=\"color:#f8f9f0 !important;font-size:1rem;font-weight:700;margin:0;\">80 to 100</p>\n<p style=\"color:#dde2d8 !important;font-size:0.75rem;margin:0.2rem 0 0 0;\">From transplant</p>\n</div>\n<div style=\"background-color:#1a3b2a !important;border-radius:12px;padding:1rem;text-align:center;\">\n<p style=\"color:#8c9c8c !important;font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin:0 0 0.25rem 0;\">Fruit Size</p>\n<p style=\"color:#f8f9f0 !important;font-size:1rem;font-weight:700;margin:0;\">1 to 2+ lbs</p>\n<p style=\"color:#dde2d8 !important;font-size:0.75rem;margin:0.2rem 0 0 0;\">Large beefsteak</p>\n</div>\n<div style=\"background-color:#1a3b2a !important;border-radius:12px;padding:1rem;text-align:center;\">\n<p style=\"color:#8c9c8c !important;font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin:0 0 0.25rem 0;\">Flavor</p>\n<p style=\"color:#f8f9f0 !important;font-size:1rem;font-weight:700;margin:0;\">Sweet, Fruity</p>\n<p style=\"color:#dde2d8 !important;font-size:0.75rem;margin:0.2rem 0 0 0;\">Low acid, tropical notes</p>\n</div>\n</div>\n<!-- Appearance -->\n<div style=\"background-color:#dde2d8 !important;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;\">\n<p style=\"color:#1a3b2a !important;font-size:0.85rem;font-weight:700;margin:0 0 0.3rem 0;\">Appearance</p>\n<p style=\"color:#1c3c2c !important;font-size:0.82rem;margin:0;line-height:1.5;\">Striking yellow and red bicolor, often streaked or marbled. Interior reveals dramatic swirled pattern when sliced. One of the most beautiful tomatoes you can grow.</p>\n</div>\n<!-- Challenge note -->\n<div style=\"background-color:rgba(139,68,68,0.06) !important;border-left:3px solid #8b4444;border-radius:0 10px 10px 0;padding:0.85rem 1.15rem;\">\n<p style=\"color:#1a3b2a !important;font-size:0.82rem;margin:0;line-height:1.5;\"><strong>Santa Cruz challenge:</strong> Large beefsteaks need heat to ripen fully. Coastal gardens should use season extension techniques and plant in the warmest available spot for best results.</p>\n</div>\n</div>\n<div style=\"padding:0 2rem 1.25rem 2rem;text-align:center;\">\n<p style=\"color:#8c9c8c !important;font-size:0.65rem;margin:0;\">ambitiousharvest.com</p>\n</div>\n</div>\n</div>";

window.AH_GRAPHICS["maximizing-success-with-pineapple-tomatoes-in-santa-cruz"] = "<div style=\"width:100%;margin:2.5rem 0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;\">\n<div style=\"max-width:700px;margin:0 auto;background-color:#1a3b2a !important;border-radius:18px;overflow:hidden;\">\n<div style=\"padding:2rem 2rem 1rem 2rem;text-align:center;\">\n<span style=\"display:inline-block;background-color:#dde2d8 !important;color:#1a3b2a !important;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.3rem 1rem;border-radius:20px;margin-bottom:0.75rem;\">Success Strategies</span>\n<h3 style=\"color:#f8f9f0 !important;font-size:1.4rem;font-weight:700;margin:0 0 0.25rem 0;line-height:1.3;\">Five Keys to Growing Pineapple Tomatoes on the Coast</h3>\n<p style=\"color:#8c9c8c !important;font-size:0.85rem;margin:0 0 1.5rem 0;\">Overcome the beefsteak heat challenge in Santa Cruz</p>\n</div>\n<div style=\"padding:0 2rem 1.5rem 2rem;display:flex;flex-direction:column;gap:0.85rem;\">\n<!-- Strategy 1 -->\n<div style=\"background-color:rgba(255,255,255,0.06) !important;border-radius:12px;padding:1.1rem 1.25rem;display:flex;align-items:flex-start;gap:0.85rem;\">\n<div style=\"flex-shrink:0;width:36px;height:36px;background-color:rgba(221,226,216,0.15) !important;border-radius:50%;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#dde2d8 !important;font-size:0.9rem;font-weight:800;\">1</span>\n</div>\n<div style=\"flex:1;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.92rem;font-weight:700;margin:0 0 0.25rem 0;\">Choose the Hottest Spot</p>\n<p style=\"color:#dde2d8 !important;font-size:0.8rem;margin:0;line-height:1.5;\">South or southwest-facing wall, sheltered from wind. Reflected heat from pavement or fencing adds warmth. Full sun all day is non-negotiable.</p>\n</div>\n</div>\n<!-- Strategy 2 -->\n<div style=\"background-color:rgba(255,255,255,0.06) !important;border-radius:12px;padding:1.1rem 1.25rem;display:flex;align-items:flex-start;gap:0.85rem;\">\n<div style=\"flex-shrink:0;width:36px;height:36px;background-color:rgba(221,226,216,0.15) !important;border-radius:50%;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#dde2d8 !important;font-size:0.9rem;font-weight:800;\">2</span>\n</div>\n<div style=\"flex:1;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.92rem;font-weight:700;margin:0 0 0.25rem 0;\">Warm the Soil</p>\n<p style=\"color:#dde2d8 !important;font-size:0.8rem;margin:0;line-height:1.5;\">Use black plastic mulch or IRT mulch film starting 2 to 3 weeks before planting. Warmer soil roots produce more vigorous plants that fruit earlier.</p>\n</div>\n</div>\n<!-- Strategy 3 -->\n<div style=\"background-color:rgba(255,255,255,0.06) !important;border-radius:12px;padding:1.1rem 1.25rem;display:flex;align-items:flex-start;gap:0.85rem;\">\n<div style=\"flex-shrink:0;width:36px;height:36px;background-color:rgba(221,226,216,0.15) !important;border-radius:50%;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#dde2d8 !important;font-size:0.9rem;font-weight:800;\">3</span>\n</div>\n<div style=\"flex:1;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.92rem;font-weight:700;margin:0 0 0.25rem 0;\">Start Early, Plant Large</p>\n<p style=\"color:#dde2d8 !important;font-size:0.8rem;margin:0;line-height:1.5;\">Start seeds 8 to 10 weeks before transplanting (rather than the typical 6 to 8). Set out larger, well-established transplants to gain a head start on the growing season.</p>\n</div>\n</div>\n<!-- Strategy 4 -->\n<div style=\"background-color:rgba(255,255,255,0.06) !important;border-radius:12px;padding:1.1rem 1.25rem;display:flex;align-items:flex-start;gap:0.85rem;\">\n<div style=\"flex-shrink:0;width:36px;height:36px;background-color:rgba(221,226,216,0.15) !important;border-radius:50%;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#dde2d8 !important;font-size:0.9rem;font-weight:800;\">4</span>\n</div>\n<div style=\"flex:1;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.92rem;font-weight:700;margin:0 0 0.25rem 0;\">Use Season Extension</p>\n<p style=\"color:#dde2d8 !important;font-size:0.8rem;margin:0;line-height:1.5;\">Wall O' Water, cloches, or cold frames in spring. Row cover in fall. Every extra week of warmth matters for these late-maturing beefsteaks.</p>\n</div>\n</div>\n<!-- Strategy 5 -->\n<div style=\"background-color:rgba(255,255,255,0.06) !important;border-radius:12px;padding:1.1rem 1.25rem;display:flex;align-items:flex-start;gap:0.85rem;\">\n<div style=\"flex-shrink:0;width:36px;height:36px;background-color:rgba(221,226,216,0.15) !important;border-radius:50%;display:flex;align-items:center;justify-content:center;\">\n<span style=\"color:#dde2d8 !important;font-size:0.9rem;font-weight:800;\">5</span>\n</div>\n<div style=\"flex:1;\">\n<p style=\"color:#f8f9f0 !important;font-size:0.92rem;font-weight:700;margin:0 0 0.25rem 0;\">Prune for Sun Exposure</p>\n<p style=\"color:#dde2d8 !important;font-size:0.8rem;margin:0;line-height:1.5;\">Remove suckers consistently to direct energy into fewer, larger fruits. Open up the canopy so sunlight reaches ripening fruit directly.</p>\n</div>\n</div>\n</div>\n<!-- Expectations note -->\n<div style=\"padding:0 2rem 1.5rem 2rem;\">\n<div style=\"background-color:rgba(221,226,216,0.12) !important;border-left:3px solid #dde2d8;border-radius:0 10px 10px 0;padding:0.85rem 1.15rem;\">\n<p style=\"color:#dde2d8 !important;font-size:0.82rem;margin:0;line-height:1.5;\"><strong style=\"color:#f8f9f0 !important;\">Realistic expectations:</strong> In coastal Santa Cruz, expect fewer and smaller fruits than inland gardens. The flavor, however, is exceptional and worth the trade-off.</p>\n</div>\n</div>\n<div style=\"padding:0 2rem 1.25rem 2rem;text-align:center;\">\n<p style=\"color:#8c9c8c !important;font-size:0.65rem;margin:0;\">ambitiousharvest.com</p>\n</div>\n</div>\n</div>";
