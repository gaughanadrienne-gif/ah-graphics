window.AH_GRAPHICS["seed-starting-troubleshooting"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Seed Starting Problems and Fixes</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Quick diagnosis for common seedling issues</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Problem</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Cause</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Fix</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Leggy, stretched seedlings</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Not enough light</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Move lights closer (2-4 in. above). Extend to 14-16 hrs. Add a fan.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Seedlings collapse at soil line</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Damping off (fungal)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Use sterile mix. Improve air circulation. Reduce watering.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">No germination after 14 days</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Soil too cold or old seed</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Add heat mat (75-85F). Test seed viability. Resow with fresh seed.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Purple-tinged leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Cold stress or phosphorus issue</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Increase temperature. Begin half-strength fertilizer. Usually self-resolves.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC ANR, \"Starting Vegetable Transplants at Home\"</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["seed-starting-supply-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Tomato Seed Starting Supply List</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Everything you need before you start</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 0.95rem; font-weight: 700; margin: 0 0 15px 0;\">Essential</h3>\n                <div style=\"margin-bottom: 8px; display: flex; gap: 8px;\"><span style=\"color: #1a3b2a !important;\">&#9744;</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Seed starting mix (sterile, soilless)</span></div>\n                <div style=\"margin-bottom: 8px; display: flex; gap: 8px;\"><span style=\"color: #1a3b2a !important;\">&#9744;</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Cell trays or small pots with drainage</span></div>\n                <div style=\"margin-bottom: 8px; display: flex; gap: 8px;\"><span style=\"color: #1a3b2a !important;\">&#9744;</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Grow light or very bright south window</span></div>\n                <div style=\"margin-bottom: 8px; display: flex; gap: 8px;\"><span style=\"color: #1a3b2a !important;\">&#9744;</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Humidity dome or plastic wrap</span></div>\n                <div style=\"display: flex; gap: 8px;\"><span style=\"color: #1a3b2a !important;\">&#9744;</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Tomato seeds (reliable source)</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 0.95rem; font-weight: 700; margin: 0 0 15px 0;\">Recommended</h3>\n                <div style=\"margin-bottom: 8px; display: flex; gap: 8px;\"><span style=\"color: #8c9c8c !important;\">&#9744;</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Seedling heat mat</span></div>\n                <div style=\"margin-bottom: 8px; display: flex; gap: 8px;\"><span style=\"color: #8c9c8c !important;\">&#9744;</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Small fan (prevents damping off)</span></div>\n                <div style=\"margin-bottom: 8px; display: flex; gap: 8px;\"><span style=\"color: #8c9c8c !important;\">&#9744;</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Labels and waterproof marker</span></div>\n                <div style=\"margin-bottom: 8px; display: flex; gap: 8px;\"><span style=\"color: #8c9c8c !important;\">&#9744;</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Liquid fertilizer (half-strength)</span></div>\n                <div style=\"display: flex; gap: 8px;\"><span style=\"color: #8c9c8c !important;\">&#9744;</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">3-4 inch pots for potting up</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["tomato-fertilizing-schedule"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Tomato Fertilizing Schedule</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">When and what to feed through the season</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">When</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">What to Apply</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Why</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">At Planting</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Compost + balanced organic fertilizer. Optional: bone meal, crushed eggshell.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Establishes nutrient base for root development.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">First Flowers</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Side-dress with compost or low-nitrogen fertilizer (3-5-4).</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Supports fruit set without excess foliage growth.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fruit Development</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fish emulsion or kelp every 3-4 weeks. Extra potassium if available.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Potassium supports fruit quality and health.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Late Season</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Stop fertilizing 4-6 weeks before season end.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Directs energy into ripening existing fruit.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Key rule:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Reduce nitrogen after flowering begins. Excess nitrogen = lush foliage, not fruit.</span>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC ANR Publication 8159</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["santa-cruz-soil-types-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Santa Cruz County Soil Types for Tomatoes</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Know your soil, amend accordingly</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Coastal Sandy Loams</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 10px;\"><span style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Drainage:</span> <span style=\"font-weight: 600; color: #1a3b2a !important;\">Fast</span></div>\n                    <div style=\"margin-bottom: 10px;\"><span style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Challenge:</span> <span style=\"color: #1c3c2c !important; font-size: 0.85rem;\">Nutrients leach quickly</span></div>\n                    <div><span style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Fix:</span> <span style=\"color: #1c3c2c !important; font-size: 0.85rem;\">Add compost generously. Feed more often.</span></div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Heavier Inland Clays</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 10px;\"><span style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Drainage:</span> <span style=\"font-weight: 600; color: #1a3b2a !important;\">Slow</span></div>\n                    <div style=\"margin-bottom: 10px;\"><span style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Challenge:</span> <span style=\"color: #1c3c2c !important; font-size: 0.85rem;\">Waterlogging, poor root penetration</span></div>\n                    <div><span style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Fix:</span> <span style=\"color: #1c3c2c !important; font-size: 0.85rem;\">Compost for structure. Consider raised beds.</span></div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Redwood Forest Soils</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 10px;\"><span style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Drainage:</span> <span style=\"font-weight: 600; color: #1a3b2a !important;\">Variable, acidic</span></div>\n                    <div style=\"margin-bottom: 10px;\"><span style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Challenge:</span> <span style=\"color: #1c3c2c !important; font-size: 0.85rem;\">Low pH, high organic acids</span></div>\n                    <div><span style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase;\">Fix:</span> <span style=\"color: #1c3c2c !important; font-size: 0.85rem;\">Test pH, add lime if below 6.0. Containers may outperform.</span></div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Always start with a soil test. UC Cooperative Extension offers affordable testing.</div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC Cooperative Extension Santa Cruz County</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["blossom-end-rot-myth-vs-reality"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Blossom End Rot: Myth vs. Reality</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What actually causes it and what actually fixes it</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px;\">\n            <div style=\"background-color: #fff !important; border-left: 4px solid #8b4444; padding: 20px;\">\n                <h3 style=\"color: #8b4444 !important; font-size: 1rem; font-weight: 700; margin: 0 0 15px 0;\">Common Myths</h3>\n                <div style=\"margin-bottom: 12px; display: flex; gap: 8px;\"><span style=\"color: #8b4444 !important; font-weight: 700; font-size: 1rem;\">X</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">\"Add calcium to the soil to fix it\"</span></div>\n                <div style=\"margin-bottom: 12px; display: flex; gap: 8px;\"><span style=\"color: #8b4444 !important; font-weight: 700; font-size: 1rem;\">X</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">\"Your soil is calcium deficient\"</span></div>\n                <div style=\"margin-bottom: 12px; display: flex; gap: 8px;\"><span style=\"color: #8b4444 !important; font-weight: 700; font-size: 1rem;\">X</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">\"Spray calcium on the leaves\"</span></div>\n                <div style=\"display: flex; gap: 8px;\"><span style=\"color: #8b4444 !important; font-weight: 700; font-size: 1rem;\">X</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">\"Put Tums or eggshells in the hole\"</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 20px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 1rem; font-weight: 700; margin: 0 0 15px 0;\">What Actually Works</h3>\n                <div style=\"margin-bottom: 12px; display: flex; gap: 8px;\"><span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem;\">+</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Water consistently.</strong> The #1 cause is inconsistent moisture.</span></div>\n                <div style=\"margin-bottom: 12px; display: flex; gap: 8px;\"><span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem;\">+</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Mulch heavily.</strong> 2-4 inches maintains even moisture.</span></div>\n                <div style=\"margin-bottom: 12px; display: flex; gap: 8px;\"><span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem;\">+</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Reduce nitrogen.</strong> Excess N outpaces calcium uptake.</span></div>\n                <div style=\"display: flex; gap: 8px;\"><span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem;\">+</span><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Use drip irrigation.</strong> Delivers steady moisture.</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC IPM Pest Notes: Blossom End Rot (Publication 7428)</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["organic-fertilizer-options"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Organic Fertilizer Options for Tomatoes</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What each amendment provides</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Amendment</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">N-P-K</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best For</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">When</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Fish emulsion</td>\n                    <td style=\"padding: 10px 12px; text-align: center; color: #1c3c2c !important;\">5-1-1</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Quick nitrogen, early growth</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Pre-flowering only</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Kelp meal</td>\n                    <td style=\"padding: 10px 12px; text-align: center; color: #1c3c2c !important;\">1-0-2</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Potassium, micronutrients</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Throughout season</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Bone meal</td>\n                    <td style=\"padding: 10px 12px; text-align: center; color: #1c3c2c !important;\">3-15-0</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Phosphorus for roots and flowers</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">At planting</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Compost</td>\n                    <td style=\"padding: 10px 12px; text-align: center; color: #1c3c2c !important;\">Varies</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Soil structure, slow-release nutrients</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">At planting + mid-season</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Greensand</td>\n                    <td style=\"padding: 10px 12px; text-align: center; color: #1c3c2c !important;\">0-0-3</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Slow-release potassium</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">At planting</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC ANR Organic Fertilizer and Soil Amendment Guide</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["tomato-support-methods-compared"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Tomato Support Methods Compared</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Choose the right support for your setup</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Method</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best For</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Cost</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Pros</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Cons</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Single Stake</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Pruned indeterminates</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">$2-5</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Simple, compact, good airflow</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Regular tying needed</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Store Cage</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Determinates only</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">$5-15</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Minimal effort</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Too flimsy for large plants</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">DIY Heavy Cage</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Unpruned indeterminates</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">$10-20</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Very strong, lasts years</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Heavy, hard to store</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Florida Weave</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Rows of plants</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">$1-2/plant</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Efficient for rows, good airflow</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Add string weekly</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Cattle Panel</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Along fence or wall</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">$20-40</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Very sturdy, reusable</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Permanent, limits rotation</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC ANR Publication 8159</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["support-selection-quick-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Which Support Do You Need?</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Match your variety type to the right support</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #dde2d8; padding: 20px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 6px;\">If you grow...</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 12px;\">Determinate Tomatoes</div>\n                <div style=\"border-top: 2px solid #dde2d8; padding-top: 12px; font-size: 0.85rem; color: #1c3c2c !important;\">\n                    <div style=\"margin-bottom: 6px;\"><strong style=\"color: #1a3b2a !important;\">Best:</strong> Standard cage or short stake</div>\n                    <div style=\"margin-bottom: 6px;\"><strong style=\"color: #1a3b2a !important;\">Height:</strong> 3-4 feet</div>\n                    <div><strong style=\"color: #1a3b2a !important;\">Effort:</strong> Set and forget</div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; padding: 20px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 6px;\">If you grow...</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 12px;\">Indeterminate Tomatoes</div>\n                <div style=\"border-top: 2px solid #1a3b2a; padding-top: 12px; font-size: 0.85rem; color: #1c3c2c !important;\">\n                    <div style=\"margin-bottom: 6px;\"><strong style=\"color: #1a3b2a !important;\">Best:</strong> 6-8 ft stake, heavy cage, or panel</div>\n                    <div style=\"margin-bottom: 6px;\"><strong style=\"color: #1a3b2a !important;\">Height:</strong> 6-8+ feet</div>\n                    <div><strong style=\"color: #1a3b2a !important;\">Effort:</strong> Tie weekly, prune suckers</div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #dde2d8; padding: 20px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 6px;\">If you grow...</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important; margin-bottom: 12px;\">Multiple Plants in a Row</div>\n                <div style=\"border-top: 2px solid #dde2d8; padding-top: 12px; font-size: 0.85rem; color: #1c3c2c !important;\">\n                    <div style=\"margin-bottom: 6px;\"><strong style=\"color: #1a3b2a !important;\">Best:</strong> Florida weave (stakes + string)</div>\n                    <div style=\"margin-bottom: 6px;\"><strong style=\"color: #1a3b2a !important;\">Materials:</strong> Stakes every 2-3 plants, twine</div>\n                    <div><strong style=\"color: #1a3b2a !important;\">Effort:</strong> Add string every 1-2 weeks</div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">Install support at planting time. Adding it later damages established roots.</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["common-trellising-mistakes"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Trellising Mistakes to Avoid</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Common errors and how to fix them</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"margin-bottom: 15px; background-color: #fff !important; border-left: 4px solid #8b4444; padding: 15px 18px;\">\n            <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">X  Using flimsy cone cages for indeterminates</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Fix: Use heavy-gauge wire cages or 6+ ft stakes. Store cages are only for determinates.</div>\n        </div>\n        <div style=\"margin-bottom: 15px; background-color: #fff !important; border-left: 4px solid #8b4444; padding: 15px 18px;\">\n            <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">X  Adding support after plants are established</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Fix: Install stakes or cages at planting time. Pushing stakes later damages roots.</div>\n        </div>\n        <div style=\"margin-bottom: 15px; background-color: #fff !important; border-left: 4px solid #8b4444; padding: 15px 18px;\">\n            <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">X  Tying stems too tightly</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Fix: Use soft ties. Leave room for expansion. Tie in a figure-8 around stem and stake.</div>\n        </div>\n        <div style=\"background-color: #fff !important; border-left: 4px solid #8b4444; padding: 15px 18px;\">\n            <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">X  Letting heavy fruit clusters hang unsupported</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Fix: Support heavy clusters with slings (fabric strips). Check supports weekly during peak fruiting.</div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["watering-by-microclimate"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Tomato Watering Guide by Microclimate</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Adjust frequency based on your location</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Microclimate</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Frequency</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Notes</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Cool Fog Belt</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">2-3 times/week</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Less evaporation from fog. Risk of overwatering. Check soil before watering.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Warmer Inland</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">3-4 times/week</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Higher temps increase water needs. May need daily in heat waves above 90F.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Under Redwoods</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">2 times/week</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Less direct sun = less evaporation. Watch for root competition from trees.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Containers (any zone)</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Daily (summer)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Containers dry out fast. Check morning and evening in heat. Twice daily may be needed.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Always use the finger test: insert finger 1-2 inches into soil. If dry, water deeply. If moist, wait.\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC ANR Publication 8159; UC Master Gardeners</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["watering-problems-diagnosis"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Diagnosing Watering Problems</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What your tomato plants are telling you</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border-left: 4px solid #8b4444; padding: 18px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 0.95rem; font-weight: 700; margin: 0 0 10px 0;\">Underwatering</h3>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6;\">\n                    <div style=\"margin-bottom: 6px;\">Wilting in afternoon heat</div>\n                    <div style=\"margin-bottom: 6px;\">Curling, dry-feeling leaves</div>\n                    <div style=\"margin-bottom: 6px;\">Slow growth, small fruit</div>\n                    <div style=\"margin-bottom: 10px;\">Recovers overnight if caught early</div>\n                    <div style=\"padding-top: 10px; border-top: 1px solid #dde2d8;\"><strong style=\"color: #1a3b2a !important;\">Fix:</strong> Water deeply. Add mulch. Set up drip irrigation.</div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #8c9c8c; padding: 18px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 0.95rem; font-weight: 700; margin: 0 0 10px 0;\">Overwatering</h3>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6;\">\n                    <div style=\"margin-bottom: 6px;\">Yellowing lower leaves</div>\n                    <div style=\"margin-bottom: 6px;\">Wilting despite wet soil</div>\n                    <div style=\"margin-bottom: 6px;\">Soggy, slow-draining soil</div>\n                    <div style=\"margin-bottom: 10px;\">Potential root rot</div>\n                    <div style=\"padding-top: 10px; border-top: 1px solid #dde2d8;\"><strong style=\"color: #1a3b2a !important;\">Fix:</strong> Let soil dry between waterings. Improve drainage. Check before watering.</div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 18px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 0.95rem; font-weight: 700; margin: 0 0 10px 0;\">Inconsistent Watering</h3>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6;\">\n                    <div style=\"margin-bottom: 6px;\">Cracked or splitting fruit</div>\n                    <div style=\"margin-bottom: 6px;\">Blossom end rot</div>\n                    <div style=\"margin-bottom: 6px;\">Catfacing on fruit</div>\n                    <div style=\"margin-bottom: 10px;\">Damage shows in fruit, not leaves</div>\n                    <div style=\"padding-top: 10px; border-top: 1px solid #dde2d8;\"><strong style=\"color: #1a3b2a !important;\">Fix:</strong> Drip irrigation on timer. Mulch. Consistent schedule.</div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC IPM, Tomato Pest Management Guidelines</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["irrigation-methods-compared"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Irrigation Methods for Tomatoes</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Comparing your options</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Method</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Pros</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Cons</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Rating</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Drip irrigation</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Precise, consistent, keeps foliage dry, automates</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Setup cost, can clog</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Best</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Soaker hose</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Low cost, easy setup, waters soil not leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Less precise, uneven distribution</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Good</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Hand watering</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">No equipment needed, inspect plants while watering</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Time-consuming, inconsistent, easy to skip</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">OK</span></td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Overhead sprinkler</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Easy to set up</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Wets foliage (promotes disease), wastes water</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #f0e6e6 !important; color: #8b4444 !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Avoid</span></td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["tomato-problem-diagnosis-flowchart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Tomato Problem Quick Diagnosis</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Start with what you see, find the likely cause and fix</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Symptom</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Likely Cause</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Solution</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Dark sunken spot on fruit bottom</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Blossom end rot (inconsistent watering)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Water deeply and consistently. Mulch. Do not over-fertilize with nitrogen.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fruit cracking or splitting</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Heavy watering after dry spell</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Maintain even moisture. Harvest ripe fruit before rain. Drip + mulch.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Flowers drop without fruit</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Night temps below 55F or day above 90F</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Choose cold-tolerant varieties. Shade in heat waves. Patience.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Brown spots with concentric rings</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Early blight (Alternaria)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Remove affected leaves. Mulch to prevent splash. Copper spray if severe.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">White powder on leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Powdery mildew (common in fog)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Improve airflow. Neem oil or potassium bicarbonate. Water mornings only.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Plant wilts on one side only</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fusarium or verticillium wilt</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">No cure. Remove plant. Choose resistant varieties (V, F). Rotate beds.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Large green caterpillar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Tomato hornworm</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Hand-pick. Leave if white cocoons present (parasitic wasps). Bt spray.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Bland-tasting fruit</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Overwatering, too much shade, wrong variety</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Reduce water as fruit ripens. Ensure 8+ hrs sun. Choose flavorful varieties.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC IPM Pest Management Guidelines for Tomato</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["fruit-problem-visual-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Tomato Fruit Problems at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Identify and fix common fruit issues</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 8px;\">Blossom End Rot</div>\n                <div style=\"font-size: 0.8rem; color: #8c9c8c !important; margin-bottom: 6px;\">Dark, sunken patch on bottom</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Cause:</strong> Inconsistent watering</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Fix:</strong> Even moisture + mulch</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 8px;\">Cracking / Splitting</div>\n                <div style=\"font-size: 0.8rem; color: #8c9c8c !important; margin-bottom: 6px;\">Radial or concentric cracks</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Cause:</strong> Sudden heavy water after drought</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Fix:</strong> Consistent water, harvest before rain</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 8px;\">Catfacing</div>\n                <div style=\"font-size: 0.8rem; color: #8c9c8c !important; margin-bottom: 6px;\">Misshapen, scarred, puckered</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Cause:</strong> Cool temps during flowering</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Fix:</strong> Cosmetic only. Still edible. Choose tolerant varieties.</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 8px;\">Sunscald</div>\n                <div style=\"font-size: 0.8rem; color: #8c9c8c !important; margin-bottom: 6px;\">White, papery patch on exposed side</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Cause:</strong> Direct sun on fruit after pruning</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Fix:</strong> Maintain leaf cover. Shade cloth in heat.</div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC IPM Pest Notes</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["prevention-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Tomato Problem Prevention Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Most problems are preventable with these practices</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px; max-width: 600px; margin: 0 auto;\">\n            <div style=\"margin-bottom: 12px; display: flex; gap: 10px;\"><span style=\"color: #1a3b2a !important; font-size: 1rem;\">&#9744;</span><span style=\"font-size: 0.9rem; color: #1c3c2c !important;\">Choose disease-resistant varieties (look for V, F, N codes)</span></div>\n            <div style=\"margin-bottom: 12px; display: flex; gap: 10px;\"><span style=\"color: #1a3b2a !important; font-size: 1rem;\">&#9744;</span><span style=\"font-size: 0.9rem; color: #1c3c2c !important;\">Water consistently with drip irrigation (not overhead)</span></div>\n            <div style=\"margin-bottom: 12px; display: flex; gap: 10px;\"><span style=\"color: #1a3b2a !important; font-size: 1rem;\">&#9744;</span><span style=\"font-size: 0.9rem; color: #1c3c2c !important;\">Mulch 2-4 inches (straw, wood chips) around plants</span></div>\n            <div style=\"margin-bottom: 12px; display: flex; gap: 10px;\"><span style=\"color: #1a3b2a !important; font-size: 1rem;\">&#9744;</span><span style=\"font-size: 0.9rem; color: #1c3c2c !important;\">Space plants for air circulation (24-36 inches apart)</span></div>\n            <div style=\"margin-bottom: 12px; display: flex; gap: 10px;\"><span style=\"color: #1a3b2a !important; font-size: 1rem;\">&#9744;</span><span style=\"font-size: 0.9rem; color: #1c3c2c !important;\">Remove lower leaves as plants grow (prevents soil splash)</span></div>\n            <div style=\"margin-bottom: 12px; display: flex; gap: 10px;\"><span style=\"color: #1a3b2a !important; font-size: 1rem;\">&#9744;</span><span style=\"font-size: 0.9rem; color: #1c3c2c !important;\">Rotate tomato beds yearly (do not plant in the same spot)</span></div>\n            <div style=\"margin-bottom: 12px; display: flex; gap: 10px;\"><span style=\"color: #1a3b2a !important; font-size: 1rem;\">&#9744;</span><span style=\"font-size: 0.9rem; color: #1c3c2c !important;\">Inspect plants weekly for early pest and disease signs</span></div>\n            <div style=\"display: flex; gap: 10px;\"><span style=\"color: #1a3b2a !important; font-size: 1rem;\">&#9744;</span><span style=\"font-size: 0.9rem; color: #1c3c2c !important;\">Avoid excess nitrogen fertilizer after flowering</span></div>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC IPM; UC Master Gardeners</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["disease-resistance-codes-decoder"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Decoding Tomato Disease Resistance Labels</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What those letters on seed packets mean</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 450px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Code</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Disease</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Relevance to Santa Cruz</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important; font-size: 1.1rem;\">V</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Verticillium wilt</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">High. Common in local soils. Very important resistance.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important; font-size: 1.1rem;\">F</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fusarium wilt</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">High. Present in many garden soils. Important resistance.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important; font-size: 1.1rem;\">N</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Root-knot nematode</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Moderate. Found in sandy coastal soils. Helpful in affected areas.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important; font-size: 1.1rem;\">T</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Tobacco mosaic virus</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Low. Less common locally. Nice to have but not essential.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important; font-size: 1.1rem;\">AB</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Early blight (Alternaria)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">High. Very common in coastal humidity. Valuable resistance.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">For Santa Cruz County, prioritize V and F resistance. Look for \"VF\" or \"VFN\" on seed packets and plant labels.</div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC IPM; American Phytopathological Society</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["season-extension-strategies-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Season Extension Strategies by Timing</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">When to use each technique</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Timing</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Strategy</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Impact</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Early Spring</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Black plastic mulch to warm soil. Row cover for young plants. Start seeds indoors 6-8 weeks early.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Gains 2-4 weeks at season start</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Mid-Season</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Consistent watering and feeding. Disease management. Support and pruning.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Keeps plants productive through summer</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Late Season</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Top plants (remove growing tips). Remove late flowers. Reduce watering carefully.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Redirects energy to ripening existing fruit</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">End of Season</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Harvest at breaker stage. Ripen indoors. Use green tomatoes for recipes.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Gains 2-4 weeks of usable harvest</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC Master Gardeners; UC ANR \"Season Extension for Home Gardens\"</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["coastal-vs-inland-season-strategy"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Season Extension Playbook</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Tailored strategies by microclimate</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Coastal Fog Belt Strategy</h3>\n                </div>\n                <div style=\"padding: 18px; font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.7;\">\n                    <div style=\"margin-bottom: 8px;\"><strong style=\"color: #1a3b2a !important;\">Varieties:</strong> Stupice, Early Girl, Sungold, Glacier</div>\n                    <div style=\"margin-bottom: 8px;\"><strong style=\"color: #1a3b2a !important;\">Spring:</strong> Black plastic + row cover. Plant against south walls.</div>\n                    <div style=\"margin-bottom: 8px;\"><strong style=\"color: #1a3b2a !important;\">Summer:</strong> Maximize every warm day. Cherry tomatoes as insurance.</div>\n                    <div><strong style=\"color: #1a3b2a !important;\">Fall:</strong> Harvest at breaker stage. Ripen indoors on counter.</div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #dde2d8 !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #1a3b2a !important;\">Warmer Inland Strategy</h3>\n                </div>\n                <div style=\"padding: 18px; font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.7;\">\n                    <div style=\"margin-bottom: 8px;\"><strong style=\"color: #1a3b2a !important;\">Varieties:</strong> Full range including heirlooms and paste types</div>\n                    <div style=\"margin-bottom: 8px;\"><strong style=\"color: #1a3b2a !important;\">Spring:</strong> Plant 2-3 weeks earlier. Warm soil with mulch.</div>\n                    <div style=\"margin-bottom: 8px;\"><strong style=\"color: #1a3b2a !important;\">Summer:</strong> Afternoon shade in heat waves. Consistent water.</div>\n                    <div><strong style=\"color: #1a3b2a !important;\">Fall:</strong> Top plants in September. Remove late blooms October.</div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["indoor-ripening-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Indoor Tomato Ripening Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">How to ripen green and breaker-stage tomatoes</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 10px;\">Speed Up Ripening</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6;\">Place in paper bag with a ripe banana or apple. Store at 65-75F. Check daily. Ripe in 3-7 days.</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 10px;\">Slow Down Ripening</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6;\">Store at 55-60F in single layer. Do not stack. Keep away from other fruit. Extends to 2-3 weeks.</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.95rem; margin-bottom: 10px;\">Will Not Ripen</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6;\">Small, hard, pure green tomatoes that never reached full size. Use for green tomato recipes (fried, chutney, relish).</div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; margin-top: 20px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n            Never refrigerate ripening tomatoes. Cold temperatures (below 55F) destroy flavor compounds permanently.\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
