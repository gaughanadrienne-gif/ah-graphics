 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Early Girl</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Slicer</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">50-62</td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Excellent</span></td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Excellent</span></td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Most reliable all-around. Sets fruit in cool temps.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Sungold</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Cherry</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">55-65</td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Excellent</span></td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Excellent</span></td>\n                    <td style=\"padding: 10px; color: #1c3 ant; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Good</span></td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Bred for cool coastal conditions.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Cherokee Purple</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Heirloom slicer</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">80-90</td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Marginal</span></td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Excellent</span></td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Complex, rich flavor. Needs warmth.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Brandywine</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Heirloom slicer</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">80-100</td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #f0e6e6 !important; color: #8b4444 !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Poor</spa window.AH_GRAPHICS["tomato-planting-calendar-by-microclimate"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Tomato Planting Calendar</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Timing by Santa Cruz County microclimate</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Microclimate</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Start Seeds Indoors</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Transplant Outdoors</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">First Harvest</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Season End</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Coastal (Westside, Live Oak)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Feb to Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Apr to May</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Jul to Aug</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Oct to Nov</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Inland Sunny (Scotts Valley, Soquel Hills)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Feb</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Mar to Apr</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Jun to Jul</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Oct to Nov</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Under Redwoods (Felton, Ben Lomond)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">May</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Aug to Sep</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sep to Oct</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Watsonville / Pajaro Valley</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Jan to Feb</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Mar to Apr</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Jun to Jul</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Nov</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Soil temperature must reach 60F before transplanting. Use a soil thermometer, not air temperature. Later planting in warm soil outperforms early planting in cold soil.\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC Master Gardeners of Santa Cruz County</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["tomato-care-quick-reference-card"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Tomato Care at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Quick-reference card for Santa Cruz County gardeners</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Sun</div>\n                <div style=\"font-size: 1rem; font-weight: 600; color: #1a3b2a !important;\">8+ hours direct</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Southern exposure ideal in fog belt</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Water</div>\n                <div style=\"font-size: 1rem; font-weight: 600; color: #1a3b2a !important;\">1-2 inches per week</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Deep and consistent. Drip preferred.</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Soil pH</div>\n                <div style=\"font-size: 1rem; font-weight: 600; color: #1a3b2a !important;\">6.2 to 6.8</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Test before planting. Amend as needed.</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Spacing</div>\n                <div style=\"font-size: 1rem; font-weight: 600; color: #1a3b2a !important;\">24-36 inches</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Indeterminate: 24-36 in. Determinate: 18-24 in.</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Fertilizer</div>\n                <div style=\"font-size: 1rem; font-weight: 600; color: #1a3b2a !important;\">Balanced at planting, low-N after flowering</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Excess nitrogen = foliage, not fruit.</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Mulch</div>\n                <div style=\"font-size: 1rem; font-weight: 600; color: #1a3b2a !important;\">2-4 inches organic</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Straw or wood chips. Keep off stems.</div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC ANR Publication 8159, \"Growing Tomatoes in the Home Garden\"</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["transplanting-technique-step-by-step"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Two Ways to Transplant Tomatoes</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Deep planting vs. trench planting for stronger roots</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Deep Planting Method</h3>\n                    <p style=\"font-size: 0.8rem; margin: 4px 0 0; color: #f8f9f0 !important; opacity: 0.9;\">Best for: upright transplants</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 14px; display: flex; gap: 10px;\">\n                        <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0;\">1</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Dig hole deep enough to bury stem up to lowest healthy leaves</span>\n                    </div>\n                    <div style=\"margin-bottom: 14px; display: flex; gap: 10px;\">\n                        <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0;\">2</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Strip leaves from the portion of stem to be buried</span>\n                    </div>\n                    <div style=\"margin-bottom: 14px; display: flex; gap: 10px;\">\n                        <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0;\">3</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Set plant in hole, backfill, and firm gently</span>\n                    </div>\n                    <div style=\"display: flex; gap: 10px;\">\n                        <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0;\">4</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Water deeply to settle soil around roots</span>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Trench Planting Method</h3>\n                    <p style=\"font-size: 0.8rem; margin: 4px 0 0; color: #f8f9f0 !important; opacity: 0.9;\">Best for: leggy transplants</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 14px; display: flex; gap: 10px;\">\n                        <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0;\">1</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Dig a shallow horizontal trench (4-6 inches deep)</span>\n                    </div>\n                    <div style=\"margin-bottom: 14px; display: flex; gap: 10px;\">\n                        <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0;\">2</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Strip leaves from the lower stem, leaving top 4-6 inches</span>\n                    </div>\n                    <div style=\"margin-bottom: 14px; display: flex; gap: 10px;\">\n                        <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0;\">3</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Lay plant sideways in trench with top foliage above ground</span>\n                    </div>\n                    <div style=\"display: flex; gap: 10px;\">\n                        <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0;\">4</span>\n                        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Cover with soil and water. Stem will curve upward within days.</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin-top: 20px;\">\n            <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Why this works:</strong>\n            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Tomatoes root along buried stems, producing plants with larger root systems that access more water and nutrients.</span>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["common-pest-and-disease-quick-id"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Tomato Pest and Disease Quick ID</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Most common problems in Santa Cruz County</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">What You See</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Likely Cause</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Action</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">White powdery coating on leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Powdery mildew (common in coastal fog)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Improve air circulation. Neem oil or potassium bicarbonate spray.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Brown spots with concentric rings</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Early blight (Alternaria)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Remove affected leaves. Mulch to prevent soil splash. Copper spray if severe.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Large green caterpillar on leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Tomato hornworm</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Hand-pick. Leave any with white cocoons (parasitic wasps). Bt if needed.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Wilting on one side of plant</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fusarium or verticillium wilt</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">No cure. Remove plant. Choose resistant varieties (V, F labels). Rotate beds.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Tiny insects on new growth, sticky residue</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Aphids</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Strong water spray. Insecticidal soap. Encourage ladybugs and lacewings.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Small white flies when foliage disturbed</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Whiteflies</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Yellow sticky traps. Insecticidal soap. Do not over-fertilize with nitrogen.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC IPM Pest Management Guidelines for Tomato</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["heirloom-varieties-by-microclimate-fit"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Heirloom Tomatoes for Santa Cruz Microclimates</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Choose varieties matched to your growing conditions</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Cool Coastal / Fog Belt</h3>\n                    <p style=\"font-size: 0.78rem; margin: 4px 0 0; color: #f8f9f0 !important; opacity: 0.85;\">Westside SC, Live Oak, UCSC area</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Stupice</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">52-60 days, small slicer, Czech heirloom</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Moskvich</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">60 days, medium slicer, Russian cold-tolerant</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Glacier</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">55 days, small slicer, determinate</div>\n                    </div>\n                    <div>\n                        <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Black Cherry</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">65 days, cherry, complex flavor</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Warmer Inland / Sunny Slopes</h3>\n                    <p style=\"font-size: 0.78rem; margin: 4px 0 0; color: #f8f9f0 !important; opacity: 0.85;\">Scotts Valley, Soquel Hills, SLV sun</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Cherokee Purple</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">80-90 days, large slicer, rich flavor</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Black Krim</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">75-85 days, large slicer, smoky flavor</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Green Zebra</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">75-80 days, small slicer, tangy and sweet</div>\n                    </div>\n                    <div>\n                        <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Mortgage Lifter</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">80-85 days, beefsteak, mild sweet flavor</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Watsonville / Pajaro Valley</h3>\n                    <p style=\"font-size: 0.78rem; margin: 4px 0 0; color: #f8f9f0 !important; opacity: 0.85;\">Longest season, most variety options</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Brandywine</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">80-100 days, beefsteak, legendary flavor</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Pineapple</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">85-95 days, bicolor beefsteak, fruity</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px;\">\n                        <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">San Marzano</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">78-85 days, paste, premier sauce tomato</div>\n                    </div>\n                    <div>\n                        <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.9rem;\">Matt's Wild Cherry</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">60 days, tiny cherry, intense flavor</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC Master Gardeners of Santa Cruz County; Love Apple Farms variety trials</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["heirloom-trade-offs-panel"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Heirloom Tomatoes: What You Gain and What You Give Up</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Realistic expectations for Santa Cruz growers</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 20px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 1rem; font-weight: 700; margin: 0 0 15px 0;\">What Heirlooms Offer</h3>\n                <div style=\"margin-bottom: 12px; display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem;\">+</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Complex, varied flavors no hybrid can match</span>\n                </div>\n                <div style=\"margin-bottom: 12px; display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem;\">+</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Stunning range of colors, shapes, and sizes</span>\n                </div>\n                <div style=\"margin-bottom: 12px; display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem;\">+</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Save seeds and grow true year after year</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem;\">+</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Adapt to your garden over generations of saving</span>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #8c9c8c; padding: 20px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 1rem; font-weight: 700; margin: 0 0 15px 0;\">What to Expect</h3>\n                <div style=\"margin-bottom: 12px; display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #8c9c8c !important; font-weight: 700; font-size: 1rem;\">~</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Lower disease resistance than hybrids</span>\n                </div>\n                <div style=\"margin-bottom: 12px; display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #8c9c8c !important; font-weight: 700; font-size: 1rem;\">~</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">20-30% lower yields (UC Davis research)</span>\n                </div>\n                <div style=\"margin-bottom: 12px; display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #8c9c8c !important; font-weight: 700; font-size: 1rem;\">~</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">More cracking, catfacing, and irregular shapes</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #8c9c8c !important; font-weight: 700; font-size: 1rem;\">~</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Many large-fruited types need more heat than coastal SC provides</span>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; margin-top: 20px; text-align: center;\">\n            <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Santa Cruz advantage:</strong>\n            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Our lower humidity means less late blight pressure than the Southeast, making heirlooms more viable here than in many US regions.</span>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC Davis Department of Plant Sciences; UC ANR Publication 8159</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["heirloom-days-to-maturity-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Heirloom Tomato DTM Guide for Santa Cruz</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Days to maturity by fruit size, with coastal reality check</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Fruit Size</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Typical DTM</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Coastal SC Reality</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Coastal Fit</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Example Varieties</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Cherry (under 1 oz) window.AH_GRAPHICS["santa-cruz-microclimate-growing-conditions"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Santa Cruz Tomato Microclimates at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">How growing conditions vary across the county</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Fog Belt</h3>\n                    <p style=\"font-size: 0.75rem; margin: 3px 0 0; color: #f8f9f0 !important; opacity: 0.85;\">Westside SC, Live Oak, Coastal</p>\n                </div>\n                <div style=\"padding: 15px;\">\n                    <div style=\"margin-bottom: 10px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px;\">Summer Highs</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">65-75F</div>\n                    </div>\n                    <div style=\"margin-bottom: 10px;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px;\">Effective Season</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !i ; width: 41.6%; height: 100%; background-color: #1a3b2a !important;\" title=\"Growing season: Apr-Sep\"></div>\n                <div style=\"position: absolute; left: 66.6%; width: 8.3%; height: 100%; background-color: #8c9c8c !important; border-radius: 0 4px 4px 0;\" title=\"Late harvest: Oct\"></div>\n            </div>\n        </div>\n        <div style=\"margin-bottom: 15px;\">\n            <div style=\"font-weight: 600; color: #1a3b2a !important; font-size: 0.85rem; margin-bottom: 6px;\">Under Redwoods</div>\n            <div style=\"background-color: #dde2d8 !important; height: 28px; position: relative; border-radius: 4px;\">\n                <div style=\"position: absolute; left: 16.6%; width: 8.3%; height: 100%; background-color: #8c9c8c !important; border-radius: 4px 0 0 4px;\" title=\"Seeds indoors: Mar\"></div>\n                <div style=\"position: absolute; left: 25%; width: 33.3%; height: 100%; background-color: #1a3b2a !important;\" title=\"Growing season: Apr-Aug\"></div>\n                <div style=\"position: absolute; left: 58.3%; width: 8.3%; height: 100%; background-color: #8c9c8c !important; border-radius: 0 4px 4px 0;\" title=\"Late harvest: Sep\"></div>\n            </div>\n        </div>\n        <div style=\"display: flex; gap: 20px; justify-content: center; margin-top: 15px; font-size: 0.8rem;\">\n            <span style=\"display: flex; align-items: center; gap: 5px; color: #1c3c2c !important;\"><span style=\"width: 14px; height: 14px; background-color: #8c9c8c !important; border-radius: 2px; display: inline-block;\"></span> Seed starting / late harvest</span>\n            <span style=\"display: flex; align-items: center; gap: 5px; color: #1c3c2c !important;\"><span style=\"width: 14px; height: 14px; background-color: #1a3b2a !important; border-radius: 2px; display: inline-block;\"></span> Active growing and harvest</span>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC Master Gardeners of Santa Cruz County</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["determinate-vs-indeterminate-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Determinate vs. Indeterminate Tomatoes</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Side-by-side comparison for Santa Cruz gardeners</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #dde2d8 !important; padding: 16px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1.1rem; margin: 0; color: #1a3b2a !important;\">Determinate</h3>\n                    <p style=\"font-size: 0.8rem; margin: 4px 0 0; color: #8c9c8c !important;\">\"Bush\" type, fixed height</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px;\">Plant Size</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">3-4 feet tall</div>\n                    </div>\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px;\">Harvest Pattern</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">All at once (2-3 weeks)</div>\n                    </div>\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px;\">Support Needed</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Simple cage or short stake</div>\n                    </div>\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px;\">Pruning</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Minimal (do not remove suckers)</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px;\">Best For</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Containers, canning, short seasons</div>\n                    </div>\n                    <div style=\"margin-top: 16px; padding: 12px; background-color: #f8f9f0 !important;\">\n                        <div style=\"font-size: 0.75rem; color: #8c9c8c !important; margin-bottom: 4px;\">SC VARIETIES:</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Roma VF, Celebrity, Glacier, Patio Princess</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 16px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Indeterminate</h3>\n                    <p style=\"font-size: 0.8rem; margin: 4px 0 0; color: #f8f9f0 !important; opacity: 0.9;\">\"Vining\" type, grows until frost</p>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px;\">Plant Size</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">6-10+ feet tall</div>\n                    </div>\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px;\">Harvest Pattern</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Continuous over months</div>\n                    </div>\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px;\">Support Needed</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">6 ft+ stakes or heavy-duty cages</div>\n                    </div>\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px;\">Pruning</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Regular sucker removal recommended</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px;\">Best For</div>\n                        <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important;\">Fresh eating, long harvest, flavor</div>\n                    </div>\n                    <div style=\"margin-top: 16px; padding: 12px; background-color: #f8f9f0 !important;\">\n                        <div style=\"font-size: 0.75rem; color: #8c9c8c !important; margin-bottom: 4px;\">SC VARIETIES:</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Early Girl, Sungold, Cherokee Purple, Brandywine</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; margin-top: 20px; text-align: center;\">\n            <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Santa Cruz recommendation:</strong>\n            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Our long, mild season favors indeterminates for most gardeners. Add one or two determinates if you want a canning batch.</span>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC ANR Vegetable Research and Information Center</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["when-to-choose-each-type"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Quick Decision Guide: Growth Type</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Match your situation to the right tomato type</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Your Situation</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Best Choice</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Why</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Growing in containers on a patio</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 12px; border-radius: 3px; font-size: 0.8rem; font-weight: 600;\">Determinate</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Compact, does not outgrow container</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Want tomatoes all summer long</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 4px 12px; border-radius: 3px; font-size: 0.8rem; font-weight: 600;\">Indeterminate</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Produces continuously Jul through Nov</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Making sauce or canning a big batch</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 12px; border-radius: 3px; font-size: 0.8rem; font-weight: 600;\">Determinate</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Concentrated harvest gives volume at once</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Best possible heirloom flavor</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 4px 12px; border-radius: 3px; font-size: 0.8rem; font-weight: 600;\">Indeterminate</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Nearly all top-flavor heirlooms are indeterminate</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Short season (under redwoods, Bonny Doon)</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 12px; border-radius: 3px; font-size: 0.8rem; font-weight: 600;\">Determinate</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Harvest done before early fall cooling</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Minimal maintenance preferred</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 12px; border-radius: 3px; font-size: 0.8rem; font-weight: 600;\">Determinate</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">No sucker pruning, simpler support</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["sucker-pruning-quick-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Sucker Pruning: The Rules Are Different</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Determinate vs. indeterminate pruning approach</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px;\">\n            <div style=\"background-color: #fff !important; border-left: 4px solid #8c9c8c; padding: 20px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 1rem; font-weight: 700; margin: 0 0 12px 0;\">Determinate: Do NOT Prune Suckers</h3>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6; margin-bottom: 12px;\">Determinate plants set a fixed number of fruit. Removing suckers reduces your total harvest. Let these plants grow naturally.</div>\n                <div style=\"background-color: #f8f9f0 !important; padding: 12px; font-size: 0.85rem;\">\n                    <div style=\"color: #1a3b2a !important; font-weight: 600; margin-bottom: 4px;\">Only remove:</div>\n                    <div style=\"color: #1c3c2c !important;\">Leaves touching the ground (disease prevention)</div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 20px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 1rem; font-weight: 700; margin: 0 0 12px 0;\">Indeterminate: Prune Selectively</h3>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6; margin-bottom: 12px;\">Remove suckers below the first flower cluster. Above that, leave them (more but smaller fruit) or remove them (fewer but larger fruit).</div>\n                <div style=\"background-color: #f8f9f0 !important; padding: 12px; font-size: 0.85rem;\">\n                    <div style=\"color: #1a3b2a !important; font-weight: 600; margin-bottom: 4px;\">How to prune:</div>\n                    <div style=\"color: #1c3c2c !important;\">Pinch small suckers (under 2 in.) by hand. Cut larger ones with clean pruners. Prune in the morning.</div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC ANR Publication 8159</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["tomatoes-container-size-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Container Sizes for Tomatoes</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Minimum container size by plant type</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Plant Type</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Minimum Size</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Ideal Size</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Example Varieties</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Small determinate / patio</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">5 gallon</td>\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 600; color: #1a3b2a !important;\">7-10 gallon</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Patio Princess, Glacier, Tiny Tim</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Standard determinate</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">10 gallon</td>\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 600; color: #1a3b2a !important;\">15 gallon</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Roma VF, Celebrity, Bush Goliath</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Cherry (indeterminate)</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">10 gallon</td>\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 600; color: #1a3b2a !important;\">15-20 gallon</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Sungold, Sweet 100, Black Cherry</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Large indeterminate</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">15 gallon</td>\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 600; color: #1a3b2a !important;\">20-25 gallon</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Early Girl, Cherokee Purple (warm spots)</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Bigger containers = less frequent watering and better root development. When in doubt, size up.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["container-tomato-care-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Container Tomato Care Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Essential tasks for success in pots</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 0.95rem; font-weight: 700; margin: 0 0 15px 0;\">Daily</h3>\n                <div style=\"margin-bottom: 10px; display: flex; gap: 8px;\">\n                    <span style=\"color: #1a3b2a !important; font-size: 1rem; line-height: 1;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Check soil moisture (finger test, top inch)</span>\n                </div>\n                <div style=\"margin-bottom: 10px; display: flex; gap: 8px;\">\n                    <span style=\"color: #1a3b2a !important; font-size: 1rem; line-height: 1;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Water thoroughly if dry (until it drains)</span>\n                </div>\n                <div style=\"display: flex; gap: 8px;\">\n                    <span style=\"color: #1a3b2a !important; font-size: 1rem; line-height: 1;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Check for pests on new growth</span>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 0.95rem; font-weight: 700; margin: 0 0 15px 0;\">Weekly</h3>\n                <div style=\"margin-bottom: 10px; display: flex; gap: 8px;\">\n                    <span style=\"color: #1a3b2a !important; font-size: 1rem; line-height: 1;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Remove yellowed or diseased lower leaves</span>\n                </div>\n                <div style=\"margin-bottom: 10px; display: flex; gap: 8px;\">\n                    <span style=\"color: #1a3b2a !important; font-size: 1rem; line-height: 1;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Tie stems to support as they grow</span>\n                </div>\n                <div style=\"display: flex; gap: 8px;\">\n                    <span style=\"color: #1a3b2a !important; font-size: 1rem; line-height: 1;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Harvest ripe fruit promptly</span>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <h3 style=\"color: #1a3b2a !important; font-size: 0.95rem; font-weight: 700; margin: 0 0 15px 0;\">Every 2-3 Weeks</h3>\n                <div style=\"margin-bottom: 10px; display: flex; gap: 8px;\">\n                    <span style=\"color: #1a3b2a !important; font-size: 1rem; line-height: 1;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Feed with diluted liquid fertilizer</span>\n                </div>\n                <div style=\"margin-bottom: 10px; display: flex; gap: 8px;\">\n                    <span style=\"color: #1a3b2a !important; font-size: 1rem; line-height: 1;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Check drainage holes (clear if clogged)</span>\n                </div>\n                <div style=\"display: flex; gap: 8px;\">\n                    <span style=\"color: #1a3b2a !important; font-size: 1rem; line-height: 1;\">&#9744;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Refresh mulch layer on soil surface</span>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC Master Gardeners, \"Container Gardening\" guidelines</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["container-vs-in-ground-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Container vs. In-Ground Tomatoes</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Key differences for Santa Cruz gardeners</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem; width: 25%;\">Factor</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Container</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">In-Ground</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Soil warmth</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Warms faster in spring (advantage)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Slower to warm, more stable temps</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Watering</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Daily in summer (more work)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">2-3 times per week with drip</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fertilizing</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Every 2-3 weeks (nutrients leach)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">2-3 times per season</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Mobility</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Can move to chase sun (fog belt advantage)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fixed location</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Yield</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Lower (root space limited)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Higher (unrestricted roots)</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Soil diseases</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fresh mix avoids soilborne diseases</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Risk of wilt, nematodes in old beds</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["tomatoes-seed-starting-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Tomato Seed Starting Timeline</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Week-by-week from sowing to transplant</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"position: relative; padding-left: 40px;\">\n            <div style=\"position: absolute; left: 18px; top: 0; bottom: 0; width: 3px; background-color: #1a3b2a !important;\"></div>\n            <div style=\"margin-bottom: 22px; position: relative;\">\n                <div style=\"position: absolute; left: -31px; width: 24px; height: 24px; background-color: #1a3b2a !important; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #f8f9f0 !important; font-size: 0.7rem; font-weight: 700;\">1</div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 15px;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.9rem;\">Week 1: Sow Seeds</div>\n                    <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Fill cells with pre-moistened seed starting mix. Sow 2 seeds per cell, 1/4 inch deep. Cover with humidity dome. Keep soil 75-85F.</div>\n                </div>\n            </div>\n            <div style=\"margin-bottom: 22px; position: relative;\">\n                <div style=\"position: absolute; left: -31px; width: 24px; height: 24px; background-color: #1a3b2a !important; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #f8f9f0 !important; font-size: 0.7rem; font-weight: 700;\">2</div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 15px;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.9rem;\">Week 2: Germination</div>\n                    <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Seeds sprout in 5-10 days. Remove dome. Place under strong light (14-16 hrs/day). Thin to one seedling per cell.</div>\n                </div>\n            </div>\n            <div style=\"margin-bottom: 22px; position: relative;\">\n                <div style=\"position: absolute; left: -31px; width: 24px; height: 24px; background-color: #1a3b2a !important; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #f8f9f0 !important; font-size: 0.7rem; font-weight: 700;\">3</div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 15px;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.9rem;\">Weeks 3-4: True Leaves and Growth</div>\n                    <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">True leaves appear. Add gentle air circulation. Water when surface is dry. Begin half-strength liquid fertilizer weekly.</div>\n                </div>\n            </div>\n            <div style=\"margin-bottom: 22px; position: relative;\">\n                <div style=\"position: absolute; left: -31px; width: 24px; height: 24px; background-color: #1a3b2a !important; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #f8f9f0 !important; font-size: 0.7rem; font-weight: 700;\">4</div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 15px;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.9rem;\">Weeks 4-5: Pot Up</div>\n                    <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Move to 3-4 inch pots when roots fill cells. Bury stem deeper. Continue strong light and weekly feeding.</div>\n                </div>\n            </div>\n            <div style=\"margin-bottom: 22px; position: relative;\">\n                <div style=\"position: absolute; left: -31px; width: 24px; height: 24px; background-color: #1a3b2a !important; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #f8f9f0 !important; font-size: 0.7rem; font-weight: 700;\">5</div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 15px;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.9rem;\">Weeks 6-7: Harden Off</div>\n                    <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Move outdoors gradually over 7-10 days. Start with 2-3 hours of filtered light. Increase sun and wind exposure daily.</div>\n                </div>\n            </div>\n            <div style=\"position: relative;\">\n                <div style=\"position: absolute; left: -31px; width: 24px; height: 24px; background-color: #1a3b2a !important; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #f8f9f0 !important; font-size: 0.7rem; font-weight: 700;\">6</div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 15px;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; font-size: 0.9rem;\">Week 8: Transplant</div>\n                    <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Plant into garden when soil is 60F+. Bury deeply or trench plant. Water well. Install support at planting time.</div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 8px 15px; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC ANR, \"Starting Vegetable Transplants at Home\"</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
