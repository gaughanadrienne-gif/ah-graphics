window.AH_GRAPHICS["rainbow-garden-seasonal-planting-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Rainbow Garden Planting Timeline</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Santa Cruz and central coastal California (USDA 9b/10a)</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Fall (Oct to Nov)</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 10px;\">Sow cool-season seeds</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">California poppies (orange)</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Larkspur (indigo)</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Calendula (yellow)</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Lavender starts (violet)</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Late Winter (Feb to Mar)</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 10px;\">Start seeds indoors</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Zinnias, marigolds indoors</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Basil indoors</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Cornflower, borage direct</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Strawberry starts</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Spring (Apr to May)</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 10px;\">Transplant warm crops</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Tomatoes, beans outdoors</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Petunias, salvia starts</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Sunflowers direct-sow</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Nasturtiums direct-sow</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Summer (Jun to Aug)</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 10px;\">Peak bloom and harvest</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Full rainbow display</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Deadhead spent flowers</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Succession-plant zinnias</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1c3c2c !important;\">Succession-plant sunflowers</li>\n                </ul>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com | Santa Cruz & Bay Area Gardening</div>\n</div>";

window.AH_GRAPHICS["seussian-plants-at-a-glance"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Real Plants That Look Like Dr. Seuss Illustrations</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">All grow in California coastal and inland gardens</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Truffula Tree Stand-Ins</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f2ec;\">\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Mexican Feather Grass</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">2 ft tall | Blonde, wispy plumes | Drought-tolerant</div>\n                        <div style=\"font-size: 0.75rem; color: #b8694a !important; margin-top: 4px;\">Note: can self-seed; grow in pots near wildlands</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f2ec;\">\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Purple Fountain Grass</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">3-5 ft | Burgundy foliage, pink plumes | Sterile</div>\n                    </div>\n                    <div>\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Pink Muhly Grass</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">3 ft | Cotton-candy pink clouds | Fall bloom</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Spiraling and Geometric</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f2ec;\">\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Spiral Aloe</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">Fibonacci spiral pattern | Container-grown</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f2ec;\">\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Aeonium 'Schwarzkopf'</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">Nearly black rosettes | Coastal California</div>\n                    </div>\n                    <div>\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Echeveria 'Perle von Nurnberg'</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">Purple-pink rosettes | Propagate from leaves</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Fuzzy, Bumpy, and Tall</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f2ec;\">\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Lamb's Ear</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">Silver velvet leaves | Drought-tolerant</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f2ec;\">\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Mammoth Sunflower</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">10-14 ft tall | Great for height contests</div>\n                    </div>\n                    <div>\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Dragon Fruit Cactus</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">Reptilian vines | Neon-pink fruit | Trellis</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <div style=\"padding: 12px 0 0 0; font-size: 0.75rem; color: #8c9c8c !important;\">Sources: UC ANR, Cal-IPC invasive plant ratings, California Native Plant Society</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["lorax-garden-native-plants-and-wildlife"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Lorax Conservation Garden: Plants and Wildlife</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">California native plants and the wildlife they support</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Native Plant</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Wildlife Supported</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Water Needs</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Sun</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Narrow-leaf Milkweed</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Monarch butterflies (host plant)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Low</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">California Buckwheat</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">50+ native bee species</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Very low</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Toyon</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Birds (winter berries), pollinators</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Very low</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full to part</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Coast Live Oak</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">500+ species (insects, birds, mammals)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">None once est.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">California Poppy</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Native bees, syrphid flies</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">None once est.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Coyote Brush</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late-fall pollinators</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">None once est.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full</td>\n                </tr>\n            </tbody>\n        </table>\n        <div style=\"padding: 12px 15px; font-size: 0.75rem; color: #8c9c8c !important; border-top: 1px solid #dde2d8;\">Sources: UC Riverside native bee research, California Native Plant Society, Xerces Society</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["pizza-garden-planting-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pizza Garden: What to Plant in Each Wedge</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Grow every pizza topping (except cheese) in your own garden</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Wedge</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Best Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Days to Harvest</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Plant When</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Kid Appeal</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Sauce Tomatoes</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">'San Marzano', 'Roma'</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">75-80</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Apr to May</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Making sauce from scratch</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Basil</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">'Genovese', 'Lemon'</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">60-70</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Apr to May</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Intense fresh aroma</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Bell Peppers</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">'California Wonder'</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">75</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Apr to May</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Turns red when ripe</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Oregano/Thyme</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Greek Oregano, English Thyme</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Perennial</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Mar to Apr</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Smells like pizza</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Onions/Garlic</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">'Walla Walla', 'CA Early'</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">90-210</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Oct to Feb</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Teaches patience (garlic: 7-8 mo)</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Greens</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Arugula, Spinach</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">30-45</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sep to Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fastest harvest in the garden</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Hot Peppers</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">'Jalapeno', 'Thai Chili'</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">60-75</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Apr to May</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Colorful, ornamental</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Cherry Tomatoes</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">'Sungold', 'Sweet 100'</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">57-65</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Apr to May</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Kids eat these like candy</td>\n                </tr>\n            </tbody>\n        </table>\n        <div style=\"padding: 12px 15px; font-size: 0.75rem; color: #8c9c8c !important; border-top: 1px solid #dde2d8;\">Source: UC Cooperative Extension, UC Davis variety trials. Timing for Santa Cruz County / coastal California.</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["pizza-garden-activity-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pizza Garden Activities: Seed to Slice</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">From planting day through pizza night</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;\">Before Planting</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 8px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Draw your dream pizza on a paper plate</li>\n                    <li style=\"padding: 8px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Circle toppings you can grow</li>\n                    <li style=\"padding: 8px 0; font-size: 0.85rem; color: #1a3b2a !important;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Lay out the circle or bed with string</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;\">Growing Season</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 8px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Taste-test different tomato varieties</li>\n                    <li style=\"padding: 8px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Measure and chart plant growth</li>\n                    <li style=\"padding: 8px 0; font-size: 0.85rem; color: #1a3b2a !important;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Calculate: how many tomatoes per jar of sauce?</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;\">Harvest and Pizza Night</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 8px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Make garden-fresh tomato sauce</li>\n                    <li style=\"padding: 8px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Pick toppings from the garden</li>\n                    <li style=\"padding: 8px 0; font-size: 0.85rem; color: #1a3b2a !important;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Bake pizza at 475 degrees, 10-12 min</li>\n                </ul>\n            </div>\n        </div>\n        <div style=\"margin-top: 16px; padding: 14px 18px; background-color: #dde2d8 !important; font-size: 0.85rem; color: #1a3b2a !important;\">\n            <strong style=\"color: #1a3b2a !important;\">Simple Sauce Recipe:</strong> 2 lbs chopped tomatoes + 3 garlic cloves (minced) + handful of basil + 1 tbsp oregano + salt. Simmer 30 minutes.\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["fairy-garden-plant-picks-by-role"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Fairy Garden Plant Picks by Role</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Miniature plants that stay in scale for California fairy gardens</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">The \"Lawn\" (Groundcovers)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f2ec;\">\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Baby Tears</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">Shade to part sun | Consistent moisture</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f2ec;\">\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Elfin Thyme</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">Full sun | 1-2 in. tall | Fragrant</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f2ec;\">\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Corsican Mint</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">Shade | 1 in. tall | Peppermint scent</div>\n                    </div>\n                    <div>\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Irish/Scotch Moss</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">Part sun | Green or golden varieties</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">The \"Trees\" (Mini Shrubs)</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f2ec;\">\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Dwarf Alberta Spruce</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">Conical evergreen | Afternoon shade</div>\n                    </div>\n                    <div style=\"margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f2ec;\">\n                        <div style=\"font-weight: 600; font-size: 0.9rem; color: #1a3b2a !important;\">Creeping Rosemary</div>\n                        <div style=\"font-size: 0.8rem; color: #8c9c8c !important;\">Full sun | Drought-tolerant | Fragrant</div>\n                    </div>\n                    <div>\n
