window.AH_GRAPHICS["fairy-garden-building-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Build Your Fairy Garden: Step-by-Step</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Supplies and steps for all ages</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <div style=\"font-size: 0.7rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Supplies Needed</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Wide, shallow container with drainage</li>\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Small gravel (drainage layer + paths)</li>\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Quality potting soil</li>\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>5-8 miniature plants</li>\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important;\"><span style=\"display: inline-block; width: 18px; height: 18px; border: 2px solid #dde2d8; border-radius: 2px; margin-right: 8px; vertical-align: middle;\"></span>Decorations: pebbles, shells, sticks, figurines</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <div style=\"font-size: 0.7rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">8 Steps to Build</div>\n                <ol style=\"padding-left: 20px; margin: 0;\">\n                    <li style=\"padding: 5px 0; font-size: 0.85rem; color: #1a3b2a !important;\">Plan layout (arrange pots before planting)</li>\n                    <li style=\"padding: 5px 0; font-size: 0.85rem; color: #1a3b2a !important;\">Add 1 in. gravel drainage layer</li>\n                    <li style=\"padding: 5px 0; font-size: 0.85rem; color: #1a3b2a !important;\">Fill with potting soil to 1 in. below rim</li>\n                    <li style=\"padding: 5px 0; font-size: 0.85rem; color: #1a3b2a !important;\">Create hills and low spots for terrain</li>\n                    <li style=\"padding: 5px 0; font-size: 0.85rem; color: #1a3b2a !important;\">Plant miniature plants</li>\n                    <li style=\"padding: 5px 0; font-size: 0.85rem; color: #1a3b2a !important;\">Add gravel or pebble paths</li>\n                    <li style=\"padding: 5px 0; font-size: 0.85rem; color: #1a3b2a !important;\">Add decorations and furniture</li>\n                    <li style=\"padding: 5px 0; font-size: 0.85rem; color: #1a3b2a !important;\">Water gently with a spray bottle</li>\n                </ol>\n            </div>\n        </div>\n        <div style=\"margin-top: 16px; padding: 14px 18px; background-color: #dde2d8 !important; font-size: 0.85rem; color: #1a3b2a !important;\">\n            <strong style=\"color: #1a3b2a !important;\">Budget guide:</strong> Basic fairy garden starts at under $25. Terra cotta saucer ($5-10), potting soil ($5), 3-4 small plants ($2-4 each), natural decorations (free from the yard).\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["sensory-garden-plants-by-sense"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Sensory Garden: Top Plant Picks by Sense</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Engage all five senses with California-adapted plants</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Sense</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Star Plant</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Why Kids Love It</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Sun / Water</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Touch</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Lamb's Ear</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Softest leaves in the garden; velvet texture</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full sun / Low</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Smell</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Chocolate Mint</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Smells like chocolate and mint combined</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Part shade / Moderate</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Taste</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">'Sungold' Cherry Tomatoes</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sweetest snacking tomato; kids eat them like candy</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full sun / Moderate</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Sight</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Rainbow Chard ('Bright Lights')</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Neon stems in 5+ colors; edible too</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full sun / Moderate</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Sound</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Ornamental Grasses</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Rustling in the breeze; calming natural sound</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full sun / Low</td>\n                </tr>\n            </tbody>\n        </table>\n        <div style=\"padding: 12px 15px; font-size: 0.75rem; color: #8c9c8c !important; border-top: 1px solid #dde2d8;\">Sources: American Horticultural Therapy Association, UC Davis neuroscience, UC Cooperative Extension</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["sensory-garden-full-plant-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Sensory Garden Quick Reference</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">3-5 plants per station, all California-adapted</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-top: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Touch</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Lamb's Ear</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Dusty Miller</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Woolly Thyme</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Fountain Grass</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Succulents (various)</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Smell</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Lavender</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Rosemary</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Lemon Verbena</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Chocolate Mint</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Scented Geraniums</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Taste</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Cherry Tomatoes</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Sugar Snap Peas</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Strawberries</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Stevia</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Nasturtiums</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Sight</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Rainbow Chard</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Ornamental Kale</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Sunflowers</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Glass Gem Corn</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Coleus</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Sound</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Ornamental Grasses</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Clumping Bamboo</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Love-in-a-Puff (pods)</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Small water feature</li>\n                    <li style=\"padding: 4px 0; font-size: 0.8rem; color: #1a3b2a !important;\">Natural wind chimes</li>\n                </ul>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com | Santa Cruz & Bay Area Gardening</div>\n</div>";

window.AH_GRAPHICS["butterfly-host-plants-for-california"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Butterfly Host Plants for California Gardens</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Without host plants, butterflies cannot complete their life cycle</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Butterfly Species</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Host Plant</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Sun</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Important Notes</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Monarch</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Narrow-leaf Milkweed (native)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Plant native only. Avoid tropical milkweed.</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Monarch</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Showy Milkweed (native)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Larger, bolder pink flowers. 3-4 ft.</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Painted Lady</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Hollyhock, Mallow</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Mallow is a common \"weed,\" leave some for caterpillars.</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Swallowtail</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Fennel, Dill, Parsley</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Plant extra so caterpillars and kitchen can share.</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Buckeye</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Plantain, Snapdragon</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Plantain is a lawn \"weed.\" Leaving it helps buckeyes.</td>\n                </tr>\n            </tbody>\n        </table>\n        <div style=\"padding: 12px 15px; font-size: 0.75rem; color: #8c9c8c !important; border-top: 1px solid #dde2d8;\">\n            <span style=\"color: #b8694a !important; font-weight: 600;\">WARNING:</span> Do not plant tropical milkweed (A. curassavica) in California. It stays green year-round, disrupting monarch migration and increasing OE parasite exposure. Source: Xerces Society, UC Davis entomology.\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["butterfly-way-station-habitat-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Butterfly Way Station: Habitat Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Everything butterflies need to complete their life cycle</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Food Sources</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> 10+ native milkweed plants</li>\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> 5-10 nectar plants (spring to fall bloom)</li>\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> 2-3 swallowtail host plants</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Water and Minerals</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Puddling station (saucer + damp sand)</li>\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Flat landing stones in the saucer</li>\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Refresh water every 2 days</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Shelter and Warmth</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Dark basking rocks in sunny spots</li>\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Windbreak on NW side</li>\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Leaf litter and brush pile for winter</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 20px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;\">Safety Rules</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #cc3333 !important; margin-right: 6px;\">&#10007;</span> No pesticides (including Bt, spinosad)</li>\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #cc3333 !important; margin-right: 6px;\">&#10007;</span> No tropical milkweed</li>\n                    <li style=\"padding: 6px 0; font-size: 0.85rem; color: #1a3b2a !important;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> 6+ hours of sun daily</li>\n                </ul>\n            </div>\n        </div>\n        <div style=\"margin-top: 16px; padding: 14px 18px; background-color: #dde2d8 !important; font-size: 0.85rem; color: #1a3b2a !important;\">\n            <strong style=\"color: #1a3b2a !important;\">Get certified:</strong> Monarch Watch offers official Waystation certification for $16 (monarchwatch.org/waystations). Requires 10+ milkweed, nectar flowers, 100+ sq ft, no pesticides.\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["moonlight-garden-plant-picks"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Moonlight Garden: White Flowers and Silver Foliage</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Plants that glow at dusk and attract night pollinators</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Plant</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Type</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Night Feature</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Safety</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Moonflower Vine</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Night-blooming annual</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Opens at dusk (kids can watch); fragrant</td>\n                    <td style=\"padding: 10px 15px; color: #4a8c3f !important;\">Safe</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Night-Blooming Jasmine</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Evergreen shrub</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Intense fragrance carries across the yard</td>\n                    <td style=\"padding: 10px 15px; color: #4a8c3f !important;\">Safe</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">White Cosmos 'Purity'</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Day-blooming annual</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Bright white glow; sways in breeze</td>\n                    <td style=\"padding: 10px 15px; color: #4a8c3f !important;\">Safe</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Nicotiana sylvestris</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Night-fragrant annual</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Drooping trumpets; attracts sphinx moths</td>\n                    <td style=\"padding: 10px 15px; color: #4a8c3f !important;\">Safe</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Lamb's Ear</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Silver foliage perennial</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Silver leaves reflect moonlight</td>\n                    <td style=\"padding: 10px 15px; color: #4a8c3f !important;\">Safe</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Dusty Miller</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Silver foliage perennial</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Most reflective foliage; lacy silver-white</td>\n                    <td style=\"padding: 10px 15px; color: #4a8c3f !important;\">Safe</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Angel's Trumpet</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Night-fragrant tree</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">8-12 in. trumpet flowers; heavy scent</td>\n                    <td style=\"padding: 10px 15px; color: #cc3333 !important; font-weight: 600;\">Toxic if ingested</td>\n                </tr>\n            </tbody>\n        </table>\n        <div style=\"padding: 12px 15px; font-size: 0.75rem; color: #8c9c8c !important; border-top: 1px solid #dde2d8;\">Sources: UC Berkeley botany (moth-flower co-evolution), UC Davis entomology (sphinx moth pollination), UC ANR drought-tolerant plants</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["evening-garden-activities-for-families"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Evening Garden Activities for Families</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Activities best done after sunset in your moonlight garden</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 3+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Moonflower Watch</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Watch flowers unfurl at dusk. Takes 15-20 minutes from bud to open bloom. Gather 30 min before sunset.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 4+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Night Scent Walk</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Walk through the garden with eyes closed at each fragrant plant. Scents intensify in cool evening air.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 5+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Moth Watching</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Bring a flashlight to white flowers after dark. Sphinx moths hover like hummingbirds at moonflowers and nicotiana.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 6+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Glow Mapping</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Draw the garden after dark using white crayon on dark paper. Only sketch what you can see. Compare to a daytime drawing.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["plants-from-the-peter-rabbit-stories"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Every Plant from the Peter Rabbit Stories</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">All grow in California. Best varieties for Santa Cruz area gardens.</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Story Plant</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Best Variety for CA</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Days to Harvest</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Plant When</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Story Connection</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Lettuce</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">'Buttercrunch', 'Little Gem'</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">45-60</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sep to Mar</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Peter \"ate some lettuces\"</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Radishes</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">'French Breakfast', 'Cherry Belle'</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">22-30</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sep to Apr</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Peter \"ate some radishes\"</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">French Beans</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">'Blue Lake', 'Maxibel'</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">50-60</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Apr to Jul</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Peter \"ate some French beans\"</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Parsley</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Flat-leaf Italian</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">70-80</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Year-round</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Peter looked for parsley for his stomach</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Chamomile</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">German Chamomile</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">60-65 (flowers)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sep to Nov</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Peter's mother gave him chamomile tea</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Cucumbers</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">'Spacemaster', 'Lemon'</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">55-65</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Apr to May</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Peter hid in the cucumber frame</td>\n                </tr>\n                <tr style=\"background-color: #fff !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Sage and Thyme</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Common Sage, English Thyme</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Perennial</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Year-round</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Cooking herbs from the Jemima story</td>\n                </tr>\n            </tbody>\n        </table>\n        <div style=\"padding: 12px 15px; font-size: 0.75rem; color: #8c9c8c !important; border-top: 1px solid #dde2d8;\">Source: UC Cooperative Extension, UC Davis lettuce trials. Note: Foxglove appears in Potter's illustrations but is toxic if ingested. Plant as a backdrop only.</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["peter-rabbit-garden-activities-by-age"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Peter Rabbit Garden Activities by Age</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Connecting reading, gardening, and cooking</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 3+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Read the Story, Then Plant</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Read \"The Tale of Peter Rabbit\" before planting day. Point out every plant mentioned, then go plant those same plants.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 3+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Harvest Like Peter</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">\"Sneak\" into the garden to pick lettuce and radishes for a fresh salad. Kids who grow it will eat it.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 4+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Chamomile Tea Party</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Harvest and dry chamomile flowers, brew tea with honey. \"This is what Peter's mother gave him.\"</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 4+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Radish Racing</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Plant 3-5 radish varieties. Which sprouts first? Which is biggest? A 3-4 week science experiment.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 5+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Mr. McGregor's Garden Map</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Draw a bird's-eye map using story clues. Where was the gate? The cucumber frame? Compare to your real garden.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #1a3b2a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 6+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Write a New Adventure</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">What if Peter snuck into YOUR garden? What would he eat? Where would he hide? Creative writing from the garden.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["prehistoric-plants-and-their-ages"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Living Fossils: Plants That Grew with Dinosaurs</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">All grow in California gardens today</p>\n    </div>\n    <div style=\"padding: 0; background-color: #f8f9f0 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Plant Group</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Age (Millions of Years)</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Best Garden Pick</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Light</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Safety Note</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Ferns</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">350+</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Australian Tree Fern (15 ft trunk)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Part shade</td>\n                    <td style=\"padding: 10px 15px; color: #4a8c3f !important;\">Non-toxic</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Horsetails</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">350+</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Equisetum hyemale (2-4 ft)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Part shade</td>\n                    <td style=\"padding: 10px 15px; color: #b8694a !important;\">Container only (invasive)</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Conifers</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">300+</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Monkey Puzzle Tree</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full sun</td>\n                    <td style=\"padding: 10px 15px; color: #4a8c3f !important;\">Non-toxic</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Cycads</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">280+</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Sago Palm (slow, long-lived)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full to part</td>\n                    <td style=\"padding: 10px 15px; color: #cc3333 !important; font-weight: 600;\">Toxic to pets and children</td>\n                </tr>\n                <tr style=\"background-color: #fff !important; border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Ginkgo</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">270+</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Ginkgo biloba (male tree)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Full sun</td>\n                    <td style=\"padding: 10px 15px; color: #4a8c3f !important;\">Non-toxic</td>\n                </tr>\n                <tr style=\"background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Spike Moss</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">300+</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Selaginella (groundcover)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Shade</td>\n                    <td style=\"padding: 10px 15px; color: #4a8c3f !important;\">Non-toxic</td>\n                </tr>\n            </tbody>\n        </table>\n        <div style=\"padding: 12px 15px; font-size: 0.75rem; color: #8c9c8c !important; border-top: 1px solid #dde2d8;\">Sources: UC Berkeley Museum of Paleontology, UC ANR tree fern/cycad guidelines, Geological Society of America</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["dinosaur-garden-activities"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Dinosaur Garden Activities by Age</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Science, art, and paleontology in the garden</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 3+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">The Paleontologist Dig</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Bury bones, shells, and rocks in a sandbox. Kids excavate with brushes like real paleontologists.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 4+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Leaf Fossil Prints</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Press fern fronds and ginkgo leaves into air-dry clay. Paint with earth tones for realistic \"fossils.\"</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 5+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Deep Time Timeline</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Create a garden timeline with stakes. Mark when ferns, cycads, dinosaurs, and humans appeared.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 6+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Spore Print Art</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Place a mature fern frond spore-side down on paper, cover, and leave overnight. Real botany and art.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;\">Ages 8+</div>\n                <div style=\"font-size: 0.95rem; font-weight: 600; color: #1a3b2a !important; margin-bottom: 8px;\">Deep Time Math</div>\n                <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">If Earth were a 24-hr clock: ferns at 9:30 PM, dinosaurs at 10:56 PM, humans at 11:59:56 PM.</p>\n            </div>\n        </div>\n        <div style=\"padding: 12px 0 0 0; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC Berkeley Museum of Paleontology geological clock exercise</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["living-structure-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Living Garden Structures at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Four projects from easiest to most ambitious</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Sunflower Fort</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.65rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 3px;\">Time to Ready</div>\n                            <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">8-10 weeks</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.65rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 3px;\">Cost</div>\n                            <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">$10-25</div>\n                        </div>\n                    </div>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Plant 'Mammoth' seeds in a 6-8 ft circle. Grows 10-14 ft tall. Add morning glories between for walls.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Bean Teepee</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.65rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 3px;\">Time to Ready</div>\n                            <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">6-8 weeks</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.65rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 3px;\">Cost</div>\n                            <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">$18-28</div>\n                        </div>\n                    </div>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">6-8 bamboo poles tied at top, 'Scarlet Runner' beans. Red flowers attract hummingbirds. Produces food.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Gourd Tunnel</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.65rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 3px;\">Time to Ready</div>\n                            <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">8-10 weeks</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.65rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 3px;\">Cost</div>\n                            <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">$38-60</div>\n                        </div>\n                    </div>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Cattle panel arch with gourds growing over it. Walk-through tunnel with gourds dangling overhead. Harvest for fall crafts.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px;\">\n                    <h3 style=\"font-weight: 600; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Mini Corn Maze</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;\">\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.65rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 3px;\">Time to Ready</div>\n                            <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">10-14 weeks</div>\n                        </div>\n                        <div style=\"background-color: #f8f9f0 !important; padding: 8px; text-align: center;\">\n                            <div style=\"font-size: 0.65rem; color: #8c9c8c !important; text-transform: uppercase; margin-bottom: 3px;\">Cost</div>\n                            <div style=\"font-size: 0.9rem; font-weight: 600; color: #1a3b2a !important;\">$11-20</div>\n                        </div>\n                    </div>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">10x10 ft minimum. Plant corn in blocks with a path left unplanted. 'Glass Gem' for colorful ears. Add surprises along the path.</p>\n                </div>\n            </div>\n        </div>\n        <div style=\"padding: 12px 0 0 0; font-size: 0.75rem; color: #8c9c8c !important;\">Source: UC ANR sunflower/corn guidelines, UC Cooperative Extension runner bean recommendations. All timing for coastal California.</div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["sunflower-fort-planting-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Living Structures: Seasonal Timeline</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Coastal California planting schedule (inland: start 2-3 weeks earlier)</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border-top: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600;\">April</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 5px 0; font-size: 0.8rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Direct-sow sunflower seeds</li>\n                    <li style=\"padding: 5px 0; font-size: 0.8rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Direct-sow corn in blocks</li>\n                    <li style=\"padding: 5px 0; font-size: 0.8rem; color: #1a3b2a !important;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Set up bean teepee, sow beans</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600;\">May</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 5px 0; font-size: 0.8rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Sow gourds (soil 65+ degrees)</li>\n                    <li style=\"padding: 5px 0; font-size: 0.8rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Add morning glories to sunflowers</li>\n                    <li style=\"padding: 5px 0; font-size: 0.8rem; color: #1a3b2a !important;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Plant flowers inside fort circle</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600;\">June to August</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 5px 0; font-size: 0.8rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Measure sunflower heights weekly</li>\n                    <li style=\"padding: 5px 0; font-size: 0.8rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Harvest beans from teepee</li>\n                    <li style=\"padding: 5px 0; font-size: 0.8rem; color: #1a3b2a !important;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Walk through corn maze (5+ ft stalks)</li>\n                </ul>\n            </div>\n            <div style=\"background-color: #fff !important; border-top: 4px solid #b8694a; padding: 18px;\">\n                <div style=\"font-size: 0.75rem; color: #b8694a !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600;\">September to October</div>\n                <ul style=\"list-style: none; padding: 0; margin: 0;\">\n                    <li style=\"padding: 5px 0; font-size: 0.8rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Harvest sunflower seeds</li>\n                    <li style=\"padding: 5px 0; font-size: 0.8rem; color: #1a3b2a !important; border-bottom: 1px solid #f0f2ec;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Harvest decorative gourds</li>\n                    <li style=\"padding: 5px 0; font-size: 0.8rem; color: #1a3b2a !important;\"><span style=\"color: #4a8c3f !important; margin-right: 6px;\">&#10003;</span> Compost spent plants, plan next year</li>\n                </ul>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com | Santa Cruz & Bay Area Gardening</div>\n</div>";
