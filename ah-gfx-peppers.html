wrap; gap: 8px;\">\n                        <strong style=\"color: #1a3b2a !important; font-size: 0.95rem;\">Extreme: 855,000+ SHU</strong>\n                        <span style=\"background-color: #f0e6e6 !important; color: #8b4444 !important; padding: 3px 10px; border-radius: 12px; font-size: 0.7rem;\">Expert only</span>\n                    </div>\n                    <p style=\"margin: 6px 0 0 0; font-size: 0.85rem; color: #1c3c2c !important;\">Ghost Pepper, Carolina Reaper. Need 120+ warm days. Container growing with wall heat is your best bet.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC ANR, American Chemical Society Scoville Scale Reference</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["pepper-microclimate-fit-chart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Which Peppers Fit Your Microclimate?</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Santa Cruz County zones: Coastal, Mid-County, Inland/Watsonville</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #f8f9f0 !important;\">\n        <div style=\"margin-bottom: 20px;\">\n            <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px 15px; font-weight: 600; font-size: 0.9rem; border-radius: 6px 6px 0 0;\">Coastal (Santa Cruz, Westside, Davenport): Cool summers, fog</div>\n            <div style=\"background-color: #fff !important; padding: 15px; border: 1px solid #dde2d8; border-top: 0; border-radius: 0 0 6px 6px;\">\n                <p style=\"margin: 0 0 8px 0; font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Best bets:</strong> Shishito, Padron, Lunchbox, Hungarian Wax, Jimmy Nardello</p>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Strategy:</strong> Choose varieties under 75 days. Use south-facing walls, raised beds, and black plastic mulch to boost soil warmth. Containers on patios give you mobility to chase the sun.</p>\n            </div>\n        </div>\n        <div style=\"margin-bottom: 20px;\">\n            <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px 15px; font-weight: 600; font-size: 0.9rem; border-radius: 6px 6px 0 0;\">Mid-County (Scotts Valley, Soquel, Aptos): Warmer, some fog</div>\n            <div style=\"background-color: #fff !important; padding: 15px; border: 1px solid #dde2d8; border-top: 0; border-radius: 0 0 6px 6px;\">\n                <p style=\"margin: 0 0 8px 0; font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Best bets:</strong> All coastal picks plus Jalapeno, Anaheim, Serrano, Thai Chile</p>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Strategy:</strong> More heat means more options. Bells still struggle to fully ripen unless you have a consistently warm, sheltered spot. Start all peppers indoors 8-10 weeks before transplanting.</p>\n            </div>\n        </div>\n        <div>\n            <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 10px 15px; font-weight: 600; font-size: 0.9rem; border-radius: 6px 6px 0 0;\">Inland / Watsonville (Pajaro Valley, San Lorenzo Valley sun pockets): Warm days</div>\n            <div style=\"background-color: #fff !important; padding: 15px; border: 1px solid #dde2d8; border-top: 0; border-radius: 0 0 6px 6px;\">\n                <p style=\"margin: 0 0 8px 0; font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Best bets:</strong> Nearly all varieties, including Poblano, California Wonder bells, Habanero (with early start)</p>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Strategy:</strong> Warmest spots in the county. You can grow the full range. Habaneros and superhots still need 10-12 week indoor head start. Afternoon shade cloth prevents sunscald when temps exceed 95F.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program of Santa Cruz County, UC ANR Publication 7217</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["quick-reference-card-pepper-growing-basics"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pepper Growing Quick Reference</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">At-a-glance specs for Santa Cruz County</p>\n    </div>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 0; background-color: #f8f9f0 !important;\">\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8; border-right: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Soil Temperature</div>\n            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">65F minimum</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Use a soil thermometer. Air temps can be deceiving at the coast.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Sun Requirement</div>\n            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">8+ hours direct</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">The sunniest spot you have. South-facing walls are ideal.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8; border-right: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Spacing</div>\n            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">18 to 24 inches</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Between plants. Rows 24 to 36 inches apart. Closer in containers.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Watering</div>\n            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">1 to 2 inches/week</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Deep and consistent. Inconsistent watering causes blossom end rot.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-right: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Fertilizing</div>\n            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">Low nitrogen, higher P-K</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Too much nitrogen = lots of leaves, few peppers. Feed at transplant and when first fruits set.</div>\n        </div>\n        <div style=\"padding: 18px 20px;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Harvest Window</div>\n            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">Aug through Nov</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Pick regularly to encourage more fruit. Most peppers ripen green to red over 2-4 weeks.</div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program, UC ANR Home Garden Peppers</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["sweet-pepper-variety-selector"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Sweet Pepper Varieties That Succeed in Santa Cruz</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Ranked by reliability in our cool coastal climate</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Fruit Size</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best Use</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Why It Works Here</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Jimmy Nardello</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">75-80</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">8-10 in. long</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Frying, roasting, drying</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Thin walls cook quickly. Incredible caramelized flavor. Reliable producer.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Lunchbox</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">60-75</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">2-3 in. long</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Fresh snacking, salads</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Mini sweet peppers ripen fast. Red, orange, yellow mix. Compact plants.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Corno di Toro</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">75-85</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">8-10 in. long</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Roasting, grilling, stuffing</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Italian bull's horn. Sweet, thick flesh. Needs warmest spot. Better than bells.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Lipstick</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">53-73</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">4 in. long</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Fresh, roasting</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Very early. Tapered pimiento type. Sets fruit in cooler temps than bells.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">California Wonder</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">72-80</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; text-align: center;\">4x4 in.</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Stuffing, fresh, salads</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important;\">Classic bell, but marginal at coast. Harvest green or red. Best in containers near walls.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 20px 0; border-radius: 0 6px 6px 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Coastal gardener tip:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Skip the bells. Frying peppers (Jimmy Nardello, Corno di Toro) and mini sweets (Lunchbox, Lipstick) produce far more reliably in our cool summers and taste just as good, often better.</span>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program, Seed catalog data (Johnny's, Territorial)</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["sweet-pepper-season-planner"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Sweet Pepper Season Planner</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Key dates for Santa Cruz County</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">1</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Start seeds indoors: February to March</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">8-10 weeks before transplant date. Use heat mats (peppers need 80-85F soil to germinate). Bottom heat is not optional at the coast.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">2</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Harden off: Late April to early May</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Move seedlings outdoors for increasing hours over 7-10 days. Bring in if nights drop below 50F.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">3</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Transplant outdoors: Late May to mid-June</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Soil must be 65F+. Wait for consistent nighttime temps above 55F. Earlier transplants in warmer inland spots.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">4</span>\n                <div><strong style=\"color: #1a3b2a !important;\">First harvest: August to September</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Pick peppers at any size to encourage more production. For full color, leave on plant 2-4 additional weeks.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">5</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Season end: October to November</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Harvest all remaining fruit before first frost. Green peppers are still usable. Consider row cover to extend by 2-3 weeks.</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC ANR Publication 7217, UC Master Gardener Program of Santa Cruz County</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["bells-vs-frying-peppers-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Bell Peppers vs. Frying Peppers at the Coast</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Why Italian frying types outperform bells in Santa Cruz</p>\n    </div>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0; background-color: #f8f9f0 !important;\">\n        <div style=\"padding: 20px; border-right: 2px solid #dde2d8;\">\n            <div style=\"text-align: center; margin-bottom: 15px;\">\n                <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 600;\">Bell Peppers</span>\n            </div>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Need sustained heat to ripen (72-80 days)</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Often stay green at the coast (not enough heat units)</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Thick walls require more energy to develop</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Lower yields per plant in cool climates</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Familiar shape, good for stuffing</span>\n                </div>\n            </div>\n        </div>\n        <div style=\"padding: 20px;\">\n            <div style=\"text-align: center; margin-bottom: 15px;\">\n                <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 4px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 600;\">Frying Peppers</span>\n            </div>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Ripen faster with less heat (60-80 days)</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Turn red reliably even in fog belt gardens</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Thin walls = faster cooking, concentrated sweetness</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Higher yields per plant in cool climates</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Versatile: fry, roast, dry, eat fresh</span>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        For coastal Santa Cruz gardens, frying peppers are the smarter bet. Save bells for containers against a south-facing wall.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["hot-pepper-variety-guide-for-santa-cruz"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Hot Pepper Varieties for Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Heat levels, days to maturity, and local growing notes</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 700px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">SHU</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Coastal?</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Best Use</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Local Tips</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Hungarian Wax</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">5K-10K</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">65-70</td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Yes</span></td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Pickling, frying</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Earliest hot pepper. Produces even in cool years.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Jalapeno</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">2.5K-8K</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">70-80</td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Warm spot</span></td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Salsa, poppers, chipotle</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Less hot at coast. South wall or container recommended.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Serrano</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">10K-25K</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">75-80</td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Warm spot</span></td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Salsa, hot sauce</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Hotter than jalapeno. Thin walls, no peeling needed.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Cayenne</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">30K-50K</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">70-80</td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Warm spot</span></td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Drying, hot sauce, powder</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Thin walls dry easily. Prolific in warm microclimates.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Thai Chile</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">50K-100K</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">70-80</td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Yes</span></td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Asian cooking, drying</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Compact plants. Hundreds of small peppers. Excellent in pots.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Habanero</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">100K-350K</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">90-100</td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #f0e6e6 !important; color: #8b4444 !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Difficult</span></td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Hot sauce, Caribbean</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Start 12 weeks early. Container against warm wall is best strategy.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Ghost Pepper</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">1M+</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">120-150</td>\n                    <td style=\"padding: 10px; text-align: center;\"><span style=\"background-color: #f0e6e6 !important; color: #8b4444 !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Expert</span></td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Extreme hot sauce</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Possible in containers with wall heat. Start in January. Handle with gloves.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC ANR, American Chemical Society Scoville Reference</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["how-to-maximize-pepper-heat"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">5 Ways to Grow Hotter Peppers in Santa Cruz</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Capsaicin production increases with stress and heat</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #c0392b; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">1</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Maximize sun exposure</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Plant against a south-facing wall or fence. Reflected heat adds degrees that the coast otherwise lacks. 8+ hours of direct sun is the goal.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #c0392b; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">2</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Reduce watering as fruit ripens</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Mild water stress during ripening concentrates capsaicin. Keep plants healthy but slightly thirsty once fruits are full-sized.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #c0392b; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">3</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Use black plastic mulch or dark containers</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Black mulch raises soil temperature by 5-8F. This matters enormously in fog belt gardens where soil stays cool.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #c0392b; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">4</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Let peppers ripen fully on the plant</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">A red jalapeno is significantly hotter than a green one. Capsaicin increases as the pepper matures and changes color.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #c0392b; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">5</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Go easy on nitrogen fertilizer</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">High nitrogen pushes leaf growth at the expense of fruit heat. Use a balanced or low-nitrogen fertilizer once fruit begins to set.</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Davis Plant Sciences, New Mexico State University Chile Pepper Institute</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["hot-pepper-safety-handling-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Hot Pepper Handling Safety</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Protect yourself when harvesting and preparing hot peppers</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px;\">\n            <div style=\"background-color: #fff !important; padding: 16px; border-radius: 6px; border: 1px solid #dde2d8; text-align: center;\">\n                <div style=\"font-size: 1.5rem; color: #1a3b2a !important; margin-bottom: 8px;\">&#9888;</div>\n                <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Wear Gloves</strong>\n                <p style=\"margin: 6px 0 0 0; font-size: 0.8rem; color: #1c3c2c !important;\">Nitrile or latex. Capsaicin absorbs into skin and lasts hours. Essential for anything above jalapeno heat.</p>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px; border-radius: 6px; border: 1px solid #dde2d8; text-align: center;\">\n                <div style=\"font-size: 1.5rem; color: #1a3b2a !important; margin-bottom: 8px;\">&#9888;</div>\n                <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Avoid Face Contact</strong>\n                <p style=\"margin: 6px 0 0 0; font-size: 0.8rem; color: #1c3c2c !important;\">Do not touch eyes, nose, or mouth. If you do, flush with cold milk or a baking soda paste, not water.</p>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px; border-radius: 6px; border: 1px solid #dde2d8; text-align: center;\">\n                <div style=\"font-size: 1.5rem; color: #1a3b2a !important; margin-bottom: 8px;\">&#9888;</div>\n                <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Ventilate When Cooking</strong>\n                <p style=\"margin: 6px 0 0 0; font-size: 0.8rem; color: #1c3c2c !important;\">Cooking hot peppers releases capsaicin into the air. Use range hood or open windows. Dried pepper dust is especially irritating.</p>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px; border-radius: 6px; border: 1px solid #dde2d8; text-align: center;\">\n                <div style=\"font-size: 1.5rem; color: #1a3b2a !important; margin-bottom: 8px;\">&#9888;</div>\n                <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Wash Tools Separately</strong>\n                <p style=\"margin: 6px 0 0 0; font-size: 0.8rem; color: #1c3c2c !important;\">Cutting boards and knives retain capsaicin oil. Wash with dish soap and hot water before using for other foods.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC ANR Food Safety Program</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["shishito-vs-padron-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Shishito vs. Padron: Side by Side</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Two tapas-style peppers, both perfect for Santa Cruz gardens</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Feature</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Shishito</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Padron</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Origin</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Japan</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Spain (Galicia)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Heat (SHU)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">50-200 (1 in 10 is hot)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">500-2,500 (more often hot)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Days to Maturity</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">60-75</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">60-70</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fruit Size</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">3-4 inches, slender</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">2-3 inches, rounder</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Plant Size</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">18-24 inches</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">18-24 inches</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Best Cooking Method</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Blister in hot pan with oil + salt</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Same, plus deep frying</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Container Friendly?</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Excellent</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Excellent</span></td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Pick Size for Mild</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Any size (most are mild)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Pick at 2 inches or smaller</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Both are among the most productive and reliable peppers for coastal Santa Cruz. Grow one of each for variety.\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program, seed catalog data (Kitazawa, Territorial)</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["shishito-padron-growing-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Shishito and Padron: Quick Growing Reference</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">At-a-glance care guide for Santa Cruz County</p>\n    </div>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0; background-color: #f8f9f0 !important;\">\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8; border-right: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Start Seeds</div>\n            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">Feb to March</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Indoors, 8-10 weeks before transplant. Heat mat at 80-85F.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Transplant</div>\n            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">Late May to June</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Soil 65F+. Full sun, sunniest spot available.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8; border-right: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Container Size</div>\n            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">5 gallon minimum</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">One plant per pot. Good drainage essential.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Harvest</div>\n            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">Pick often, pick young</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Every 2-3 days at peak. More you pick, more they produce.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-right: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Yield</div>\n            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">50-100+ peppers/plant</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Among the most productive peppers you can grow.</div>\n        </div>\n        <div style=\"padding: 18px 20px;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Staking</div>\n            <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">Not required</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Compact, sturdy plants. No cage or trellis needed.</div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program of Santa Cruz County</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["blistered-pepper-recipe-card"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">How to Blister Shishito or Padron Peppers</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">The classic preparation, from garden to table in 5 minutes</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">1</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Heat a cast iron skillet over high heat</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Get it smoking hot before adding anything. This is key to good blisters.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">2</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Toss whole peppers with a drizzle of oil</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Use a high-heat oil (avocado, grapeseed). Leave stems on for easy handling.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">3</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Cook 3-4 minutes, turning once or twice</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">You want charred blisters on each side but still some snap when you bite. Do not overcook.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">4</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Transfer to plate, finish with flaky salt and a squeeze of lemon</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Serve immediately. Eat by the stem like a lollipop. One in ten might be spicy (that is part of the fun).</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["manzano-pepper-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Manzano Pepper at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">The rare hot pepper that thrives in cool climates</p>\n    </div>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0; background-color: #f8f9f0 !important;\">\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8; border-right: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Species</div>\n            <div style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important;\">Capsicum pubescens</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Different species from common peppers. Black seeds, purple flowers, fuzzy leaves.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Heat Level</div>\n            <div style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important;\">12,000 to 30,000 SHU</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Similar to serrano. Fruity, apple-like flavor with significant heat.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8; border-right: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Cool-Climate Advantage</div>\n            <div style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important;\">Prefers 45-75F</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Native to Andean highlands. Actually prefers our cool coastal temperatures over heat.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Days to Maturity</div>\n            <div style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important;\">90 to 120 days</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Long season, but does not need heat. Start seeds 12 weeks before transplant.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-right: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Plant Size</div>\n            <div style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important;\">3 to 5 feet tall</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Much larger than typical peppers. Can become semi-perennial in mild winters.</div>\n        </div>\n        <div style=\"padding: 18px 20px;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Best Use</div>\n            <div style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important;\">Fresh salsa, stuffing</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Thick, juicy walls. Traditional in salsa de arbol and stuffed with cheese.</div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Davis Plant Sciences, Chile Pepper Institute NMSU</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["manzano-vs-common-peppers-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Manzano vs. Common Peppers: Key Differences</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">A completely different species with different growing needs</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Feature</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Manzano (C. pubescens)</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Common Peppers (C. annuum)</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Temperature Preference</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">45-75F (cool)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">65-85F (warm)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Heat Tolerance</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Drops flowers above 80F</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Drops flowers below 55F</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Seed Color</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Black (distinctive)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">White/cream</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Flower Color</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Purple</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">White</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Leaf Texture</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Fuzzy (pubescent)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Smooth</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Lifespan</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Perennial (mild winters)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Annual</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Santa Cruz Fit</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Excellent</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Varies</span></td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 20px 0; border-radius: 0 6px 6px 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Why this matters for Santa Cruz:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Manzano is one of the few hot peppers that actually prefers our cool coastal climate. Most hot peppers need heat we cannot reliably provide, but manzanos thrive in conditions that stress other varieties.</span>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Davis Plant Sciences, Chile Pepper Institute NMSU</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["manzano-overwintering-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Overwintering Manzano Peppers in Santa Cruz</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Keep your plant alive through winter for a bigger second-year harvest</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">1</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Grow in a container (15+ gallons)</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Mobility is essential. You need to move it if a hard freeze threatens. In-ground plants cannot be protected below 28F.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">2</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Reduce watering in late fall</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Let the plant slow down naturally. Water only when the top 2 inches of soil are dry. Do not fertilize after September.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">3</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Move to a sheltered spot before first frost</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Against a south-facing wall, under an eave, or into an unheated garage. Manzano tolerates light frost (28-32F) but not hard freezes.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">4</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Prune lightly in early spring</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Remove dead or damaged branches in February. The plant will push new growth from existing wood. Second-year plants produce earlier and more heavily.</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        In mild Santa Cruz winters, manzano peppers can survive outdoors for 3-5+ years with basic protection.\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program, Chile Pepper Institute NMSU</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["chiltepin-pepper-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Chiltepin Pepper at a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">The wild ancestor of all cultivated chili peppers</p>\n    </div>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0; background-color: #f8f9f0 !important;\">\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8; border-right: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Species</div>\n            <div style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important;\">Capsicum annuum var. glabriusculum</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Wild progenitor of all C. annuum peppers (jalapeno, bell, cayenne).</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Heat Level</div>\n            <div style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important;\">50,000 to 100,000 SHU</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Intense but brief heat. Fades faster than other hot peppers.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8; border-right: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Fruit Size</div>\n            <div style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important;\">Pea-sized (1/4 inch)</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Tiny round berries. Green to red when ripe. Ornamental and edible.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-bottom: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Plant Size</div>\n            <div style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important;\">2 to 4 feet</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Bushy, semi-woody. Can become perennial in mild Santa Cruz winters.</div>\n        </div>\n        <div style=\"padding: 18px 20px; border-right: 1px solid #dde2d8;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Germination</div>\n            <div style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important;\">Slow: 14 to 30+ days</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Wild seeds have natural dormancy. Soak 24 hours before planting. Be patient.</div>\n        </div>\n        <div style=\"padding: 18px 20px;\">\n            <div style=\"font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8c9c8c !important; margin-bottom: 4px;\">Best Use</div>\n            <div style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important;\">Dried, crushed, salsa</div>\n            <div style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Traditional in Sonoran cuisine. Crush dried chiltepins over soups, eggs, beans.</div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: USDA GRIN database, University of Arizona Cooperative Extension</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["chiltepin-vs-thai-chile-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Chiltepin vs. Thai Chile for Santa Cruz Gardens</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Two compact, fiery peppers with different growing personalities</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 450px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Feature</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Chiltepin</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Thai Chile</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Heat (SHU)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">50,000-100,000</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">50,000-100,000</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Heat Character</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Sharp, brief flash</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Sustained, building</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fruit Shape</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Round (pea-sized)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Pointed (1-2 inches)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Germination</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">14-30+ days (slow)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">7-14 days (standard)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Perennial?</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Yes (mild winters)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Typically grown as annual</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Best For</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Drying, crushing, Sonoran cuisine</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Fresh, stir-fry, Southeast Asian</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Both work well in Santa Cruz containers. Grow chiltepin for novelty and history, Thai chile for volume and kitchen versatility.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
