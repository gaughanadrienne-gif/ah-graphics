window.AH_GRAPHICS["best-peppers-for-containers"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Best Peppers for Container Growing</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Compact varieties matched to pot sizes for Santa Cruz patios</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Plant Height</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Min. Pot Size</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Days</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Why It Works in Pots</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Shishito</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">18-24 in.</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">5 gal</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">60-75</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Compact, no staking. Incredibly productive in pots.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Lunchbox</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">18-24 in.</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">5 gal</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">60-75</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Small plants, heavy yield of sweet snacking peppers.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Thai Chile</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">12-18 in.</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">3 gal</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">70-80</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Smallest pepper plant. Ornamental upright clusters.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Jalapeno</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">18-24 in.</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">5 gal</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">70-80</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Bushy habit. Stake when heavy with fruit.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Hungarian Wax</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">18-24 in.</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">5 gal</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">65-70</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Early producer. Tolerates coastal conditions well.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">California Wonder</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">20-24 in.</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">5-7 gal</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">72-80</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Needs consistent watering. Container + wall heat helps bells succeed.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program, UC ANR Publication 7217</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["container-pepper-setup-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Container Pepper Setup Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Everything you need for productive patio peppers</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">1</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Container: 5 gallons minimum (7+ for bells)</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Must have drainage holes. Dark containers absorb more heat (good at coast, risky inland). Fabric grow bags work well and prevent root circling.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">2</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Soil: Premium potting mix + perlite</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Never use garden soil in containers. Mix in 20% perlite for drainage. Peppers hate soggy roots.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">3</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Location: South-facing wall, full sun</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">The mobility advantage: move containers to follow the sun throughout the season. Against a warm wall adds 5-10 degrees of reflected heat.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">4</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Watering: Check daily, water when top inch is dry</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Containers dry out much faster than garden beds. In summer, expect to water daily or every other day. Inconsistent watering causes blossom end rot.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 30px;\">5</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Feeding: Every 2-3 weeks with balanced fertilizer</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Nutrients leach with each watering. Use a tomato/pepper fertilizer (lower nitrogen, higher phosphorus). Start when first flowers appear.</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program, UC ANR Container Gardening Guide</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["container-vs-in-ground-pros-and-cons"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Container vs. In-Ground Peppers at the Coast</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Why containers often win in Santa Cruz County</p>\n    </div>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0; background-color: #f8f9f0 !important;\">\n        <div style=\"padding: 20px; border-right: 2px solid #dde2d8;\">\n            <div style=\"text-align: center; margin-bottom: 15px;\">\n                <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 4px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 600;\">Container Growing</span>\n            </div>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Move to follow sun and avoid frost</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Soil warms faster (critical at coast)</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Position against warm walls for reflected heat</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">No nematode or soil disease issues</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Requires more frequent watering</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Needs regular fertilizing (nutrients leach)</span>\n                </div>\n            </div>\n        </div>\n        <div style=\"padding: 20px;\">\n            <div style=\"text-align: center; margin-bottom: 15px;\">\n                <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 600;\">In-Ground Growing</span>\n            </div>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Less watering (soil retains moisture)</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Larger root zone, bigger plants possible</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10003;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Less fertilizing needed</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Soil stays cold longer at coast</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Cannot relocate for sun or frost protection</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Risk of nematodes in sandy soils</span>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        For coastal Santa Cruz, containers give you the heat advantage that peppers need. Inland gardeners can succeed either way.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["peppers-seed-starting-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pepper Seed Starting Timeline</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">From seed to transplant for Santa Cruz County</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 80px;\">Week 0</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Sow seeds (Feb to early March)</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Plant 1/4 inch deep in seed starting mix. Use heat mat set to 80-85F. Bottom heat is critical for germination. Cover trays with humidity domes.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 80px;\">Week 1-3</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Germination (7-21 days)</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Hot peppers take longer than sweet. Remove humidity dome once sprouts appear. Keep heat mat on. Provide 14-16 hours of light.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 80px;\">Week 3-4</span>\n                <div><strong style=\"color: #1a3b2a !important;\">First true leaves appear</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Begin very light feeding (1/4 strength liquid fertilizer). Ensure strong light to prevent leggy seedlings. Grow lights outperform windowsills.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 80px;\">Week 4-5</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Pot up to 3-4 inch pots</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">When seedlings have 2-3 sets of true leaves. Use potting mix (not seed starting mix). Bury stem slightly deeper than before.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 80px;\">Week 7-8</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Begin hardening off (late April to May)</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Move outdoors for increasing hours over 7-10 days. Start with 2 hours in sheltered shade. Bring inside if nights drop below 50F.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 80px;\">Week 8-10</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Transplant outdoors (late May to mid-June)</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Soil must be 65F+. Nighttime temps consistently above 55F. Plant in sunniest spot. Water deeply at transplant.</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program, UC ANR Publication 8117</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["seed-starting-supplies-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pepper Seed Starting Supply List</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What you actually need (and what you can skip)</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 20px;\">\n            <div>\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 12px; font-weight: 600; font-size: 0.85rem; border-radius: 4px 4px 0 0;\">Essential</div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-top: none; border-radius: 0 0 4px 4px; padding: 15px;\">\n                    <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                            <span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 18px;\">&#10003;</span>\n                            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Heat mat</strong> (peppers will not germinate without 80-85F soil)</span>\n                        </div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                            <span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 18px;\">&#10003;</span>\n                            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Seed starting mix</strong> (sterile, fine-textured, not potting soil)</span>\n                        </div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                            <span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 18px;\">&#10003;</span>\n                            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Cell trays or small pots</strong> with drainage holes</span>\n                        </div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                            <span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 18px;\">&#10003;</span>\n                            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Humidity dome or plastic wrap</strong> for germination</span>\n                        </div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                            <span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 18px;\">&#10003;</span>\n                            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Grow light or very sunny south window</strong> (light preferred)</span>\n                        </div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                            <span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 18px;\">&#10003;</span>\n                            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Plant labels</strong> (varieties look identical as seedlings)</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div>\n                <div style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 8px 12px; font-weight: 600; font-size: 0.85rem; border-radius: 4px 4px 0 0;\">Helpful but Optional</div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-top: none; border-radius: 0 0 4px 4px; padding: 15px;\">\n                    <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                            <span style=\"color: #8c9c8c !important; font-weight: 700; min-width: 18px;\">+</span>\n                            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Thermostat for heat mat</strong> (prevents overheating)</span>\n                        </div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                            <span style=\"color: #8c9c8c !important; font-weight: 700; min-width: 18px;\">+</span>\n                            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Soil thermometer</strong> (confirm germination temp)</span>\n                        </div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                            <span style=\"color: #8c9c8c !important; font-weight: 700; min-width: 18px;\">+</span>\n                            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Timer for grow lights</strong> (automate 14-16 hour cycle)</span>\n                        </div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                            <span style=\"color: #8c9c8c !important; font-weight: 700; min-width: 18px;\">+</span>\n                            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Small fan</strong> (air circulation strengthens stems)</span>\n                        </div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                            <span style=\"color: #8c9c8c !important; font-weight: 700; min-width: 18px;\">+</span>\n                            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Liquid seaweed/kelp</strong> (gentle early feeding)</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0 20px 20px 20px; border-radius: 0 6px 6px 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Why start from seed?</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Nurseries typically carry 3-5 pepper varieties. Seed catalogs offer hundreds. Starting from seed is the only way to grow shishito, manzano, chiltepin, Jimmy Nardello, and most specialty varieties.</span>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["germination-temperature-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pepper Germination by Soil Temperature</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Why a heat mat is not optional for peppers</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 450px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Soil Temperature</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Germination Rate</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Days to Sprout</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Assessment</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">60F</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Less than 50%</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">25+ days</td>\n                    <td style=\"padding: 10px 15px;\"><span style=\"background-color: #f0e6e6 !important; color: #8b4444 !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Too cold</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">65F</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">About 50%</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">18-25 days</td>\n                    <td style=\"padding: 10px 15px;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Poor</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">75F</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">About 70%</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">12-18 days</td>\n                    <td style=\"padding: 10px 15px;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Acceptable</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">80-85F</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">90%+</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">7-14 days</td>\n                    <td style=\"padding: 10px 15px;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Optimal</span></td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">95F+</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Declining</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">Variable</td>\n                    <td style=\"padding: 10px 15px;\"><span style=\"background-color: #f0e6e6 !important; color: #8b4444 !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Too hot</span></td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        A windowsill in a Santa Cruz home is typically 60-68F, well below the 80-85F peppers need. A heat mat closes this gap.\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC ANR Publication 8117 (Seed and Transplant Production)</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["pepper-planting-calendar-by-microclimate"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pepper Planting Calendar for Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Key dates by microclimate zone</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Task</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Coastal (SC, Westside)</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Mid-County (Soquel, Aptos)</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: center; font-weight: 600; font-size: 0.8rem;\">Inland (Watsonville, SLV sun)</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Start seeds indoors</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Late Jan to Feb</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Feb to early Mar</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Feb to Mar</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Harden off seedlings</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Mid to late May</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Early to mid May</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Late Apr to mid May</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Transplant outdoors</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Late May to mid Jun</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Mid May to early Jun</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Early to mid May</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Last safe planting date</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Early Jul</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Mid Jun</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Mid Jun</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">First harvest (early varieties)</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Aug to Sep</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Late Jul to Aug</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Jul to Aug</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Season end</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Oct to Nov</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Oct to Nov</td>\n                    <td style=\"padding: 10px; text-align: center; color: #1c3c2c !important;\">Oct (first frost varies)</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Soil temperature matters more than calendar date. Use a soil thermometer and wait for 65F+ at 4 inches deep.\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program of Santa Cruz County, UC ANR Publication 7217</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["peppers-planting-day-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pepper Transplant Day Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Set your peppers up for success from day one</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Confirm soil temp is 65F+ at 4 inches</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Insert thermometer in morning (soil is coldest then). If below 65F, wait or use black plastic to warm soil.</span></div>\n            </div>\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Transplant on an overcast day or in late afternoon</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Reduces transplant shock. Avoid midday sun on newly planted seedlings.</span></div>\n            </div>\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Dig hole 2x root ball width, mix in compost</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Peppers like rich, well-drained soil. Do not add fertilizer directly in the planting hole.</span></div>\n            </div>\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Plant at same depth (or slightly deeper) than pot</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Unlike tomatoes, peppers do not need deep burial. Just cover the original root ball.</span></div>\n            </div>\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Water deeply at planting</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Soak the entire root zone. Water again in 2-3 days. Then establish a consistent schedule.</span></div>\n            </div>\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Mulch 2-3 inches around plants (not touching stems)</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Retains moisture and moderates soil temperature. Straw or compost works well.</span></div>\n            </div>\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Install support if growing large-fruited varieties</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Bell peppers, poblanos, and anaheims benefit from a cage or stake. Easier to install now than after the plant is large.</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program, UC ANR Home Garden Peppers</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["too-early-vs-too-late-consequences"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Planting Too Early vs. Too Late</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Both timing mistakes cost you peppers</p>\n    </div>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0; background-color: #f8f9f0 !important;\">\n        <div style=\"padding: 20px; border-right: 2px solid #dde2d8;\">\n            <div style=\"text-align: center; margin-bottom: 15px;\">\n                <span style=\"background-color: #c0392b !important; color: #fff !important; padding: 4px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 600;\">Too Early</span>\n            </div>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Cold soil stunts root growth for weeks</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Plants sit and sulk instead of growing</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Cold nights cause blossom drop</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Purple-tinged leaves (phosphorus lockout)</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c0392b !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">A plant set back by cold never fully catches up</span>\n                </div>\n            </div>\n        </div>\n        <div style=\"padding: 20px;\">\n            <div style=\"text-align: center; margin-bottom: 15px;\">\n                <span style=\"background-color: #c4a35a !important; color: #fff !important; padding: 4px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 600;\">Too Late</span>\n            </div>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c4a35a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Not enough warm days for fruit to ripen</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c4a35a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Shorter days slow pepper metabolism</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c4a35a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Frost arrives before many peppers color up</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c4a35a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Hot peppers especially need every warm day</span>\n                </div>\n                <div style=\"display: flex; gap: 8px; align-items: flex-start;\">\n                    <span style=\"color: #c4a35a !important; font-weight: 700; font-size: 1rem; min-width: 18px;\">&#10005;</span>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Harvest limited to green, unripe fruit</span>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 20px; border-radius: 0 6px 6px 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">The sweet spot:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Wait for 65F soil and 55F+ nights, then transplant immediately. At the coast, this is usually late May to mid-June. A pepper planted in warm soil on June 1 will outperform one planted in cold soil on April 15.</span>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC ANR Publication 7217, UC Master Gardener Program of Santa Cruz County</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["why-peppers-stay-green-cause-and-fix"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Why Your Peppers Won't Turn Red</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Common causes and what you can actually do about each one</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Cause</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Why It Happens</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">What to Do</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Not enough time</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Color change takes 2-4 weeks after reaching full size. Most peppers need 3-4 extra weeks beyond the \"days to maturity\" on the tag.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Be patient. Leave fruit on the plant. It is still ripening even if you cannot see it yet.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Cool temperatures</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Ripening slows dramatically below 65F. Coastal fog and cool nights in Santa Cruz slow the process significantly.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Move containers to warmer spots. Use row cover or cloches to trap heat around plants.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Too many fruit on the plant</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">The plant divides its energy among all fruit. Many half-ripe peppers instead of fewer fully ripe ones.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Pick some peppers green to redirect energy. Fewer fruit = faster ripening on remaining peppers.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Wrong variety for your zone</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Long-season varieties (90+ days) may not have time to color up before our season ends.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Choose early varieties (60-75 days) for coastal gardens. Start seeds earlier next season.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">End of season approaching</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Frost will kill the plant before fruit finishes ripening. Once nighttime temps drop below 50F consistently, ripening stalls.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Pick all fruit and ripen indoors on a sunny windowsill. They will slowly color up off the plant.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Master Gardener Program, UC ANR Publication 7217</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["ripening-progress-visual"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">How Peppers Ripen: What to Expect</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">The color change process from green to ripe</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 0;\">\n            <div style=\"display: flex; align-items: stretch; border-bottom: 2px solid #dde2d8;\">\n                <div style=\"width: 60px; background-color: #4a7c4a !important; flex-shrink: 0; display: flex; align-items: center; justify-content: center;\">\n                    <span style=\"color: #fff !important; font-weight: 700; font-size: 0.75rem; writing-mode: vertical-rl; text-orientation: mixed;\">GREEN</span>\n                </div>\n                <div style=\"padding: 14px 18px; flex: 1;\">\n                    <strong style=\"color: #1a3b2a !important; font-size: 0.95rem;\">Stage 1: Full size, solid green</strong>\n                    <p style=\"margin: 4px 0 0 0; font-size: 0.85rem; color: #1c3c2c !important;\">Pepper has reached its maximum size. Edible now, but flavor improves with ripening. Most varieties spend 2-4 weeks at this stage in Santa Cruz.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: stretch; border-bottom: 2px solid #dde2d8; background-color: #fff !important;\">\n                <div style=\"width: 60px; background-color: #7a8c3a !important; flex-shrink: 0; display: flex; align-items: center; justify-content: center;\">\n                    <span style=\"color: #fff !important; font-weight: 700; font-size: 0.75rem; writing-mode: vertical-rl; text-orientation: mixed;\">BREAK</span>\n                </div>\n                <div style=\"padding: 14px 18px; flex: 1;\">\n                    <strong style=\"color: #1a3b2a !important; font-size: 0.95rem;\">Stage 2: First color break (streaking)</strong>\n                    <p style=\"margin: 4px 0 0 0; font-size: 0.85rem; color: #1c3c2c !important;\">You see the first patches or streaks of color. This is the turning point. From here, full color takes 1-2 more weeks. Do not pick yet.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: stretch; border-bottom: 2px solid #dde2d8;\">\n                <div style=\"width: 60px; background-color: #c44a1a !important; flex-shrink: 0; display: flex; align-items: center; justify-content: center;\">\n                    <span style=\"color: #fff !important; font-weight: 700; font-size: 0.75rem; writing-mode: vertical-rl; text-orientation: mixed;\">TURNING</span>\n                </div>\n                <div style=\"padding: 14px 18px; flex: 1;\">\n                    <strong style=\"color: #1a3b2a !important; font-size: 0.95rem;\">Stage 3: Mostly colored (50-90%)</strong>\n                    <p style=\"margin: 4px 0 0 0; font-size: 0.85rem; color: #1c3c2c !important;\">Most of the pepper has changed color. You can pick now and it will finish on the counter, or wait for full color on the plant for maximum sweetness.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: stretch; background-color: #fff !important;\">\n                <div style=\"width: 60px; background-color: #b22222 !important; flex-shrink: 0; display: flex; align-items: center; justify-content: center;\">\n                    <span style=\"color: #fff !important; font-weight: 700; font-size: 0.75rem; writing-mode: vertical-rl; text-orientation: mixed;\">RIPE</span>\n                </div>\n                <div style=\"padding: 14px 18px; flex: 1;\">\n                    <strong style=\"color: #1a3b2a !important; font-size: 0.95rem;\">Stage 4: Fully colored, slightly soft</strong>\n                    <p style=\"margin: 4px 0 0 0; font-size: 0.85rem; color: #1c3c2c !important;\">Peak flavor and sweetness. Sugar content is highest now. Pick within a few days or fruit may soften too much. Total time from green to red: 2-6 weeks depending on temperature.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        In warm inland spots, green to red takes 2-3 weeks. At the foggy coast, expect 4-6 weeks. Temperature is the primary driver.\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC Davis Postharvest Technology Center, UC ANR</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["pepper-problem-diagnostic-table"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pepper Problem Diagnostic Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Identify the symptom, find the cause, apply the fix</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Symptom</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Likely Cause</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Solution</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Flowers drop without fruit</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Nights below 55F or days above 95F</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Row cover for cold nights. Shade cloth for extreme heat. Fruit set resumes when temps moderate.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Dark, sunken spot on bottom</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Blossom end rot (calcium/water issue)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Water deeply and consistently. Mulch to retain moisture. Do not over-fertilize with nitrogen.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">White, papery blotch on fruit</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Sunscald (sun on exposed fruit)</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Keep leaf canopy intact. Shade cloth in extreme heat. Do not over-prune.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Tiny holes in fruit, frass inside</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Pepper weevil or corn earworm</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Hand-pick affected fruit. Bt spray for earworms. Rotate crops yearly.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Curled leaves, sticky residue</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Aphids</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Strong water spray. Insecticidal soap. Encourage ladybugs and lacewings.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Mosaic pattern, stunted growth</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Tobacco or cucumber mosaic virus</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">No cure. Remove infected plants. Do not compost. Control aphids (virus vectors).</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Stunted, yellow, root knots</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Root-knot nematodes</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Solarize soil. Add compost. Plant marigolds. Rotate beds. Consider container growing.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 12px; font-weight: 600; color: #1a3b2a !important;\">Peppers not as hot as expected</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Too much water, mild weather, or mild variety</td>\n                    <td style=\"padding: 10px 12px; color: #1c3c2c !important; font-size: 0.85rem;\">Reduce watering as fruit ripens. More sun and heat stress = hotter peppers.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC IPM Pest Notes: Peppers, UC Master Gardener Program</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["blossom-drop-troubleshooting-flowchart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pepper Blossom Drop: Find the Cause</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">The #1 pepper complaint in Santa Cruz County</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; border-left: 5px solid #c0392b; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Are nighttime temps below 55F?</span>\n                    <span style=\"background-color: #c0392b !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem;\">Most Common at Coast</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Fix:</strong> Use row cover, cloches, or move containers against a warm wall. Peppers need nights above 55F for fruit to set. This is the primary cause in Santa Cruz.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #c4a35a; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Are daytime temps above 90-95F?</span>\n                    <span style=\"background-color: #c4a35a !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem;\">Inland Heat Waves</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Fix:</strong> Shade cloth (30-40%) during heat waves. Deep water in early morning. Mulch heavily. Fruit set returns when temps drop back to 85F or below.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #8c9c8c; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Is the plant very leafy with few flowers?</span>\n                    <span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem;\">Nutrient Imbalance</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Fix:</strong> Too much nitrogen. Stop feeding for 2-3 weeks, then switch to a low-nitrogen, high-phosphorus fertilizer. The plant is putting energy into leaves instead of fruit.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #1a3b2a; padding: 15px 18px; border-radius: 0 8px 8px 0;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;\">\n                    <span style=\"font-weight: 700; color: #1a3b2a !important;\">Is the soil very dry or waterlogged?</span>\n                    <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem;\">Water Stress</span>\n                </div>\n                <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Fix:</strong> Establish a consistent watering schedule. Deep water 2-3 times per week rather than shallow daily watering. Mulch to maintain even soil moisture. Check container drainage.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC IPM Pest Notes, UC ANR Publication 7217</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["pepper-pest-identification-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Common Pepper Pests in Santa Cruz County</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Identify, assess, and respond</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px;\">\n            <div style=\"background-color: #fff !important; padding: 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;\">\n                    <strong style=\"color: #1a3b2a !important; font-size: 0.95rem;\">Aphids</strong>\n                    <span style=\"background-color: #c4a35a !important; color: #fff !important; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem;\">Common</span>\n                </div>\n                <p style=\"margin: 0 0 6px 0; font-size: 0.8rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Signs:</strong> Clusters on new growth, sticky honeydew, curled leaves.</p>\n                <p style=\"margin: 0; font-size: 0.8rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Action:</strong> Strong water spray knocks off 90%. Insecticidal soap for heavy infestations. Encourage ladybugs.</p>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;\">\n                    <strong style=\"color: #1a3b2a !important; font-size: 0.95rem;\">Flea Beetles</strong>\n                    <span style=\"background-color: #c4a35a !important; color: #fff !important; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem;\">Common</span>\n                </div>\n                <p style=\"margin: 0 0 6px 0; font-size: 0.8rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Signs:</strong> Tiny round holes in leaves (\"shothole\" pattern). Tiny jumping black beetles.</p>\n                <p style=\"margin: 0; font-size: 0.8rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Action:</strong> Row cover on transplants. Healthy plants outgrow damage. Kaolin clay spray deters feeding.</p>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;\">\n                    <strong style=\"color: #1a3b2a !important; font-size: 0.95rem;\">Hornworms</strong>\n                    <span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem;\">Occasional</span>\n                </div>\n                <p style=\"margin: 0 0 6px 0; font-size: 0.8rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Signs:</strong> Large green caterpillars, rapid defoliation, dark droppings.</p>\n                <p style=\"margin: 0; font-size: 0.8rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Action:</strong> Hand-pick (check at dusk). Leave parasitized ones (white cocoons on back). Bt spray if needed.</p>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;\">\n                    <strong style=\"color: #1a3b2a !important; font-size: 0.95rem;\">Slugs and Snails</strong>\n                    <span style=\"background-color: #c0392b !important; color: #fff !important; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem;\">Very Common</span>\n                </div>\n                <p style=\"margin: 0 0 6px 0; font-size: 0.8rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Signs:</strong> Ragged holes in leaves and fruit, slime trails, damage worst in morning.</p>\n                <p style=\"margin: 0; font-size: 0.8rem; color: #1c3c2c !important;\"><strong style=\"color: #1a3b2a !important;\">Action:</strong> Iron phosphate bait (pet-safe). Hand-pick at night. Copper tape around containers. Clear debris.</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC IPM Pest Notes: Peppers, UC Master Gardener Program of Santa Cruz County</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
