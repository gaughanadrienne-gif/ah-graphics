window.AH_GRAPHICS["pepper-disease-prevention-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pepper Disease Prevention Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Most pepper diseases are easier to prevent than to treat</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Rotate crops: no peppers (or tomatoes, eggplant) in the same spot for 3 years</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Nightshade family diseases build up in soil. This is the single most effective prevention strategy.</span></div>\n            </div>\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Water at the base, not overhead</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Wet foliage promotes fungal diseases. Drip irrigation or hand-watering at soil level. Morning watering if you must use sprinklers.</span></div>\n            </div>\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Space plants 18-24 inches apart for air circulation</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Crowded plants stay damp longer. Good airflow reduces fungal pressure, especially in our foggy coastal air.</span></div>\n            </div>\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Mulch around plants (not touching stems)</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Prevents soil-borne pathogens from splashing onto lower leaves during watering or rain.</span></div>\n            </div>\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Remove and destroy diseased plants immediately</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Do not compost plants with viral or bacterial diseases. Bag them for trash. Clean tools with 10% bleach solution.</span></div>\n            </div>\n            <div style=\"display: flex; gap: 10px; align-items: flex-start; background-color: #fff !important; padding: 12px 16px; border-radius: 6px; border: 1px solid #dde2d8;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 22px;\">&#9744;</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Control aphids early (they spread viruses)</strong><br><span style=\"font-size: 0.8rem; color: #1c3c2c !important;\">Aphids are the #1 vector for mosaic virus. A small aphid problem today can become a viral infection next week.</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">Source: UC IPM, UC Master Gardener Program of Santa Cruz County</div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

</script>
