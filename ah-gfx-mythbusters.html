window.AH_GRAPHICS["garden-myth-adding-lime-to-california-soil-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: MOSTLY BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Need to Add Lime to California Garden Soil</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Most California soils are already neutral to alkaline, and adding lime can push pH dangerously high for your plants.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-adding-sand-to-clay-soil-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Adding Sand to Clay Soil Improves Drainage</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Mixing sand into clay soil can actually make drainage worse, creating a dense, cement-like material that is harder to work than the clay you started with.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-all-bees-sting-keep-away-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">All Bees Sting and Should Be Kept Away From Gardens</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Most bee species are docile or cannot sting at all, and your garden absolutely needs them.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-banana-peels-great-fertilizer-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: MOSTLY BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Banana Peels Are a Great Garden Fertilizer</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Banana peels contain some potassium, but not nearly enough to replace real fertilizer. Burying them around plants can attract pests and create problems.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-beer-traps-best-slug-control-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: MOSTLY BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Beer Traps Are the Best Way to Control Slugs</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Beer traps catch some slugs, but they can actually attract more slugs to your garden than they kill.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-bought-ladybugs-stay-in-garden-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Ladybugs You Buy Will Stay in Your Garden</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Most purchased ladybugs fly away within 48 hours, and mass-collected ladybugs may carry parasites that harm native populations.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-butterflies-moths-all-beneficial-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: MOSTLY BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Butterflies and Moths Are All Beneficial in the Garden</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Adult butterflies are harmless pollinators, but many moth and butterfly larvae are serious garden pests.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-cant-compost-citrus-peels-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Can't Compost Citrus Peels</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Citrus peels compost just fine. They break down slower than some materials but are a perfectly safe addition to your pile.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-cant-grow-blueberries-california-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Can't Grow Blueberries in California</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You absolutely can grow blueberries in California, including in Santa Cruz County. You just need the right varieties and some soil preparation.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-cant-grow-productive-garden-in-shade-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#c9a84c !important;color:#1a3b2a !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: PARTIALLY TRUE</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Can't Grow a Productive Garden in Shade</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You cannot grow sun-loving crops like tomatoes in deep shade, but a wide range of edibles thrive in partial shade. Many leafy greens, herbs, and root vegetables actually prefer it, especially in California's warm inland valleys.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-coffee-grounds-make-soil-acidic-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: MOSTLY BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Coffee Grounds Make Soil Acidic</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Fresh coffee grounds are only slightly acidic, and used grounds are nearly neutral. They will not meaningfully lower your soil pH.</p></div></div></div>";

window.AH_GRAPHICS["garden-myth-drip-irrigation-wastes-water-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Drip Irrigation Wastes Water Because It Runs All the Time</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Drip irrigation is one of the most water-efficient methods available. It delivers water directly to roots with minimal evaporation, typically using 30 to 50% less water than sprinklers.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-drought-tolerant-plants-zero-water-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#c9a84c !important;color:#1a3b2a !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: PARTIALLY TRUE</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Drought-Tolerant Plants Need Zero Water Once Established</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Many drought-tolerant plants need far less water than traditional garden plants, but \"drought-tolerant\" does not mean \"no water ever.\" Most still need occasional deep watering during California's long dry season.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-eggshells-add-calcium-quickly-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#c9a84c !important;color:#1a3b2a !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: PARTIALLY TRUE</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Eggshells Add Calcium to Soil Quickly</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Eggshells do contain calcium, but they break down so slowly that they will not help your plants this season, or even next season.</p></div></div></div>";

window.AH_GRAPHICS["garden-myth-hardpan-soil-cant-be-fixed-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Hardpan Soil in California Can't Be Fixed</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Hardpan is a real challenge, but it can be broken through, amended over time, or worked around with raised beds and proper plant selection.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-heirloom-varieties-always-taste-better-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#c9a84c !important;color:#1a3b2a !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: PARTIALLY TRUE</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Heirloom Varieties Always Taste Better Than Hybrids</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Many heirlooms are bred for flavor, but some hybrids match or beat them in blind taste tests.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-marigolds-repel-all-pests-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: MOSTLY BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Marigolds Repel All Garden Pests</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Marigolds suppress root-knot nematodes when grown as a cover crop, but they do not repel most above-ground pests.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-midday-watering-burns-leaves-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Watering in the Middle of the Day Burns Leaves</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Water droplets on leaves do not act as magnifying glasses and do not burn foliage. There are practical reasons to avoid midday watering, but leaf scorch is not one of them.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-more-fertilizer-means-more-fruit-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">More Fertilizer Means More Fruit</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Over-fertilizing is one of the most common mistakes in home gardens. Too much fertilizer, especially nitrogen, produces lush foliage at the expense of fruit and can damage your plants and soil.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-mulch-attracts-termites-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#c9a84c !important;color:#1a3b2a !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: PARTIALLY TRUE</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Mulch Attracts Termites</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Mulch does not attract termites from a distance, but thick mulch against your home's foundation can create conditions termites exploit.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-must-rotate-crops-home-garden-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#c9a84c !important;color:#1a3b2a !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: PARTIALLY TRUE</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Need to Rotate Crops in a Home Garden</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Crop rotation is excellent advice for farms and large gardens, but in a typical backyard bed, the distances involved are too small to make a meaningful difference for most pest and disease issues.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-must-start-seeds-indoors-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#c9a84c !important;color:#1a3b2a !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: PARTIALLY TRUE</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Have to Start Seeds Indoors to Get a Good Harvest</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Some warm-season crops benefit from an indoor head start in California, but many vegetables grow just as well (or better) from direct sowing. You do not need grow lights and seed trays to have a productive garden.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-native-gardens-look-messy-brown-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">California Native Gardens Look Messy and Brown</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Well-designed native gardens are vibrant, colorful, and structured. The \"messy and brown\" reputation comes from poorly planned installations and summer dormancy misunderstandings.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-need-big-yard-to-grow-food-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Need a Big Yard to Grow Your Own Food</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You can grow a surprising amount of food in a small space. A 4x8-foot raised bed, a few containers on a patio, or even a sunny balcony can produce meaningful harvests.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-need-compost-tumbler-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Need a Compost Tumbler to Make Good Compost</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Compost tumblers are convenient but not necessary. A simple pile, bin, or even a trench in the ground produces compost just as well.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-need-expensive-soil-to-start-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Need Expensive Soil to Start a Garden</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Good gardening starts with improving the soil you already have, and the best amendments are often the cheapest: compost, mulch, and time.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-neem-oil-safe-for-everything-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Neem Oil Is Safe to Spray on Everything</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Neem oil can burn plants in heat, harm beneficial insects, and is toxic to aquatic organisms.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-pine-needles-too-acidic-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Pine Needles Make Soil Too Acidic for Most Plants</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Pine needle mulch has a negligible effect on soil pH. Fresh needles are slightly acidic, but they neutralize as they decompose.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-planting-by-moon-phases-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: MOSTLY BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Planting by Moon Phases Improves Yields</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">There is no reliable scientific evidence that moon phases affect plant growth or harvest yields. Soil temperature, moisture, and planting timing matter far more than lunar cycles.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-potting-soil-lasts-forever-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Potting Soil Lasts Forever and Never Needs Replacing</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Potting soil breaks down over time, losing its structure, drainage capacity, and nutrients. Most container mixes need refreshing every 1 to 2 years.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-prune-fruit-trees-perfect-vase-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#c9a84c !important;color:#1a3b2a !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: PARTIALLY TRUE</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Should Prune Fruit Trees Into a Perfect Vase Shape</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Open-center (vase) pruning works well for stone fruits, but it is not the right form for every fruit tree, and perfection is not the goal.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-pulling-weeds-makes-more-grow-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: MOSTLY BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Pulling Weeds Always Makes More Weeds Grow</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Pulling weeds does not create new weeds, but disturbing soil can bring buried seeds to the surface where they germinate.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-remove-all-fallen-leaves-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Should Remove All Fallen Leaves From Your Garden</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Fallen leaves are one of the best free resources your garden produces. Removing them all wastes organic matter and harms soil life.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-rocks-in-bottom-of-pots-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Rocks in the Bottom of Pots Improve Drainage</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Rocks at the bottom of a container do not improve drainage. They actually raise the water table inside the pot, keeping roots wetter than they would be without the rocks.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-rusty-nails-help-plants-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Rusty Nails in Soil Help Plants Grow</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Iron from rusty nails is not available to plants in any meaningful way. This old folk remedy does not address actual iron deficiency and can introduce contaminants to your soil.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-seal-pruning-cuts-wound-paste-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Should Seal Pruning Cuts With Wound Paste</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Wound sealers do not help trees heal and can actually trap moisture and pathogens under the seal.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-succulents-zero-maintenance-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Succulents Need Zero Maintenance</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Succulents are low-maintenance, not no-maintenance. They still need appropriate watering, good drainage, pest management, and occasional care.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-sugar-water-helps-transplant-shock-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Sugar Water Helps Transplant Shock</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Plants cannot absorb sugar through their roots in any useful way. Sugar water does nothing for transplant shock and may actually feed harmful soil pathogens.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-till-soil-every-spring-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: MOSTLY BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Need to Till Your Soil Every Spring</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Routine tilling destroys soil structure, kills beneficial organisms, and can actually make your soil worse over time. Most home gardens do not need annual tilling.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-vinegar-safe-effective-herbicide-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: MOSTLY BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Vinegar Is a Safe and Effective Herbicide</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Household vinegar burns leaf tissue on contact but does not kill roots, and horticultural-strength vinegar is a serious safety hazard.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-water-every-day-california-summers-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: MOSTLY BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Should Water Every Day During California Summers</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Daily watering is rarely necessary and often counterproductive. Most established garden plants do best with deeper, less frequent irrigation, even in our dry summers.</p></div></div></div>";
window.AH_GRAPHICS["garden-myth-water-lawn-every-day-summer-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat',system-ui,sans-serif;border:1px solid #dde2d8 !important;border-radius:10px;overflow:hidden;\"><div style=\"background-color:#1a3b2a !important;padding:16px 22px;text-align:center;\"><p style=\"margin:0;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#c9a84c !important;font-weight:700;\">Myth vs. Reality</p><span style=\"display:inline-block;margin-top:8px;background-color:#b8694a !important;color:#f8f9f0 !important;font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:5px 15px;border-radius:999px;\">Verdict: BUSTED</span></div><div style=\"background-color:#f8f9f0 !important;padding:20px 22px;\"><div style=\"border-left:4px solid #b8694a !important;padding:2px 0 2px 15px;margin-bottom:16px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#b8694a !important;font-weight:700;\">The Myth</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">You Should Water Your Lawn Every Day in Summer</p></div><div style=\"border-left:4px solid #1a3b2a !important;padding:2px 0 2px 15px;\"><p style=\"margin:0 0 5px 0;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#1a3b2a !important;font-weight:700;\">The Reality</p><p style=\"margin:0;font-size:0.98rem;color:#3a3a3a !important;line-height:1.5;\">Daily shallow watering weakens grass roots, wastes water, and encourages disease. Most California lawns perform better with deep, infrequent watering.</p></div></div></div>";
