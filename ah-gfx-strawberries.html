window.AH_GRAPHICS["june-bearing-vs-day-neutral-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">June-Bearing vs Day-Neutral Strawberries</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Which type fits your California garden?</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-right: none;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">June-Bearing</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Harvest Pattern</div>\n                        <div style=\"font-size: 0.9rem; color: #1a3b2a !important; font-weight: 600;\">One large flush, 3 to 4 weeks in spring</div>\n                    </div>\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Best For</div>\n                        <div style=\"font-size: 0.9rem; color: #1a3b2a !important;\">Jam making, freezing, preserving</div>\n                    </div>\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Runner Production</div>\n                        <div style=\"font-size: 0.9rem; color: #1a3b2a !important;\">Many runners (fills a bed quickly)</div>\n                    </div>\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">First-Year Flowers</div>\n                        <div style=\"font-size: 0.9rem; color: #1a3b2a !important;\">Remove all first-year flowers</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Top Varieties</div>\n                        <div style=\"display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;\">\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Chandler</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Camarosa</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Sequoia</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1.1rem; margin: 0; color: #f8f9f0 !important;\">Day-Neutral</h3>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Harvest Pattern</div>\n                        <div style=\"font-size: 0.9rem; color: #1a3b2a !important; font-weight: 600;\">Continuous, spring through fall (6+ months)</div>\n                    </div>\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Best For</div>\n                        <div style=\"font-size: 0.9rem; color: #1a3b2a !important;\">Fresh eating, daily snacking, steady supply</div>\n                    </div>\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Runner Production</div>\n                        <div style=\"font-size: 0.9rem; color: #1a3b2a !important;\">Fewer runners (stays contained)</div>\n                    </div>\n                    <div style=\"margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #dde2d8;\">\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">First-Year Flowers</div>\n                        <div style=\"font-size: 0.9rem; color: #1a3b2a !important;\">Remove for first 6 weeks only</div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;\">Top Varieties</div>\n                        <div style=\"display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;\">\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Albion</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Seascape</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">San Andreas</span>\n                            <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 10px; font-size: 0.75rem; border-radius: 3px;\">Monterey</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n        <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin-top: 20px; border-radius: 0 6px 6px 0;\">\n            <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">For most California home gardeners:</strong>\n            <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Day-neutral varieties are the best choice. You get 6+ months of continuous harvest with less work. Plant a few June-bearers alongside if you want berries for jam.</span>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC Davis Strawberry Center\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["strawberry-care-at-a-glance"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Growing Strawberries in Santa Cruz: At a Glance</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Quick reference for essential growing conditions</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Sun</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">6 to 8 hours</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Full sun, morning sun ideal</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Soil pH</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">5.5 to 6.8</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Slightly acidic to neutral</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Spacing</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">12 to 18 inches</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Between plants in rows</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Water</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">1 to 1.5 inches/week</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Drip irrigation preferred</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Fertilizer</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">Monthly</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Balanced (10-10-10) or berry formula</div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 18px; text-align: center;\">\n                <div style=\"font-size: 0.7rem; color: #8c9c8c !important; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;\">Mulch</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #1a3b2a !important;\">2 to 3 inches of straw</div>\n                <div style=\"font-size: 0.8rem; color: #1c3c2c !important; margin-top: 4px;\">Keeps fruit clean, retains moisture</div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC ANR, UC Master Gardener Program\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["strawberry-year-round-care-calendar"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Strawberry Year-Round Care Calendar</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Seasonal tasks for Santa Cruz County</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Season</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Key Tasks</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Watch For</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fall<br><span style=\"font-weight: 400; font-size: 0.8rem; color: #8c9c8c !important;\">Oct - Nov</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Plant bare-root and transplants. Prepare beds with compost. Mulch with straw. Begin monthly fertilizing.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Crown rot from overwatering. Slugs and snails active in rain.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Winter<br><span style=\"font-weight: 400; font-size: 0.8rem; color: #8c9c8c !important;\">Dec - Feb</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Plants establish roots. Reduce watering (rain provides). Remove dead leaves. Pinch early flowers on new plants.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Frost damage on flowers (rare on coast). Botrytis in wet spells.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Spring<br><span style=\"font-weight: 400; font-size: 0.8rem; color: #8c9c8c !important;\">Mar - May</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Peak flowering and fruiting begins. Fertilize monthly. Resume regular watering as rains stop. Harvest ripe berries every 2 to 3 days.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Powdery mildew in fog. Birds pecking ripe fruit. Aphids on new growth.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Summer<br><span style=\"font-weight: 400; font-size: 0.8rem; color: #8c9c8c !important;\">Jun - Sep</span></td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Day-neutrals continue fruiting. Manage runners (pin or remove). Deep water in heat. Last fertilizer by September. Renovate beds if needed.</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Spider mites in hot weather. Leaf scorch from heat. Fruit sunburn inland.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Day-neutral varieties fruit spring through fall. June-bearers produce one big harvest in spring, then focus on runner production through summer.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["growing-method-comparison-pros-and-cons"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Strawberry Growing Methods Compared</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">In-ground, raised beds, and containers side by side</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">In-Ground</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <div style=\"margin-bottom: 14px;\">\n                        <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px;\">Advantages</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6;\">\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; Lowest startup cost</div>\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; Runners spread freely</div>\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; Less watering needed</div>\n                            <div style=\"padding: 4px 0;\">&#10003; Best for large plantings</div>\n                        </div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8b4444 !important; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px;\">Drawbacks</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6;\">\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10007; Soil disease risk higher</div>\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10007; More slug and snail damage</div>\n                            <div style=\"padding: 4px 0;\">&#10007; Harder to manage weeds</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Raised Beds</h3>\n                    <div style=\"font-size: 0.7rem; color: #f8f9f0 !important; margin-top: 4px; opacity: 0.9;\">Recommended for most gardeners</div>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <div style=\"margin-bottom: 14px;\">\n                        <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px;\">Advantages</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6;\">\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; Better drainage and soil control</div>\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; Warmer soil (earlier harvest)</div>\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; Easier to weed and harvest</div>\n                            <div style=\"padding: 4px 0;\">&#10003; Reduced slug access</div>\n                        </div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8b4444 !important; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px;\">Drawbacks</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6;\">\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10007; Initial cost for materials</div>\n                            <div style=\"padding: 4px 0;\">&#10007; Dries out faster than ground</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 14px 18px; text-align: center;\">\n                    <h3 style=\"font-weight: 700; font-size: 1rem; margin: 0; color: #f8f9f0 !important;\">Containers</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <div style=\"margin-bottom: 14px;\">\n                        <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px;\">Advantages</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6;\">\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; No yard or garden bed needed</div>\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; Move to follow sun</div>\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; Almost no slug problems</div>\n                            <div style=\"padding: 4px 0;\">&#10003; Perfect for patios/balconies</div>\n                        </div>\n                    </div>\n                    <div>\n                        <div style=\"font-size: 0.7rem; color: #8b4444 !important; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px;\">Drawbacks</div>\n                        <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.6;\">\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10007; Needs frequent watering</div>\n                            <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10007; Lower total yield per plant</div>\n                            <div style=\"padding: 4px 0;\">&#10007; Needs more frequent fertilizing</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC ANR, UC Master Gardener Program\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["container-sizing-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Container Sizing Guide for Strawberries</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">How many plants fit each container type</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Container Type</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Minimum Size</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Plants per Container</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Best For</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Hanging basket</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">12 inches wide</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">3 to 4</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Small patios, visual display</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Window box</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">24 inches long, 8 inches deep</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">4 to 6</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Railings, window sills</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Standard pot</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">16 to 18 inches wide</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">4 to 6</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Decks, patios, balconies</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Strawberry jar</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">12 to 14 inches wide</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">8 to 12 (in pockets)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Vertical growing, small spaces</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Half wine barrel</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">24 to 26 inches wide</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">8 to 10</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Highest yield per container</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Grow bag</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">5 to 10 gallon</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">3 to 6</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Budget option, easy to store</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0; border-radius: 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Key rule:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Every container must have drainage holes. Use potting mix (never garden soil). Water containers daily in summer; they dry out much faster than beds.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["raised-bed-setup-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Raised Bed Strawberry Setup Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Everything you need before planting day</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 20px;\">1</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Bed dimensions: 8 to 10 inches deep minimum</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Strawberry roots are shallow but need good drainage. 4 feet wide makes all plants reachable from both sides.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 20px;\">2</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Location: Full sun (6+ hours)</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Morning sun is especially important for drying dew and preventing fungal disease. Avoid low spots where frost pools.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 20px;\">3</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Soil mix: 60% quality compost, 40% garden soil</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Target pH 5.5 to 6.8. Mix in 1 cup balanced organic fertilizer per 4 feet of bed length.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 20px;\">4</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Irrigation: Drip line or soaker hose installed</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Avoid overhead watering. Wet foliage promotes Botrytis and powdery mildew in coastal gardens.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 20px;\">5</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Spacing: 12 to 18 inches between plants</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Good air circulation is essential for disease prevention. A 4x8 bed fits 18 to 24 plants.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 14px 18px; border-left: 4px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <span style=\"color: #1a3b2a !important; font-weight: 700; font-size: 1.1rem; min-width: 20px;\">6</span>\n                <div><strong style=\"color: #1a3b2a !important;\">Mulch: 2 to 3 inches of straw after planting</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Keeps fruit clean, retains moisture, and suppresses weeds. Straw (not hay, which contains weed seeds).</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC Master Gardener Program, UC ANR\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["bare-root-planting-step-by-step"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Planting Bare-Root Strawberries: Step by Step</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Get the crown depth right for healthy plants</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n            <div style=\"background-color: #fff !important; padding: 16px 20px; border-left: 5px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;\">1</div>\n                <div><strong style=\"color: #1a3b2a !important;\">Soak roots for 30 to 60 minutes before planting</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Place bare roots in a bucket of room-temperature water. Do not soak longer than one hour. Trim any roots longer than 5 inches.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px 20px; border-left: 5px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;\">2</div>\n                <div><strong style=\"color: #1a3b2a !important;\">Dig a hole wide enough to spread roots</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Make a small mound at the bottom of the hole. Drape roots over the mound so they fan outward and downward.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px 20px; border-left: 5px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;\">3</div>\n                <div><strong style=\"color: #1a3b2a !important;\">Set crown at soil level (this is critical)</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">The crown (where roots meet leaves) must sit exactly at the soil surface. Too deep causes crown rot. Too high exposes roots and dries out the plant.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px 20px; border-left: 5px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;\">4</div>\n                <div><strong style=\"color: #1a3b2a !important;\">Backfill and firm soil gently around roots</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Press soil firmly but do not compact it. Eliminate air pockets around the roots without crushing them.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px 20px; border-left: 5px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;\">5</div>\n                <div><strong style=\"color: #1a3b2a !important;\">Water deeply immediately after planting</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Soak the soil around each plant. Check crown level again after watering; soil may settle and expose roots.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px 20px; border-left: 5px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;\">6</div>\n                <div><strong style=\"color: #1a3b2a !important;\">Mulch with 2 to 3 inches of straw</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Keep mulch away from the crown itself. Mulch suppresses weeds, retains moisture, and keeps future fruit clean.</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0; border-radius: 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">The #1 bare-root mistake:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Planting too deep. If you can see the crown sitting just at the soil surface, you have it right. If any part of the crown is buried, pull it up slightly before the soil settles.</span>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center; border-top: 1px solid #c5ccc0;\">\n        Source: UC ANR Publication 3468, UC Master Gardener Program\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["bare-root-vs-potted-transplant-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Bare-Root vs Potted Transplants</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Which starting method works best for your situation</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Factor</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Bare-Root</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Potted Transplant</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Cost per plant</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">$1 to $3</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">$4 to $8</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Variety selection</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Widest choice (mail order)</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Limited to nursery stock</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Planting window</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Fall only (Oct to Nov on coast)</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Fall through spring</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Transplant shock</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Moderate (roots need to establish)</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Minimal (roots already growing)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Skill level needed</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Moderate (crown depth matters)</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Easy (plant at same level as pot)</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Best for</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Large plantings, specific varieties, budget</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Beginners, small plantings, late starts</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC ANR, UC Master Gardener Program\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["post-planting-care-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">First 12 Weeks After Planting Bare-Root Strawberries</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What to do and what to expect</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 0;\">\n            <div style=\"display: flex; gap: 16px; align-items: stretch;\">\n                <div style=\"display: flex; flex-direction: column; align-items: center; min-width: 40px;\">\n                    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; flex-shrink: 0;\">Wk 1</div>\n                    <div style=\"width: 2px; flex-grow: 1; background-color: #1a3b2a !important;\"></div>\n                </div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 14px 18px; flex-grow: 1; margin-bottom: 10px; border-radius: 6px;\">\n                    <strong style=\"color: #1a3b2a !important;\">Weeks 1 to 2: Establishment</strong><br>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Water daily for the first week, then every 2 to 3 days. Plants may look wilted; this is normal.</span>\n                </div>\n            </div>\n            <div style=\"display: flex; gap: 16px; align-items: stretch;\">\n                <div style=\"display: flex; flex-direction: column; align-items: center; min-width: 40px;\">\n                    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; flex-shrink: 0;\">Wk 3</div>\n                    <div style=\"width: 2px; flex-grow: 1; background-color: #1a3b2a !important;\"></div>\n                </div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 14px 18px; flex-grow: 1; margin-bottom: 10px; border-radius: 6px;\">\n                    <strong style=\"color: #1a3b2a !important;\">Weeks 3 to 4: New Growth</strong><br>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Fresh green leaves emerge. Remove any flowers. Begin slug patrol.</span>\n                </div>\n            </div>\n            <div style=\"display: flex; gap: 16px; align-items: stretch;\">\n                <div style=\"display: flex; flex-direction: column; align-items: center; min-width: 40px;\">\n                    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; flex-shrink: 0;\">Wk 5</div>\n                    <div style=\"width: 2px; flex-grow: 1; background-color: #1a3b2a !important;\"></div>\n                </div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 14px 18px; flex-grow: 1; margin-bottom: 10px; border-radius: 6px;\">\n                    <strong style=\"color: #1a3b2a !important;\">Weeks 5 to 6: Active Growth</strong><br>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Multiple leaf clusters. Last flower pinch for day-neutrals. First fertilizer dose.</span>\n                </div>\n            </div>\n            <div style=\"display: flex; gap: 16px; align-items: stretch;\">\n                <div style=\"display: flex; flex-direction: column; align-items: center; min-width: 40px;\">\n                    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; flex-shrink: 0;\">Wk 7</div>\n                    <div style=\"width: 2px; flex-grow: 1; background-color: #1a3b2a !important;\"></div>\n                </div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 14px 18px; flex-grow: 1; margin-bottom: 10px; border-radius: 6px;\">\n                    <strong style=\"color: #1a3b2a !important;\">Weeks 7 to 8: Day-Neutrals Can Flower</strong><br>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Stop removing flowers on day-neutrals. June-bearers: keep removing all year one.</span>\n                </div>\n            </div>\n            <div style=\"display: flex; gap: 16px; align-items: flex-start;\">\n                <div style=\"display: flex; flex-direction: column; align-items: center; min-width: 40px;\">\n                    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.7rem; flex-shrink: 0;\">Wk12</div>\n                </div>\n                <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 14px 18px; flex-grow: 1; border-radius: 6px;\">\n                    <strong style=\"color: #1a3b2a !important;\">Weeks 10 to 12: First Harvest</strong><br>\n                    <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Day-neutrals produce first ripe berries. Harvest every 2 to 3 days. Pin 2 to 3 runners to root new plants.</span>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC ANR Publication 3468, UC Davis Strawberry Center\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["strawberry-growth-stages-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Strawberry Growth Stages: From Planting to Harvest</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What to expect at each stage of development</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;\">\n                    <span style=\"color: #f8f9f0 !important; font-weight: 700; font-size: 0.9rem;\">Stage 1</span>\n                    <span style=\"color: #f8f9f0 !important; font-size: 0.75rem; opacity: 0.9;\">Weeks 1 to 3</span>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px;\">Root Establishment</div>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">New white roots grow from the crown. Plant may look dormant above ground. Keep soil consistently moist but not waterlogged.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;\">\n                    <span style=\"color: #f8f9f0 !important; font-weight: 700; font-size: 0.9rem;\">Stage 2</span>\n                    <span style=\"color: #f8f9f0 !important; font-size: 0.75rem; opacity: 0.9;\">Weeks 3 to 6</span>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px;\">Vegetative Growth</div>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">New leaves emerge from the crown in clusters of three (trifoliate). Plant builds energy reserves. Remove any flowers during this stage.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;\">\n                    <span style=\"color: #f8f9f0 !important; font-weight: 700; font-size: 0.9rem;\">Stage 3</span>\n                    <span style=\"color: #f8f9f0 !important; font-size: 0.75rem; opacity: 0.9;\">Weeks 6 to 10</span>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px;\">Flowering</div>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">White flowers with yellow centers appear. Each flower can become one berry. Pollination via bees, wind, and gravity. Poor pollination causes misshapen fruit.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;\">\n                    <span style=\"color: #f8f9f0 !important; font-weight: 700; font-size: 0.9rem;\">Stage 4</span>\n                    <span style=\"color: #f8f9f0 !important; font-size: 0.75rem; opacity: 0.9;\">Weeks 8 to 12</span>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px;\">Fruit Development</div>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Green berries form and enlarge over 4 to 6 weeks. Color progresses: green, white, pink, red. Harvest when fully red. About 30 days from flower to ripe fruit.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;\">\n                    <span style=\"color: #f8f9f0 !important; font-weight: 700; font-size: 0.9rem;\">Stage 5</span>\n                    <span style=\"color: #f8f9f0 !important; font-size: 0.75rem; opacity: 0.9;\">Ongoing</span>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px;\">Runner Production</div>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Long stems (stolons) grow outward with daughter plants at tips. Pin runners to root new plants, or trim to redirect energy to fruiting.</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;\">\n                    <span style=\"color: #f8f9f0 !important; font-weight: 700; font-size: 0.9rem;\">Stage 6</span>\n                    <span style=\"color: #f8f9f0 !important; font-size: 0.75rem; opacity: 0.9;\">Year 2 to 3</span>\n                </div>\n                <div style=\"padding: 14px;\">\n                    <div style=\"font-weight: 600; color: #1a3b2a !important; margin-bottom: 6px;\">Maturity and Decline</div>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0; line-height: 1.5;\">Plants peak in year 2. By year 3 to 4, production declines. Replace with daughter plants or new stock every 2 to 3 years.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC Davis Strawberry Center, UC ANR Publication 3468\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["healthy-vs-unhealthy-signs-at-each-stage"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Healthy vs Unhealthy: What to Look For</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Spot problems early at each growth stage</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Stage</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Healthy Signs</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Warning Signs</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Root establishment</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Crown firm, slight new growth at center</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Mushy crown, black roots, foul smell (crown rot)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Vegetative growth</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Bright green trifoliate leaves, upright habit</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Yellowing leaves, stunted growth, wilting in morning</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Flowering</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Multiple white flowers, petals fully open</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Black flower centers (frost), few flowers (insufficient light)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fruit development</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Uniform size, even color change green to red</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Misshapen fruit (poor pollination), gray fuzz (Botrytis)</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Runner production</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Runners with healthy daughter plants at tips</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Excessive runners, no fruit (too much nitrogen)</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC IPM, UC Master Gardener Program\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["flower-to-fruit-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">From Flower to Ripe Berry: 28 to 35 Days</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What happens inside the berry at each stage</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 450px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Day</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Stage</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">What Is Happening</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important;\">1</td>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Pollination</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Bees visit the open flower. Each seed on the surface must be individually pollinated.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important;\">5</td>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Petals drop</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Receptacle swells. Tiny green seeds become visible on the surface of the developing berry.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important;\">14</td>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Full size, green</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Berry reaches close to full size but remains hard and green. Sugar content still very low.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important;\">21</td>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Color change</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Berry softens, turns white then pink. Sugars and aromatic compounds accumulate. Color progresses from tip to shoulders.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important;\">28 to 35</td>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fully ripe</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Uniformly deep red with no white shoulders. Peak sugar and aroma. Harvest in the morning when berries are cool.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC Davis Strawberry Center\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["top-8-strawberry-mistakes-do-don-t"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">8 Most Common Strawberry Mistakes</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What new gardeners get wrong (and how to fix it)</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0; background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"padding: 12px 16px; border-right: 1px solid #dde2d8; background-color: #f0e6e6 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #8b4444 !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10007; Mistake</div>\n                    <div style=\"font-size: 0.85rem; color: #1a3b2a !important; font-weight: 600;\">Planting crown too deep</div>\n                </div>\n                <div style=\"padding: 12px 16px; background-color: #e8f0e8 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10003; Fix</div>\n                    <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Crown sits exactly at soil surface level</div>\n                </div>\n            </div>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0; background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"padding: 12px 16px; border-right: 1px solid #dde2d8; background-color: #f0e6e6 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #8b4444 !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10007; Mistake</div>\n                    <div style=\"font-size: 0.85rem; color: #1a3b2a !important; font-weight: 600;\">Watering overhead</div>\n                </div>\n                <div style=\"padding: 12px 16px; background-color: #e8f0e8 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10003; Fix</div>\n                    <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Use drip irrigation or water at the base</div>\n                </div>\n            </div>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0; background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"padding: 12px 16px; border-right: 1px solid #dde2d8; background-color: #f0e6e6 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #8b4444 !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10007; Mistake</div>\n                    <div style=\"font-size: 0.85rem; color: #1a3b2a !important; font-weight: 600;\">Letting first-year plants fruit immediately</div>\n                </div>\n                <div style=\"padding: 12px 16px; background-color: #e8f0e8 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10003; Fix</div>\n                    <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Pinch flowers for first 4 to 6 weeks</div>\n                </div>\n            </div>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0; background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"padding: 12px 16px; border-right: 1px solid #dde2d8; background-color: #f0e6e6 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #8b4444 !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10007; Mistake</div>\n                    <div style=\"font-size: 0.85rem; color: #1a3b2a !important; font-weight: 600;\">Planting in old tomato/pepper soil</div>\n                </div>\n                <div style=\"padding: 12px 16px; background-color: #e8f0e8 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10003; Fix</div>\n                    <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Avoid beds where nightshades grew within 3 years</div>\n                </div>\n            </div>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0; background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"padding: 12px 16px; border-right: 1px solid #dde2d8; background-color: #f0e6e6 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #8b4444 !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10007; Mistake</div>\n                    <div style=\"font-size: 0.85rem; color: #1a3b2a !important; font-weight: 600;\">Crowding plants too close together</div>\n                </div>\n                <div style=\"padding: 12px 16px; background-color: #e8f0e8 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10003; Fix</div>\n                    <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Space 12 to 18 inches apart for air flow</div>\n                </div>\n            </div>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0; background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"padding: 12px 16px; border-right: 1px solid #dde2d8; background-color: #f0e6e6 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #8b4444 !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10007; Mistake</div>\n                    <div style=\"font-size: 0.85rem; color: #1a3b2a !important; font-weight: 600;\">No mulch around plants</div>\n                </div>\n                <div style=\"padding: 12px 16px; background-color: #e8f0e8 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10003; Fix</div>\n                    <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">2 to 3 inches of straw (keeps fruit clean)</div>\n                </div>\n            </div>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0; background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"padding: 12px 16px; border-right: 1px solid #dde2d8; background-color: #f0e6e6 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #8b4444 !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10007; Mistake</div>\n                    <div style=\"font-size: 0.85rem; color: #1a3b2a !important; font-weight: 600;\">Ignoring runners entirely</div>\n                </div>\n                <div style=\"padding: 12px 16px; background-color: #e8f0e8 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10003; Fix</div>\n                    <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Pin 2 to 3 runners to root, trim the rest</div>\n                </div>\n            </div>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0; background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"padding: 12px 16px; border-right: 1px solid #dde2d8; background-color: #f0e6e6 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #8b4444 !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10007; Mistake</div>\n                    <div style=\"font-size: 0.85rem; color: #1a3b2a !important; font-weight: 600;\">Keeping plants too many years</div>\n                </div>\n                <div style=\"padding: 12px 16px; background-color: #e8f0e8 !important;\">\n                    <div style=\"font-size: 0.7rem; color: #1a3b2a !important; text-transform: uppercase; font-weight: 600; margin-bottom: 4px;\">&#10003; Fix</div>\n                    <div style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Replace every 2 to 3 years with fresh plants</div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC Master Gardener Program, UC ANR\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
