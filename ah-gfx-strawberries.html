window.AH_GRAPHICS["strawberries-planting-day-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Strawberry Planting Day Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Do not skip these steps for a successful start</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n            <div style=\"background-color: #fff !important; padding: 12px 16px; border: 1px solid #dde2d8; display: flex; gap: 12px; align-items: center;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #1a3b2a; border-radius: 4px; flex-shrink: 0;\"></div>\n                <div><strong style=\"color: #1a3b2a !important;\">Soil test completed</strong><span style=\"font-size: 0.85rem; color: #8c9c8c !important;\"> (target pH 5.5 to 6.8)</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 12px 16px; border: 1px solid #dde2d8; display: flex; gap: 12px; align-items: center;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #1a3b2a; border-radius: 4px; flex-shrink: 0;\"></div>\n                <div><strong style=\"color: #1a3b2a !important;\">Bed amended with compost</strong><span style=\"font-size: 0.85rem; color: #8c9c8c !important;\"> (2 to 4 inches worked in)</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 12px 16px; border: 1px solid #dde2d8; display: flex; gap: 12px; align-items: center;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #1a3b2a; border-radius: 4px; flex-shrink: 0;\"></div>\n                <div><strong style=\"color: #1a3b2a !important;\">Drip irrigation installed</strong><span style=\"font-size: 0.85rem; color: #8c9c8c !important;\"> (no overhead sprinklers)</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 12px 16px; border: 1px solid #dde2d8; display: flex; gap: 12px; align-items: center;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #1a3b2a; border-radius: 4px; flex-shrink: 0;\"></div>\n                <div><strong style=\"color: #1a3b2a !important;\">Plants spaced 12 to 18 inches apart</strong><span style=\"font-size: 0.85rem; color: #8c9c8c !important;\"> (mark spots first)</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 12px 16px; border: 1px solid #dde2d8; display: flex; gap: 12px; align-items: center;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #1a3b2a; border-radius: 4px; flex-shrink: 0;\"></div>\n                <div><strong style=\"color: #1a3b2a !important;\">Crown at soil level</strong><span style=\"font-size: 0.85rem; color: #8c9c8c !important;\"> (check again after watering)</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 12px 16px; border: 1px solid #dde2d8; display: flex; gap: 12px; align-items: center;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #1a3b2a; border-radius: 4px; flex-shrink: 0;\"></div>\n                <div><strong style=\"color: #1a3b2a !important;\">Watered deeply after planting</strong><span style=\"font-size: 0.85rem; color: #8c9c8c !important;\"> (soil moist 6 inches down)</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 12px 16px; border: 1px solid #dde2d8; display: flex; gap: 12px; align-items: center;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #1a3b2a; border-radius: 4px; flex-shrink: 0;\"></div>\n                <div><strong style=\"color: #1a3b2a !important;\">Straw mulch applied, 2 to 3 inches</strong><span style=\"font-size: 0.85rem; color: #8c9c8c !important;\"> (keep clear of crown)</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 12px 16px; border: 1px solid #dde2d8; display: flex; gap: 12px; align-items: center;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #1a3b2a; border-radius: 4px; flex-shrink: 0;\"></div>\n                <div><strong style=\"color: #1a3b2a !important;\">Slug bait set (iron phosphate)</strong><span style=\"font-size: 0.85rem; color: #8c9c8c !important;\"> (especially coastal gardens)</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["year-1-vs-year-2-expectations"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">What to Expect: Year 1 vs Year 2</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Your best harvest comes in the second year</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 450px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Factor</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Year 1</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Year 2 (Peak)</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Fruit yield per plant</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">0.25 to 0.5 lb</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important; font-weight: 600;\">1 to 2 lb</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Berry size</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Small to medium</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important; font-weight: 600;\">Full size for variety</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Plant focus</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Root and crown development</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important; font-weight: 600;\">Maximum fruit production</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Runner production</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Moderate (root 2 to 3)</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Heavy (trim most)</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Your main job</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important;\">Pinch flowers, manage runners</td>\n                    <td style=\"padding: 10px 15px; text-align: center; color: #1c3c2c !important; font-weight: 600;\">Harvest, fertilize, enjoy</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0; border-radius: 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Patience pays off:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> New gardeners often feel disappointed by year-one yields. This is normal. The plant is investing in roots and crown development that produce a much larger harvest in year two.</span>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center; border-top: 1px solid #c5ccc0;\">\n        Source: UC ANR, UC Davis Strawberry Center\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["strawberry-problem-diagnosis-table"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Strawberry Problem Diagnosis Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Identify and solve the most common California strawberry problems</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 700px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Problem</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Symptoms</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Organic Solution</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem;\">Prevention</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Gray mold (Botrytis)</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Fuzzy gray mold on berries, especially after rain</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Remove infected fruit immediately. Improve air circulation.</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Space plants 12 inches apart. Mulch with straw. Water at base only.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Powdery mildew</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">White powdery coating on leaves, curled edges</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Neem oil spray. Potassium bicarbonate solution.</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Choose resistant varieties (Albion, San Andreas). Good air flow.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Slugs and snails</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Irregular holes in fruit, slime trails</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Iron phosphate bait (Sluggo). Beer traps. Hand-pick at dusk.</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Straw mulch. Copper tape on raised beds. Remove debris.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Birds</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Pecked and partially eaten ripe fruit</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Bird netting over hoops. Reflective tape.</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Install netting before fruit colors. Secure edges to ground.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Verticillium wilt</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Wilting outer leaves, browning, plant collapse</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Remove and destroy infected plants. Do not compost.</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Plant resistant varieties. Avoid beds where nightshades grew.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Spider mites</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Stippled, bronzed leaves. Fine webbing on undersides.</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Strong water spray to undersides. Release predatory mites.</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Keep plants well-watered. Avoid dusty conditions.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px; font-weight: 600; color: #1a3b2a !important;\">Leaf scorch</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Brown, crispy leaf edges, especially in summer</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Deep water to flush salts. Shade cloth during heat waves.</td>\n                    <td style=\"padding: 10px; color: #1c3c2c !important; font-size: 0.85rem;\">Mulch heavily. Water consistently. Use drip irrigation.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC IPM, UC Davis Strawberry Center\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["symptom-based-diagnostic-flowchart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">What Is Wrong With My Strawberry Plant?</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Start with the symptom you see, then follow to the likely cause</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 16px 20px; border-left: 5px solid #1a3b2a;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">Symptom: Fruit has fuzzy gray or white coating</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; padding-left: 16px; border-left: 2px solid #dde2d8;\">\n                    <div style=\"margin-bottom: 6px;\"><strong style=\"color: #1a3b2a !important;\">Gray fuzz:</strong> Botrytis (gray mold). Remove infected fruit. Improve spacing and air flow. Water only at the base.</div>\n                    <div><strong style=\"color: #1a3b2a !important;\">White powder on leaves:</strong> Powdery mildew. Apply neem oil. Choose resistant varieties next season (Albion, San Andreas).</div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 16px 20px; border-left: 5px solid #1a3b2a;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">Symptom: Holes or damage in fruit</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; padding-left: 16px; border-left: 2px solid #dde2d8;\">\n                    <div style=\"margin-bottom: 6px;\"><strong style=\"color: #1a3b2a !important;\">Irregular holes + slime trails:</strong> Slugs or snails. Apply iron phosphate bait. Hand-pick at dusk. Add copper tape to raised beds.</div>\n                    <div><strong style=\"color: #1a3b2a !important;\">Pecked fruit, no slime:</strong> Birds. Install bird netting over hoops before fruit begins to color.</div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 16px 20px; border-left: 5px solid #1a3b2a;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">Symptom: Leaves yellowing or wilting</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; padding-left: 16px; border-left: 2px solid #dde2d8;\">\n                    <div style=\"margin-bottom: 6px;\"><strong style=\"color: #1a3b2a !important;\">Outer leaves wilt and brown, plant collapses:</strong> Verticillium wilt (soil fungus). Remove infected plants. Do not replant strawberries or nightshades in that spot for 3+ years.</div>\n                    <div style=\"margin-bottom: 6px;\"><strong style=\"color: #1a3b2a !important;\">All leaves yellow evenly:</strong> Nitrogen deficiency or overwatering. Fertilize with balanced fertilizer. Check drainage.</div>\n                    <div><strong style=\"color: #1a3b2a !important;\">Stippled/bronzed leaves with fine webbing:</strong> Spider mites. Spray undersides of leaves with strong water. Release predatory mites for ongoing control.</div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; padding: 16px 20px; border-left: 5px solid #1a3b2a;\">\n                <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 8px;\">Symptom: Misshapen or small fruit</div>\n                <div style=\"font-size: 0.85rem; color: #1c3c2c !important; padding-left: 16px; border-left: 2px solid #dde2d8;\">\n                    <div style=\"margin-bottom: 6px;\"><strong style=\"color: #1a3b2a !important;\">Lumpy, knobby berries:</strong> Poor pollination. Attract more bees with companion plants (borage, alyssum). Avoid pesticide sprays during bloom.</div>\n                    <div><strong style=\"color: #1a3b2a !important;\">Fruit stays very small:</strong> Too many runners draining energy, insufficient fertilizer, or overcrowded plants. Trim excess runners. Fertilize monthly. Thin plants to 12 to 18 inch spacing.</div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC IPM, UC Master Gardener Program\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["disease-resistant-varieties-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Disease-Resistant Strawberry Varieties</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Choose varieties that resist common California problems</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Variety</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Verticillium Wilt</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Powdery Mildew</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Botrytis</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Albion</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Good</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Good</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Moderate</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">San Andreas</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Good</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Good</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Good</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Camarosa</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Moderate</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Moderate</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Good</span></td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Monterey</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Moderate</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Low</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #fff !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Moderate</span></td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Sequoia</td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Low</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Low</span></td>\n                    <td style=\"padding: 10px 15px; text-align: center;\"><span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600;\">Low</span></td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 20px; font-size: 0.8rem; color: #1c3c2c !important;\">\n        <div style=\"display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;\">\n            <span style=\"display: flex; align-items: center; gap: 5px; color: #1c3c2c !important;\"><span style=\"width: 14px; height: 14px; background-color: #1a3b2a !important; border-radius: 2px; display: inline-block;\"></span> Good resistance</span>\n            <span style=\"display: flex; align-items: center; gap: 5px; color: #1c3c2c !important;\"><span style=\"width: 14px; height: 14px; background-color: #8c9c8c !important; border-radius: 2px; display: inline-block;\"></span> Moderate resistance</span>\n            <span style=\"display: flex; align-items: center; gap: 5px; color: #1c3c2c !important;\"><span style=\"width: 14px; height: 14px; background-color: #dde2d8 !important; border-radius: 2px; display: inline-block;\"></span> Low resistance</span>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center; border-top: 1px solid #c5ccc0;\">\n        Source: UC Davis Strawberry Center, UC IPM\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["runner-propagation-step-by-step"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">How to Propagate Strawberries from Runners</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Free plants from your existing strawberry bed</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n            <div style=\"background-color: #fff !important; padding: 16px 20px; border-left: 5px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;\">1</div>\n                <div><strong style=\"color: #1a3b2a !important;\">Select healthy mother plants</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Choose your most vigorous, high-producing plants. Avoid propagating from diseased or weak plants. The daughter will carry the same genetics and potential problems.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px 20px; border-left: 5px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;\">2</div>\n                <div><strong style=\"color: #1a3b2a !important;\">Keep only the first daughter plant on each runner</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">The first daughter plant (closest to the mother) is the strongest. Trim the runner beyond it. Allow 2 to 3 runners per mother plant; remove the rest.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px 20px; border-left: 5px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;\">3</div>\n                <div><strong style=\"color: #1a3b2a !important;\">Pin the daughter plant to soil or a small pot</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Use a U-shaped landscape pin or bent wire to hold the daughter plant's crown against moist soil. You can pin it directly in the bed or into a 4-inch pot filled with potting mix placed next to the mother.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px 20px; border-left: 5px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;\">4</div>\n                <div><strong style=\"color: #1a3b2a !important;\">Keep soil moist around the daughter plant</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Water the pinned daughter plant daily until roots establish (about 3 to 4 weeks). The runner from the mother provides nutrients during this time.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px 20px; border-left: 5px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;\">5</div>\n                <div><strong style=\"color: #1a3b2a !important;\">Cut the runner after roots form (3 to 4 weeks)</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Tug gently on the daughter plant. If it resists, roots have formed. Cut the runner connecting it to the mother plant. The daughter is now independent.</span></div>\n            </div>\n            <div style=\"background-color: #fff !important; padding: 16px 20px; border-left: 5px solid #1a3b2a; border-radius: 0 6px 6px 0; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; min-width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0;\">6</div>\n                <div><strong style=\"color: #1a3b2a !important;\">Transplant to final location</strong><br><span style=\"font-size: 0.85rem; color: #1c3c2c !important;\">Move the rooted daughter to its permanent spot (or keep the pot until fall planting). Space 12 to 18 inches from other plants. Water well and mulch.</span></div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0; border-radius: 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Timing tip:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> The best time to root runners in Santa Cruz County is June through August, when plants produce the most runners. Rooted daughters planted in fall establish before winter and produce a full crop the following spring.</span>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center; border-top: 1px solid #c5ccc0;\">\n        Source: UC ANR, UC Master Gardener Program\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["runner-management-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Runner Management Quick Reference</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">How many runners to keep based on your goal</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 450px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Your Goal</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: center; font-weight: 600; font-size: 0.85rem;\">Runners to Keep</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Why</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Maximum fruit this season</td>\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important;\">0 (remove all)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">All plant energy goes to fruit production instead of runner growth.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Replace aging plants</td>\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important;\">2 to 3 per plant</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Root enough daughters to replace the mother in 2 to 3 years.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Expand your bed</td>\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important;\">4 to 6 per plant</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">More daughters for a larger planting. Accept reduced fruit this season.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Share with friends</td>\n                    <td style=\"padding: 10px 15px; text-align: center; font-weight: 700; color: #1a3b2a !important;\">As many as needed</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; font-size: 0.85rem;\">Root extras in small pots. Fruit production will be reduced on the mother plant.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Always use the first daughter plant on each runner (closest to the mother). It produces the strongest, most productive new plant.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["post-weather-damage-assessment-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Strawberry Weather Damage Assessment</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Check these signs to decide whether to revive or replace</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Worth Reviving</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.7;\">\n                        <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; Crown is still firm (not mushy)</div>\n                        <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; Some green tissue visible at crown center</div>\n                        <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; Roots are white or light brown (not black)</div>\n                        <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10003; Only leaves are damaged (not crown)</div>\n                        <div style=\"padding: 4px 0;\">&#10003; Plant was in ground less than 3 years</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #8c9c8c !important; padding: 12px 16px; text-align: center;\">\n                    <h3 style=\"font-weight: 600; font-size: 0.95rem; margin: 0; color: #f8f9f0 !important;\">Replace Instead</h3>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <div style=\"font-size: 0.85rem; color: #1c3c2c !important; line-height: 1.7;\">\n                        <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10007; Crown is soft, mushy, or brown throughout</div>\n                        <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10007; Roots are black and slimy</div>\n                        <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10007; No green tissue visible anywhere</div>\n                        <div style=\"padding: 4px 0; border-bottom: 1px solid #f0f2ed;\">&#10007; Plant easily pulls from soil (root death)</div>\n                        <div style=\"padding: 4px 0;\">&#10007; Plant was already 3+ years old</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0; border-radius: 0;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Wait before deciding:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> After frost or heat damage, give plants 2 to 3 weeks before removing them. Strawberries can regrow from the crown even when all leaves are destroyed, as long as the crown tissue is alive.</span>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center; border-top: 1px solid #c5ccc0;\">\n        Source: UC ANR, UC Master Gardener Program\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["revival-action-plan-by-weather-event"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Strawberry Revival Plan by Weather Event</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Specific recovery steps for each type of damage</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 16px;\">\n                    <span style=\"color: #f8f9f0 !important; font-weight: 700;\">After Frost or Freeze</span>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <div style=\"display: flex; flex-direction: column; gap: 8px; font-size: 0.85rem; color: #1c3c2c !important;\">\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 16px;\">1.</span> Do not prune damaged leaves immediately. They protect the crown from further cold.</div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 16px;\">2.</span> Wait 2 to 3 weeks. Remove only brown, clearly dead leaves after new growth appears.</div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 16px;\">3.</span> Apply a light dose of balanced fertilizer to support new growth.</div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 16px;\">4.</span> Add extra straw mulch (3 to 4 inches) to insulate against future cold snaps.</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 16px;\">\n                    <span style=\"color: #f8f9f0 !important; font-weight: 700;\">After Heat Wave (above 95F)</span>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <div style=\"display: flex; flex-direction: column; gap: 8px; font-size: 0.85rem; color: #1c3c2c !important;\">\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 16px;\">1.</span> Water deeply and immediately. Soak soil 6 to 8 inches down.</div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 16px;\">2.</span> Install shade cloth (30 to 50% shade) if heat continues.</div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 16px;\">3.</span> Remove scorched leaves once new growth begins.</div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 16px;\">4.</span> Increase mulch depth to 3 to 4 inches. Mulch cools root zone significantly.</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; padding: 12px 16px;\">\n                    <span style=\"color: #f8f9f0 !important; font-weight: 700;\">After Heavy Rain or Flooding</span>\n                </div>\n                <div style=\"padding: 16px;\">\n                    <div style=\"display: flex; flex-direction: column; gap: 8px; font-size: 0.85rem; color: #1c3c2c !important;\">\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 16px;\">1.</span> Improve drainage immediately. Dig channels to redirect standing water away from the bed.</div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 16px;\">2.</span> Check crown depth. Rain may have washed soil away or buried crowns. Adjust as needed.</div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 16px;\">3.</span> Remove any fruit touching the ground (Botrytis risk is very high after rain).</div>\n                        <div style=\"display: flex; gap: 8px; align-items: flex-start;\"><span style=\"color: #1a3b2a !important; font-weight: 700; min-width: 16px;\">4.</span> Replenish straw mulch that washed away. Apply slug bait (iron phosphate).</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 10px 15px; font-size: 0.75rem; color: #8c9c8c !important; text-align: center;\">\n        Source: UC ANR, UC IPM, UC Master Gardener Program\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

</script>
