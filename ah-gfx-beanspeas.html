: 12px; font-weight: 700; font-size: 0.95rem; text-align: center;\">A-Frame / Lean-To</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Height:</strong> 6-7 feet</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Cost:</strong> Low-Medium</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Pros:</strong> Two planting sides, good airflow, sturdy</p>\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin: 0;\"><strong>Cons:</strong> Takes more space, harder to harvest inside</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px; font-weight: 700; font-size: 0.95rem; text-align: center;\">Cattle Panel Arch</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Height:</strong> 5-7 feet</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Cost:</strong> Medium (reusable for years)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Pros:</strong> Very sturdy, walk-through tunnel, lasts years</p>\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin: 0;\"><strong>Cons:</strong> Heavy, permanent placement, higher initial cost</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px; font-weight: 700; font-size: 0.95rem; text-align: center;\">String Trellis / Netting</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Height:</strong> 6-8 feet</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Cost:</strong> Low</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Pros:</strong> Easy setup, compostable jute, flat profile</p>\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin: 0;\"><strong>Cons:</strong> Needs strong end posts, netting tangles at cleanup</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["pole-vs-bush-bean-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pole Beans vs. Bush Beans</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Which type is right for your garden?</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 500px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Factor</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Pole Beans</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Bush Beans</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Height</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">6-10 feet (needs support)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">18-24 inches (no support)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Total Yield</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Higher (3-4x more per plant)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Lower per plant (more per sq ft)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Harvest Window</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">6-8 weeks (continuous)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">2-3 weeks (all at once)</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Days to Harvest</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">60-70 days</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">50-60 days</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Best For</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Small footprint, vertical growing, ongoing harvest</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Containers, succession planting, beginners</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Santa Cruz Tip</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Use as windbreak along south fence</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Plant succession every 3 weeks</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["snow-pea-vs-sugar-snap-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Snow Peas vs. Sugar Snap Peas</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Two great edible-pod peas for Santa Cruz gardens</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; text-align: center;\">Snow Peas</div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Pod:</strong> Flat, tender, eat whole pod before peas swell</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Taste:</strong> Mild, sweet, delicate crunch</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Best use:</strong> Stir-fries, salads, raw snacking</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Harvest window:</strong> Brief; pick daily when flat</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0;\"><strong>Top varieties:</strong> Oregon Sugar Pod II, Mammoth Melting</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #8c9c8c; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; text-align: center;\">Sugar Snap Peas</div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Pod:</strong> Round, thick, eat whole pod when peas are plump</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Taste:</strong> Very sweet, satisfying crunch</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Best use:</strong> Raw snacking, salads, lunchboxes</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Harvest window:</strong> More forgiving; OK even when plump</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0;\"><strong>Top varieties:</strong> Sugar Snap, Super Sugar Snap, Cascadia</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Both types thrive in Santa Cruz's cool seasons. Plant Oct-Feb for spring harvest.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["pea-planting-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Pea Planting Timeline</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Santa Cruz County cool-season schedule</p>\n    </div>\n    <div style=\"padding: 30px 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"position: relative; padding-left: 30px;\">\n            <div style=\"position: absolute; left: 8px; top: 0; bottom: 0; width: 4px; background: linear-gradient(to bottom, #1a3b2a 0%, #1a3b2a 50%, #8c9c8c 50%, #8c9c8c 80%, #dde2d8 80%); border-radius: 2px;\"></div>\n            <div style=\"position: relative; margin-bottom: 25px;\">\n                <div style=\"position: absolute; left: -30px; top: 5px; width: 20px; height: 20px; background-color: #1a3b2a !important; border-radius: 50%; border: 3px solid #f8f9f0; box-shadow: 0 0 0 2px #1a3b2a;\"></div>\n                <div style=\"background-color: #fff !important; padding: 15px 18px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;\">\n                        <span style=\"font-weight: 700; color: #1a3b2a !important;\">Fall Sowing (Best)</span>\n                        <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600;\">Oct - Nov</span>\n                    </div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Direct sow seeds 1 inch deep, 2-3 inches apart. Install trellis first. Seeds germinate in cool soil. Roots establish through winter.</p>\n                </div>\n            </div>\n            <div style=\"position: relative; margin-bottom: 25px;\">\n                <div style=\"position: absolute; left: -30px; top: 5px; width: 20px; height: 20px; background-color: #1a3b2a !important; border-radius: 50%; border: 3px solid #f8f9f0; box-shadow: 0 0 0 2px #1a3b2a;\"></div>\n                <div style=\"background-color: #fff !important; padding: 15px 18px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;\">\n                        <span style=\"font-weight: 700; color: #1a3b2a !important;\">Winter Growth</span>\n                        <span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600;\">Dec - Feb</span>\n                    </div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Plants grow slowly but steadily. Protect from heavy rain splash. Guide tendrils onto trellis as they grow. Minimal watering needed (rain does the work).</p>\n                </div>\n            </div>\n            <div style=\"position: relative; margin-bottom: 25px;\">\n                <div style=\"position: absolute; left: -30px; top: 5px; width: 20px; height: 20px; background-color: #8c9c8c !important; border-radius: 50%; border: 3px solid #f8f9f0; box-shadow: 0 0 0 2px #8c9c8c;\"></div>\n                <div style=\"background-color: #fff !important; padding: 15px 18px; border-radius: 8px; border: 2px solid #1a3b2a;\">\n                    <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;\">\n                        <span style=\"font-weight: 700; color: #1a3b2a !important;\">Peak Harvest</span>\n                        <span style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600;\">Mar - May</span>\n                    </div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Flowers appear, then pods follow quickly. Pick every 1-2 days for continuous production. The more you pick, the more they produce.</p>\n                </div>\n            </div>\n            <div style=\"position: relative;\">\n                <div style=\"position: absolute; left: -30px; top: 5px; width: 20px; height: 20px; background-color: #dde2d8 !important; border-radius: 50%; border: 3px solid #f8f9f0; box-shadow: 0 0 0 2px #dde2d8;\"></div>\n                <div style=\"background-color: #fff !important; padding: 15px 18px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;\">\n                        <span style=\"font-weight: 700; color: #1a3b2a !important;\">Season Ends</span>\n                        <span style=\"background-color: #dde2d8 !important; color: #1a3b2a !important; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600;\">May - Jun</span>\n                    </div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Heat ends production. Remove vines, cut at soil level (leave roots to decompose and release nitrogen). Plant warm-season crops in the same spot.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["fava-bean-growth-stages-and-dual-purpose-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Fava Beans: Food + Cover Crop</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Two ways to use your fava bean crop</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border: 2px solid #1a3b2a; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; text-align: center;\">Harvest for Food</div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Plant:</strong> Oct - Dec (fall is ideal)</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Harvest:</strong> Mar - May (when pods are plump)</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Yield:</strong> 2-3 lbs per 10 ft row</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>After harvest:</strong> Chop stalks and leave roots in soil to release nitrogen</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0;\"><strong>Varieties:</strong> Windsor, Broad Windsor, Aguadulce</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 2px solid #8c9c8c; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 14px; font-weight: 700; text-align: center;\">Use as Cover Crop</div>\n                <div style=\"padding: 18px;\">\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Plant:</strong> Oct - Nov (before rains start)</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Chop down:</strong> Feb - Mar (at peak flowering)</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>Benefit:</strong> Fixes 100-200 lbs nitrogen/acre</p>\n                    <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 10px 0;\"><strong>After chop:</strong> Leave as mulch or dig in. Wait 2-3 weeks, then plant spring crops.</p>\n                    <p style=\"font-size: 0.85rem; color: #1a3b2a !important; margin: 0;\"><strong>Varieties:</strong> Bell Bean (smaller, more nitrogen), any fava works</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Best of both worlds: harvest some pods for eating, then chop the rest as cover crop before spring planting.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["succession-planting-schedule-by-microclimate"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Bean Succession Planting Schedule</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Plant every 3 weeks for continuous harvest</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 550px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Microclimate</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Sowings</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Planting Dates</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Harvest Period</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Coastal</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">3-4</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Mid-May, Early Jun, Late Jun, Mid-Jul</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Jul - Oct</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">SLV / Inland</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">5-6</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Apr, Mid-May, Early Jun, Late Jun, Mid-Jul, Early Aug</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Jun - Oct</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Redwoods</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">3</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late May, Mid-Jun, Early Jul</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Jul - Sep</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Watsonville</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important; text-align: center;\">6-7</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Late Apr through Mid-Aug, every 3 weeks</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Jun - Nov</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Use bush beans for succession planting. Each sowing = about 10-15 row feet for a family of four.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["problem-diagnosis-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Bean and Pea Problem Diagnosis</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">What's wrong? Start with the symptom.</p>\n    </div>\n    <div style=\"overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; min-width: 600px;\">\n            <thead>\n                <tr>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Symptom</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Likely Cause</th>\n                    <th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px 15px; text-align: left; font-weight: 600; font-size: 0.85rem;\">Fix</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Seeds don't germinate</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Cold soil, old seed, rot</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Wait for 60F+ soil. Check seed viability. Don't overwater before sprout.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Yellow leaves (lower)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Nitrogen deficiency, overwatering</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Inoculate with rhizobia. Improve drainage. Reduce watering.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Flowers drop, no pods</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Heat stress, water stress</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Mulch heavily. Water consistently. Coastal fog actually helps!</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">White powder on leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Powdery mildew</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Improve airflow. Water at base, not overhead. Neem oil if severe.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Holes in leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Slugs, snails, or bean beetles</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Slug bait (iron phosphate). Handpick beetles. Check undersides of leaves.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8; background-color: #f8f9f0 !important;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Curled, sticky leaves</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Aphids</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Strong water spray. Ladybugs. Neem oil. Usually cosmetic damage only.</td>\n                </tr>\n                <tr style=\"border-bottom: 1px solid #dde2d8;\">\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Rust-colored spots</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Bean rust (fungal)</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Remove affected leaves. Improve spacing. Avoid overhead watering.</td>\n                </tr>\n                <tr>\n                    <td style=\"padding: 10px 15px; font-weight: 600; color: #1a3b2a !important;\">Tough, stringy pods</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Harvested too late</td>\n                    <td style=\"padding: 10px 15px; color: #1c3c2c !important;\">Pick snap beans when pencil-thin. Check daily during peak production.</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["seed-saving-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Bean and Pea Seed Saving Guide</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Easiest seeds to save for next year's garden</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: flex; flex-direction: column; gap: 15px;\">\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">1</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Choose Your Best Plants</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Mark 3-5 of your healthiest, most productive plants early in the season. Save seeds only from the best performers.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">2</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Let Pods Dry on the Plant</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Stop harvesting those plants. Let pods turn brown, dry, and papery on the vine. Seeds should rattle inside when you shake them.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">3</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Shell and Final Dry</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Crack open dry pods and remove seeds. Spread seeds on a screen or paper towel for 1-2 weeks indoors to ensure complete drying.</p>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: flex-start; gap: 15px;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;\">4</div>\n                <div style=\"flex: 1; background-color: #fff !important; padding: 15px; border-radius: 8px; border: 1px solid #dde2d8;\">\n                    <div style=\"font-weight: 700; color: #1a3b2a !important; margin-bottom: 5px;\">Store Cool and Dry</div>\n                    <p style=\"margin: 0; font-size: 0.85rem; color: #1c3c2c !important;\">Place in labeled paper envelopes or glass jars. Store in a cool, dry, dark spot. Bean and pea seeds stay viable for 3-4 years when stored properly.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0 25px 25px 25px; border-radius: 6px;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Coastal Drying Tip:</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Santa Cruz fog makes on-vine drying harder. If rain threatens, clip entire plants and hang upside down under cover to finish drying.</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["companion-planting-quick-reference"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Bean and Pea Companion Planting</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Good neighbors and bad neighbors in the garden</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #fff !important; border-left: 5px solid #1a3b2a; padding: 18px; border-radius: 0 8px 8px 0;\">\n                <h3 style=\"font-size: 1rem; font-weight: 700; color: #1a3b2a !important; margin: 0 0 12px 0;\">Good Companions</h3>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Corn:</strong> Classic Three Sisters. Provides trellis for pole beans.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Squash:</strong> Shades soil, retains moisture, suppresses weeds.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Carrots:</strong> Different root depth, don't compete.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Cucumbers:</strong> Benefit from nitrogen fixed by beans.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Radishes:</strong> Fast crop between bean rows.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Herbs:</strong> Basil, rosemary, and savory repel bean beetles.</p>\n            </div>\n            <div style=\"background-color: #fff !important; border-left: 5px solid #c0392b; padding: 18px; border-radius: 0 8px 8px 0;\">\n                <h3 style=\"font-size: 1rem; font-weight: 700; color: #c0392b !important; margin: 0 0 12px 0;\">Avoid Planting With</h3>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Alliums (onions, garlic, leeks):</strong> Inhibit bean growth and nitrogen fixation.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Fennel:</strong> Inhibits growth of most vegetables including beans.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0 0 8px 0;\"><strong>Peppers:</strong> Similar nutrient needs, can compete heavily.</p>\n                <p style=\"font-size: 0.85rem; color: #1c3c2c !important; margin: 0;\"><strong>Sunflowers:</strong> Allelopathic compounds may inhibit beans. (Fine for peas.)</p>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 12px 15px; font-size: 0.8rem; color: #1c3c2c !important; text-align: center;\">\n        Beans fix nitrogen in the soil, benefiting whatever you plant in that spot next season.\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["preservation-methods-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #f8f9f0 !important;\">Preserving Beans and Peas</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #f8f9f0 !important;\">Four ways to enjoy your harvest year-round</p>\n    </div>\n    <div style=\"padding: 25px; background-color: #f8f9f0 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px; font-weight: 700; text-align: center; font-size: 0.95rem;\">Freezing</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Best for:</strong> Snap beans, sugar snaps, shelled peas</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Method:</strong> Blanch 2-3 min, ice bath, dry, freeze flat</p>\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin: 0;\"><strong>Storage:</strong> 8-12 months</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px; font-weight: 700; text-align: center; font-size: 0.95rem;\">Drying</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Best for:</strong> Dry beans, soup beans</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Method:</strong> Let pods dry on vine, shell, cure 2 weeks</p>\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin: 0;\"><strong>Storage:</strong> 1-2 years in airtight container</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px; font-weight: 700; text-align: center; font-size: 0.95rem;\">Canning</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Best for:</strong> Green beans, dilly beans</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Method:</strong> Pressure canning required (low acid food)</p>\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin: 0;\"><strong>Storage:</strong> 1-2 years shelf stable</p>\n                </div>\n            </div>\n            <div style=\"background-color: #fff !important; border: 1px solid #dde2d8; border-radius: 8px; overflow: hidden;\">\n                <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 12px; font-weight: 700; text-align: center; font-size: 0.95rem;\">Pickling</div>\n                <div style=\"padding: 15px;\">\n                    <p style=\"font-size: 0.8rem; color: #1a3b2a !important; margin: 0 0 6px 0;\"><strong>Best for:</strong> Snap beans (dilly beans!)</p>\n                    <p style=\"font-size: 0.8rem; color: #1c3c2c !important; margin: 0 0 6px 0;\"><strong>Method:</strong> Quick pickle or water bath canning</p>\n                    <p style=\"font-size: 0.8rem; color: #8c9c8c !important; margin: 0;\"><strong>Storage:</strong> Refrigerator (weeks) or canned (1 year)</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #dde2d8 !important; padding: 15px 18px; border-left: 4px solid #1a3b2a; margin: 0 25px 25px 25px; border-radius: 6px;\">\n        <strong style=\"color: #1a3b2a !important; font-size: 0.9rem;\">Blanching is essential for freezing.</strong>\n        <span style=\"font-size: 0.85rem; color: #1c3c2c !important;\"> Skipping this step results in tough, off-flavored vegetables within weeks. The few extra minutes are worth it!</span>\n    </div>\n    <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

</script>
