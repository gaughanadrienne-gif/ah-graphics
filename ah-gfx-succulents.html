window.AH_GRAPHICS["santa-cruz-county-microclimates-for-succulents"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Santa Cruz County Microclimates</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">Succulent-growing challenges by zone</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; display: inline-block; margin-bottom: 12px; border-radius: 0;\">FOG BELT</div>\n        <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0 0 6px 0; font-weight: 600;\">Natural Bridges, Westside, Capitola</p>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0 0 10px 0; line-height: 1.5;\">Winter lows: Rarely below 38 F. 150+ fog days per year. Regular fog drip adds moisture to soil and leaves daily in summer.</p>\n        <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Top Challenges</p>\n        <ul style=\"margin: 0; padding-left: 18px; font-size: 13px; color: #555 !important; line-height: 1.6;\">\n          <li>Root rot from persistent dampness</li>\n          <li>Etiolation from reduced sunlight</li>\n          <li>Fungal disease (Phytophthora, Botrytis)</li>\n        </ul>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; display: inline-block; margin-bottom: 12px; border-radius: 0;\">INLAND VALLEYS</div>\n        <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0 0 6px 0; font-weight: 600;\">Watsonville, Aptos, Corralitos</p>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0 0 10px 0; line-height: 1.5;\">Warmer and sunnier than the coast. Less fog. Wider range of succulents perform well here, including Echeveria.</p>\n        <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Top Challenges</p>\n        <ul style=\"margin: 0; padding-left: 18px; font-size: 13px; color: #555 !important; line-height: 1.6;\">\n          <li>Occasional extreme heat (rare but possible)</li>\n          <li>Winter rain saturation in clay soils</li>\n          <li>Deer browsing on young plants</li>\n        </ul>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; display: inline-block; margin-bottom: 12px; border-radius: 0;\">SAN LORENZO VALLEY</div>\n        <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0 0 6px 0; font-weight: 600;\">Scotts Valley, Felton, Ben Lomond</p>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0 0 10px 0; line-height: 1.5;\">Cooler temperatures, heavier rainfall (~50 in/yr), and shade from redwood canopy. Focus on cold-hardy species.</p>\n        <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Top Challenges</p>\n        <ul style=\"margin: 0; padding-left: 18px; font-size: 13px; color: #555 !important; line-height: 1.6;\">\n          <li>Frost below 28 F in winter</li>\n          <li>Deep shade under redwoods</li>\n          <li>Excessive moisture year-round</li>\n        </ul>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; display: inline-block; margin-bottom: 12px; border-radius: 0;\">COASTAL BLUFFS</div>\n        <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0 0 6px 0; font-weight: 600;\">Direct oceanfront, cliff-top gardens</p>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0 0 10px 0; line-height: 1.5;\">Constant wind, salt spray, and fog exposure. Native Dudleya evolved here. Excellent drainage on rocky soils.</p>\n        <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Top Challenges</p>\n        <ul style=\"margin: 0; padding-left: 18px; font-size: 13px; color: #555 !important; line-height: 1.6;\">\n          <li>Salt burn on thin-leaved varieties</li>\n          <li>Constant wind desiccation</li>\n          <li>Limited species selection</li>\n        </ul>\n      </div>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["visual-guide-to-7-major-succulent-genera"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">7 Major Succulent Genera for Santa Cruz County</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">Representative species, size, needs, and fog tolerance</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"overflow-x: auto;\">\n      <table style=\"width: 100%; min-width: 700px; border-collapse: collapse; font-size: 13px; color: #1a3b2a !important;\">\n        <thead>\n          <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n            <th style=\"padding: 10px 12px; text-align: left; font-weight: 600;\">Genus</th>\n            <th style=\"padding: 10px 12px; text-align: left; font-weight: 600;\">Top Species</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Mature Size</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Sun Needs</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Water Needs</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Fog Tolerance</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Aeonium</td>\n            <td style=\"padding: 10px 12px;\">A. arboreum, A. 'Zwartkop'</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">2-3 ft</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Full to part sun</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600; border-radius: 0;\">Excellent</span></td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Dudleya</td>\n            <td style=\"padding: 10px 12px;\">D. farinosa, D. pulverulenta</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">2-18 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Full to part sun</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Very low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600; border-radius: 0;\">Excellent</span></td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Sedum</td>\n            <td style=\"padding: 10px 12px;\">S. rupestre, S. 'Autumn Joy'</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">2 in - 2 ft</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Full to part sun</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600; border-radius: 0;\">Excellent</span></td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Sempervivum</td>\n            <td style=\"padding: 10px 12px;\">S. tectorum, S. arachnoideum</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">2-6 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Full sun</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Very low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #8c9c8c !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600; border-radius: 0;\">Moderate</span></td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Aloe</td>\n            <td style=\"padding: 10px 12px;\">A. arborescens, A. striata</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">1-6 ft</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Full to part sun</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600; border-radius: 0;\">Good</span></td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Agave</td>\n            <td style=\"padding: 10px 12px;\">A. attenuata, A. americana</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">2-6 ft</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Full sun</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Very low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600; border-radius: 0;\">Good</span></td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Echeveria</td>\n            <td style=\"padding: 10px 12px;\">E. elegans, E. 'Afterglow'</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">4-12 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Full sun (6+ hrs)</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #c0392b !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600; border-radius: 0;\">Poor</span></td>\n          </tr>\n        </tbody>\n      </table>\n    </div>\n    <div style=\"margin-top: 16px; padding: 14px 18px; background-color: #dde2d8 !important; border-left: 4px solid #1a3b2a;\">\n      <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; line-height: 1.5;\"><strong>Coastal pick:</strong> Aeonium arboreum -- native to a foggy, maritime climate (Canary Islands), it actually prefers Santa Cruz conditions over dry desert heat. The best starting succulent for fog-belt gardens.</p>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["seasonal-care-calendar-for-succulents"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Seasonal Care Calendar for Succulents</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">Santa Cruz County -- month-by-month tasks</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;\">\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; display: inline-block; margin-bottom: 12px; border-radius: 0;\">SPRING (Mar - May)</div>\n        <ul style=\"margin: 0; padding-left: 18px; font-size: 13px; color: #555 !important; line-height: 1.8;\">\n          <li><strong>Water:</strong> Resume light watering as rains taper</li>\n          <li><strong>Feed:</strong> Half-strength fertilizer once in April</li>\n          <li><strong>Pests:</strong> Watch for aphids on new growth</li>\n          <li><strong>Propagate:</strong> Best time for cuttings and division</li>\n          <li><strong>Clean:</strong> Remove dead leaves from rosette bases</li>\n        </ul>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; display: inline-block; margin-bottom: 12px; border-radius: 0;\">SUMMER (Jun - Sep)</div>\n        <ul style=\"margin: 0; padding-left: 18px; font-size: 13px; color: #555 !important; line-height: 1.8;\">\n          <li><strong>Water:</strong> Established plants: sparingly or none</li>\n          <li><strong>Feed:</strong> None (most are dormant/slow)</li>\n          <li><strong>Pests:</strong> Watch for mealybugs in warm weather</li>\n          <li><strong>Note:</strong> Aeonium go dormant -- leaf drop is normal</li>\n          <li><strong>Containers:</strong> Every 1-2 weeks depending on sun</li>\n        </ul>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; display: inline-block; margin-bottom: 12px; border-radius: 0;\">FALL (Oct - Nov)</div>\n        <ul style=\"margin: 0; padding-left: 18px; font-size: 13px; color: #555 !important; line-height: 1.8;\">\n          <li><strong>Water:</strong> Reduce as rains approach</li>\n          <li><strong>Plant:</strong> Good second window for planting</li>\n          <li><strong>Propagate:</strong> Aeonium cuttings root well now</li>\n          <li><strong>Drainage:</strong> Clear debris from drainage paths</li>\n          <li><strong>Note:</strong> Aeonium begin active growth</li>\n        </ul>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #c0392b !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; display: inline-block; margin-bottom: 12px; border-radius: 0;\">WINTER (Dec - Feb) -- Danger Zone</div>\n        <ul style=\"margin: 0; padding-left: 18px; font-size: 13px; color: #555 !important; line-height: 1.8;\">\n          <li><strong>Water:</strong> STOP all supplemental watering</li>\n          <li><strong>Protect:</strong> Cover Echeveria during heavy rain</li>\n          <li><strong>Frost:</strong> Cloth for tender species below 28 F</li>\n          <li><strong>Move:</strong> Shift containers under eaves</li>\n          <li><strong>Monitor:</strong> Check for rot at crown and base</li>\n        </ul>\n      </div>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["top-8-fog-tolerant-succulent-varieties"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Top 8 Fog-Tolerant Succulents for Coastal California</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">Varieties that thrive, not just survive, in maritime conditions</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"overflow-x: auto;\">\n      <table style=\"width: 100%; min-width: 780px; border-collapse: collapse; font-size: 13px; color: #1a3b2a !important;\">\n        <thead>\n          <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n            <th style=\"padding: 10px 12px; text-align: left; font-weight: 600;\">Species</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Mature Size</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Cold Hardy To</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Salt Tolerant</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Fog Tolerant</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Bloom Season</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Aeonium arboreum</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">2-3 ft</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">25-28 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Moderate</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Excellent</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Spring</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Aeonium 'Zwartkop'</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">2-3 ft</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">25-28 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Moderate</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Excellent</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Spring</td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Dudleya farinosa</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">2-4 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">25 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">High</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Excellent</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Spring</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Aloe arborescens</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">4-6 ft</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">25 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">High</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Excellent</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Winter</td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Sedum rupestre</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">4-6 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Below 0 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Moderate</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Excellent</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Summer</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Sedum 'Autumn Joy'</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">18-24 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Below 0 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Moderate</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Good</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Fall</td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Sempervivum tectorum</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">2-6 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Below -30 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Moderate</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Summer</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Agave attenuata</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">3-4 ft</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">28-30 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Moderate</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Good</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Once (monocarpic)</td>\n          </tr>\n        </tbody>\n      </table>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["fog-belt-performers-vs-fog-belt-failures"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Fog-Belt Performers vs. Fog-Belt Failures</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">Why origin climate matters more than the label on the pot</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;\">\n      <div style=\"background-color: #ffffff !important; border: 2px solid #1a3b2a; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 15px; font-weight: 700; padding: 10px 16px; text-align: center; margin: -20px -20px 16px -20px;\">THRIVES IN FOG</div>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0 0 14px 0; line-height: 1.5; font-style: italic;\">Native to maritime or semi-maritime climates with natural fog, humidity, and cool winters.</p>\n        <div style=\"margin-bottom: 10px; padding: 10px 14px; background-color: #f8f9f0 !important; border-left: 3px solid #1a3b2a;\">\n          <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Aeonium (Canary Islands)</p>\n          <p style=\"font-size: 12px; color: #555 !important; margin: 4px 0 0 0;\">Winter grower. Fog mimics its native habitat.</p>\n        </div>\n        <div style=\"margin-bottom: 10px; padding: 10px 14px; background-color: #f8f9f0 !important; border-left: 3px solid #1a3b2a;\">\n          <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Dudleya (California coast)</p>\n          <p style=\"font-size: 12px; color: #555 !important; margin: 4px 0 0 0;\">Literally evolved on our foggy sea cliffs.</p>\n        </div>\n        <div style=\"margin-bottom: 10px; padding: 10px 14px; background-color: #f8f9f0 !important; border-left: 3px solid #1a3b2a;\">\n          <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Aloe arborescens (coastal S. Africa)</p>\n          <p style=\"font-size: 12px; color: #555 !important; margin: 4px 0 0 0;\">Handles fog, mild frost, poor soil. Decades-old specimens across SC.</p>\n        </div>\n        <div style=\"padding: 10px 14px; background-color: #f8f9f0 !important; border-left: 3px solid #1a3b2a;\">\n          <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Sedum (European coasts/mountains)</p>\n          <p style=\"font-size: 12px; color: #555 !important; margin: 4px 0 0 0;\">Extremely cold-hardy. Tolerates fog, rain, and frost.</p>\n        </div>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 2px solid #c0392b; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #c0392b !important; color: #f8f9f0 !important; font-size: 15px; font-weight: 700; padding: 10px 16px; text-align: center; margin: -20px -20px 16px -20px;\">STRUGGLES IN FOG</div>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0 0 14px 0; line-height: 1.5; font-style: italic;\">Native to arid, sunny environments with low humidity and minimal rainfall.</p>\n        <div style=\"margin-bottom: 10px; padding: 10px 14px; background-color: #fff5f5 !important; border-left: 3px solid #c0392b;\">\n          <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Echeveria (Mexican highlands)</p>\n          <p style=\"font-size: 12px; color: #555 !important; margin: 4px 0 0 0;\">Etiolates in low light. Rots in persistent moisture.</p>\n        </div>\n        <div style=\"margin-bottom: 10px; padding: 10px 14px; background-color: #fff5f5 !important; border-left: 3px solid #c0392b;\">\n          <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Crassula (S. African dry interior)</p>\n          <p style=\"font-size: 12px; color: #555 !important; margin: 4px 0 0 0;\">Rot-prone in winter rain. Jade plant is the exception.</p>\n        </div>\n        <div style=\"margin-bottom: 10px; padding: 10px 14px; background-color: #fff5f5 !important; border-left: 3px solid #c0392b;\">\n          <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Haworthia (S. African karoo)</p>\n          <p style=\"font-size: 12px; color: #555 !important; margin: 4px 0 0 0;\">Needs dry air. Better as an indoor plant on the coast.</p>\n        </div>\n        <div style=\"padding: 10px 14px; background-color: #fff5f5 !important; border-left: 3px solid #c0392b;\">\n          <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; font-weight: 600;\">Desert Cacti (American Southwest)</p>\n          <p style=\"font-size: 12px; color: #555 !important; margin: 4px 0 0 0;\">Cannot handle persistent dampness. Rot quickly on coast.</p>\n        </div>\n      </div>\n    </div>\n    <div style=\"margin-top: 16px; padding: 14px 18px; background-color: #dde2d8 !important; border-left: 4px solid #1a3b2a;\">\n      <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; line-height: 1.5;\"><strong>The rule of thumb:</strong> Match origin climate to your garden. Maritime-origin succulents thrive in fog. Desert-origin succulents struggle. Check where a species comes from before buying.</p>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["microclimate-map-with-recommended-succulents"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Santa Cruz Microclimate Guide</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">Recommended succulent genera by zone</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;\">\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 16px; border-top: 4px solid #3498db;\">\n        <p style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; margin: 0 0 4px 0;\">Direct Oceanfront</p>\n        <p style=\"font-size: 12px; color: #8c9c8c !important; margin: 0 0 10px 0;\">Salt spray, constant wind</p>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0; line-height: 1.6;\">Dudleya, Aloe arborescens, Agave attenuata, Senecio mandraliscae</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 16px; border-top: 4px solid #95a5a6;\">\n        <p style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; margin: 0 0 4px 0;\">Fog Belt (limited sun)</p>\n        <p style=\"font-size: 12px; color: #8c9c8c !important; margin: 0 0 10px 0;\">Under 4 hrs direct sun</p>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0; line-height: 1.6;\">Aeonium, Aloe maculata, Sedum spurium, Crassula ovata (jade)</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 16px; border-top: 4px solid #f39c12;\">\n        <p style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; margin: 0 0 4px 0;\">Inland Valleys</p>\n        <p style=\"font-size: 12px; color: #8c9c8c !important; margin: 0 0 10px 0;\">Warmer, sunnier, less fog</p>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0; line-height: 1.6;\">Echeveria, Graptopetalum, Graptoveria + all coastal types</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 16px; border-top: 4px solid #27ae60;\">\n        <p style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; margin: 0 0 4px 0;\">San Lorenzo Valley</p>\n        <p style=\"font-size: 12px; color: #8c9c8c !important; margin: 0 0 10px 0;\">Cooler, wetter, partly shaded</p>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0; line-height: 1.6;\">Sempervivum, cold-hardy Sedum, Aeonium, Dudleya (raised beds)</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 16px; border-top: 4px solid #e74c3c;\">\n        <p style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; margin: 0 0 4px 0;\">South-Facing Walls/Patios</p>\n        <p style=\"font-size: 12px; color: #8c9c8c !important; margin: 0 0 10px 0;\">Warm, protected microclimate</p>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0; line-height: 1.6;\">Echeveria, Kalanchoe, tender Aloe + all hardy types</p>\n      </div>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["succulent-container-soil-mix-recipe"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">The Ideal Succulent Container Mix</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">For coastal California -- fast-draining, fog-resistant formula</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 20px;\">\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px; text-align: center;\">\n        <div style=\"font-size: 36px; font-weight: 700; color: #1a3b2a !important; margin-bottom: 6px;\">50%</div>\n        <p style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 6px 0;\">Pumice or Perlite</p>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0; line-height: 1.5;\">Lightweight, porous volcanic rock. Provides drainage and aeration. Pumice stays mixed; perlite floats.</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px; text-align: center;\">\n        <div style=\"font-size: 36px; font-weight: 700; color: #1a3b2a !important; margin-bottom: 6px;\">25%</div>\n        <p style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 6px 0;\">Quality Potting Soil</p>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0; line-height: 1.5;\">Coconut coir-based preferred over peat. Provides nutrients and slight moisture retention.</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px; text-align: center;\">\n        <div style=\"font-size: 36px; font-weight: 700; color: #1a3b2a !important; margin-bottom: 6px;\">25%</div>\n        <p style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 6px 0;\">Coarse Sand or DG</p>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0; line-height: 1.5;\">Decomposed granite adds weight and drainage. Avoid fine sand, which can clog pore spaces.</p>\n      </div>\n    </div>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px;\">\n      <div style=\"padding: 14px 18px; background-color: #1a3b2a !important; border-radius: 0;\">\n        <p style=\"font-size: 13px; color: #f8f9f0 !important; margin: 0; font-weight: 600;\">The Drainage Test</p>\n        <p style=\"font-size: 12px; color: #dde2d8 !important; margin: 6px 0 0 0; line-height: 1.5;\">Water should flow through and out drainage holes within seconds. Soil should feel barely damp after 1-2 days and dry within 4-5 days.</p>\n      </div>\n      <div style=\"padding: 14px 18px; background-color: #c0392b !important; border-radius: 0;\">\n        <p style=\"font-size: 13px; color: #f8f9f0 !important; margin: 0; font-weight: 600;\">Avoid These Ingredients</p>\n        <p style=\"font-size: 12px; color: #f8f9f0 !important; margin: 6px 0 0 0; line-height: 1.5; opacity: 0.9;\">Fine peat moss, vermiculite, heavy garden soil, wood chips or bark chunks -- all hold too much moisture for coastal conditions.</p>\n      </div>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["thriller-filler-spiller-container-design"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Thriller / Filler / Spiller</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">The classic succulent container formula with 3 color palette options</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px;\">\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px; text-align: center;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 12px; font-weight: 700; padding: 6px 14px; display: inline-block; margin-bottom: 10px; border-radius: 0; letter-spacing: 1px;\">THRILLER</div>\n        <p style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 8px 0;\">The Focal Point</p>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 10px 0; line-height: 1.5;\">One tall or architectural plant that draws the eye. Center or slightly off-center.</p>\n        <div style=\"border-top: 1px solid #dde2d8; padding-top: 10px; margin-top: 10px;\">\n          <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0; line-height: 1.6;\">Aeonium 'Zwartkop'<br>Agave attenuata<br>Aloe striata<br>Echeveria 'Afterglow'</p>\n        </div>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px; text-align: center;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 12px; font-weight: 700; padding: 6px 14px; display: inline-block; margin-bottom: 10px; border-radius: 0; letter-spacing: 1px;\">FILLER</div>\n        <p style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 8px 0;\">The Middle Ground</p>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 10px 0; line-height: 1.5;\">Mounding plants that create body and color between the thriller and pot edge.</p>\n        <div style=\"border-top: 1px solid #dde2d8; padding-top: 10px; margin-top: 10px;\">\n          <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0; line-height: 1.6;\">Echeveria elegans<br>Graptoveria 'Fred Ives'<br>Sempervivum varieties<br>Aeonium haworthii</p>\n        </div>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px; text-align: center;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 12px; font-weight: 700; padding: 6px 14px; display: inline-block; margin-bottom: 10px; border-radius: 0; letter-spacing: 1px;\">SPILLER</div>\n        <p style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 8px 0;\">The Cascade</p>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 10px 0; line-height: 1.5;\">Trailing plants that soften the container edge and add movement.</p>\n        <div style=\"border-top: 1px solid #dde2d8; padding-top: 10px; margin-top: 10px;\">\n          <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0; line-height: 1.6;\">Sedum morganianum<br>Senecio rowleyanus<br>Sedum rupestre<br>Othonna capensis</p>\n        </div>\n      </div>\n    </div>\n    <p style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; margin: 0 0 12px 0;\">3 Color Palette Ideas</p>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;\">\n      <div style=\"padding: 12px 16px; background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0;\">\n        <p style=\"font-size: 13px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 4px 0;\">Cool Blues + Silvers</p>\n        <div style=\"display: flex; gap: 6px; margin-bottom: 6px;\">\n          <span style=\"display: inline-block; width: 20px; height: 20px; background-color: #5b7f95 !important;\"></span>\n          <span style=\"display: inline-block; width: 20px; height: 20px; background-color: #9db4c0 !important;\"></span>\n          <span style=\"display: inline-block; width: 20px; height: 20px; background-color: #c7d3d4 !important;\"></span>\n        </div>\n        <p style=\"font-size: 11px; color: #555 !important; margin: 0;\">Agave + Echeveria elegans + Sedum rupestre</p>\n      </div>\n      <div style=\"padding: 12px 16px; background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0;\">\n        <p style=\"font-size: 13px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 4px 0;\">Warm Pinks + Oranges</p>\n        <div style=\"display: flex; gap: 6px; margin-bottom: 6px;\">\n          <span style=\"display: inline-block; width: 20px; height: 20px; background-color: #c0776e !important;\"></span>\n          <span style=\"display: inline-block; width: 20px; height: 20px; background-color: #d4a276 !important;\"></span>\n          <span style=\"display: inline-block; width: 20px; height: 20px; background-color: #e8c9a0 !important;\"></span>\n        </div>\n        <p style=\"font-size: 11px; color: #555 !important; margin: 0;\">Echeveria 'Afterglow' + Graptoveria + Sedum adolphi</p>\n      </div>\n      <div style=\"padding: 12px 16px; background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0;\">\n        <p style=\"font-size: 13px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 4px 0;\">High Contrast Dark + Light</p>\n        <div style=\"display: flex; gap: 6px; margin-bottom: 6px;\">\n          <span style=\"display: inline-block; width: 20px; height: 20px; background-color: #2c1810 !important;\"></span>\n          <span style=\"display: inline-block; width: 20px; height: 20px; background-color: #6b4f3a !important;\"></span>\n          <span style=\"display: inline-block; width: 20px; height: 20px; background-color: #e8e0d0 !important;\"></span>\n        </div>\n        <p style=\"font-size: 11px; color: #555 !important; margin: 0;\">Aeonium 'Zwartkop' + Sempervivum + Senecio rowleyanus</p>\n      </div>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["month-by-month-container-succulent-care-calendar"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Container Succulent Care Calendar</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">Coastal California -- monthly tasks at a glance</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"overflow-x: auto;\">\n      <table style=\"width: 100%; min-width: 700px; border-collapse: collapse; font-size: 12px; color: #1a3b2a !important;\">\n        <thead>\n          <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n            <th style=\"padding: 10px 8px; text-align: left; font-weight: 600;\">Month</th>\n            <th style=\"padding: 10px 8px; text-align: center; font-weight: 600;\">Watering</th>\n            <th style=\"padding: 10px 8px; text-align: center; font-weight: 600;\">Feeding</th>\n            <th style=\"padding: 10px 8px; text-align: center; font-weight: 600;\">Repotting</th>\n            <th style=\"padding: 10px 8px; text-align: center; font-weight: 600;\">Pest Watch</th>\n            <th style=\"padding: 10px 8px; text-align: center; font-weight: 600;\">Relocate</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 8px; font-weight: 600;\">Jan - Feb</td>\n            <td style=\"padding: 8px; text-align: center;\">None (rain-exposed) / Monthly (sheltered)</td>\n            <td style=\"padding: 8px; text-align: center;\">None</td>\n            <td style=\"padding: 8px; text-align: center;\">--</td>\n            <td style=\"padding: 8px; text-align: center;\">Check for rot</td>\n            <td style=\"padding: 8px; text-align: center;\">Tender species under eaves</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 8px; font-weight: 600;\">Mar - Apr</td>\n            <td style=\"padding: 8px; text-align: center;\">Every 10-14 days</td>\n            <td style=\"padding: 8px; text-align: center;\">1/4 strength in April</td>\n            <td style=\"padding: 8px; text-align: center;\">Best time</td>\n            <td style=\"padding: 8px; text-align: center;\">Aphids on new growth</td>\n            <td style=\"padding: 8px; text-align: center;\">Move to sun as days warm</td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 8px; font-weight: 600;\">May - Jun</td>\n            <td style=\"padding: 8px; text-align: center;\">Every 7-14 days</td>\n            <td style=\"padding: 8px; text-align: center;\">--</td>\n            <td style=\"padding: 8px; text-align: center;\">OK</td>\n            <td style=\"padding: 8px; text-align: center;\">Mealybugs starting</td>\n            <td style=\"padding: 8px; text-align: center;\">Sunniest spot available</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 8px; font-weight: 600;\">Jul - Aug</td>\n            <td style=\"padding: 8px; text-align: center;\">Every 7-14 days (Aeonium: 1x/mo)</td>\n            <td style=\"padding: 8px; text-align: center;\">None</td>\n            <td style=\"padding: 8px; text-align: center;\">--</td>\n            <td style=\"padding: 8px; text-align: center;\">Peak mealybug season</td>\n            <td style=\"padding: 8px; text-align: center;\">Afternoon shade for Aeonium</td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 8px; font-weight: 600;\">Sep - Oct</td>\n            <td style=\"padding: 8px; text-align: center;\">Reduce; every 10-21 days</td>\n            <td style=\"padding: 8px; text-align: center;\">Light feed for Aeonium</td>\n            <td style=\"padding: 8px; text-align: center;\">OK</td>\n            <td style=\"padding: 8px; text-align: center;\">Check drainage holes</td>\n            <td style=\"padding: 8px; text-align: center;\">Prep rain-sheltered spots</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important;\">\n            <td style=\"padding: 8px; font-weight: 600;\">Nov - Dec</td>\n            <td style=\"padding: 8px; text-align: center;\">Stop for rain-exposed pots</td>\n            <td style=\"padding: 8px; text-align: center;\">None</td>\n            <td style=\"padding: 8px; text-align: center;\">--</td>\n            <td style=\"padding: 8px; text-align: center;\">Rot vigilance</td>\n            <td style=\"padding: 8px; text-align: center;\">Move sensitive pots to shelter</td>\n          </tr>\n        </tbody>\n      </table>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["dudleya-species-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">6 Garden-Worthy Dudleya Species</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">California's native succulents for Santa Cruz County gardens</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"overflow-x: auto;\">\n      <table style=\"width: 100%; min-width: 750px; border-collapse: collapse; font-size: 13px; color: #1a3b2a !important;\">\n        <thead>\n          <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n            <th style=\"padding: 10px 12px; text-align: left; font-weight: 600;\">Species</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Rosette Size</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Farina Level</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Flower Color</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Cold Hardy To</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Native Range</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">D. farinosa<br><span style=\"font-weight: 400; font-size: 11px; color: #8c9c8c !important;\">Bluff Lettuce</span></td>\n            <td style=\"padding: 10px 12px; text-align: center;\">2-4 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Heavy white</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Pale yellow</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">25 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Santa Cruz County coast</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">D. caespitosa<br><span style=\"font-weight: 400; font-size: 11px; color: #8c9c8c !important;\">Coast Dudleya</span></td>\n            <td style=\"padding: 10px 12px; text-align: center;\">3-6 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Light</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Yellow</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">25 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Central CA coast</td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">D. pulverulenta<br><span style=\"font-weight: 400; font-size: 11px; color: #8c9c8c !important;\">Chalk Dudleya</span></td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Up to 18 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Brilliant white</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Red/coral</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">28 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Southern CA</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">D. brittonii<br><span style=\"font-weight: 400; font-size: 11px; color: #8c9c8c !important;\">Giant Chalk Dudleya</span></td>\n            <td style=\"padding: 10px 12px; text-align: center;\">12-18 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Whitest of all</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Yellow</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">25 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">S. CA / Baja</td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">D. cymosa<br><span style=\"font-weight: 400; font-size: 11px; color: #8c9c8c !important;\">Canyon Dudleya</span></td>\n            <td style=\"padding: 10px 12px; text-align: center;\">2-4 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Light</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Yellow to red</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">20 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Coast Ranges</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">D. lanceolata<br><span style=\"font-weight: 400; font-size: 11px; color: #8c9c8c !important;\">Lance-Leaved Dudleya</span></td>\n            <td style=\"padding: 10px 12px; text-align: center;\">3-6 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Minimal</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Yellow</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">25 F</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">SF Bay to Baja</td>\n          </tr>\n        </tbody>\n      </table>\n    </div>\n    <div style=\"margin-top: 16px; padding: 14px 18px; background-color: #c0392b !important; border-radius: 0;\">\n      <p style=\"font-size: 13px; color: #f8f9f0 !important; margin: 0; line-height: 1.5;\"><strong>Conservation notice:</strong> Never collect Dudleya from the wild. Poaching is a serious conservation crisis. Purchase only nursery-propagated plants from reputable sources. Wild collection is illegal on public land.</p>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["dudleya-planting-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">How to Plant Dudleya</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">Step-by-step guide for proper angled planting and drainage</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px;\">\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"display: flex; align-items: center; margin-bottom: 12px;\">\n          <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; border-radius: 0;\">1</div>\n          <p style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 0 12px;\">Drainage Test</p>\n        </div>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0; line-height: 1.5;\">Dig a 12-inch hole, fill with water. Must drain within 30 minutes. If slower, amend with 50% pumice/perlite or build a raised mound.</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"display: flex; align-items: center; margin-bottom: 12px;\">\n          <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; border-radius: 0;\">2</div>\n          <p style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 0 12px;\">Angle the Rosette</p>\n        </div>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0; line-height: 1.5;\">Plant on a slope or tilt the rosette slightly downward so rain drains off the leaves instead of pooling in the cup-shaped center. This prevents crown rot.</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"display: flex; align-items: center; margin-bottom: 12px;\">\n          <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; border-radius: 0;\">3</div>\n          <p style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 0 12px;\">Crown Above Soil</p>\n        </div>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0; line-height: 1.5;\">Set the crown (stem-root junction) slightly above the surrounding soil level. Never bury the stem. Build a small mound if planting on flat ground.</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"display: flex; align-items: center; margin-bottom: 12px;\">\n          <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; border-radius: 0;\">4</div>\n          <p style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 0 12px;\">Gravel Top-Dress</p>\n        </div>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0; line-height: 1.5;\">Cover exposed soil with crushed rock or decomposed granite. Keeps moisture away from the crown and mimics natural rocky Dudleya habitat. Never use bark mulch.</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"display: flex; align-items: center; margin-bottom: 12px;\">\n          <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; border-radius: 0;\">5</div>\n          <p style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 0 12px;\">Handle with Care</p>\n        </div>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0; line-height: 1.5;\">Hold by the root ball or stem base, not the leaves. The powdery farina coating does not regenerate once rubbed off and protects against sun and moisture.</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"display: flex; align-items: center; margin-bottom: 12px;\">\n          <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; border-radius: 0;\">6</div>\n          <p style=\"font-size: 14px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 0 12px;\">Wait to Water</p>\n        </div>\n        <p style=\"font-size: 13px; color: #555 !important; margin: 0; line-height: 1.5;\">Do NOT water for 5-7 days after planting. Let roots callus first. Then water deeply once and let soil dry completely before watering again.</p>\n      </div>\n    </div>\n    <div style=\"padding: 14px 18px; background-color: #dde2d8 !important; border-left: 4px solid #1a3b2a;\">\n      <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; line-height: 1.5;\"><strong>After year one:</strong> Established Dudleya typically need zero supplemental irrigation in Santa Cruz County. They survive on rainfall and fog moisture alone. Stop all watering in winter.</p>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["fire-resistance-ratings-for-succulents"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Fire Resistance Ratings: Top 10 Succulents</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">Ranked by moisture content, growth habit, and dead material production</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"overflow-x: auto;\">\n      <table style=\"width: 100%; min-width: 720px; border-collapse: collapse; font-size: 13px; color: #1a3b2a !important;\">\n        <thead>\n          <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n            <th style=\"padding: 10px 12px; text-align: left; font-weight: 600;\">Species</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Water Content</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Growth Habit</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Dead Material</th>\n            <th style=\"padding: 10px 12px; text-align: center; font-weight: 600;\">Fire Rating</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Aloe arborescens</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">90-95%</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Mounding, 4-6 ft</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low (some old leaves)</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600;\">Excellent</span></td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Delosperma cooperi</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">85-90%</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low mat, 3-4 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Very low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600;\">Excellent</span></td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Lampranthus spp.</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">85-90%</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low shrub, 6-12 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600;\">Excellent</span></td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Dudleya farinosa</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">85-90%</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low rosette, 2-4 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Very low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600;\">Excellent</span></td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Sedum rupestre</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">80-85%</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low mat, 4-6 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Very low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600;\">Excellent</span></td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Senecio mandraliscae</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">85-90%</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Spreading, 12-18 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600;\">Very Good</span></td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Sempervivum tectorum</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">80-85%</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Low rosette, 2-6 in</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Very low</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600;\">Very Good</span></td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Aeonium arboreum</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">85-90%</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Upright, 2-3 ft</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Moderate (drops leaves)</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 3px 10px; font-size: 12px; font-weight: 600;\">Good</span></td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Agave attenuata</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">85-90%</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Rosette, 3-4 ft</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Moderate (old leaves)</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #f39c12 !important; color: #ffffff !important; padding: 3px 10px; font-size: 12px; font-weight: 600;\">Good*</span></td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Agave americana</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">85-90%</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">Large rosette, 4-6 ft</td>\n            <td style=\"padding: 10px 12px; text-align: center;\">High (dead leaves, stalks)</td>\n            <td style=\"padding: 10px 12px; text-align: center;\"><span style=\"background-color: #f39c12 !important; color: #ffffff !important; padding: 3px 10px; font-size: 12px; font-weight: 600;\">Good*</span></td>\n          </tr>\n        </tbody>\n      </table>\n    </div>\n    <div style=\"margin-top: 12px; padding: 12px 18px; background-color: #dde2d8 !important; border-left: 4px solid #f39c12;\">\n      <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0; line-height: 1.5;\"><strong>*Agave caveat:</strong> Living plants are fire-resistant, but dried flower stalks (10-20 ft tall) and accumulated dead lower leaves are flammable. Remove spent stalks promptly and clean dead leaves annually to maintain fire resistance.</p>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["fire-wise-zone-diagram"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Fire-Wise Succulent Landscape Zones</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">Defensible space design with specific succulent placement</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n      <div style=\"background-color: #ffffff !important; border: 2px solid #c0392b; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #c0392b !important; color: #f8f9f0 !important; font-size: 13px; font-weight: 700; padding: 8px 14px; text-align: center; margin: -20px -20px 16px -20px;\">ZONE 0: 0-5 ft from home</div>\n        <p style=\"font-size: 12px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 6px 0;\">Most Critical</p>\n        <ul style=\"margin: 0; padding-left: 16px; font-size: 12px; color: #555 !important; line-height: 1.7;\">\n          <li>Sedum groundcover against foundation</li>\n          <li>Dudleya in raised beds with gravel</li>\n          <li>Mineral mulch only (no wood)</li>\n          <li>No plants touching walls or eaves</li>\n          <li>Remove ALL dead material</li>\n        </ul>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 2px solid #f39c12; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #f39c12 !important; color: #ffffff !important; font-size: 13px; font-weight: 700; padding: 8px 14px; text-align: center; margin: -20px -20px 16px -20px;\">ZONE 1: 5-30 ft from home</div>\n        <p style=\"font-size: 12px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 6px 0;\">Lean, Clean, and Green</p>\n        <ul style=\"margin: 0; padding-left: 16px; font-size: 12px; color: #555 !important; line-height: 1.7;\">\n          <li>Aloe arborescens as fire-resistant hedge</li>\n          <li>Broad ice plant groundcover bands</li>\n          <li>Mixed with native fire-wise plants</li>\n          <li>3x plant height spacing between groups</li>\n          <li>Regular dead material removal</li>\n        </ul>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 2px solid #27ae60; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #27ae60 !important; color: #ffffff !important; font-size: 13px; font-weight: 700; padding: 8px 14px; text-align: center; margin: -20px -20px 16px -20px;\">ZONE 2: 30-100 ft from home</div>\n        <p style=\"font-size: 12px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 6px 0;\">Reduced Fuel</p>\n        <ul style=\"margin: 0; padding-left: 16px; font-size: 12px; color: #555 !important; line-height: 1.7;\">\n          <li>Large Agave as fire-resistant accents</li>\n          <li>Succulent groundcover on slopes</li>\n          <li>Dudleya/Sedum in rock garden breaks</li>\n          <li>More relaxed spacing allowed</li>\n          <li>Annual maintenance minimum</li>\n        </ul>\n      </div>\n    </div>\n    <div style=\"margin-top: 16px; padding: 14px 18px; background-color: #1a3b2a !important; border-radius: 0;\">\n      <p style=\"font-size: 13px; color: #f8f9f0 !important; margin: 0; line-height: 1.5;\"><strong>Key principle:</strong> Create continuous moisture barriers with broad succulent bands rather than isolated specimens. A 6-10 ft wide ice plant strip is a meaningful fire break. A single potted succulent is not.</p>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["before-and-after-fire-wise-transformation"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Before and After: Fire-Wise Transformation</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">A typical Santa Cruz hillside property, reimagined for safety</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;\">\n      <div style=\"background-color: #ffffff !important; border: 2px solid #c0392b; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #c0392b !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; text-align: center; margin: -20px -20px 16px -20px;\">HIGH FIRE RISK</div>\n        <ul style=\"margin: 0; padding-left: 18px; font-size: 13px; color: #555 !important; line-height: 1.8;\">\n          <li>Continuous dry shrubs up to walls</li>\n          <li>Bark mulch throughout landscape</li>\n          <li>No defensible space zones</li>\n          <li>Dead material accumulated everywhere</li>\n          <li>Juniper and rosemary near structure</li>\n          <li>Dry ornamental grasses on slope</li>\n          <li>Pampas grass in garden</li>\n          <li>Wood fence connecting to house</li>\n        </ul>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 2px solid #1a3b2a; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; text-align: center; margin: -20px -20px 16px -20px;\">FIRE-WISE SUCCULENT DESIGN</div>\n        <ul style=\"margin: 0; padding-left: 18px; font-size: 13px; color: #555 !important; line-height: 1.8;\">\n          <li>Sedum/Dudleya with gravel in Zone 0</li>\n          <li>Gravel and DG replace bark mulch</li>\n          <li>Clear 0-5-30-100 ft zone structure</li>\n          <li>Annual dead material removal schedule</li>\n          <li>Aloe arborescens hedge in Zone 1</li>\n          <li>Delosperma/Lampranthus on slopes</li>\n          <li>Native buckwheat + Dudleya groupings</li>\n          <li>Stone walls and gravel paths as breaks</li>\n        </ul>\n      </div>\n    </div>\n    <div style=\"margin-top: 16px; padding: 14px 18px; background-color: #dde2d8 !important; border-left: 4px solid #1a3b2a;\">\n      <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; line-height: 1.5;\"><strong>Remember:</strong> Fire-wise landscaping is one component of home protection. It works alongside fire-resistant building materials, ember-resistant vents, cleared gutters, and community fuel management. No landscape alone guarantees safety.</p>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";
