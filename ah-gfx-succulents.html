window.AH_GRAPHICS["step-by-step-leaf-propagation-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Leaf Propagation: Step by Step</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">From twist to transplant -- the complete timeline</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;\">\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 16px;\">\n        <div style=\"display: flex; align-items: center; margin-bottom: 10px;\">\n          <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; border-radius: 0;\">1</div>\n          <p style=\"font-size: 13px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 0 10px;\">Twist and Pull</p>\n        </div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0; line-height: 1.5;\">Grasp a healthy leaf near the base. Rock gently side-to-side and twist. The entire leaf base must come cleanly off the stem.</p>\n        <p style=\"font-size: 11px; color: #8c9c8c !important; margin: 6px 0 0 0;\">Day 0</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 16px;\">\n        <div style=\"display: flex; align-items: center; margin-bottom: 10px;\">\n          <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; border-radius: 0;\">2</div>\n          <p style=\"font-size: 13px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 0 10px;\">Callus</p>\n        </div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0; line-height: 1.5;\">Lay leaves on a dry surface in bright indirect light. Wait until the wound end dries and forms a thin, hardened skin. Extra time in coastal humidity.</p>\n        <p style=\"font-size: 11px; color: #8c9c8c !important; margin: 6px 0 0 0;\">Days 2-5</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 16px;\">\n        <div style=\"display: flex; align-items: center; margin-bottom: 10px;\">\n          <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; border-radius: 0;\">3</div>\n          <p style=\"font-size: 13px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 0 10px;\">Place on Medium</p>\n        </div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0; line-height: 1.5;\">Set callused leaves ON TOP of barely moist propagation mix (50/50 perlite and coir). Do not bury them. Callused end touches the surface.</p>\n        <p style=\"font-size: 11px; color: #8c9c8c !important; margin: 6px 0 0 0;\">Day 5</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 16px;\">\n        <div style=\"display: flex; align-items: center; margin-bottom: 10px;\">\n          <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; border-radius: 0;\">4</div>\n          <p style=\"font-size: 13px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 0 10px;\">Roots Emerge</p>\n        </div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0; line-height: 1.5;\">Small pink or white roots appear from the callused end. Mist soil surface lightly every 3-5 days. Bright indirect light, good airflow.</p>\n        <p style=\"font-size: 11px; color: #8c9c8c !important; margin: 6px 0 0 0;\">Weeks 2-4</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 16px;\">\n        <div style=\"display: flex; align-items: center; margin-bottom: 10px;\">\n          <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; border-radius: 0;\">5</div>\n          <p style=\"font-size: 13px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 0 10px;\">Baby Rosette</p>\n        </div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0; line-height: 1.5;\">Tiny new rosette emerges from the leaf base. The mother leaf begins to shrivel as nutrients transfer to the baby plant. Do not remove it yet.</p>\n        <p style=\"font-size: 11px; color: #8c9c8c !important; margin: 6px 0 0 0;\">Weeks 4-8</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 16px;\">\n        <div style=\"display: flex; align-items: center; margin-bottom: 10px;\">\n          <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; border-radius: 0;\">6</div>\n          <p style=\"font-size: 13px; font-weight: 600; color: #1a3b2a !important; margin: 0 0 0 10px;\">Transplant</p>\n        </div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0; line-height: 1.5;\">Once the mother leaf is fully shriveled and the baby has its own roots and leaves, pot into a 2-3 inch container with succulent mix.</p>\n        <p style=\"font-size: 11px; color: #8c9c8c !important; margin: 6px 0 0 0;\">Weeks 8-16</p>\n      </div>\n    </div>\n    <div style=\"margin-top: 16px; padding: 14px 18px; background-color: #dde2d8 !important; border-left: 4px solid #1a3b2a;\">\n      <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; line-height: 1.5;\"><strong>Best species for leaf propagation:</strong> Echeveria, Sedum, Graptoveria, Graptopetalum, Pachyphytum. <strong>Skip leaf method for:</strong> Aeonium, Dudleya, Agave, Aloe (use stem cuttings or division instead). Expect 50-70% success rate.</p>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["three-propagation-methods-compared"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">3 Propagation Methods Compared</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">Which method works best for each succulent genus</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px;\">\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; text-align: center; margin: -20px -20px 16px -20px;\">LEAF PROPAGATION</div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 10px 0; line-height: 1.5;\">Twist a leaf cleanly off the stem, callus 2-5 days, lay on propagation mix.</p>\n        <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Timeline: 2-4 months</p>\n        <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Success rate: 50-70%</p>\n        <div style=\"border-top: 1px solid #dde2d8; padding-top: 10px; margin-top: 10px;\">\n          <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Best for:</p>\n          <p style=\"font-size: 12px; color: #555 !important; margin: 0; line-height: 1.6;\">Echeveria, Sedum, Graptoveria, Graptopetalum, Pachyphytum, Crassula</p>\n        </div>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; text-align: center; margin: -20px -20px 16px -20px;\">STEM CUTTINGS</div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 10px 0; line-height: 1.5;\">Cut a 3-6 inch stem section, remove lower leaves, callus 3-7 days, plant in dry soil.</p>\n        <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Timeline: 3-6 weeks to root</p>\n        <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Success rate: 80-95%</p>\n        <div style=\"border-top: 1px solid #dde2d8; padding-top: 10px; margin-top: 10px;\">\n          <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Best for:</p>\n          <p style=\"font-size: 12px; color: #555 !important; margin: 0; line-height: 1.6;\">Aeonium, Crassula ovata, upright Sedum, Kalanchoe, Senecio, Portulacaria</p>\n        </div>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 14px; font-weight: 700; padding: 8px 14px; text-align: center; margin: -20px -20px 16px -20px;\">DIVISION (Offsets)</div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 10px 0; line-height: 1.5;\">Separate pups/chicks from parent with roots intact, callus cut, replant.</p>\n        <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Timeline: Immediate (already rooted)</p>\n        <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Success rate: 95%+</p>\n        <div style=\"border-top: 1px solid #dde2d8; padding-top: 10px; margin-top: 10px;\">\n          <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0 0 4px 0; font-weight: 600;\">Best for:</p>\n          <p style=\"font-size: 12px; color: #555 !important; margin: 0; line-height: 1.6;\">Agave (pups), Sempervivum (chicks), Aloe (offsets), Haworthia, spreading Sedum</p>\n        </div>\n      </div>\n    </div>\n    <div style=\"padding: 14px 18px; background-color: #dde2d8 !important; border-left: 4px solid #1a3b2a;\">\n      <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; line-height: 1.5;\"><strong>Best propagation window for Santa Cruz:</strong> March through June. Warm temps, increasing daylight, low humidity. Avoid November through February on the coast -- cool, humid conditions make rot far more likely than rooting.</p>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["root-rot-identification-and-treatment-flowchart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Root Rot: Identify, Decide, Act</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">Flowchart from first symptoms to treatment or propagation</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px;\">\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #f39c12 !important; color: #ffffff !important; font-size: 13px; font-weight: 700; padding: 6px 14px; display: inline-block; margin-bottom: 10px; border-radius: 0;\">EARLY SIGNS</div>\n        <ul style=\"margin: 0; padding-left: 16px; font-size: 12px; color: #555 !important; line-height: 1.7;\">\n          <li>Lower leaves yellow, translucent, or mushy</li>\n          <li>Plant wobbles or feels loose in soil</li>\n          <li>Slight softness at stem base</li>\n          <li>Unexplained growth slowdown</li>\n        </ul>\n        <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 10px 0 0 0; font-weight: 600;\">Action: Unpot and inspect roots immediately</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 20px;\">\n        <div style=\"background-color: #c0392b !important; color: #f8f9f0 !important; font-size: 13px; font-weight: 700; padding: 6px 14px; display: inline-block; margin-bottom: 10px; border-radius: 0;\">ADVANCED SIGNS</div>\n        <ul style=\"margin: 0; padding-left: 16px; font-size: 12px; color: #555 !important; line-height: 1.7;\">\n          <li>Stem black or dark brown at soil line</li>\n          <li>Foul smell from soil or plant base</li>\n          <li>Leaves fall off at a touch</li>\n          <li>Plant collapses or tips over</li>\n        </ul>\n        <p style=\"font-size: 12px; color: #c0392b !important; margin: 10px 0 0 0; font-weight: 600;\">Likely too late to save root system</p>\n      </div>\n    </div>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px;\">\n      <div style=\"background-color: #ffffff !important; border: 2px solid #1a3b2a; border-radius: 0; padding: 20px;\">\n        <p style=\"font-size: 14px; font-weight: 700; color: #1a3b2a !important; margin: 0 0 10px 0;\">If less than half the roots are rotted:</p>\n        <ol style=\"margin: 0; padding-left: 20px; font-size: 12px; color: #555 !important; line-height: 1.8;\">\n          <li>Remove from soil, shake off all old mix</li>\n          <li>Cut away all brown/mushy roots to white tissue</li>\n          <li>Let cuts callus 3-7 days in dry, bright spot</li>\n          <li>Repot in fresh, fast-draining mix (clean pot)</li>\n          <li>Wait 7-10 days before first watering</li>\n          <li>Water very cautiously going forward</li>\n        </ol>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 2px solid #c0392b; border-radius: 0; padding: 20px;\">\n        <p style=\"font-size: 14px; font-weight: 700; color: #c0392b !important; margin: 0 0 10px 0;\">If more than half the roots are gone:</p>\n        <ol style=\"margin: 0; padding-left: 20px; font-size: 12px; color: #555 !important; line-height: 1.8;\">\n          <li>Cut stem above the rot line until white tissue</li>\n          <li>If rot reaches stem center, plant is lost at base</li>\n          <li>Take healthy cuttings from upper growth</li>\n          <li>Callus cuttings 3-7 days</li>\n          <li>Treat as new stem cutting propagation</li>\n          <li>Discard old soil (harbors pathogens)</li>\n        </ol>\n      </div>\n    </div>\n    <div style=\"padding: 14px 18px; background-color: #1a3b2a !important; border-radius: 0;\">\n      <p style=\"font-size: 13px; color: #f8f9f0 !important; margin: 0 0 6px 0; font-weight: 600;\">Prevention Checklist</p>\n      <p style=\"font-size: 12px; color: #dde2d8 !important; margin: 0; line-height: 1.7;\">50% pumice in soil mix | Mineral mulch, not bark | Stop watering in winter | Choose fog-tolerant species | Space plants for airflow | Pots must have drainage holes</p>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["pest-identification-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Succulent Pest Identification Guide</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">The 4 most common pests in coastal California</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;\">\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 13px; font-weight: 700; padding: 6px 14px; display: inline-block; margin-bottom: 10px; border-radius: 0;\">MEALYBUGS</div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 8px 0; line-height: 1.5;\"><strong>Appearance:</strong> White, cottony clusters in leaf axils, under leaves, on roots. 1-3 mm oval insects under waxy coating.</p>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 8px 0; line-height: 1.5;\"><strong>Damage:</strong> Sap-sucking weakens plants. Sticky honeydew attracts sooty mold.</p>\n        <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0; line-height: 1.5; font-weight: 600;\">Treatment: 70% isopropyl alcohol on cotton swab (light). Insecticidal soap spray (moderate). Discard heavily infested plants.</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 13px; font-weight: 700; padding: 6px 14px; display: inline-block; margin-bottom: 10px; border-radius: 0;\">SCALE INSECTS</div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 8px 0; line-height: 1.5;\"><strong>Appearance:</strong> Small brown/tan/gray bumps (1-4 mm) attached to stems and leaves. Look like tiny helmets.</p>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 8px 0; line-height: 1.5;\"><strong>Damage:</strong> Protected sap-feeders on Aloe, Agave, jade plants.</p>\n        <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0; line-height: 1.5; font-weight: 600;\">Treatment: Scrape off with fingernail. Horticultural oil spray during crawler stage (spring/early summer).</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 13px; font-weight: 700; padding: 6px 14px; display: inline-block; margin-bottom: 10px; border-radius: 0;\">APHIDS</div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 8px 0; line-height: 1.5;\"><strong>Appearance:</strong> Small (1-3 mm), pear-shaped, green/black/brown. Cluster on flower stalks and new growth.</p>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 8px 0; line-height: 1.5;\"><strong>Damage:</strong> Primarily on Aeonium, Aloe, Dudleya during bloom.</p>\n        <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0; line-height: 1.5; font-weight: 600;\">Treatment: Strong hose spray. Insecticidal soap for persistent cases. Encourage ladybugs/lacewings.</p>\n      </div>\n      <div style=\"background-color: #ffffff !important; border: 1px solid #dde2d8; border-radius: 0; padding: 18px;\">\n        <div style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; font-size: 13px; font-weight: 700; padding: 6px 14px; display: inline-block; margin-bottom: 10px; border-radius: 0;\">FUNGUS GNATS</div>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 8px 0; line-height: 1.5;\"><strong>Appearance:</strong> Tiny (2-3 mm) dark flies hovering near soil. Larvae are small white maggots in top inch of soil.</p>\n        <p style=\"font-size: 12px; color: #555 !important; margin: 0 0 8px 0; line-height: 1.5;\"><strong>Damage:</strong> Larvae eat fine roots. Thrive in moist organic soil.</p>\n        <p style=\"font-size: 12px; color: #1a3b2a !important; margin: 0; line-height: 1.5; font-weight: 600;\">Treatment: Let soil dry completely. Yellow sticky traps. Bti soil drench. Switch to mineral-heavy soil mix.</p>\n      </div>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";

window.AH_GRAPHICS["quick-reference-troubleshooting-chart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: Montserrat, system-ui, sans-serif;\">\n  <div style=\"background-color: #1a3b2a !important; padding: 20px 24px; text-align: center;\">\n    <h2 style=\"color: #f8f9f0 !important; font-size: 22px; margin: 0 0 6px 0; font-weight: 700; line-height: 1.3;\">Quick-Reference Troubleshooting</h2>\n    <p style=\"color: #dde2d8 !important; font-size: 14px; margin: 0; font-weight: 400;\">6 most common succulent problems in coastal California</p>\n  </div>\n  <div style=\"background-color: #f8f9f0 !important; padding: 24px;\">\n    <div style=\"overflow-x: auto;\">\n      <table style=\"width: 100%; min-width: 680px; border-collapse: collapse; font-size: 13px; color: #1a3b2a !important;\">\n        <thead>\n          <tr style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important;\">\n            <th style=\"padding: 10px 12px; text-align: left; font-weight: 600;\">Problem</th>\n            <th style=\"padding: 10px 12px; text-align: left; font-weight: 600;\">What You See</th>\n            <th style=\"padding: 10px 12px; text-align: left; font-weight: 600;\">Cause</th>\n            <th style=\"padding: 10px 12px; text-align: left; font-weight: 600;\">Fix</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Root Rot</td>\n            <td style=\"padding: 10px 12px;\">Soft, mushy stem base; yellow lower leaves; foul smell</td>\n            <td style=\"padding: 10px 12px;\">Excess moisture + fungal pathogens</td>\n            <td style=\"padding: 10px 12px;\">Cut away rot, callus, repot in fast-draining mix</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Crown Rot</td>\n            <td style=\"padding: 10px 12px;\">Soft, dark center of rosette; gray mold</td>\n            <td style=\"padding: 10px 12px;\">Water pooling in rosette center</td>\n            <td style=\"padding: 10px 12px;\">Plant at angle; avoid overhead watering; shelter in rain</td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Mealybugs</td>\n            <td style=\"padding: 10px 12px;\">White cottony clusters in leaf joints</td>\n            <td style=\"padding: 10px 12px;\">Pest infestation (warm, sheltered conditions)</td>\n            <td style=\"padding: 10px 12px;\">Isopropyl alcohol swab; insecticidal soap; quarantine</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Etiolation</td>\n            <td style=\"padding: 10px 12px;\">Stretched stems; widely spaced leaves; faded color</td>\n            <td style=\"padding: 10px 12px;\">Insufficient light (fog belt)</td>\n            <td style=\"padding: 10px 12px;\">Move to more sun; behead and propagate; switch species</td>\n          </tr>\n          <tr style=\"background-color: #ffffff !important; border-bottom: 1px solid #dde2d8;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Sunburn</td>\n            <td style=\"padding: 10px 12px;\">White or brown bleached patches on sun-facing side</td>\n            <td style=\"padding: 10px 12px;\">Sudden move from shade to full sun</td>\n            <td style=\"padding: 10px 12px;\">Acclimate gradually over 2-3 weeks; damage is permanent</td>\n          </tr>\n          <tr style=\"background-color: #f8f9f0 !important;\">\n            <td style=\"padding: 10px 12px; font-weight: 600;\">Edema</td>\n            <td style=\"padding: 10px 12px;\">Raised corky bumps on leaf surface</td>\n            <td style=\"padding: 10px 12px;\">Water absorbed faster than transpired (humid climate)</td>\n            <td style=\"padding: 10px 12px;\">Reduce watering; improve airflow; cosmetic only</td>\n          </tr>\n        </tbody>\n      </table>\n    </div>\n    <div style=\"margin-top: 16px; padding: 14px 18px; background-color: #dde2d8 !important; border-left: 4px solid #1a3b2a;\">\n      <p style=\"font-size: 13px; color: #1a3b2a !important; margin: 0; line-height: 1.5;\"><strong>The coastal California rule:</strong> Nearly every succulent problem in our climate traces back to excess moisture. Fast-draining soil, mineral mulch, proper spacing, and species matched to your microclimate prevent most issues before they start.</p>\n    </div>\n  </div>\n  <div style=\"background-color: #1a3b2a !important; padding: 10px; text-align: center;\">\n    <span style=\"color: #dde2d8 !important; font-size: 12px;\">ambitiousharvest.com</span>\n  </div>\n</div>";
