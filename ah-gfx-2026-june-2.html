window.AH_GRAPHICS["garden-planning-101-mapping-your-space-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Sun Audit Quick Reference</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Most vegetables need 6 to 8 hours of direct sun daily. Check your yard at 9am, noon, 3pm, and 6pm.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Microclimate</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">What to expect</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Plan for</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Coastal (Aptos, Capitola, Live Oak)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Morning fog may not burn off until 10 or 11am, so a full sun area may get only 5 to 6 hours</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Fog-tolerant varieties and crops that handle partial sun</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Inland valleys (Scotts Valley, Soquel hills, SLV sunny spots)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">More consistent sun through the day</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">The full range of sun-loving crops</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Under or near redwoods (Felton, Ben Lomond canyons)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Shade is a major factor</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Find spots with 4+ hours of sun for leafy greens and herbs</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">The sun is lower in winter, so a bed in full sun in July might be partly shaded in December. Observe across seasons before building permanent structures.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

#dde2d8; color: #1a3b2a !important;\">June to August</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Tomatoes, peppers, basil, summer squash</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Fall</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">September to November</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Broccoli, kale, carrots, chard</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Winter</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">December to February</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Garlic, fava beans, Asian greens</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Relay cropping: plant lettuce seedlings between tomato plants in late July. By the time you pull tomatoes in October, the lettuce is established and growing.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["garden-planning-101-mapping-your-space-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Four-Bed, Four-Year Rotation Map</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Rotate plant families so pests and diseases never build up in one spot.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Bed</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Year 1</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Year 2</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Year 3</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Year 4</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Bed 1</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Nightshades</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Brassicas</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Cucurbits</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Legumes</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Bed 2</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Brassicas</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Cucurbits</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Legumes</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Nightshades</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Bed 3</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Cucurbits</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Legumes</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Nightshades</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Brassicas</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Bed 4</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Legumes</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Nightshades</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Brassicas</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Cucurbits</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Nightshades: tomatoes, peppers, eggplant, potatoes. Brassicas: broccoli, kale, cabbage, cauliflower. Cucurbits: squash, cucumbers, melons. Legumes: beans, peas. After Year 4, the cycle repeats.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["how-to-read-a-soil-test-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Soil pH Decoder</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Most vegetables grow best between 6.0 and 7.0. pH controls how available every other nutrient is.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Your pH</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">What it means</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">What to do</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Below 6.0</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Acidic. Common in coastal Santa Cruz County and mountain soils with conifers and heavy rainfall</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Apply agricultural lime in fall (dolomitic lime also adds magnesium); retest in spring</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">6.0 to 7.0</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">The sweet spot where most nutrients are readily available</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">No adjustment needed; maintain with regular compost</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Above 7.5</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Alkaline. Iron and zinc become less available, causing yellowing between leaf veins</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Add elemental sulfur in fall; use acidifying mulches like pine needles and oak leaves</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Santa Cruz pattern: coastal soils trend slightly acidic (5.5 to 6.5). Raised beds amended with compost for years often sit near neutral (6.5 to 7.0).</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["how-to-read-a-soil-test-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">N-P-K: Deficiency Signs and Organic Fixes</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">The big three macronutrients, what trouble looks like, and what to add if your test reads low.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Nutrient</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Deficiency looks like</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">If low, add</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Nitrogen (N)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Yellowing older leaves from the bottom up, slow growth, pale color</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Compost (1 to 2 inches worked in), blood meal, feather meal; side-dress heavy feeders</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Phosphorus (P)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Purplish leaf discoloration, poor flowering, stunted roots</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Bone meal, rock phosphate, or composted manure, worked into the soil</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Potassium (K)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Browning, curling older leaf edges and poor fruit quality</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Greensand, kelp meal, or sulfate of potash; compost adds moderate amounts</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">High phosphorus is common in long-amended gardens. Switch to nitrogen-only sources (blood meal, feather meal, fish emulsion) and let reserves draw down.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["how-to-read-a-soil-test-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Organic Matter and CEC at a Glance</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">CEC is your soil's nutrient storage tank. Soil type sets the baseline; compost raises it.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Soil type</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Typical CEC</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">What it means for fertilizing</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Sandy</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Low (3 to 10)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Nutrients wash through quickly; fertilize more often with smaller amounts</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Loamy</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Moderate (10 to 25)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Good nutrient holding; standard schedules work well</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Clay</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">High (25 to 50+)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Holds nutrients well; fertilize less frequently</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Organic matter targets: most vegetable gardens perform best at 3% to 5%. Below 2% means your soil will benefit significantly from compost additions.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["understanding-your-soil-a-guide-for-santa-cruz-gardeners-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Sandy, Clay, or Loam?</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">The three main soil textures and where they show up across Santa Cruz County.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Type</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Feel</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Drainage</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Common in</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Sandy</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Gritty; will not hold together when squeezed</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Fast, sometimes too fast; dries out and leaches nutrients</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Coastal Santa Cruz, Aptos, parts of Capitola, Seacliff</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Clay</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Sticky and moldable; holds its shape</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Slow; pools after rain, compacts and cracks when dry</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Scotts Valley, inland Santa Cruz, Soquel hills, parts of Watsonville</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Loam</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Crumbly; holds together loosely</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">The ideal balance: drains well yet retains moisture</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Rare naturally; built over time with organic matter</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Whatever you start with, the fix is the same: add organic matter, lots of it, continuously.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["understanding-your-soil-a-guide-for-santa-cruz-gardeners-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">The Squeeze Test</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Grab a handful of moist (not wet) soil, squeeze it firmly, open your hand, and read the result.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">What happens</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Your soil</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Falls apart immediately</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Mostly sand; very loose structure</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Holds together but crumbles easily when poked</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Loam; you are lucky</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Holds together loosely, breaks with light pressure</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Sandy loam or silty loam; pretty good</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Forms a sticky ball and smears when rubbed</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Heavy clay; common around here</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Refine it with a finger rub: sand feels gritty, silt feels like flour, clay feels slippery or sticky.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["understanding-your-soil-a-guide-for-santa-cruz-gardeners-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Compost Application Cheat Sheet</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">How much to add and when, depending on where you are starting from.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Situation</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">How much compost</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">New garden bed</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">3 to 4 inches on top, worked into the top 6 to 8 inches of soil</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Annual top-dressing</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">1 to 2 inches each spring or fall; no digging needed, soil life incorporates it</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Filling new raised beds</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Mix 30% compost with 60% topsoil and 10% drainage material (perlite or rice hulls)</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Goal: 5% to 8% organic matter by volume. Most agricultural soils hold only 1% to 3%, so every addition counts.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";




window.AH_GRAPHICS["transplants-vs-seeds-when-and-where-to-buy-in-santa-cruz-county-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Transplant or Direct Seed?</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Match the method to the crop and you will save money, time, and frustration.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Best method</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Crops</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Why</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Buy as transplants</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Tomatoes, peppers, eggplant, broccoli, cabbage, cauliflower, Brussels sprouts</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Need 4 to 10 weeks of indoor growth before planting out; transplants skip the lights and heat mats</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Direct seed</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Beans, peas, carrots, radishes, beets, turnips, lettuce, cilantro, dill</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Germinate easily, dislike root disturbance, or need cheap succession plantings</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Either works</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Kale, chard, basil, cucumbers, summer squash</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Easy from seed, but transplants buy you a 3 to 4 week head start</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["transplants-vs-seeds-when-and-where-to-buy-in-santa-cruz-county-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Nursery Quality Checklist</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Run through this list before any transplant goes in your cart.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><ul style=\"margin: 0; padding: 0 0 0 20px;\"><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Healthy green leaves: no yellowing, spotting, or wilting</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Compact, stocky growth: tall leggy plants were light-starved and establish poorly</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">No flowers or fruit yet on tomatoes and peppers (pinch off any before transplanting)</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Roots visible but not circling: tip the pot and peek</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">No pests on the undersides of leaves (aphids, whiteflies)</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Clean pots: crusty or moldy pots suggest poor care</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Variety named on the label, not just tomato or pepper</li></ul></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["transplants-vs-seeds-when-and-where-to-buy-in-santa-cruz-county-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">What a Season Costs</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">A typical small-garden budget combining transplants for slow crops with seeds for easy ones.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Approach</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Shopping list</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Cost</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Transplants</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">4 tomatoes ($20), 2 peppers ($10), broccoli six-pack ($4), kale six-pack ($4)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">$38</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Seeds</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Beans ($4), lettuce ($3), carrots ($3), radishes ($3), cucumbers ($4)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">$17</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Combined season total</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Convenience for fussy crops, economy for easy crops</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">$55</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Seed packets keep giving: one $3 to $5 packet provides dozens to hundreds of plants across multiple sowings, and most seeds stay viable 1 to 3 years.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["garden-science-experiments-kids-summer-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Worm Bin Quick Setup</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">A shoebox-sized vermicomposting bin kids can build in 30 minutes.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"display: flex; align-items: flex-start; margin: 0 0 10px;\"><div style=\"background-color: #c9a84c !important; color: #1a3b2a !important; font-weight: 700; font-size: 13px; min-width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; margin-right: 10px;\">1</div><div><span style=\"color: #b8694a !important; font-weight: 700; font-size: 13px;\">Prep the bin.</span> <span style=\"color: #1a3b2a !important; font-size: 13px;\">An adult drills 8 to 10 small air holes in the lid and upper sides of an opaque plastic bin. No holes in the bottom.</span></div></div><div style=\"display: flex; align-items: flex-start; margin: 0 0 10px;\"><div style=\"background-color: #c9a84c !important; color: #1a3b2a !important; font-weight: 700; font-size: 13px; min-width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; margin-right: 10px;\">2</div><div><span style=\"color: #b8694a !important; font-weight: 700; font-size: 13px;\">Add bedding.</span> <span style=\"color: #1a3b2a !important; font-size: 13px;\">Fill 3/4 full with moist shredded newspaper (like a wrung-out sponge) plus a handful of garden soil.</span></div></div><div style=\"display: flex; align-items: flex-start; margin: 0 0 10px;\"><div style=\"background-color: #c9a84c !important; color: #1a3b2a !important; font-weight: 700; font-size: 13px; min-width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; margin-right: 10px;\">3</div><div><span style=\"color: #b8694a !important; font-weight: 700; font-size: 13px;\">Add worms.</span> <span style=\"color: #1a3b2a !important; font-size: 13px;\">About 50 red wigglers; they burrow down within minutes.</span></div></div><div style=\"display: flex; align-items: flex-start; margin: 0 0 10px;\"><div style=\"background-color: #c9a84c !important; color: #1a3b2a !important; font-weight: 700; font-size: 13px; min-width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; margin-right: 10px;\">4</div><div><span style=\"color: #b8694a !important; font-weight: 700; font-size: 13px;\">Feed.</span> <span style=\"color: #1a3b2a !important; font-size: 13px;\">Bury a handful of soft scraps (banana peels, lettuce, apple cores, coffee grounds). No meat, dairy, or oily food.</span></div></div><div style=\"display: flex; align-items: flex-start; margin: 0 0 10px;\"><div style=\"background-color: #c9a84c !important; color: #1a3b2a !important; font-weight: 700; font-size: 13px; min-width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; margin-right: 10px;\">5</div><div><span style=\"color: #b8694a !important; font-weight: 700; font-size: 13px;\">Harvest.</span> <span style=\"color: #1a3b2a !important; font-size: 13px;\">In 2 to 3 months, push finished castings to one side, add fresh bedding to the other, and the worms migrate over in about a week.</span></div></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["garden-science-experiments-kids-summer-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">All Five Experiments at a Glance</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Pick an experiment by age and attention span. Every one uses the full scientific method.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Experiment</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Ages</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Time</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">The big lesson</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">1. Germination Race</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">5 and up</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">10 min setup, 7 to 14 days</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Most vegetable seeds germinate fastest at 70 to 85 degrees</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">2. Mulch vs Bare Soil</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">7 and up</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">15 min setup, 3 to 5 days</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Mulch can cut midday soil surface temps by 10 to 20 degrees</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">3. Mini Worm Bin</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">5 and up</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">30 min setup, weeks to months</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Decomposers turn kitchen scraps into nutrient-rich castings</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">4. Pollinator Watch</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">6 and up</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">15 to 20 min sessions over several days</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Flower diversity directly increases pollinator diversity</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">5. Water and Soil Challenge</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">7 and up</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">20 minutes</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Sand drains fast, clay drains slow, loam balances both</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["what-to-plant-in-santa-cruz-amp-the-bay-area-in-december-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">December Planting List</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Not a major planting month, but far from nothing. Bare-root season is where December shines.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Category</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Plant now</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Notes</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Cold-hardy greens (direct seed)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Mache, arugula, spinach (Bloomsdale Long Standing), claytonia</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Mache actually prefers cold, short days</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Legumes (direct seed)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Snap and snow peas</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Expect sprouts in 2 to 3 weeks instead of the usual 7 to 10 days</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Transplants</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Lettuce starts, onion sets</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Slow but steady growth; onions establish roots over winter</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Bare-root (prime time)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Fruit trees, berries, grapes, roses, artichokes, rhubarb, asparagus</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Bare-root season runs December through February; plant early for best selection</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["what-to-plant-in-santa-cruz-amp-the-bay-area-in-december-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">December Harvest Basket</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Fall plantings and perennials keep the kitchen stocked through the quiet month.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"display: flex; flex-wrap: wrap; gap: 12px;\"><div style=\"flex: 1 1 200px; background-color: #ffffff; border: 1px solid #dde2d8; border-top: 4px solid #1a3b2a;\"><p style=\"color: #1a3b2a !important; font-weight: 700; font-size: 13px; margin: 0; padding: 8px 10px 4px;\">From fall plantings</p><div style=\"padding: 0 10px 10px;\"><ul style=\"margin: 0; padding: 0 0 0 20px;\"><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Greens: lettuce, arugula, spinach, chard, kale (sweetest after light frosts)</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Brassicas: broccoli, cauliflower, Brussels sprouts</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Roots: carrots, beets, radishes (leave in the ground, harvest as needed)</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Leeks for winter soups</li></ul></div></div><div style=\"flex: 1 1 200px; background-color: #ffffff; border: 1px solid #dde2d8; border-top: 4px solid #b8694a;\"><p style=\"color: #b8694a !important; font-weight: 700; font-size: 13px; margin: 0; padding: 8px 10px 4px;\">Year-round and perennial</p><div style=\"padding: 0 10px 10px;\"><ul style=\"margin: 0; padding: 0 0 0 20px;\"><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Citrus at peak: lemons, oranges, mandarins</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Herbs: rosemary, sage, thyme, parsley</li></ul></div></div></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["what-to-plant-in-santa-cruz-amp-the-bay-area-in-december-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">December by Microclimate</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Your location decides whether December means planting or planning.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Where you garden</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">December conditions</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Best move</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Coastal (Aptos, Capitola, Santa Cruz, Live Oak)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">50s to 60s, rarely below 45; frost very rare</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Try direct seeding mache, arugula, and peas if soil is not waterlogged</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">SLV sunny ridges (Boulder Creek, Ben Lomond)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">40s to 50s days, 30s to 40s nights; frost in low spots</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Focus on bare-root planting; skip direct-seeded greens</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">SLV shaded (Felton, canyons)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">40s to 50s; cold, wet soil and little light</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Plan, and plant bare-root blueberries (they love your acidic soil)</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Inland valleys (Scotts Valley, Soquel)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Varies by sun exposure; south slopes warmer</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Bare-root planting and planning over direct seeding</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Watsonville and Pajaro Valley</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Warmest in the county, 50s to 60s</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Direct seed cold-hardy greens; excellent bare-root planting</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["beneficial-insects-california-garden-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Know Your Garden Allies</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Six beneficial insects working in Santa Cruz County gardens, and how to spot the larvae doing most of the work.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Ally</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">What it controls</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">How to recognize the workers</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Ladybug</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Aphids (one larva eats 400+), mites, scale</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Larvae are dark, alligator-shaped, with orange or red spots</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Green lacewing</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Aphids, mites, thrips, whitefly eggs, small caterpillars</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Aphid lion larvae have prominent curved jaws, sometimes carry debris as camouflage</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Parasitic wasps</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Hornworms, aphids, caterpillars, moth eggs</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Look for tan aphid mummies and white cocoons on hornworms; do not spray those colonies</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Syrphid (hover) fly</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Aphids (100 to 400 per larva)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Slug-like translucent green larvae found right in aphid colonies</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Ground beetle</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Slugs, snails, cutworms, root maggots</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Large, dark, fast; hides under mulch by day, hunts at night</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Minute pirate bug</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Thrips, spider mites (30+ per day), small eggs</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Tiny black and white, fast-moving, around flowering plants</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["beneficial-insects-california-garden-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Plant These to Feed the Beneficials</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Adults need nectar and pollen even when their larvae are predators. Plant within the vegetable garden, not 20 feet away.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"display: flex; flex-wrap: wrap; gap: 12px;\"><div style=\"flex: 1 1 200px; background-color: #ffffff; border: 1px solid #dde2d8; border-top: 4px solid #b8694a;\"><p style=\"color: #b8694a !important; font-weight: 700; font-size: 13px; margin: 0; padding: 8px 10px 4px;\">Carrot family</p><div style=\"padding: 0 10px 10px;\"><ul style=\"margin: 0; padding: 0 0 0 20px;\"><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Cilantro and dill (let them bolt)</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Bronze fennel</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Parsley (flowers in year two)</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Queen Anne's lace</li></ul></div></div><div style=\"flex: 1 1 200px; background-color: #ffffff; border: 1px solid #dde2d8; border-top: 4px solid #c9a84c;\"><p style=\"color: #c9a84c !important; font-weight: 700; font-size: 13px; margin: 0; padding: 8px 10px 4px;\">Daisy family</p><div style=\"padding: 0 10px 10px;\"><ul style=\"margin: 0; padding: 0 0 0 20px;\"><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Yarrow</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Calendula</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Coreopsis and cosmos</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Sunflowers</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">California aster</li></ul></div></div><div style=\"flex: 1 1 200px; background-color: #ffffff; border: 1px solid #dde2d8; border-top: 4px solid #1a3b2a;\"><p style=\"color: #1a3b2a !important; font-weight: 700; font-size: 13px; margin: 0; padding: 8px 10px 4px;\">Low growers and natives</p><div style=\"padding: 0 10px 10px;\"><ul style=\"margin: 0; padding: 0 0 0 20px;\"><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Sweet alyssum (top syrphid fly plant)</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Buckwheat</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">White clover in pathways</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">California poppy</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Coyote mint, seaside daisy, narrowleaf milkweed</li></ul></div></div></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Plan continuous bloom: California poppies early (February to May), alyssum and buckwheat through summer, asters for fall nectar.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["beneficial-insects-california-garden-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Beneficials Through the Year</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">What your garden allies are doing each season, and how to help them.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Season</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">What is happening</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Your job</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Spring (Mar to May)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Overwintered insects wake; syrphid flies arrive first, ladybugs return from the hills</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Have early nectar blooming; leave winter habitat until days hold above 60 degrees; be patient with early aphids</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Summer (Jun to Aug)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Populations peak; lacewings, parasitic wasps, and ground beetles all active</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Keep something blooming; avoid spraying anything if possible</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Fall (Sep to Nov)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Activity declines; insects seek overwintering sites</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Leave perennial stems standing; do not rake every leaf from the borders</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Winter (Dec to Feb)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Dormant in leaf litter, soil, stems, and bark; some coastal activity continues</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Minimize disturbance; order alyssum, buckwheat, cilantro, and calendula seed for spring</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["attracting-beneficial-insects-to-your-santa-cruz-garden-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">The Big Five and How to Draw Them In</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Your unpaid pest control workforce, and the plants and habitat each one needs.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Ally</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Appetite</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Attract with</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Ladybugs</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Up to 50 aphids per day, plus mites, whiteflies, mealybugs</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Yarrow, fennel, dill, cosmos, sweet alyssum; tolerate some aphids so they stay</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Lacewings</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">One larva eats 200 aphids before pupating</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Cosmos, coreopsis, sunflowers, and carrot family flowers</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Parasitic wasps</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Lay eggs inside aphids, caterpillars, and whiteflies</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Small flowers they can reach: dill, bolted cilantro, alyssum, buckwheat, chamomile</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Syrphid flies</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Larvae devour aphids inside the colonies</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Flat, open blooms: alyssum, yarrow, chamomile, zinnias</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Ground beetles</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Slugs, snails, cutworms, root maggots at night</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Permanent mulch, reduced tilling, boards and stones for daytime cover</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["attracting-beneficial-insects-to-your-santa-cruz-garden-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">The Three-Year Habitat Timeline</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">You are building an ecosystem, not applying a quick fix. Here is the realistic pace.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"display: flex; align-items: flex-start; margin: 0 0 10px;\"><div style=\"background-color: #c9a84c !important; color: #1a3b2a !important; font-weight: 700; font-size: 13px; min-width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; margin-right: 10px;\">1</div><div><span style=\"color: #b8694a !important; font-weight: 700; font-size: 13px;\">Year One:</span> <span style=\"color: #1a3b2a !important; font-size: 13px;\">Plant diverse flowers throughout the garden, stop or sharply reduce pesticides, add water and shelter, tolerate some pests, and observe who shows up.</span></div></div><div style=\"display: flex; align-items: flex-start; margin: 0 0 10px;\"><div style=\"background-color: #c9a84c !important; color: #1a3b2a !important; font-weight: 700; font-size: 13px; min-width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; margin-right: 10px;\">2</div><div><span style=\"color: #b8694a !important; font-weight: 700; font-size: 13px;\">Year Two:</span> <span style=\"color: #1a3b2a !important; font-size: 13px;\">Expand the flowering areas that worked. More beneficials appear and some natural pest control begins. Resist the urge to spray; give predators time to respond.</span></div></div><div style=\"display: flex; align-items: flex-start; margin: 0 0 10px;\"><div style=\"background-color: #c9a84c !important; color: #1a3b2a !important; font-weight: 700; font-size: 13px; min-width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; margin-right: 10px;\">3</div><div><span style=\"color: #b8694a !important; font-weight: 700; font-size: 13px;\">Year Three and beyond:</span> <span style=\"color: #1a3b2a !important; font-size: 13px;\">Established populations return on their own. Pest problems often self-correct, and the garden needs less intervention each season.</span></div></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["attracting-beneficial-insects-to-your-santa-cruz-garden-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Bloom Calendar for Beneficials</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Keep nectar flowing in every season so your allies never leave.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Window</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Plant or maintain</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Feb to Mar</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Sweet alyssum (blooms within weeks), California poppies, early bolting mustards and radishes</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Apr to May</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Bolting cilantro, yarrow (perennial), phacelia, continuing alyssum</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; col
