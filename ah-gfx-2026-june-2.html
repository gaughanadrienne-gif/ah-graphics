or: #b8694a !important; font-weight: 600;\">Jun to Aug</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Cosmos, zinnias, sunflowers, flowering dill and fennel, buckwheat, borage</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Sep to Nov</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Cosmos until frost, chamomile, oregano and thyme flowers, bolted lettuce and brassicas</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Dec to Jan</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Leave standing dead stems for shelter, keep mulch undisturbed; alyssum may bloom on the mild coast</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["preserving-summer-harvest-santa-cruz-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Four Ways to Preserve, Compared</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Start with freezing, then branch out. Each method has a different sweet spot.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Method</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Best for</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Difficulty and safety</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Freezing</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Most vegetables, berries, herbs in oil or water cubes</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Easiest; blanch most vegetables first; inherently safe</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Drying</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Paste tomatoes, herbs, hot peppers, fruit</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Easy; a dehydrator beats sun drying on our foggy coast</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Water bath canning</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Jams, pickles, salsas, tomatoes with added acid</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Moderate; follow tested recipes exactly, never change acid ratios</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Fermentation</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Cabbage, cucumbers, hot peppers, mixed vegetables</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Easy; lactic acid makes it inherently safe when kept submerged in brine</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Use tested recipes from UC ANR Master Food Preservers, the USDA Complete Guide, or the Ball Blue Book for all canning.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["preserving-summer-harvest-santa-cruz-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Blanch-and-Freeze Cheat Sheet</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Blanching stops the enzymes that ruin flavor and color in the freezer. Boil, ice bath, drain, bag.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Crop</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Prep</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Blanch time</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Tomatoes</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Wash, core, tray-freeze whole; skins slip off when thawed</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">None needed</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Zucchini and summer squash</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">1/2 inch rounds (or shred for baking, 2 cups per bag)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">3 minutes (shredded: skip)</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Green beans</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Trim ends, cut or leave whole</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">3 minutes</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Peppers</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Seed and chop, tray-freeze individually</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">None needed</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Corn</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Blanch on the cob, then cut kernels</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">7 to 11 minutes by ear size</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Herbs</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Chop into ice cube trays, cover with water or olive oil</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">None; each cube is about 1 tablespoon</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Quality holds 8 to 12 months for blanched vegetables. Press the air out of bags before sealing.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["preserving-summer-harvest-santa-cruz-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Coastal Preservation Calendar</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Our coastal harvest runs later than inland California. Plan your preserving around these peaks.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Month</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Peak crops</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Do this</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">July</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Early tomatoes, zucchini, green beans, basil and herbs</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Start freezing and drying; make dilly beans; freeze herb cubes before bolting</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">August</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Main tomato harvest, peppers, cucumbers, stone fruit</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Peak canning and sauce season; pickles; start fermented hot sauce; jam</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">September</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Late tomatoes, fall cabbage, apples and pears</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Big sauce or crushed-tomato batch; sauerkraut and kimchi; dry the last herbs</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">October</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Green tomatoes, winter squash, garlic</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Ripen green tomatoes indoors; store winter squash whole 3 to 6 months; braid garlic</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["garden-highlight-malabar-spinach-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Malabar Spinach Quick Facts</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">The summer green that takes over when true spinach bolts.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Fact</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Detail</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">What it is</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">A tropical climbing vine (Basella alba and rubra), not related to true spinach</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Size</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">6 to 10 feet or more in a single season; needs a sturdy trellis or fence</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Heat needs</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Grows fastest above 80 degrees, struggles below 60, killed by frost</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Planting window</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Late May or early June, once nights stay above 50 degrees</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">First harvest</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">55 to 70 days after planting; harvest young leaves and 4 to 6 inch tips</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Varieties</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Green (slightly milder) and red-stemmed (ornamental; the color fades when cooked)</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["garden-highlight-malabar-spinach-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Will It Thrive in Your Microclimate?</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">This heat-lover behaves very differently across Santa Cruz County.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Where you garden</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Outlook</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">How to succeed</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Inland (Scotts Valley, Watsonville, sunny mountain exposures)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Good conditions</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Full sun and a sturdy support for vigorous vines</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Coastal (Aptos, Capitola, Live Oak, Santa Cruz)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Grows, but slowly</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Warmest microclimate: south-facing, against a heat-absorbing wall, black plastic mulch</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Under redwoods</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Not recommended</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Too cool and shaded; needs full sun and warmth</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Coastal backup plan: New Zealand spinach (even more heat-tolerant here), Swiss chard, or perpetual spinach fill the same summer greens gap.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["when-to-plant-what-understanding-our-year-round-season-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Our Two Growing Seasons</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Forget spring-summer-fall-winter. Santa Cruz runs on a cool season and a warm season.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\"></th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Cool season (Sep to May)</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Warm season (May to Sep)</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Temperatures</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">40 to 70 degrees</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">55 to 85 degrees (cooler at coast, warmer inland)</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Water</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Rainfall handles most irrigation (Oct to Apr)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">No rain; you provide every drop</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Pressure</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Less pest pressure, lower disease risk</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">More pests (aphids, caterpillars, gophers) and more disease</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Best crops</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Lettuce, kale, chard, spinach, broccoli, cabbage, peas, carrots, beets, radishes, cilantro</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Tomatoes, peppers, eggplant, squash, cucumbers, melons, beans, basil</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">April and October are transition months: one season finishing while the other gets started. Stay flexible and observe.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["when-to-plant-what-understanding-our-year-round-season-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Month-by-Month Planting Snapshot</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">General guidelines; your microclimate shifts these windows by 2 to 4 weeks.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Month</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Plant</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">January</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Bare-root fruit trees, peas, lettuce, spinach, arugula, fava beans</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">February</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Peas, lettuce, spinach, radishes, beets, carrots, onion sets, early potatoes</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">March</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Major month: brassica transplants, lettuce, kale, chard, peas, carrots, potatoes, cilantro</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">April</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Last cool-season plantings; begin hardening off warm-season seedlings</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">May</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">THE warm-season month: tomatoes, peppers, eggplant, squash, cucumbers, melons, beans, basil, corn</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">June</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Late tomatoes, succession beans, summer squash, cucumbers, basil</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">July</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Last bean succession; start fall brassica seeds indoors</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">August</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Transplant brassicas, direct seed lettuce late in the month, cover crops</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">September</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Second major month: greens, more brassicas, garlic (late), fava beans, peas, cilantro</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">October</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Garlic (early), fava beans, peas, lettuce, spinach, radishes, turnips, cover crops</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">November</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Last lettuce and greens, spinach, fava beans, cover crops</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">December</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Not much: harvest, maintain, plan, and order seeds</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["when-to-plant-what-understanding-our-year-round-season-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Frost Windows by Microclimate</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Average frost dates across the county. Track your own garden; microclimates vary dramatically.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Area</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Last spring frost</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">First fall frost</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Coastal (Aptos, Capitola, Santa Cruz)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Rare; late February if at all</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">November or later, sometimes none all winter</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Inland valleys (Scotts Valley, Soquel)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Mid to late March</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Late October to early November</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">San Lorenzo Valley (Boulder Creek, Ben Lomond)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Early to mid April</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Mid to late October</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">High-elevation San Lorenzo Valley: last frost can run into late April. Low-lying areas frost sooner than hillsides, and spots near buildings or under canopy stay warmer.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";



window.AH_GRAPHICS["deer-resistant-vegetable-gardening-in-santa-cruz-county-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Know Your Adversary</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Deer facts that explain why half-measures fail.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><ul style=\"margin: 0; padding: 0 0 0 20px;\"><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">They can jump up to 8 feet when motivated</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Peak feeding is dawn and dusk, but bold deer browse in broad daylight</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Creatures of habit: they follow established paths and remember food sources year to year</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Drought pushes deer to eat plants they would normally ignore</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Does feeding fawns take risks they would otherwise avoid</li></ul><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Pressure is heaviest in the San Lorenzo Valley, Bonny Doon, the Soquel hills, rural Aptos, and Corralitos. Ask neighbors what they see; populations vary block to block.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["deer-resistant-vegetable-gardening-in-santa-cruz-county-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Deer Fencing Options Compared</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Under serious pressure, fencing is the only reliable long-term solution. Pick the style that fits your site.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Option</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">How it works</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Cost and notes</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Standard 8-foot fence</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Poly deer netting or welded wire on posts; bury the bottom 6 inches</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Netting about $1 to $2 per linear foot; a 100-foot perimeter runs $500 to $1,500 in materials</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Double fence</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Two parallel 4 to 5 foot fences, 4 to 5 feet apart; deer will not jump high and wide at once</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Less imposing visually, but uses more ground space</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Angled fence</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">4 to 5 feet tall, leaning outward at roughly 45 degrees; deer cannot gauge the jump</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Less common; needs sturdy construction</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Electric fence</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Strands at nose height (about 30 inches), baited with peanut butter to train avoidance</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Lower initial cost; solar chargers work well here; needs regular maintenance</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Gates are usually the weak point: make them as tall as the fence and self-closing.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["deer-resistant-vegetable-gardening-in-santa-cruz-county-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Deer Menu: Protect These, Plant Those</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">No plant is truly deer-proof, but the gap between favorites and avoided crops is big.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"display: flex; flex-wrap: wrap; gap: 12px;\"><div style=\"flex: 1 1 200px; background-color: #ffffff; border: 1px solid #dde2d8; border-top: 4px solid #b8694a;\"><p style=\"color: #b8694a !important; font-weight: 700; font-size: 13px; margin: 0; padding: 8px 10px 4px;\">Deer favorites (fence these first)</p><div style=\"padding: 0 10px 10px;\"><ul style=\"margin: 0; padding: 0 0 0 20px;\"><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Beans and peas (absolute candy)</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Lettuce, spinach, chard, and all greens</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Strawberries</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Broccoli, cabbage, kale, Brussels sprouts</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Corn, once discovered</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Fruit tree leaves, bark, and fruit</li></ul></div></div><div style=\"flex: 1 1 200px; background-color: #ffffff; border: 1px solid #dde2d8; border-top: 4px solid #1a3b2a;\"><p style=\"color: #1a3b2a !important; font-weight: 700; font-size: 13px; margin: 0; padding: 8px 10px 4px;\">Usually left alone</p><div style=\"padding: 0 10px 10px;\"><ul style=\"margin: 0; padding: 0 0 0 20px;\"><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Garlic, onions, leeks, chives</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Rosemary, lavender, sage, thyme, oregano, mint</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Tomatoes, peppers (especially hot), eggplant</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Squash and pumpkins (prickly leaves)</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Potatoes, carrots, beets, radishes (roots protected underground)</li></ul></div></div></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">A hungry deer in a drought year will sample almost anything. Treat resistant plants as a supplement to fencing, not a substitute.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["watering-basics-how-much-how-often-and-when-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Summer Watering by Microclimate</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Target 1 to 2 inches per week, soaking to 12 inches where the roots live. Frequency depends on where you garden.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Where you garden</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Summer frequency</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Why</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Coastal (Aptos, Capitola, Live Oak)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Every 2 to 3 days</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Fog adds humidity and slows evaporation</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Inland valleys (Scotts Valley, Soquel hills, Watsonville)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Daily</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Full sun and low humidity; sandy soil and containers may need more</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">San Lorenzo Valley</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Sunny spots daily; shaded every 2 to 3 days</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Depends on sun exposure</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Under redwoods (Felton, forested areas)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Every 3 to 4 days</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Shade slows evaporation, but tree roots steal moisture</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Soil type matters too: sandy every 1 to 2 days, clay every 3 to 4, loam every 2 to 3. Always finger-test 3 to 4 inches down before watering.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["watering-basics-how-much-how-often-and-when-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">When to Water: The Timing Card</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Timing matters almost as much as quantity.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Window</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Verdict</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Why</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">6am to 10am</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Best</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Plants are stocked for the day's heat and foliage dries fast, cutting fungal disease risk</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">4pm to 7pm</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Second best</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Less evaporation, but wet leaves overnight invite powdery mildew, especially with coastal fog</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">11am to 3pm</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Avoid</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">High evaporation wastes water</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Any time</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Exception</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">True wilt (dry soil, drooping plant): water immediately</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Temporary afternoon droop on a hot day that recovers by evening is a normal stress response; stick to your schedule.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["watering-basics-how-much-how-often-and-when-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Season-by-Season Watering Schedule</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">From May through October, you are the rain.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Season</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Frequency</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Amount</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Summer (Jun to Sep)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Coastal every 2 to 3 days; inland daily; containers daily or twice daily</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">1 to 2 inches per week</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Spring (Mar to May)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">March weekly; April every 4 to 5 days; May every 2 to 3 days</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">1 inch per week</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Fall (Oct to Nov)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">October every 3 to 4 days; November weekly or stop when rain returns</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">1 inch per week, tapering</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Winter (Dec to Feb)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Rain-driven; water deeply once if no rain for 2+ weeks</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Supplemental only</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["garden-highlight-herb-basil-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Pick a Basil for Your Microclimate</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">The right variety makes the difference between struggling stems and abundant pesto.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Situation</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Varieties</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Why</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Coastal and cool areas</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Genovese, Italian Large Leaf, Lettuce Leaf</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">More tolerant of cool conditions; classic pesto flavor</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Warm inland areas</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Sweet Basil, Thai, Purple (Dark Opal, Red Rubin), Lemon, African Blue</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Thrive on heat; Thai resists bolting; African Blue is perennial in mild areas</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Containers</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Spicy Globe, Windowbox, Greek</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Naturally compact and bushy with less pinching required</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["garden-highlight-herb-basil-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Basil Planting Windows</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Timing depends entirely on your microclimate. Cold soil means stunted, struggling plants.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Microclimate</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">When to plant</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Coastal (Aptos, Capitola, Santa Cruz, Live Oak)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Late May or even June, once soil reaches at least 60 degrees</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Sunny inland areas</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Mid to late April for transplants; May for direct seeding</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Under redwoods (Felton, shaded canyons)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Grow in containers you can move to sun; wait for consistent 70 degrees</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Watsonville and Pajaro Valley</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Late April through May</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Succession plant every 4 weeks (two or three rounds) so you always have young, productive plants. Seeds need 70-degree soil to germinate well, so transplants are easier here.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["garden-highlight-herb-basil-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Pinching: The Secret to Bushy Basil</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Every pinch doubles the growing tips. Unpinched basil grows tall, spindly, and bitter.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"display: flex; align-items: flex-start; margin: 0 0 10px;\"><div style=\"background-color: #c9a84c !important; color: #1a3b2a !important; font-weight: 700; font-size: 13px; min-width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; margin-right: 10px;\">1</div><div><span style=\"color: #b8694a !important; font-weight: 700; font-size: 13px;\">Start early.</span> <span style=\"color: #1a3b2a !important; font-size: 13px;\">When plants have 3 to 4 sets of leaves, pinch out the top growing tip.</span></div></div><div style=\"display: flex; align-items: flex-start; margin: 0 0 10px;\"><div style=\"background-color: #c9a84c !important; color: #1a3b2a !important; font-weight: 700; font-size: 13px; min-width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; margin-right: 10px;\">2</div><div><span style=\"color: #b8694a !important; font-weight: 700; font-size: 13px;\">Cut above a node.</span> <span style=\"color: #1a3b2a !important; font-size: 13px;\">Always pinch just above a pair of leaves; two new branches grow from that point.</span></div></div><div style=\"display: flex; align-items: flex-start; margin: 0 0 10px;\"><div style=\"background-color: #c9a84c !important; color: #1a3b2a !important; font-weight: 700; font-size: 13px; min-width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; margin-right: 10px;\">3</div><div><span style=\"color: #b8694a !important; font-weight: 700; font-size: 13px;\">Keep going.</span> <span style=\"color: #1a3b2a !important; font-size: 13px;\">Re-pinch each branch every time it adds 3 to 4 new leaf sets.</span></div></div><div style=\"display: flex; align-items: flex-start; margin: 0 0 10px;\"><div style=\"background-color: #c9a84c !important; color: #1a3b2a !important; font-weight: 700; font-size: 13px; min-width: 24px; height: 24px; border-radius: 50%; text-align: center; line-height: 24px; margin-right: 10px;\">4</div><div><span style=\"color: #b8694a !important; font-weight: 700; font-size: 13px;\">Stop the flowers.</span> <span style=\"color: #1a3b2a !important; font-size: 13px;\">Remove flower buds the moment you see them; flowering ends quality leaf production.</span></div></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Harvest works the same way: cut stems above a leaf node, from the top of the plant, up to one-third of the plant at a time.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["greywater-basics-california-gardeners-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">What Counts as Greywater?</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Know the categories before you plan a system. The simplest setups use washing machine water only.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"display: flex; flex-wrap: wrap; gap: 12px;\"><div style=\"flex: 1 1 200px; background-color: #ffffff; border: 1px solid #dde2d8; border-top: 4px solid #1a3b2a;\"><p style=\"color: #1a3b2a !important; font-weight: 700; font-size: 13px; margin: 0; padding: 8px 10px 4px;\">Greywater</p><div style=\"padding: 0 10px 10px;\"><ul style=\"margin: 0; padding: 0 0 0 20px;\"><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Washing machines</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Bathroom sinks</li><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Showers and bathtubs</li></ul></div></div><div style=\"flex: 1 1 200px; background-color: #ffffff; border: 1px solid #dde2d8; border-top: 4px solid #c9a84c;\"><p style=\"color: #c9a84c !important; font-weight: 700; font-size: 13px; margin: 0; padding: 8px 10px 4px;\">Separate rules</p><div style=\"padding: 0 10px 10px;\"><ul style=\"margin: 0; padding: 0 0 0 20px;\"><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Kitchen sinks and dishwashers: not simple greywater under California law (food waste, grease, heat)</li></ul></div></div><div style=\"flex: 1 1 200px; background-color: #ffffff; border: 1px solid #dde2d8; border-top: 4px solid #b8694a;\"><p style=\"color: #b8694a !important; font-weight: 700; font-size: 13px; margin: 0; padding: 8px 10px 4px;\">Never greywater</p><div style=\"padding: 0 10px 10px;\"><ul style=\"margin: 0; padding: 0 0 0 20px;\"><li style=\"color: #1a3b2a !important; font-size: 13px; margin: 0 0 6px; line-height: 1.45;\">Toilets: that is blackwater and must always go to the sewer or septic</li></ul></div></div></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">The numbers: a washer uses 15 to 30 gallons per load; 4 to 6 loads a week is 60 to 180 gallons for your garden. Laundry-to-landscape recaptures roughly 17 gallons per person per day, about 2,000 gallons a month for a family of four.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["greywater-basics-california-gardeners-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Greywater Plant Guide</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">California rules: greywater must never touch the edible portion of any food crop.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Status</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Plants</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Notes</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Green light</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Fruit trees, berry bushes, ornamental trees and shrubs, roses, lawn</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">A single fruit tree can absorb 10 to 20 gallons per week in the growing season</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Use with caution</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Tomatoes, peppers, squash, beans (edible part above ground); acid-lovers like blueberries</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Apply only at soil level under mulch; greywater runs slightly alkaline (pH 7 to 8), so test soil pH yearly near acid-lovers</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Do not irrigate</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Root vegetables (carrots, beets, radishes, potatoes), low leafy greens, sprouts and microgreens</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">The edible part contacts irrigated soil or splash; use fresh water only</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["the-hidden-danger-of-rodent-poison-protecting-santa-cruz-wildlife-g1"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Rodenticide Exposure in California Wildlife</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Share of tested animals carrying anticoagulant rodenticides in California studies and CDFW reviews.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Species</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Tested positive</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Mountain lions</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">About 95% (statewide CDFW review)</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Bobcats</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">88%, many carrying multiple compounds</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Cooper's hawks</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">82%</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Red-tailed hawks</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">72%</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Barn owls</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">59% in some sampling, up to 92% in broader composites</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">These are the same predators that control rodents for free. Three bobcats found dead near UC Santa Cruz tested positive for multiple anticoagulants; one carried three times the typical lethal dose of brodifacoum.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["the-hidden-danger-of-rodent-poison-protecting-santa-cruz-wildlife-g2"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Read the Label: Ingredients to Avoid</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">If any of these appear on a rodent bait label, wildlife pays the price.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Class</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Active ingredients</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Risk</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Second-generation anticoagulants</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Brodifacoum, bromadiolone, difethialone, difenacoum</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Most dangerous: persist in tissues for months and are the primary cause of secondary poisoning</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">First-generation anticoagulants</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Warfarin, chlorophacinone, diphacinone</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Break down faster but still accumulate in predators eating multiple poisoned rodents</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Other rodenticides</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Bromethalin, zinc phosphide</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Still dangerous; bromethalin has been detected in non-target wildlife</td></tr></table></div><p style=\"color: #1a3b2a !important; font-size: 12px; margin: 10px 0 0; padding: 8px 10px; background-color: #dde2d8; border-left: 4px solid #c9a84c;\">Bottom line: no rodent poison is truly safe for wildlife. Bait stations protect kids and pets from the bait, not owls and foxes from poisoned rodents.</p></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["the-hidden-danger-of-rodent-poison-protecting-santa-cruz-wildlife-g3"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\"><div style=\"background-color: #1a3b2a !important; padding: 16px 20px; border-radius: 8px 8px 0 0;\"><h3 style=\"color: #f8f9f0 !important; margin: 0; font-size: 19px; line-height: 1.3;\">Poison-Free Rodent Control That Works</h3><p style=\"color: #dde2d8 !important; margin: 5px 0 0; font-size: 13px;\">Effective alternatives, many of which outperform poison long term.</p></div><div style=\"background-color: #f8f9f0; border: 1px solid #dde2d8; border-top: none; padding: 14px 16px;\"><div style=\"overflow-x: auto;\"><table style=\"width: 100%; border-collapse: collapse; min-width: 650px;\"><tr><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">Method</th><th style=\"background-color: #1a3b2a !important; color: #f8f9f0 !important; padding: 8px 10px; text-align: left; font-size: 12.5px; border: 1px solid #1a3b2a;\">How to use it</th></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Snap traps</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Instant and humane when set well: perpendicular to walls, trigger toward the wall, peanut butter bait, checked daily</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Electronic traps</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Quick lethal shock, enclosed design, reusable for years</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Exclusion (most permanent)</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Seal every gap over 1/4 inch with hardware cloth, add door sweeps, check rooflines and utility entries</td></tr><tr style=\"background-color: #f8f9f0;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Habitat modification</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">Pick up fallen fruit daily, seal pet food and trash, store wood off the ground, clear debris against structures</td></tr><tr style=\"background-color: #ffffff;\"><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #b8694a !important; font-weight: 600;\">Natural predators</td><td style=\"padding: 8px 10px; font-size: 12.5px; border: 1px solid #dde2d8; color: #1a3b2a !important;\">One barn owl family eats 2,000 to 4,000 rodents a year; install an owl box and tolerate gopher and king snakes</td></tr></table></div></div><div style=\"background-color: #dde2d8; padding: 7px; text-align: center; border-radius: 0 0 8px 8px;\"><span style=\"color: #1a3b2a !important; font-size: 11px; letter-spacing: 1px;\">ambitiousharvest.com</span></div></div>";
