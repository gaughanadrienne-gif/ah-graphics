window.AH_GRAPHICS["grow-cilantro-santa-cruz-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Why Cilantro Bolts</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">Four triggers, and which ones you can actually control</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Trigger</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">What Happens</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Your Move</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Day length over 12 hours</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Mid-March through late September is the hard window; short days keep plants leafy</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Plant late September through mid-March</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Heat above 75&deg;F</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Warm spells speed bolting, cool weather slows it</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Use afternoon shade; coastal fog is an advantage</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Root stress</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Transplant shock or drought pushes plants to flower early</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Direct sow and keep soil consistently moist</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Genetics</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Standard cilantro bolts at the slightest provocation</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Choose slow-bolt varieties for 2 to 3 extra weeks</td></tr></table></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["growin-thyme-santa-cruz-g2"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Thyme Care Card</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">This Mediterranean native thrives on neglect</p></div><div style=\"background-color:#f8f9f0;padding:6px 0\"><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Water:</strong> established in-ground plants rarely need summer irrigation. Containers: every 5 to 7 days in summer, every 2 to 3 weeks in winter.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Feed:</strong> skip the fertilizer. Rich soil produces floppy growth and bland flavor.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Prune after flowering:</strong> cut back by about one-third; never cut into bare woody stems.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Prune in early spring:</strong> remove dead stems and shape; divide overgrown clumps every 3 to 4 years.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Site:</strong> 6+ hours of full sun, excellent drainage, pH 6.5 to 8.0; space plants 12 to 18 inches.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Plant:</strong> fall (September to November) is ideal so winter rain establishes roots; spring works too.</span></div></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["how-to-start-a-vegetable-garden-in-santa-cruz-county-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Raised Bed Build Card</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">The standard Santa Cruz starter bed, gopher-proofed from day one</p></div><div style=\"background-color:#f8f9f0;padding:6px 0\"><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">1.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Size it:</strong> 4 feet wide by 8 feet long by 12 inches deep keeps everything reachable from the sides.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">2.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Choose materials:</strong> untreated cedar or redwood, or galvanized metal. Skip pressure-treated lumber unless rated for organic gardening.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">3.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Level the ground</strong> where the bed will sit.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">4.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Lay cardboard or newspaper</strong> to suppress weeds.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">5.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Install gopher wire</strong> across the bottom. In Santa Cruz County, assume gophers will find you.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">6.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Fill with the 60/30/10 mix:</strong> 60% topsoil, 30% compost, 10% perlite or rice hulls.</span></div></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["how-to-start-a-vegetable-garden-in-santa-cruz-county-g2"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Year-Round Planting Windows</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">What goes in the ground each quarter in Santa Cruz County</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Months</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Season</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Plant These</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">January to March</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Cool-season</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Peas, lettuce, brassicas, carrots, beets</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">April to June</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Warm-season</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Tomatoes, peppers, squash, cucumbers, beans (coast waits until late May or June)</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">July to September</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Fall crops</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">More brassicas, lettuce, root vegetables</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">October to December</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Overwintering</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Garlic, fava beans, hardy lettuces</td></tr></table></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["how-to-find-the-sunniest-spot-in-your-yard-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">How Much Sun Does Each Crop Need?</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">Match your crops to your light before you plant</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Category</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Direct Sun</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Crops</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#c9a84c!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">FULL SUN</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">6+ hours</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Tomatoes, peppers, eggplant, squash, cucumbers, melons, beans, corn, basil</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#1a3b2a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">PARTIAL SUN</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">4 to 6 hours</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Lettuce, spinach, kale, chard, peas, radishes, beets, carrots, cilantro, parsley</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#b8694a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">SHADE TOLERANT</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">3 to 4 hours</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Lettuce, spinach, arugula, some Asian greens; expect smaller yields</td></tr></table></div><div style=\"background-color:#f8f9f0;padding:8px 14px\"><p style=\"color:#1a3b2a!important;font-size:12px;margin:0\">A tomato in shade grows tall and leggy but sets little fruit. No variety or technique overcomes insufficient light.</p></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["how-to-find-the-sunniest-spot-in-your-yard-g2"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">The One-Day Sun Audit</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">A few hours of observation now saves months of frustration later</p></div><div style=\"background-color:#f8f9f0;padding:6px 0\"><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">1.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Pick a clear day</strong> in the season you plan to grow. Audit again in winter if you want year-round beds.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">2.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Check at 8 AM, 10 AM, noon, 2 PM, 4 PM, and 6 PM.</strong> Walk the yard and note full sun, dappled shade, or full shade.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">3.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Sketch a map</strong> and shade in the shadows at each check. Sunny spots reveal themselves by day's end.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">4.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Or use the photo method:</strong> shoot the yard from the same spot every hour from 8 AM to 6 PM, then count sun hours per spot.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">5.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Confirm with a stake:</strong> mark a candidate spot and tally its hours of direct sun. Seven hours qualifies as full sun.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">6.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Count only direct sun.</strong> Dappled light, fog-filtered light, and bright shade do not count. Foggy areas: audit a typical foggy day, not a rare clear one.</span></div></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["growing-oregano-in-santa-cruz-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Oregano Variety Guide</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">Not all oregano is created equal; taste a leaf before you buy</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Variety</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Flavor</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Best For</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Greek oregano</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Sharp, peppery bite</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">The cooking standard: pizza, tomato sauces, Greek salads; most drought-tolerant</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Italian oregano</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Milder, sweeter hybrid</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Pasta dishes and herb blends; good for foggy coastal gardens</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Syrian oregano</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Complex, thyme and marjoram notes</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Za'atar blends; give it a warm spot in frost-prone areas</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Ornamental ('Kent Beauty')</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Essentially flavorless</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Cascading bracts for pollinators and hanging baskets</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Mexican oregano</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Citrusy, not true oregano</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Mexican and Tex-Mex cooking; frost-tender, pot it up in cold spots</td></tr></table></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["growing-oregano-in-santa-cruz-g2"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Oregano Care Card</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">Mild stress concentrates the oils that make oregano taste like oregano</p></div><div style=\"background-color:#f8f9f0;padding:6px 0\"><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Water:</strong> established in-ground plants rarely need any, even in dry summers. Containers: water when the top 2 inches are dry.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Coastal gardens:</strong> summer fog usually provides enough moisture; overwatering is the main killer.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Feed:</strong> generally unnecessary. At most, one light dose of balanced organic fertilizer in early spring.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Spring prune:</strong> cut plants back by about half to spark bushy new growth.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>After flowering:</strong> cut back one-third to one-half for a fresh flush before winter.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Harvest:</strong> morning, before flowering, never more than one-third of the plant at once.</span></div></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["square-foot-gardening-maximizing-space-for-higher-yields-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Plants Per Square Foot</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">The heart of the system: spacing by mature plant size</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Per Square</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Grid</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Crops</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">16 plants</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">4 x 4</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Radishes, short carrots, green onions, beets (thin as babies), small turnips</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">9 plants</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">3 x 3</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Spinach, arugula, bush beans, full-size beets</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">4 plants</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">2 x 2</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Lettuce, chard, kale, parsley, cilantro, basil, bok choy, kohlrabi</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">2 plants</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">1 x 2</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Large kale and chard varieties, celery</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">1 plant</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Full square</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Tomato, pepper, eggplant, broccoli, cauliflower, cabbage, trellised cucumber</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">1 per 2+ squares</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Space hogs</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Winter squash, melons, indeterminate tomatoes (give 2 to 4 squares)</td></tr></table></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

le=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Green onions<br><span style=\"color:#b8694a!important;font-size:12px\">16</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Bush beans<br><span style=\"color:#b8694a!important;font-size:12px\">9</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Parsley + cilantro<br><span style=\"color:#b8694a!important;font-size:12px\">4 total</span></td></tr></table></div><div style=\"background-color:#f8f9f0;padding:8px 14px\"><p style=\"color:#1a3b2a!important;font-size:12px;margin:0\">Top row = north side (trellises and tall plants). Bottom row = south side (front, shortest crops).</p></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["summer-garden-survival-guide-coastal-california-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Coastal Summer Watering Rules</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">The single most important summer skill on the Central Coast</p></div><div style=\"background-color:#f8f9f0;padding:6px 0\"><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Water deeply, less often:</strong> soak to 6 to 8 inches. Raised beds: 2 to 3 times per week in hot spells, once or twice weekly during foggy stretches.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Finger test first:</strong> push a finger 2 inches into the soil. Dry at that depth means water; moist means wait a day.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Water in the morning</strong> so foliage dries before evening. Wet leaves overnight drive fungal disease in coastal gardens.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Use drip irrigation:</strong> water goes to the root zone, foliage stays dry. Adjust the timer for foggy vs heat-wave weeks.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#c9a84c!important;font-weight:700;margin-right:8px\">&#9632;</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Mulch 2 to 4 inches:</strong> cuts soil moisture loss by 25 to 50 percent. Keep mulch a few inches off plant stems.</span></div></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["summer-garden-survival-guide-coastal-california-g2"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Beating the Fog</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">Variety picks and microclimate tricks for cool coastal summers</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Strategy</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Details</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Fog-tolerant tomatoes</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Early Girl, Stupice, Glacier, San Francisco Fog; cherry and early slicers beat beefsteaks on the coast</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Cool-setting peppers</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Gypsy, Carmen, Shishito set fruit at lower temperatures than most bells</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Row covers and cloches</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Raise temperatures around plants 2 to 5 degrees; can turn a September harvest into July</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">South-facing walls</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Absorb heat by day, radiate it at night; plant your heat lovers there</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Air circulation</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Space plants fully, prune lower tomato leaves; fog plus crowding equals fungus</td></tr></table></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["slug-and-snail-control-in-foggy-santa-cruz-gardens-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">What Works vs What Wastes Your Time</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">Slug control verdicts for the fog belt</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Method</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Verdict</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Notes</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Hand picking at night</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#1a3b2a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">WORKS</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Headlamp at 10 PM on damp nights; drop into soapy water</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Iron phosphate bait</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#1a3b2a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">WORKS</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Safest effective bait; scatter thinly, reapply after rain, every 1 to 2 weeks in season</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Copper barriers</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#1a3b2a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">WORKS</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">At least 2 inches wide on pots and raised beds; keep clean, no plant bridges</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Beer traps</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#c9a84c!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">PARTIAL</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Good for monitoring; rim above soil so ground beetles stay safe</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Habitat cleanup + predators</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#1a3b2a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">WORKS</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Remove boards and debris; welcome ground beetles, birds, and ducks</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Salt, eggshells, coffee grounds</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#b8694a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">SKIP</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Tested and failed; slugs crawl right over eggshells</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Diatomaceous earth, ultrasonic devices</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#b8694a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">SKIP</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">DE only works dry (hours in our fog); ultrasonics do nothing</td></tr></table></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["slug-and-snail-control-in-foggy-santa-cruz-gardens-g2"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Seasonal Slug Control Calendar</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">Match your effort to the slug pressure</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Season</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Pressure</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Priorities</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Dry season (Jun to Sep)</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#1a3b2a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">LOW</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Reduce habitat; hand-pick daytime hideouts; clean up before rain returns</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">First rains (Oct to Nov)</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#b8694a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">EXPLODING</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Bait BEFORE you see damage; pick aggressively; barrier new fall transplants</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Wet season (Dec to Mar)</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#b8694a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">PEAK</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Reapply bait after every rain; pick on mild damp evenings; expect some damage</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Spring (Apr to May)</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#c9a84c!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">EASING</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Protect spring seedlings; focus picking on foggy mornings; taper baiting</td></tr></table></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["gopher-control-what-actually-works-in-santa-cruz-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Gopher Trapping in 6 Steps</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">The most reliable method, with 80 percent or better success when done right</p></div><div style=\"background-color:#f8f9f0;padding:6px 0\"><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">1.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Find the main tunnel.</strong> Probe near a fresh mound with a metal rod; the tunnel is usually 6 to 12 inches deep and you will feel it give.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">2.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Open the tunnel</strong> to expose the 2 to 3 inch passage.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">3.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Set two traps,</strong> one facing each direction. Cinch traps are easiest; Macabee is the classic.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">4.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Secure traps with wire</strong> so you can retrieve them.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">5.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Cover the hole</strong> to block light. The gopher comes to plug the opening and meets your trap.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">6.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Check daily.</strong> No catch in 2 to 3 days? Move to a different tunnel. Persistence wins.</span></div></div><div style=\"background-color:#f8f9f0;padding:8px 14px\"><p style=\"color:#1a3b2a!important;font-size:12px;margin:0\">ID check: gophers leave crescent or fan-shaped mounds with a plugged hole; moles make volcano mounds and raised ridges.</p></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["gopher-control-what-actually-works-in-santa-cruz-g2"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Gopher Methods Scorecard</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">Where to spend your effort, and where not to</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Method</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Verdict</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Notes</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Trapping in main tunnels</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#1a3b2a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">WORKS</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Most reliable method; Cinch, Macabee, GopherHawk, or Black Box traps</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Hardware cloth under raised beds</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#1a3b2a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">WORKS</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Half-inch galvanized mesh, extended 6 inches up the sides</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Gopher baskets</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#1a3b2a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">WORKS</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Protect individual high-value plants: fruit trees, tomatoes, perennials</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Perimeter exclusion fencing</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#1a3b2a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">WORKS</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Bury 18 to 24 inches deep, 6 inches above grade; labor-intensive</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Barn owls, resistant plants, flooding</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#c9a84c!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">MIXED</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Owl boxes help long-term; daffodils and alliums deter somewhat</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Ultrasonic stakes, gum, exhaust</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#b8694a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">SKIP</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">No scientific backing; gophers habituate or ignore them</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Poison baits</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#b8694a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">RISKY</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Danger to pets, kids, and wildlife that eat poisoned gophers</td></tr></table></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["your-first-season-timeline-what-to-expect-month-by-month-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Your Spring-Start Year at a Glance</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">A realistic first-year rhythm for Santa Cruz County</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Month</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Main Work</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">You're Harvesting</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">March</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Plan, build beds, set up irrigation</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Nothing yet, and that is fine</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">April</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Plant cool-season crops; hold the tomatoes</td><td style=\"padding:9px 12px;border-b window.AH_GRAPHICS["organic-pest-identification-guide-santa-cruz-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Read the Damage First</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">Match the symptom to the likely culprit before you treat anything</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">What You See</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Likely Culprits</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Quick Confirm</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Holes in leaves</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Caterpillars, beetles, earwigs, slugs, snails</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Smooth-edged holes plus slime trails point to slugs and snails</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Sticky residue or black mold</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Aphids, wh olid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Hand-pick mornings; spare any wearing white wasp cocoons</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Cabbage worms</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Year-round, spring and fall peaks</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Row covers at planting; Bt spray if needed</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Earwigs</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Spring and summer</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Rolled newspaper traps set out at dusk</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Slugs and snails</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Fall through spring</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Iron phosphate bait plus night hand-picking</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Spider mites</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Hot, dry spells</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Water spray on leaf undersides; avoid broad-spectrum sprays</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Cutworms</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Spring</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Cardboard collars on transplants at planting</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Gophers</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Year-round</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Wire baskets and hardware cloth; trap active tunnels</td></tr></table></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["in-bed-vermicomposting-composting-with-worms-directly-in-your-garden-beds-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Set Up Your In-Bed Worm System</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">From empty bed to working worms in five steps</p></div><div style=\"background-color:#f8f9f0;padding:6px 0\"><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">1.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Start with one or two beds:</strong> established beds with healthy soil, ideally growing heavy feeders like tomatoes or squash.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">2.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Create a feeding zone:</strong> a trench 6 to 8 inches deep, holes 8 to 10 inches deep, or a buried 5-gallon bucket with holes drilled in it.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">3.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Add bedding:</strong> 3 to 4 inches of shredded paper, cardboard, dry leaves, or straw, moistened like a wrung-out sponge.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">4.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Add red wigglers:</strong> one-half to 1 pound per bed (roughly 500 to 1,000 worms). Composting worms, not garden earthworms.</span></div><div style=\"padding:9px 14px;border-bottom:1px solid #dde2d8\"><span style=\"color:#b8694a!important;font-weight:700;margin-right:8px\">5.</span><span style=\"color:#1a3b2a!important;font-size:14px\"><strong>Wait 3 to 5 days before feeding</strong> so the worms settle in. They thrive between 55 and 77&deg;F, which Santa Cruz soil provides almost year-round.</span></div></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["in-bed-vermicomposting-composting-with-worms-directly-in-your-garden-beds-g2"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">The Worm Menu</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">Bury scraps 3 to 4 inches deep, once or twice a week</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Category</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Items</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#1a3b2a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">EXCELLENT</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Vegetable and fruit scraps, coffee grounds and filters, tea bags, crushed eggshells, leafy greens, squash and melon scraps, plain bread, pasta, and rice in moderation</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#c9a84c!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">SPARINGLY</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Citrus peels (chop small), onions and garlic, spicy peppers, oily foods, small amounts of dairy</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#b8694a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">NEVER</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Meat and fish, pet waste, diseased plant material, weed seeds, glossy paper, treated wood sawdust</td></tr></table></div><div style=\"background-color:#f8f9f0;padding:8px 14px\"><p style=\"color:#1a3b2a!important;font-size:12px;margin:0\">A pound of worms can process roughly half its body weight daily. Start with a quart or two of scraps per week and scale up as material disappears.</p></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["reading-seed-packets-what-all-those-numbers-mean-g1"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Seed Packet Decoder</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">What each line means, translated for Santa Cruz County</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Packet Says</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">What It Means</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Santa Cruz Adjustment</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Days to maturity</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">From transplant (tomatoes, peppers) or from germination (direct-sown crops)</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Add 10 to 20 days on the foggy coast; inland matches the number</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Hardiness zone</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Average minimum winter temperature; we are 9b to 10a</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Mostly irrelevant for annual vegetables; Sunset Zones 15 to 17 are far more useful</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Planting depth</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">2 to 3 times the seed's width</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">In cool, damp spring soil, plant at the shallow end so seeds do not rot</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Full sun</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">6 to 8+ hours of direct light</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Coast: give full-sun crops every possible hour; inland greens may want afternoon shade</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Spacing</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Between plants and between rows</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Use the between-plants number in beds; do not crowd in fog country</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top;font-weight:600\">Soil temperature</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Warm-season seeds need 60&deg;F, ideally 70&deg;F</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Coastal soil may not hit 60&deg;F until late May or June; inland by early to mid-May</td></tr></table></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";

window.AH_GRAPHICS["reading-seed-packets-what-all-those-numbers-mean-g2"] = "<div style=\"width:100%;margin:30px 0;font-family:'Montserrat', system-ui, sans-serif\"><div style=\"background-color:#1a3b2a!important;padding:16px 20px\"><h3 style=\"color:#f8f9f0!important;margin:0;font-size:19px;letter-spacing:0.5px\">Germination Quick Reference</h3><p style=\"color:#dde2d8!important;margin:5px 0 0;font-size:13px\">How long to wait, and how warm the soil must be</p></div><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:650px;background-color:#f8f9f0\"><tr><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Speed</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Days to Sprout</th><th style=\"background-color:#1a3b2a!important;color:#f8f9f0!important;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:0.8px;text-transform:uppercase\">Crops</th></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#1a3b2a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">FAST</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">3 to 7 days</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Beans, squash, cucumbers, radishes, lettuce</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#c9a84c!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">MEDIUM</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">7 to 14 days</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Tomatoes, peppers, brassicas, carrots</td></tr><tr><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\"><span style=\"color:#b8694a!important;font-weight:700;font-size:12px;letter-spacing:0.5px\">SLOW</span></td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">14 to 21+ days</td><td style=\"padding:9px 12px;border-bottom:1px solid #dde2d8;color:#1a3b2a!important;font-size:14px;vertical-align:top\">Parsley, parsnips, celery</td></tr></table></div><div style=\"background-color:#f8f9f0;padding:8px 14px\"><p style=\"color:#1a3b2a!important;font-size:13px;margin:0 0 4px\"><strong>Cool-season crops</strong> (lettuce, peas, spinach, brassicas) germinate in soil as cool as 40 to 50&deg;F.</p><p style=\"color:#1a3b2a!important;font-size:13px;margin:0\"><strong>Warm-season crops</strong> (tomatoes, peppers, beans, squash) need 60&deg;F minimum. Check with a soil thermometer at 2 to 3 inches deep, 9 AM, three mornings running.</p></div><div style=\"background-color:#1a3b2a!important;padding:6px 20px;text-align:right\"><span style=\"color:#dde2d8!important;font-size:11px;letter-spacing:1px\">ambitiousharvest.com</span></div></div>";
