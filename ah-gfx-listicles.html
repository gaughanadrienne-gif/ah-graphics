>";

window.AH_GRAPHICS["continuous-vs-one-time-harvest-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Continuous vs. One-Time Harvest</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Why continuous producers give you more food from less space</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n            <div style=\"background-color: #e8f5e9 !important; border: 2px solid #4A7C28; padding: 16px; border-radius: 6px;\">\n                <div style=\"text-align: center; font-weight: 700; font-size: 0.95rem; color: #4A7C28 !important; margin-bottom: 12px;\">&#10003; Continuous Harvest</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.9;\">\n                    <strong style=\"color: #2D5016 !important;\">Cherry Tomato:</strong> 10-20 lbs/plant<br>\n                    <strong style=\"color: #2D5016 !important;\">Shishito Pepper:</strong> 50-100 peppers/plant<br>\n                    <strong style=\"color: #2D5016 !important;\">Zucchini:</strong> 3-9 lbs/plant<br>\n                    <strong style=\"color: #2D5016 !important;\">Pole Beans:</strong> 2-3x yield of bush<br>\n                    <strong style=\"color: #2D5016 !important;\">Swiss Chard:</strong> Multiple lbs over months<br>\n                    <strong style=\"color: #2D5016 !important;\">Kale:</strong> 1-2 lbs/month for 6-12 mo\n                </div>\n                <div style=\"margin-top: 10px; font-size: 0.75rem; color: #4A7C28 !important; font-weight: 600; text-align: center;\">Pick often = produce more</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #ddd; padding: 16px; border-radius: 6px;\">\n                <div style=\"text-align: center; font-weight: 700; font-size: 0.95rem; color: #666 !important; margin-bottom: 12px;\">One-Time Harvest</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.9;\">\n                    <strong style=\"color: #666 !important;\">Det. Tomato:</strong> One concentrated flush<br>\n                    <strong style=\"color: #666 !important;\">Bush Beans:</strong> 2-3 week window<br>\n                    <strong style=\"color: #666 !important;\">Cabbage:</strong> One head per plant<br>\n                    <strong style=\"color: #666 !important;\">Onion:</strong> One bulb per plant<br>\n                    <strong style=\"color: #666 !important;\">Corn:</strong> 1-2 ears per stalk<br>\n                    <strong style=\"color: #666 !important;\">Carrot:</strong> One root per seed\n                </div>\n                <div style=\"margin-top: 10px; font-size: 0.75rem; color: #666 !important; text-align: center;\">Good for canning/preserving</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 14px; background-color: #FFFFFF !important; padding: 12px; border: 1px solid #ddd; font-size: 0.8rem; color: #3E2723 !important; text-align: center;\">\n            <strong style=\"color: #2D5016 !important;\">Small garden strategy:</strong> Fill 75% of your space with continuous producers, 25% with one-time harvest crops you love.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["expected-harvests-per-plant"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Expected Yield Per Plant</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Coastal vs. inland California production from a single planting</p>\n    </div>\n    <div style=\"padding: 10px; background-color: #F5F0E8 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 550px;\">\n            <thead>\n                <tr style=\"background-color: #4A7C28 !important;\">\n                    <th style=\"padding: 10px 8px; text-align: left; color: #FFFFFF !important; font-weight: 700;\">Crop</th>\n                    <th style=\"padding: 10px 8px; text-align: center; color: #FFFFFF !important; font-weight: 700;\">&#127786; Coastal</th>\n                    <th style=\"padding: 10px 8px; text-align: center; color: #FFFFFF !important; font-weight: 700;\">&#9728; Inland</th>\n                    <th style=\"padding: 10px 8px; text-align: left; color: #FFFFFF !important; font-weight: 700;\">Harvest Tip</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #FFFFFF !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Indet. Tomatoes</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">5-7 months</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">5-6 months</td>\n                    <td style=\"padding: 8px; font-size: 0.75rem; color: #666 !important;\">Pick regularly, even slightly unripe</td>\n                </tr>\n                <tr style=\"background-color: #f5f5f5 !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Cherry Tomatoes</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Jun-Dec</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">May-Oct</td>\n                    <td style=\"padding: 8px; font-size: 0.75rem; color: #666 !important;\">Pick daily during peak season</td>\n                </tr>\n                <tr style=\"background-color: #FFFFFF !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Swiss Chard</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">8-12 months</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Mar-Nov</td>\n                    <td style=\"padding: 8px; font-size: 0.75rem; color: #666 !important;\">Never cut more than 1/3 at once</td>\n                </tr>\n                <tr style=\"background-color: #f5f5f5 !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Peppers</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Jul-Nov</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Jun-Oct</td>\n                    <td style=\"padding: 8px; font-size: 0.75rem; color: #666 !important;\">Pick green to speed new fruit</td>\n                </tr>\n                <tr style=\"background-color: #FFFFFF !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Zucchini</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Jun-Oct</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">May-Sep</td>\n                    <td style=\"padding: 8px; font-size: 0.75rem; color: #666 !important;\">Harvest at 6-8 in., check every 2 days</td>\n                </tr>\n                <tr style=\"background-color: #f5f5f5 !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Kale</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Year-round</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Sep-May</td>\n                    <td style=\"padding: 8px; font-size: 0.75rem; color: #666 !important;\">Harvest lower leaves, leave top intact</td>\n                </tr>\n                <tr style=\"background-color: #FFFFFF !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Pole Beans</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Jun-Oct</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">May-Sep</td>\n                    <td style=\"padding: 8px; font-size: 0.75rem; color: #666 !important;\">Pick every 2-3 days, before seeds bulge</td>\n                </tr>\n                <tr style=\"background-color: #f5f5f5 !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Eggplant</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Jul-Oct</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Jun-Oct</td>\n                    <td style=\"padding: 8px; font-size: 0.75rem; color: #666 !important;\">Cut when skin is glossy, not dull</td>\n                </tr>\n                <tr style=\"background-color: #FFFFFF !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Cucumbers</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Jul-Sep</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Jun-Sep</td>\n                    <td style=\"padding: 8px; font-size: 0.75rem; color: #666 !important;\">Never let fruit turn yellow on vine</td>\n                </tr>\n                <tr style=\"background-color: #f5f5f5 !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Lettuce</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Nearly year-round</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Sep-May</td>\n                    <td style=\"padding: 8px; font-size: 0.75rem; color: #666 !important;\">Cut 1 in. above crown, 3-5 regrowths</td>\n                </tr>\n                <tr style=\"background-color: #FFFFFF !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Herbs</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Year-round</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Spring-Fall</td>\n                    <td style=\"padding: 8px; font-size: 0.75rem; color: #666 !important;\">Pinch basil above nodes for branching</td>\n                </tr>\n                <tr style=\"background-color: #f5f5f5 !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Okra</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Aug-Oct</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Jun-Oct</td>\n                    <td style=\"padding: 8px; font-size: 0.75rem; color: #666 !important;\">Harvest at 2-4 in., woody in 48 hrs</td>\n                </tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["listicles-cut-and-come-again-technique-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">How to Cut for Regrowth</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Cutting height, regrowth time, and expected harvests for three key crops</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px;\">\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #4A7C28; padding: 16px; border-radius: 6px;\">\n                <div style=\"text-align: center; font-weight: 700; font-size: 1rem; color: #2D5016 !important; margin-bottom: 12px;\">&#129388; Loose-Leaf Lettuce</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <div style=\"background-color: #e8f5e9 !important; padding: 6px 10px; margin-bottom: 6px; font-weight: 600; color: #2D5016 !important;\">Cut height: 1 inch above soil</div>\n                    <strong style=\"color: #2D5016 !important;\">Regrowth time:</strong> 7-14 days<br>\n                    <strong style=\"color: #2D5016 !important;\">Expected harvests:</strong> 3-5 cuttings<br>\n                    <strong style=\"color: #2D5016 !important;\">Best method:</strong> Cut all leaves at once, or harvest outer leaves only<br>\n                    <strong style=\"color: #2D5016 !important;\">When to replant:</strong> When leaves turn bitter or plant bolts\n                </div>\n                <div style=\"margin-top: 8px; font-size: 0.7rem; color: #666 !important;\">Best varieties: Black Seeded Simpson, Red Sails, Salad Bowl</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #4A7C28; padding: 16px; border-radius: 6px;\">\n                <div style=\"text-align: center; font-weight: 700; font-size: 1rem; color: #2D5016 !important; margin-bottom: 12px;\">&#129388; Swiss Chard</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <div style=\"background-color: #e8f5e9 !important; padding: 6px 10px; margin-bottom: 6px; font-weight: 600; color: #2D5016 !important;\">Cut height: Snap outer leaves at base</div>\n                    <strong style=\"color: #2D5016 !important;\">Regrowth time:</strong> 7-10 days<br>\n                    <strong style=\"color: #2D5016 !important;\">Expected harvests:</strong> 10-15 pickings<br>\n                    <strong style=\"color: #2D5016 !important;\">Best method:</strong> Pick outer leaves at 8-10 in., leave center intact<br>\n                    <strong style=\"color: #2D5016 !important;\">Lifespan:</strong> 8-12 months per plant\n                </div>\n                <div style=\"margin-top: 8px; font-size: 0.7rem; color: #666 !important;\">Best varieties: Fordhook Giant, Bright Lights</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #4A7C28; padding: 16px; border-radius: 6px;\">\n                <div style=\"text-align: center; font-weight: 700; font-size: 1rem; color: #2D5016 !important; margin-bottom: 12px;\">&#127815; Green Onions</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <div style=\"background-color: #e8f5e9 !important; padding: 6px 10px; margin-bottom: 6px; font-weight: 600; color: #2D5016 !important;\">Cut height: 1 inch above white base</div>\n                    <strong style=\"color: #2D5016 !important;\">Regrowth time:</strong> 2-3 weeks<br>\n                    <strong style=\"color: #2D5016 !important;\">Expected harvests:</strong> 4-8 cuttings<br>\n                    <strong style=\"color: #2D5016 !important;\">Best method:</strong> Slice green tops, leave roots and base in soil<br>\n                    <strong style=\"color: #2D5016 !important;\">Bonus:</strong> Regrows from grocery store scraps\n                </div>\n                <div style=\"margin-top: 8px; font-size: 0.7rem; color: #666 !important;\">Best varieties: Evergreen Hardy White, Tokyo Long White</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 14px; background-color: #FFFFFF !important; padding: 12px; border: 1px solid #ddd; font-size: 0.8rem; color: #3E2723 !important; text-align: center;\">\n            <strong style=\"color: #2D5016 !important;\">Key rule:</strong> Never remove more than 1/3 of the plant at once. Water and fertilize immediately after cutting.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["where-to-cut-each-crop"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Where to Cut: 12 Regrowing Crops</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Correct cutting point and number of regrowths per crop</p>\n    </div>\n    <div style=\"padding: 10px; background-color: #F5F0E8 !important; overflow-x: auto;\">\n        <table style=\"width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 600px;\">\n            <thead>\n                <tr style=\"background-color: #4A7C28 !important;\">\n                    <th style=\"padding: 10px 8px; text-align: left; color: #FFFFFF !important; font-weight: 700;\">Crop</th>\n                    <th style=\"padding: 10px 8px; text-align: left; color: #FFFFFF !important; font-weight: 700;\">Where to Cut</th>\n                    <th style=\"padding: 10px 8px; text-align: center; color: #FFFFFF !important; font-weight: 700;\">Regrowths</th>\n                    <th style=\"padding: 10px 8px; text-align: center; color: #FFFFFF !important; font-weight: 700;\">Regrowth Time</th>\n                </tr>\n            </thead>\n            <tbody>\n                <tr style=\"background-color: #FFFFFF !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Lettuce</td>\n                    <td style=\"padding: 8px; color: #3E2723 !important;\">1 in. above soil / outer leaves</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">3-5</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">7-14 days</td>\n                </tr>\n                <tr style=\"background-color: #f5f5f5 !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Green Onions</td>\n                    <td style=\"padding: 8px; color: #3E2723 !important;\">1 in. above white base</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">4-8</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">2-3 weeks</td>\n                </tr>\n                <tr style=\"background-color: #FFFFFF !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Swiss Chard</td>\n                    <td style=\"padding: 8px; color: #3E2723 !important;\">Snap outer leaves at stem base</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">10-15</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">7-10 days</td>\n                </tr>\n                <tr style=\"background-color: #f5f5f5 !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Celery</td>\n                    <td style=\"padding: 8px; color: #3E2723 !important;\">2 in. above root base</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">2-3</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">1-2 weeks</td>\n                </tr>\n                <tr style=\"background-color: #FFFFFF !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Kale</td>\n                    <td style=\"padding: 8px; color: #3E2723 !important;\">Snap lower leaves, leave top 4-6</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Continuous</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">7-14 days</td>\n                </tr>\n                <tr style=\"background-color: #f5f5f5 !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Cilantro</td>\n                    <td style=\"padding: 8px; color: #3E2723 !important;\">2 in. above soil, max 1/3</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">2-4</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">2-3 weeks</td>\n                </tr>\n                <tr style=\"background-color: #FFFFFF !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Spinach</td>\n                    <td style=\"padding: 8px; color: #3E2723 !important;\">1 in. above crown</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">2-4</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">10-14 days</td>\n                </tr>\n                <tr style=\"background-color: #f5f5f5 !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Arugula</td>\n                    <td style=\"padding: 8px; color: #3E2723 !important;\">1 in. above soil</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">3-5</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">7 days</td>\n                </tr>\n                <tr style=\"background-color: #FFFFFF !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Basil</td>\n                    <td style=\"padding: 8px; color: #3E2723 !important;\">Just above a leaf node</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Continuous</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">1-2 weeks</td>\n                </tr>\n                <tr style=\"background-color: #f5f5f5 !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Bok Choy</td>\n                    <td style=\"padding: 8px; color: #3E2723 !important;\">1 in. above base / outer leaves</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">2-3</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">7-10 days</td>\n                </tr>\n                <tr style=\"background-color: #FFFFFF !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Collard Greens</td>\n                    <td style=\"padding: 8px; color: #3E2723 !important;\">Snap lower leaves, leave top 5-6</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">Continuous</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">7-14 days</td>\n                </tr>\n                <tr style=\"background-color: #f5f5f5 !important;\">\n                    <td style=\"padding: 8px; font-weight: 600; color: #2D5016 !important;\">Beet Greens</td>\n                    <td style=\"padding: 8px; color: #3E2723 !important;\">Outer leaves at stem base, max 1/3</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">3-5</td>\n                    <td style=\"padding: 8px; text-align: center; color: #3E2723 !important;\">10-14 days</td>\n                </tr>\n            </tbody>\n        </table>\n        <div style=\"margin-top: 8px; font-size: 0.7rem; color: #666 !important; text-align: center;\">\"Continuous\" = ongoing leaf harvest for months from the same plant | Data from UC ANR and UC Master Gardener Program</div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["regrowing-crop-planting-calendar"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">When to Plant Regrowing Crops</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Coastal California planting windows for maximum regrowth cycles</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px;\">\n            <div style=\"background-color: #FFFFFF !important; border-top: 4px solid #4A7C28; padding: 14px;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #4A7C28 !important; margin-bottom: 8px;\">&#10052; Cool Season (Sep-Feb)</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <strong style=\"color: #2D5016 !important;\">Lettuce</strong> - Sow every 2-3 weeks<br>\n                    <strong style=\"color: #2D5016 !important;\">Spinach</strong> - Sep-Jan sowings<br>\n                    <strong style=\"color: #2D5016 !important;\">Cilantro</strong> - Sep-Feb (no bolting!)<br>\n                    <strong style=\"color: #2D5016 !important;\">Arugula</strong> - Oct-Mar<br>\n                    <strong style=\"color: #2D5016 !important;\">Bok Choy</strong> - Sep-Nov<br>\n                    <strong style=\"color: #2D5016 !important;\">Beet Greens</strong> - Aug-Oct, Feb-Apr\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border-top: 4px solid #8BC34A; padding: 14px;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #8BC34A !important; margin-bottom: 8px;\">&#9728; Warm Season (Mar-Aug)</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <strong style=\"color: #2D5016 !important;\">Basil</strong> - After last frost, May-Jul<br>\n                    <strong style=\"color: #2D5016 !important;\">Celery</strong> - Mar-Apr transplants<br>\n                    <strong style=\"color: #2D5016 !important;\">Green Onions</strong> - Mar-Sep\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border-top: 4px solid #2D5016; padding: 14px;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important; margin-bottom: 8px;\">&#127811; Year-Round Producers</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <strong style=\"color: #2D5016 !important;\">Swiss Chard</strong> - Plant Feb-Apr or Aug-Sep<br>\n                    <strong style=\"color: #2D5016 !important;\">Kale</strong> - Plant any time on coast<br>\n                    <strong style=\"color: #2D5016 !important;\">Collard Greens</strong> - Plant Mar-Apr or Aug-Sep<br>\n                    <strong style=\"color: #2D5016 !important;\">Green Onions</strong> - Year-round on coast\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 14px; background-color: #e8f5e9 !important; padding: 12px; border-left: 4px solid #4A7C28; font-size: 0.8rem; color: #3E2723 !important;\">\n            <strong style=\"color: #2D5016 !important;\">Maximum value tip:</strong> Plant Swiss chard and kale once, harvest for 8-12 months. Use the saved garden space for succession plantings of lettuce and arugula.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["small-garden-yield-potential"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Small Garden Yield Potential</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Estimated production from a single 4x8 raised bed in California</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"overflow-x: auto;\">\n            <table style=\"width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 500px;\">\n                <thead>\n                    <tr style=\"background-color: #2D5016 !important;\">\n                        <th style=\"padding: 10px 12px; text-align: left; color: #FFFFFF !important; font-weight: 600;\">Crop</th>\n                        <th style=\"padding: 10px 12px; text-align: center; color: #FFFFFF !important; font-weight: 600;\">Plants in 4x8</th>\n                        <th style=\"padding: 10px 12px; text-align: center; color: #FFFFFF !important; font-weight: 600;\">Yield per Plant</th>\n                        <th style=\"padding: 10px 12px; text-align: center; color: #FFFFFF !important; font-weight: 600;\">Harvest Window</th>\n                    </tr>\n                </thead>\n                <tbody>\n                    <tr style=\"background-color: #FFFFFF !important;\">\n                        <td style=\"padding: 8px 12px; color: #3E2723 !important; font-weight: 600;\">Pole Beans</td>\n                        <td style=\"padding: 8px 12px; text-align: center; color: #3E2723 !important;\">8-9 on trellis</td>\n                        <td style=\"padding: 8px 12px; text-align: center; color: #4A7C28 !important; font-weight: 600;\">1-2 window.AH_GRAPHICS["curing-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">How to Cure 4 Key Storage Crops</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Curing doubles or triples storage life. Do not skip this step.</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px;\">\n            <div style=\"background-color: #FFFFFF !important; border-radius: 8px; padding: 18px; border-left: 5px solid #2D5016;\">\n                <div style=\"font-weight: 700; font-size: 1rem; color: #2D5016 !important; margin-bottom: 10px;\">Garlic</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.6;\">\n                    <div style=\"margin-bottom: 6px;\"><span style=\"font-weight: 600; color: #4A7C28 !important;\">Temp:</span> Warm, dry area</div>\n                    <div style=\"margin-bottom: 6px;\"><span style=\"font-weight: 600; color: #4A7C28 !important;\">Humidity:</span> Low (good airflow)</div>\n                    <div style=\"margin-bottom: 6px;\"><span style=\"font-weight: 600; color: #4A7C28 !important;\">Duration:</span> 3-4 weeks</div>\n                    <div style=\"margin-bottom: 6px;\"><span style=\"font-weight: 600; color: #4A7C28 !important;\">Method:</span> Hang in bundles of 6-10</div>\n                    <div><span style=\"font-weight: 600; color: #4A7C28 !important;\">Done when:</span> Wrappers papery, necks dry</div>\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border-radiu or: #4A7C28 !important;\">Method:</span> Single layer on screen</div>\n                    <div><span style=\"font-weight: 600; color: #4A7C28 !important;\">Done when:</span> Skins papery, necks dry</div>\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border-radius: 8px; padding: 18px; border-left: 5px solid #3E2723;\">\n                <div style=\"font-weight: 700; font-size: 1rem; color: #2D5016 !important; margin-bottom: 10px;\">Sweet Potatoes</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.6;\">\n                    <div style=\"margin-bottom: 6px;\"><span style=\"font-weight: 600; color: #4A7C28 !important;\">Temp:</span> 80-85&#176;F</div>\n                    <div style=\"margin-bottom: 6px;\"><span style=\"font-weight: 600; color: #4A7C28 !important;\">Humidity:</span> 90-100% (high!)</div>\n                    <div style=\"margin-bottom: 6px;\"><span style=\"font-weight: 600; color: #4A7C28 !important;\">Duration:</span> 5-10 days</div>\n                    <div style=\"margin-bottom: 6px;\"><span style=\"font-weight: 600; color: #4A7C28 !important;\">Method:</span> Warm room + water pan</div>\n                    <div><span style=\"font-weight: 600; color: #4A7C28 !important;\">Note:</span> Never refrigerate</div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

v style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n            <div style=\"background-color: #e8f5e9 !important; padding: 14px; border-radius: 6px;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important; margin-bottom: 6px;\">&#10003; DO: Permeable Barriers</div>\n                <div style=\"font-size: 0.75rem; color: #3E2723 !important; line-height: 1.6;\">\n                    &#8226; Hedges (40-50% solid)<br>\n                    &#8226; Shade cloth (50-60%)<br>\n                    &#8226; Lattice panels<br>\n                    &#8226; Native plant hedgerows\n                </div>\n            </div>\n            <div style=\"background-color: #ffebee !important; padding: 14px; border-radius: 6px;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #c62828 !important; margin-bottom: 6px;\">&#10007; AVOID: Solid Walls</div>\n                <div style=\"font-size: 0.75rem; color: #3E2723 !important; line-height: 1.6;\">\n                    &#8226; Create turbulent eddies<br>\n                    &#8226; Damage plants near wall<br>\n                    &#8226; Shorter protection zone<br>\n                    &#8226; Board fences act as sails\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["coastal-garden-tiered-layout"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Tiered Coastal Garden Layout</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Use tall crops on the windward side to shelter shorter ones</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"background-color: #FFFFFF !important; border-radius: 8px; padding: 20px;\">\n            <div style=\"text-align: center; font-size: 0.75rem; color: #1565c0 !important; margin-bottom: 8px; font-weight: 600;\">&#10232; PREVAILING NW WIND &#10232;</div>\n            <div style=\"display: flex; gap: 0; align-items: flex-end; justify-content: center; margin-bottom: 15px;\">\n                <div style=\"background-color: #2D5016 !important; width: 22%; padding: 15px 8px; text-align: center; border-radius: 6px 0 0 6px; min-height: 140px; display: flex; flex-direction: column; justify-content: center;\">\n                    <div style=\"font-weight: 700; font-size: 0.8rem; color: #FFFFFF !important;\">TIER 1</div>\n                    <div style=\"font-size: 0.65rem; color: #FFFFFF !important; opacity: 0.9; margin-top: 4px;\">WINDWARD</div>\n                    <div style=\"font-size: 0.7rem; color: #8BC34A !important; margin-top: 8px; line-height: 1.5;\">Artichokes<br>Rosemary hedge<br>Native shrubs</div>\n                    <div style=\"font-size: 0.6rem; color: #FFFFFF !important; opacity: 0.7; margin-top: 6px;\">4-6 ft tall</div>\n                </div>\n                <div style=\"background-color: #4A7C28 !important; width: 22%; padding: 15px 8px; text-align: center; min-height: 110px; display: window.AH_GRAPHICS["water-needs-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Water Needs: Drought-Tolerant vs. Standard Crops</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Gallons per 100 sq ft per week during peak summer</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"margin-bottom: 15px;\">\n            <div style=\"font-size: 0.8rem; font-weight: 700; color: #c62828 !important; margin-bottom: 8px;\">&#9650; Water-Hungry Crops (35-50 gal/100 sq ft/week)</div>\n            <div style=\"display: flex; align-items: center; margin-bottom: 6px;\">\n                <div style=\"width: 80px; font-size: 0.75rem; color: #3E2723 !important; flex-shrink: 0;\">Celery</div>\n                <div style=\"flex: 1; background-color: #ddd; border-radius: 4px; height: 20px;\">\n                    <div style=\"width: 100%; background-color: #e57373 !important; border-radius: 4px; height: 20px; display: flex; align-items: center; padding-left: 8px;\">\n                        <span style=\"font-size: 0.65rem; font-weight: 700; color: #FFFFFF !important;\">50 gal</span>\n                    </div>\n                </div>\n            </div>\n            <div style=\"display: flex; align-items: center; margin-bottom: 6px;\">\n                <div style=\"width: 80px; font-size: 0.75rem; color: #3E2723 !important; flex-shrink: 0;\">Lettuce</div>\n                <div style=\"flex: 1; background-color: #ddd; border-radius: 4px; height: 20px;\">\n                    <div style=\"width: 85%; background-color: #e57373 !important; border-radius: 4px; height: 20px; display: flex; alig m: 10px;\">Celery</div>\n                <div style=\"font-size: 0.78rem; color: #3E2723 !important; line-height: 1.7;\">\n                    <div style=\"margin-bottom: 6px;\"><span style=\"font-weight: 700; color: #4A7C28 !important;\">Step 1:</span> Cut stalks 2 in. from base</div>\n                    <div style=\"margin-bottom: 6px;\"><span style=\"font-weight: 700; color: #4A7C28 !important;\">Step 2:</span> Place in warm water, sunny spot</div>\n                    <div style=\"margin-bottom: 6px;\"><span style=\"font-weight: 700; color: #4A7C28 !important;\">Step 3:</span> Change water every other day</div>\n                    <div style=\"margin-bottom: 6px;\"><span style=\"font-weight: 700; color: #4A7C28 !important;\">Step 4:</span> New stalks in 1 week</div>\n                    <div><span style=\"font-weight: 700; color: #4A7C28 !important;\">Bonus:</span> Full stalks in 3-4 months in soil</div>\n                </div>\n                <div style=\"background-color: #e8f5e9 !important; padding: 6px; border-radius: 4px; margin-top: 10px; text-align: center;\">\n                    <span style=\"font-size: 0.7rem; font-weight: 700; color: #2D5016 !important;\">Rating: GOOD</span>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["water-vs-soil-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Water vs. Soil: Where to Grow Your Scraps</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Start in water, transplant to soil for best results</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 15px;\">\n            <div style=\"background-color: #e3f2fd !important; padding: 16px; border-radius: 8px; border-top: 4px solid #1565c0;\">\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #1565c0 !important; margin-bottom: 10px;\">Start in Water</div>\n                <div style=\"font-size: 0.78rem; color: #3E2723 !important; line-height: 1.7; margin-bottom: 10px;\">\n                    &#8226; Quick visual results (2-5 days)<br>\n                    &#8226; No supplies needed<br>\n                    &#8226; Works on windowsill<br>\n                    &#8226; Great for apartments\n                </div>\n                <div style=\"font-size: 0.75rem; font-weight: 600; color: #1565c0 !important;\">Best for: Green onions, lettuce, celery, bok choy, basil cuttings</div>\n                <div style=\"font-size: 0.7rem; color: #666 !important; margin-top: 6px;\">Limitation: Flavor and nutrition decline after 2-3 harvests</div>\n            </div>\n            <div style=\"background-color: #e8f5e9 !important; padding: 16px; border-radius: 8px; border-top: 4px solid #4A7C28;\">\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #2D5016 !important; margin-bottom: 10px;\">Transplant to Soil</div> window.AH_GRAPHICS["productivity-rating-chart"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Honest Productivity Ratings</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Which scraps actually produce enough food to matter?</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"margin-bottom: 15px;\">\n            <div style=\"background-color: #e8f5e9 !important; padding: 12px 16px; border-radius: 6px; border-left: 5px solid #2D5016; margin-bottom: 8px;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important; margin-bottom: 4px;\">EXCELLENT -- Real Food Production</div>\n                <div style=\"font-size: 0.78rem; color: #3E2723 !important;\">Green Onions (continuous harvests) &#8226; Potatoes (3-5 lbs per plant) &#8226; Sweet Potatoes (3-5 lbs per plant) &#8226; Garlic (full head per clove) &#8226; Basil (months of herbs from one cutting) &#8226; Lemongrass (unlimited supply)</div>\n            </div>\n            <div style=\"background-color: #f1f8e9 !important; padding: 12px 16px; border-radius: 6px; border-left: 5px solid #4A7C28; margin-bottom: 8px;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #4A7C28 !important; margin-bottom: 4px;\">GOOD -- Worthwhile Harvests</div>\n                <div style=\"font-size: 0.78rem; color: #3E2723 !important;\">Celery (usable stalks in 3-4 months) &#8226; Ginger (0.5-1 lb in 8-10 months) &#8226; Leeks (usable green tops) &#8226; Turmeric (0.5-1 lb in 8-10 months)</div>\n            </div>\n            <div style=\"background-color: #fff8e1 !important; padding: 12p window.AH_GRAPHICS["maximum-yield-raised-bed-plan"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Maximum-Yield 4x8 Raised Bed Plan</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Est. 80-120 lbs and $400-800 value per year from 32 sq ft</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"font-size: 0.75rem; font-weight: 600; color: #2D5016 !important; text-align: center; margin-bottom: 8px;\">&#8593; NORTH (tall crops here)</div>\n        <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-width: 420px; margin: 0 auto;\">\n            <div style=\"background-color: #c62828 !important; color: #FFFFFF !important; padding: 10px 4px; text-align: center; font-size: 0.7rem; font-weight: 600; grid-column: span 2;\">Tomato (staked)<br><span style=\"font-weight: 400; font-size: 0.62rem; color: #FFFFFF !important;\">15-20 lbs</span></div>\n            <div style=\"background-color: #c62828 !important; color: #FFFFFF !important; padding: 10px 4px; text-align: center; font-size: 0.7rem; font-weight: 600; grid-column: span 2;\">Cherry Tom.<br><span style=\"font-weight: 400; font-size: 0.62rem; color: #FFFFFF !important;\">10-15 lbs</span></div>\n            <div style=\"background-color: #4A7C28 !important; color: #FFFFFF !important; padding: 10px 4px; text-align: center; font-size: 0.7rem; font-weight: 600;\">Pole Beans<br><span style=\"font-weight: 400; font-size: 0.62rem; color: #FFFFFF !important;\">8-12 lbs</span></div>\n            <div style=\"background-color: #4A7C28 !important; color: #FFFFFF !important; padding: 10px 4px; text-align: center; font-size: 0.7rem; font-weight: 600;\">Cucumber<br><span style=\"font-weight: 400; font-size: 0.62rem; color: #FFFFFF !important;\">10-15 lbs</span></div>\n            <div style=\"background-color: #8BC34A !important; color: #2D5016 !important; padding: 10px 4px; text-align: center; font-size: 0.7rem; font-weight: 600;\">Peppers x2<br><span style=\"font-weight: 400; font-size: 0.62rem; color: #2D5016 !important;\">6-12 lbs</span></div>\n            <div style=\"background-color: #8BC34A !important; color: #2D5016 !important; padding: 10px 4px; text-align: center; font-size: 0.7rem; font-weight: 600;\">Eggplant<br><span style=\"font-weight: 400; font-size: 0.62rem; color: #2D5016 !important;\">5-10 lbs</span></div>\n            <div style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 10px 4px; text-align: center; font-size: 0.7rem; font-weight: 600;\">Zucchini<br><span style=\"font-weight: 400; font-size: 0.62rem; color: #2D5016 !important;\">6-10 lbs</span></div>\n            <div style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 10px 4px; text-align: center; font-size: 0.7rem; font-weight: 600;\">Kale x2<br><span style=\"font-weight: 400; font-size: 0.62rem; color: #2D5016 !important;\">4-8 lbs</span></div>\n            <div style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 10px 4px; text-align: center; font-size: 0.7rem; font-weight: 600;\">Chard x2<br><span style=\"font-weight: 400; font-size: 0.62rem; color: #2D5016 !important;\">6-10 lbs</span></div>\n            <div style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 10px 4px; text-align: center; font-size: 0.7rem; font-weight: 600;\">Herbs<br><span style=\"font-weight: 400; font-size: 0.62rem; color: #2D5016 !important;\">$50-100</span></div>\n            <div style=\"background-color: #F5F0E8 !important; border: 2px solid #4A7C28; color: #2D5016 !important; padding: 10px 4px; text-align: center; font-size: 0.7rem; font-weight: 600; grid-column: span 2;\">Lettuce + Spinach + Radishes<br><span style=\"font-weight: 400; font-size: 0.62rem; color: #2D5016 !important;\">Succession | 10-20 lbs</span></div>\n            <div style=\"background-color: #F5F0E8 !important; border: 2px solid #4A7C28; color: #2D5016 !important; padding: 10px 4px; text-align: center; font-size: 0.7rem; font-weight: 600; grid-column: span 2;\">Green Onions + Bush Beans<br><span style=\"font-weight: 400; font-size: 0.62rem; color: #2D5016 !important;\">Succession | 5-10 lbs</span></div>\n        </div>\n        <div style=\"font-size: 0.75rem; font-weight: 600; color: #2D5016 !important; text-align: center; margin-top: 8px;\">&#8595; SOUTH (low crops get full sun)</div>\n        <div style=\"margin-top: 15px; padding: 12px; background-color: #FFFFFF !important; border-left: 4px solid #4A7C28; font-size: 0.8rem; color: #3E2723 !important;\">\n            <strong style=\"color: #2D5016 !important;\">Strategy:</strong> Warm-season crops (top) run May-Oct. When finished, replant those squares with cool-season crops for Nov-Apr. Total: 80-120+ lbs from 32 sq ft per year.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["how-soil-building-plants-work-underground"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">How Soil-Building Plants Work Underground</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Three mechanisms that transform your garden soil</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;\">\n            <div style=\"background-color: #FFFFFF !important; padding: 16px; text-align: center; border-top: 4px solid #4A7C28;\">\n                <div style=\"font-size: 1.6rem; margin-bottom: 8px;\">&#9733;</div>\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important; margin-bottom: 6px;\">Nitrogen Fixers</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important; margin-bottom: 10px;\">Root bacteria convert atmospheric N into plant food</div>\n                <div style=\"background-color: #e8f5e9 !important; padding: 8px; font-size: 0.72rem; color: #2D5016 !important; font-weight: 600;\">50-200 lbs N/acre/yr</div>\n                <div style=\"margin-top: 8px; font-size: 0.72rem; color: #666 !important;\">Crimson Clover<br>Fava Beans<br>White Dutch Clover</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 16px; text-align: center; border-top: 4px solid #8BC34A;\">\n                <div style=\"font-size: 1.6rem; margin-bottom: 8px;\">&#8615;</div>\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important; margin-bottom: 6px;\">Deep Taproots</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important; margin-bottom: 10px;\">Thick roots punch through compaction, creating drainage channels</div>\n                <div style=\"background-color: #e8f5e9 !important; padding: 8px; font-size: 0.72rem; color: #2D5016 !important; font-weight: 600;\">Penetrate 1-6 ft deep</div>\n                <div style=\"margin-top: 8px; font-size: 0.72rem; color: #666 !important;\">Daikon Radish (1-2 ft)<br>Sunflowers (5-6 ft)<br>Comfrey (6-8 ft)</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 16px; text-align: center; border-top: 4px solid #2D5016;\">\n                <div style=\"font-size: 1.6rem; margin-bottom: 8px;\">&#10047;</div>\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important; margin-bottom: 6px;\">Fibrous Root Networks</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important; margin-bottom: 10px;\">Dense root webs add organic matter and feed soil microbes</div>\n                <div style=\"background-color: #e8f5e9 !important; padding: 8px; font-size: 0.72rem; color: #2D5016 !important; font-weight: 600;\">3+ miles roots per cu ft</div>\n                <div style=\"margin-top: 8px; font-size: 0.72rem; color: #666 !important;\">Annual Ryegrass<br>Phacelia<br>Buckwheat</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 15px; padding: 12px; background-color: #FFFFFF !important; border-left: 4px solid #4A7C28; font-size: 0.8rem; color: #3E2723 !important;\">\n            <strong style=\"color: #2D5016 !important;\">Best strategy:</strong> Combine all three. Mix clover (nitrogen) + ryegrass (organic matter) for winter cover, and plant sunflowers or daikon in compacted areas.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["bare-soil-vs-cover-cropped-soil"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Bare Soil vs. Cover-Cropped Soil</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">What changes after one year of soil-building plants</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n            <div style=\"background-color: #ffebee !important; padding: 16px; border-top: 4px solid #c62828;\">\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #c62828 !important; text-align: center; margin-bottom: 12px;\">&#10007; Bare Soil</div>\n                <div style=\"font-size: 0.78rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <div style=\"margin-bottom: 4px;\"><strong style=\"color: #c62828 !important;\">Organic matter:</strong> 1-2%</div>\n                    <div style=\"margin-bottom: 4px;\"><strong style=\"color: #c62828 !important;\">Structure:</strong> Compacted, poor drainage</div>\n                    <div style=\"margin-bottom: 4px;\"><strong style=\"color: #c62828 !important;\">Microbe activity:</strong> Low</div>\n                    <div style=\"margin-bottom: 4px;\"><strong style=\"color: #c62828 !important;\">Earthworms:</strong> Few or none</div>\n                    <div style=\"margin-bottom: 4px;\"><strong style=\"color: #c62828 !important;\">Water infiltration:</strong> Slow, runoff</div>\n                    <div><strong style=\"color: #c62828 !important;\">Erosion risk:</strong> High</div>\n                </div>\n            </div>\n            <div style=\"background-color: #e8f5e9 !important; padding: 16px; border-top: 4px solid #4A7C28;\">\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #4A7C28 !important; text-align: center; margin-bottom: 12px;\">&#10003; Cover-Cropped</div>\n                <div style=\"font-size: 0.78rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <div style=\"margin-bottom: 4px;\"><strong style=\"color: #2D5016 !important;\">Organic matter:</strong> 3-5%</div>\n                    <div style=\"margin-bottom: 4px;\"><strong style=\"color: #2D5016 !important;\">Structure:</strong> Crumbly, well-aerated</div>\n                    <div style=\"margin-bottom: 4px;\"><strong style=\"color: #2D5016 !important;\">Microbe activity:</strong> 2-4x higher</div>\n                    <div style=\"margin-bottom: 4px;\"><strong style=\"color: #2D5016 !important;\">Earthworms:</strong> Abundant</div>\n                    <div style=\"margin-bottom: 4px;\"><strong style=\"color: #2D5016 !important;\">Water infiltration:</strong> Fast, deep</div>\n                    <div><strong style=\"color: #2D5016 !important;\">Erosion risk:</strong> Minimal</div>\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 15px; padding: 12px; background-color: #FFFFFF !important; border-left: 4px solid #4A7C28; font-size: 0.8rem; color: #3E2723 !important;\">\n            <strong style=\"color: #2D5016 !important;\">Timeline:</strong> Visible improvement in 1 season. Measurable organic matter increase in 1-2 years. Full transformation in 3-5 years of consistent cover cropping.\n            <span style=\"display: block; margin-top: 6px; font-size: 0.72rem; color: #888 !important;\">Source: UC Davis Soil Science, UC SAREP</span>\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["year-round-soil-building-calendar"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Year-Round Soil Building Calendar</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">When to plant each soil-building crop in California</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr; gap: 12px;\">\n            <div style=\"background-color: #FFFFFF !important; padding: 14px; border-left: 4px solid #4A7C28;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important;\">FALL (Oct-Nov): Plant Cool-Season Covers</div>\n                <div style=\"display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;\">\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Crimson Clover</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Fava Beans</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Annual Ryegrass</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Daikon Radish</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Mustard</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Phacelia</span>\n                </div>\n                <div style=\"font-size: 0.72rem; color: #666 !important; margin-top: 6px;\">Broadcast seed on bare beds after summer crops finish</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 14px; border-left: 4px solid #8BC34A;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important;\">WINTER (Dec-Feb): Let Them Grow</div>\n                <div style=\"font-size: 0.78rem; color: #3E2723 !important; margin-top: 8px;\">Covers grow through rain season, suppressing weeds, preventing erosion, building roots. No action needed.</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 14px; border-left: 4px solid #4A7C28;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important;\">SPRING (Mar-Apr): Cut and Incorporate</div>\n                <div style=\"font-size: 0.78rem; color: #3E2723 !important; margin-top: 8px;\">Mow at peak bloom, 2-3 weeks before planting vegetables. Leave residue as mulch or turn under lightly. Harvest fava beans first.</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 14px; border-left: 4px solid #8BC34A;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important;\">SUMMER (Apr-Sep): Fill Gaps</div>\n                <div style=\"display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;\">\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Buckwheat (30-day cycles)</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Sunflowers</span>\n                </div>\n                <div style=\"font-size: 0.72rem; color: #666 !important; margin-top: 6px;\">Plant in any bed empty 30+ days between crops</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 14px; border-left: 4px solid #2D5016;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important;\">YEAR-ROUND: Permanent Soil Builders</div>\n                <div style=\"display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;\">\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">White Clover (pathways)</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Comfrey (borders)</span>\n                </div>\n                <div style=\"font-size: 0.72rem; color: #666 !important; margin-top: 6px;\">Plant once, harvest leaves 3-5x per year for nutrient-rich mulch</div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["pest-repelling-plant-placement-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Where to Place Pest-Repelling Plants</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Strategic placement for maximum protection</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;\">\n            <div style=\"background-color: #FFFFFF !important; padding: 14px; border-left: 4px solid #4A7C28;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important; margin-bottom: 6px;\">Around Tomatoes</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important;\">Plant <strong style=\"color: #2D5016 !important;\">basil</strong> within 12 in. of stems. Add <strong style=\"color: #2D5016 !important;\">borage</strong> and <strong style=\"color: #2D5016 !important;\">marigolds</strong> at bed edges.</div>\n                <div style=\"margin-top: 6px; font-size: 0.7rem; color: #666 !important;\">Targets: aphids, hornworms, whiteflies</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 14px; border-left: 4px solid #4A7C28;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important; margin-bottom: 6px;\">Around Brassicas</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important;\">Interplant <strong style=\"color: #2D5016 !important;\">garlic</strong> between rows. Border with <strong style=\"color: #2D5016 !important;\">rosemary</strong> and <strong style=\"color: #2D5016 !important;\">nasturtiums</strong> (trap crop).</div>\n                <div style=\"margin-top: 6px; font-size: 0.7rem; color: #666 !important;\">Targets: cabbage loopers, aphids</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 14px; border-left: 4px solid #4A7C28;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important; margin-bottom: 6px;\">Around Squash</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important;\">Ring with <strong style=\"color: #2D5016 !important;\">nasturtiums</strong> and <strong style=\"color: #2D5016 !important;\">petunias</strong>. Add <strong style=\"color: #2D5016 !important;\">dill</strong> nearby for beneficial wasps.</div>\n                <div style=\"margin-top: 6px; font-size: 0.7rem; color: #666 !important;\">Targets: squash bugs, cucumber beetles</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 14px; border-left: 4px solid #4A7C28;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important; margin-bottom: 6px;\">Garden Borders</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important;\">Plant <strong style=\"color: #2D5016 !important;\">lavender</strong> and <strong style=\"color: #2D5016 !important;\">rosemary</strong> as permanent hedges. Add <strong style=\"color: #2D5016 !important;\">lemongrass</strong> near seating.</div>\n                <div style=\"margin-top: 6px; font-size: 0.7rem; color: #666 !important;\">Targets: mosquitoes, deer, rabbits</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 14px; border-left: 4px solid #4A7C28;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important; margin-bottom: 6px;\">Beneficial Insect Stations</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important;\">Let <strong style=\"color: #2D5016 !important;\">dill</strong> and <strong style=\"color: #2D5016 !important;\">borage</strong> flower freely. Place <strong style=\"color: #2D5016 !important;\">chrysanthemums</strong> at pest entry points.</div>\n                <div style=\"margin-top: 6px; font-size: 0.7rem; color: #666 !important;\">Attracts: ladybugs, lacewings, parasitic wasps</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 14px; border-left: 4px solid #4A7C28;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important; margin-bottom: 6px;\">Containers (Patio)</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important;\">Pot up <strong style=\"color: #2D5016 !important;\">basil</strong>, <strong style=\"color: #2D5016 !important;\">catnip</strong>, <strong style=\"color: #2D5016 !important;\">marigolds</strong>, and <strong style=\"color: #2D5016 !important;\">lavender</strong>. Move to where pests appear.</div>\n                <div style=\"margin-top: 6px; font-size: 0.7rem; color: #666 !important;\">Flexible, targeted protection</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 15px; padding: 12px; background-color: #FFFFFF !important; border-left: 4px solid #4A7C28; font-size: 0.8rem; color: #3E2723 !important;\">\n            <strong style=\"color: #2D5016 !important;\">Key rule:</strong> Place companions within 2-3 feet of crops you want to protect. Aromatic compounds dissipate quickly in open air.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["when-to-plant-pest-repelling-companions"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">When to Plant Pest-Repelling Companions</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Planting windows for California</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr; gap: 10px;\">\n            <div style=\"background-color: #FFFFFF !important; padding: 12px; border-left: 4px solid #4A7C28;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important; margin-bottom: 6px;\">Spring Annuals (plant Mar-May)</div>\n                <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Basil</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Marigolds</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Nasturtiums</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Dill</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Borage</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Petunias</span>\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 12px; border-left: 4px solid #8BC34A;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important; margin-bottom: 6px;\">Fall Planting (plant Oct-Nov)</div>\n                <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Garlic</span>\n                </div>\n                <div style=\"font-size: 0.72rem; color: #666 !important; margin-top: 4px;\">Plant cloves between rows for months of winter pest deterrence</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 12px; border-left: 4px solid #2D5016;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important; margin-bottom: 6px;\">Perennials (plant once, spring or fall)</div>\n                <div style=\"display: flex; flex-wrap: wrap; gap: 6px;\">\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Rosemary</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Lavender</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Lemongrass</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Catnip</span>\n                    <span style=\"background-color: #e8f5e9 !important; color: #2D5016 !important; padding: 4px 10px; font-size: 0.74rem; font-weight: 600;\">Chrysanthemums</span>\n                </div>\n                <div style=\"font-size: 0.72rem; color: #666 !important; margin-top: 4px;\">Establish these first for year-round, permanent protection</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 15px; padding: 12px; background-color: #FFFFFF !important; border-left: 4px solid #4A7C28; font-size: 0.8rem; color: #3E2723 !important;\">\n            <strong style=\"color: #2D5016 !important;\">Strategy:</strong> Plant perennial borders first, then fill in with annuals each spring for layered, year-round protection.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
