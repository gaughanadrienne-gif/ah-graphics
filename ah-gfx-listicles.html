ext-align: center; font-size: 0.76rem; color: #3E2723 !important;\">Feb</td><td style=\"padding: 7px 8px; text-align: center; font-size: 0.76rem; color: #3E2723 !important;\">25-32&#176;F</td></tr>\n            </tbody>\n        </table>\n    </div>\n    <div style=\"padding: 10px 20px; background-color: #F5F0E8 !important; font-size: 0.72rem; color: #666 !important;\">\n        Frost-free days per year: Coastal 300-365 | Inland 250-300 | Mountain 120-200 | Desert 250-300. Source: UC ANR Climate Smart Agriculture.\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["season-extension-techniques"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">4 Ways to Extend Your Growing Season</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Simple frost protection ranked by effectiveness</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px;\">\n            <div style=\"background-color: #FFFFFF !important; padding: 16px; border-top: 4px solid #2D5016;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important; margin-bottom: 4px;\">Cold Frame</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #4A7C28 !important; margin-bottom: 6px;\">+10-20&#176;F</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important;\">Glass or polycarbonate lid over a bottomless box. Miniature greenhouse effect. Ventilate on sunny days.</div>\n                <div style=\"margin-top: 8px; font-size: 0.7rem; color: #666 !important;\">Best for: lettuce, spinach, low crops</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 16px; border-top: 4px solid #4A7C28;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important; margin-bottom: 4px;\">Row Cover</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #4A7C28 !important; margin-bottom: 6px;\">+4-8&#176;F</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important;\">Lightweight fabric over hoops. Extends season 4-6 weeks. Secure edges with soil or rocks.</div>\n                <div style=\"margin-top: 8px; font-size: 0.7rem; color: #666 !important;\">Best for: most crops, easy to install</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 16px; border-top: 4px solid #8BC34A;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important; margin-bottom: 4px;\">Straw Mulch</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #4A7C28 !important; margin-bottom: 6px;\">+5-10&#176;F</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important;\">4-6 inches around root crops and greens. Insulates soil, moderates temperature swings.</div>\n                <div style=\"margin-top: 8px; font-size: 0.7rem; color: #666 !important;\">Best for: carrots, parsnips, garlic</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; padding: 16px; border-top: 4px solid #8BC34A;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important; margin-bottom: 4px;\">Water Jugs</div>\n                <div style=\"font-size: 1.1rem; font-weight: 700; color: #4A7C28 !important; margin-bottom: 6px;\">+2-4&#176;F</div>\n                <div style=\"font-size: 0.76rem; color: #3E2723 !important;\">Black-painted jugs absorb daytime heat, release slowly at night. Free thermal mass.</div>\n                <div style=\"margin-top: 8px; font-size: 0.7rem; color: #666 !important;\">Best for: supplemental warmth, free</div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";
