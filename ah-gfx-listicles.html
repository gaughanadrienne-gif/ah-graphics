g: 15px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 0.95rem; color: #2D5016 !important;\">Herbs</div>\n                    <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 4px;\">Basil near tomatoes</div>\n                </div>\n                <div style=\"background-color: #e0f2f1 !important; border: 2px dashed #4A7C28; padding: 15px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 0.95rem; color: #2D5016 !important;\">Beans (6-8)</div>\n                    <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 4px;\">3\" apart | Fix nitrogen</div>\n                </div>\n                <div style=\"background-color: #e8eaf6 !important; border: 2px dashed #4A7C28; padding: 15px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 0.95rem; color: #2D5016 !important;\">Lettuce</div>\n                    <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 4px;\">6\" apart | Pepper shade</div>\n                </div>\n                <div style=\"background-color: #fce4ec !important; border: 2px dashed #4A7C28; padding: 15px; text-align: center; grid-column: 1 / -1;\">\n                    <div style=\"font-weight: 700; font-size: 0.95rem; color: #2D5016 !important;\">Radishes (border planting)</div>\n                    <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 4px;\">1\" apart around edges | Harvest in 25 days, then replant</div>\n                </div>\n            </div>\n            <div style=\"text-align: center; font-size: 0.75rem; color: #888 !important; margin-top: 10px;\">SOUTH (most sun exposure)</div>\n        </div>\n        <div style=\"margin-top: 15px; padding: 12px; background-color: #FFFFFF !important; border-left: 4px solid #4A7C28; font-size: 0.8rem; color: #3E2723 !important;\">\n            <strong style=\"color: #2D5016 !important;\">Tip:</strong> Star window.AH_GRAPHICS["top-mistakes-do-s-and-don-ts"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">The 4 Mistakes That Kill the Most Plants</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">What to avoid and what to do instead</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px;\">\n            <div style=\"background-color: #FFFFFF !important; border: 1px solid #ddd; overflow: hidden;\">\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr;\">\n                    <div style=\"background-color: #ffebee !important; padding: 15px; text-align: center; border-right: 1px solid #ddd;\">\n                        <div style=\"font-size: 1.2rem; color: #c62828 !important; font-weight: 700; margin-bottom: 4px;\">DON'T</div>\n                        <div style=\"font-size: 0.8rem; color: #3E2723 !important;\">Water on a daily schedule regardless of conditions</div>\n                    </div>\n                    <div style=\"background-color: #e8f5e9 !important; padding: 15px; text-align: center;\">\n                        <div style=\"font-size: 1.2rem; color: #2D5016 !important; font-weight: 700; margin-bottom: 4px;\">DO</div>\n                        <div style=\"font-size: 0.8rem; color: #3E2723 !important;\">Check soil moisture first. Water deeply 2-3x per week.</div>\n                    </div>\n                </div>\n                <div style=\"padding: 12px 15px; background-color: #FFFFFF !important;\">\n                    <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important;\">1. Overwatering</div>\n                    <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 4px;\">The #1 killer in California gardens, especially in the fog belt</div>\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 1px solid #ddd; overflow: hidden;\">\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr;\">\n                    <div style=\"background-color: #ffebee !important; padding: 15px; text-align: center; border-right: 1px solid #ddd;\">\n                        <div style=\"font-size: 1.2rem; color: #c62828 !important; font-weight: 700; margin-bottom: 4px;\">DON'T</div>\n                        <div style=\"font-size: 0.8rem; color: #3E2723 !important;\">Follow national planting dates from seed packets</div>\n                    </div>\n                    <div style=\"background-color: #e8f5e9 !important; padding: 15px; text-align: center;\">\n                        <div style=\"font-size: 1.2rem; color: #2D5016 !important; font-weight: 700; margin-bottom: 4px;\">DO</div>\n                        <div style=\"font-size: 0.8rem; color: #3E2723 !important;\">Learn your CA zone. Check soil temps, not air temps.</div>\n                    </div>\n                </div>\n                <div style=\"padding: 12px 15px; background-color: #FFFFFF !important;\">\n                    <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important;\">2. Wrong Timing</div>\n                    <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 4px;\">California has its own planting rhythm: cool-season and warm-season</div>\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 1px solid #ddd; overflow: hidden;\">\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr;\">\n                    <div style=\"background-color: #ffebee !important; padding: 15px; text-align: center; border-right: 1px solid #ddd;\">\n                        <div style=\"font-size: 1.2rem; color: #c62828 !important; font-weight: 700; margin-bottom: 4px;\">DON'T</div>\n                        <div style=\"font-size: 0.8rem; color: #3E2723 !important;\">Treat your yard as one uniform growing space</div>\n                    </div>\n                    <div style=\"background-color: #e8f5e9 !important; padding: 15px; text-align: center;\">\n                        <div style=\"font-size: 1.2rem; color: #2D5016 !important; font-weight: 700; margin-bottom: 4px;\">DO</div>\n                        <div style=\"font-size: 0.8rem; color: #3E2723 !important;\">Map sun, wind, and temps. Match crops to microclimates.</div>\n                    </div>\n                </div>\n                <div style=\"padding: 12px 15px; background-color: #FFFFFF !important;\">\n                    <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important;\">3. Ignoring Microclimates</div>\n                    <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 4px;\">A single yard can vary 10F+ between its warmest and coolest spots</div>\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 1px solid #ddd; overflow: hidden;\">\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr;\">\n                    <div style=\"background-color: #ffebee !important; padding: 15px; text-align: center; border-right: 1px solid #ddd;\">\n                        <div style=\"font-size: 1.2rem; color: #c62828 !important; font-weight: 700; margin-bottom: 4px;\">DON'T</div>\n                        <div style=\"font-size: 0.8rem; color: #3E2723 !important;\">Plant directly into unamended California clay or sand</div>\n                    </div>\n                    <div style=\"background-color: #e8f5e9 !important; padding: 15px; text-align: center;\">\n                        <div style=\"font-size: 1.2rem; color: #2D5016 !important; font-weight: 700; margin-bottom: 4px;\">DO</div>\n                        <div style=\"font-size: 0.8rem; color: #3E2723 !important;\">Add 2-4\" compost. Get a soil test ($30 at UC Extension).</div>\n                    </div>\n                </div>\n                <div style=\"padding: 12px 15px; background-color: #FFFFFF !important;\">\n                    <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important;\">4. Skipping Soil Prep</div>\n                    <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 4px;\">Healthy soil is the invisible foundation of everything that follows</div>\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 12px; font-size: 0.72rem; color: #888 !important; text-align: center;\">Source: UC Cooperative Extension, UC Agriculture and Natural Resources</div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["spacing-comparison"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Proper Spacing vs. Overcrowding</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Why fewer plants often means more food</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;\">\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #c62828; overflow: hidden;\">\n                <div style=\"background-color: #ffebee !important; padding: 12px 15px; text-align: center;\">\n                    <div style=\"font-weight: 700; font-size: 1rem; color: #c62828 !important;\">Overcrowded Bed</div>\n                </div>\n                <div style=\"padding: 18px;\">\n                    <div style=\"font-size: 0.85rem; color: #3E2723 !important; line-height: 1.7;\">\n                        <div style=\"margin-bottom: 8px;\"><strong style=\"color: #c62828 !important;\">Tomatoes at 12\":</strong> Tangled vines, poor airflow, disease spreads fast</div>\n                        <div style=\"margin-bottom: 8px;\"><strong style=\"color: #c62828 !important;\">Result:</strong> Smaller fruit, more blossom drop, powdery mildew</div>\n                        <div><strong style=\"color: #c62828 !important;\">Typical yield:</strong> 5-8 lbs per plant</div>\n                    </div>\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #2D5016; overflow: hidden;\">\n                <div style=\"background-color: #e8f5e9 !important;            <div style=\"color: #3E2723 !important;\"><strong style=\"color: #2D5016 !important;\">Kale:</strong> 18\"</div>\n            </div>\n            <div style=\"margin-top: 8px; font-size: 0.72rem; color: #888 !important;\">Source: UC Master Gardener Program spacing guidelines</div>\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["new-gardener-checklist"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">New Gardener Success Checklist</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Avoid all 12 mistakes with this quick reference</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"background-color: #FFFFFF !important; padding: 20px;\">\n            <div style=\"border-bottom: 1px solid #e0e0e0; padding: 10px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #4A7C28; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #4A7C28 !important; font-weight: 700;\">1</div>\n                <div><span style=\"font-weight: 600; color: #2D5016 !important; font-size: 0.85rem;\">Finger-test soil before watering.</span> <span style=\"color: #666 !important; font-size: 0.8rem;\">If moist 1\" down, skip a day.</span></div>\n            </div>\n            <div style=\"border-bottom: 1px solid #e0e0e0; padding: 10px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #4A7C28; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #4A7C28 !important; font-weight: 700;\">2</div>\n                <div><span style=\"font-weight: 600; color: #2D5016 !important; font-size: 0.85rem;\">Use California planting dates.</span> <span style=\"color: #666 !important; font-size: 0.8rem;\">Ignore national seed packet timelines.</span></div>\n            </div>\n            <div style=\"border-bottom: 1px solid #e0e0e0; padding: 10px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #4A7C28; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #4A7C28 !important; font-weight: 700;\">3</div>\n                <div><span style=\"font-weight: 600; color: #2D5016 !important; font-size: 0.85rem;\">Map your microclimates.</span> <span style=\"color: #666 !important; font-size: 0.8rem;\">Track sun at 9am, noon, and 3pm before planting.</span></div>\n            </div>\n            <div style=\"border-bottom: 1px solid #e0e0e0; padding: 10px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #4A7C28; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #4A7C28 !important; font-weight: 700;\">4</div>\n                <div><span style=\"font-weight: 600; color: #2D5016 !important; font-size: 0.85rem;\">Add 2-4\" compost before planting.</span> <span style=\"color: #666 !important; font-size: 0.8rem;\">Work into top 8\" of soil.</span></div>\n            </div>\n            <div style=\"border-bottom: 1px solid #e0e0e0; padding: 10px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #4A7C28; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #4A7C28 !important; font-weight: 700;\">5</div>\n                <div><span style=\"font-weight: 600; color: #2D5016 !important; font-size: 0.85rem;\">Follow spacing on tags.</span> <span style=\"color: #666 !important; font-size: 0.8rem;\">More room = bigger harvest per plant.</span></div>\n            </div>\n            <div style=\"border-bottom: 1px solid #e0e0e0; padding: 10px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #4A7C28; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #4A7C28 !important; font-weight: 700;\">6</div>\n                <div><span style=\"font-weight: 600; color: #2D5016 !important; font-size: 0.85rem;\">Mulch 2-3\" around plants.</span> <span style=\"color: #666 !important; font-size: 0.8rem;\">Cuts watering by 25-50%. Keep away from stems.</span></div>\n            </div>\n            <div style=\"border-bottom: 1px solid #e0e0e0; padding: 10px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #4A7C28; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #4A7C28 !important; font-weight: 700;\">7</div>\n                <div><span style=\"font-weight: 600; color: #2D5016 !important; font-size: 0.85rem;\">Start with compost, not fertilizer.</span> <span style=\"color: #666 !important; font-size: 0.8rem;\">Switch to low-nitrogen when flowers appear.</span></div>\n            </div>\n            <div style=\"border-bottom: 1px solid #e0e0e0; padding: 10px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #4A7C28; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #4A7C28 !important; font-weight: 700;\">8</div>\n                <div><span style=\"font-weight: 600; color: #2D5016 !important; font-size: 0.85rem;\">Start small (4x8 bed max).</span> <span style=\"color: #666 !important; font-size: 0.8rem;\">Master 3-5 crops before expanding.</span></div>\n            </div>\n            <div style=\"border-bottom: 1px solid #e0e0e0; padding: 10px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #4A7C28; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #4A7C28 !important; font-weight: 700;\">9</div>\n                <div><span style=\"font-weight: 600; color: #2D5016 !important; font-size: 0.85rem;\">Check plants every 2 days.</span> <span style=\"color: #666 !important; font-size: 0.8rem;\">Look under leaves. Catch pests early.</span></div>\n            </div>\n            <div style=\"border-bottom: 1px solid #e0e0e0; padding: 10px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #4A7C28; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #4A7C28 !important; font-weight: 600;\">10</div>\n                <div><span style=\"font-weight: 600; color: #2D5016 !important; font-size: 0.85rem;\">Buy from local nurseries.</span> <span style=\"color: #666 !important; font-size: 0.8rem;\">CA-adapted varieties outperform national brands.</span></div>\n            </div>\n            <div style=\"border-bottom: 1px solid #e0e0e0; padding: 10px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #4A7C28; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #4A7C28 !important; font-weight: 600;\">11</div>\n                <div><span style=\"font-weight: 600; color: #2D5016 !important; font-size: 0.85rem;\">Water in the morning.</span> <span style=\"color: #666 !important; font-size: 0.8rem;\">Wet foliage overnight causes fungal disease.</span></div>\n            </div>\n            <div style=\"padding: 10px 0; display: flex; gap: 12px; align-items: flex-start;\">\n                <div style=\"min-width: 24px; height: 24px; border: 2px solid #4A7C28; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #4A7C28 !important; font-weight: 600;\">12</div>\n                <div><span style=\"font-weight: 600; color: #2D5016 !important; font window.AH_GRAPHICS["tomato-companion-planting-layout"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Tomato Companion Planting Layout</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Spacing guide for 12 proven companions around your tomato plants</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"max-width: 500px; margin: 0 auto; position: relative; background-color: #FFFFFF !important; border: 2px solid #4A7C28; border-radius: 50%; width: 100%; padding-top: 100%; position: relative;\">\n        </div>\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 16px;\">\n            <div style=\"background-color: #e8f5e9 !important; padding: 10px; border-left: 4px solid #4A7C28; text-align: center;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important;\">6-12 in. from stem</div>\n                <div style=\"font-size: 0.75rem; color: #3E2723 !important; margin-top: 4px;\">Basil, Chives, Lettuce, Carrots, Parsley</div>\n            </div>\n            <div style=\"background-color: #e8f5e9 !important; padding: 10px; border-left: 4px solid #8BC34A; text-align: center;\">\n                <div style=\"font-weight: 700; font-size: 0.85rem; color: #2D5016 !important;\">12-18 in. from stem</div>\n                <div style=\"font-size: 0.75rem; color: #3E2723 !important; margin-top: 4px;\">Marigolds, Sweet Alyssum, Garlic</div>\n            </div>\n            <div style=\"background-color: #e8f5e9 !important; padding: 10px; border-left: 4px solid #2D5016; text-align: center;\">\n                <div style window.AH_GRAPHICS["what-not-to-plant-near-tomatoes"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #c62828 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">&#9888; What NOT to Plant Near Tomatoes</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Keep these plants away from your tomato beds</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #ffebee !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px;\">\n            <div style=\"background-color: #FFFFFF !important; border-left: 4px solid #c62828; padding: 14px;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #c62828 !important; margin-bottom: 4px;\">Brassicas</div>\n                <div style=\"font-size: 0.75rem; color: #3E2723 !important;\">Cabbage, broccoli, cauliflower</div>\n                <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 6px;\">Compete for nitrogen and calcium. Share soil-borne diseases. Keep 4+ feet apart.</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border-left: 4px solid #c62828; padding: 14px;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #c62828 !important; margin-bottom: 4px;\">Fennel</div>\n                <div style=\"font-size: 0.75rem; color: #3E2723 !important;\">All varieties</div>\n                <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 6px;\">Allelopathic: releases root compounds that inhibit tomato growth. Plant in isolation.</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border-left: 4px solid #c62828; padding: 14px;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #c62828 !important; margin-bottom: 4px;\">Corn</div>\n                <div style=\"font-size: 0.75rem; color: #3E2723 !important;\">Sweet corn, field corn</div>\n                <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 6px;\">Shares corn earworm / tomato fruitworm. Separate as far as possible.</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border-left: 4px solid #c62828; padding: 14px;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #c62828 !important; margin-bottom: 4px;\">Other Nightshades</div>\n                <div style=\"font-size: 0.75rem; color: #3E2723 !important;\">Peppers, eggplant, potatoes</div>\n                <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 6px;\">Concentrates verticillium wilt, fusarium, and early blight. Rotate yearly.</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border-left: 4px solid #c62828; padding: 14px;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #c62828 !important; margin-bottom: 4px;\">Walnut Trees</div>\n                <div style=\"font-size: 0.75rem; color: #3E2723 !important;\">Black walnut especially</div>\n                <div style=\"font-size: 0.75rem; color: #666 !important; margin-top: 6px;\">Produces juglone, toxic to tomatoes. Keep tomatoes 50+ feet from mature trees.</div>\n            </div>\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["zucchini-companion-planting-layout"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Zucchini Companion Planting Rings</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Arrange companions by function around each zucchini hill</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr; gap: 0; max-width: 500px; margin: 0 auto;\">\n            <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 16px; text-align: center; border-radius: 8px 8px 0 0;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #FFFFFF !important;\">&#9650; OUTER RING: 24-36 in.</div>\n                <div style=\"font-size: 0.8rem; color: #FFFFFF !important; opacity: 0.9; margin-top: 4px;\">Sunflowers (N side) &#8226; Corn (windbreak) &#8226; Pole Beans (trellis)</div>\n                <div style=\"font-size: 0.7rem; color: #FFFFFF !important; opacity: 0.7; margin-top: 4px;\">Vertical structure, wind protection, nitrogen fixing</div>\n            </div>\n            <div style=\"background-color: #4A7C28 !important; color: #FFFFFF !important; padding: 16px; text-align: center;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #FFFFFF !important;\">&#9644; MIDDLE RING: 12-18 in.</div>\n                <div style=\"font-size: 0.8rem; color: #FFFFFF !important; opacity: 0.9; margin-top: 4px;\">Marigolds &#8226; Nasturtiums &#8226; Dill &#8226; Oregano &#8226; Petunias</div>\n                <div style=\"font-size: 0.7rem; color: #FFFFFF !important; opacity: 0.7; margin-top: 4px;\">Pest deterrence, beneficial insect attraction</div>\n            </div>\n            <div style=\"background-color: #8BC34A !important; color: #2D5016 !important; padding: 16px; text-align: center;\">\n                <div style=\"font-weight: 700; font-size: 0.9rem; color: #2D5016 !important;\">&#9679; INNER RING: 4-12 in.</div>\n                <div style=\"font-size: 0.8rem; color: #2D5016 !important; opacity: 0.9; margin-top: 4px;\">Radishes &#8226; Sweet Alyssum &#8226; Bush Peas</div>\n                <div style=\"font-size: 0.7rem; color: #2D5016 !important; opacity: 0.7; margin-top: 4px;\">Quick harvest, living mulch, soil enrichment</div>\n            </div>\n            <div style=\"background-color: #F5F0E8 !important; border: 3px solid #8BC34A; padding: 16px; text-align: center; border-radius: 0 0 8px 8px;\">\n                <div style=\"font-weight: 700; font-size: 1rem; color: #2D5016 !important;\">&#129370; ZUCCHINI HILL</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; margin-top: 4px;\">1-3 plants per hill | Spreads 3-4 ft. in all directions</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 16px; background-color: #FFFFFF !important; padding: 12px; border: 1px solid #ddd; text-align: center; font-size: 0.8rem;\">\n            <span style=\"font-weight: 700; color: #2D5016 !important;\">Top pollinator picks:</span>\n            <span style=\"color: #3E2723 !important;\"> Borage (6-15 bee visits per zucchini flower needed) + Sunflowers (dozens of bees per head daily)</span>\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["california-three-sisters-method"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Three Sisters Method for California</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Corn + Beans + Zucchini: adapted from traditional planting</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px;\">\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #4A7C28; padding: 16px; text-align: center; border-radius: 6px;\">\n                <div style=\"font-size: 1.5rem; margin-bottom: 8px;\">&#127805;</div>\n                <div style=\"font-weight: 700; font-size: 1rem; color: #2D5016 !important;\">Sister 1: Corn</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; margin-top: 8px;\">Provides vertical structure and a windbreak for zucchini</div>\n                <div style=\"margin-top: 10px; font-size: 0.75rem; color: #666 !important;\">Plant in 4x4 block, N side</div>\n                <div style=\"margin-top: 6px; font-size: 0.75rem; color: #4A7C28 !important; font-weight: 600;\">Golden Bantam, Silver Queen</div>\n                <div style=\"margin-top: 8px; background-color: #e8f5e9 !important; padding: 6px; font-size: 0.7rem; color: #2D5016 !important;\">Plant 2-3 weeks before zucchini</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #4A7C28; padding: 16px; text-align: center; border-radius: 6px;\">\n                <div style=\"font-size: 1.5rem; margin-bottom: 8px;\">&#129389;</div>\n                <div style=\"font-weight: 700; font-size: 1rem; color: #2D5016 !important;\">Sister 2: Beans</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; margin-top: 8px;\">Fix nitrogen in soil, climb corn stalks for vertical space</div>\n                <div style=\"margin-top: 10px; font-size: 0.75rem; color: #666 !important;\">Sow at corn base, 10-12 in. spacing</div>\n                <div style=\"margin-top: 6px; font-size: 0.75rem; color: #4A7C28 !important; font-weight: 600;\">Scarlet Runner, Blue Lake</div>\n                <div style=\"margin-top: 8px; background-color: #e8f5e9 !important; padding: 6px; font-size: 0.7rem; color: #2D5016 !important;\">Sow same time as zucchini (60&#176;F soil)</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #4A7C28; padding: 16px; text-align: center; border-radius: 6px;\">\n                <div style=\"font-size: 1.5rem; margin-bottom: 8px;\">&#129370;</div>\n                <div style=\"font-weight: 700; font-size: 1rem; color: #2D5016 !important;\">Sister 3: Zucchini</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; margin-top: 8px;\">Large leaves shade ground, suppress weeds, retain soil moisture</div>\n                <div style=\"margin-top: 10px; font-size: 0.75rem; color: #666 !important;\">36 in. from corn-bean cluster</div>\n                <div style=\"margin-top: 6px; font-size: 0.75rem; color: #4A7C28 !important; font-weight: 600;\">Black Beauty, Costata Romanesco</div>\n                <div style=\"margin-top: 8px; background-color: #e8f5e9 !important; padding: 6px; font-size: 0.7rem; color: #2D5016 !important;\">Coastal: late Apr | Inland: mid-Mar</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 14px; background-color: #FFFFFF !important; padding: 12px; border: 1px solid #ddd; font-size: 0.8rem; color: #3E2723 !important; text-align: center;\">\n            <strong style=\"color: #2D5016 !important;\">California adaptation:</strong> Leave wider spacing (36 in.) between zucchini and the corn-bean cluster so you can harvest zucchini throughout the season without disturbing the other sisters.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["zucchini-companions-quick-reference-card"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">12 Zucchini Companions by Benefit</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Choose at least one pollinator + one pest deterrent per hill</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px;\">\n            <div style=\"background-color: #FFFFFF !important; border-top: 4px solid #4A7C28; padding: 16px;\">\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #4A7C28 !important; margin-bottom: 10px;\">&#127804; Pollinator Magnets</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <strong style=\"color: #2D5016 !important;\">Borage</strong> - Blue flowers, continuous bloom<br>\n                    <strong style=\"color: #2D5016 !important;\">Sunflowers</strong> - Dozens of bees per head/day<br>\n                    <strong style=\"color: #2D5016 !important;\">Sweet Alyssum</strong> - Low carpet, syrphid flies<br>\n                    <strong style=\"color: #2D5016 !important;\">Marigolds</strong> - Also suppresses nematodes\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border-top: 4px solid #c62828; padding: 16px;\">\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #c62828 !important; margin-bottom: 10px;\">&#128737; Pest Deterrents</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <strong style=\"color: #2D5016 !important;\">Dill</strong> - Attracts tachinid flies (squash bug parasites)<br>\n                    <strong style=\"color: #2D5016 !important;\">Nasturtiums</strong> - Trap crop for aphids<br>\n                    <strong style=\"color: #2D5016 !important;\">Oregano</strong> - Aromatic oils confuse pests<br>\n                    <strong style=\"color: #2D5016 !important;\">Petunias</strong> - Deter squash bugs + attract hummingbirds\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border-top: 4px solid #8BC34A; padding: 16px;\">\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #8BC34A !important; margin-bottom: 10px;\">&#127793; Soil &amp; Space</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <strong style=\"color: #2D5016 !important;\">Beans</strong> - Fix nitrogen, vertical space use<br>\n                    <strong style=\"color: #2D5016 !important;\">Peas</strong> - Early-season N fixer, harvest before squash spreads<br>\n                    <strong style=\"color: #2D5016 !important;\">Radishes</strong> - 22-day harvest, break compaction<br>\n                    <strong style=\"color: #2D5016 !important;\">Corn</strong> - Windbreak, Three Sisters tradition\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 14px; background-color: #ffebee !important; border-left: 4px solid #c62828; padding: 12px; font-size: 0.8rem; color: #3E2723 !important;\">\n            <strong style=\"color: #c62828 !important;\">Avoid near zucchini:</strong> Potatoes (blight risk) &#8226; Other cucurbits (shared pests) &#8226; Fennel (allelopathic) &#8226; Brassicas (nutrient competition)\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["clay-soil-vs-sandy-soil-vs-loam"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Clay vs. Sandy vs. Loam Soil</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Why clay holds more water and nutrients than lighter soils</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px;\">\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #8B6914; padding: 16px; text-align: center; border-radius: 6px;\">\n                <div style=\"font-weight: 700; font-size: 1rem; color: #8B6914 !important; margin-bottom: 10px;\">Clay Soil</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; text-align: left; line-height: 1.7;\">\n                    <strong style=\"color: #2D5016 !important;\">Particle size:</strong> &lt; 0.002 mm<br>\n                    <strong style=\"color: #2D5016 !important;\">Water retention:</strong> &#9608;&#9608;&#9608;&#9608;&#9608; High<br>\n                    <strong style=\"color: #2D5016 !important;\">Nutrient holding:</strong> &#9608;&#9608;&#9608;&#9608;&#9608; High<br>\n                    <strong style=\"color: #2D5016 !important;\">Drainage:</strong> &#9608;&#9601;&#9601;&#9601;&#9601; Slow<br>\n                    <strong style=\"color: #2D5016 !important;\">Root penetration:</strong> &#9608;&#9601;&#9601;&#9601;&#9601; Difficult<br>\n                    <strong style=\"color: #2D5016 !important;\">Workability:</strong> &#9608;&#9601;&#9601;&#9601;&#9601; Heavy\n                </div>\n                <div style=\"margin-top: 10px; background-color: #e8f5e9 !important; padding: 6px; font-size: 0.7rem; color: #2D5016 !important;\">40%+ of CA land</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #C4A35A; padding: 16px; text-align: center; border-radius: 6px;\">\n                <div style=\"font-weight: 700; font-size: 1rem; color: #C4A35A !important; margin-bottom: 10px;\">Sandy Soil</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; text-align: left; line-height: 1.7;\">\n                    <strong style=\"color: #2D5016 !important;\">Particle size:</strong> 0.05 - 2.0 mm<br>\n                    <strong style=\"color: #2D5016 !important;\">Water retention:</strong> &#9608;&#9601;&#9601;&#9601;&#9601; Low<br>\n                    <strong style=\"color: #2D5016 !important;\">Nutrient holding:</strong> &#9608;&#9601;&#9601;&#9601;&#9601; Low<br>\n                    <strong style=\"color: #2D5016 !important;\">Drainage:</strong> &#9608;&#9608;&#9608;&#9608;&#9608; Fast<br>\n                    <strong style=\"color: #2D5016 !important;\">Root penetration:</strong> &#9608;&#9608;&#9608;&#9608;&#9608; Easy<br>\n                    <strong style=\"color: #2D5016 !important;\">Workability:</strong> &#9608;&#9608;&#9608;&#9608;&#9608; Light\n                </div>\n                <div style=\"margin-top: 10px; background-color: #fff8e1 !important; padding: 6px; font-size: 0.7rem; color: #3E2723 !important;\">Needs frequent watering</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #4A7C28; padding: 16px; text-align: center; border-radius: 6px;\">\n                <div style=\"font-weight: 700; font-size: 1rem; color: #4A7C28 !important; margin-bottom: 10px;\">Loam (Ideal)</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; text-align: left; line-height: 1.7;\">\n                    <strong style=\"color: #2D5016 !important;\">Particle size:</strong> Mixed blend<br>\n                    <strong style=\"color: #2D5016 !important;\">Water retention:</strong> &#9608;&#9608;&#9608;&#9601;&#9601; Moderate<br>\n                    <strong style=\"color: #2D5016 !important;\">Nutrient holding:</strong> &#9608;&#9608;&#9608;&#9601;&#9601; Good<br>\n                    <strong style=\"color: #2D5016 !important;\">Drainage:</strong> &#9608;&#9608;&#9608;&#9601;&#9601; Balanced<br>\n                    <strong style=\"color: #2D5016 !important;\">Root penetration:</strong> &#9608;&#9608;&#9608;&#9608;&#9601; Good<br>\n                    <strong style=\"color: #2D5016 !important;\">Workability:</strong> &#9608;&#9608;&#9608;&#9608;&#9601; Easy\n                </div>\n                <div style=\"margin-top: 10px; background-color: #e8f5e9 !important; padding: 6px; font-size: 0.7rem; color: #2D5016 !important;\">Goal: add compost to clay</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 14px; background-color: #FFFFFF !important; padding: 12px; border: 1px solid #ddd; text-align: center; font-size: 0.8rem; color: #3E2723 !important;\">\n            <strong style=\"color: #2D5016 !important;\">Key insight:</strong> Clay holds water and nutrients far longer than sand. Choose crops that work with clay's strengths rather than fighting them.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["clay-soil-planting-techniques"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Clay Soil Planting Techniques</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Three methods to improve drainage without replacing your soil</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr; gap: 14px;\">\n            <div style=\"background-color: #FFFFFF !important; border-left: 4px solid #4A7C28; padding: 16px; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"min-width: 50px; height: 50px; background-color: #e8f5e9 !important; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; color: #2D5016 !important;\">1</div>\n                <div>\n                    <div style=\"font-weight: 700; font-size: 0.95rem; color: #2D5016 !important;\">Raised Mound / Hill Method</div>\n                    <div style=\"font-size: 0.8rem; color: #3E2723 !important; margin-top: 6px;\">Mound amended soil 8-12 in. high and 2 ft. across. Roots get improved drainage at the crown while accessing clay's moisture reserves deeper down.</div>\n                    <div style=\"margin-top: 8px; font-size: 0.75rem; color: #4A7C28 !important; font-weight: 600;\">Best for: Squash, Potatoes, Artichokes</div>\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border-left: 4px solid #4A7C28; padding: 16px; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"min-width: 50px; height: 50px; background-color: #e8f5e9 !important; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; color: #2D5016 !important;\">2</div>\n                <div>\n                    <div style=\"font-weight: 700; font-size: 0.95rem; color: #2D5016 !important;\">Raised Row Method</div>\n                    <div style=\"font-size: 0.8rem; color: #3E2723 !important; margin-top: 6px;\">Mound soil 4-6 in. above surrounding level in long rows. Water drains off the sides, keeping root zones drier. Ideal for row crops.</div>\n                    <div style=\"margin-top: 8px; font-size: 0.75rem; color: #4A7C28 !important; font-weight: 600;\">Best for: Beans, Beets, Peas, Lettuce</div>\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border-left: 4px solid #4A7C28; padding: 16px; display: flex; gap: 14px; align-items: flex-start;\">\n                <div style=\"min-width: 50px; height: 50px; background-color: #e8f5e9 !important; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; color: #2D5016 !important;\">3</div>\n                <div>\n                    <div style=\"font-weight: 700; font-size: 0.95rem; color: #2D5016 !important;\">Surface Amendment Method</div>\n                    <div style=\"font-size: 0.8rem; color: #3E2723 !important; margin-top: 6px;\">Mix 2-4 in. of compost into the top 6-8 in. of clay. Shallow-rooted crops grow in the improved layer while deeper roots access clay's nutrients.</div>\n                    <div style=\"margin-top: 8px; font-size: 0.75rem; color: #4A7C28 !important; font-weight: 600;\">Best for: Lettuce, Broccoli, Cabbage, Kale</div>\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 14px; background-color: #ffebee !important; border-left: 4px solid #c62828; padding: 12px; font-size: 0.8rem; color: #3E2723 !important;\">\n            <strong style=\"color: #c62828 !important;\">Never do:</strong> Add sand to clay (creates concrete-like mix). Work clay when wet (destroys structure). Avoid 50%+ sand ratio needed to actually help.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["coastal-vs-inland-summer-conditions"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Coastal Santa Cruz vs. Inland Gilroy</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Summer growing conditions just 20 miles apart</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #6B8E9B; padding: 16px; border-radius: 6px;\">\n                <div style=\"text-align: center; font-weight: 700; font-size: 1rem; color: #6B8E9B !important; margin-bottom: 12px;\">&#127786; Coastal Santa Cruz</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 2;\">\n                    <strong style=\"color: #2D5016 !important;\">July avg. high:</strong> 72-73&#176;F<br>\n                    <strong style=\"color: #2D5016 !important;\">Direct sun hours:</strong> 4-6 hrs/day<br>\n                    <strong style=\"color: #2D5016 !important;\">Solar radiation:</strong> 40-60% less than inland<br>\n                    <strong style=\"color: #2D5016 !important;\">Fog frequency:</strong> Most mornings, some all-day<br>\n                    <strong style=\"color: #2D5016 !important;\">Humidity:</strong> High (marine layer)<br>\n                    <strong style=\"color: #2D5016 !important;\">Water needs:</strong> Lower\n                </div>\n                <div style=\"margin-top: 10px; background-color: #e8f5e9 !important; padding: 8px; font-size: 0.75rem; color: #2D5016 !important; text-align: center;\">\n                    Best for: Lettuce, peas, kale, broccoli, strawberries, chard\n                </div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #D4A017; padding: 16px; border-radius: 6px;\">\n                <div style=\"text-align: center; font-weight: 700; font-size: 1rem; color: #D4A017 !important; margin-bottom: 12px;\">&#9728; Inland Gilroy</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 2;\">\n                    <strong style=\"color: #2D5016 !important;\">July avg. high:</strong> 88-92&#176;F<br>\n                    <strong style=\"color: #2D5016 !important;\">Direct sun hours:</strong> 10-12 hrs/day<br>\n                    <strong style=\"color: #2D5016 !important;\">Solar radiation:</strong> Full intensity<br>\n                    <strong style=\"color: #2D5016 !important;\">Fog frequency:</strong> Rare<br>\n                    <strong style=\"color: #2D5016 !important;\">Humidity:</strong> Low<br>\n                    <strong style=\"color: #2D5016 !important;\">Water needs:</strong> Higher\n                </div>\n                <div style=\"margin-top: 10px; background-color: #fff8e1 !important; padding: 8px; font-size: 0.75rem; color: #3E2723 !important; text-align: center;\">\n                    Best for: Tomatoes, peppers, melons, eggplant, corn\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 14px; background-color: #FFFFFF !important; padding: 12px; border: 1px solid #ddd; font-size: 0.8rem; color: #3E2723 !important; text-align: center;\">\n            <strong style=\"color: #2D5016 !important;\">Coastal advantage:</strong> Extended harvests of cool-season crops that bolt or burn out in warmer zones. Less water, almost no sunscald, fewer heat-stressed plants.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["frost-protection-guide"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Frost Protection for Coastal Winter Gardens</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Three simple methods to protect crops on the coldest nights</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px;\">\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #4A7C28; padding: 16px; border-radius: 6px; text-align: center;\">\n                <div style=\"font-size: 1.4rem; margin-bottom: 8px;\">&#127787;</div>\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #2D5016 !important;\">Floating Row Cover</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; margin-top: 8px; text-align: left;\">Lightweight fabric draped over plants. Raises temperature 2-4&#176;F. Blocks frost from settling on leaves.</div>\n                <div style=\"margin-top: 10px; background-color: #e8f5e9 !important; padding: 6px; font-size: 0.75rem; color: #2D5016 !important;\">Best for: Lettuce, spinach, cilantro</div>\n                <div style=\"margin-top: 6px; font-size: 0.7rem; color: #666 !important;\">Easiest method. Reusable for years.</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #4A7C28; padding: 16px; border-radius: 6px; text-align: center;\">\n                <div style=\"font-size: 1.4rem; margin-bottom: 8px;\">&#9642;</div>\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #2D5016 !important;\">Cold Frame</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; margin-top: 8px; text-align: left;\">Bottomless box with clear lid. Traps solar heat during the day, releases it at night. +5-10&#176;F protection.</div>\n                <div style=\"margin-top: 10px; background-color: #e8f5e9 !important; padding: 6px; font-size: 0.75rem; color: #2D5016 !important;\">Best for: Starting seedlings, tender greens</div>\n                <div style=\"margin-top: 6px; font-size: 0.7rem; color: #666 !important;\">Most protection. Vent on warm days.</div>\n            </div>\n            <div style=\"background-color: #FFFFFF !important; border: 2px solid #4A7C28; padding: 16px; border-radius: 6px; text-align: center;\">\n                <div style=\"font-size: 1.4rem; margin-bottom: 8px;\">&#127806;</div>\n                <div style=\"font-weight: 700; font-size: 0.95rem; color: #2D5016 !important;\">Thick Mulch Layer</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; margin-top: 8px; text-align: left;\">2-3 in. of straw or shredded leaves around plants. Insulates soil and keeps roots warm through cold nights.</div>\n                <div style=\"margin-top: 10px; background-color: #e8f5e9 !important; padding: 6px; font-size: 0.75rem; color: #2D5016 !important;\">Best for: Garlic, carrots, all root crops</div>\n                <div style=\"margin-top: 6px; font-size: 0.7rem; color: #666 !important;\">Also suppresses weeds year-round.</div>\n            </div>\n        </div>\n        <div style=\"margin-top: 14px; background-color: #FFFFFF !important; padding: 12px; border: 1px solid #ddd; font-size: 0.8rem; color: #3E2723 !important;\">\n            <strong style=\"color: #2D5016 !important;\">Frost-hardy crops (no protection needed):</strong> Kale (to 20&#176;F), Chard (to low 20s), Fava beans, Garlic, Broccoli, Cauliflower. Santa Cruz averages only a handful of frost nights per year, typically Dec-Jan.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["hot-vs-sweet-pepper-heat-tolerance"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">Hot Peppers vs. Sweet Peppers in Heat</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Hot varieties keep producing 5-10&#176;F higher than sweet types</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n            <div style=\"background-color: #ffebee !important; border: 2px solid #c62828; padding: 16px; border-radius: 6px;\">\n                <div style=\"text-align: center; font-weight: 700; font-size: 0.95rem; color: #c62828 !important; margin-bottom: 12px;\">Sweet Peppers</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <strong style=\"color: #2D5016 !important;\">Blossom drop begins:</strong> 90&#176;F<br>\n                    <strong style=\"color: #2D5016 !important;\">Fruit set stops:</strong> 95&#176;F<br>\n                    <strong style=\"color: #2D5016 !important;\">Sunscald risk:</strong> High above 95&#176;F<br>\n                    <strong style=\"color: #2D5016 !important;\">Recovery:</strong> Resumes when temps drop\n                </div>\n                <div style=\"margin-top: 10px; font-size: 0.75rem; color: #666 !important;\">\n                    Varieties: California Wonder, Big Bertha, King of the North\n                </div>\n            </div>\n            <div style=\"background-color: #e8f5e9 !important; border: 2px solid #4A7C28; padding: 16px; border-radius: 6px;\">\n                <div style=\"text-align: center; font-weight: 700; font-size: 0.95rem; color: #4A7C28 !important; margin-bottom: 12px;\">Hot Peppers</div>\n                <div style=\"font-size: 0.8rem; color: #3E2723 !important; line-height: 1.8;\">\n                    <strong style=\"color: #2D5016 !important;\">Blossom drop begins:</strong> 100&#176;F+<br>\n                    <strong style=\"color: #2D5016 !important;\">Fruit set stops:</strong> 105&#176;F+<br>\n                    <strong style=\"color: #2D5016 !important;\">Sunscald risk:</strong> Low (smaller fruit)<br>\n                    <strong style=\"color: #2D5016 !important;\">Capsaicin boost:</strong> Hotter temps = hotter peppers\n                </div>\n                <div style=\"margin-top: 10px; font-size: 0.75rem; color: #666 !important;\">\n                    Varieties: Serrano, Thai Dragon, Habanero, Anaheim\n                </div>\n            </div>\n        </div>\n        <div style=\"margin-top: 14px; background-color: #FFFFFF !important; padding: 12px; border: 1px solid #ddd; font-size: 0.8rem; color: #3E2723 !important;\">\n            <strong style=\"color: #2D5016 !important;\">Pro tip:</strong> Use 30% shade cloth during peak July-August heat even on hot peppers to prevent sunscald on fruit. The plants keep producing; it is the exposed fruit skin that burns.\n        </div>\n    </div>\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; text-align: center; padding: 12px; font-size: 0.75rem;\">ambitiousharvest.com</div>\n</div>";

window.AH_GRAPHICS["all-season-harvest-timeline"] = "<div style=\"width: 100%; margin: 30px 0; font-family: 'Montserrat', system-ui, sans-serif;\">\n    <div style=\"background-color: #2D5016 !important; color: #FFFFFF !important; padding: 20px 25px; text-align: center;\">\n        <h2 style=\"font-size: 1.3rem; font-weight: 700; margin: 0 0 5px 0; color: #FFFFFF !important;\">12 Continuous Producers: Harvest Timeline</h2>\n        <p style=\"font-size: 0.85rem; margin: 0; opacity: 0.9; color: #FFFFFF !important;\">Coastal California harvest windows (months of production per planting)</p>\n    </div>\n    <div style=\"padding: 20px; background-color: #F5F0E8 !important;\">\n        <div style=\"display: grid; grid-template-columns: 1fr; gap: 8px;\">\n            <div style=\"display: flex; align-items: center; gap: 8px;\">\n                <div style=\"width: 110px; font-size: 0.8rem; font-weight: 600; color: #2D5016 !important;\">Swiss Chard</div>\n                <div style=\"flex: 1; background-color: #e8f5e9 !important; height: 24px; position: relative;\"><div style=\"width: 100%; background-color: #4A7C28 !important; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: #FFFFFF !important; font-weight: 600;\">8-12 months</div></div>\n            </div>\n            <div style=\"display: flex; align-items: center; gap: 8px;\">\n                <div style=\"width: 110px; font-size: 0.8rem; font-weight: 600; color: #2D5016 !important;\">Kale</div>\n                <div style=\"flex: 1; background-color: #e8f5e9 !important; height: 24px; position: relative;\"><div style=\"width: 100%; background-color: #4A7C28 !important; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: #FFFFFF !important; font-weight: 600;\">Year-round (coastal)</div></div>\n            </div>\n            <div style=\"display: flex; align-items: center; gap: 8px;\">\n                <div style=\"w
